        body: "## Phase 2 — V2 base + polish iteration (CEO 위임, 2026-05-10 23:55 KST)\n\n### 보드 답변 정리\n- 1차 ask: `rework` (셋 다 부적합)\n- 2차 ask: `polish` (URL 봤음 / 디자인 quality·visual polish 부족, axis 자체는 OK)\n\n### Phase 2 결정 (CEO, 단독)\n**Base = V2 (한국 신뢰-시그널 밀도)** — 보드 원안 \"신뢰·전문성·UX 비중 더\" emphasis 와 직접 매칭. V1/V3 는 그대로 보존 (PR 내), V2 만 deep polish iteration.\n\nbase 선택을 보드에 다시 묻지 않은 사유: 보드 \"polish 부족\" = 단일 polished 결과 요구로 해석. 3rd wake 추가 = wake 누적 위험.\n\n### Polish strike 지시 (V2 main 만)\n\n1. **실 sample data 주입** — vendor 8~10개 placeholder (회사명·카테고리·로고 placeholder svg·인증 레벨). 단일 source-of-truth, 카테고리 합계·count 표기 일치.\n2. **인증 badge 시각화** — 단순 텍스트 → 아이콘+레벨+tooltip. 최소 3 레벨 (사업자등록 / 실적인증 / 우수vendor).\n3. **Typography rhythm** — hero h1/h2 size·weight·line-height precision (`text-foreground` 토큰 유지). 카드 내 hierarchy (제목/메타/CTA) 정밀화.\n4. **Spacing 8px grid** — section padding rhythm (`py-16/24/32` 일관), 카드 내부 spacing precision.\n5. **Micro-interaction 6종 토큰** — hover/focus/active/error/loading/empty 모두 작동 (card lift, badge tooltip, button states).\n6. **Hero visual 강화** — animated counter (vendor count up-count), 검증 timestamp prominent, 트러스트 카운터 (\"이번 주 N개 검증\").\n7. **Mobile 360px hierarchy** — 단순 reflow 가 아닌 mobile-optimized order (검색 우선, 카테고리 hero scroll-snap, 인증 badge 압축).\n\n### Out of scope (Phase 2)\n- V1 / V3 polish (Phase 1 그대로 둠 — base 결정 기록용)\n- production swap (`app/page.tsx` 변경 0 lock 유지) — Phase 3 별 child + 보드 명시 승인 후\n- 실제 vendor 로고 자산 (placeholder svg 충분)\n\n### Acceptance Criteria\n- [ ] `/design-preview/main-v2` polish 강화, 다른 라우트 변경 0\n- [ ] 6종 micro-interaction 작동 verifiable\n- [ ] Real sample data >=8 vendor, 카테고리 합계·count 모순 없음\n- [ ] Mobile 360px + Desktop 1280px 양쪽 hierarchy 검증\n- [ ] Vercel preview READY + 200 + `robots: noindex,nofollow` 유지\n- [ ] PR #50 description 에 \"Phase 2: V2 polish — 변경점 표\" 추가 (Phase 1 → Phase 2 diff)\n\n### 트리거\npreview deploy 완료 → 본 이슈 코멘트 (V2-polished URL + Phase 1↔Phase 2 비교 1단락) → CEO 검증 → 보드 surface (request_confirmation accept/decline + reject 시 코멘트로 reason)\n\n### 막힐 시\n- typography 토큰 부재 → CTO escalation 코멘트 (CEO wake)\n- sample data scope 모호 → 본 코멘트 (CEO wake), 보드 직접 ask 금지\n- visual asset (logo/illustration) 필요 판단 시 → CEO 코멘트, 새 vendor 또는 free CC0 사용 결정 별도\n\n### Reversibility\npreview-only, two-way door. 자유 시도, production 영향 0."
