        body: "## Wake 응답 — sitemap submit 확인 + GSC fetch 실패 진단\n\n### 1. CEO 스크린샷 해석 (GSC Sitemaps)\n\n| Sitemap | 제출일 | 상태 | 발견 URL |\n|---|---|---|---|\n| `https://keywords.packlinx.com/sitemap.xml` | 2026-04-30 | **가져올 수 없음** | 0 |\n| `https://www.packlinx.com/sitemap.xml` | 2026-04-29 | 성공 | 1,531 |\n\nPACAA-95 의 50 SEO 페이지는 `keywords.packlinx.com` 에 호스팅되어 있는데, GSC 가 해당 sitemap 을 못 가져오고 있어 **현 상태로는 PACAA-104 +5d audit 시 0/50 indexed 가 거의 확정**.\n\n### 2. 원인 진단 — 서버 측은 정상\n\n```\ncurl -I https://keywords.packlinx.com/sitemap.xml\n→ HTTP/2 200, content-type: application/xml, 10,375 bytes\ncurl https://keywords.packlinx.com/robots.txt\n→ User-agent: *  Allow: /\n  Sitemap: https://keywords.packlinx.com/sitemap.xml\nsitemap <url> 카운트: 51 (root + 50 키워드 페이지)\n```\n\n원본 페이지 / robots / sitemap 모두 정상. 따라서 \"가져올 수 없음\" 은 **GSC property-scope mismatch** 로 진단.\n\n### 3. Root cause: GSC property scope\n\n스크린샷 좌상단 property 이름이 `packlinx.com`. 두 개 sitemap 이 같은 property 아래 나열되어 있는 것으로 보아 다음 둘 중 하나:\n\n- **(A)** URL-prefix 속성 `https://www.packlinx.com/` 또는 `https://packlinx.com/` 으로 검증된 상태 → **subdomain (`keywords.packlinx.com`) sitemap 은 이 속성으로 fetch 거부됨**. Google 정책상 sitemap host = property host 이어야 함.\n- **(B)** Domain property (DNS TXT 검증, 모든 subdomain 커버) 로 검증된 상태 → 원래는 fetch 되어야 하는데 첫 시도 실패 후 retry 미진행. 가능성 낮음(보통 24h 내 자동 retry).\n\n### 4. CEO 액션 요청 (request_confirmation 별도 생성)\n\n둘 중 하나 선택 필요:\n\n- **Option 1 — Domain property 검증 (권장)**: 도메인 등록기관(가비아/Cloudflare 등)에서 `packlinx.com` TXT 레코드 1개 추가 → GSC > 속성 추가 > 도메인 > `packlinx.com` 입력 → 검증. 한 번에 모든 subdomain (`www`, `keywords`, 미래 추가될 것 포함) 커버. 후속 sitemap 추가 시마다 별도 검증 불필요.\n- **Option 2 — URL-prefix property 추가**: GSC > 속성 추가 > URL 접두어 > `https://keywords.packlinx.com/` 입력 → HTML meta 태그 또는 Vercel DNS 로 검증 → keywords.packlinx.com sitemap 만 별도로 다시 제출. 빠르지만 future subdomain 마다 반복 작업 발생.\n\n작업 시간 둘 다 ~10분, Option 1 이 장기적으로 우월.\n\n### 5. Naver Webmaster 동일 이슈 가능성\n\n현 작업 흐름이 GSC 와 동일하다면 Naver 도 `www.packlinx.com` 만 등록되어 있을 가능성 있음. **`keywords.packlinx.com` 별도 사이트 등록 + sitemap 제출 필요**. Naver 는 도메인 단위 일괄 검증이 없어 무조건 subdomain 별 등록.\n\n### 6. PACAA-104 audit schedule\n\nCEO 가 sitemap submit 확인을 보낸 시점이 2026-04-30 → **+5d = 2026-05-05** 가 audit 발사일.\n\n- **2026-05-05** 에 `site/scripts/index_audit.py` 자동 실행 (canonical / robots / h1 / thin-content 4 카테고리 진단) → routine 등록 예정.\n- GSC URL Inspection 50 건 + Naver 인덱스 확인은 OAuth/세션 필요 → CEO 에게 stepwise 가이드 + CSV 입력 요청으로 진행.\n- 현 property 이슈 미해결 시 audit 결과는 0/50 으로 나올 것이므로 **2026-05-04 EOD 까지 property 이슈 unblock 권장**.\n\n### 7. 다음 액션\n\n1. (now) request_confirmation: property fix 옵션 선택 (Option 1 / 2)\n2. (now) 2026-05-05 09:00 KST routine 등록 — `index_audit.py` 자동 실행 + 결과 코멘트\n3. (CEO 응답 후) Option 1 채택 시 TXT 레코드 값 + 검증 가이드 제공\n4. (2026-05-05) audit 실행, DoD ≥40/50 평가, 미달 시 미인덱스 사유 분석\n\n— Backend Eng"
