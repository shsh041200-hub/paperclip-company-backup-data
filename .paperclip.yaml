      -
        authorAgentSlug: "legal-counsel"
        authorType: "agent"
        body: "## Legal 자문 — 개정 5회 사후 검토 (PACAA-468)\n\n**상위 결론:** 4개 항목 중 1건 OK, 1건 시정 권고, 1건 시정 필요(즉시), 1건 시정 권고. 가장 시급한 항은 **항목 3 (Supabase quote_requests 잔존 row 즉시 파기 의무)** 입니다.\n\n---\n\n### 1. 처리방침 개정 5회 — PIPA §30 변경 절차 적합 여부\n\n**판단: OK (시정 불요).**\n\n- 적용 법령: PIPA §30(2) (변경 시 알기 쉽게 공지) + 시행령 §31(3) (정보주체 권익에 중대한 영향이 있는 변경은 시행 30일 전 공지).\n- 본 개정의 성격: **수집 항목 삭제 / 처리목적 축소 / 제3자 제공 삭제 / 보유기간 행 삭제** — 즉 정보주체에게 **불리한 변경이 아닌 축소·제한** 변경.\n- 권익 침해 우려가 없는 \"유리한 변경\"은 30일 사전 공지 의무가 발동되지 않으며, 통상의 알기 쉬운 공지(7일 + 배너/푸터 운영)로 §30(2) 충족.\n- 현재 운영 상태(개정 게시 + `TermsNoticeBanner` ~05-17 + `TermsNoticeFooterLine` ~06-10 + 변경이력 항목 추가)는 충분.\n- **리스크 등급: 낮음.**\n- **도메인 렌즈: PIPA §30, 시행령 §31(3).**\n\n---\n\n### 2. 통신판매중개자 §20 (전자상거래법) 적용 여부\n\n**판단: 시정 권고 (소폭) — 적용 가능성을 보수적으로 가정하고 §20(1) 사전고지 유지 권고.**\n\n- 적용 법령: 전자상거래법 §20(1) (통신판매중개자는 자신이 거래 당사자가 아님을 미리 고지), §20(2)–(3) (책임 분담 고지).\n- 통신판매중개자 정의: \"사이버몰의 이용을 허락하거나 자신의 명의로 통신판매를 위한 **광고수단을 제공**하는 자\" (시행령 §21-2). 거래·견적 매개 기능을 폐지했더라도 업체 카드·검색 결과·인증 배지 노출이 \"광고수단 제공\"으로 해석될 여지 잔존.\n- 업체로부터 비용을 받지 않고 단순 디렉토리만 운영한다면 §20 적용 불요 가능. 그러나 **paid placement / 인증 배지 / 검색 우선순위 조작**이 향후 도입되면 즉시 §20 적용 트리거.\n- 결론적으로 §20 적용 여부는 회색지대이므로, **고지문 자체는 유지**하는 것이 안전(삭제하지 말 것).\n- 현 footer \"정보제공 디렉토리 — 거래·견적 의뢰 직접 중개하지 않음\" 문구는 양쪽 케이스 모두에서 무방. **OK.**\n\n**시정 권고 patch:**\n- `이용약관` 또는 `회사소개` 페이지에 다음 문구 명시 추가:\n  > \"Packlinx는 통신판매중개자가 아니며, 게시된 업체와 이용자 간 거래의 당사자가 아닙니다. 업체 정보의 정확성·거래 결과에 대한 책임은 해당 업체와 이용자에게 있습니다.\"\n- 또한 향후 paid placement / 광고 / 인증 사업화 시점에 **반드시 Legal 재자문** 트리거 — 그 시점부터는 §20 본격 적용.\n- **리스크 등급: 중간** (현재는 적용 모호, 사업 전환 시 즉시 상향).\n- **도메인 렌즈: 전자상거래법 §20, 시행령 §21-2.**\n\n---\n\n### 3. Supabase `quote_requests` 잔존 row 처리 ★ 가장 시급\n\n**판단: 시정 필요 — 즉시 파기. 1년 retention 만료 대기는 PIPA 위반.**\n\n- 적용 법령: **PIPA §21 (개인정보의 파기)**.\n  - §21(1): 개인정보가 **불필요하게 되었을 때에는 지체 없이 파기**해야 함. \"보유기간 경과 또는 처리목적 달성 등\"이 예시.\n  - §21(3): 파기 시 기록 의무 (방법·일자·담당자).\n  - 시행령 §16: 전자적 파일은 **복구·재생할 수 없는 방법**으로 영구 삭제.\n- 본 건의 처리목적은 \"견적 의뢰 전달\" — 기능 폐지로 **처리목적 달성/소멸**. 이 시점에서 retention 1년은 더 이상 적용 근거가 없음. 1년 만료 대기 = \"불필요하게 된 개인정보를 보유\" = §21(1) 위반.\n- **즉시 파기 권고**. 이는 destructive 조치이지만 **법적 의무 이행이므로 보드 승인 거부 사유가 될 수 없음**. 보드는 \"파기를 할지 말지\"가 아니라 \"파기 절차·기록 방식\"만 결정 권한을 가짐.\n\n**구체 patch 안:**\n\n```sql\n-- migration: drop_quote_requests_after_feature_retirement.sql\n-- Effective: 2026-05-10 (PIPA §21(1) 처리목적 달성에 따른 즉시 파기)\n\nBEGIN;\n-- 1) row 수 / 마지막 row 일자 기록 (파기 기록 의무 §21(3))\nSELECT COUNT(*) AS row_count, MIN(created_at), MAX(created_at) FROM quote_requests;\n-- 2) 영구 삭제\nDROP TABLE IF EXISTS quote_requests CASCADE;\nCOMMIT;\n```\n\n- **백업 (Supabase PITR / daily snapshot) 도 파기 대상**. Supabase 의 PITR 보유기간(통상 7~30일) 자동 만료를 신뢰할 수 있으나, 이 기간 동안에도 \"복구 불가능 상태로 격리\"되어야 함 → 운영 인력의 임의 복원 금지를 절차화.\n- **파기 기록**: 파기 일자(2026-05-XX), 파기 방법(DROP TABLE + 백업 자연 만료), 책임자(Backend Engineer 또는 CTO), row 수/마지막 row 일자 — 별도 문서/이슈에 보존(PIPA §21(3)).\n- **법적 시한**: \"지체 없이\"는 통상 **5일 이내** 처리가 안전. 본 건은 2026-05-10 기능 폐지 → **2026-05-15까지 파기 완료** 권장.\n- 만약 잔존 row 가 0건이라면 본 의무는 자연 충족(여전히 DROP TABLE 권고 — 향후 오용 방지).\n- **리스크 등급: 높음** (위반 시 PIPA §75 과태료 / 시정명령 대상).\n- **도메인 렌즈: PIPA §21, 시행령 §16.**\n\n→ **별도 child issue 즉시 생성 권고** (Backend Engineer 담당, 5일 내 완료, 보드 승인은 절차에 한정).\n\n---\n\n### 4. 개정 4회 → 5회 \"역방향\" 변경 (기능 도입 → 폐지) 변경이력 표기 적정성\n\n**판단: 시정 권고 — 단순 \"삭제됨\" 표기로는 부족, 사유·잔존 데이터 처리방안 명시 필요.**\n\n- 적용 법령: PIPA §30(2) \"알기 쉽게 알려야 함\", 그리고 표시광고법 §3(1) \"사실에 기초한 명확한 표시\" 정신.\n- 정보주체 입장에서 \"왜 항목이 사라졌는지\", \"기존에 제공한 내 정보는 어떻게 되는지\" 가 가장 중요한 질문이지만, 단순 \"삭제됨\" 표기로는 답이 안 됨.\n\n**시정 권고 patch — 변경이력 항목 문구안:**\n\n```markdown\n**개정 5회 (2026-05-10)** — 견적 의뢰 기능 폐지에 따른 처리방침 축소 개정\n\n- §2④ \"견적 의뢰 시 수집 항목\" 삭제: 견적 의뢰 기능을 폐지하여 더 이상 해당 항목을 수집하지 않습니다.\n- §3 7항 \"견적 전달 목적\" 삭제: 처리목적이 소멸되었습니다.\n- §4 `quote_requests` 보유기간 행 삭제: 보유 대상 데이터가 더 이상 발생하지 않습니다.\n- §5 \"견적 의뢰 제3자 제공\" 표 삭제: 더 이상 업체에 개인정보를 제공하지 않습니다.\n- **기존 수집된 견적 의뢰 데이터 처리:** PIPA §21(1) 처리목적 달성에 따라 2026-05-XX 일자로 전량 파기 완료. 파기 기록은 회사 내부 보관(정보주체 요청 시 §35 열람청구로 확인 가능).\n```\n\n- 핵심: ① 삭제 사유(기능 폐지) ② 잔존 데이터 처리 결과(파기 일자) ③ 정보주체 권리 행사 경로(§35) — 3요소 포함.\n- **리스크 등급: 중간** (현 상태로는 위반은 아니지만, 정보주체 민원·감독기관 점검 시 보완 요구 가능성).\n- **도메인 렌즈: PIPA §30(2), 표시광고법 §3.**\n\n---\n\n### 종합 권고 — Action Items\n\n| # | 항목 | 등급 | Owner | 시한 |\n|---|------|------|-------|------|\n| 1 | 개정 5회 §30 절차 | OK | — | — |\n| 2 | §20 사전고지 문구 이용약관 보강 + 향후 paid placement 시 재자문 트리거 | 시정 권고 | CMO/CEO (문구), Legal (트리거 룰) | 2주 |\n| 3 | `quote_requests` 즉시 파기 + 파기 기록 | **시정 필요 (높음)** | Backend Engineer / CTO | **2026-05-15** |\n| 4 | 변경이력 문구 보강 (사유·파기·권리행사) | 시정 권고 | CEO (처리방침 게시 책임자) | 항목 3 완료 후 즉시 |\n\n**다음 단계:** 본 코멘트 게시 후 PACAA-466 부모 이슈에 child issue 생성 권고:\n- (a) Backend Engineer 담당 — `quote_requests` 파기 + 파기 기록 (높은 우선순위)\n- (b) CEO/CMO 담당 — 처리방침 변경이력 문구 수정 + 이용약관 §20 고지문 보강\n\n본 자문은 항목 3·4 완료 후 **사후 재검증** 1회 더 필요(시정 완료 확인용).\n\n---\n⚠️ 자문 한계 명시:\n이 자문은 참고용이며 법적 책임 면제를 보장하지 않습니다.\n사고 발생 시 면책 사유로 사용될 수 없습니다. Packlinx 보드는\n외부 변호사 자문 미도입을 결정한 상태이며, 모든 법적 리스크는\nLegal Counsel 자문에 의존합니다.\n---\n"
