        body: "## [초안] Guide 2: `packaging-machinery-guide` — 패키징 기계 가이드\n\n> Legal 사전 자문([PACAA-453](/PACAA/issues/PACAA-453)) 권고 적용본. KCs/CE 분리 표기, \"인증 마크 보유 여부 확인\" 검증형 톤, 특정 제조사·모델 비교 부재.\n\n---\n\n### 슬롯 1 — TL;DR\n\n- **자동화 수준이 포장 라인 선택을 결정한다** — 반자동·전자동·완전자동 구분과 시간당 처리량(BPM/CPM)을 먼저 정의해야 과잉·과소 투자를 막을 수 있습니다.\n- **국내 도입 시 KCs 안전인증 대상 여부를 반드시 확인하라** — 「전기용품 및 생활용품 안전관리법」 상 KCs 인증 대상 기계는 인증 마크 없이 판매·사용이 불가합니다. 공급업체에 인증서 제출을 요청하는 것이 안전합니다.\n- **TCO(총 소유 비용)로 선택하라** — 초기 구매가뿐 아니라 부품 수급·유지보수 계약·소모품 단가를 포함한 5년 TCO 기준으로 비교해야 합니다.\n\n---\n\n### 슬롯 2 — Callouts\n\n> **[info]** 포장기계는 용도별로 카톤에렉터, 씰링기, 슈링크 포장기, 스트레치 포장기, 진공 포장기 등으로 세분됩니다. 처리 대상 제품의 형상·크기·중량을 먼저 정의해야 적합한 기종을 선택할 수 있습니다.\n\n> **[warn]** 국내에서 전기를 사용하는 포장기계를 도입하려면 KCs 안전인증 대상 품목인지 먼저 확인하세요. 인증 대상임에도 마크가 없는 제품을 사용하면 「전기용품 및 생활용품 안전관리법」 위반이 됩니다. 공급업체에 KCs 인증서를 요청하시기 바랍니다.\n\n> **[tip]** EU 시장에 수출하는 제품을 패키징한다면 CE 적합성 표시(Declaration of Conformity)가 필요할 수 있습니다. 국내 KCs와 EU CE는 별개 제도이므로 각각 별도로 확인이 필요합니다. 두 인증을 동일하게 취급하지 마세요.\n\n---\n\n### 슬롯 3 — Checklist\n\n- [ ] 처리 대상 제품 형상·크기·중량·시간당 처리량(BPM) 사전 정의\n- [ ] 국내 도입 기계의 KCs 안전인증 대상 여부 및 인증서 보유 여부 확인\n- [ ] 산업안전보건법령 상 안전기준 준수 여부 점검\n- [ ] 부품 수급 안정성·유지보수 계약·소모품 단가 포함 5년 TCO 산정\n- [ ] 설치 후 시운전·조작자 교육 포함 여부 계약서에 명시\n\n---\n\n### 슬롯 4 — FAQ\n\n**Q. KCs 인증이 없는 수입 포장기계를 사용할 수 있나요?**\nA. KCs 안전인증 대상 품목이라면 인증 없이 국내 판매·사용이 불가합니다. 해외 직수입 기계라도 동일 기준이 적용되므로, 공급업체에 KCs 인증서를 반드시 요청하세요.\n\n**Q. CE 인증 제품은 국내에서도 사용 가능한가요?**\nA. CE는 EU 시장 적합성 표시로, 국내 KCs와 별개 제도입니다. CE만 보유했다고 국내 KCs 요건을 충족하지 않으므로, 국내 도입 전 KCs 인증 여부를 별도로 확인해야 합니다.\n\n**Q. 반자동과 전자동 포장기 중 어떤 것이 유리한가요?**\nA. 월 처리량 기준으로 판단하세요. 소량 다품종이라면 반자동이 유연성이 높고, 대량 단품종은 전자동이 장기적으로 단가 절감에 유리합니다. 공급업체 무상 시뮬레이션을 활용하시기 바랍니다.\n\n**Q. 포장기계 유지보수는 어떻게 준비해야 하나요?**\nA. 공급업체 또는 공인 서비스센터와 유지보수 계약을 체결하는 것이 일반적입니다. 계약서에 부품 보증기간·응급 출동 SLA(서비스 수준)를 명시하면 운영 리스크를 줄일 수 있습니다.\n\n---\n\n### 슬롯 5 — Sidebar 관련\n\n- [포장재 소재 가이드](/guides/packaging-materials-guide)\n- [판지 포장 가이드](/guides/cardboard-packaging-guide)\n- [플라스틱 포장 가이드](/guides/plastic-packaging-guide)\n- [패키징 인쇄 공정 가이드](/guides/packaging-printing-guide)\n\n---\n\n### 슬롯 6 — End-CTA\n\n**title:** 포장기계 공급업체를 Packlinx에서 비교하세요\n**subtitle:** KCs 인증 보유 업체를 포함, 기계 유형·처리량별 공급업체를 한 곳에서 확인할 수 있습니다.\n**href:** `/vendors?category=packaging-machinery`\n"
