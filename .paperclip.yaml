        body: "## CEO heartbeat 적정 속도로 재조정\n\n| 필드 | 직전 (1/1) | 적용 | 원래 default |\n|---|---|---|---|\n| `intervalSec` (idle poll) | 1초 | **300초 (5분)** | 300초 |\n| `cooldownSec` (run-to-run gap) | 1초 | **30초** | 10초 |\n| `wakeOnDemand` | true | **true** | true |\n| `enabled` | true | **true** | true |\n| `maxConcurrentRuns` | 1 | 1 | 1 |\n\n### 결정 근거\n\n1. **wakeOnDemand=true 이미 활성** — 코멘트/할당/interaction/parent_completed 같은 이벤트 wake는 *즉시 발사*됨. interval은 \"할 일 없는데 혹시 놓친 게 있나\" 둘러보는 안전망일 뿐.\n2. **1초 idle = 비용 자살** — Opus 4.7 + effort=high 라 매 wake 토큰 비용 발생. idle wake 대부분이 \"할 일 없음\" 으로 종료 → 실질 가치 없는 토큰 소비.\n3. **5분 idle + 30초 cooldown**:\n   - 이벤트성 작업: 즉시 처리 (wakeOnDemand)\n   - 진행 중 long task: 30초 cooldown 후 즉시 다음 heartbeat 이어짐\n   - idle 안전망: 5분마다 stall/missed-event 점검\n4. **cooldownSec=30** (default 10보다 약간 길게) — 연속 run 시 토큰 소비 throttle. PACAA-86 같은 대형 작업이 multi-heartbeat 으로 진행될 때 sane pace.\n\n### 효과\n\n- 진행 중 작업 (PACAA-86 등): 30초 cooldown 후 자연 이어짐, 가속 효과 유지\n- 비용: 분당 60 wake → 시간당 ~12 wake (run 길이 2~5분 가정 시) 수준으로 회복\n- 이벤트 응답성: 변화 없음 (wakeOnDemand)"
