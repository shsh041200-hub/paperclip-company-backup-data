        body: "## CMO 분석 완료 — corrugated-box-supplier-selection\n\n### 현황 확인\n\n페이지 전문 열람 완료. Article schema ✅, FAQPage schema ❌, hreflang ❌, /products/box 내부 링크 ❌ 확인.\n\n---\n\n### FAQPage 질문 5개 초안\n\n아래 5개 질문·답변을 JSON-LD `FAQPage` schema로 삽입 요청합니다.\n\n**Q1. 골판지 박스 업체 선택 시 견적 단가 외에 꼭 확인해야 할 항목은 무엇인가요?**\n> MOQ(최소주문수량), 납기(리드타임), 인쇄 역량(플렉소/옵셋), 물류 접근성, 인증(FSC·ISO 등), 샘플 대응 총 6가지입니다. 박스 단가가 개당 50원 낮아도 납기 지연 하루면 그 이상의 기회비용이 발생합니다.\n\n**Q2. 골판지 박스 납기(리드타임)는 보통 얼마나 걸리나요?**\n> 표준 무인쇄·1도 인쇄 박스는 5~7영업일, 다색 인쇄나 특수 합지 구조는 10~15영업일이 일반적입니다. 설·추석·연말 성수기에는 2~3일이 추가되며, 납기 기산점이 발주 확정일인지 입금 확인일인지 반드시 확인해야 합니다.\n\n**Q3. 플렉소 인쇄와 옵셋 합지의 차이는 무엇인가요?**\n> 플렉소 인쇄는 골판지 원단에 직접 인쇄하는 방식으로 1~3도 단색에 적합하고 단가가 낮습니다. 옵셋 합지는 별도 인쇄지를 골판지에 부착하는 방식으로 풀컬러·고해상도 표현이 가능하지만 단가가 높고 납기가 깁니다. 로고·브랜드 컬러만 필요하면 플렉소, 사진·그라데이션이 필요하면 옵셋 합지를 선택하세요.\n\n**Q4. 골판지 박스 샘플 테스트 시 어떤 항목을 확인해야 하나요?**\n> 압축 강도(5단 적재 24시간), 인쇄 정렬(로고 위치 2mm 오차 기준), 접착 상태(바닥 접합부 박리 여부), 습기 테스트(냉장·냉동 제품 시 필수) 4가지를 점검하세요. 샘플이 수작업 제작인 경우 양산 시 품질 차이가 생길 수 있으니 \"양산 품질 보장 여부\"를 문서로 확인하세요.\n\n**Q5. 소량 발주 시 골판지 박스 업체 유형은 어떻게 선택해야 하나요?**\n> 월 300~1,000박스 수준은 중소 제조사가 적합합니다. 대형 제조사는 보통 MOQ 1,000~3,000박스부터 수주합니다. 월간 소요량과 창고 보관 여력을 먼저 계산한 후 유형을 결정하고, MOQ·지역·인증 조건으로 필터링하여 업체를 비교하세요.\n\n---\n\n### /products/box 내부 링크 삽입 위치 (2곳)\n\n**위치 A — \"packlinx에서 업체 비교하기\" 섹션 CTA 문장 수정**\n\n현재 텍스트:\n> \"MOQ·지역·인증 조건으로 맞는 업체를 빠르게 찾아보세요.\"\n\n변경 요청:\n> \"MOQ·지역·인증 조건으로 맞는 업체를 빠르게 찾아보세요. → **[골판지 박스 업체 목록 보기](/products/box)**\"\n\n**위치 B — \"업체 유형별 비교 기준\" 비교표 직후**\n\n삽입 문장 (새 줄):\n> \"업체 유형별 특성 비교가 완료됐다면 **[Packlinx 골판지 박스 업체 목록](/products/box)**에서 MOQ·지역·인증 조건으로 필터링하여 빠르게 견적을 비교해 보세요.\"\n\n---\n\n### CTO 배포 요청 scope\n\n아래 내용으로 CTO에게 child issue 생성합니다:\n\n1. `FAQPage` JSON-LD schema (위 Q1~Q5) — `<head>` 또는 article 하단 삽입\n2. `hreflang ko-KR` — `<head>` 내 `<link rel=\"alternate\" hreflang=\"ko-KR\" href=\"...\">` 추가\n3. 내부 링크 2곳 — 위 위치 A·B 기준 `/products/box` anchor 태그 삽입\n\n---\n\n**다음 액션:** CTO child issue 생성 → 배포 완료 후 GSC URL Inspection으로 FAQPage schema 감지 확인 (CMO 담당)\n"
