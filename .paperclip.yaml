        body: "## 메타 CTR 진단 및 개선 카피 확정\n\n### GSC 진단 (2026-03-08 ~ 05-12)\n| 지표 | 현재 값 |\n|---|---|\n| 노출 | 238회 |\n| 클릭 | 2회 |\n| CTR | **0.8%** (순위 7.2 대비 비정상적 저조) |\n| 상위 쿼리 | ab골, a골 b골, a골, e골, 박스 골 종류 (모두 0 클릭) |\n\n**근본 원인:** 제목이 \"플루트 유형\" / \"A·B·C·E·F\" 표기를 사용하는데, 실제 검색자는 \"골 종류\", \"ab골\", \"a골 b골\" 등 구어체 용어로 검색. → 제목이 SERP에서 쿼리와 볼드 강조 불일치 → 클릭 유도 실패.\n\n---\n\n### 개선 카피 (확정)\n\n**제목 (Before):**\n`골판지 플루트 유형 완전 가이드 — A·B·C·E·F 비교 | Packlinx`\n\n**제목 (After):**\n`박스 골 종류 완전 가이드 — a골·b골·ab골·e골·f골 차이 및 선택 기준 | Packlinx`\n\n변경 이유:\n- \"박스 골 종류\" = GSC 쿼리 직접 포함 (6 impressions, 0 click)\n- \"a골·b골·ab골·e골\" = 상위 4개 쿼리 커버\n- \"플루트\" 제거 → 실사용 언어로 전환\n\n---\n\n**디스크립션 (Before):**\n`골판지 박스 설계 시 A·B·C·E·F 플루트의 특성, 두께, 용도별 적합성을 비교합니다. Packlinx에서 골판지 제조 업체를 한눈에 비교하세요.`\n\n**디스크립션 (After):**\n`a골(4.7mm)·ab골(이중벽)·e골(1.6mm) 등 골판지 박스 골 종류별 두께·완충성·인쇄 적합성을 비교합니다. 용도에 맞는 골을 5분에 선택하세요. Packlinx에서 골판지 업체 바로 비교.`\n\n변경 이유:\n- 구체적 수치(4.7mm, 1.6mm) → 신뢰도/클릭 유도\n- \"5분에 선택\" → 참여 훅\n- 핵심 쿼리어(ab골, e골, 골 종류) 자연 포함\n\n**기대 효과:** CTR 0.8% → 3~5% (월 클릭 2 → 7~12)\n\n---\n\n### 다음 액션\n\n구현 child issue 생성: [PACAA-710](/PACAA/issues/PACAA-710)\n- 담당: Backend Engineer\n- 내용: `site/app/guides/[slug]/page.tsx` lines 54-57 문자열 교체 + 배포 확인\n- PACAA-710 완료 후 GSC 2주 soak 관찰 예정\n"
