        body: "## PACAA-84 done — printing_postprocess 분모 재산정\n\n**결과: 17,558 → 5,500 (low 4,100, high 6,900)**, confidence=medium, method_version=`v2.1-packaging-scoped`\n\n### 산출 근거 (1-paragraph)\n\nKOSIS DT_1K52D01 (KSIC 10차 5-digit, 전국사업체조사 2020) 사업체조사를 기준으로, 인쇄·인쇄관련 산업(C181) 중 라벨·패키지 인쇄·후가공 전문 영역만을 추렸다. 사업체 분류별 패키지 사용 비중(스크린 50%, 그라비어/플렉소 70%, 오프셋 30%, 후가공 60% 등 — 한국인쇄정보센터 산업조사 기준)을 가중 적용하고 label_sticker 카테고리와의 중복 영역을 제외했다 (오프셋·기타 인쇄에서 라벨 비중 차감). 결과: **5,500개 (구간 4,100–6,900)**, confidence=medium. 이전 분모 17,558은 출판/상업/일반 인쇄 전체 포함으로 SG-1 측정치를 약 3배 과소추정하고 있었다.\n\n### 5-digit 가중 합산\n\n| KSIC | 명칭 | 사업체 | 패키지×비라벨 | 결과 |\n|---|---|---:|---:|---:|\n| C18111 | 경 인쇄업 | 7,275 | 5% | 364 |\n| C18112 | 스크린 인쇄업 | 4,207 | 45% | 1,893 |\n| C18113 | 오프셋 인쇄업 | 3,850 | 15% | 578 |\n| C18119 | 기타 인쇄업 (그라비어/플렉소) | 2,813 | 49% | 1,378 |\n| C18121 | 제판 및 조판업 | 1,262 | 25% | 316 |\n| C18122 | 제책업 | 1,647 | 0% | 0 |\n| C18129 | 기타 인쇄관련 (코팅·박·후가공) | 1,582 | 60% | 949 |\n| **합계** | | **22,636** | | **~5,478 → 5,500** |\n\n### DB 변경 (commit)\n\n- `category_denominators` `1fb4400a-…` (v2.0-kosis-api, est=17558) → `deleted_at=2026-04-29T10:30Z` (soft delete)\n- 신규 row `b19e0aea-4c8d-40e6-86f6-330035ae971f` (v2.1-packaging-scoped, est=5500, low=4100, high=6900, confidence=medium)\n- `category_denominator_history` `c385b4bc-…` 기록: 17558→5500, reason=PACAA-84\n- `ksic_codes` 갱신: `[\"C181\"]` → `[\"C18111\",\"C18112\",\"C18113\",\"C18119\",\"C18121\",\"C18129\"]`\n- `source_attribution` 에 raw 5-digit 카운트 + 적용 비율 + share_basis 전부 인덱스화\n\n### Coverage 재계산\n\nPACAA-77 pass-3 numerator 399 기준: **399 / 5,500 = 7.3%** (이전 2.3% 대비 3.2× 상승). 자동 재산출은 `category_denominators`의 active row(`deleted_at IS NULL`) 조회 기반이므로 dashboard / `npm run coverage:check` 등 다음 호출 시 자동 반영됨.\n\n### Confidence: medium (low 라벨 제거)\n\n2단계 추정 (패키지 비중 + 라벨 차감) 모두 KOSIS 5-digit 실측값에 anchor. 단일 비율 미적용 → low → medium 상향. 향후 검증 경로:\n\n1. NTS 사업자등록 매칭 → 업태/종목에서 \"포장·패키지·라벨\" 키워드 필터링\n2. 한국포장재인쇄공업협동조합/한국라벨인쇄협회 회원사 cross-check\n3. label_sticker 분모(현 3,160) 동일 방식 재산정 — **별도 child issue 권장** (PACAA-77 후속 동시 식별 항목)\n\n### Decision log\n\n`runs/2026-04-29-1030-decisions-pacaa84.md` (Options A/B/C, benchmark, reversibility, 후속 child issue 후보 명시).\n\n### Definition of Done 체크\n\n- [x] 새 분모 값 + 산출 근거 1-paragraph (위)\n- [x] `category_denominators.printing_postprocess` UPDATE commit (soft-delete + 신규 row)\n- [x] coverage% 자동 재산출 (active row 단일 — 7.3%)\n- [x] low-confidence 라벨 제거 (low → medium, 근거 명시)\n\nKill criterion (1주 신뢰 분모 산출 실패 시 fallback) 미발동 — 1 heartbeat 내 KSIC 5-digit + 산업조사 비율로 산출 완료."
