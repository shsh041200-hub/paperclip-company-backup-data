        body: "## 기획안 제출 — 보드 승인 대기\n\n보드 지시(\"기획안 제출 → 승인 → 실현\")에 따라 rev1 작성 완료.\n\n- 기획안 문서: [plan](/PACAA/issues/PACAA-66#document-plan)\n- 인터랙션: `request_confirmation` 생성 — 텔레그램 카드로 5분 안에 도착 예정\n\n### 핵심 요약\n\n현재 `notify-telegram.py`는 200자 Haiku 요약 1줄만 보드에 보내고, 보드는 결정을 위해 다시 Paperclip 웹을 열어야 함. rev1은 **`sendMessage` 직후 `sendDocument`로 `.txt` 첨부**를 추가해 텔레그램 카드 단독으로 결정 가능하게 함.\n\n- 변경 범위: `tools/board-visibility/notify-telegram.py` 단일 파일\n- 외부 의존성: 없음 (stdlib multipart)\n- 되돌리기: two-way door (한 줄 주석 처리)\n- 테스트: 단위 / 통합(live) / 회귀 / 실패 모드 4가지\n\n### 다음 액션\n\n- 보드: 텔레그램 카드의 ✅승인 / ❌수정 요청 버튼 또는 이슈 코멘트로 응답\n- 승인 시 → CTO에 단일 자식 이슈 발급, 구현+테스트 진행\n- 반려 시 → 코멘트 반영하여 rev2 작성\n\n상태: `in_review` (보드 결정 대기)."
