        body: "## PACAA-530 LC 자문 결과 — 채널 결정 확정 + 최종 카피\n\n[PACAA-530](/PACAA/issues/PACAA-530) Legal Counsel 응답 수신 (2026-05-11).\n\n### LC 핵심 결론\n\n**공개 vendor profile page 박탈 배너 단독 이행 = 조건부 적합** (리스크: 낮음).\n추가 채널(이메일·문의폼·WHOIS) 법령상 불요구. 정보통신망법 §50(광고성 정보 사전동의) **본 통지에 미적용** 확인.\n\nLC 필수 조건 5가지:\n1. 배너 위치: 박탈 전 `is_verified` 배지가 노출되던 **동일 vendor profile 페이지 상단** (prominence 필수; 푸터·접힘 영역 불가)\n2. 배너 본문: §5-B 3요건 전부 포함 — 박탈 사실 + 사유 + 90일 grace + 복구 채널\n3. 모든 검증 표시 동시 제거 (PACAA-515 완료 ✓)\n4. Server-log: 게시 시각·유지기간·page rendering 기록 보관\n5. 한국어 자연어 (법령 인용 최소)\n\n---\n\n### 최종 배너 카피 (LC 조건 반영)\n\n> **[공지] is_verified 배지 상태 변경 안내**\n>\n> 귀사 프로필의 인증 배지가 2026년 5월 11일부로 비표시 처리되었습니다.\n> 사유: 2026-Q2 감사 결과 §1 검증 기준 evidence(사업자등록번호·도메인·이메일·전화·양방향 연락처) 미확인.\n> 기준 전문 → https://packlinx.com/docs/legal/vendor-verification-criteria\n> 보완 기간: **2026-05-11 ~ 2026-08-09 (90일)** 내 evidence 제출 시 배지 복구 절차 진행.\n> 제출: verify@packlinx.com | 문의: contact@packlinx.com\n\n(줄 수: 5줄 — 스크롤 없이, §5-B 3요건 모두 포함, LC 비방표현 회피 ✓, 단정 표현 없음 ✓)\n\n**배너 게시 위치**: 각 vendor public profile 페이지 (`/vendor/{slug}`) 상단 — 로그인 불요.\n**유지 기간**: 2026-08-09 (grace 만료일)까지 상시 게시. 이후 Phase C child 에서 결정.\n\n---\n\n### 구현 scope (승인 후 별도 child 발의 예정)\n\n- 대상: `is_verified=false AND verification_revoked_reason='audit_2026Q2_evidence_missing'` 인 모든 `/vendor/{slug}` 페이지\n- FE: 조건부 배너 컴포넌트 추가 (상단 고정)\n- BE: server-log 기록 (배너 최초 렌더링 시각 per vendor)\n\n---\n\n## [보드 사인오프 요청]\n\nLC 자문 완료, 카피·채널·배너 조건 확정. 발사 전 보드 최종 승인 요청.\n\n**승인 내용:**\n- 채널: 공개 vendor profile 페이지 배너 (이메일 대체)\n- 카피: 위 최종 배너 텍스트\n- 타이밍: 승인 후 FE child 발의 → 구현 → 즉시 게시\n\n**미승인 시:** 발사 보류 유지.\n\n— CMO"
