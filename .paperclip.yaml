        body: "## ✅ PACAA-125 사인오프 완료 — v2 cron 전환 + 답장 라우팅 활성\n\n### 한 줄 결론\n\n**보드 사인오프 받음 (\"승인\"). v2 cron 전환 완료, v1 deprecated, 답장 라우팅 활성, 메모리 영구화. 다음 결재/액션/선택/자유 입력 알림부터 v2 자동 적용.**\n\n### 실행한 마이그레이션\n\n1. **`notify-telegram.py`**:\n   - `_build_for_interaction` 을 v2 빌더로 전환 — KIND_APPROVAL/KIND_CHOICE/KIND_FREEFORM/KIND_ACTION 모두 v2.\n   - `_build_for_approval` (레거시 approvals API 경로) 도 v2 전환.\n   - `_classify_interaction` 수정: `ask_user_questions` (no options) → `KIND_FREEFORM` (이전엔 KIND_ACTION 으로 잘못 분류).\n   - 자가검수 `assert_telegram_safe_v2` 로 전환 — cron 산출물 자동 검증, 위반 시 발사 거부.\n   - 메시지 매핑 (message_index) 본문 + 첨부 + plan 첨부 모두 등록.\n\n2. **`_telegram_format.py`**:\n   - v1 빌더 (`build_action_body`/`build_approval_body`/`build_choice_body`) 에 `DEPRECATED` 주석 추가, 1주 후 제거 검토 (2026-05-07).\n   - review-bundle (KIND_NON_ACTIONABLE) 만 v1 유지 — board v2 scope 외.\n\n3. **`bot-server.py`** (직전 heartbeat 패치):\n   - `handle_reply` 활성, 답장 → 코멘트 라우팅 + ack.\n\n4. **메모리 영구화**: `feedback_board_notification_v2.md` — v2 표준·빌더·자가검수·컨트랙트 일치·답장 라우팅 룰 모두 명시. 향후 모든 에이전트가 결재 작성 시 참조.\n\n### 검증\n\n- 합성 인터랙션 (PACAA-117 예시) 으로 v2 cron 출력 dry-run: 5섹션 + 호명 + 답장 footer + 자가검수 PASS.\n- 회사 전체 pending 인터랙션 = 0건 — 마이그레이션 시 in-flight 알림 없음, regression 위험 0.\n\n### 에이전트 사용 가이드 (요약)\n\n결재/선택/자유 입력 인터랙션 작성 시 `payload` 에 풍부한 필드를 넣으면 v2 빌더가 그대로 사용:\n- `prompt` (필수): 무엇이 일어났나\n- `whyMatters` (선택): 왜 중요한가 — 없으면 issue.description 일부 사용\n- `ifApprovedSteps` (KIND_APPROVAL, 선택): 승인 시 단계 목록\n- `options`, `recommendedIndex`, `recommendationRationale` (KIND_CHOICE)\n- `answerFormat`, `answerDimensions` (KIND_FREEFORM)\n\n누락 시 cron 이 prompt/title/description 으로 shim 하지만 품질 낮아짐. 메모리 룰에 명시.\n\n### 측정 (4주 후 retro)\n\n- 다음 결재 알림 PACAA-117 같은 jargon 형식이면 실패 → 룰 강화.\n- 보드 답장률 관찰 — 코멘트백 footer 활용도.\n- v1 빌더 호출 0건 확인 후 2026-05-07 정식 제거.\n\n### 자료\n\n- v2 표준: `runs/board_report_format_v2.md`.\n- 빌더: `tools/board-visibility/_telegram_format.py` v2 섹션.\n- 메모리: `memory/feedback_board_notification_v2.md`.\n- 사인오프 코멘트: `afa3d697` (2026-04-30 14:40 KST).\n\n이슈 done 처리합니다."
