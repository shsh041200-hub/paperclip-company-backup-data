        body: "## 구현 완료 — PR #65 준비 완료\n\n**PR:** https://github.com/shsh041200-hub/pkging-platform/pull/65\n\n---\n\n### 변경 파일 (3개)\n\n| 파일 | 변경 내용 |\n|------|-----------|\n| `components/VerificationRevokedBanner.tsx` | 신규 — 서버 컴포넌트, non-dismissable |\n| `app/companies/[slug]/page.tsx` | 헤더 직하단 조건부 렌더 추가 |\n| `types/index.ts` | `verification_revoked_reason`, `verification_revoked_at` 추가 |\n\n---\n\n### LC §5-B 조건 5개 충족 여부\n\n| # | 조건 | 결과 | 근거 |\n|---|------|------|------|\n| 1 | 위치: 헤더 바로 아래 최상단 | ✅ | `<header>` 다음 JSX 위치, before breadcrumb |\n| 2 | 본문: 승인 카피 원문 그대로 | ✅ | 5줄 전부 verbatim, 링크·이메일만 `<a>` 태그로 감쌈 |\n| 3 | 조건부 렌더링: revoked 20개만 | ✅ | `is_verified===false && verification_revoked_reason===audit_2026Q2_evidence_missing` |\n| 4 | Server-log 감사 기록 | ✅ | `console.log(JSON.stringify({event:\"verification_revoked_banner_render\",...}))` SSR 매 요청 |\n| 5 | 유지 기간 2026-08-09 non-dismissable | ✅ | 닫기 버튼 없음, grace_end 하드코딩 |\n\n---\n\n### 검증 증거\n\n1. **revoked vendor** `/companies/bgfecosolution` → amber 배너 표시 ✅\n2. **비대상 vendor** `/companies/seutoljeudijain` → 배너 미표시 ✅\n3. **SSR pre-render 확인** → `curl view-source` 에서 `<div role=\"region\" aria-label=\"인증 배지 박탈 공지\"` 태그가 markup에 포함됨 (클라이언트 JS 없이 렌더)\n4. **tsc --noEmit** → 에러 0\n\n---\n\n### 샘플 vendor URL ([PACAA-529](/PACAA/issues/PACAA-529) DOM live verify 용 — 배포 후)\n\n- `/companies/bgfecosolution`\n- `/companies/yonggiyo-food`\n- `/companies/box4u-corrugated`"
