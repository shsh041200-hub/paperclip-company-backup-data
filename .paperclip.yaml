        body: "## v3 갱신 — 보강 1/3/4 반영 + 보강 2는 별도 child 이슈\n\n보드 v2 검토 댓글 반영해서 plan v3 revision 올렸어.\n\n→ [PACAA-25 plan v3](/PACAA/issues/PACAA-25#document-plan)\n\n### v3 주요 변경\n\n| 항목 | v2 | v3 |\n|---|---|---|\n| TG WUV 6개월 임계값 | 단일 5,000 | **이중: minimum 4,000 / stretch 5,000** (보강 1) |\n| 채용 시퀀싱 | 4명 동시 (Backend, CMO, FE, Designer) | **페어 1: Backend Eng 단독 → 2~3주 후 페어 2: CMO + FE 동시 → Designer 조건부** (보강 3) |\n| Backend/FE 모델 | 미명시 | Sonnet 4.6 (보드 확정) |\n| CMO 모델 | 미명시 | 별도 추천 (Sonnet 권장, 카피 품질 따라 보드 추가 결정) |\n| SG-2 P2.5 | 즉시 진행 | **CMO 채용 후 키워드 50개 보드 게이트 통과 시점에만 시작** (보강 4) |\n| SG-4 paid-intent | 5건 임계 | 5건 + \"비즈니스 모델 검증이 아닌 약한 신호\" 주석 P3.5 routine에 박힘 |\n\n### 보강 2 — 카테고리 후보 리스트 child 이슈 생성\n\n→ [PACAA-26 한국 패키징 카테고리 8개 후보 리스트](/PACAA/issues/PACAA-26)\n\n`§8 #4` 사전 결정 게이트로 별도 child 이슈로 제출. CEO 자체 수행\n(CMO/Backend Eng 미채용 상태이며 카테고리 선정은 전략적 판단이 핵심).\n\n이 이슈의 산출물 (한국 카테고리 통상 분류 / 8 후보 + 사업체 수 + 월간\n검색량 / 동시 vs 순차 권장 / 4개 축소 우선순위) → 별도 보드 사인오프\n→ PACAA-25 plan v3 사인오프와 함께 트리 등록 게이트.\n\n### §8 보드 결정 항목 상태 (v3)\n\n| # | 항목 | 상태 |\n|---|---|---|\n| 1 | DAU/SEO 위계 | ✅ resolved (v2) |\n| 2 | TG WUV 6개월 | ✅ resolved (v3 보드: minimum 4,000 / stretch 5,000) |\n| 3 | \"실 방문자\" 정의 | ✅ resolved |\n| 4 | 카테고리 8개 | ⏳ PACAA-26 사인오프 대기 |\n| 5 | paid-intent 5건 + 주석 | ✅ resolved |\n| 6 | edit 20건 | ✅ resolved |\n| 7 | self-reg 30건 | ✅ resolved |\n| 8 | Kill 강도 중간 | ✅ resolved |\n| 9 | Plausible | ✅ resolved |\n\n`#4` 외 모두 resolved. **PACAA-25 plan v3 + PACAA-26 둘 다 사인오프 시\n트리 일괄 등록 + Backend Eng 채용 + SG-3 즉시 킥오프.**\n\n### 진행 순서 (사인오프 후)\n\n1. SG-3 킥오프 (CTO, 페어 1 채용 대기 불필요)\n2. Backend Eng 채용 (페어 1) → SG-1 P1.1~1.4\n3. 2~3주 후 CMO + Frontend Eng 동시 채용 (페어 2)\n4. CMO가 키워드 50개 후보 리스트를 별도 child 이슈로 제출 → 승인 후 P2.5\n5. P4.1 진입 시 Designer 채용 재판단\n\n### 다음 단계\n\n이어서 v3 revision에 바인딩한 새 `request_confirmation` 올림. PACAA-26\n도 별도 사인오프 필요 — 본 issue checkout 후 산출물 작성해서 v1 plan\nposting + request_confirmation 진행할 예정.\n"
