tasks:
  pacaa-1:
    comments:
      -
        authorAgentSlug: "ceo"
        authorType: "agent"
        body: "## 프로젝트 조사 결과 — packlinx website\n\n### 개요\n- **프로젝트명**: packlinx website (`packlinx-website`)\n- **레포**: [pkging-platform](https://github.com/shsh041200-hub/pkging-platform.git)\n- **상태**: planned (active 개발)\n- **현재 기본 브랜치**: `main` (HEAD `bfac38d`)\n- **활성 브랜치**: `feat/checkpoint-auto-resume`, `feat/premium-b2b-design`, `v0/shsh041200-7631-*` 등\n\n### 기술 스택\n- **프레임워크**: Next.js `16.2.4` + React `19.2.4` (App Router)\n- **언어/스타일**: TypeScript 5, Tailwind CSS 4\n- **DB/Auth**: Supabase (`@supabase/ssr`, `@supabase/supabase-js`)\n- **데이터/UI**: TanStack Query, Recharts, remark/remark-gfm\n- **AI**: `@anthropic-ai/sdk@0.91.0`\n- **배포**: Vercel (Analytics + Speed Insights 연결)\n\n### 도메인\n- B2B 패키징 공급자 디렉터리 (`packlinx.com`). 한국어 시장.\n- 주요 영역(`src/app/`):\n  - `companies/` 업체 상세\n  - `categories/` 카테고리 디렉터리\n  - `use-cases/` 용도별 진입\n  - `guides/` 가이드/콘텐츠\n  - `admin/` 관리 콘솔\n  - `api/{admin,companies,events,opt-out-request,use-case-tags}/` API\n  - `opt-out/`, `privacy/`, `terms/` 법무 페이지\n- DB 마이그레이션 38건 (`supabase/migrations/001…038`) — 초기 스키마부터 카테고리 재구조화, 인증 배지, 운영 옵트아웃, 사용처 태그, 한국어 검색 개선까지.\n\n### 운영/거버넌스 상태\n- **DESIGN.md (KOR-434/436, 2026-04-24)**: V03 로고 기반 디자인 시스템 확정. 브랜드 단일 유채색 = LINX 오렌지 (`brand-700 #C2410C` CTA). 레거시 `#005EFF` 블루 팔레트 폐기.\n- **SOP_TAKEDOWN.md**: 정보통신망법 제44조의2 임시조치 SOP. CEO 단독 저자. 신고 채널 `rpdla041200@gmail.com` + `/opt-out`. 관련 티켓 KOR-529/530/534.\n- **AGENTS.md**: Next.js 16 신규 API 주의 + Supabase 마이그레이션 작성 즉시 `node scripts/db-migrate.mjs` 적용 의무.\n- **future-plans/**: `2026-04-25-advanced-product-search.md`, `2026-04-25-category-filter-redesign.md` (제품검색/카테고리 필터 차기 안건).\n\n### CEO 관점 관찰\n- **활성 개발 중**: 최근(2026-04) 디자인 시스템 전면 교체와 검색/필터 리디자인 안건이 동시 진행. 머지 충돌 위험 — 머지 순서/소유자 정렬 필요.\n- **법적 SLA**: 정보통신망법 임시조치 미이행 시 형사 처벌 가능. SOP는 있으나 실제 처리 채널은 단일 Gmail — 운영 이중화 검토 권장.\n- **DB 스키마 활동**: 38개 마이그레이션, 한국어 검색·자동분류·B2B 디렉터리 진화. 데이터 품질·전환(`019_data_quality_conversion`) 모니터링 필요.\n- **기술 리스크**: Next.js 16 + React 19 = 매우 신버전. AGENTS.md 경고대로 학습데이터 의존 금지. 에이전트 작업 시 `node_modules/next/dist/docs/` 우선 참조.\n\n### 결론\n정상 가동 중인 한국 B2B 패키징 공급자 디렉터리. 디자인 시스템 v2 전환 + 검색/필터 리디자인이 현재 가장 큰 진행 축. 법적 SLA(임시조치)와 DB 마이그레이션 직접 적용 규칙이 운영 리스크 핵심.\n"
        createdAt: "2026-04-27T05:01:54.101Z"
      -
        authorType: "user"
        body: "로컬 호스팅에서 사이트 오픈해봐"
        createdAt: "2026-04-27T05:03:41.124Z"
      -
        authorAgentSlug: "ceo"
        authorType: "agent"
        body: "## 로컬 호스팅 확인 완료 ✅\n\n### 결과\n- **Next.js 16.2.4 (Turbopack) dev 서버 가동 성공** — `Ready in 464ms`\n- **URL**: `http://localhost:3000`\n\n### 페이지 응답\n| 경로 | 상태 | 비고 |\n|------|------|------|\n| `/` | **200** (37,547 bytes) | `<title>전국 패키징 업체 찾기 — B2B 포장재 플랫폼 \\| Packlinx</title>` 렌더링 OK |\n| `/opt-out` | **200** | `정보 삭제·수정·권리침해 신고 — Packlinx` |\n| `/categories` | 404 | 인덱스 미정의 — 슬러그 필요 (`/categories/[slug]`) |\n\n### 셋업 메모\n- 레포: `/tmp/pacaa/pkging-platform` (managed 워크스페이스 폴더가 비어 있어 GitHub에서 직접 shallow clone)\n- `npm install` 503 패키지 / 27초\n- `.env.local` 임시값 주입:\n  - `NEXT_PUBLIC_SITE_URL=http://localhost:3000`\n  - `NEXT_PUBLIC_SUPABASE_URL` / `ANON_KEY` / `SERVICE_ROLE_KEY` = placeholder\n\n### 관찰된 이슈\n1. **첫 요청 ~20초 지연**: placeholder Supabase URL 때문에 SSR 데이터 로드가 타임아웃 후 빈 결과로 폴백. 실제 Supabase 자격증명 연결 시 정상화 예상.\n2. **Next.js 경고**: `\"middleware\" file convention is deprecated. Please use \"proxy\" instead.` — Next.js 16 신규 컨벤션. 후속 마이그레이션 필요 (별도 티켓 권장).\n3. **managed 워크스페이스 미동기화**: `/home/rlatjsgur/.paperclip/instances/default/projects/{company}/{project}/pkging-platform` 디렉터리가 존재하지 않음 — Paperclip 프로젝트 워크스페이스 자동 체크아웃이 아직 트리거되지 않은 듯.\n\n### 다음 액션 후보\n- 진짜 Supabase 자격증명을 board에 요청하여 `.env.local` 채우기\n- managed 워크스페이스 동기화 트리거 또는 수동 clone 위치 확정\n- Next.js 16 `proxy.ts` 마이그레이션 티켓 분리\n\n서버는 heartbeat 종료 직전 정리(stop)했음. 영속 호스팅이 필요하면 별도 운영 결정 요청.\n"
        createdAt: "2026-04-27T05:06:19.459Z"
      -
        authorType: "user"
        body: ".env.local 정확히 어떻게 채우면 되는지 말만해줘"
        createdAt: "2026-04-27T05:08:22.877Z"
      -
        authorAgentSlug: "ceo"
        authorType: "agent"
        body: "## `.env.local` 채우는 법 (말로만)\n\n### 1. 필수 (사이트가 데이터 보여주려면 반드시 필요)\n\n| 키 | 값 | 어디서 가져오나 |\n|---|---|---|\n| `NEXT_PUBLIC_SUPABASE_URL` | `https://jnrciibwtutzymkoepfp.supabase.co` | Supabase 대시보드 → 해당 프로젝트(`jnrciibwtutzymkoepfp`, `scripts/db-migrate.mjs`에 하드코딩) → Settings → API → \"Project URL\" |\n| `NEXT_PUBLIC_SUPABASE_ANON_KEY` | `eyJhbGciOi...` (긴 JWT) | 같은 화면 → \"Project API keys\" → `anon` `public` |\n| `SUPABASE_SERVICE_ROLE_KEY` | `eyJhbGciOi...` (긴 JWT) | 같은 화면 → \"Project API keys\" → `service_role` `secret` (절대 클라이언트로 노출 금지) |\n\n> 위 3개가 없으면 SSR이 placeholder URL로 가서 첫 요청 ~20초 타임아웃 후 빈 결과로 폴백됨.\n\n### 2. 권장 (로컬 동작 정상화)\n\n| 키 | 값 | 용도 |\n|---|---|---|\n| `NEXT_PUBLIC_SITE_URL` | `http://localhost:3000` | 메타 태그, sitemap, robots, admin fetch 베이스 URL. 안 넣으면 `https://packlinx.com` 폴백 → 로컬에서 admin fetch가 프로덕션을 때림 |\n\n### 3. DB 마이그레이션 돌릴 때만\n\n| 키 | 값 | 용도 |\n|---|---|---|\n| `SUPABASE_ACCESS_TOKEN` | `sbp_...` | `node scripts/db-migrate.mjs` 실행에 필수 (AGENTS.md 규칙). Supabase 대시보드 우상단 계정 아바타 → Account → \"Access Tokens\"에서 발급 |\n| `SUPABASE_PROJECT_REF` | (생략 가능) | 기본값 `jnrciibwtutzymkoepfp` 하드코딩됨. 다른 프로젝트 쓸 때만 override |\n\n### 4. 선택 (특정 기능 켤 때만)\n\n| 키 | 값 | 용도 |\n|---|---|---|\n| `ANTHROPIC_API_KEY` | `sk-ant-...` | `src/lib/crawler/ai-classifier.ts`(`new Anthropic()`) + `scripts/enrich-companies.py`. 크롤러/분류 안 돌리면 불필요 |\n| `AI_CLASSIFY_DAILY_LIMIT` | 숫자 (기본 `100`) | 일일 AI 분류 호출 한도 |\n| `NEXT_PUBLIC_ENABLE_LOGO_PREVIEW` | `true` | `/admin/logo-preview` 페이지 게이트 해제 |\n\n### 최종 `.env.local` 템플릿\n```env\n# 필수 — Supabase 대시보드에서 복사\nNEXT_PUBLIC_SUPABASE_URL=https://jnrciibwtutzymkoepfp.supabase.co\nNEXT_PUBLIC_SUPABASE_ANON_KEY=<dashboard에서 anon public key>\nSUPABASE_SERVICE_ROLE_KEY=<dashboard에서 service_role secret key>\n\n# 권장\nNEXT_PUBLIC_SITE_URL=http://localhost:3000\n\n# 마이그레이션 적용 시 필요\nSUPABASE_ACCESS_TOKEN=<Supabase Account → Access Tokens>\n\n# 선택\n# ANTHROPIC_API_KEY=\n# NEXT_PUBLIC_ENABLE_LOGO_PREVIEW=true\n```\n\n### 핵심 한 줄 요약\n**Supabase 대시보드 → 프로젝트 `jnrciibwtutzymkoepfp` → Settings → API**에서 `Project URL` + `anon public` + `service_role secret` 3개 복사해서 위 템플릿의 빈 값에 붙여넣으면 끝. `SITE_URL`만 `http://localhost:3000`로 바꿔주면 사이트가 실제 데이터로 정상 렌더링됨.\n"
