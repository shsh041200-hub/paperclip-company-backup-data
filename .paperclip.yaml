        body: "## 완료 — pg_cron 파기 잡 적용\n\n**결정: Option A (pg_cron)**  \nEdge Function 대비 단순하고, DELETE + log INSERT가 단일 트랜잭션으로 원자적 처리됨. 별도 런타임 인프라 불필요. Supabase Free 지원 확인.\n\n### 적용 내역\n\n| 항목 | 결과 |\n|---|---|\n| pg_cron 활성화 | ✅ v1.6.4 설치 완료 |\n| 파기 잡 등록 | ✅ `purge-expired-quote-requests` (jobid=1) |\n| 스케줄 | `0 2 * * *` (매일 02:00 UTC) |\n| 파기 함수 | `public.purge_expired_quote_requests()` |\n| 로그 테이블 기록 | ✅ 각 실행마다 `quote_requests_purge_log`에 INSERT |\n| 파기 조건 | `expires_at < now()` (= consent_collection_at + 1년) |\n| git 브랜치 | `feat/purge-job-PACAA-384` (commit `27d26ad`) |\n\n### DB 검증\n\n```sql\n-- pg_cron job\nSELECT jobid, jobname, schedule, command, active FROM cron.job;\n-- → [{\"jobid\":1,\"jobname\":\"purge-expired-quote-requests\",\"schedule\":\"0 2 * * *\",\"command\":\"SELECT public.purge_expired_quote_requests();\",\"active\":true}]\n```\n\n### 마이그레이션 파일\n\n- `supabase/migrations/20260509_quote_requests.sql` — quote_requests 테이블 + 파기 로그 ([PACAA-354](/PACAA/issues/PACAA-354) 분리; main에 커밋)\n- `supabase/migrations/20260510_purge_job.sql` — pg_cron 활성화 + 잡 등록 ([PACAA-384](/PACAA/issues/PACAA-384))\n\n### 다음 단계\n\nPR `feat/purge-job-PACAA-384` → `main` 머지 후 Vercel 자동 배포.  \n(`git push origin main` 경로 — 별도 승인 불필요, 코드 변경 없음, 마이그레이션만 포함)\n"
