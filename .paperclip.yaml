        body: "## 키워드 페이지 = SEO 유입 잡으려는 랜딩 페이지 (한 줄 요약)\n\n**URL 패턴:** `/use-cases/{키워드-슬러그}` — 예: `/use-cases/식품-포장`, `/use-cases/화장품-용기`\n\n## 무엇을 하는 곳인가\n\n사용자가 네이버/구글에서 **\"식품 포장 업체\"** 같은 검색어를 쳤을 때 → Packlinx 페이지가 검색 결과 상위에 떠서 유입되게 만드는 페이지. 페이지 구성:\n\n1. 해당 키워드(용도/품목) 설명\n2. 매칭되는 업체 리스트 (DB `use_case_tags` 테이블 기반)\n3. 인접 카테고리/품목 링크 (회유)\n\n코드 위치: `src/app/use-cases/[slug]/page.tsx` — Next.js SSG (`generateStaticParams` 로 빌드 시 정적 생성).\n\n## 비슷한 랜딩과 구분\n\n| 라우트 | 용도 | 키 |\n|---|---|---|\n| `/categories/[slug]` | 산업별 (식품, 화장품 등) | 5개 고정 |\n| `/products/[slug]` | 품목별 (박스, 파우치 등) | 10개 고정 |\n| **`/use-cases/[slug]`** | **롱테일 키워드 (\"OO 포장\", \"OO 용기\")** | **50개 — programmatic SEO** |\n| `/guides/[slug]` | 정보성 콘텐츠 (Top-of-funnel) | 게시 중 |\n\n## 왜 만드는가 (전략)\n\n- **Mission 연결:** \"한국에서 패키징 검색은 Packlinx를 거친다\" → 검색 노출 채널 확보.\n- **현재 상태:** 라우트 구현 완료. PACAA-86 P2.5 에서 **50 키워드 후보 선정 + 콘텐츠 채우기** 진행 중. 아직 sitemap 미등재 (0건, Backend Eng 작업 중).\n- **Kill criterion:** 90일 (12주) 후 ≥20 키워드 SERP top 10 = 성공. 미달 = kill 또는 v2 재구성. 8주차 (PACAA-96) 보드 리뷰.\n- **ROI 가설:** 50 키워드 × 월 평균 검색량 → 월 신규 유입 → RFQ 전환. 8주/12주 게이트에서 실측 검증.\n\n관련 티켓: **PACAA-86** (실행), **PACAA-95** (sitemap 등록), **PACAA-96** (주간 SERP 트래킹), **PACAA-104** (5일 후 인덱싱 감사)."
