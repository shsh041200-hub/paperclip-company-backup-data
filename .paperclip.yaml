        body: "## 동의 — 3축 구조로 변경\n\n말씀하신 \"또 다른 작업 플로우\"가 맞습니다. 패키징과 인쇄·디자인은 buyer journey 자체가 다릅니다.\n\n| 차원 | 패키징(Products) | 인쇄·디자인(Services) |\n|---|---|---|\n| 의사결정 기준 | 소재·규격·MOQ·인증 | 창의성·색상 매칭·후가공·교정 |\n| Vendor 형태 | 제조업체 | 기획사·인쇄소·디자인 스튜디오 |\n| 발주 흐름 | spec → 견적 → 양산 | 시안 → 교정 → 인쇄 → 후가공 |\n| 동시 진행 여부 | 별도 발주가 일반적 (다른 단계) | 별도 발주가 일반적 |\n\n같은 L1에 두면 사용자가 \"박스 업체\"를 찾을 때 인쇄소가 섞여 들어와 노이즈가 생깁니다. 분리가 정답.\n\n---\n\n### 수정된 3축 구조\n\n**`/products/[slug]` (10개, printing-design 제거):**\n박스·파우치·용기·튜브·캔·쇼핑백·완충재·필름·라벨·테이프 (PackagingForm 10종 그대로 승격)\n\n**`/industries/[slug]` (5개, 변경 없음):**\n식품·음료 / 화장품·뷰티 / 의약·건강 / 전자·산업 / 이커머스·배송\n\n**`/services/[slug]` (신규 3축, 1개 — 향후 분할 가능):**\n\n| 슬러그 | 라벨 | 흡수 대상 |\n|---|---|---|\n| `printing-design` | 인쇄·디자인 서비스 | 현 IndustryCategory.print_design_services |\n\n내부에 기존 PrintDesignSubtype 7종(패키지 인쇄, 라벨·스티커, 브로셔, 명함, 사인물, 패키지 디자인, 후가공)을 **세부 필터**로 그대로 활용.\n\n**향후 옵션 (지금은 보류):**\n- 서비스 vendor 수가 충분히 쌓이면(50+ 기준) `/services/printing` + `/services/design` 으로 분할.\n- 현재 vendor 수 미파악 — 분할 결정은 데이터 보고 판단.\n\n---\n\n### 변경 요약 (직전 안 대비)\n\n- `/products/printing-design` 제거 → `/services/printing-design`로 이전\n- `/products/*`는 11개 → **10개**\n- 3번째 축 `/services/*` 신설 (1개 슬러그로 시작)\n- 헤더/네비에 3개 축 노출\n\n---\n\n### 서브티켓 (변동 없음, 1개만 명세 갱신)\n\n| # | 제목 | 변경 |\n|---|---|---|\n| PACAA-15.1 | 신규 `/products/*` 10개 + `/services/printing-design` 신설 | services 라우트 추가 |\n| PACAA-15.2 | IndustryCategory 정리 + 슬러그 통일 | 변경 없음 |\n| PACAA-15.3 | 분류기 단일화 + CompanyTag 폐기 | 변경 없음 |\n| PACAA-15.4 | 패싯 필터 통합 + sitemap 갱신 | 변경 없음 |\n\n---\n\n이 3축 구조(products 10 + industries 5 + services 1)로 진행해도 되겠습니까? OK / 한 글자 응답이면 즉시 4개 서브티켓 발주합니다.\n\n— CEO\n"
