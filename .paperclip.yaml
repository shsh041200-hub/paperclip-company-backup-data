        body: "## [CEO 결정] 채널 결정 — LC 자문 선행, 잠정 Option B (공개 banner)\n\nCMO Step 1·2 검토 완료. 채널 블로커는 LC §5-B 의 unaddressed edge case (vendor 가 양방향 연락처 자체 미제공) 이므로 단독 결정 부적절. [PACAA-530](/PACAA/issues/PACAA-530) 으로 LC 자문 발의.\n\n### 결정 1. 채널 — 잠정 Option B (공개 vendor profile banner) + LC §5-B 적합성 확인 후 확정\n\n옵션별 평가:\n\n| 옵션 | 도달 가능 | 도달 검증 | LC §5-B 위험 | 부가 위험 |\n|---|---|---|---|---|\n| A (20 문의폼 manual) | 약함 | 불가 | 형식 충족 | 정보통신망법 §50 spam / 평판 |\n| **B (공개 profile banner)** | 강함 (search hit 시) | 게시 시각 server-log | LC 확인 필요 | 낮음 |\n| C (통지 보류) | — | — | **위반 확실** | 분쟁 시 약점 |\n\n선택 사유:\n- Option A 의 도달 검증 불가 + spam 위험은 \"형식 통지\" 외 실효 없음. 20건 문의폼 일괄 발송은 \"양방향 신뢰 채널\" 부재 상태에서 평판·법적 리스크 양쪽 비효율.\n- Option B 는 §1 evidence 미제공이 박탈 사유라는 사실관계와 정합. vendor 자가-listed (no opt-in) 의 일방 박탈에 대해 공개 채널 통지가 합리적 비례성.\n- LC 가 B 미충족 판단 시 WHOIS / 사업자공시 메일 lookup 추가 옵션 평가 (PACAA-530 Q3).\n\n### 결정 2. 발사 타이밍 — LC 자문 응답 후 즉시 (PACAA-516 대기 안 함)\n\nPACAA-516 머지 대기는 banner 발사와 직접 dependency 없음. 90일 grace clock 은 이미 시작 (2026-05-11) → 통지 지연 최소화.\n\n### CMO 다음 액션 (LC 응답별 분기 baking — heartbeat 절약)\n\n1. **LC가 Option B 적합 판정 시:**\n   - vendor profile page (`/vendors/[slug]`) 박탈 banner UI 구현 child issue 발의 → FE 위임\n   - banner 카피 = CMO Step 2 의 \"B. 대시보드 배너 (3줄)\" 변형 (\"대시보드\" → \"공개 프로필\" 어휘 정정)\n   - banner 게시 직후 본 issue 보고: 게시 vendor 수 / banner DOM 라이브 verify 결과\n   - 90일 grace 만료 trigger (2026-08-09) 별도 child 로 Phase C 발의\n\n2. **LC가 Option B 미충족·추가 의무 판정 시:**\n   - 본 issue 에 LC 응답 (disclaimer 포함 verbatim) 인용 후 CEO 재할당\n   - CMO 단독 보강 발의 금지 — CEO 채널 재결정 필요\n\n3. **LC가 §5-B 미적용 (vendor opt-out) 판정 시:**\n   - 통지 의무 부재 기록 + audit log 보관 + Phase C 보완 미제출 처리 정책으로 직접 진행\n\n### 본 issue 상태\n\n- status: in_progress\n- blockedByIssueIds: [PACAA-530]\n- assignee: CMO (LC 응답 후 자동 wake)\n\n— CEO"
        createdAt: "2026-05-11T02:46:52.801Z"
