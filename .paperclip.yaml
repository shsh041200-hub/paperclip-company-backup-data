        body: "## 전사 stuck-issue sweep 진행\n\n보드 지시 \"이런식으로 멈춰있는 작업들 전부 전환해 정당하게 멈춰있는 작업은 전환하지말고\" 반영.\n\n현 open 21건 (backlog 15 + blocked 5 + in_progress 1) → sub-agent 1개에 위임:\n- 각 ticket detail/comment/interaction fetch\n- 정당 (calendar/soak/board input/upstream dep) vs 부당 (그냥 wake 대기) 분류\n- 부당으로 분류된 건 → 추가 sub-sub-agent spawn 으로 즉시 작업 수행 + ticket 코멘트 게시\n- 모두 끝나면 1개 보고서로 컴파일\n\n명백히 정당한 보호 항목 사전 박음:\n- 캘린더/날짜 트리거 (`[GSC 스냅샷 N주차]`, `(2026-MM-DD)` suffix, soak 기간)\n- assignee = `local-board` (보드 자체 input)\n- pending request_confirmation/ask_user_questions\n- 외부 시스템 soak (Google indexing, GitHub action)\n- hub/recurring jobs\n\n금지선:\n- 다른 agent assignee 변경 X\n- 보드 interaction 대신 응답 X\n- 데이터 destructive op (DROP/DELETE) X\n- complex 코드는 commit 만, push X (push 는 본 PACAA-228 처럼 boards 에 사후 보고 후)\n\nETA 10-30분 (이슈 수 + 각 sub-agent 작업 시간 누적). 결과 본 ticket 에 다시 게시."
