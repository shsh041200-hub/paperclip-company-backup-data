        body: "## P0 — PR #3 reverted, prod sitemap broken in deploy\n\n### Timeline (UTC)\n- 07:47:05 — Board accepted interaction `2334b260` (옵션 A 채택).\n- 07:47:48 — CEO squash-merged PR #3 → main `8766a208`.\n- 07:48:30 — Vercel deploy `dpl_JAs9pjWD4unGWqvDgc4xYNaaA44P` 완료.\n- 07:48:35 — Prod probe 결과:\n  - `https://www.packlinx.com/sitemap.xml` → **HTTP 404**\n  - `https://www.packlinx.com/sitemap/0.xml` → 200 그러나 `<urlset></urlset>` (빈)\n  - `https://www.packlinx.com/sitemap/1.xml` → 200 그러나 `<urlset></urlset>` (빈)\n- 07:49:30 — CEO 긴급 revert: 새 commit `896ba2e7` (이전 트리 e99e6c90 복원) push → main fast-forward. Vercel 자동 재배포.\n- 07:51:00 — 복구 검증: `/sitemap.xml` 200, **1,031 URL / 1,000 companies** (cap 걸린 원상).\n\n### Root cause hypothesis\n생산물이 0 URL — `generateSitemaps()` + `@supabase/supabase-js` plain anon 클라이언트 SSG 빌드 시 데이터를 못 가져옴. 후보:\n1. **Anon RLS 정책** — `companies` 테이블 anon select 이 RLS 로 거부 → `data: []` 조용히 반환. 기존 server client 는 cookies 기반 인증된 컨텍스트로 통과했지만 anon 은 불가.\n2. **Env var 미주입** — Vercel build-time SSG 컨텍스트에서 `NEXT_PUBLIC_*` 가 아닌 `SUPABASE_URL` / `SUPABASE_ANON_KEY` 만 import 했으면 build 단계에서 inline 안 됨. dry-run 은 로컬 .env 로 통과한 false positive.\n3. **Build-time vs runtime 컨텍스트 혼동** — `generateSitemaps()` + `default async sitemap(id)` 가 SSG 로 평가되어 빌드 컨테이너에서 fetch 시도. 배포된 함수가 아니라 빌드 산출물.\n\nDry-run 검증이 1,396 rows 를 받았던 이유: 로컬 환경의 `SUPABASE_SERVICE_ROLE_KEY` 또는 `process.env` 가 PR 코드의 클라이언트 생성과 다른 경로로 풀렸을 가능성. 즉 dry-run ≠ Vercel 빌드 컨텍스트.\n\n### Re-attack 방향 (Backend 위임)\n- (a) Vercel 빌드 컨테이너에 `SUPABASE_SERVICE_ROLE_KEY` 주입 (이미 있다면 envName 확인) + 빌드 전용 client (`createClient(URL, SERVICE_ROLE_KEY)`) 로 회사 fetch.\n- (b) **또는** sitemap 라우트를 `dynamic = 'force-dynamic'` + ISR 단주기 캐시 (e.g., 1h) 로 전환해 SSG → ISR 변환. cookies() 없는 createServerClient 변형 + service-role 또는 RLS-bypass 정책. 빌드 시점이 아니라 first request 시점에 fetch.\n- (c) **또는** RLS 정책에 `companies` anon SELECT 명시적 allow (이미 sitemap 노출 데이터는 public) 추가 + anon client 유지.\n- (d) 빌드 산출물 검증 게이트 — preview 가 아니라 prod 배포 직후 1회 `scripts/sitemap-parity.mjs` 자동 실행해 0-URL/404 시 즉시 alert (또는 vercel-action 으로 main deploy 후 health check).\n\n### Acceptance 영향\n- [x] cap 제거 — **취소**, 1,000 cap 복귀.\n- [x] sitemap-index — **취소**.\n- [ ] lastmod 보존 — 코드 revert.\n- [ ] DB↔sitemap parity 스크립트 — `main` 에서 사라짐 (revert 됨).\n- [ ] GSC 재제출 — 보류 (수정본 검증 후).\n\n### 본 이슈 상태\nstatus → in_progress. 재할당 → Backend Engineer. PR 재푸시 시 **반드시** preview URL 에서 `/sitemap.xml` + `/sitemap/0.xml` 모두 200 + non-empty `<urlset>` 확인 후 PR 갱신. dry-run 만으로 판단 금지.\n\n### Reversibility 메모\nrevert 도 두-방향. 빌드 컨테이너 컨텍스트 차이만 잡으면 같은 PR 재구성 빠름. 수정본은 새 PR (#4) 권장 — `pacaa-117-sitemap-cap-removal-v2` 브랜치."
