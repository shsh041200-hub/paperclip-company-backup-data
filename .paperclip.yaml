        body: "## Sub-agent 2개 완료 — 종합 결과\n\n### A. 코드 fix (DEPLOYED)\n\n**커밋 `f42ca8e` main push 완료** → Vercel 자동 배포 진행 중.\n\n변경 5개 파일 (+177 / -37):\n- `src/app/sitemap.xml/route.ts` — force-dynamic 제거\n- `src/app/sitemap/[id]/route.ts` — force-dynamic 제거 + generateStaticParams=[] / dynamicParams=true 로 SSG 강제\n- `src/app/companies/[slug]/page.tsx` — force-dynamic 제거, revalidate=3600 추가, cookieless anon client 로 데이터 fetch (RLS 그대로 적용), isOwner 클라이언트 분리\n- 신규 `src/app/companies/[slug]/OwnerControls.tsx` — 'use client', mount 시 owner-status fetch, owner UI (CertificationCTABanner / SimilarOptoutToggle) 토글\n- 신규 `src/app/api/companies/[slug]/is-owner/route.ts` — cookie 인증 세션 조회, Cache-Control: no-store\n\n빌드 결과 라우트 분류:\n```\n● /companies/[slug]   (SSG)\n○ /sitemap.xml        1h\n● /sitemap/[id]       (SSG)\nƒ /api/companies/[slug]/is-owner   (Dynamic, 의도적)\n```\n\nLint clean (내가 만든 파일에 신규 에러 0; 기존 24 에러 unrelated 파일들은 미터치).\n\n**모니터링**: 배포 후 24-48h Supabase IO 그래프 관찰. 패턴이 \"매 요청 → 1시간 1회\" 로 떨어져야 정상.\n\n### B. Prune audit — **충격적 발견**\n\n**보드 사고 정정 필요**: DB 전체 **28MB**, public schema 16MB. 가장 큰 테이블 `companies` 가 10MB / 1,396 rows. **사이즈 prune 으로는 IO 회복 불가능 (max 2.5MB 절약, total 의 0.01%).**\n\nIO 폭주의 진짜 원인은 **데이터 양 X, 쿼리 패턴 + 캐시 미스**. 본 ticket A 의 코드 fix 가 실질 해결책.\n\n#### 그래도 의미 있는 audit 부산물:\n\n1. **PITR (Point-in-Time Recovery) OFF** — 데이터 유실 시 daily 백업만 복구 가능. Supabase Pro add-on 약 $100/월. 보드 결정 필요 (별 ticket 으로 surface 가능).\n2. **`vendor_candidates` 테이블 (2.5MB, 2,942 rows, 코드 참조 0)** — 크롤러 staging 잔재 추정. 보드 confirm 후 archive → drop 가능. 하지만 IO 영향 ~0.\n3. **`auth.users` 97% dead tuples (35 rows 중)** — autovacuum 지연. Supabase 자동 운영이라 우리가 손댈 부분 X.\n4. **`pg_stat_statements` 활성화 + Top 20 쿼리 분석 권장**: 코드 fix 후에도 IO 안 떨어지면 다음 단계.\n\n**자동 prune 작업 = 진행 안함.** 효과 0 + PITR 없는 상태에서 위험.\n\n### C. 다음 액션\n\n1. **즉시** — Vercel 배포 완료 확인 (5-10분 내)\n2. **24h 후** — Supabase Dashboard IO 그래프 확인. 떨어졌으면 본 ticket close.\n3. **떨어지지 않으면** — `pg_stat_statements` 활성화 + Top 쿼리 분석 sub-agent spawn (별 ticket).\n4. **분리 ticket 후보 (보드 결정사안)**: PITR 활성화 ($100/월). 데이터 유실 보호. 지금 결정 미룰 수 있음.\n\n현재 PACAA-228 status = `in_progress`, 24h 모니터링 대기. 그동안 배포 안정성 (Vercel/회사 페이지 정상 렌더링) 확인 권장."
