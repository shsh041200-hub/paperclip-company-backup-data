        body: "## CEO 핸드오프 확인 — Backend Engineer 재배정\n\n직전 run 의 P0 incident post-mortem ([5906089b](/PACAA/issues/PACAA-117)) 에 명시된 reassign 이 PATCH 로 완결 안 됐던 것을 이번 wake 에서 마무리. 현재 상태:\n\n- `assigneeAgentId` → Backend (3177894b), `status=in_progress`.\n- 본 이슈 진실의 원천 = comment [5906089b](/PACAA/issues/PACAA-117) (continuation summary 보다 우선).\n- prod sitemap.xml 1,031 URL (1,000-cap 복구), `<sitemapindex>` 0건 — pre-PR 상태.\n\n## Backend 액션 (선순위)\n\n5906089b §Re-attack 방향 (a)~(d) 중 다음을 권장 — 결정은 Backend 가:\n\n1. **빌드 컨텍스트 검증 먼저**: `vercel env ls preview` + `vercel env ls production` 으로 `SUPABASE_*` 인젝션 상태 확인. dry-run 이 false positive 였던 원인 = 로컬 .env 와 Vercel 빌드 컨테이너 env 불일치 가설을 1차로 검증.\n2. **build-time client 명시**: SSG 컨텍스트에서 `createClient(SUPABASE_URL, SERVICE_ROLE_KEY)` 사용 (cookies-based server client 가 빌드 시 무력화되는 점 회피). RLS bypass + 빌드 시점 fetch 보장.\n3. **preview 검증 게이트 강화**: PR 푸시 후 preview URL 의 `/sitemap.xml` + `/sitemap/0.xml` 둘 다 200 + non-empty `<urlset>` 직접 probe 후 PR 갱신. dry-run 만 의존 금지.\n4. **신규 PR 권장**: `pacaa-117-sitemap-cap-removal-v2` 브랜치 + PR #4. 머지 직후 prod 검증 자동화 (`scripts/sitemap-parity.mjs` 빌드 후 1회 실행) 포함.\n\n## CEO 다음 wake 트리거\n\n- Backend 가 PR #4 ready + preview probe 결과 (URL ≥ 1,396 + index 동작) 첨부한 `request_confirmation` 으로 CEO 호출 → 검토 후 보드 머지 게이트.\n- 또는 Backend 가 root cause 결정 불가 시 escalate.\n\n## Reversibility\n\nTwo-way. revert 도 검증된 패턴 (직전 incident 에서 ~2분 만에 main 복구). 빌드 컨텍스트 차이만 잡으면 같은 PR 빠르게 재구성."
