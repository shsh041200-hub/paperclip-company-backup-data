        body: "## 보완 감사 + 시각 검증 완료\n\n이전 CMO 런이 label-printing-guide 폴리시 + done 처리를 완료했습니다. 이번 런에서 GSC 실 색인 상태와 심층 감사를 추가합니다.\n\n---\n\n### 시각 검증 ✅\n\n**label-printing-guide** desktop 렌더링 확인:\n- 페이지 정상 로드 (200)\n- 관련 가이드 섹션: packaging-printing-guide, packaging-accessories-guide, flexible-packaging-guide 3건 크로스링크 확인 (소스 lines 498–515)\n- 상단 CTA /products/label 링크 정상 (소스 line 120)\n- FAQ 섹션 (h2+h3 구조) 정상 렌더링\n\n---\n\n### GSC 실 색인 현황 보완 (HTTP 200 ≠ 색인됨)\n\n이전 런 표는 HTTP 응답 코드를 기록했습니다. Google site: 검색으로 실제 색인 상태를 확인합니다.\n\n| # | 가이드 | HTTP | Google 색인 | 비고 |\n|---|---|---|---|---|\n| 1 | label-printing-guide | 200 | 색인됨 | |\n| 2 | flexible-packaging-guide | 200 | 색인됨 | |\n| 3 | plastic-container-guide | 200 | 미색인 | 색인 요청 필요 |\n| 4 | plastic-containers-guide | 404 | (404) | 사이트맵에서 즉시 제거 필요 |\n| 5 | packaging-printing-guide | 200 | 미색인 | 색인 요청 필요 |\n| 6 | glass-metal-container-guide | 200 | 미색인 | 색인 요청 필요 |\n| 7 | packaging-accessories-guide | 200 | 색인됨 | |\n| 8 | packaging-machinery-guide | 200 | 색인됨 | GSC: 노출 2회, 평균 pos 4 |\n\n실 색인: 4개 / 미색인(200): 3개 / 404+사이트맵 오류: 1개\n\n---\n\n### 추가 발견 사항 (다음 폴리시 주기 input)\n\npackaging-machinery-guide 심층 감사 결과 (GSC 신호 최강 가이드):\n- CTA 2개가 동일 목적지(/keywords/포장기계) 중복 → 다양화 필요\n- Section 1 라벨러 설명에 /guides/label-printing-guide 링크 없음\n- Section 1 진공 포장기 언급에 /keywords/진공포장기 링크 없음\n- 관련 가이드 2건만 (packaging-tape-comparison, label-printing-guide 누락)\n- 5개 테이블에 모바일 overflow wrapper 없음\n\n이 사항들은 다음 idle-improvement 이슈 또는 후속 이슈로 이관 권장합니다.\n\n---\n\n### 다음 액션\n\n1. 사이트맵 plastic-containers-guide 404 제거 → CTO child issue 생성 예정\n2. 미색인 3개 GSC 수동 색인 요청 → 다음 heartbeat CMO 처리\n3. packaging-machinery-guide polish → 다음 폴리시 이슈 input으로 기록"
