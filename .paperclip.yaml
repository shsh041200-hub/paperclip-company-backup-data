        body: "## 1. 냉철 검토 — 왜 backlog 위임이었나\n\n정직하게: 두 개의 실수.\n\n**실수 A — \"바로 시키기\" 옵션을 surface 안 함.**\n- 사실 backlog 는 위임 시 default. 즉시 시작시키는 길은 3개뿐:\n  - (1) heartbeat 자연 픽업 (30분 cycle)\n  - (2) 보드가 manual wake\n  - (3) CEO 가 자기 sub-agent 로 직접 수행\n- 내가 (1) 만 가정하고 위임 → 30분 wait 빌트인. P1 incident 에 30분은 늦음.\n- 했어야 했던 것: 첫 댓글에 \"PACAA-230 즉시 wake 누르세요\" 한 줄 + 또는 sitemap 같은 단순 fix 는 sub-agent 로 직접 처리.\n\n**실수 B — CEO wake 가 401 인 걸 미리 안 알려서 보드가 \"왜 멈춰있어\" 코멘트하게 만듦.**\n- API 확인: `/agents/{id}/wake`, `/agents/{id}/runs`, `/issues/{id}/start`, `/runs` 모두 404 (CEO 권한 부재 확정).\n- 보드 개입이 필요한 구조이지만 이걸 사전 surface 안함 = 보드 리액티브 개입 강제.\n\n## 2. 즉시 액션 (이 heartbeat 안에서)\n\n### A. 캐시 prune 진행 — PACAA-232 생성\nBackend Engineer 위임. **\"필요한건 절대 삭제하면 안돼 하나하나 다 체크\"** 보드 지시 정확히 박음:\n- 1단계 audit (DROP 없이): 모든 테이블 list + row count + size + 마지막 modified + code reference grep 결과 → table 단위로 \"보존 / 삭제후보 / 추가조사\" 분류 보고\n- 2단계 (보드 confirm 후): 분류된 \"삭제후보\" 만 board accept 받아 DROP/DELETE\n- 안전장치: 모든 DROP 전 `pg_dump` backup, PITR 활성 확인, batched DELETE (한번에 100k 이하), VACUUM 분리 실행 (한도 임박이라 묶으면 위험)\n- DROP 직접 실행 금지 명시 (1단계 audit 만 자동, 2단계 무조건 board confirm)\n\n### B. 보드가 1번만 클릭하면 둘 다 시작\nPACAA-230 (sitemap+companies 코드 fix) + PACAA-232 (prune audit) 둘 다 backlog → assignee wake 대기. 보드가 두 ticket 만 wake 누르면 즉시 picking.\n\n### C. 향후 process fix\n- 위임 시 \"wake required\" 명시 강제 (CEO 메모리 baking)\n- 단순/safe 변경(예: 3-line constant 제거)은 CEO sub-agent 직접 수행 → engineer 위임 안함\n- 30분 heartbeat interval 은 engineer agents 한정 600s 로 단축 제안 가능 (CTO 결정사안)\n\n## 3. 보드 액션 요청 (정확히 2개 클릭)\n\n1. PACAA-230 \"Wake\" → Frontend Engineer 코드 fix 시작\n2. PACAA-232 \"Wake\" → Backend Engineer prune audit 시작\n\n둘 다 진행되면 4-12h 내에 1차 결과물 (코드 PR + audit 분류표) 보드에 올라옴."
