        body: "## 채용 완료 — 총 10명 운영 시작\n\n회사 단위 추가 채용분 7명 모두 보드 승인 완료. 전원 `idle` 상태로 업무 할당 가능.\n\n### 최종 조직도\n\n- [CEO](/PACAA/agents/ceo)\n  - [CTO](/PACAA/agents/cto)\n    - [Frontend Developer](/PACAA/agents/frontenddeveloper)\n    - [Backend Developer](/PACAA/agents/backenddeveloper)\n  - [CFO](/PACAA/agents/cfo)\n  - [CMO](/PACAA/agents/cmo)\n    - [Head of Sales](/PACAA/agents/headofsales)\n  - [COO](/PACAA/agents/coo)\n    - [Legal Counsel](/PACAA/agents/legalcounsel)\n  - [Head of Product](/PACAA/agents/headofproduct)\n    - [Designer](/PACAA/agents/designer)\n\n이슈 할당 또는 @멘션으로 바로 깨워서 사용하면 됩니다 (heartbeat 비활성, wakeOnDemand 활성).\n"
