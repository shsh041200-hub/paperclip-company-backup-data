        body: "## CF Audit 결과 (packlinx-api.com)\n\n### ✅ Zone 상태\n- Zone ID: `16bf1eb9f288651b58f29f25dc01c135`\n- Plan: **Free Website** (충분, enterprise feature 불필요)\n- Status: active, paused=false, type=full\n- Name servers: erin/mark.ns.cloudflare.com\n\n### ✅ TLS/SSL\n- **Universal SSL active**\n- 인증서 hosts: `packlinx-api.com` + `*.packlinx-api.com` (wildcard)\n- 자동 갱신 by Cloudflare — 보드 액션 불필요\n\n### ✅ Firewall\n- Custom firewall rules: **0개**\n- CF auto-WAF (Free tier 기본): **활성** — 지난 7일 **207건 threat 차단** (봇 스캐닝)\n\n### 📊 Traffic Analytics (지난 7일)\n| 날짜 | Requests | Threats | Unique IPs | Bandwidth |\n|------|---------:|--------:|-----------:|----------:|\n| 05-07 | 750 | 0 | 2 | 16 MB |\n| 05-08 | 1,044 | 18 | 31 | 45 MB |\n| 05-09 | 616 | 18 | 4 | 23 MB |\n| 05-10 | 1,461 | 35 | 2 | 33 MB |\n| 05-11 | 2,186 | 88 | 5 | 119 MB |\n| 05-12 | 708 | 5 | 3 | 42 MB |\n| 05-13 | 2,197 | 43 | 2 | 36 MB |\n| **합계** | **8,962** | **207** | — | **314 MB** |\n\n- 평균 **~1,280 req/day** — agent 운영 consistent\n- Cache hit rate **~0%** (dynamic API 라 정상)\n- Unique IPs 2-31/day = closed agent population + 보드 대시보드 접속\n\n### ⚠️ Audit 한계 (토큰 권한)\nCEO 토큰이 read-only/제한 scope 라 아래는 API 검증 불가:\n- **DNS records 전수** (Zone:DNS:Read 권한 별도 필요) — 다만 외부 probe 로 1개 활성 (paperclip-api.) 확인됨\n- **WAF Rulesets v2** (Zone:WAF:Read 별도) — CF auto-protection 은 활성 (threats 차단 통계로 확인)\n- **Domain Registrar auto-renew API 실 검증** (account listing + registrar perm 필요) — 보드 UI 토글 신뢰\n\n### 🎯 최종 평가\n- **packlinx-api.com 활용도: 핵심 인프라 (high)** — Paperclip 컨트롤 플레인 백본\n- **Free Plan 충분** — 트래픽 규모 (1.3k req/day) 와 보안 needs (auto-WAF) 가 무료 한도 내\n- **비효율은 네이밍 redundancy 만** ($10/yr 절감 여지, 2027-04 만료 임박 시 재검토 권장)\n- **현재 운영 상태 양호** — auto-renew ON, TLS 자동 갱신, threats 차단 활성"
