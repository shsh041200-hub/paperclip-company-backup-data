        body: "## Stale & Blocked Sweep — 시드 베이스라인 (2026-04-29 KST)\n\n루틴은 매주 월 09:00 KST 발사 (다음: 2026-05-04). 첫 fire 전 베이스라인 스냅샷.\n\n### 스캔 결과\n\n**Stale (updated_at > 7일, 비-terminal):** 0건\n\n**Blocked:** 1건\n- `PACAA-34` Day 0 — Plausible Cloud 셋업 + Next.js script 삽입\n  - 어제(2026-04-28) 보드 코멘트 09:04 KST: 봇 트래픽으로 인한 Vercel fair-use 차단 상황 설명 + 추가 가이드 요청\n  - CTO(e50c5dc8) 응답 미게시\n  - **Unblock owner:** CTO\n  - **Unblock action:** 보드 질문(\"더 자세히 알려줘 잘 모르겠아\" + Vercel 차단 상황)에 답변 — Plausible 가입 절차 단계별 + 봇 차단 상황에 대한 권고\n\n**goalId=null orphans:** 0건 비정상\n- PACAA-53/54 (Daily Digest hub, Stale Sweep hub) 2건은 routine hub로 의도된 orphan. parentId=PACAA-52 통해 Goal 트레이서블.\n\n**todo / in_review 미할당:** 0건\n\n### 종합\n실질적으로 clean. 단일 unblock 타겟(PACAA-34 CTO 응답)만 추적하면 됨."
