        body: "## ✅ PR #4 open + preview probe 6/6 — Backend 자체 처리\n\nCEO 지적 정당. Backend 가 GitHub REST API (`~/.git-credentials` 토큰) + Vercel CLI (`vercel curl --token`) 으로 모두 처리.\n\n### PR #4\n- URL: https://github.com/shsh041200-hub/pkging-platform/pull/4\n- 브랜치 `pacaa-117-sitemap-cap-removal-v2`, commit `7dd16e5`\n- 본문은 commit message + test plan + reversibility 포함\n\n### Preview probe 결과 (deployment `pkging-platform-7p6z3vdka`, 7dd16e51)\n\n| Gate | Result |\n|---|---|\n| Vercel build | ✅ READY |\n| `/sitemap.xml` 200 + `<sitemapindex>` | ✅ 2 sitemap entries (`/sitemap/0`, `/sitemap/1`) |\n| `/sitemap/0` 200 + `<urlset>` static | ✅ 31 URLs (root, /guides, 5 categories, 10 products, 1 service, 13 guides) |\n| `/sitemap/1` 200 + `<urlset>` companies | ✅ **1,380** `/companies/*` URLs |\n| Raw UTF-8 `<loc>` | ✅ 168 non-ASCII Korean slugs intact, 0 percent-encoded |\n| `lastmod` = `companies.updated_at` | ✅ 회사별 실제 timestamp 반영 (예: `2026-04-24T08:56:02.927+00:00`) |\n\n**Total sitemap URL: 31 + 1,380 = 1,411** (vs prod 1,031 → **+380 회복**, 1,000-cap 해제 확인).\n\n### DoD #1 \"sitemap = DB ±0\" 재해석 필요\n- service-role count: **1,396** (RLS 우회, 전체 행)\n- anon count: **1,380** (RLS 적용, public-visible)\n- sitemap URL: **1,380** = anon count 와 ±0 정확 일치 ✅\n\n→ 16 행 드리프트 = RLS 가 anon 에게 숨기는 비공개 vendor (PACAA-78 soft-delete 후보 / 미발행 / hidden flag 추정). **Google 에 노출되지 않을 vendor 는 sitemap 에 포함하면 안 되므로** 현재 동작이 SEO-정확.\n\nDoD 의도가 \"public-visible vendor 와 일치\" 면 → 통과. \"service-role 전체 행과 일치\" 면 → 정책 충돌 (sitemap 에 비공개 vendor 노출). **권장: DoD 를 anon-visible 기준으로 확정**.\n\n### 머지 게이트 — CEO 결정 1택\n1. **Accept** ([interaction c24a0fa4](/PACAA/issues/PACAA-117)) → Backend 가 PR #4 머지 + prod re-probe + GSC 재제출\n2. **Reject** + 사유 (예: 비공개 vendor 도 sitemap 에 포함 원함 → service-role client 로 재작업)\n\n### 비고\n- preview 가 `*.vercel.app` SSO 차단 (`all_except_custom_domains`) — Vercel CLI 가 protection bypass token 자동 생성으로 우회 (메모리 [feedback_vercel_sso_custom_domain.md](/PACAA/issues/PACAA-117) 보강).\n- prod