        body: "## PACAA-690 완료 — 8쌍 dedup + 전카테고리 sweep\n\n### DoD #1: corrugated_box 8쌍 처리 결과\n\n| 이름 | 판정 | 근거 | 조치 |\n|------|------|------|------|\n| 박스타운 | SAME | 동일 사업명 + corrugated box 제조사 | canonical(corrugated_box) ← website 병합; paper 아카이브 |\n| 박스공장 | SAME | 주소 완전일치: 강원 강릉시 주문진읍 참샘길 116 | canonical ← website(janganbox.com); paper 아카이브 |\n| 소마박스 | SAME | 동일 사업명 + somabox.co.kr | canonical ← website; paper 아카이브 |\n| 우리포장박스 | SAME | 주소 완전일치: 경기 김포시 대곶면 오니산로 61 | canonical ← website(wooripojang.com); paper 아카이브 |\n| 동화포장박스 | SAME | 주소 완전일치: 부산 강서구 평강로 8-7 | paper 아카이브 |\n| 미성포장박스 | SAME | 주소 완전일치: 충북 청주시 서원구 현도면 시목외천로 332 | paper 아카이브 |\n| 박스제작소 | SAME | 동일 사업명 + boxjejakso.com | canonical ← website; paper 아카이브 |\n| 박스공장닷컴 | SAME (paper+corrugated) | paper+corrugated = boxmake.co.kr; flexible_packaging 레코드는 별도 사업체 (강남 제과제빵 상가) | canonical ← website; paper 아카이브; flexible→이름 disambiguate \"박스공장닷컴 (강남)\" |\n\n**결과: 8 paper 레코드 is_hidden=true, 6개 canonical에 website 병합, 1개 name disambiguate — 15 ops, 전부 HTTP 200**\n\n검증 통과:\n- 8 canonical: category=corrugated_box, is_hidden=False, website 보강 확인\n- 8 archived: is_hidden=True 확인\n\n---\n\n### DoD #2: 전카테고리 step5 동명 쌍 sweep\n\n**step5 records** = naver_local + created_at 2026-05-13~14\n\n| 구분 | 수치 |\n|------|------|\n| 전체 non-hidden 업체 | 3,297 |\n| 크로스카테고리 동명 쌍 (step5 vs 기존) | **953** |\n| 그 중 주소 완전일치 (동일 vendor 확정) | **765** |\n\n**카테고리 쌍 상위:**\n- corrugated_box × paper: **766** (최대)\n- paper × printing_postprocess: 32\n- flexible_packaging × plastic_container: 28\n- corrugated_box × packaging_accessories × paper: 26\n- packaging_accessories × paper: 19\n\n**step5 측 카테고리 분포:**\n- corrugated_box: 836\n- packaging_accessories: 64\n- printing_postprocess: 58\n- plastic_container: 25, flexible_packaging: 24\n- packaging_machinery: 20, label_sticker: 7, glass_metal_container: 4\n\n→ 이번 이슈에서 8쌍 처리 완료. 나머지 **945쌍 bulk dedup** 은 후속 이슈로 분리 (주소 일치 765건은 스크립트 자동화 가능).\n\n---\n\n### 후속 항목\n\n- **PACAA-688** 재개 필요 (90% chase, is_hidden 사유 확인 + 조아박스공장)\n- **신규 follow-up**: 945쌍 bulk dedup 이슈 생성 권고 (주소 일치 765건 자동, 나머지 180건 수동 검토)\n"
