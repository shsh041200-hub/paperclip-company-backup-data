        body: "## v1.1 재실행 결과 (2026-04-30)\n\n[PACAA-91](/PACAA/issues/PACAA-91) Phase 2 사인오프 (`v1.1-final-proposal` rev `7359c6e4`) 의 44 확정 키워드에 대해 `keyword_density_pacaa86_v1_1.py` 실행. (6 [GAP] 슬롯 G01~G06 은 [PACAA-99](/PACAA/issues/PACAA-99) Phase 3 발굴 sprint 종료 후 별도 재검증.)\n\n### 요약\n\n| 메트릭 | v1.0 (50kw) | v1.1 (44kw) |\n|---|---|---|\n| ≥3 vendor 매칭 | 49 (98%) | **38 (86%)** |\n| fallback (vendor<3) | 1 | **6** |\n| 평균 vendor/kw | 65.2 | **60.6** |\n\n### Fallback 슬롯 (6개) → §6.4 카테고리 가이드 + claim CTA 템플릿 적용\n\n| slot | keyword | category | count |\n|---|---|---|---|\n| R08 | 종이 쇼핑백 제작 | packaging_accessories | 2 |\n| M15 | 공병 가격 | plastic_container | 0 |\n| M18 | 마스킹테이프 제작 | packaging_accessories | 1 |\n| M19 | 테이프 제작 | packaging_accessories | 1 |\n| M20 | 테이프 주문제작 | packaging_accessories | 1 |\n| M21 | 테이프 공장 | packaging_accessories | 1 |\n\n관찰:\n* 테이프 4개는 `packaging_accessories` vendor 풀에 테이프 전문업체가 1개 (`형제패키지` 외) 뿐 — 실 vendor 데이터 희소성. PACAA-77 다음 sprint 에서 `테이프` 검색어로 보강 후보. \n* `공병 가격` 은 카테고리가 `plastic_container` 로 라벨링됐지만 의미상 `glass_metal_container` (유리 공병). PACAA-91 author 와 카테고리 재배정 협의 필요 — `glass_metal_container` 풀에는 `유리병` 매칭 23 vendor 있음.\n* `종이 쇼핑백 제작` 은 `packaging_accessories` 풀에 매칭 vendor 2 — `paper_bag` 전용 카테고리 부재가 구조적 원인. 단발 키워드라 fallback 수용.\n\n### 토크나이저 개선 (이번 패치)\n\n초기 v1.1 실행은 fallback 11개였으나 `keyword_density_pacaa86.py` 의 compound split 사전에 `봉투` 추가 + `지퍼백 / 인쇄물 / 공병 / 마스킹테이프 / 우체국택배박스 / 비닐봉투 / 편지봉투 / OPP봉투 / 홀로그램 / 스탠드` override 추가하여 5개 fallback 해소 (M05~M08, M11, P11). 잔여 6개는 실제 vendor 희소성.\n\n### 산출물\n\n* 스크립트: `plans/keyword_density_pacaa86_v1_1.py` (base 스크립트 재사용 + CSV 로더)\n* JSON: `plans/keyword_density_pacaa86_v1_1.json`\n* base 스크립트: `plans/keyword_density_pacaa86.py` (TOKEN_OVERRIDES / SUFFIXES 패치)\n\n### DoD\n\n1. 44 키워드 매칭 카운트 json — done (`keyword_density_pacaa86_v1_1.json`)\n2. fallback 키워드 식별 — done (6개)\n3. v1.1 키워드 셋 변경 후 재실행 — done\n\n### 다음 액션 (downstream)\n\n* [PACAA-94](/PACAA/issues/PACAA-94) §6.4 SSG: 38 키워드 정상 템플릿 + 6 키워드 fallback 템플릿 (카테고리 가이드 + claim CTA).\n* PACAA-99 Phase 3 발굴 sprint 종료 후 6 신규 키워드 (G01~G06) 에 대해 본 스크립트 1회 더 실행 후 결과 추가 코멘트.\n\n→ 본 이슈 `done` 으로 close. PACAA-99 종료 시 `resume:true` 코멘트로 재오픈."
