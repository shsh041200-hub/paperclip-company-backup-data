        body: "## 보드 결정 요청 — PAPERCLIP_API_URL 영구화 방식\n\nE5 Worker (PR-merged → wake comment poster) 가 paperclip API 콜백할 stable URL 필요. 현재 `gather-spent-assistance-retailers.trycloudflare.com` 은 paperclip 서버 재시작 시 변경 → 매번 Cloudflare Worker 재배포 필요. **Phase 2 카나리 진입 게이트.**\n\n본 결정은 **founder 자원 (Cloudflare 계정 / DNS / 지출)** 관여 = 보드 단독 결재.\n\n### 옵션 비교\n\n| 옵션 | Founder action | 비용 | URL 형태 | Reversibility |\n|---|---|---|---|---|\n| **A. CF Named Tunnel** (추천) | CF dashboard 에서 API 토큰 1회 발급 (`Account → Cloudflare Tunnel → Edit` scope) | $0 | `<uuid>.cfargotunnel.com` (영구) | Two-way |\n| **B. A + 브랜드 도메인** | A 의 토큰 + DNS CNAME `paperclip.packlinx.com` 1건 (Zone:DNS:edit scope 포함) | $0 | `https://paperclip.packlinx.com` | Two-way |\n| **C. VPS 마이그레이션** | VPS 구독 + paperclip 서버 이전 | ~$5~10/월 + ops 부담 | VPS public IP / 자체 도메인 | One-way (이전 후 원복 비용 큼) |\n| **D. 보류** | (현재 trycloudflare 유지) | $0 | 비영구 | Phase 2 카나리 차단 |\n\n### CEO 추천: **A**\n\n근거:\n- Cloudflare Tunnel 자체가 정확히 이 use case (로컬 origin 영구 노출) 용 1차 제품. Stripe / Atlassian 내부 dev infra 표준 패턴.\n- $0, founder action 1회 (~5분), 영구 URL.\n- 브랜드 도메인 (B) 은 추후 DNS CNAME 1건 추가로 무중단 upgrade 가능 — 지금 결정할 필요 없음.\n- VPS (C) 는 PMF 이전엔 over-engineering. 트래픽/스케일 이슈 발생 후 재고.\n\n### A 채택 시 BE Engineer 작업 (founder 토큰 수령 후 ~30분)\n\n1. `cloudflared tunnel login` (토큰 사용)\n2. `cloudflared tunnel create paperclip-api` → UUID URL 획득\n3. `cloudflared tunnel run paperclip-api` 를 systemd/launchctl service 로 등록 (재부팅 자동 복구)\n4. E5 Worker `PAPERCLIP_API_URL` env 1회 갱신 + 기존 `cloudflared` 임시 프로세스 정리\n5. PR 머지 테스트 1회 → wake comment 작성 확인 → 본 이슈 done\n\n### Founder action — A 옵션 상세\n\n1. https://dash.cloudflare.com/profile/api-tokens 접속\n2. **Create Custom Token**:\n   - Token name: `paperclip-tunnel`\n   - Permissions: `Account` → `Cloudflare Tunnel` → `Edit`\n   - Account Resources: `Include → Specific account → <your account>`\n3. Generate → 토큰 문자열 복사 → 본 이슈 코멘트에 붙여넣기 (또는 `.env.local` 에 저장 후 Backend Engineer 에 전달)\n\n토큰 도착 즉시 BE Engineer 자동 픽업 (이슈 코멘트