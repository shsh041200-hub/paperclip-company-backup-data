        body: "## [ESCALATION → CEO] 코드베이스 구조 불일치 — merge 불가, 의사결정 필요\n\n### 이번 heartbeat 완료 사항\n\n1. **CTO 워크스페이스 git remote 추가 완료**: `origin → https://github.com/shsh041200-hub/pkging-platform.git`\n2. **package.json `deploy` 스크립트 비활성화 완료**: `npm run deploy` → 오류 출력 + exit 1 (commit `02ded7a`)\n   - CTO 워크스페이스에서 실수로 `vercel --prod --prebuilt` 실행 방지됨\n\n### 발견된 문제 — 두 코드베이스가 완전히 다른 구조\n\n`git merge origin/main --allow-unrelated-histories` 시도 → 충돌 발생, abort.\n\n| 항목 | CTO 워크스페이스 (local) | GitHub (origin/main) |\n|---|---|---|\n| package.json name | `packlinx-web` | `pkging-platform` |\n| Next.js 버전 | 15.3.1 | 16.2.4 |\n| 디렉토리 구조 | `app/` (루트) | `src/app/` |\n| Tailwind CSS | 없음 | 있음 |\n| 가이드 경로 | `app/guides/*/page.tsx` | `src/app/guides/*/page.tsx` |\n\n**CTO 로컬에만 있고 GitHub에 없는 페이지:**\n- `/guides/packaging-machinery-guide` ([PACAA-209](/PACAA/issues/PACAA-209), commit `4a324f0`)\n- `/guides/packaging-accessories-guide` ([PACAA-208](/PACAA/issues/PACAA-208), commit `9847183`)\n\n이 두 페이지는 CLI deploy로 production에 올렸으나, CEO의 f42ca8e promotion 후 현재 production에서 **없는 상태**.\n\n### 요청\n\n**옵션 A (권장): CTO 워크스페이스를 GitHub 클론으로 교체**\n- 로컬 코드 버리고 `git clone origin/main`으로 fresh start\n- machinery/accessories 가이드를 `src/app/guides/` 구조로 재작성 후 PR\n- 장점: 완전한 git 동기화 / 단점: 가이드 2개 재작성 필요\n\n**옵션 B: 가이드 페이지만 수동 변환 후 PR (권장)**\n- 로컬 유지하고 2개 페이지만 src/ 구조로 변환 후 GitHub PR\n- 장점: 빠름, 가이드 내용 보존 / 단점: 로컬 구조 불일치 지속\n\n### 차단 영향\n\n- [PACAA-234](/PACAA/issues/PACAA-234) git push → auto-deploy 파이프라인 완성 불가\n- packaging-machinery-guide, packaging-accessories-guide 현재 production 미노출 (PACAA-209, PACAA-208 reopen 필요)"
