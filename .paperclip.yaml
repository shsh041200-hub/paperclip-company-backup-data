        body: "## PACAA-118 진단 완료 — 작업 스코프 재정의 필요\n\n### DB 진단 (2026-04-30 16:23 KST)\n\n| | |\n|---|---|\n| companies 총 | 1,396 |\n| `slug ~ -[0-9]+$` | **185** ✅ acceptance baseline |\n| 185 중 distinct base-slug | **185** (그룹 0) |\n| base-slug ↔ 기존 plain slug 충돌 | **0** |\n| `data_source` | 전부 `manual` |\n| `quality_score` | 전부 0.95 (비현실적 균일) |\n| phone+address 둘 다 null | **179 / 185** (96.8%) |\n| address-only | 6 / 185 |\n| `is_verified` | 1 / 185 |\n\n### 핵심 발견\n\n1. **185는 `슬러그 충돌 회피 흔적`이 아니다.** 모든 base-slug 가 unique 하고 plain-base 와의 충돌도 0건. 단일 manual batch 가 conflict 유무와 무관하게 `-NNNN` 을 균일 부착한 흔적.\n2. **task description 의 `같은 base-slug 끼리 group → canonical 선정` 단계가 적용 불가.** 그룹이 없음. → tiebreaker 알고리즘 (지역코드/사업자번호/카테고리 prefix) 도 불필요.\n3. **179/185 가 phone+address 둘 다 null 인 stub.** PACAA-78 (CEO 소프트 삭제 승인 대기 44건) 과 강한 overlap 가능성. 185 redirect 를 모두 만들었다가 다음 주 179 가 soft-delete 되면 redirect 는 dead weight.\n4. **slug_redirects 테이블 미존재** — 이 마이그레이션이 도입.\n\n### 단순화된 plan\n\n충돌이 없으므로 정책은 `strip -NNNN suffix → 301 redirect`. 의미 식별자 치환은 불필요.\n\n**Path A — 즉시 가능 (6 rows):** address 보유 6건은 strip + redirect 곧장 실행.\n\n**Path B — gate (179 stub):** PACAA-78 결과 대기.\n  - **CEO 가 soft-delete 승인 → strip 대신 hide.** redirect 불필요 (404 OK; Google 자동 removed 처리).\n  - **CEO 가 keep → strip + redirect** (Path A 와 동일).\n\n**Vendor profile route 미확인:** 이 워크스페이스 site/ 에는 `/keywords/[slug]` 만 존재. vendor `/companies/[slug]` 라우트는 별도 코드베이스 (CTO 도메인). Acceptance #2 (`curl -I` 200/301) 검증은 해당 앱에 redirect rule 이 추가된 후에만 가능. 현재로선 **slug_redirects 테이블이 source-of-truth**, 라우터/middleware 통합은 별 PR.\n\n### 의존성\n\n- **PACAA-116 (A)**: redirect target 의 URL 형태(raw UTF-8 vs percent-encoded) 결정 필요. ADR 채택 후 그 형태로 `to_slug` 저장.\n- **PACAA-78**: 179 stub 의 fate.\n- **import 모듈 위치 확인**: `plans/collect_vendors.py` 는 `vendor_candidates` (staging) 에 쓰고, `companies` 로 promote 하는 정규화 pipeline 은 이 워크스페이스에 없음. import-side `-NNNN` 회피 로직 + unit test (acceptance #3) 는 해당 코드 위치 확인 후.\n\n### 제출물\n\n- `plans/migration_pacaa118_slug_normalize.sql` (DRAFT, ROLLBACK 기본; collision/duplication assertion 포함)\n- `runs/2026-04-30-1623-decisions-pacaa118.md`\n\n### 다음 액션 (CEO/CTO 확인 필요)\n\nrequest_confirmation 따로 생성 — 1) Path A (6 rows) 즉시 실행 OK?, 2) 179 stub 은 PACAA-78 결정 대기?, 3) import 코드 위치 포인터.\n\n— Backend Engineer"
