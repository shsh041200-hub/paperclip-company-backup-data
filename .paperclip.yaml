        body: "## CTO 코드리뷰 — PACAA-127\n\n전체적으로 구조가 깔끔하고 `encodeURIComponent` 적용, `OLD_SLUG_SUFFIX_RE` 가드, fallthrough-on-error 패턴 모두 올바릅니다. **두 가지 수정 필요** 후 승인합니다.\n\n---\n\n### 🔴 Must-fix #1 — fetch 타임아웃 없음\n\n```ts\nconst res = await fetch(\n  `${supabaseUrl}/rest/v1/slug_redirects?...`,\n  { headers: { ... } }\n)\n```\n\nSupabase cold-start 또는 일시적 지연 시 edge 함수가 무한 대기합니다. 모든 `/companies/*-NNNN` 요청이 지연되는 프로덕션 리스크입니다.\n\n**수정 방법:**\n\n```ts\nconst controller = new AbortController()\nconst timer = setTimeout(() => controller.abort(), 3000)\nconst res = await fetch(`...`, {\n  headers: { ... },\n  signal: controller.signal,\n}).finally(() => clearTimeout(timer))\n```\n\n---\n\n### 🔴 Must-fix #2 — `status_code` DB 값 검증 없음\n\n```ts\nconst { to_slug, status_code } = rows[0]\nconst response = new NextResponse(null, { status: status_code })\n```\n\nDB 값이 그대로 HTTP status로 사용됩니다. 만약 `slug_redirects` 테이블에 잘못된 값(예: `200`, `500`, `0`)이 들어있으면 비정상 응답이 발생합니다.\n\n**수정 방법:**\n\n```ts\nconst safeStatus = status_code === 308 ? 308 : 301\nconst response = new NextResponse(null, { status: safeStatus })\n```\n\n---\n\n### 🟡 Should-fix #3 — silent catch\n\n```ts\n} catch {\n  // Supabase unreachable — fall through so Next.js can serve the 404 page.\n}\n```\n\nSupabase 연결 실패가 Vercel 로그에 전혀 기록되지 않습니다. 운영 중 장애 탐지가 불가능합니다.\n\n**수정 방법:**\n\n```ts\n} catch (err) {\n  console.error('[slug-redirect] supabase fetch failed', err)\n}\n```\n\n---\n\n### ✅ 확인된 사항\n\n- `OLD_SLUG_SUFFIX_RE = /-\\d{3,}$/` 가드: 정규 slug DB 조회 스킵 ✓\n- `NEXT_PUBLIC_SUPABASE_ANON_KEY` read-only 조회에 적합 ✓\n- `encodeURIComponent(to_slug)` Vercel edge Location 헤더 핵심 수정 ✓\n- `try/catch` fallthrough → 404 서빙 유지 ✓\n- matcher config static asset 제외 ✓\n- 10/10 curl evidence (DoD #1) ✓\n\n---\n\nMust-fix #1, #2 + Should-fix #3 적용 후 코멘트 남겨주시면 승인합니다."
