        body: "## Option A 실행 가이드 (보드)\n\n선택 경로: **A — packlinx 프로젝트에서 신규 GOOGLE_API_KEY 발급 + Backend Engineer 주입**. interaction `confirmation:PACAA-237:option-a-keyrotate:v1` Accept 전 두 단계 모두 완료해주세요. 비용 0원, 소요 ~3분.\n\n---\n\n## 1단계 — GCP Console 에서 신규 API 키 생성\n\n### 1-A. Credentials 페이지 직접 링크\nhttps://console.cloud.google.com/apis/credentials\n\n로그인 후, 상단 검은 바 좌측 프로젝트 picker 가 **`packlinx`** 인지 확인. 다른 프로젝트면 picker 클릭 → packlinx 선택.\n\n**Before signal:** 페이지 제목 \"사용자 인증 정보\" / \"Credentials\". 표에 기존 키들이 보임.\n\n### 1-B. 새 API 키 생성\n- 상단 파란색 **\"+ 사용자 인증 정보 만들기\"** / **\"+ CREATE CREDENTIALS\"** 클릭.\n- 드롭다운 → **\"API 키\"** / **\"API key\"** 선택.\n- 모달 팝업 \"API 키가 생성되었습니다\" 에서 **키 값 (`AIzaSy...`) 을 복사**. 이 화면 닫으면 키는 다시 안 보임 (다만 키 자체는 credentials 목록에 남음).\n\n**After signal:** 모달에 \"API 키 1\" 같은 이름 + `AIzaSy...` 키 값 표시. 복사 아이콘 클릭 → 클립보드에 키 저장.\n\n### 1-C. (권장) 키를 Custom Search API 로 제한\n같은 모달에서 **\"키 제한\"** / **\"RESTRICT KEY\"** 클릭, 또는 모달 닫고 credentials 목록에서 새 키 클릭.\n- **API 제한사항** 섹션 → \"키 제한\" 선택 → 드롭다운에서 **\"Custom Search API\"** 만 체크.\n- 하단 **저장** / **SAVE**.\n\n**Why:** 이 키가 유출돼도 다른 GCP API (Maps, Vision 등) 비용 폭주 방지. 과거 PACAA-237 GOOGLE_API_KEY 노출 사고 hardening.\n\n**After signal:** 키 상세 페이지에 \"API 제한사항: 1개 API\" 표시.\n\n---\n\n## 2단계 — Paperclip 보드 → Backend Engineer adapterConfig.env 갱신\n\n### 2-A. Backend Engineer 에이전트 설정 진입\n- 보드 대시보드 → 에이전트 목록 → **Backend Engineer** (id `3177894b-a1ee-4d88-8aa1-ba902b01f141`) 클릭.\n- Settings / 설정 → **adapterConfig.env** 섹션 (또는 \"환경 변수\" / \"Secrets\").\n\n### 2-B. GOOGLE_API_KEY 갱신\n- 기존 `GOOGLE_API_KEY` row 의 값을 1단계에서 복사한 새 키 (`AIzaSy...`) 로 교체. 없으면 새 row 추가.\n- **저장** / **Save**.\n\n**Why 코멘트 금지:** 비밀값은 adapterConfig.env 직접 주입만. 코멘트는 영구 보관 + 검색 가능 → 노출 위험. (PACAA-237 이전 사고 재발 방지)\n\n**After signal:** adapterConfig.env 화면에 GOOGLE_API_KEY row 가 마스킹된 상태 (`AIza••••••`) 로 표시.\n\n---\n\n## 3단계 — Accept\n\n위 1, 2 둘 다 완료 후 interaction Accept. CEO 가 즉시 PACAA-237 을 Backend (3177894b) 로 재할당해 re-smoke. 통과 시 Week 2 Google CSV row 가 채워지고 routine 정상화.\n\n## (옵션) 선택적 정리\n\nre-smoke 통과 확인 후, 구 키 (AIzaSy...cpA, packlinx 외 프로젝트 소속) 는 안전하게 비활성화/삭제 가능. CEO 가 별도 follow-up 로 cleanup ticket 발의.\n\n## Decline 사유 옵션\n- 1단계 실패: 모달이 안 뜸 / 권한 부족 / 키 생성 차단됨\n- 2단계 실패: adapterConfig 화면 못 찾음 / 저장 안 됨\n- 다른 사유\n\nDecline + 사유 코멘트 → CEO 가 트리아지."
