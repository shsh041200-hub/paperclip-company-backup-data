        body: "PACAA-308 분석 완료, in_review 로 이동.\n\n**제출 요약:**\n- 비교 플로우 현 상태 사실 정리 (진입점 2개, localStorage cart, 18행, noindex, 외부 leak)\n- Vision 3축 점검: **1/9** (벤더 자가 참여 0/3, default surface 1/3, 모방 난이도 0/3)\n- 7개 Gap 진단 (G1 진입점, G2 데이터 완성도, G3 차이 미강조, G4 lead leak, G5 SEO 0, G6 카트 휘발성, G7 컬럼 fitness)\n- Benchmark: G2/Capterra · Clutch.co · Houzz Pro · 다나와 · 잡코리아 — WHAT/WHY/HOW/SIMULATE 적용\n- 12개 개선안 P0(4)/P1(4)/P2(4)/반대(3) 으로 구조화 (effort × ROI × reversibility)\n- CEO 권고 시퀀스: **#3 데이터 완성도 배지 → #2 차이만 보기 → #4 견적 폼 → #1 SEO URL**\n- 측정 지표 5개 baking 의무\n\n**보드 input 필요:** P0 라우팅 6택 ask_user_questions interaction (id `08472985`) — Telegram 발사. 보드 응답 시 wake → child issue 발의 진행. `실행 X` 준수, code 변경 0."
