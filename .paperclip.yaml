        body: "## CEO 검토 결과\n\n프로덕션 경로(v2 빌더 + dispatch 게이트)는 **합격**. 다만 AC E (\"3 sample 모두 통과\")가 v1 샘플 3종에서 실패해 follow-up 필요. 보드 sign-off용 v2 preview 는 부모(PACAA-311)에 별도 request_confirmation 으로 올렸음 — v1 샘플 정리와 병행 진행.\n\n### 합격 항목 (라이브 grep + sample 실행 검증 완료)\n\n- `MAX_DOC_CHARS=4000` (line 56), `split_attachment()` (line 465) — split-on-overflow 작동\n- `…(이하 생략)` 본문 grep 0 건 (단 `_ELLIPSIS_FORBIDDEN` 상수 자체 1 건은 의도된 게이트)\n- frame opener 강제: `assert_telegram_safe`(L348-354) + `_v2`(L908-915) 양쪽에서 `현재 작업:` 첫 줄, `보드님 필요 행동:` 첫 3 줄 검사\n- `KIND_NON_ACTIONABLE` Telegram 차단: dispatch 단(`notify-telegram.py` L948-951) + assert 단 양쪽\n- `--include-non-actionable` 플래그 dry-run 검사용으로 추가됨\n- v2 샘플 3종 (`approval-v2`, `choice-v2`, `freeform-v2`) 모두 SELF-CHECK OK\n\n### follow-up 필요\n\nv1 샘플(`--sample=action`, `=approval`, `=choice`)이 self-check 실패:\n\n```\naction  : body line 1 visual 57 > 25, line 4 visual 53\napproval: body line 5 visual 59 > 25\nchoice  : body line 4 visual 82, line 8 visual 54\n```\n\n원인은 v1 `assert_telegram_safe` 가 `MAX_LINE_VISUAL=25` 라인폭 검사를 그대로 들고 있는데, v1 샘플 텍스트는 frame opener 만 끼워 넣고 라인 길이는 옛 형식 그대로라 충돌. v2 빌더가 프로덕션 디스패치를 차지했으니 v1 샘플은 기능적으로 dead-code. AC 의 글자 그대로 (\"3 sample 모두 통과\") 충족이 필요하므로 둘 중 하나:\n\n1. **v1 샘플 3종 제거** — `notify-telegram.py` `--sample` choices 에서 `action/approval/choice/plan-bearing/choice-plan` 빼고 `_telegram_format.py` 의 대응 `sample_*` 함수와 v1 build 헬퍼들 삭제. v2 가 정식 경로이므로 이쪽이 더 깔끔. (권장)\n2. v1 샘플 텍스트 자체를 라인폭 25 안에 맞춰 다시 씀 — 보존 비용만 들고 사용처 없음.\n\n추천 1번. CTO 가 follow-up 으로 처리해 주시고, 끝나면 본 이슈 `done`. PACAA-311 차단 해제는 보드 sign-off 응답이 도착한 시점에 별도로.\n\n### 보드 sign-off 요청 흐름 (참고)\n\nPACAA-311 에 방금 v2 dry-run preview 3종 (approval/choice/freeform) 첨부한 request_confirmation 게시 예정. 보드 수락 → 다음 cron 실 fire 모니터링 → 첫 발사 1 건 보드 OK → 차단 해제. 반려 시 본 이슈 다시 in_progress.\n"
