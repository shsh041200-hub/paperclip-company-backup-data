        body: "## packlinx-api.com 활용도 검토 (라이브 audit)\n\n### ✅ 활용도: 매우 높음 (핵심 인프라)\n- **유일 활성 서브도메인**: `paperclip-api.packlinx-api.com` (HTTPS 200, version 2026.512.0)\n- **호스팅 서비스**: Paperclip 컨트롤 플레인 (REST API + Dashboard SPA)\n- **트래픽 패턴**: 모든 agent (CEO/FE/BE/CMO/CTO/Legal/PM/Designer 등 ~15+) 가 매 wake 마다 task/comment/interaction/checkout 통신 → 일 수천 콜 추정\n- **현재 모드**: `deploymentExposure: \"private\"`, `local_trusted` — 즉 보드 신뢰 환경 전용\n\n### ⚠️ 비효율 신호\n1. **네이밍 중복**: `paperclip-api.packlinx-api.com` 에 \"api\" 두 번. 자연스러운 형태는:\n   - `packlinx-api.com/api/...` (apex 활용)\n   - `api.packlinx-api.com` (단일 api 접두)\n   - `api.packlinx.com` (메인 도메인 서브, 새 도메인 불필요)\n\n2. **apex 미사용**: `https://packlinx-api.com` → **NXDOMAIN**. 도메인 루트 등록도 안 됨. 별도 SLD 인데 1 서브만 쓰는 패턴.\n\n3. **probe한 9개 서브도메인 (api/www/app/dashboard/telegram/webhook/n8n/grafana/metrics/status) 모두 NXDOMAIN** → 향후 확장 계획 없거나 미실현\n\n4. **별도 SLD 의 장점이 활성화 안 됨**:\n   - end-user 노출 0 (브랜드/SEO 가치 없음)\n   - CORS 격리는 packlinx.com 서브도메인으로도 가능 (`Set-Cookie Domain` 분리)\n   - 도메인 단위 차단 필요성도 낮음\n\n### 📊 Lock-in 분석 (마이그레이션 cost)\n- 변경 필요한 활성 config: **2곳**\n  - `~/.paperclip/instances/default/.env` → `PAPERCLIP_PUBLIC_URL`\n  - `~/.paperclip/instances/default/config.json` → `allowedHostnames`\n- 기타 80건 refs 대부분 Journal/로그/백업 (변경 불필요)\n- 작업 시간: ~30분 (env+DNS+서버 restart+agent reboot)\n- 다운타임: 5~15분 (DNS TTL 의존)\n\n### 💰 비용 평가\n- 현재: $9.77/yr (CF 도매가)\n- 대안 `api.packlinx.com` 서브도메인: **$0/yr 영구**\n- 절감액 vs 작업 부담 → ROI 마진 작음 (1년치 = 1만원대)\n\n### 🚦 추천\n**상태 유지 (option C 적절)** — 이미 auto-renew ON, 운영 안정. 다만:\n- **2027-04-01 routine**: 만료 1개월 전 \"마이그레이션 vs 갱신\" 재평가 알람 등록 추천\n- 그 시점에 `api.packlinx.com` 으로 옮길지 판단 → 옮기면 만료 방치 = 영구 절감\n- 지금 즉시 마이그레이션은 ROI 부족\n\n### ❓ 미검토 (CF API 토큰 필요)\n- Cloudflare WAF / Rate Limit / Cache 규칙 적용 여부\n- 실제 트래픽 분석 (CF Analytics)\n- TLS 인증서 만료/갱신 자동화 상태\n\n→ CF 토큰 받으시면 위 3개 추가 audit 가능. 지금은 외부 probe 한계까지가 끝.\n\n2027-04-01 routine 등록할까요? (만료 1개월 전 마이그레이션 vs 갱신 자동 알람)"
