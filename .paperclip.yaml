        body: "## v2 final — Phase 4 A/B/C 임계값 (CEO 추천)\n\n보드 결정 1·2 채택 확인. **결정 3 (Phase 4 기준 명시)** 추천 수치 아래.\n\n전체 §10: `$AGENT_HOME/plans/PACAA-166/event_based_wake_analysis_v2.md`.\n\n---\n\n## §10.2 임계값 추천\n\n### Option 1 재고 트리거 (다음 중 ≥ 1 충족 시)\n\n| 차원 | 임계값 | 근거 |\n|---|---|---|\n| **A. 자동화 부족** | **≥ 8건/월** (3개월 평균 OR 단일월) | v1 baseline ~5건/월 lag (§3.4). +60% 초과 = 시스템 본질적 부족 시그널. |\n| **B. 외부 관리 부담** | **> 4h/월** (2개월 연속) | v1 추정 ~1h/월 (§3.5). 4배 초과 시 break-even 1개월대로 단축. |\n| **C. 사고** | **≥ 1 High-impact OR ≥ 3 Low-impact (단일월)** | Low 3건 = 결함 패턴화. High 1건 = 보드 신뢰 영향 직접. Catastrophic 은 별도. |\n\n### Option 3 유지 게이트 (모두 충족 시)\n\n- A < 5건/월 (3개월 평균)\n- B ≤ 2h/월 (3개월 평균)\n- C: 사고 0건 (3개월 누적)\n\n### Grey zone\n\n어느 하나라도 grey zone (A 5~7, B 2~4h, C low 1~2) 진입 시 → Phase 3 soak 1개월 연장 후 재측정. 연장 후에도 grey zone 유지 시 보드 결정.\n\n### Catastrophic 예외 (게이트 무력화)\n\n- Catastrophic 사고 (runaway wake loop / 시스템 마비 / 보드 신뢰 붕괴급) 1건 = **즉시 Phase 3 종료 + Option 1 escalation**. Soak 데이터 무관. Kill switch 동시 작동.\n\n---\n\n## §10.1 측정 정의 핵심\n\n- **A 자동화 부족 ≠ 정상 lag.** A = wake 가 발생해야 했으나 (a) 발생 안 함 OR (b) lag > 6h 로 보드/CEO 수동 wake 필요. Category A (시간 의존 작업) 정상 대기 제외.\n- **C 사고 ≠ A lag.** A = 시스템 정상 작동했지만 느림. C = 시스템 잘못 작동 (오발사 / runaway / audit 누락 등).\n- **B 측정.** CEO Journal `[wake-ops] N분` prefix 작업 시 즉시 기록 → 월말 합산.\n\n---\n\n## §10.3 측정 도구\n\n| 도구 | 책임자 | 산출물 |\n|---|---|---|\n| `runs/wake_audit-YYYY-MM-DD.jsonl` | CEO (자동, worker/routine 기록) | 매 fire / 수동 wake / 사고 row |\n| Journal `[wake-ops] N분` | CEO (수동) | 월간 부담 합산 |\n| 월간 리포트 | CEO routine (PACAA-53/54 cadence) | A/B/C 카운트 + 추세 + grey zone 알람 |\n\n---\n\n## §10.4 Phase 4 결정 절차\n\n1. **Phase 3 종료 트리거** (cron `Phase 3 시작 + 60일`) → CEO routine 자동 wake.\n2. **CEO 가 직전 3개월 A/B/C 데이터 종합 → §10.2 게이트 매칭.**\n3. **결정 옵션:** (유지 게이트 충족) Option 3 영구 + PACAA-161 deferred archive 동시. (재고 트리거 충족) Option 1 plan v3 → 보드 사인오프 → Option 1 child issue. (grey zone) Phase 3 1개월 연장.\n4. **보드 사인오프 후** Phase 4 액션 진행.\n\n---\n\n## deferred_items.md 등록 (보드 요청 반영)\n\n신규 row 추가:\n- **항목:** PACAA-166 Phase 4 재고 결정.\n- **트리거:** STATE Phase 3 soak 종료 + 직전 3개월 A/B/C 집계 완료. DATE 2026-07-01 backstop.\n- **소유:** CEO (proposed → 본 confirmation accept 시 confirmed).\n- **노트:** §10.2 매칭 → 3 분기 결정 + Catastrophic 즉시 escalation.\n\n---\n\n## 사인오프 청구 — v2 final\n\n결정 1 (Option 3 채택, 보드 사실상 확정) + 결정 2 (paradigm 관계 진단, 보드 사실상 확정) + 결정 3 (§10 Phase 4 기준 — A ≥ 8건/월 / B > 4h/월 / C ≥ 1 High OR ≥ 3 Low / Catastrophic 즉시 escalation) **합쳐서 confirm 청구**.\n\nrequest_confirmation interaction (idempotencyKey `confirmation:PACAA-166:plan:v2-final`).\n\n## 사인오프 후 즉시 다음\n\n1. PACAA-166 child issue \"이벤트 wake 시스템 Phase 1 구축\" 분리 (CEO + Backend Eng on Cloudflare Worker).\n2. Phase 1 ~2주 → Phase 2 카나리 ~1주 → Phase 3 soak ~1.5개월 → Phase 4 평가."
