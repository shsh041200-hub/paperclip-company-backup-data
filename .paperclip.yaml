        body: "## §6.3 SERP 검증 — 방법론 v1 + 분담 결정\n\n**ack**: PACAA-91 v1.1-final 사인오프 확인. PACAA-93 이미 in_progress (status 정상). 44 키워드 슬레이트 수령.\n\n---\n\n### 결정 (CEO)\n\n**분담:** 보드 (founder) 가 실제 한국 Naver/Google 세션에서 raw SERP top 10 페이지 유형을 카운트로 입력 → CEO 가 경계 케이스 재판정 + 최종 verdict 결정 + Backend 전달.\n\n**근거:**\n- 에이전트 CEO 의 WebFetch / WebSearch 가 Naver / Google 한국어 SERP 를 가져오지 못함 (이번 heartbeat 검증). Naver: 차단. Google KR: 빈 응답.\n- Chrome MCP 는 보드 브라우저 세션 의존이라 88 회 자동화는 fragile + 캡차 위험.\n- 보드 직접 입력은 ~90분 1회분 (44 × 2 엔진 × 60초). CEO 가 88 SERP URL 을 자동화로 잡는 것보다 정확하고 빠르며, \"도메인 판단\" 의 본질에 더 부합.\n\n---\n\n### 산출물\n\n- **방법론 v1**: `plans/PACAA-93/methodology_v1.md` (CEO workspace)\n- **CSV 스캐폴드**: `plans/PACAA-93/serp_classification_v1.csv` — 44행, 16 컬럼 (Naver D/V/M/B/O 카운트 + dominant domain, Google 동일, verdict, note) 비어있음\n\n### 분류 라벨 (rubric 요약)\n\n- D = Directory / List (다수 vendor 비교·집계)\n- V = Vendor (단일 vendor 자체 사이트)\n- M = Marketplace listing (네쇼핑·11번가·쿠팡 단일 상품/카테)\n- B = Blog / News / Q&A\n- O = Other / 광고 제외\n\n### 판정 규칙\n\n- D ≥ 3 (둘 중 한 엔진) → KEEP\n- 어느 엔진도 D ≥ 3 미달 + 동일 도메인 V ≥ 4 → REPLACE\n- M ≥ 6 → MARKETPLACE-DOMINANT (KEEP, 랜딩 차별화 필수)\n- 그 외 → REVIEW (CEO 수동 재판정)\n\n---\n\n### 다음 단계\n\n1. 보드 방법론 + 분담 승인 (request_confirmation 별도 게시 예정)\n2. 승인 후 보드 csv 입력 (~90분, 분할 가능)\n3. CEO 가 verdict 컬럼 채우고 REPLACE / MARKETPLACE 키워드 명단 PACAA-86 / PACAA-94 로 전달\n4. PACAA-93 done\n\n---\n\n### 대안 제시 (보드 거부 시 선택)\n\n(b) 보드는 SERP URL/스크린샷만 제공 (~30분), CEO 가 1~2 heartbeat 에 분류\n(c) 보드가 Chrome 세션 attach 후 CEO 가 Chrome MCP 로 자동화 (실패 위험)\n\n---\n\n본 코멘트 직후 request_confirmation 게시. 답변 전 까지 PACAA-93 wait.\n"
