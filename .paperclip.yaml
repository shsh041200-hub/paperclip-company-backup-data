        body: "## Legal 권고 적용 완료 — post-Legal 최종 콘텐츠 inline 게시\n\n[PACAA-440](/PACAA/issues/PACAA-440) Legal Counsel 자문 검토 완료. 수정 권고 5건을 `content/phase2-batch2.md`에 반영했습니다.\n\n---\n\n## Legal 수정 내역 (5건)\n\n| # | 가이드 | 수정 전 | 수정 후 | 근거 |\n|---|--------|---------|---------|------|\n| 1 | eco-friendly-packaging | end-CTA subtitle: \"FSC·GRS 인증 업체, 소재·MOQ·납기 조건으로 필터 비교\" | \"FSC·GRS 인증 여부 표시 업체, 발주 전 인증서 직접 확인 필요\" | Packlinx가 인증 사실을 확약하는 톤 제거 → 검증 책임이 발주자에 있음 명확화 |\n| 2 | label-printing-guide | TL;DR: \"「식품표시법」\" | \"「식품표시광고법(식품 등의 표시·광고에 관한 법률)」\" | 존재하지 않는 법령명 오기 수정 (2019년 시행 분리 법령 정확 표기) |\n| 3 | label-printing-guide | Callout warn: \"식품표시법에 따라\" | \"식품표시광고법에 따라\" | 법령명 오기 수정 (일괄 교체) |\n| 4 | label-printing-guide | FAQ Q2: \"글자 크기(최소 8포인트 이상), 색상 대비, 위치 기준도 규정되어 있습니다\" | \"글자 크기는 표시 면적·항목별로 식약처 「식품등의 표시기준」이 차등 규정합니다(일반적으로 한글 10포인트 이상, 표시 면적 협소 시 별도 완화 기준 적용). 구체적 수치는 식약처 고시를 직접 확인하거나 라벨 인쇄 업체에 식품표시광고법 검수를 요청하세요.\" | 하한 일부만 인용한 부정확한 의무 기준 유포 방지 (10포인트 기본, 협소 면적 완화 기준 병기) |\n| 5a | plastic-container-guide | Callout warn: \"PC(폴리카보네이트)는 비스페놀 A 용출 우려로 식품 직접 접촉용 사용이 제한됩니다\" | \"PC는 영유아용 젖병에는 사용이 금지되어 있고, 일반 식품 접촉 용기에 사용할 경우 비스페놀 A 용출 규격(식약처 고시 기준)을 충족해야 합니다\" | PC가 광범위하게 위법한 것처럼 오인 유도 제거 (영유아용 젖병 한정 금지 사실 정확 표기) |\n| 5b | plastic-container-guide | FAQ Q1: \"PC(폴리카보네이트)는 비스페놀 A 용출 우려로 식품 접촉용 사용이 제한됩니다\" | 동일 수정 적용 | 동일 |\n\n**무수정 가이드:** `packaging-material-complete-guide` (리스크 낮음), `flexible-packaging-guide` (리스크 낮음)\n\n---\n\n# Phase 2 batch 2 — 소재 5개 가이드 v1 콘텐츠 (Legal 반영 최종본)\n\n작성일: 2026-05-10 | Legal 자문: [PACAA-440](/PACAA/issues/PACAA-440) | FE: [PACAA-441](/PACAA/issues/PACAA-441)\n\n---\n\n## guide: eco-friendly-packaging\n\n### TL;DR\n- **FSC·GRS 인증 확인이 첫 단계** — 공급 업체에 인증서 사본을 요청해 인증 범위를 검증합니다.\n- **전환 비용 20~40% 상승** — FSC 인증 원지·재생 PET(rPET)는 일반 소재 대비 단가가 높습니다.\n- **ESG 공시 로드맵 6~18개월** — 소재 전환 → 인증 확보 → ESG 보고 순으로 진행합니다.\n\n### Callouts\n1. **info** — 포장재 친환경 인증 체계 / FSC는 산림 관리, GRS는 재생 원료 비율, 생분해 인증은 TÜV Austria OK Compost 또는 KS M ISO 17088 기준입니다. 인증 유형마다 적용 범위가 다르므로 소재 선택 전 인증서 적용 범위를 반드시 확인하세요.\n2. **warn** — \"생분해\" 표시 규제 주의 / 국내 표시광고법 §3에 따라 공인 시험 성적서 없는 \"생분해\" 표시는 부당 표시에 해당할 수 있습니다. 납품 업체에 EN 13432 또는 KS M ISO 17088 생분해 인증 성적서를 반드시 요청하세요.\n3. **tip** — 단계별 전환 전략 / 물량이 많은 외포장 1종부터 파일럿 전환 후 인증서 확보와 ESG 문서화를 병행하는 단계별 접근을 권장합니다.\n\n### Checklist\n- **인증서 수집** — 공급 업체 FSC·GRS·생분해 인증서 사본 및 범위 확인\n- **소재별 TCO 산출** — 일반 소재 대비 전환 소재 총비용(단가·MOQ·납기) 비교\n- **수급 리드타임 확인** — 친환경 소재 조달 추가 리드타임(최대 2~4주) 파악\n- **ESG 보고 데이터 항목 정의** — GRI 301 또는 TCFD 기준 필요 데이터 목록 작성\n- **파일럿 발주 검수** — 샘플 수령 후 강도·인쇄 품질·인증 실물 확인\n\n### FAQ\n**Q:** 친환경 포장재로 전환하면 비용이 얼마나 오르나요?\n**A:** FSC 인증 원지 골판지 박스는 일반 박스 대비 약 15~25%, GRS 인증 재생 PET(rPET)는 버진 PET 대비 약 10~20%, PLA 생분해 필름은 일반 PE 필름 대비 30~50% 단가가 높습니다. 소재·MOQ·공급 업체에 따라 폭이 크므로 Packlinx에서 복수 견적을 비교하시기 바랍니다.\n\n**Q:** FSC 인증과 GRS 인증의 차이는 무엇인가요?\n**A:** FSC(Forest Stewardship Council)는 산림의 지속가능한 관리를 인증하며 원지·종이 기반 소재에 주로 적용됩니다. GRS(Global Recycled Standard)는 재생 원료 함량과 공급망 투명성을 인증하며 재생 PET·PP·골판지 등에 적용됩니다. 인증 업체 선정 기준은 [/guides/corrugated-box-supplier-selection]을 참고하세요.\n\n**Q:** PLA 생분해 포장재, 국내에서 실제로 처리되나요?\n**A:** PLA는 산업적 퇴비화 조건(60°C 이상)에서 생분해되며, 일반 매립이나 가정 퇴비화에서는 분해가 매우 느립니다. 국내 산업 퇴비화 시설이 제한적이므로 PLA 도입 전 실제 처리 경로를 사전에 확인하세요.\n\n**Q:** ESG 보고서에 포장재 전환 실적을 어떻게 기재하나요?\n**A:** GRI 301(소재) 기준에 따라 재생·인증 소재 비율(%)과 탄소 배출 절감량(tCO₂e)을 기재합니다. 공급 업체에서 LCA 데이터 또는 인증서를 받아 근거 자료로 보관하세요. 2026 패키징 트렌드는 [/guides/2026-korea-packaging-trends]에서 확인하세요.\n\n### Sidebar 관련 가이드\n- /guides/packaging-material-complete-guide — 골판지·단프라·친환경 소재 종합 비교 ⏱ 6분\n- /guides/food-packaging-materials — 식품 포장재 위생·인증 기준 가이드 ⏱ 5분\n- /guides/2026-korea-packaging-trends — 2026 한국 패키징 트렌드 리포트 ⏱ 7분\n- /guides/flexible-packaging-guide — 파우치·필름 연포장 소재 선택 가이드 ⏱ 5분\n\n### end-CTA\n- title: 친환경 포장재 업체 바로 비교\n- subtitle: FSC·GRS 인증 여부 표시 업체, 발주 전 인증서 직접 확인 필요 ← **Legal 수정 #1**\n- href: /products/box\n\n---\n\n## guide: packaging-material-complete-guide (무수정)\n\n### TL;DR\n- **골판지·단프라·연포장** — 소재 선택은 내용물 무게·방습·인쇄 요건 3가지로 결정합니다.\n- **소재별 MOQ 3~10배 차이** — 단프라·알루미늄 라미네이트는 골판지 대비 MOQ가 높습니다.\n- **복합 소재 전환 시 Total Cost 계산** — 단가만 비교하면 납기·형판비 차이를 놓칩니다.\n\n### Callouts\n1. **info** — 소재별 특성 한눈에 비교 / 골판지는 압축 강도·인쇄 적합성이 우수하고, 단프라(PP 골판지)는 방습·내구성, 연포장 필름은 밀봉성·중량 절감에 강점이 있습니다. 용도별 최적 소재를 선택하려면 내용물 물성(무게·수분·기체 차단 요건)을 먼저 정의하세요.\n2. **warn** — 소재 변경은 인증 재검토 필요 / 식품·의약품 포장재는 소재를 변경하면 식약처 기준 재확인 및 이행성 시험이 필요합니다. 소재 전환 전 반드시 현행 인증 서류가 새 소재에도 적용되는지 확인하세요.\n3. **tip** — 소량 다품종 발주 시 소재 통합 / 여러 SKU의 포장재 소재를 통합하면 발주 수량이 늘어 MOQ를 충족하기 쉽고 단가 협상력이 높아집니다.\n\n### Checklist\n- **내용물 물성 정의** — 무게·수분·기체 차단 요건·내열 조건 문서화\n- **법정 인증 요건 확인** — 식품·화장품·의약품 포장 시 소재별 식약처 기준 검토\n- **MOQ·납기 비교** — 소재별 제조사 MOQ 및 생산 리드타임 일람표 작성\n- **형판비·초기 비용 산출** — 맞춤 소재·연포장 형판비를 TCO에 포함\n- **친환경 전환 가능 여부** — FSC·GRS 인증 소재 대체 옵션 및 단가 차이 확인\n\n### FAQ\n**Q:** 골판지와 단프라(PP 골판지) 중 어느 소재가 더 나은가요?\n**A:** 일반 배송용 박스에는 골판지가 원가 효율적입니다. 단프라는 방습·내구성이 필요한 냉장·냉동 물류, 반복 사용 박스에 적합하지만 단가가 2~3배 높습니다. 소재 선택 기준 상세 내용은 [/guides/eco-friendly-packaging]에서도 확인하세요.\n\n**Q:** 연포장(파우치·필름)과 경질 용기의 주요 차이점은 무엇인가요?\n**A:** 연포장은 중량이 가볍고 밀봉성·기체 차단이 우수하며 대량 생산에 유리합니다. 경질 용기는 보호력·재사용성이 높지만 금형 초기 비용이 큽니다. 연포장 소재 상세 선택 기준은 [/guides/flexible-packaging-guide]를 참고하세요.\n\n**Q:** 화장품 포장 소재 선택 시 주의할 점은 무엇인가요?\n**A:** 화장품 용기·포장은 「화장품법」에 따라 이물질 용출, 내용물 변질 방지 기준을 준수해야 합니다. 화장품 박스 구조와 후가공은 [/guides/cosmetic-packaging-box]에서 확인하세요.\n\n**Q:** 식품 포장재로 사용 가능한 소재는 어떻게 확인하나요?\n**A:** 식약처 「기구 및 용기·포장의 기준 및 규격」에서 식품 접촉 허용 소재를 확인하고, 업체에 KOLAS 인정 시험기관 발급 시험성적서를 요청하세요. 상세 기준은 [/guides/food-packaging-materials]를 참고하세요.\n\n**Q:** 소재 전환 시 발주 MOQ는 어떻게 맞추나요?\n**A:** 여러 SKU를 동일 소재로 통합하거나, 소량 맞춤 발주 옵션을 제공하는 업체를 Packlinx에서 찾아보세요. 소량 박스 발주 기준은 [/guides/small-quantity-custom-box]를 참고하세요.\n\n### Sidebar 관련 가이드\n- /guides/eco-friendly-packaging — FSC·GRS·생분해 인증 소재 전환 가이드 ⏱ 6분\n- /guides/flexible-packaging-guide — 파우치·필름 연포장 소재 선택 기준 ⏱ 5분\n- /guides/food-packaging-materials — 식품 포장재 위생·인증 기준 ⏱ 5분\n- /guides/corrugated-flute-types — A·B·C·E·F골 특성·용도 비교 ⏱ 5분\n\n### end-CTA\n- title: 소재별 포장재 업체 바로 비교\n- subtitle: 골판지·단프라·연포장 업체, 소재·MOQ·납기 조건으로 필터 비교\n- href: /products/box\n\n---\n\n## guide: flexible-packaging-guide (무수정)\n\n### TL;DR\n- **파우치·필름 선택은 내용물 기체 차단 요건이 핵심** — 산소 차단(OTR)·수분 차단(WVTR) 수치를 먼저 정의합니다.\n- **알루미늄 라미네이트 = 최고 차단성** — 커피·분말 식품 장기 보관에 최적, 단가는 PE 필름 대비 3~5배 높습니다.\n- **MOQ 3,000~10,000매** — 연포장 생산 특성상 소량 발주는 단가가 급격히 높아집니다.\n\n### Callouts\n1. **info** — 연포장 층 구조 이해 / 연포장 필름은 외층(인쇄·내마모)·중간층(차단)·내층(실링) 3층 구조로 구성됩니다. 차단 요건이 높을수록 중간층에 알루미늄 호일 또는 EVOH를 추가해 층수를 늘립니다. 층수가 늘어날수록 단가와 MOQ가 높아집니다.\n2. **warn** — 식품 용도 내층 소재 법적 요건 / 식품에 직접 접촉하는 내층 소재는 식약처 기준을 충족해야 합니다. PE·PP·PET 중에서도 등급·규격에 따라 허용 여부가 다르므로 발주 전 업체에 식품 접촉 이행성 시험 성적서를 반드시 요청하세요.\n3. **tip** — 파일럿 롤 선발주 권장 / 본 발주 전 소량 파일럿 롤(200~500m)로 인쇄 품질·밀봉 강도를 검수하면 대량 불량 리스크를 줄일 수 있습니다.\n\n### Checklist\n- **OTR·WVTR 기준 정의** — 내용물 유효기간 기준 산소·수분 차단 요건(cc/m²·day) 산출\n- **내층 소재 법적 요건 확인** — 식품·화장품 용도 시 식약처·화장품법 허용 소재 검토\n- **실링 방식 결정** — 3면·4면·스탠드업 파우치 구조 및 지퍼락·이지필 옵션 명시\n- **인쇄 도수·그라비아 형판비** — 4~8도 그라비아 기준 형판비(색상당 30~80만 원) 포함\n- **MOQ·발주 주기 계획** — 최소 발주량(3,000~10,000매) 충족을 위한 제품 SKU 통합\n\n### FAQ\n**Q:** 파우치와 비닐 봉지의 차이는 무엇인가요?\n**A:** 파우치는 복합 필름(2층 이상 라미네이트) 구조로 내용물 보호·차단 성능이 높고, 지퍼락·이지필 등 기능성 개봉 구조를 추가할 수 있습니다. 비닐 봉지는 단층 PE 필름으로 내용물 보호 기능은 낮지만 단가가 훨씬 저렴합니다.\n\n**Q:** 연포장 MOQ는 얼마나 되나요?\n**A:** 그라비아 인쇄 기준 3,000~10,000매가 일반적입니다. 무지(白) 또는 디지털 인쇄 방식을 사용하면 500~1,000매 소량 발주가 가능하지만 단가는 높아집니다. 소량 발주 옵션은 [/guides/small-quantity-custom-box]를 참고하세요.\n\n**Q:** 커피·분말 제품 장기 보관에 적합한 파우치 소재는 무엇인가요?\n**A:** 알루미늄 라미네이트(AL/PET/PE 구조)가 산소·수분·광선 차단 성능이 가장 높아 장기 보관에 적합합니다. 단가는 PE 단층 필름 대비 3~5배 높지만 유효기간 연장 효과로 총비용을 줄일 수 있습니다.\n\n**Q:** 친환경 연포장 소재로 전환할 수 있나요?\n**A:** GRS 인증 재생 PE·PP 필름이나 PLA·PBAT 혼합 생분해 필름으로 전환이 가능합니다. 단, 생분해 필름은 차단 성능이 일반 필름보다 낮고 MOQ·납기가 길어질 수 있습니다. 친환경 소재 전환 기준은 [/guides/eco-friendly-packaging]을 참고하세요.\n\n**Q:** 연포장 그라비아 인쇄 형판비는 얼마나 드나요?\n**A:** 색상당 30~80만 원이 일반적이며, 8도 풀컬러 기준 240~640만 원입니다. 형판은 동일 소재·색상 재주문 시 재사용 가능합니다. 인쇄 비용 절감 방법은 [/guides/packaging-printing-guide]를 참고하세요.\n\n### Sidebar 관련 가이드\n- /guides/packaging-material-complete-guide — 골판지·단프라·연포장 소재 종합 비교 ⏱ 6분\n- /guides/eco-friendly-packaging — FSC·GRS·생분해 인증 소재 전환 가이드 ⏱ 6분\n- /guides/food-packaging-materials — 식품 포장재 위생·식약처 기준 ⏱ 5분\n- /guides/packaging-printing-guide — 그라비아·플렉소·디지털 인쇄 비교 ⏱ 5분\n\n### end-CTA\n- title: 연포장 파우치 업체 바로 비교\n- subtitle: 파우치·필름 전문 업체, 소재·차단 규격·MOQ로 필터 비교\n- href: /products/film\n\n---\n\n## guide: label-printing-guide\n\n### TL;DR\n- **라벨 인쇄 3대 선택 기준** — 소재(PP·PE·PET·종이)·인쇄 방식(플렉소·디지털·오프셋)·후가공(코팅·형타) 순으로 결정합니다.\n- **소량 500장 이하 = 디지털 인쇄** — 형판비 없이 빠른 납기(2~3일)로 발주 가능합니다.\n- **식품·화장품 라벨은 법정 표시 확인 필수** — 「식품표시광고법(식품 등의 표시·광고에 관한 법률)」·「화장품법」 기재 의무 항목을 사전에 검토합니다. ← **Legal 수정 #2**\n\n### Callouts\n1. **info** — 라벨 소재별 용도 구분 / PP·PE 합성지는 방수·내구성이 우수해 음료·세제에, PET 투명 라벨은 투명 용기 무라벨 효과에, 종이 라벨은 인쇄 발색·친환경 이미지에 적합합니다. 냉장·냉동 보관 제품은 내한성 점착제 사양을 반드시 지정하세요.\n2. **warn** — 식품·화장품 라벨 법정 표시 의무 / 식품표시광고법에 따라 제조일·유통기한·알레르기 유발 물질·영양성분 등을 지정 크기·위치에 표시해야 합니다. 화장품은 전성분·사용기한·사용 방법이 필수 기재 항목입니다. 법정 항목 누락 시 회수·판매 중지 처분이 가능합니다. ← **Legal 수정 #3**\n3. **tip** — 바코드·QR 인쇄 해상도 사전 확인 / 바코드는 최소 300dpi, QR 코드는 400dpi 이상에서 스캐너 인식률이 안정됩니다. 인쇄 전 업체에 바코드 그레이딩 테스트(Grade C 이상)를 요청하면 유통 현장 불량을 사전에 방지할 수 있습니다.\n\n### Checklist\n- **법정 표시 항목 목록** — 식품·화장품·의약외품 관련 법령의 필수 기재 항목 사전 검토\n- **라벨 소재·점착제 사양** — 부착 환경(냉장·냉동·방수) 기준 소재·점착제 타입 명시\n- **인쇄 방식·수량 결정** — 500장 미만 디지털 / 이상 플렉소·오프셋 분기점 확인\n- **형타(다이컷) 형상** — 라벨 컷팅 형상 및 롤·시트 납품 형태 결정\n- **바코드 그레이딩 테스트** — 인쇄 후 스캐너 인식 테스트 업체 수행 여부 확인\n\n### FAQ\n**Q:** 라벨 인쇄 소량 발주 시 최소 수량은 얼마인가요?\n**A:** 디지털 인쇄 방식은 형판 없이 100~500장부터 발주가 가능합니다. 플렉소·오프셋은 형판비(색상당 10~30만 원)가 발생하여 500장 미만 발주 시 개당 단가가 크게 높아집니다. 발주 수량 기준에 따라 인쇄 방식을 선택하세요.\n\n**Q:** 식품 라벨 법정 표시 항목은 무엇인가요?\n**A:** 「식품표시광고법(식품 등의 표시·광고에 관한 법률)」에 따라 제품명·내용량·원재료·알레르기 유발 물질·영양성분·제조일(또는 유통기한)·제조업체 정보가 필수 기재 항목입니다. 글자 크기는 표시 면적·항목별로 식약처 「식품등의 표시기준」이 차등 규정합니다(일반적으로 한글 10포인트 이상, 표시 면적 협소 시 별도 완화 기준 적용). 구체적 수치는 식약처 고시를 직접 확인하거나 라벨 인쇄 업체에 식품표시광고법 검수를 요청하세요. ← **Legal 수정 #4**\n\n**Q:** 냉동 식품 라벨 소재는 어떤 것을 선택해야 하나요?\n**A:** 냉동(-18°C 이하) 환경에서는 내한성 PP 합성지 또는 PET 필름 라벨에 내한성 점착제를 조합해야 합니다. 일반 점착제는 저온에서 박리 현상이 발생합니다. 발주 전 업체에 냉동 내구성 테스트 결과를 요청하세요.\n\n**Q:** 투명 라벨과 일반 종이 라벨의 차이는 무엇인가요?\n**A:** PET·PP 투명 라벨은 용기에 부착했을 때 무라벨(no-label look) 효과를 줍니다. 음료·화장품 투명 용기에 적합하지만 발색이 종이 대비 다소 낮습니다. 종이 라벨은 인쇄 발색이 우수하고 친환경 이미지를 줄 수 있지만 방수 처리가 별도로 필요합니다.\n\n**Q:** 라벨 인쇄 후 후가공 옵션에는 어떤 것이 있나요?\n**A:** 유광·무광 코팅, 부분 UV 코팅, 엠보스(박), 홀로그램, 방수 라미네이트 등이 있습니다. 후가공은 개당 원가를 10~30% 높이지만 브랜드 고급감과 내구성을 향상시킵니다. 라벨 인쇄·후가공 업체 비교는 [/guides/packaging-printing-guide]를 참고하세요.\n\n### Sidebar 관련 가이드\n- /guides/packaging-printing-guide — 그라비아·플렉소·디지털 인쇄 비교 ⏱ 5분\n- /guides/food-packaging-materials — 식품 포장재 위생·인증 기준 ⏱ 5분\n- /guides/cosmetic-packaging-box — 화장품 박스 후가공·법정 표시 가이드 ⏱ 5분\n- /guides/flexible-packaging-guide — 파우치·필름 연포장 소재 가이드 ⏱ 5분\n\n### end-CTA\n- title: 라벨 인쇄 업체 바로 비교\n- subtitle: 라벨 전문 업체, 소재·인쇄 방식·MOQ 조건으로 필터 비교\n- href: /products/label\n\n---\n\n## guide: plastic-container-guide\n\n### TL;DR\n- **소재 선택 핵심 3가지** — 식약처 허용 소재 여부·내열 온도·투명도 요건으로 PET·PP·HDPE를 결정합니다.\n- **금형 초기 비용 300~1,000만 원** — 커스텀 용기는 금형비가 양산 단가와 별도 발생합니다.\n- **소량 발주 = 표준 금형 활용** — 기존 범용 금형 사용 시 500~1,000개 소량 발주가 가능합니다.\n\n### Callouts\n1. **info** — 소재별 내열·용도 기준 / PET는 투명도 높고 음료·식품 병에 적합하나 내열성이 낮습니다(70°C 이하). PP는 내열성이 높아(120°C) 전자레인지 용기에 적합합니다. HDPE는 세제·약품 등 화학 저항성이 필요한 용기에 사용됩니다. 식품 접촉 시 소재별 식약처 기준 충족 여부를 반드시 확인하세요.\n2. **warn** — PC 소재 식품 접촉 규격 주의 / PC(폴리카보네이트)는 영유아용 젖병에는 사용이 금지되어 있고, 일반 식품 접촉 용기에 사용할 경우 비스페놀 A 용출 규격(식약처 고시 기준)을 충족해야 합니다. 식품 포장 용도로 발주할 때 업체에 식약처 이행성 시험 성적서를 반드시 요청하세요. ← **Legal 수정 #5a**\n3. **tip** — 표준 금형으로 초기 비용 절감 / 커스텀 금형 없이 기존 범용 규격(원형·사각 트레이 등)을 사용하면 금형비 없이 500개 이상 소량 발주가 가능합니다.\n\n### Checklist\n- **소재·내열 온도 확정** — PET·PP·HDPE·PS 중 내용물·사용 환경 기준 소재 선택\n- **식약처 기준 확인** — 식품·화장품 용도 시 이행성 시험 성적서 업체 요청\n- **커스텀 vs 표준 금형 결정** — 맞춤 형상 필요 여부 및 금형 초기 비용 TCO 포함\n- **용량·두께 사양 확정** — 내용물 밀도·충전량 기준 내경·두께(mm) 명시\n- **뚜껑·마감 구조 결정** — 스크류캡·스냅캡·히트씰·압착 방식 중 선택\n\n### FAQ\n**Q:** 식품용 플라스틱 용기에 사용 가능한 소재는 무엇인가요?\n**A:** 식약처가 허용하는 식품 접촉 소재는 PET·PP·HDPE·PS(내열 등급) 등입니다. PC(폴리카보네이트)는 영유아용 젖병에 사용이 금지되어 있고, 일반 식품 접촉 용기에 사용할 경우 비스페놀 A 용출 규격(식약처 고시 기준)을 충족해야 합니다. 발주 전 업체에 KOLAS 인정 시험기관이 발급한 이행성 시험 성적서를 요청하세요. ← **Legal 수정 #5b**\n\n**Q:** PET 병과 PP 용기의 차이는 무엇인가요?\n**A:** PET는 투명도가 높고 음료·주스 병에 주로 사용됩니다. 내열성이 낮아(70°C 이하) 고온 충전 시 내열 PET가 필요합니다. PP는 반투명이며 내열성이 높아(120°C) 전자레인지 용기·반찬통에 적합합니다. 소재 종합 비교는 [/guides/packaging-material-complete-guide]를 참고하세요.\n\n**Q:** 커스텀 금형 제작 비용과 기간은 어떻게 되나요?\n**A:** 국내 사출 금형 기준 단순 형상은 300~800만 원, 복잡한 형상·핫런너 금형은 1,000만 원 이상이며 제작 기간은 4~8주입니다. 블로우 금형은 200~500만 원 수준입니다. 금형비는 초기 1회성 비용으로 양산 단가와 별도입니다.\n\n**Q:** 친환경 플라스틱 용기(rPET)로 전환 시 추가 비용은 얼마나 드나요?\n**A:** GRS 인증 재생 PET(rPET)는 버진 PET 대비 약 10~25% 단가가 높습니다. PLA 등 바이오플라스틱은 50~100% 이상 비용이 상승하고 산업 퇴비화 처리가 필요합니다. 친환경 소재 전환 전략은 [/guides/eco-friendly-packaging]을 참고하세요.\n\n**Q:** 소량(500개 미만) 플라스틱 용기 발주가 가능한가요?\n**A:** 기존 범용 표준 금형을 사용하면 500~1,000개 소량 발주가 가능합니다. 커스텀 금형이 필요한 경우 금형비 회수를 위해 최소 3,000~5,000개 이상 발주가 일반적입니다.\n\n### Sidebar 관련 가이드\n- /guides/packaging-material-complete-guide — 소재별 용도·MOQ·납기 종합 비교 ⏱ 6분\n- /guides/glass-metal-container-guide — 유리·금속 캔 용기 선택 가이드 ⏱ 6분\n- /guides/eco-friendly-packaging — rPET·생분해 소재 전환 인증 가이드 ⏱ 6분\n- /guides/food-packaging-materials — 식품 접촉 포장재 식약처 기준 ⏱ 5분\n\n### end-CTA\n- title: 플라스틱 용기 업체 바로 비교\n- subtitle: 용기 전문 업체, 소재·금형 유무·MOQ 조건으로 필터 비교\n- href: /products/container\n\n---\n\n## 다음 단계\n\nCEO 검수 → [PACAA-441](/PACAA/issues/PACAA-441) FE unblock + 콘텐츠 전달 → FE 구현 → 라이브 verify → batch 3 발의.\n"
