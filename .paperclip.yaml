        body: "## CEO 결정 — Q1 (가이드 v1) Option A accept · Q2 (VERCEL_TOKEN) 보드 대기 + 로컬 Lighthouse 선행\n\n결론 한 줄: **v1 50개 그대로 close DoD #3, Backend Eng는 즉시 로컬 Lighthouse 측정 후 staging 배포는 보드 인젝션 대기.**\n\n---\n\n### Q1 — 가이드 v1 처리: **A. accept**\n\n샘플 검수 결과 (`골판지박스-제작.md`, `공병-가격.md` 직접 확인):\n- 도메인 정확도: KS T 1093 인용, A·B·C·E·F골 구분, 수지 가격 순서, 캡 옵션 단계 — **정확**.\n- 구조: 개요 → 사양/요인 → 체크포인트 → 일관 꼬리 문장 (50/50 동일).\n- 광고어 0, 가격 단언 0, 출처 없는 통계 0 — prompt template 준수.\n- 작성 모델 = Claude Opus 4.7 (CEO와 동일 클래스). Sonnet 4.6 expansion이 *질적* 우위 보장 안 됨.\n\n**근거 요약**:\n1. 글자수 360–465 vs 600–900 목표 — 미달은 *양적*. 콘텐츠 *밀도*는 충족 (NerdWallet/Wirecutter 패턴: 밀도 > 글자수).\n2. organic CTR / 평균 노출 위치 데이터 0 → 글자수가 SEO bottleneck 인지 미검증. $150–180 expansion은 premature optimization.\n3. 2-way door — 90일 organic 측정 후 v2 expansion 트리거 가능.\n\n**Kill criterion (재검토 트리거)**: 90일 후 GSC 평균 CTR < 0.8% OR 평균 노출 위치 > 30 → v2 expansion (Sonnet 4.6, $200 cap).\n\n**Action**: DoD #3 close. `plans/guides_review.csv` decision 컬럼 모두 `keep`로 채움.\n\n---\n\n### Q2 — VERCEL_TOKEN: **보드 대기 + 로컬 Lighthouse 선행 (Option d)**\n\nVERCEL_TOKEN 인젝션은 보드 단독 권한 (CEO는 secrets 미보유). 기존 인터랙션 [`f2c8709f`](#interaction-f2c8709f) 그대로 보드 큐 유지 — Telegram digest로 자동 도달.\n\n**즉시 가능한 선행 작업** (Backend Eng):\n1. `cd site && npx next start &` 또는 `cd site/out && python3 -m http.server 4000 &`\n2. Chrome headless + Lighthouse CLI 또는 `npx lighthouse http://localhost:4000/keywords/골판지박스-제작 --preset=desktop --output=json --output-path=./lighthouse-local-desktop.json --quiet --chrome-flags=\"--headless --no-sandbox\"`\n3. 50개 중 무작위 5–10개 슬러그 측정 → performance score ≥ 80 검증.\n4. 결과 JSON 첨부 코멘트 → DoD #4 perf criterion 부분 검증 완료로 기록.\n\n**staging 배포 부분**: VERCEL_TOKEN 도착 즉시 1-command 실행 가능하도록 `scripts/deploy-vercel.sh` 사전 준비 (project name `packlinx-seo-staging`, prebuilt `site/out` 업로드).\n\n**Why not 호스트 변경**: Netlify/Cloudflare 동일 credential 문제 반복, Next 14 SSG는 Vercel zero-config 최적.\n**Why not defer**: PACAA-95 (sitemap+indexing)가 staging URL 의존, 다음 단계 차단.\n\n---\n\n### Backend Eng 다음 액션 (재할당 in_progress)\n\n1. `guides_review.csv` decision 컬럼 50/50 `keep` 입력 → DoD #3 close 코멘트.\n2. 로컬 Lighthouse 5–10 슬러그 측정 → 결과 JSON 첨부.\n3. `scripts/deploy-vercel.sh` 작성 (token env 가정, dry-run 검증).\n4. VERCEL_TOKEN 도착 알림 시 staging 배포 + 50/50 페이지 200 OK 확인 + Lighthouse staging 1차 측정.\n5. 모두 충족 시 PACAA-94 close 제안 코멘트.\n\nstatus `in_progress`, assignee Backend Eng [3177894b](/PACAA/agents/3177894b-a1ee-4d88-8aa1-ba902b01f141).\n\n전체 reasoning: `runs/2026-04-30-1100-decisions-pacaa94-guide-review.md`.\n"
