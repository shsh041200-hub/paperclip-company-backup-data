        body: "## PACAA-371 조치 결과 요약\n\n### Step 1 — 출처 분기 확정: **분기 B (공시·공개정보 스크래핑)**\n\n코드베이스 및 마이그레이션 히스토리 분석 결과:\n\n- `data_source` 필드 값: `naver_local`, `public_data_portal`, `website_crawl` — 공시 출처 확인\n- migration 044 (KOR-531): \"571 rows: 286 association, 285 manual\" — 네이버 지역 / 공공데이터 포털 / 업체 웹사이트 크롤링\n- KOR-78에서 vendor 자가 등록 UI 완전 제거 → 분기 A(self-submission) 제외 확인\n- 제3자 브로커 계약 없음 → 분기 C 제외\n\n**확정: 분기 B**\n\n---\n\n### Step 2 — 분기 B 조치 이행 현황\n\n| 항목 | 상태 | 근거 |\n|------|------|------|\n| 전화번호 삭제 | ✅ 완료 | migration 044 (KOR-531): 571개 NULL 처리 + DB 트리거 trg_no_phone_write |\n| 주소 삭제 | ✅ 완료 | KOR-103 선례 |\n| 이메일 삭제 | ✅ 완료 | KOR-103 |\n| \"공시정보 기반, 정정·삭제 요청 안내\" | ✅ 이번 heartbeat 적용 | vendor 페이지 푸터 문구 업데이트 |\n| 처리방침 공시정보 수집 §15 1항 6호 근거 | ✅ 이번 heartbeat 적용 | /privacy §2 ① 수집 근거 조항 추가 |\n\n**이번 heartbeat 코드 변경 2건:**\n1. app/companies/[slug]/page.tsx 푸터 — \"정보 정정·삭제·처리정지 요청 (개인정보 보호법 §39-3): packlinx.com/opt-out 또는 rpdla041200@gmail.com\" 명시\n2. app/privacy/page.tsx §2 — 법적 근거: 개인정보 보호법 §15 ①⑥ (정당한 이익) 조항 추가, 수집 경로 구체화, 개정일 2026-05-08\n\n---\n\n### Step 3 — PIPA §39-3 채널 노출 확인\n\n| 채널 | 노출 위치 | 상태 |\n|------|----------|------|\n| /opt-out 정정·삭제 폼 | 개인정보처리방침 §7 + 푸터 링크 | ✅ |\n| rpdla041200@gmail.com DPO 이메일 | vendor 페이지 푸터 + 처리방침 §10 | ✅ |\n| 정정·삭제·처리정지 3가지 권리 명시 | vendor 페이지 푸터 (이번 heartbeat 추가) | ✅ |\n\n---\n\n### Step 4 — 통신판매업법 §13 노출 항목 점검\n\n현재 vendor 페이지 외부 노출 항목: 업체명, 업체 설명, 취급 제품, 보유 인증, MOQ, 납기, 지역 — 사업자 정보에 한정.\n\n전화번호: DB 트리거로 NULL 강제 → 노출 없음. 주소: KOR-103 제거 → 노출 없음. 개인 이메일: KOR-103 제거 → 노출 없음.\n\n통신판매업법 §13 의무 항목 범위 내 운영 확인. 개인 식별 가능 연락처 미노출.\n\n---\n\n### 자문 인용 ([PACAA-241](/PACAA/issues/PACAA-241) Surface 2)\n\n본 이슈는 [PACAA-241](/PACAA/issues/PACAA-241) Legal Counsel Surface 2 자문 결과(risk 조건부 중간) 후속 시정이다. 자문 결론: \"공시 출처 기반 enrichment는 §15 ①⑥ 근거 명시 + 정정·삭제 채널 정비 시 중간 위험으로 조건부 허용\". 본 heartbeat에서 해당 조건 이행 완료.\n\n**⚠️ 자문 한계 디스클레이머:** 본 자문은 참고용이며 법적 책임 면제를 보장하지 않는다. 사고 발생 시 면책 사유로 사용될 수 없다. 보드는 외부 변호사 자문 미도입을 결정한 상태이며, 모든 법적 리스크는 Legal Counsel 자문에 의존한다.\n"
