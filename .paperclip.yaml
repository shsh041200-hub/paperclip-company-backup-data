        body: "## 죄송합니다 — 폼이 너무 복잡했음. 단순화.\n\n### 보드가 실제로 할 일 (1줄)\n\n**Naver / Google 에서 키워드 검색 → 상위 10개 결과가 각각 어떤 종류 페이지인지 보고 카운트.** 그게 전부.\n\n### 1 키워드 예시 (실제로 이렇게)\n\n**예: \"골판지박스 제작\"**\n\n1. Naver 에 `골판지박스 제작` 검색.\n2. 광고 빼고 organic top 10 (보통 파워링크 제외, 통합검색 본문).\n3. 각 결과를 5종 중 하나로 분류:\n   - **D** = 디렉토리/추천글/업체비교 (위키트, 다나와, \"○○ 업체 TOP 10\" 류)\n   - **V** = 단일 업체 자체 사이트\n   - **M** = 네이버 쇼핑 / 11번가 / 쿠팡 / 아이디어스\n   - **B** = 블로그 / 지식인 / 뉴스 / 유튜브\n   - **O** = 기타 (정부, PDF, 분류 안됨)\n4. 카운트만 기록. 예:\n```\nK01 골판지박스 제작\nN: D=1 V=4 M=3 B=2 O=0  dom=smartstore.naver.com\nG: D=2 V=3 M=1 B=4 O=0  dom=blog.naver.com\n```\n5. Google 도 동일 (한국 IP / `hl=ko`).\n\n### 보드 시간 추정\n\n키워드당 60~90초 × 50 = ~50~75분. 실제로 해보면 손에 익어서 더 빠를 듯.\n\n### 제발 먼저 1개만 해주세요\n\n**1 키워드 (K01 골판지박스 제작) 만 위 형식으로 댓글 달아주세요.** 그걸 받아서 제가 전체 흐름 보여드리고 (verdict 룰 적용 → REPLACE/KEEP 출력) 나머지 49개 어떻게 할지 같이 정합니다. 1개 = 2분.\n\n### 보드 시간이 너무 비싸다 싶으면 대안\n\n- **(c) Chrome MCP 시도**: 보드가 Chrome 에 paperclip 확장 attach 해 주시면 제가 자동 fetch 시도. 캡차/JS 렌더링 실패 위험 있지만 보드 시간 0. 시도해 봐도 되는지만 알려주세요.\n- **(d) Marketing/Research 에이전트 신규 채용**: 이런 류 반복 작업 받을 owner 가 회사에 없음. Hire 해서 본 task 부터 위임 (~3 주 hire cycle). 본 task 에는 너무 늦지만 차후 SEO/콘텐츠 작업 위해 검토 가치.\n- **(e) 폼이 헷갈리는 게 문제면 형식 다시 잡음.** 어떤 식이 편한지 한 줄.\n\nCEO 추천: **(c) 먼저 시도** — 보드가 Chrome attach 만 해주시면 5 분 만에 제가 가능 여부 검증. 안 되면 (a) 1 키워드 파일럿. 시간 0 분 옵션부터 태움.\n"
