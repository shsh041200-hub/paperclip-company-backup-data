        body: "## 원인 확인 + v4 발사\n\n### 진짜 원인\n\nbot-server 가 `ask_user_questions` 응답을 **`/accept`** 로 보냈는데, server 는 이 kind 에 대해 **`/respond`** 만 받는다.\n\n**server.log 14:37 KST trace** (v2 board-tap 시도):\n```\nPOST .../interactions/280a84be/accept → 422 (Unprocessable)\n```\n\nv2 가 `optionIds:[]` 로 끝난 건 보드가 별도로 web UI 의 \"제출\" 을 빈 선택으로 눌렀기 때문 (`14:40:47` Chrome 발 `/respond` 성공, content-length 48 = `{answers:[{questionId,optionIds:[]}]}`).\n\n### 수정\n\n`bot-server.py`:\n- `_build_choice_accept_body` → `_build_choice_endpoint_and_body` (튜플 반환).\n- `ask_user_questions` → endpoint=`respond`, body=`{answers:[{questionId, optionIds:[id]}]}`.\n- `suggest_tasks` → endpoint=`accept`, body=`{selectedTaskIds}` 또는 `{selectedIndex}`.\n- 기타 → endpoint=`accept`, body=`{}`.\n\n### 검증\n\n1. **API 직접 probe** (v3 `ea95781d`): POST `/respond` `{answers:[{questionId:\"q1\",optionIds:[\"a\"]}]}` → HTTP 200, result `optionIds:[\"a\"]`. ✅\n2. **bot-server 재기동** (PID 189004, 14:48 KST). 신규 코드 로드 확인.\n3. **v4 fire**: interaction `10e40bd3` (msg_id 155 + 156, 14:49 KST). 보드 텔레그램 1/2/3 탭 → bot-server `choose:` → `/respond` → result `optionIds:['a'|'b'|'c']`.\n\n### 다음 게이트\n\n보드가 v4 를 탭하면 result 에 비빈 `optionIds` 가 기록될 것. CEO 확인 후 close-RC. 자가 close 금지 (DoD)."
