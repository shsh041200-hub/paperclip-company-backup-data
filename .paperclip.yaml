        body: "## Naver 키워드 도구 5개 제한 — 12배치로 쪼갰습니다\n\n좋은 발견. Naver 검색광고 키워드 도구는 한 번에 5개씩 입력 제한. 60 키워드 = 12배치, 배치당 ~15~30초, 총 ~5분.\n\n### 가장 빠른 경로 (보드 직접)\n\n**배치마다 반복:**\n1. 키워드 도구 입력란 비우기 → 아래 5개 paste → \"조회하기\"\n2. 결과 표 우상단 \"다운로드\" → CSV 저장 (파일명 `batch1.csv` ~ `batch12.csv` 자동 OK)\n3. 다음 배치로\n\n**12배치 전부 끝나면:** 12개 CSV (또는 하나로 합친 파일) 본 이슈에 첨부 코멘트. Backend 가 자동 병합 + 임계값 필터.\n\n### 더 편한 경로 (Chrome 브라우저 자동화)\n\n현재 Naver 키워드 도구 페이지 로그인된 상태로 두시고, **Claude in Chrome 익스텐션을 활성화** 해 주세요. 본 이슈에 한 줄 코멘트 (예: `chrome ready`) 만 남기면, 제가 12배치 자동으로 돌리고 결과 CSV 까지 첨부합니다. 보드 액션 30초, 이후 0초.\n\n둘 중 편한 쪽 선택.\n\n### 12배치 paste 블록\n\n```\n[배치 1]\n골판지박스 제작\n종이박스 제작 업체\n택배박스 제작\n박스 견적\n소량 박스 제작\n\n[배치 2]\n골판지 상자 도매\n박스 주문제작\n서울 박스 제작 업체\n강화 골판지 박스\n친환경 종이박스\n\n[배치 3]\n라벨 스티커 제작\n스티커 인쇄 업체\n라벨 인쇄 견적\n소량 스티커 제작\n방수 스티커 제작\n\n[배치 4]\n투명 라벨 인쇄\n제품 라벨 디자인 인쇄\n라벨 스티커 도매\n비닐 포장지 제작\n진공포장 봉투 제작\n\n[배치 5]\n스탠드파우치 제작\n알루미늄 파우치 제작\n식품 포장지 인쇄\n비닐 봉투 도매\n친환경 포장지 제작\n\n[배치 6]\n패키지 인쇄 업체\n박스 인쇄 견적\n포장 인쇄 후가공\n박스 디자인 인쇄\n컬러 박스 인쇄\n\n[배치 7]\n골판지 인쇄 업체\n플라스틱 용기 제작\nPET 병 제작\n화장품 용기 제작\n식품 용기 제작 업체\n\n[배치 8]\n플라스틱 병 도매\n소량 플라스틱 용기 제작\n완충재 제작\n에어캡 도매\n포장 테이프 제작\n\n[배치 9]\n종이 완충재 제작\n패키지 부자재 업체\n유리병 제작\n화장품 유리병\n금속 캔 제작 업체\n\n[배치 10]\n유리 용기 도매\n포장기계 제작\n자동 포장기 견적\n진공포장기 업체\n라벨링 머신 가격\n\n[배치 11]\n우체국 박스 사이즈별\n화장품 스티커 제작\n의류 라벨 제작\n지퍼백 제작\n진공포장 비닐 도매\n\n[배치 12]\n칼라박스 제작\n화장품 펌프 용기\n종이 쇼핑백 제작\n와인병 제작\n박스 자동 포장기\n```\n\n### 팁\n\n- 다운로드 한 CSV 들은 동일 컬럼 구조 (연관키워드, 월간검색수PC, 월간검색수모바일, 경쟁정도, ...). Backend 가 알아서 합산 + 컬럼 매핑.\n- 결과가 \"검색수가 적어 표시되지 않음\" 으로 나오는 키워드는 그대로 두면 됨. Backend 가 임계값 미통과로 자동 분류.\n- 화면 스크린샷도 OK. 다운로드 안 되거나 번거로우면 12장 스크린샷 첨부해 주시면 제가 읽어서 CSV 만듦.\n\n### 상태\n\nblocked 유지. Unblock = 12 CSV (또는 스크린샷) 첨부 OR `chrome ready` 코멘트."
