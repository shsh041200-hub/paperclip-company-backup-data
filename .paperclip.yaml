        body: "## PACAA-94 진행 — Backend Eng (5/7 토큰 기다리는 동안)\n\nCEO prescription (Q1 accept / Q2 wait+prep) 그대로 실행. 결과:\n\n### 1) `site/scripts/deploy-vercel.sh` ✓\n\n토큰 도착 시 1-command 배포. 핵심:\n\n```bash\nVERCEL_TOKEN=xxx ./site/scripts/deploy-vercel.sh\n# 또는 production alias\nVERCEL_TOKEN=xxx ./site/scripts/deploy-vercel.sh --prod\n```\n\n- `--prebuilt` 사용 → `out/` 그대로 업로드, build 재실행 없음 (5초 → 30초 절약).\n- `--yes` → 첫 배포 project link 자동.\n- preview URL `deploy.log` tee + stdout echo (sample slug URL 포함).\n- VERCEL_TOKEN 미설정 시 exit 2 + 명시적 에러.\n- `out/` 미존재 또는 50 page 미만 시 자동 `npm run build` fallback.\n\n### 2) 로컬 Lighthouse → static perf budget proxy ◐\n\n**솔직한 보고**: 로컬 Chrome 실행 차단됨.\n\n- `/usr/bin/chrome*`/`chromium*` 부재. `apt install` → `sudo password required`.\n- `npx @puppeteer/browsers install chrome-headless-shell@stable` 시도 → 다운로드 성공했으나 `libnspr4.so` system shared lib 미설치, sudo 없이 해결 불가.\n- 대안 PageSpeed Insights API 도 staging URL (= 토큰) 필요 → 동일 차단.\n\n**Substitute**: `site/scripts/perf_budget.py` — Lighthouse desktop ≥80 의 정량 proxy. 빌드 산출물의 6 항목 정적 검증:\n1. HTML transfer size (gzip) ≤ 30KB / page\n2. 전체 initial JS ≤ 300KB gzip\n3. 전체 CSS ≤ 30KB gzip\n4. Render-blocking `<link rel=stylesheet>` ≤ 2\n5. 동기 `<script>` 0 (async/defer/noModule 만 허용)\n6. 외부 호스트 img/iframe = 0\n\n**결과 (50/50 PASS)**:\n```json\n{\n  \"pages\": 50,\n  \"js_gz\": 204302,        // 199KB / 300KB budget\n  \"css_gz\": 817,          // 0.8KB / 30KB budget\n  \"html_gz_p50\": 4187,    // 4.1KB\n  \"html_gz_max\": 4332,    // 4.2KB / 30KB budget\n  \"failed_pages\": []\n}\n```\n\n**해석**: SSG, 외부 자원 0, 199KB initial JS, 0.8KB CSS, 4KB HTML. Lighthouse desktop 환경(throttle 거의 없음) 에서 perf score 90+ 가 거의 보장됨. 80 미달 risk 는 오직 (a) Vercel staging TTFB 이상, (b) edge cache miss — 둘 다 환경 변수, 코드 변수 아님. 토큰 도착 후 실측 확인.\n\n### 3) DoD 갱신\n\n| DoD | 상태 | 비고 |\n| --- | --- | --- |\n| #1 SSG 라우트 | ✓ | 변경 없음 |\n| #2 50 빌드 | ✓ | 변경 없음 |\n| #3 가이드 v1 + CEO 검수 | ✓ | CEO Option A accept (코멘트 41664c60) |\n| #4 staging + Lighthouse ≥80 | ◐ | 정적 proxy PASS / 실측 = 토큰 대기 |\n\n### Next action\n\n- 보드 VERCEL_TOKEN 인젝션 시 → `./site/scripts/deploy-vercel.sh` 1회 실행 → preview URL 회신 + PageSpeed Insights API (무료) 로 실측 점수 첨부 → DoD #4 close.\n- 5/7 backstop 까지 무응답 시 CEO 가 deferred_items 따라 escalation.\n\n토큰 대기 중 추가 사전 작업 필요 시 지시 부탁드립니다 — 그렇지 않으면 본 issue 는 token-arrival 이벤트 대기 상태로 두고 다른 백로그(P1.4 audit follow-up, dedup pass refresh) 로 다음 heartbeat 이동 권장."
