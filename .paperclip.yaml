        body: "## PACAA-116 구현 스펙 (turn-key) — ADR PACAA-115 채택 후 실행\n\n본 스펙은 보드 ADR 승인 + Backend Engineer 복구(또는 CTO 코드 저장소 mount) 후 즉시 착수 가능하도록 작성. 코드는 packlinx Next.js 16 + Supabase + Postgres 기준.\n\n## 1. Middleware (canonical 강제)\n\n파일: `middleware.ts` (또는 기존 middleware 의 vendor matcher 절)\n\n동작:\n```ts\n// pseudocode — 실제 코드는 next/server URL 객체 사용\nimport { NextResponse, type NextRequest } from 'next/server'\n\nexport function middleware(req: NextRequest) {\n  const url = new URL(req.url)\n  if (!url.pathname.startsWith('/vendors/')) return NextResponse.next()\n\n  const rawSlug = url.pathname.slice('/vendors/'.length)\n  const decoded = safeDecode(rawSlug)\n  if (decoded === null) return NextResponse.next() // malformed → 404 흐름 유지\n\n  // canonical = decoded raw UTF-8\n  if (rawSlug !== decoded) {\n    url.pathname = `/vendors/${decoded}`\n    return NextResponse.redirect(url, 301)\n  }\n  return NextResponse.next()\n}\n\nexport const config = { matcher: ['/vendors/:path*'] }\n\nfunction safeDecode(s: string): string | null {\n  try { return decodeURIComponent(s) } catch { return null }\n}\n```\n\n주의:\n- redirect 루프 차단: `rawSlug === decoded` 면 통과. 이중 인코딩 (e.g. `%25EC%2595%2588`) 한 번만 decode 후 다음 요청에서 idempotent 수렴 — 통합 테스트로 검증.\n- malformed percent-sequence: `decodeURIComponent` throw → null 반환 → app 404 라우트 가 처리.\n\n## 2. Sitemap generator\n\n파일: `app/sitemap.ts` 또는 `app/sitemap.xml/route.ts` (현 구조에 맞춰)\n\n변경:\n- vendor URL 출력 시 `encodeURI(vendor.slug)` 또는 `encodeURIComponent` 사용 중이면 제거.\n- raw slug 직접 출력. XML escape 는 `<`/`>`/`&`/`'`/`\"` 만 (한국어 raw OK).\n- DB 쿼리에서 `LIMIT 1000` (또는 유사 cap) 제거. (← 이는 PACAA-117 본체이지만 본 PR 에서 통합 검증 가능.)\n\n## 3. `<link rel=\"canonical\">`\n\nVendor 상세 페이지 layout/page server component 의 metadata:\n```ts\nexport async function generateMetadata({ params }): Promise<Metadata> {\n  const slug = decodeURIComponent(params.slug) // raw form\n  return {\n    alternates: {\n      canonical: `https://packlinx.com/vendors/${slug}`,\n    },\n  }\n}\n```\nNote: Next.js Metadata API 가 자동으로 URL encode 하지 않도록 string 형 path 직접 지정. URL 객체로 감싸면 encode 되므로 string 유지.\n\n## 4. 통합 테스트 (vitest 또는 playwright)\n\n시나리오:\n1. `GET /vendors/한국패키징` → 200, `<link rel=\"canonical\" content=\"https://packlinx.com/vendors/한국패키징\">`\n2. `GET /vendors/%ED%95%9C%EA%B5%AD%ED%8C%A8%ED%82%A4%EC%A7%95` → 301 → `/vendors/한국패키징`\n3. `GET /vendors/%25ED%2595%259C` (이중 인코딩) → 301 → `/vendors/%ED%95%9C` → 301 → `/vendors/한` (2-hop 허용 또는 1-hop 정규화 — 결정 필요)\n4. `GET /vendors/한국패키징` (already canonical) → 200, redirect 0회 (loop 차단)\n5. `GET /vendors/존재하지않는벤더` → 404 (canonical 정책과 무관)\n6. `GET /sitemap.xml` 또는 sitemap-index 의 child → vendor URL 100% raw UTF-8, percent-sequence 0건\n\n## 5. 배포 후 검증 (Acceptance)\n\n```bash\n# 10 vendor 샘플 (DB 에서 무작위 추출)\nfor slug in $(psql -t -c \"SELECT slug FROM vendors ORDER BY random() LIMIT 10\"); do\n  raw_url=\"https://packlinx.com/vendors/$slug\"\n  enc_url=\"https://packlinx.com/vendors/$(printf %s \"$slug\" | jq -sRr @uri)\"\n  echo \"=== $slug ===\"\n  curl -sIL \"$raw_url\" | grep -E '^(HTTP|Location)'\n  curl -sIL \"$enc_url\" | grep -E '^(HTTP|Location)'\ndone\n```\n\n기대값: 모든 raw → 200, 모든 encoded → 301 (Location: raw) → 200.\n\n## 6. PR 체크리스트 (cto-playbook)\n\n- [ ] middleware 통합 테스트 6 시나리오 통과\n- [ ] sitemap 샘플에 percent-sequence 0건\n- [ ] redirect loop 0회 (canonical 입력시 직통 200)\n- [ ] 배포 후 10 vendor curl 결과 첨부\n- [ ] 롤백 절차 PR description 명시 (middleware 의 redirect 방향 반전, 1시간 내 가능)\n\n## 의존성\n\n- ADR PACAA-115 acceptance (보드 sign-off)\n- 코드 저장소 접근 (Backend Engineer 복구 또는 CTO mount)\n\n위 두 게이트 후 본 스펙 그대로 PR 1건으로 시작 가능."
