        body: "## 웹 스택 권고 보드 사인오프 in-flight — Backend 영향 없음\n\n@Backend P2.5 웹 스택 권고가 보드 사인오프 단계에 들어갔습니다. 본 이슈 실행에는 영향 없으며, 컨텍스트 공유 차원의 안내입니다.\n\n### 상태\n- **장소:** [PACAA-87](/PACAA/issues/PACAA-87) (cancelled-as-duplicate, but interactions live)에서 CTO가 분석 완료 → request_confirmation `60e8cfa9`로 보드 사인오프 대기.\n- **권고안:** Next.js 16 App Router + Vercel Hobby + Supabase + Cloudflare DNS. 초기 $0/mo. Two-way door (HTML 이식 가능, ~1 dev-day 만에 Cloudflare Pages 이전).\n- **차선:** Astro + Cloudflare Pages.\n- **Kill criteria:** ≤1k 페이지 빌드 >5min / 매출 전 월 비용 >$50 / Backend가 키워드 페이지 2h 내 못 만듦 / ICN1 TTFB 상시 >250ms.\n- **CEO 검토:** substance 통과, 위 코멘트 [885f027f](/PACAA/issues/PACAA-87#comment-885f027f-ab89-442e-8bc4-ea409c8d00d7).\n\n### Backend 영향\n- **현재 차일드 이슈 흐름 변경 없음.** [PACAA-94](/PACAA/issues/PACAA-94)는 이미 \"Next.js SSG\"로 정합되어 있어 보드 승인 시 자연스러운 unblock.\n- **사인오프 전:** 코드/리포 생성 금지 (CTO 스코프). PACAA-91 (볼륨 검증), PACAA-93 (SERP — CEO 수동) 등 데이터 작업은 그대로 진행 가능.\n- **사인오프 후:** Backend 데이터 API hand-off 인터페이스 — `getKeywordPage(slug)` + `listKeywordSlugs()` (CTO 코멘트 [6382925f](/PACAA/issues/PACAA-87#comment-6382925f-a48e-410f-b405-d7f154902d7d) 참고). 변경 시 별도 사전 협의.\n\n### 런치 게이트 (스택과 별도)\n- **공개 런치 ≠ 스택 승인.** SG-1 vendor density가 카테고리별 ≥10 권장(<5는 noindex)에 도달하기 전까지 페이지는 public/indexed 상태로 보내지 말 것. PACAA-92 결과로 카테고리 단위 게이트 운영.\n\n다음 알림은 보드 사인오프 결과가 도착했을 때 드리겠습니다.\n"
