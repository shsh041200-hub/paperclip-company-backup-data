        body: "## 완료 — 템플릿 + CTO 샘플 인스턴스화\n\nCEO를 제외한 모든 Packlinx 에이전트가 채용 시점에 상속받을 표준 SOUL/AGENTS/HEARTBEAT 템플릿을 작성했고, 첫 재채용(CTO) 전 sanity check용으로 CTO 역할을 끝까지 채워봤습니다.\n\n위치: `companies/d5e183da-c58f-4124-8075-493330dce4c4/templates/agent/`. 계획 문서: [PACAA-9 plan](/PACAA/issues/PACAA-9#document-plan)\n\n### 작성한 파일\n\n| 파일 | 라인 | 용도 |\n| --- | ---: | --- |\n| `AGENTS.md.tmpl` | 67 | 런타임이 가장 먼저 로드하는 진입 파일 |\n| `SOUL.md.tmpl` | 162 | 정체성 / 자세 / 거부 항목 |\n| `HEARTBEAT.md.tmpl` | 116 | 단계별 실행 체크리스트 |\n| `README.md` | 84 | 변수 정의표 + 7단계 인스턴스화 절차 |\n| `examples/cto/{AGENTS,SOUL,HEARTBEAT}.md` | 77 / 245 / 132 | 변수 전부 채운 CTO 예시 |\n\n### 핵심 설계 결정\n\n- **공통 콘텐츠는 스킬이 담당, 템플릿은 역할 정체성만 담당.** 보이스(`packlinx-comms`), 의사결정 프로토콜(`packlinx-decision-log`), 인코딩(`encoding-discipline`), 벤치마킹 프레임(`benchmark-methodology`), 회사 컨텍스트(`packlinx-context`)는 [PACAA-8](/PACAA/issues/PACAA-8) 공통 스킬 번들이 처리합니다. 템플릿은 참조만 하고 절대 중복하지 않습니다.\n- **변수는 `{{VARIABLE}}` 문법으로 명시.** README의 변수 표가 정의 + CTO 예시값을 같이 제공합니다. 인스턴스화 4단계에서 `grep -c '{{' file.md`이 `0`이 되는지 검증합니다.\n- **라인 캡 준수.** SOUL ≤ 250, HEARTBEAT ~120 (매니저 역할은 위임 오버헤드로 ~135까지 허용 — README에 명시), AGENTS ≤ 80.\n- **CEO 파일은 그대로 둡니다.** CEO는 Opus 4.7 + 매니저 없는 풀 전략 자세 — 본 템플릿은 그 외 모든 역할용입니다. 기본 모델: `claude-sonnet-4-6`.\n\n### CTO를 첫 예시로 고른 이유\n\n부모 계획 [PACAA-7](/PACAA/issues/PACAA-7) Phase 3에서 CTO가 첫 재채용 대상입니다. 끝까지 채워보면서 템플릿 갭을 미리 잡습니다 (실제로 두 곳 발견·수정: 매니저용 `EXECUTE_OR_DELEGATE_LINE` 슬롯 길이, `ROLE_BENCHMARKS`에 Tier-2 한국 B2B 추가). CTO 예시는 의도적으로 강한 의견(보링 테크, 데이터 무결성 > 속도, 벤더 락인 거부)을 담아서 재채용 시 빈 슬롯이 아닌 합리적인 출발점이 되도록 했습니다.\n\n### 후속\n\n- [PACAA-10](/PACAA/issues/PACAA-10) (역할별 특화 스킬) 언블록 — `SPECIALTY_SKILLS` / `SPECIALTY_SKILL_LINES` 슬롯에 꽂으면 됩니다.\n- [PACAA-11](/PACAA/issues/PACAA-11) (온보딩 런북) 언블록 — README의 7단계 인스턴스화 절차를 그대로 코드화하면 됩니다.\n- 부모 [PACAA-7](/PACAA/issues/PACAA-7) Phase 0 (기존 10개 비-CEO 에이전트 종료 보드 승인) 은 별도로 대기 중 — 그게 풀려야 실제 재채용 시작.\n\n### 보드 검토 요청\n\n이 템플릿 모양으로 진행해도 되는지 사인오프 부탁드립니다. 특히:\n\n1. SOUL 250 / HEARTBEAT ~135(매니저) 라인 캡이 적절한지\n2. CEO와 달리 모든 비-CEO 역할이 매니저를 통해서만 보드에 에스컬레이트하도록 강제한 부분\n3. CTO 예시에 박힌 강한 의견(보링 테크, 벤더 락인 거부 등) — 채택 / 완화 / 제거 중 선호\n\n승인이 떨어지면 [PACAA-10](/PACAA/issues/PACAA-10), [PACAA-11](/PACAA/issues/PACAA-11) 진행하겠습니다.\n"
