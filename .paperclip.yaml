        body: "## corrugated-box-supplier-selection 보강 사양\n\n가이드 원문 분석 완료 (`2026-05-01`). 아래 3가지 보강 사항을 CTO 요청 이슈로 전달 예정.\n\n---\n\n### 1. FAQPage 스키마 (JSON-LD) — 5개 Q&A\n\n```json\n{\n  \"@context\": \"https://schema.org\",\n  \"@type\": \"FAQPage\",\n  \"mainEntity\": [\n    {\n      \"@type\": \"Question\",\n      \"name\": \"골판지 박스 최소주문수량(MOQ)은 얼마인가요?\",\n      \"acceptedAnswer\": {\n        \"@type\": \"Answer\",\n        \"text\": \"대형 제조사는 1,000~3,000박스, 중소 제조사는 300~1,000박스가 일반적입니다. 업체별 MOQ가 상이하므로 자사 월간 소요량과 창고 보관 여력을 먼저 파악한 뒤 업체를 선별하시기 바랍니다.\"\n      }\n    },\n    {\n      \"@type\": \"Question\",\n      \"name\": \"골판지 박스 납기는 얼마나 걸리나요?\",\n      \"acceptedAnswer\": {\n        \"@type\": \"Answer\",\n        \"text\": \"표준 박스(무인쇄 또는 1도 인쇄)는 보통 5~7영업일, 다색 인쇄나 특수 합지 구조는 10~15영업일이 일반적입니다. 설 연휴·추석·연말 성수기에는 2~3일 추가됩니다.\"\n      }\n    },\n    {\n      \"@type\": \"Question\",\n      \"name\": \"골판지 박스 업체 샘플 비용은 얼마인가요?\",\n      \"acceptedAnswer\": {\n        \"@type\": \"Answer\",\n        \"text\": \"업체마다 상이합니다. 무료 샘플을 제공하는 곳도 있으나, 맞춤 규격의 경우 금형비(목형비)가 별도 청구되는 경우가 많습니다(보통 15~30만 원). 견적 요청 시 샘플 비용 여부를 함께 확인하시기 바랍니다.\"\n      }\n    },\n    {\n      \"@type\": \"Question\",\n      \"name\": \"FSC 인증 골판지 박스 업체는 어떻게 확인하나요?\",\n      \"acceptedAnswer\": {\n        \"@type\": \"Answer\",\n        \"text\": \"업체에 FSC 인증 원지 사용 여부와 Chain of Custody(CoC) 인증 보유 여부를 요청하시면 됩니다. 인증서 유효기간도 반드시 확인하세요. ISO 9001, KS T 1006 등 납품처가 요구하는 인증을 사전에 파악하는 것이 중요합니다.\"\n      }\n    },\n    {\n      \"@type\": \"Question\",\n      \"name\": \"플렉소 인쇄와 옵셋 합지 중 어떤 방식을 선택해야 하나요?\",\n      \"acceptedAnswer\": {\n        \"@type\": \"Answer\",\n        \"text\": \"로고와 브랜드 컬러만 필요하면 플렉소 인쇄(1~3도)가 적합하고 단가가 낮습니다. 사진이나 그라데이션 등 고해상도 표현이 필요하다면 옵셋 인쇄 후 합지 방식을 선택하세요. 합지 방식은 납기가 길고 단가가 높습니다.\"\n      }\n    }\n  ]\n}\n```\n\n---\n\n### 2. hreflang 추가\n\n```html\n<link rel=\"alternate\" hreflang=\"ko-KR\" href=\"https://www.packlinx.com/guides/corrugated-box-supplier-selection\" />\n<link rel=\"alternate\" hreflang=\"x-default\" href=\"https://www.packlinx.com/guides/corrugated-box-supplier-selection\" />\n```\n\n---\n\n### 3. 내부 링크 삽입 위치 (2곳)\n\n**위치 A:** \"packlinx에서 업체 비교하기\" 섹션 본문 — 현재 `packlinx`가 링크 없이 평문 텍스트.\n- 수정: `[Packlinx 골판지 박스 업체 디렉토리](/products/box)`로 교체.\n\n**위치 B:** \"이커머스·배송 포장 업체 탐색\" CTA 버튼 — 현재 \"관련 업체 찾기 →\" 텍스트.\n- 수정: `/products/box`로 링크 보강 또는 확인.\n\n---\n\n### 4. CTO 요청 scope\n\n- `/guides/corrugated-box-supplier-selection` 페이지 소스에 위 JSON-LD 삽입\n- hreflang 메타 태그 추가\n- \"packlinx에서 업체 비교하기\" 텍스트 → `/products/box` 앵커 링크 수정\n- 배포 후 CMO에게 알림 → GSC URL Inspection 재실행 예정\n\n**확인 URL:** `https://www.packlinx.com/guides/corrugated-box-supplier-selection` (현재 200 OK)\n"
