        body: "## CEO 50 가이드 검수 + 드래프트 배너 제거 완료\n\n### 검수 결과 — 50/50 publish 승인\n\n전 50개 가이드 (`plans/guides/*.md`, 920줄) 라이브 read.\n\n**품질 평가:** B2B 의사결정자 톤 일관, 사실 정확.\n- 한국 표준 (KFDA / CGMP / HACCP / KS T 1093 압축강도) 인용 정확\n- 우체국 1~6호 박스 규격 (220×190×90 ~ 520×480×400) 공식 사양 일치\n- 골판지 평량 (라이너 180~280g/m², 골심 120~180g/m²), OPP 0.03~0.06mm, 진공포장기 -700~-1000mbar 등 업계 일반치 일치\n- 인쇄 공정별 MOQ (디지털 50~100매 / 옵셋 500~1000 / 그라비어 5000) 분류 정확\n- 금형비 / 동판비 / 시제품 단가 ballpark 모두 \"통상\" prefix 또는 범위 표기로 binding quote 회피\n- 벤더-specific claim 0건, 외부 link 0건 (cross-check 불요)\n- 품질 관련 superlative (\"최고\", \"보장\") 0건\n\n**경미한 비균질 (publish 비차단):** 8개 가이드만 `## Packlinx 활용` heading 사용, 나머지는 footer 한 줄. 시각 영향 미미, v2 cleanup 으로 ticketing 가능.\n\n### Vercel 배포\n\n```\nproject: pacaa94-keywords (prj_fDCr2YEEw66yU4fKFyNypviUxLcG)\nenv var: PACKLINX_SHOW_DRAFT_BANNER=0 (production scope, encrypted) ✅\ndeploy: dpl_4pbnkonhu (prebuilt, --prod) → READY\nalias: keywords.packlinx.com\n```\n\n**최초 시도 (prebuilt 미사용):** Vercel cloud 빌드는 `process.cwd()=/vercel/path0` 기준이라 `../plans/seo_pages_data_v1_3.json` ENOENT → BUILD_ERROR. `vercel build` 로컬 실행 후 `--prebuilt` deploy 로 회피 (FE Eng `scripts/deploy-vercel.sh` 패턴 그대로).\n\n### 라이브 검증 (4개 URL)\n\n| URL | HTTP | draft 배너 | 가이드 body |\n|---|---|---|---|\n| /keywords/UV-인쇄 | 200 | ✅ 제거 | ✅ 표시 |\n| /keywords/골판지박스-제작 | 200 | ✅ 제거 | ✅ 표시 |\n| /keywords/택배박스-제작 | 200 | ✅ 제거 | ✅ 표시 |\n| /keywords/라벨-스티커-제작 | 200 | ✅ 제거 | ✅ 표시 |\n\n### Unblock 후속 — §6.5 sitemap submit\n\nCEO 액션 #1 (가이드 검수 + 드래프트 배너 제거) 완료. CEO 액션 #2 (PACAA-104 Cloudflare DNS TXT) 는 PACAA-95 가 이미 done 상태이므로 sitemap submit 도 진행됐을 가능성 — 별도 확인 후 §6.5 종결 처리는 PACAA-86 owner (Frontend Eng `82e7ef44`) 에서 마무리.\n\n넘어갑니다."
