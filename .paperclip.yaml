        body: "스크린샷 화면에서 한 단계 더 들어가야 보입니다.\n\n## 추출 절차 (Search Console)\n\n1. 보드가 보고 있는 \"페이지 색인이 생성되지 않는 이유\" 표에서 **\"다른 4xx 문제로 인해 차단됨\" 행 자체를 클릭** (텍스트 위 어디든 OK, 행 전체가 링크).\n2. 상세 페이지로 이동 → 하단에 **\"예시\" 섹션**이 열리고 URL 리스트가 표시됨 (GSC는 이슈당 최대 ~1,000개 샘플만 노출, 5,667 전체는 안 줌 — 이게 정상).\n3. 우측 상단 **\"내보내기\" 버튼** 클릭 → CSV / Google Sheets / Excel 중 선택.\n4. 받은 파일을 본 이슈에 첨부해 주시면 패턴 분류 진행.\n\n행 클릭이 안 먹으면 좌측 메뉴 **색인 생성 → 페이지** 진입 후 같은 표에서 다시 시도.\n\n## ROI 노트 — 100샘플 확보 ROI는 이미 작아졌습니다\n\n지난 wake에서 추가 진단을 마쳤고, 결론이 거의 굳어졌어요:\n\n- **5,667 \"다른 4xx\"는 4/25 transient 상태의 stale snapshot.** 현재 prod에서 의심 URL을 직접 probe하면 전부 404 반환 (`/companies/x`, `/companies/null`, `cheonil-2` 등). GSC는 \"다른 4xx\"에서 404를 제외하므로 → 4/25 시점에 **401/403을 잠깐 뱉다가 이미 정정/롤백된 URL들**로 추정.\n- **Task B root cause:** 4/25 단일 배포로 sitemap이 ~25k까지 부풀었고, 그 사이 middleware/Vercel 보호 일부가 401/403을 발사 → 부분 롤백으로 sitemap 1,031로 축소 → GSC만 4/27 stale view 보유. (의도된 변경 아님, 이미 자체 보정됨)\n- **Task A 패턴 1차 추정 (sitemap 분석 기반):** ① `-NNNN` 숫자 suffix 슬러그 (vendor import 정규화 누락, 185/906 ≈ 20%) ② Korean encoded↔unencoded canonical 쌍 ③ 1,000 cap에 잘린 sitemap 외부 슬러그 ④ 4/25 만들어졌다 사라진 transient URL ⑤ misc.\n\n## 보드 판단 요청\n\n100샘플 확보가 어려우면 **두 옵션** 중 선택:\n\n- **A. 그대로 진행** — 위 추정으로 P1 child issue (canonical + sitemap 정화) 발주. 100샘플은 P1 검증용 보조자료로 후속 첨부.\n- **B. 100샘플 먼저** — GSC export 받아 첨부, 패턴 ≤5종 확정 후 P1 발주 (1~2일 지연).\n\n저는 **A 권장**: 추정 신뢰도가 충분히 높고, P1 작업 자체가 two-way door라 진행 후 검증이 손실 없음. 보드 결정 부탁드립니다."
