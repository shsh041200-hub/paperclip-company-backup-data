        authorType: "agent"
        body: "## PACAA-114 1차 분석 — 데이터 추론 + 입력 요청\n\n첨부 CSV 4종은 PACAA-113에서 이미 확보. 코드/배포 로그/실제 4xx URL 목록은 본 워크스페이스에서 접근 불가하므로 **이번 heartbeat 산출은 \"데이터에서 도출 가능한 강가설\" + \"확정에 필요한 입력 요청\"** 으로 분리합니다.\n\n---\n\n## Task A — 5,667 4xx URL 패턴 (강가설)\n\n### 기초 산식 (4/27 GSC 기준)\n색인 6,567 + alternate canonical 12,785 + 4xx 5,667 + 기타 10 = **25,029** ✓\n\n4/24 시점 알려진 페이지는 3,697 → 4/25에 **+21,332 페이지 신규 등장**. 그 중 압도적 다수가 alternate canonical(12,785) 또는 4xx(5,667). 즉 **새로 등장한 21k 중 ~17k 가 \"중복 또는 4xx\"** — sitemap/링크 생성 변경의 단일 시그니처.\n\n### 4xx 분류 단서\nGSC 사유는 **\"다른 4xx 문제로 인해 차단됨\"** 단일 — 404면 별도 사유로 분류됨. 따라서 5,667의 다수는 **401/403 (auth-gate) 또는 400 (bad request)** 일 가능성이 높습니다.\n\n### 패턴 가설 ≤5종 (검증 필요, 4xx URL export 받으면 30분 내 확정)\n\n| # | 패턴 | 추정 비중 | 1줄 fix |\n|---|---|---:|---|\n| 1 | **Auth-gated route 가 sitemap/내부 링크에 노출** (`/admin`, `/dashboard`, vendor self-edit) | 高 | 라우터에서 sitemap 생성 시 auth-required 경로 exclude |\n| 2 | **삭제된 vendor slug 의 잔존 링크/canonical** | 中 | vendor 삭제 시 sitemap 즉시 invalidate + 410 Gone 반환 |\n| 3 | **필터/정렬 query string 의 SSR 검증 실패** (잘못된 enum → 400) | 中 | query 파싱 단에서 unknown 값은 canonical로 redirect |\n| 4 | **페이지네이션 over-bound** (`?page=9999`) | 低 | 페이지 범위 초과 시 last page 로 redirect 또는 noindex |\n| 5 | **로케일/지역 prefix 잘못 생성** | 低 | 라우트 prefix 화이트리스트 강제 |\n\n*(URL 100개 샘플만 받으면 비중을 정확한 페이지 수로 확정합니다.)*\n\n---\n\n## Task B — 4/25 root cause (단일 강가설)\n\n**\"4/25 단일 일자에 알려진 페이지 +21,332, 그 중 alternate canonical +12,785, 4xx +5,667\"** 분포는 **단일 사이트맵/링크 생성 변경 한 건의 시그니처**입니다.\n\n- 단순 vendor 데이터 import (~21,000 row 추가) 만으로는 alternate canonical 12,785 가 설명되지 않음. 중복 URL 변형이 함께 만들어졌어야 함.\n- 따라서 가설: **4/24-25 사이 sitemap 생성 로직(또는 라우터 link 생성 로직)이 변경되어 query/filter/pagination 변형 URL 을 sitemap 에 포함시키기 시작**. 그 변형 중 일부가 SSR 단에서 4xx 로 떨어진 것이 5,667.\n- **의도성**: long-tail SEO 시도였다면 noindex/canonical 처리가 함께 들어갔어야 함. 4xx 동반 = **버그 가능성이 높음 → 의도된 변경이 아닐 시 즉시 롤백 권장**.\n\n---\n\n## 확정에 필요한 입력 (보드/CEO 액션)\n\n1. **운영 도메인 확정** (`packlinx.com`? `packlinx.kr`?) — `sitemap.xml` 직접 fetch 후 패턴 분류 가능\n2. **GSC \"다른 4xx 문제로 인해 차단됨\" URL export** — 최소 100 샘플 (Search Console → 색인 → 페이지 → 해당 사유 클릭 → 예시 export)\n3. **4/24 18:00 ~ 4/25 24:00 KST 사이의 배포/import 이벤트 로그**\n   - Vercel deployments\n   - Supabase migration / data import 이벤트\n   - cron / scheduled job 로그\n\n위 3종 중 **#1 + #2 만 들어와도 Task A 확정 가능**. #3 가 들어오면 Task B root cause 도 확정.\n\n---\n\n## 가역성 / 보안 경계\n\n- 본 heartbeat 분석은 모두 two-way door (코드/스키마 변경 없음).\n- Task B 강제 forensics 옵션으로 \"CTO 가 Supabase service key 로 직접 production 쿼리\" 가 있으나, **production 데이터 직접 접근은 보안 경계 사안 → CEO 명시 승인 후 진행**. 우선은 위 #3 입력 요청 우선.\n- Backend Engineer `error` 상태 — 본 이슈는 복구 대기로 두지 않고 위 입력 기반으로 CTO 흡수.\n\n---\n\n## 다음 액션\n\n@CEO — 위 입력 3종(특히 #1 운영 도메인 + #2 4xx URL 100샘플) 부탁드립니다. 들어오는 즉시 다음 heartbeat 에서 Task A 확정 패턴 + Task B root cause 마무리합니다.\n\n참고: 본 분석 결정 로그 → `runs/2026-04-30-1510-decisions.md`."
