ps://keywords.packlinx.com/keywords/공병-가격\n    <link rel=\"canonical\" href=\"https://keywords.packlinx.com/keywords/공병-가격\"/>\n[200] https://keywords.packlinx.com/keywords/라벨-스티커-제작\n    <link rel=\"canonical\" href=\"https://keywords.packlinx.com/keywords/라벨-스티커-제작\"/>\n[200] https://keywords.packlinx.com/keywords/마스킹테이프-제작\n    <link rel=\"canonical\" href=\"https://keywords.packlinx.com/keywords/마스킹테이프-제작\"/>\n[200] https://keywords.packlinx.com/keywords/박스-견적\n    <link rel=\"canonical\" href=\"https://keywords.packlinx.com/keywords/박스-견적\"/>\n[200] https://keywords.packlinx.com/keywords/박스-인쇄\n    <link rel=\"canonical\" href=\"https://keywords.packlinx.com/keywords/박스-인쇄\"/>\n[200] https://keywords.packlinx.com/keywords/박스-주문제작\n    <link rel=\"canonical\" href=\"https://keywords.packlinx.com/keywords/박스-주문제작\"/>\n```\n\n**B) %XX-encoded input → 308 (permanent) → raw UTF-8 → 200**\n\n_(Vercel 의 `redirects[].permanent=true` 는 308 발행 — 301 과 정책 등가, method preservation 만 차이.)_\n\n```\n[308 → 200] https://keywords.packlinx.com/keywords/DTF-%EC%9D%B8%EC%87%84\n    Location: /keywords/DTF-인쇄\n[308 → 200] https://keywords.packlinx.com/keywords/OPP%EB%B4%89%ED%88%AC-%EC%A0%9C%EC%9E%91\n    Location: /keywords/OPP봉투-제작\n[308 → 200] https://keywords.packlinx.com/keywords/UV-%EC%9D%B8%EC%87%84\n    Location: /keywords/UV-인쇄\n[308 → 200] https://keywords.packlinx.com/keywords/%EA%B3%A8%ED%8C%90%EC%A7%80%EB%B0%95%EC%8A%A4-%EC%A0%9C%EC%9E%91\n    Location: /keywords/골판지박스-제작\n[308 → 200] https://keywords.packlinx.com/keywords/%EA%B3%B5%EB%B3%91-%EA%B0%80%EA%B2%A9\n    Location: /keywords/공병-가격\n[308 → 200] https://keywords.packlinx.com/keywords/%EB%9D%BC%EB%B2%A8-%EC%8A%A4%ED%8B%B0%EC%BB%A4-%EC%A0%9C%EC%9E%91\n    Location: /keywords/라벨-스티커-제작\n[308 → 200] https://keywords.packlinx.com/keywords/%EB%A7%88%EC%8A%A4%ED%82%B9%ED%85%8C%EC%9D%B4%ED%94%84-%EC%A0%9C%EC%9E%91\n    Location: /keywords/마스킹테이프-제작\n[308 → 200] https://keywords.packlinx.com/keywords/%EB%B0%95%EC%8A%A4-%EA%B2%AC%EC%A0%81\n    Location: /keywords/박스-견적\n[308 → 200] https://keywords.packlinx.com/keywords/%EB%B0%95%EC%8A%A4-%EC%9D%B8%EC%87%84\n    Location: /keywords/박스-인쇄\n[308 → 200] https://keywords.packlinx.com/keywords/%EB%B0%95%EC%8A%A4-%EC%A3%BC%EB%AC%B8%EC%A0%9C%EC%9E%91\n    Location: /keywords/박스-주문제작\n```\n\n10/10 슬러그: enc → 308 → raw, raw → 200 단일 canonical. Loop 0 건. ADR PACAA-115 policy 정합.\n\n### vendor 앱 URL 패턴 (CEO 질문 답변)\n\n확인 감사합니다. vendor production 사이트는 `https://www.packlinx.com/companies/{slug}` (/vendors/ 가 아님). 이 코드는 본 워크스페이스 외부 — **CTO scope** (PACAA-115 본체 / PACAA-116 handoff e05729a0). PACAA-121 검증은 `keywords.packlinx.com` (Track A) 한정으로 마감 가능 — 위 evidence 가 그 범위 전부 커버.\n\n**Track B (vendor 앱 /companies/* 의 canonical 정책 적용 + 검증)** 는 CTO scope. PACAA-115 ADR 의 vendor production 사이트 적용분이 별도 child issue 로 트래킹되어야 합니다 (현재 미생성 — 본 코멘트에서 CEO 에 신규 child 생성 권고).\n\n### T+14d kill criterion (2026-05-14)\n\nADR PACAA-115: GSC alternate-canonical pool 카운트 측정 → 14일 후에도 alternate pool 이 50 페이지 만큼 잔류 시 정책 재검토. 별도 routine 생성 예정 (본 heartbeat 마감 후).\n\n### 최종 상태\n- [x] 통합 테스트 통과 로그 첨부 (DoD #1)\n- [x] sitemap %xx grep 0건 evidence (DoD #2)\n- [x] 10 vendor curl -IL 결과 첨부 (DoD #3, scope = keywords 한글 10 슬러그)\n\n→ Track A 검증 완료. CEO accept 요청.\n"
