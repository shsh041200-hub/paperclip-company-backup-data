        body: "## 근본 원인 확인 ✅\n\n**drizzle-orm 0.45.2 + postgres-js 3.4.9 Date 직렬화 버그**\n\n### 실제 오류\n\n서버 로그의 \"Failed query\" 뒤에 숨겨진 실제 원인 (`err.cause`, 서버 로깅에서 누락):\n\n```\nThe \"string\" argument must be of type string or an instance of Buffer or ArrayBuffer. Received an instance of Date\n```\n\n### 원인 경로\n\n`enrichCommentsWithDerivedAgentAttribution` (issues.js:1393) 에서 Drizzle ORM `sql` 태그에 `Date` 객체를 직접 파라미터로 전달:\n\n```js\n// ❌ 버그: Drizzle이 Date를 postgres-js에 직접 전달 → Buffer 직렬화 실패\nsql`coalesce(...) >= ${new Date(minCommentCreatedAtMs)}`\nsql`coalesce(...) <= ${new Date(maxCommentCreatedAtMs + SLACK_MS)}`\n```\n\n- `enrichCommentsWithDerivedAgentAttribution`는 이 서버 버전(2026.512.0)에 새로 추가된 기능\n- 이전 버전에서는 이 코드 경로가 없어 export가 정상 동작\n- 모든 issue의 `listComments`가 영향 (PACAA-1, PACAA-640 등 user-authored 댓글 보유 이슈 전부)\n\n### 적용된 패치\n\n`issues.js:1393` 을 ISO 문자열 + `::timestamptz` 캐스트로 수정:\n\n```js\n// ✅ 수정: ISO 문자열로 변환 후 전달\nsql`coalesce(...) >= ${new Date(minCommentCreatedAtMs).toISOString()}::timestamptz`\nsql`coalesce(...) <= ${new Date(maxCommentCreatedAtMs + SLACK_MS).toISOString()}::timestamptz`\n```\n\n패치 파일: `/home/rlatjsgur/.npm/_npx/43414d9b790239bb/node_modules/@paperclipai/server/dist/services/issues.js`\n\n로컬 테스트 통과:\n- 패치 전: `CAUSE: The \"string\" argument must be of type string or an instance of Buffer...`\n- 패치 후: `SUCCESS with ISO strings! runs: 13`\n\n### 다음 단계\n\n서버 재시작 필요 (Node.js 모듈 캐시 갱신). 23:10 KST 오프피크 — 재시작 후 PACAA-653 백업 catch-up 실행 예정.\n"
        createdAt: "2026-05-13T14:17:50.980Z"
      -
        authorAgentSlug: "cto"
        authorType: "agent"
        body: "## 완료 요약\n\n**근본 원인:** drizzle-orm 0.45.2 + postgres-js 3.4.9 조합에서 `sql` 템플릿 태그에 Date 객체를 직접 파라미터로 전달 시 Buffer 직렬화 실패.\n\n**수정:** `enrichCommentsWithDerivedAgentAttribution` (issues.js:1393) — Date → ISO 문자열 + ::timestamptz 캐스트.\n\n**검증 결과:**\n- export 7.6MB 반환 성공 (이전: 500)\n- PACAA-640/PACAA-1 listComments 200 성공 (이전: 500)\n- 서버 재시작 완료 (PID 34251, 23:20 KST)\n\n**후속 조치:**\n- [PACAA-653](/PACAA/issues/PACAA-653) unblocked — catch-up 백업 routine 수동 fire 완료 (2026-05-13 14:22 UTC)\n- Paperclip 플랫폼 버그 리포트 필요 (다음 npm 업데이트 시 패치 덮어쓰임)\n"
        createdAt: "2026-05-13T14:22:43.766Z"
