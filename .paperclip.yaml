        body: "## 보드가 지금 할 일 — 임박 순\n\nPaperclip UI 클릭은 현재 0건 pending. 즉 **\"Paperclip 안에서 보드가 클릭할 카드는 지금 없다.\"** 하지만 **외부 시스템 액션 + 보드 고유 결정** 으로 보면 D-7 안쪽에 5건 있음.\n\n***\n\n### 1. **VERCEL_TOKEN 인젝션** — D-6 (backstop 2026-05-07)\n\n- **무엇을:** Vercel 계정에서 personal access token 발급 → `.secrets/vercel.env` (또는 동등 secret store) 에 `VERCEL_TOKEN=xxx` 라인 추가.\n- **왜:** PACAA-94 staging 배포 막힘. backend-engineer 가 로컬 Lighthouse + deploy 스크립트 사전 작성해 둠. 토큰만 도착하면 1-command 배포. interaction `f2c8709f` Q2 형태로 대기 중.\n- **미도착 시:** PACAA-94 DoD #1·#2·#3 만 부분 close, staging 배포는 child issue 로 분리.\n\n### 2. **Plausible Site → Timezone = `Asia/Seoul` 설정 확인** — D-3 (측정일 2026-05-04)\n\n- **무엇을:** https://plausible.io/packlinx.com → Site settings → General → Timezone 이 `Asia/Seoul` 인지 확인. 다르면 변경.\n- **왜:** 2026-05-04 (월) PACAA-89 가 W18 (04-27 ~ 05-03) WUV 베이스라인 캡처. timezone 어긋나면 ISO week 경계가 어그러짐.\n- **현 상태:** interaction `5180b51d` 는 04-29 에 accept 했지만 response body 가 비어 있음 — 실제 UI 변경 여부 불명. **5-04 측정 전에 한 번만 확인.**\n\n### 3. **Dangling Paperclip interaction 2건 close** — 청소 (D-5~6)\n\nCEO 권한으로는 401. 보드 close 만 가능. 어떤 답이든 OK — 실질 작업은 코멘트로 이미 결정됨.\n- `4de3bf8f` (PACAA-85) — issue 자체가 cancelled. backstop 2026-05-06.\n- `d9c45d7c` (PACAA-94) — DoD #3/#4 질문, CEO 가 코멘트 `a5913456` 로 결정 통지함. backstop 2026-05-07.\n\n### 4. **CMO hire 결정 준비** — D-25 (backstop 2026-05-26, 조기 트리거 가능)\n\n- **무엇을:** 페어 1 (Backend Eng + CTO) 첫 출하 안정화 + cadence 2~3주 무중단 트리거 충족 시 **PACAA-74 CMO hire payload 보드 결정**.\n- **왜:** SG-2 (search-to-quote 매칭) traffic acquisition owner. PACAA-86 50 키워드 SEO 가 출하 임박해 곧 트리거 fire 가능.\n- **보드 준비:** CMO 후보 풀 + budget 검토. 트리거 도달 시 1주 안에 결정.\n\n### 5. **PACAA-129 (2026-05-08) GSC 1주차 측정 — 보조 모니터링 (선택)**\n\n- **무엇을:** CTO 가 자체 수행 — 보드 입력 불필요. 단 5-08 에 보드가 GSC 화면을 직접 한 번 본 다음 어떤 추세를 기대할지 감 잡아두면 SG-1 진척에 대한 직관 형성에 도움.\n\n***\n\n## Paperclip UI 외 (관전 모드)\n\nPACAA-86 critical path (50 키워드 SEO) 는 backend-engineer + CTO 가 active. 보드는 진척 코멘트만 읽으면 됨. **Paperclip 결정 카드가 0건 인 상태가 정상이고, 보드의 가치는 위 1·2·4번 같은 \"외부 시스템 게이트\" 와 \"hire/strategic 결정\" 에서 나옴.**\n\n## CEO 사이드 다음 heartbeat\n\n- PACAA-134 (backend-eng hand-off) 픽업 여부 모니터.\n- PACAA-113 (CEO 자기 assignee 잠수) 종결 처리.\n- 5-04 D-3 / 5-07 D-6 backstop 다가올 때 보드 ping 재발사 (telegram cron 이 자동 처리하지만 stale interaction 은 아니라 미도착 risk)."
