        body: "## Status: blocked — credential gap\n\n오늘 routine 실행 결과:\n\n- ✅ Export 빌드 성공 (`POST /api/companies/.../exports`, schemaVersion 5, files=51, includes=company+agents+projects+issues+skills, warnings=`Skipped 10 terminated agents from export`).\n- ✅ 백업 repo `paperclip-company-backup-data` 클론 + export 파일 51개 + `backup-manifest.json` 작성 + 로컬 commit 완료 (`/tmp/test-clone-backup`, commit `2d36b5c`).\n- ❌ `git push origin main` 실패: `fatal: could not read Username for 'https://github.com'`. 에이전트 환경에 GitHub credential 이 없음 (`~/.git-credentials` 비어있음, `GITHUB_TOKEN`/`GH_TOKEN` 환경변수 없음, SSH 키 없음). 메인 repo (`pkging-platform`) 도 동일한 상태이지만 평소 push 는 보드(founder) 가 수동으로 수행해 왔던 것으로 추정.\n\n## Why blocked\n\n이 routine 의 핵심 step (push) 이 매일 자동으로 실행되려면 에이전트가 비대화형으로 push 할 수 있어야 함. 현재 상태로는 routine 이 매일 같은 지점에서 실패하고 issue 가 blocked 로 쌓이게 됨.\n\n## Recommended action (보드 결정 필요)\n\n옵션 A — **GitHub Personal Access Token 등록 (권장).**\n- repo scope (또는 더 좁은 contents:write) PAT 발급 후 `~/.git-credentials` 에 `https://shsh041200-hub:<PAT>@github.com` 형태로 저장. credential.helper=store 가 이미 설정되어 있어 즉시 동작.\n- 또는 paperclip secrets store + 시작 hook 으로 주입.\n- 장점: 비대화형 push 가능, routine 자율 실행. 단점: PAT 관리 필요(만료/회수).\n\n옵션 B — **수동 push 유지.**\n- 에이전트는 export + 로컬 commit 까지만 수행, 보드가 매일 수동 push.\n- 장점: credential 보안 유지. 단점: 자율성 상실 — routine 의 의미가 약해짐 (\"daily backup\" 인데 사람이 매일 눌러야 함).\n\n옵션 C — **routine 축소: GitHub push 대신 로컬 디스크 보관.**\n- `$AGENT_HOME/backups/YYYY-MM-DD/export.json` (오늘은 이미 저장됨) 만 유지하고 GitHub backup 은 폐기.\n- 장점: 즉시 자율 동작. 단점: 머신 손상 시 백업 손실 — 백업의 본래 목적과 충돌.\n\n권장: A. PAT 발급 후 `~/.git-credentials` 에 한 줄 추가만 해주시면 다음 heartbeat 부터 자동 push 됨. 그 동안 오늘 commit 은 `/tmp/test-clone-backup` 에 보관되어 있고 export 사본은 `$AGENT_HOME/backups/2026-04-28/export.json` 에 저장해뒀음.\n\n## Refs\n\n- 원 요청: [PACAA-20](/PACAA/issues/PACAA-20)\n- 이번 실행: [PACAA-21](/PACAA/issues/PACAA-21)\n- Backup repo: https://github.com/shsh041200-hub/paperclip-company-backup-data.git\n"
