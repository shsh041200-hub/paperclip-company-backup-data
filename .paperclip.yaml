        body: "## [CEO 가이드] 자격증명 3건 — 초보자용 단계별 안내\n\n각각 어디 들어가서 어떤 버튼 누르면 되는지 순서대로. 막히면 화면 캡처 + 코멘트 주시면 즉시 도움드립니다.\n\n---\n\n### 1. 클라우드플레어 (Cloudflare) — 2개 값\n\n계정 만든 적 없으면: https://dash.cloudflare.com/sign-up 가서 이메일+비번으로 가입 (무료, 카드 등록 불필요).\n\n**값 ① CF_ACCOUNT_ID**\n1. https://dash.cloudflare.com 로그인\n2. 로그인 직후 보이는 첫 화면 우측 사이드바에 **\"Account ID\"** 라는 글자 옆 32자리 영문/숫자 문자열 (예: `8a2b...e4f1`) — 이게 ACCOUNT_ID 입니다. 클릭 한 번으로 복사 아이콘 표시됨.\n   - 안 보이면 좌측 메뉴 \"Workers & Pages\" 클릭하면 Account ID 가 우측에 항상 떠 있어요.\n\n**값 ② CF_API_TOKEN**\n1. https://dash.cloudflare.com 우상단 본인 프로필 아이콘 클릭 → **\"My Profile\"**\n2. 좌측 메뉴 **\"API Tokens\"** 클릭\n3. **\"Create Token\"** 버튼 (파란색)\n4. 템플릿 목록 무시하고 맨 아래 **\"Custom token\"** 의 \"Get started\" 클릭\n5. Token name: `e5-worker` (자유롭게)\n6. **Permissions** 두 줄 추가:\n   - 첫 줄: `Account` 드롭다운 → `Workers Scripts` 선택 → `Edit`\n   - 두 번째 줄: `+ Add more` 클릭 후 `Account` → `Workers KV Storage` → `Edit`\n7. Account Resources: \"Include — All accounts\" 또는 본인 계정 1개 선택\n8. **\"Continue to summary\"** → **\"Create Token\"**\n9. 다음 화면에 뜨는 검은 박스 안 토큰 문자열 (한 번만 표시됨, 닫으면 다시 못 봄) — 이게 API_TOKEN 입니다. 즉시 복사해서 `.secrets/cloudflare.env` 에 저장.\n\n파일 형식 (예시):\n```\nCF_ACCOUNT_ID=여기에_계정ID\nCF_API_TOKEN=여기에_토큰문자열\n```\n\n---\n\n### 2. 깃헙 웹훅 시크릿 (GITHUB_WEBHOOK_SECRET) — 2개 repo 동일 값\n\n시크릿은 \"보드가 임의로 만든 랜덤 문자열\" 입니다. 어디서 받는 게 아니라 **직접 만드세요**.\n\n**랜덤 시크릿 생성** (터미널 한 줄):\n```\nopenssl rand -hex 32\n```\n→ 64자 영문/숫자 출력. 이걸 시크릿으로 사용. (또는 https://www.random.org/strings/ 에서 32자 이상 영문+숫자 생성)\n\n**같은 시크릿을 두 repo Webhook 에 등록:**\n1. https://github.com/packlinx/packlinx-web/settings/hooks\n2. **\"Add webhook\"** 버튼 (우상단)\n3. Payload URL: (워커 배포 후 CEO 가 알려드림 — 지금은 미정)\n4. Content type: `application/json`\n5. **Secret**: 위에서 만든 랜덤 64자 붙여넣기\n6. \"Which events\": **\"Let me select individual events\"** 라디오 → `Pull requests` 만 체크\n7. \"Active\" 체크 유지 → **\"Add webhook\"**\n8. https://github.com/packlinx/keywords-site/settings/hooks 가서 동일하게 1회 더 (같은 시크릿).\n\n**중요:** 지금은 Payload URL 이 없어서 webhook 등록은 워커 배포 후로 미루고, 시크릿 문자열만 미리 만들어 `.secrets/github_webhook.env` 에 저장하세요.\n\n파일 형식:\n```\nGITHUB_WEBHOOK_SECRET=위_랜덤_64자\n```\n\n---\n\n### 3. E5 Worker JWT (PAPERCLIP_API_TOKEN)\n\nPaperclip 대시보드의 에이전트 페이지에서 토큰 발급. 정확한 UI 위치는 보드 권한이라 CEO 가 추측만 가능 — 다음 중 보이는 곳 클릭:\n\n1. http://127.0.0.1:3100/agents/e5-worker 접속\n2. 페이지 어딘가에 **\"Generate API Key\" / \"발급\" / \"토큰\" / \"Issue Token\"** 같은 버튼이나 메뉴가 있을 것 — 보이는 것 클릭.\n3. 토큰이 표시되면 (한 번만 보임) `.secrets/e5_worker.env` 에 저장:\n```\nPAPERCLIP_API_TOKEN=여기에_JWT_문자열\n```\n4. **버튼/메뉴 보이지 않으면**: 본 코멘트에 \"agent 페이지에 토큰 발급 버튼 안 보임\" 이라고 답장 주세요. CEO 가 다른 경로 (보드 전체 설정, /api-keys 페이지 등) 안내합니다.\n\n---\n\n### 완료 후 알려주실 것\n인터랙션 `48e5b988` 에 답장 또는 본 이슈 코멘트로:\n- \"3개 다 주입 완료\" 한 줄이면 충분\n- 또는 \"클라우드플레어 OK, 깃헙 OK, 워커 JWT 안됨 (이유)\" 식 부분 보고\n\n그러면 CEO 가 Backend Engineer 깨워서 즉시 배포 진행합니다.\n\n안 풀리는 단계 있으면 화면 캡처 + 코멘트 — 1:1 가이드 드려요."
