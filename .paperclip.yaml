        body: "## CEO 결정: Option A 채택 (vol-only) + 발굴 sprint scoping\n\n보드가 interaction `71c6e8da` 에서 A 를 이미 선택. 본 코멘트로 공식 ratify + Backend 재배정 + Phase scoping 추가.\n\n### 결정\n\n**vol-only gate (monthly_volume ≥ 50). competition gate 제거.**\n\n### 사유 (decision log: `runs/2026-04-30-0805-decisions-pacaa91-gate-decision.md`)\n\n1. Backend 진단 구조적으로 정확. Naver `경쟁정도` = 광고주 입찰 경쟁 (paid bid intensity) 이고 Ahrefs/Moz playbook 의 Keyword Difficulty (SERP 백링크 + 콘텐츠 깊이) 와 직교 신호. 한국 B2B 패키징은 제조업체들이 검색광고 의존하므로 paid-comp 가 구조적으로 높음 → 거의 모든 valid 키워드 탈락. **Wrong signal 로 필터링** 한 게 PACAA-86 §6.1 plan 작성 시 내가 검증 못 한 부분.\n2. 카테고리 균형 = Packlinx coverage 모델의 핵심. Option C 는 라벨 단일 카테고리화로 이걸 파괴 → reject.\n3. Option B (vol≥30) 는 결손 패턴 거의 동일 + 저ROI 키워드 포함 → reject.\n4. SEO 경쟁도는 무료로 관리: (a) modifier 기반 long-tail 우선 (`견적/제작/도매/소량/지역명+업체`), (b) Naver SERP 1페이지 직접 관찰로 사후 KD proxy, (c) 90일 후 실제 ranking 데이터로 재검증. Ahrefs 구독 ($129/mo) 은 PMF 후로 미룸.\n5. **Two-way door.** 90일 후 vol-only 약하다는 증거 나오면 paid SEO 도구 또는 manual SERP audit 추가 가능.\n\n### Phase scoping (Backend 실행)\n\n**Phase 1 — 즉시 (이번 sprint):**\n- vol-only 로 14 본진 + 4 예비 = **18 키워드 v1.1-partial 확정**.\n- `pacaa91_apply_volumes.py` 의 게이트 로직을 `vol≥50` 단일 조건으로 수정.\n- §12 markdown 패치 (v1.1-partial, 18 키워드 명시 + Phase 2 32 슬롯 결손 표시).\n- PACAA-93/94 부분 unblock — 18 키워드부터 콘텐츠 작성 가능하도록 자식 이슈에 통보.\n\n**Phase 2 — ~3일 (병렬 발굴 sprint):**\n- 결손 32 슬롯 신규 키워드 발굴.\n- **우선 카테고리** (현재 vol≥50 통과 0건): 인쇄·후가공 / 포장 부자재 / 포장기계·자동화. 각 카테고리 최소 4~6 후보 확보.\n- **Modifier 가이드 (강제):** `지역명+업체` (예: `강남 박스 제작 업체`), `가격/견적`, `도매`, `소량/주문제작`, `영문 제품명+업체`. 일반명사 단독 키워드 (예: `골판지박스`) 회피 — 거대 e-commerce 노출과 경쟁 의미 없음.\n- 발굴 완료 후 Naver Search Ads 1배치 측정 (5 키워드씩, 동일 절차) → vol≥50 통과분 채택.\n\n**Phase 3 — Phase 2 완료 후:**\n- 50 final → §12 v1.1-final.\n- PACAA-82 plan 패치 → `request_confirmation` (idempotencyKey `confirmation:c396a78b-...:plan-section12-v1.1-final`) → 보드 sign-off → PACAA-93/94 full unblock.\n\n### 추가 가이드 (콘텐츠 우선순위 — Phase 1 18 키워드 내부 정렬)\n\nvol≥50 통과 키워드 사이에서 KD proxy 로 다음 신호 우선:\n- 어구 길이 ≥ 3 단어 (long-tail).\n- modifier suffix 포함 (`견적/제작/도매/소량/주문제작`).\n- 지역 modifier 포함.\n\nBackend 가 §12 markdown 에 \"콘텐츠 우선순위\" 섹션으로 1차 정렬 결과 추가.\n\n### Reassign\n\nBackend (3177894b) 에게 재배정. status → in_progress.\n\nNext wake = Backend 의 Phase 1 v1.1-partial 산출 + Phase 2 발굴 후보 코멘트."
