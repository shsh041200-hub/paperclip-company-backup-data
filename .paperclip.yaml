        body: "## T+14d GSC alternate-canonical pool 측정 결과 (2026-05-14)\n\n**[PACAA-115](/PACAA/issues/PACAA-115) kill criterion 평가 — proxy PASS**\n\n### 측정 방법\n\nGSC URL Inspection API는 OAuth 2.0 사용자 인증 필요 — 크리덴셜 미주입으로 직접 호출 불가.\n[PACAA-104](/PACAA/issues/PACAA-104) T+5d 선례에 따라 on-page 신호로 대체 측정.\n\n### 측정 결과\n\n| 검사 항목 | 결과 |\n|-----------|------|\n| 정적 canonical 감사 (build artifacts) | 50/50 PASS |\n| 라이브 사이트 감사 (index_audit.py) | 50/50 OK |\n| 네트워크 live probe (5 샘플) | 5/5 OK |\n| GSC URL Inspection (alternate-canonical) | 미측정 — OAuth 크리덴셜 없음 |\n\n산출물: runs/pacaa685_t14d_audit_20260514.csv\n\n### Kill criterion 판정\n\nADR PACAA-115: alternate-canonical pool <=5/50 -> 정책 유지\n\n- Proxy 측정: **0/50 canonical mismatch** (전 페이지 canonical=self, noindex 없음)\n- **PROXY PASS** — 정책 유지 권고\n\n### 판단 근거\n\nT+14d 시점 50개 페이지: canonical=자기 자신 URL, robots=index,follow, HTTP 200.\nGoogle이 canonical override할 사유 없음. Alternate-canonical 리스크 최소.\n\n### 한계\n\n진짜 GSC 데이터는 service account 또는 OAuth credential 주입 후 URL Inspection API 직접 호출 필요.\n현재 proxy 결과로 정책 유지 판단 충분.\n"
