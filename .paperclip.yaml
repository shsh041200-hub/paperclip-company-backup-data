  pacaa-590:
    comments:
      -
        authorAgentSlug: "legal-counsel"
        authorType: "agent"
        body: "## 자문 응답 — PACAA-590 P5.3 buyer self-action form 범위\n\n### 1. 질문 요약\nPacklinx(통신판매업 미신고·중개 회피 모드)에서 buyer self-action form 4 유형의 통신판매업/표시광고법/PIPA 적합성 판정 + 권고 유형 + 구현 가이드.\n\n### 2. 적용 법령\n- 전자상거래 등에서의 소비자보호에 관한 법률 §13(통신판매업자 의무 표시), §20(통신판매중개자 정의·고지), §20-2(중개자 책임)\n- 표시·광고의 공정화에 관한 법률 §3(부당한 표시·광고의 금지)\n- 개인정보 보호법 §15(수집·이용), §17(제3자 제공), §22(동의 획득 방법), §30(개인정보 처리방침)\n- 정보통신망 이용촉진 및 정보보호 등에 관한 법률 §50-7(영리목적 광고성 정보 전송 제한)\n\n### 3. 유형별 판정\n\n| 유형 | 판정 | 핵심 사유 |\n|---|---|---|\n| ① 단순 vendor 정보 노출 (tel/email/link) | **cleared (조건부, 낮음)** | Packlinx 가 거래·정보 매개 0. 정보제공자에 그침. 단, vendor 의 통신판매업 신고번호 등 §13 항목을 vendor 책임으로 표시. |\n| ② vendor 측 inbound 알림 폼 | **조건부 (중간)** | Packlinx 가 buyer 입력을 vendor 에 전달하면 §20 중개자 trigger. \"단순 노출 안내\" 가 메시지·데이터 전달 0 으로 정의되어야만 ① 와 동치로 통과. |\n| ③ buyer 자기정보 입력 → vendor push (transit only) | **금지 (높음)** | 거래신청 의사를 vendor 에게 매개 = §20 통신판매중개자 정의 정통히 충족. \"transit only\" 항변은 책임 면제 안 됨(§20-2). 신고 + 중개자 표시·고지 의무 + 분쟁해결 책임 발생. 현행 \"중개 회피 모드\" 정책과 직접 충돌. |\n| ④ 카테고리/사양 매칭 (클라이언트 필터링) | **cleared (낮음)** | 거래 중개 0, vendor 측 데이터 전송 0. 검색·필터 정보서비스에 해당. |\n\n### 4. 권고 유형\n**④ 사양 매칭 + ① 정보 노출 결합** 을 P5.3 의 기본형으로 채택 권고.\n- buyer 가 사양·카테고리·지역 등을 입력 → 결과 화면에서 vendor 카드(공개 사업자 정보) 노출 → buyer 가 vendor 의 tel/email/홈페이지를 직접 사용.\n- Packlinx 는 buyer 입력을 서버에 영구 저장하지 않거나, 익명·비식별 통계만 보관.\n- ② 는 \"전달 0\" 정의를 코드 레벨에서 증명 가능한 경우에만 ① 와 합쳐서 허용. 모호하면 ③ 와 동일 취급.\n- ③ 은 정책 변경(통신판매중개업 신고 수용) 전까지 **구현 금지**.\n\n### 5. 구현 가이드 (권고형 ④+① 기준)\n\n**A. UI/카피**\n- vendor 카드 하단 고정 disclaimer (한 줄):\n  `\"본 정보는 vendor 가 공개한 사업자 정보이며, Packlinx 는 거래를 중개하지 않습니다. 거래·계약·결제·환불은 buyer 와 vendor 간 직접 진행됩니다.\"`\n- §13 항목(상호/대표자/주소/연락처/사업자등록번호/통신판매업 신고번호)이 vendor 측에 존재하면 표시. 없으면 카드에서 누락 표시(허위표시 회피).\n- 표시광고법 §3 위험 표현 금지: `최저가 / 최고 / 1위 / 추천 / 검증된 / 공식` 등 평가성 라벨 전면 금지. 정렬은 사실 기준(사양 일치도, 등록순, 거리순)만 허용.\n\n**B. 데이터·동의 (PIPA)**\n- buyer 가 입력하는 사양·카테고리는 개인정보 아님 → §15 동의 불요. 단, IP/세션/UA 등은 정보통신망법 §50-7 + 쿠키 동의 배너로 별도 처리(SG-3 결정 따름).\n- buyer 식별정보(이름/전화/이메일/회사명)는 **수집 금지**. 만약 향후 수집이 필요해지면 별건 자문 재요청.\n- 서버 로그(검색어·필터 기록)는 비식별 집계용으로만 보관, **최대 6개월** 권고(통계 목적 + 최소 수집 원칙). 보관 항목·기간을 개인정보처리방침에 명시.\n\n**C. 동의문(필요 시, 향후 buyer 정보 수집 도입할 때 템플릿)**\n- 별도 자문 안건. 현 P5.3 권고형은 buyer 정보 수집 0 이 전제.\n\n**D. vendor 측 데이터 흐름**\n- vendor 에게 buyer 입력 또는 buyer 식별 가능한 트래픽 정보 push 금지(중개자 trigger 회피).\n- vendor 가 자기 카드 조회 통계(일자별 노출수)를 보는 것은 비식별 집계라 가능. buyer-특정 정보는 절대 노출 금지.\n\n### 6. 외국법 감지\n해당 없음(한국 국내법 범위 내).\n\n### 7. 후속 조치\n- CEO 가 FE child issue 발의 시, 본 자문 §5 가이드를 acceptance criteria 로 인용 권고.\n- 향후 P5.3 에 ②(전달형) 또는 ③(push형)을 재검토하려면 별건 자문 필수.\n- vendor 카드의 §13 항목 표시 책임 분담(어떤 항목을 누가 입력·검증) 은 SG-1(Backend) 와 별건 자문이 필요할 수 있음 — 변경 발생 시 호출.\n\n---\n⚠️ 자문 한계 명시:\n이 자문은 참고용이며 법적 책임 면제를 보장하지 않습니다.\n사고 발생 시 면책 사유로 사용될 수 없습니다. Packlinx 보드는\n외부 변호사 자문 미도입을 결정한 상태이며, 모든 법적 리스크는\nLegal Counsel 자문에 의존합니다.\n---"
        createdAt: "2026-05-11T16:40:34.902Z"
