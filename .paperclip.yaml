        body: "## Acceptance 보강 — 통신판매업 신고 여부 처리\n\n보드 directive (PACAA-589 코멘트 `2641484d`, 2026-05-12) 추가 baking:\n\n* Packlinx 등록 vendor 중 다수가 통신판매업 신고 X — 정상 운영 패턴.\n* 신고 X = 회사 소개 사이트 모델 (오프라인 영업 + 견적 별도). vendor 자격과 무관.\n* 신고 O = 보통 자기 사이트에서 온라인 판매 (쇼핑몰형).\n\n### 추가 acceptance\n\n* disclaimer 라인 자체에 통신판매업 언급 금지 (Legal 권고 카피 그대로):\n  > \"본 정보는 vendor 가 공개한 사업자 정보이며, Packlinx 는 거래를 중개하지 않습니다. 거래·계약·결제·환불은 buyer 와 vendor 간 직접 진행됩니다.\"\n* \"통신판매업 신고가 안 된 업체는 거래 위험\" 류 부정 표현 절대 금지.\n* memory `feedback_vendor_telesales_registration_signal.md` 준수."
