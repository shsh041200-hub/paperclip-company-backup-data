        body: "## 추천: **옵션 C — `keywords.packlinx.com` 서브도메인 매핑**\n\n질문 두 축 (기존 사이트 무피해 + 퀄리티 최고) 모두 만족하는 유일한 옵션입니다.\n\n### 기존 packlinx.com 에 미치는 영향 비교\n\n| 옵션 | 기존 사이트 영향 | 가능한 사고 |\n| --- | --- | --- |\n| **A. 통합** | **있음** — packlinx-web repo 의 라우트/sitemap.xml 수정, redeploy 시 1,031 URL 기존 페이지에 영향 가능 | 라우트 충돌, 기존 sitemap regex 깨짐, build break |\n| **B. vercel 그대로** | 없음 | — (단 SEO 퀄리티 0) |\n| **C. 서브도메인** | **없음** — `packlinx.com` A/CNAME/MX 레코드 변경 없음, `packlinx-web` 배포 무관, 새 호스트 `keywords` 만 신규 CNAME 추가 | — |\n\n### 퀄리티 비교 (90일 SG-2 SERP top 10 ≥20개)\n\n| 옵션 | 도메인 authority | 인덱스 portability | 통합 시 redirect |\n| --- | --- | --- | --- |\n| A | 100% (메인 도메인) | 동일 도메인 내라 portability 무관 | — |\n| B | 0 (vercel.app, free tier) | 폐기 = 인덱스 손실 | host 이전 = 손실 |\n| **C** | **부분 상속** — Google 정책상 서브도메인은 main 도메인 신뢰의 일부를 받음 (HSTS / 브랜드 일관성 신호) | **유지** — main 도메인의 일부 | `keywords.packlinx.com/X` → `packlinx.com/keywords/X` 301 한 번이면 인덱스/링크 equity 이전 가능 |\n\n### 정리\n\n* **A**: 퀄리티 최고지만 **기존 사이트 건드림** — \"피해주지 않으면서\" 조건 위반.\n* **B**: 무피해지만 퀄리티 0 — 8주차 게이트 통과 어려움.\n* **C**: 무피해 + 퀄리티 차선 (A 와 격차 작음, B 보다 압도적 우위) — **유일한 교집합**.\n\n### 작업량 (옵션 C 기준)\n\n**CEO ~20분**:\n1. Vercel 콘솔 → `pacaa94-keywords` 프로젝트 → Settings → Domains → `keywords.packlinx.com` 추가\n2. 도메인 DNS 관리 콘솔 → CNAME `keywords` → `cname.vercel-dns.com` 추가 (기존 A 레코드/MX 미변경)\n3. GSC → Add property → `https://keywords.packlinx.com` (URL prefix) → Verify (메타 태그 자동 통과)\n4. Naver Search Advisor → 사이트 추가 → `https://keywords.packlinx.com` → 사이트맵 제출 `https://keywords.packlinx.com/sitemap.xml`\n5. 본 에이전트에 VERCEL_TOKEN 재제공 (PACAA-94 사용분 동일)\n\n**Backend Eng (자동, 1 heartbeat)**:\n1. `site/app/layout.tsx` 에 `metadataBase: new URL('https://keywords.packlinx.com')` + GSC/Naver verification 메타 추가 (PACAA-81 코드 재사용)\n2. `python3 scripts/build-sitemap.py --base https://keywords.packlinx.com --out out/sitemap.xml` 재실행\n3. `bash scripts/deploy-vercel.sh` 1-command 배포\n4. 배포 후 `python3 scripts/index_audit.py` 50/50 사후 검증\n5. 5 일 후 GSC/Naver 콘