        body: "## [초안] Guide 1: `packaging-printing-guide` — 패키징 인쇄 공정 가이드\n\n> Legal 사전 자문([PACAA-453](/PACAA/issues/PACAA-453)) 권고 적용본. 표시광고법 §3 준수 — 친환경 단정 표현 제거, 인증 fact 검증형 톤 적용, 식약처 고시 정식 표기.\n\n---\n\n### 슬롯 1 — TL;DR\n\n- **인쇄 방식 선택이 포장 단가와 품질을 결정한다** — 오프셋·디지털·플렉소 등 공정별 최소 발주량·색상 수·기재 적합성 차이를 사전 파악하면 과잉 비용을 줄일 수 있습니다.\n- **환경 인증은 공급업체 주장이 아닌 인증서로 직접 확인해야 한다** — 환경부 환경표지 또는 ISO 14001 등 공식 인증 보유 여부를 견적 단계에서 인증서로 요청하는 것이 안전합니다.\n- **식품 접촉 포장은 식약처 고시 기준 적합 잉크 사용 업체를 선택해야 한다** — 「기구 및 용기·포장의 기준 및 규격」(식품의약품안전처 고시 기준) 적합 소재·잉크 사용 여부를 사전 확인하세요.\n\n---\n\n### 슬롯 2 — Callouts\n\n> **[info]** 잉크 종류에 따라 인쇄 후 냄새·이행성이 달라집니다. VOC 함량 낮은 잉크(저VOC 잉크) 사용 여부를 발주 전 공급업체에 확인하면 식품·의약품 포장 클레임을 사전에 방지할 수 있습니다.\n\n> **[warn]** \"친환경 인쇄\"는 규제 기관이 정의한 단일 기준이 없습니다. 공급업체의 친환경 주장은 환경부 환경표지·GR인증·ISO 14001 등 공식 인증서로 반드시 검증하세요. 인증서 없는 친환경 단정 표현은 표시광고법 §3 위반 소지가 있으며, Packlinx는 특정 업체의 인증 사실을 단정하지 않습니다.\n\n> **[tip]** 단색·2도 인쇄는 플렉소·스크린, 풀컬러 고화질은 오프셋·디지털 UV, 소량 다품종은 디지털이 비용 효율적입니다. 수량·색상·기재를 먼저 정리한 뒤 견적을 요청하세요.\n\n---\n\n### 슬롯 3 — Checklist\n\n- [ ] 인쇄 방식(오프셋/디지털/플렉소/그라비아)과 최소 발주량 확인\n- [ ] 기재(종이·PET·PE 등)와 잉크 호환성 사전 검토\n- [ ] 식품 접촉 포장의 경우 식약처 고시 기준 적합 잉크·코팅 사용 여부 확인\n- [ ] 친환경 인쇄 요구 시 공식 인증서(환경표지/ISO 14001 등) 직접 요청·확인\n- [ ] 교정쇄(색상 시편) 수령 후 승인, 본 인쇄 진행 전 품질 기준 합의\n\n---\n\n### 슬롯 4 — FAQ\n\n**Q. 소량 주문 시 어떤 인쇄 방식이 유리한가요?**\nA. 디지털 인쇄는 판(plate) 제작 비용이 없어 소량(보통 1,000부 미만)에서 단가 경쟁력이 있습니다. 다만 색 재현율은 오프셋 대비 차이가 있으므로 샘플 확인 후 결정하는 것이 좋습니다.\n\n**Q. VOC 함량 낮은 잉크는 어떻게 확인하나요?**\nA. 공급업체에 MSDS(물질안전보건자료) 제공을 요청하거나, 환경부 환경표지 인증 제품 여부를 인증서로 확인하는 방법이 있습니다.\n\n**Q. 식품 포장 인쇄에는 어떤 기준이 적용되나요?**\nA. 식품의약품안전처 고시 「기구 및 용기·포장의 기준 및 규격」에 따라 식품 접촉면 소재·잉크에 대한 안전 기준이 적용됩니다. 공급업체에 해당 기준 적합 확인서 제출을 요구하는 것이 안전합니다.\n\n**Q. 해외(EU) 수출 포장에도 인쇄 기준이 있나요?**\nA. EU는 Regulation (EC) No 1935/2004(식품 접촉 소재 기준)이 적용됩니다. 수출 포장이라면 수입국 법령에 맞는 잉크·소재 사용 여부를 발주 전 확인하세요.\n\n---\n\n### 슬롯 5 — Sidebar 관련\n\n- [판지 포장 가이드](/guides/cardboard-packaging-guide)\n- [포장재 소재 선택 가이드](/guides/packaging-materials-guide)\n- [친환경 포장 가이드](/guides/eco-packaging-guide)\n- [식품 포장 가이드](/guides/food-packaging-guide)\n\n---\n\n### 슬롯 6 — End-CTA\n\n**title:** 인쇄 공정에 맞는 포장 업체, Packlinx에서 찾으세요\n**subtitle:** 공정·기재·인쇄 방식별 공급업체를 비교하고 견적을 바로 요청할 수 있습니다.\n**href:** `/vendors?category=packaging-printing`\n"
