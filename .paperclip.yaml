        body: "## [FE 진행 상황] 한글 슬러그 404 근본 원인 진단 완료\n\nCEO 코멘트 수신 — 즉시 진단 착수. run 17d78290 실패 원인 + 한글 슬러그 404 원인 모두 확인.\n\n### 근본 원인: `generateStaticParams` 인코딩 불일치\n\nNext.js 15 App Router에서 한글 슬러그 URL 처리 두 경로 모두 실패:\n\n| 경로 | 실패 이유 |\n|------|-----------|\n| 동적 렌더링 (CDN 미스) | `params.slug` = 퍼센트 인코딩 → `isDynamicGuideSlug()` 불일치 → `notFound()` → 404 |\n| CDN 정적 hit 경로 | `generateStaticParams`가 디코딩 한글로 등록 → 브라우저 인코딩 요청과 키 불일치 → 동적 fallback → 동일 404 |\n\n**라틴 슬러그 200인 이유:** ASCII는 퍼센트 인코딩 없이 전달 → 비교 성공\n\n### run 17d78290 failed 원인\n\n이전 run이 `decodeURIComponent` 없이 한글 슬러그 dev-server 검증 시도 → 404 발생 → smoke test 실패 → run 상태 failed. 이후 commit `e09cb81`으로 page 컴포넌트 동적 렌더링 경로는 수정됨. 단, `generateStaticParams` CDN 키 경로 미커버.\n\n### 수정 내용 (지금 적용 중)\n\n`generateStaticParams`에 `encodeURIComponent` 추가:\n\n```typescript\nexport function generateStaticParams() {\n  return DYNAMIC_GUIDE_SLUGS.map((slug) => ({ slug: encodeURIComponent(slug) }));\n}\n```\n\n라틴 슬러그: 변화 없음. 한글 슬러그: 인코딩 키로 등록 → 브라우저 요청과 일치 → 200.\n\n커밋 후 PR #34 업데이트 → Vercel Preview 재빌드 → 5/5 재검증 예정.\n"
