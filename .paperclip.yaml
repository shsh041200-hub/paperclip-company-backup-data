        body: "## C 채택 — 수정된 실행 계획\n\n**Vercel/봇 건은 알겠습니다.** 추가 액션 안 잡습니다. 사이트 정상화 후에도 별도 보고 불필요.\n\n검색 유입이 거의 없다는 사실은 **One-way door를 Two-way door로 바꿉니다.** 가장 큰 리스크였던 SEO 자산 손실이 사라졌으므로 다음 항목 변경:\n\n- **드롭**: SEO 점유율 조사 단계 (사전 권고 1번) — 보호할 트래픽이 없음.\n- **간소화**: 301 매핑 — sitemap·검색콘솔 갱신 정도로 축소, 백링크 핸들링 불필요.\n- **속도**: 점진 마이그레이션 → 일괄 마이그레이션 가능.\n\n---\n\n### 1. 제품 형태 L1 슬러그 안 (확정 요청)\n\n핵심 발견: 기존 코드에 이미 `PackagingForm` enum(10종)이 *필터*로 존재합니다. 이걸 그대로 **L1 페이지로 승격**하면 됩니다 — 신규 분류 체계 발명 불필요, Uline 패턴과 정확히 일치.\n\n**`/products/[slug]` (11개):**\n\n| 슬러그 | 라벨 | 출처 | 흡수 대상 |\n|---|---|---|---|\n| `box` | 박스·케이스 | PackagingForm.box_case | — |\n| `pouch` | 파우치·백 | PackagingForm.pouch_bag | — |\n| `container` | 병·용기 | PackagingForm.bottle_container | — |\n| `tube` | 튜브 | PackagingForm.tube | — |\n| `can` | 캔·틴 | PackagingForm.can_tin | — |\n| `shopping-bag` | 쇼핑백·캐리어백 | PackagingForm.shopping_bag | — |\n| `cushioning` | 완충재·보호재 | PackagingForm.cushioning | — |\n| `film` | 스트레치·필름 | PackagingForm.stretch_film | — |\n| `label` | 라벨·스티커 | PackagingForm.label_sticker | — |\n| `tape` | 테이프·밀봉재 | PackagingForm.tape_sealing | — |\n| `printing-design` | 인쇄·디자인 서비스 | 현 IndustryCategory.print_design_services 이전 | print_design_services |\n\n평균 138개 업체/슬러그 (1,380 ÷ 10) — 카드 밀도 충분.\n\n**`/industries/[slug]` (5개, 정리됨):**\n\n| 슬러그 | 라벨 | 흡수 대상 |\n|---|---|---|\n| `food-beverage` | 식품·음료 | + fresh_produce_packaging (패싯 \"신선·콜드체인\"으로 표현) |\n| `cosmetics-beauty` | 화장품·뷰티 | — |\n| `pharma-health` | 의약·건강 | — |\n| `electronics-industrial` | 전자·산업 | — |\n| `ecommerce-shipping` | 이커머스·배송 | — |\n\n**L1에서 제거 (패싯 필터로 강등):**\n- `eco-special` → 패싯 \"친환경 인증\" (CertificationCategory.environmental에 이미 존재 — 활용)\n- `fresh_produce_packaging` → food-beverage 흡수 + boolean 패싯 \"신선·콜드체인\"\n- `print_design_services` → `/products/printing-design`로 이전\n\n**패싯 필터 (모든 페이지 공통, 정리됨):**\n- 소재 6종 (`MaterialType` 그대로)\n- 인증 17종 (`CertificationType` 그대로, 카테고리별 그룹)\n- 사용처 (use_case_tags 테이블)\n- 친환경 여부 (boolean)\n- 신선·콜드체인 (boolean, fresh_produce 흡수)\n- MOQ / 샘플 가능 / 가격대 / 배송 지역\n\n**CompanyTag 6종 정리:**\n- `food_grade`, `industrial`, `cosmetic`, `pharma`, `ecommerce` → IndustryCategory와 1:1 중복 → **제거**\n- `design_service` → `/products/printing-design`으로 흡수 → **제거**\n- → CompanyTag enum 자체 제거 (분류 신호 단일화)\n\n---\n\n### 2. 분리 발주 예정 서브티켓 (CTO)\n\n승인 시 즉시 발주합니다. 모두 PACAA-15 하위 블록.\n\n| # | 제목 | 범위 | 의존성 |\n|---|---|---|---|\n| PACAA-15.1 | 신규 `/products/[slug]` 라우트 + 11개 페이지 신설 | 라우트 추가, PackagingForm 기반 vendor 쿼리, 카테고리 가이드 콘텐츠 신규 11종 | 없음 |\n| PACAA-15.2 | IndustryCategory 정리 + 슬러그 통일 | snake_case → kebab-case, fresh_produce 흡수, eco-special 제거, print_design 이전 | PACAA-15.1 후 |\n| PACAA-15.3 | 분류기 단일화 + CompanyTag 폐기 | classifier.ts 룰 통합, tags 컬럼 마이그레이션, vendor 일괄 재분류 | PACAA-15.2 병행 |\n| PACAA-15.4 | 패싯 필터 통합 + sitemap·검색콘솔 갱신 | 친환경/신선/콜드체인 boolean 패싯, sitemap 재생성 | PACAA-15.1, .2 후 |\n\nPACAA-15는 위 4개를 `blockedByIssueIds`로 잡고 umbrella로 운영합니다.\n\n---\n\n### 3. 보드 결정 요청\n\n위 슬러그 안(11 products + 5 industries)으로 진행해도 되겠습니까?\n\n- **OK** → 즉시 4개 서브티켓 발주 → CTO 실행 시작\n- **수정 요청** → 어느 항목 (예: \"shopping-bag을 box에 흡수\", \"printing-design을 별도 services L0로 분리\" 등)\n\n승인 또는 한 글자 응답이면 즉시 진행합니다.\n\n— CEO\n"
