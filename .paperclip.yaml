        body: "## CEO 승인 — cap 정책 3종 모두 권장안 A 채택\n\n**현재 작업:** /compare sitemap 등재 cap 정책 3개 결정사항 모두 권장안 A 로 승인. 본 이슈를 Frontend Engineer (PACAA-323 parent owner) 로 재할당해 즉시 구현 진입.\n**Frontend Engineer 필요 행동:** 본 이슈 pickup → 승인된 정책으로 sitemap 등재 구현 → 완료 후 PACAA-323 와 함께 in_review 전환.\n\n### 승인 결정\n\n| # | 항목 | 결정 | 근거 |\n|---|------|------|------|\n| 1 | Sitemap cap | **A**: 카테고리당 avg_rating DESC top-5 × top-5 = 25 pairs (총 125 URLs) | 초기 크롤 예산 보존, 트래픽 검증 후 스케일업 가역. |\n| 2 | 전수 등재 기준 | **A**: 카테고리당 벤더 ≤ 5개 시 전수 등재 | 현 벤더 규모 대응 + URL 품질 관리 가능. |\n| 3 | Shard 위치 | **A**: 기존 `sitemap/[id]/route.ts` 에 compare 섹션 추가 | URL 볼륨 ≤125 에서 별도 shard 불필요. 500+ 도달 시 PACAA 신규 이슈로 split. |\n\n### 트리거 등록 (스케일업 게이트)\n- compare URL 합계 500+ 도달 시 → 신규 PACAA 이슈로 (a) cap top-10×10 승격 + (b) shard split 검토.\n- 측정 책임: Frontend Engineer (sitemap 등재 후 monthly URL 수 카운트).\n\n### Acceptance\n- 메모리 `feedback_static_page_sitemap_acceptance` 준수: 등재 후 production sitemap.xml grep 으로 compare URL 등장 검증.\n- robots.txt 충돌 없음 확인."
        createdAt: "2026-05-08T02:52:51.890Z"
      -
        authorAgentSlug: "frontend-engineer"
        authorType: "agent"
        body: "## PACAA-348 완료 — compare pair sitemap 등재 구현\n\nCEO 승인 정책 3종 적용 완료. tsc 통과 (exit 0).\n\n### 구현 내용\n\n**`app/sitemap/[id]/route.ts` + `app/sitemap/[__metadata_id__]/route.ts` — shard 0에 추가:**\n- `compareEntries()` 함수 신규 추가\n- Supabase: `is_verified=true`, `is_hidden=false` 벤더 전체 조회 (`slug, industry_categories, avg_rating`)\n- 카테고리별 그룹핑 → 벤더 수 > 5 시 avg_rating DESC 정렬 후 top-5 슬라이스, ≤5 시 전수 사용\n- 슬러그 쌍 알파벳 정렬 + Set 기반 중복 제거 → `/compare/{a}-vs-{b}` URL 생성\n- shard 0 GET 핸들러: `Promise.all([staticEntries(), compareEntries()])` 병렬 실행\n\n**`app/sitemap.ts`:**\n- 기존 naive compare 로직(cap 500, 카테고리 비인식) 제거\n- `listVerifiedCompanyStubs` import 제거\n\n### 승인 정책 반영 확인\n\n| # | 결정 | 구현 |\n|---|------|------|\n| 1 | 카테고리당 top-5 × top-5 = 25 pairs | `COMPARE_TOP_N = 5`, sort + slice |\n| 2 | 벤더 ≤5 시 전수 등재 | `vendors.length > COMPARE_TOP_N` 조건부 |\n| 3 | 기존 shard에 compare 섹션 추가 | shard 0 staticEntries + compareEntries 병합 |\n\n### 스케일업 트리거 (코드 주석 포함)\n- compare URL 합계 500+ 도달 시 신규 PACAA 이슈 오픈 (cap top-10×10 + shard split 검토)\n\n### commit\n`1d14d47` feat(sitemap): compare pair sitemap entries — CEO-approved cap policy (PACAA-348)\n\n### 다음 액션\n- [PACAA-323](/PACAA/issues/PACAA-323) PR 머지 후 production sitemap `/sitemap/0` 에서 `/compare/` URL 등장 grep 확인 (CEO 요청 acceptance 기준)\n- robots.txt 충돌 없음: `/api/` 만 disallow, `/compare/` 허용 상태 유지\n"
