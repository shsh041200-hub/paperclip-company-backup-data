        body: "## Phase 2 파싱 완료 — §12 v1.1-final-proposal 패치, 보드 사인오프 요청\n\n### 결과 요약\n\n| Source | 통과 |\n|---|---|\n| Phase 1 본진+예비 (4월 29일) | 18 |\n| Phase 2 P-pool P01~P50 | **5** (P04, P05, P11, P33, P44) |\n| Phase 2 연관키워드 마이닝 (3,304행) | 21 (M01~M21) |\n| **합계** | **44/50** (gap=6) |\n\nP-pool 통과율 5/50은 예상 대비 매우 낮음. 원인: 4-token 이상 long-tail 다수가 vol=10 미달. 짧은 head-term (예 `스티커 제작` vol=42,900 / `UV 인쇄` vol=1,680 / `마스킹테이프 제작` vol=2,870) 이 vol≥50 통과 패턴 — 따라서 같은 xlsx의 연관키워드 데이터에서 B2B intent (제작/도매/업체/가격/인쇄/공장) + vol≥50 마이닝하여 21개 추가 채택.\n\n### 카테고리별 분포 (overshoot 발생)\n\n| 카테고리 | 채택 | 목표 | gap |\n|---|---|---|---|\n| 골판지·종이박스 | 9 | ~6 | overshoot +3 |\n| 라벨·스티커 | 8 | ~6 | overshoot +2 |\n| 연포장재 | 7 | ~6 | overshoot +1 |\n| 인쇄·후가공 | 6 | ~6 | OK |\n| 플라스틱 용기·병 | 6 | ~6 | OK |\n| 포장 부자재 | 6 | ~6 | OK |\n| **유리·금속 용기** | **1** | ~6 | **gap 5** |\n| **포장기계·자동화** | **1** | ~8 | **gap 7** |\n\n유리·금속 / 포장기계는 Naver 연관키워드 풀에 vol≥50 + B2B intent 후보가 거의 없음. Phase 3 발굴 sprint 필요.\n\n### 산출물\n\n- 플랜 §12 패치: [v1.1-final-proposal](/PACAA/issues/PACAA-82#document-plan) (rev `7359c6e4`)\n- 슬레이트 CSV: `plans/pacaa91_v1_1_final.csv` (44 확정 + 6 [GAP] 슬롯)\n- Phase 2 매칭 결과: `plans/pacaa91_phase2_filled.csv`\n\n### 보드 결정 옵션\n\n다음 `request_confirmation` 으로 정식 사인오프 요청. 옵션 셋:\n\n- **A. 제안 1 (default — 권장):** 44 확정 + Phase 3 6개 발굴 sprint. PACAA-93/94 즉시 콘텐츠 작성 가능 분량 = 44 (Phase 1 18 대비 2.4×). overshoot 카테고리 (골판지/라벨/연포장재) 인정.\n- **B. 제안 2:** overshoot 강제 trim (38/50) 후 Phase 3 12 sprint 로 50 도달. 콘텐츠 즉시 가능 분량 38 로 감소.\n- **C. 거절:** §12 재구성 또는 modifier/category 정책 변경 지시.\n\n### Phase 3 발굴 방법 (A 채택 시)\n\n유리·금속 +3, 포장기계 +3 = 6개. 옵션:\n- (a) 보드 Naver UI 시드 변경 (`유리병 OEM`, `유리용기 공장`, `포장설비`, `자동화 장비` 등) 추가 조회\n- (b) Backend 가 Google Trends + Naver DataLab API (오픈, 자격증명 불필요) 로 자동 발굴\n- (c) 90일 success/kill 영향 미미 — v1.2 deferral\n\n추천: **(b)** Backend 자동 발굴 + 보드 사후 검토. Phase 3 sprint 별도 child issue 로 관리.\n\n### 다음 액션\n\n보드 응답 = `request_confirmation` accept (A/B/C 중 택1). Accept 시 PACAA-93/94 unblock 알림 + Phase 3 child issue 생성.\n"
