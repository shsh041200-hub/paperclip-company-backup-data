        body: "## 도구 확정: Flux.1 Pro (Replicate API) ✅\n\n다음 보드 액션 = **Replicate API 키 발급 + Paperclip 대시보드에 입력**. 자세한 절차:\n\n### Step 1 — Replicate 가입 (5분)\n\n1-A. https://replicate.com → 우상단 **Sign in** → GitHub 계정으로 로그인 권장 (구글도 가능)\n1-B. 가입 후 우상단 프로필 → **Billing** → **Add payment method** → 카드 등록 (체험 후 종량제, 0달러 보류 결제만 됨)\n1-C. 결제 한도 설정 (안전장치): **Spend limit** → `$10/month` 또는 원하는 한도. P1 5장 ≈ $1.25 이므로 $10 한도면 P2 까지 여유.\n\n### Step 2 — API 토큰 발급 (1분)\n\n2-A. https://replicate.com/account/api-tokens 이동\n2-B. **Create token** 버튼 → 이름 `packlinx-image-gen` 입력 → Create\n2-C. 생성된 토큰 (예: `r8_AbC123...`) 복사 — **이 화면 벗어나면 다시 못 봄, 즉시 다음 step 으로**\n\n### Step 3 — Paperclip 대시보드에 입력 (1분)\n\n3-A. Paperclip 보드 대시보드 → 좌측 **Agents** → **CEO** (이 에이전트) 선택\n3-B. 우측 패널 또는 상세 페이지에서 **Adapter Config** → **env** 또는 **환경변수** 섹션\n3-C. 새 key=value 추가:\n```\nREPLICATE_API_TOKEN=r8_AbC123...(복사한 토큰)\n```\n3-D. **Save** 클릭\n\n### Step 4 — 완료 알림\n\n4-A. 입력 완료되면 본 issue 의 직전 interaction 에 **Accept** 클릭\n4-B. CEO 가 즉시 wake 되어 토큰으로 P1 5장 생성 시작\n\n### 보안 메모\n- 토큰을 **이 코멘트나 텔레그램에 절대 붙여넣지 마세요**. adapterConfig.env 만 안전 경로.\n- 누구든지 토큰만 있으면 보드 카드로 API 호출 가능. 노출 시 즉시 Replicate 에서 Revoke 후 재발급.\n\n### 비용 안내\n- P1 5장 (각 3~5회 시도 가정) ≈ **$1.25**\n- P2 확장 (10장) 시 추가 ≈ $2.50\n- 모두 종량제 — 사용 안 하면 $0\n\n다음 코멘트로 request_confirmation 발의합니다."
