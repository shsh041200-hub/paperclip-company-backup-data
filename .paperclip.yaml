        body: "Backend Engineer 에 [PACAA-413](/PACAA/issues/PACAA-413) 위임 완료 (FROM_ADDRESS 1-line 패치). 보드 가이드 작성.\n\n---\n\n[CEO Path A 가이드 — 5단계 + 코드 패치 1건]\n\n**현재 작업:** Path A 자세한 단계 + Backend Engineer 코드 패치 위임 ([PACAA-413](/PACAA/issues/PACAA-413)).\n**보드님 필요 행동:** 아래 1~5단계 (Backend Engineer commit 보고 후 4단계 진행 권장).\n\n## 사전 발견: 1-line 코드 패치 필요 (Backend Engineer 진행)\n\n`lib/emails/index.ts` 의 `FROM_ADDRESS = 'noreply@packlinx.com'` 가 하드코딩. Resend 는 미인증 도메인 발송 차단하므로 **Path A 는 코드 한 줄 변경 필수** (CTO 어제 advisory 명시).\n\n→ [PACAA-413](/PACAA/issues/PACAA-413) Backend Engineer (3177894b) 위임. branch `feat/quote-form-plausible-PACAA-358` 에 push 예정 (PR #27 자동 갱신). 커밋 SHA 보고 후 4단계 진행 권장.\n\n---\n\n## 1단계 — Resend 가입 + API key 발급 (1~2분)\n\n### 1-A. 가입\n- URL: [https://resend.com/signup](https://resend.com/signup)\n- Google 또는 이메일 가입 (신용카드 불필요)\n- **before signal:** Resend signup 페이지 노출\n- **after signal:** Dashboard 진입, 좌측 사이드바에 `API Keys / Domains / Emails / Logs` 메뉴 보임\n\n### 1-B. API key 생성\n- 좌측 사이드바 **`API Keys`** 클릭\n- 우상단 **`+ Create API Key`** 버튼 클릭\n- Name: `packlinx-prod` (자유 입력)\n- Permission: **`Full access`** 선택 (Sending access only 도 가능하나 미래 수정 위해 Full)\n- **`Add`** 클릭\n- **after signal:** 모달에 `re_xxxxxxxx_xxxxxxxxx...` 형식 키 1회 표시. **이 페이지를 닫지 말고** 다음 3단계 직전까지 보관 (한 번만 표시됨)\n\n---\n\n## 2단계 — Supabase 키 2개 복사 (보드 기존 프로젝트)\n\n[https://supabase.com/dashboard/projects](https://supabase.com/dashboard/projects) → packlinx 프로젝트 선택 → 좌측 사이드바 **`Settings`** (톱니바퀴) → **`API`** 탭\n\n### 2-A. `NEXT_PUBLIC_SUPABASE_URL` 복사\n- **`Project URL`** 섹션 (상단)\n- 형식: `https://xxxxxxxxxxxx.supabase.co`\n- 우측 **복사 아이콘** 클릭\n\n### 2-B. `SUPABASE_SERVICE_ROLE_KEY` 복사\n- **`Project API keys`** 섹션\n- `service_role` 행 — **`Reveal`** 클릭하여 키 노출 후 복사\n- ⚠️ 이 키는 RLS 우회 권한 — public/client 노출 금지, 서버 환경변수 only\n\n**after signal:** 두 값 모두 임시 메모장에 저장 (Vercel UI 직접 입력 시까지)\n\n---\n\n## 3단계 — Vercel env 3개 등록\n\n[https://vercel.com/dashboard](https://vercel.com/dashboard) → **`packlinx-web`** 프로젝트 클릭 → 상단 탭 **`Settings`** → 좌측 사이드바 **`Environment Variables`**\n\n각 키마다:\n- 우상단 **`Add New`** 버튼 클릭\n- **Key** 입력\n- **Value** 붙여넣기\n- **Environments**: `Production` + `Preview` 둘 다 체크 (`Development` 는 선택)\n- **`Save`** 클릭\n\n| 등록할 Key | Value 출처 | 비고 |\n|-----------|-----------|------|\n| `RESEND_API_KEY` | 1-B 의 `re_...` 키 | 1번만 노출, 분실 시 1단계 재발급 |\n| `NEXT_PUBLIC_SUPABASE_URL` | 2-A 의 `https://xxx.supabase.co` | NEXT_PUBLIC_ prefix → 클라이언트 노출 가능 |\n| `SUPABASE_SERVICE_ROLE_KEY` | 2-B 의 `service_role` 키 | 서버 only, public 노출 금지 |\n\n**after signal:** Environment Variables 목록에 3개 행 추가 노출, 각 Production+Preview 체크박스 표시\n\n---\n\n## 4단계 — PR 머지 (Backend Engineer commit 보고 후)\n\n[PACAA-413](/PACAA/issues/PACAA-413) 완료 후 branch 갱신 확인 → GitHub UI 에서 순서대로:\n\n1. **PR #25** 머지 → [https://github.com/shsh041200-hub/pkging-platform/pull/25](https://github.com/shsh041200-hub/pkging-platform/pull/25) → `Merge pull request` 클릭 → DB 마이그레이션 (`quote_requests` 테이블) 적용\n2. **PR #27** 머지 → [https://github.com/shsh041200-hub/pkging-platform/pull/27](https://github.com/shsh041200-hub/pkging-platform/pull/27) → `Merge pull request` 클릭 → API + 견적 폼 + Plausible + FROM_ADDRESS 패치 일괄 배포\n\n⚠️ PR #25 → #27 순서 중요 (PR #27 의 API 가 `quote_requests` 테이블 의존)\n\n**after signal:** 두 PR 모두 `Merged` 라벨, Vercel 대시보드 → Deployments 탭에 신규 배포 1개 (~2~3분 빌드)\n\n---\n\n## 5단계 — 배포 검증\n\n- 빌드 완료 후 [https://www.packlinx.com/compare](https://www.packlinx.com/compare) 방문\n- 비교 결과 페이지 하단에 **견적 의뢰 폼** 노출 확인 (이름·연락처·PIPA 동의 2개 체크박스)\n- 임의 입력으로 `POST /api/quote-requests` 발송 → 201 응답 + Resend Dashboard → `Logs` 탭에서 발송 기록 1건 노출\n- 본 issue 에 검증 결과 코멘트 → `done` 처리\n\n---\n\n## 우려·차단 발생 시\n\n- Resend 가입/API key 발급 막힘 → 본 issue 코멘트, CEO 가 Resend dev 발신자 fallback 옵션 추가 surface\n- Supabase 키 위치 못 찾음 → Settings → API 위치 스크린샷 요청 가능 (메모리 [external SaaS UI 1차 실패 시 = 스크린샷·피벗])\n- Vercel env Save 후 즉시 반영 안 되면 Deployments → 최신 deploy → **`Redeploy`** 클릭 (Use existing Build Cache 체크 해제 권장)\n\n— CEO"
