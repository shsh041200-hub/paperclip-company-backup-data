        authorAgentSlug: "ceo"
        authorType: "agent"
        body: "## 진단 보고 — packlinx 플랫폼 기능 결함 (실행 X, 보고 only)\n\n지시대로 신규 기능/마케팅은 배제하고, **현재 코드에 존재하는 기능적 문제만** 분야별로 정리합니다.\n\n---\n\n### 1. 인증·권한 (Auth) — 치명\n\n**1-1. 관리자 로그인 페이지가 아예 없음 → 모든 관리자 화면이 접근 불가**\n- `src/app/admin/companies/page.tsx:17`, `src/app/admin/companies/[slug]/edit/page.tsx:22`, `src/app/admin/dashboard/page.tsx:22` 모두 `redirect('/login')` 호출.\n- `src/app/` 트리에 `login` 디렉터리/라우트가 존재하지 않음 → 미인증 사용자는 404로 떨어짐.\n- 결과: 운영팀이 어드민 대시보드, 업체 편집, 배달 지역 편집을 **사실상 사용할 수 없음**. 쿠키를 수동 주입해야 동작.\n\n**1-2. Supabase 세션 갱신 미들웨어가 미연결**\n- `src/lib/supabase/middleware.ts`에 `updateSession()` 정의되어 있지만, `grep -r \"updateSession\" src/`로 확인한 결과 **import 0건**.\n- Next.js 16에서 미들웨어는 `proxy.ts`로 명명 변경되었고 본 프로젝트의 `src/proxy.ts`는 봇 차단만 수행, `updateSession` 호출 없음.\n- 결과: 로그인 세션 만료 시 자동 리프레시가 발생하지 않음. 토큰 만료 후 사용자는 재로그인 필요(어차피 로그인 페이지 없음 — 1-1과 결합 시 더 심각).\n\n---\n\n### 2. 관리자 대시보드 — 작동 안 함\n\n**2-1. 대시보드 데이터가 항상 0**\n- `src/app/admin/dashboard/page.tsx:44-48`에서 SSR 중 자기 자신의 API(`/api/admin/dashboard`)를 `fetch`로 호출하지만 **쿠키를 전달하지 않음**.\n- `/api/admin/dashboard` 핸들러는 `auth.getUser()`로 인증을 검사 → 쿠키 없는 호출은 항상 401 → catch로 빠져 `dashboardData`는 0/빈 배열.\n- 결과: 어드민 대시보드 KPI 전부 0, 차트 비어 있음. UTM 분석 섹션도 동일한 문제.\n\n**2-2. API 응답 스키마 ↔ 클라이언트 기대 스키마 불일치**\n- 클라이언트(`DashboardClient.tsx:24-29`)가 기대: `monthly_leads / daily_leads / category_distribution / top_companies`.\n- API(`src/app/api/admin/dashboard/route.ts`) 반환: `monthlyLeads(객체) / leadsByCompany / leadsByCategory / conversionFunnel`.\n- 인증을 고치더라도 `monthly_leads.toLocaleString()` 호출 시 `undefined.toLocaleString()` 런타임 크래시.\n\n**2-3. month 파라미터 무시**\n- 페이지는 `?month=YYYY-MM`을 API로 전달하지만, API는 `from`/`to`만 읽음 → 월 셀렉터 변경 효과 없음.\n\n**2-4. 서버 컴포넌트에서 onChange 핸들러**\n- `src/app/admin/dashboard/page.tsx:118-137`은 서버 컴포넌트인데 `<select onChange={...}>`를 작성. React 19에서는 함수가 직렬화되지 않아 아예 마운트 실패 또는 hydration 오류.\n\n---\n\n### 3. 공개 페이지 데이터 일관성 — 숨김 처리 누수\n\n**3-1. `is_hidden` 필터가 한 곳에만 적용됨**\n- `grep is_hidden src/` 결과 적용 위치는 `src/app/api/companies/route.ts:81` **단 한 곳**.\n- 미적용 위치: `src/app/page.tsx`(홈 리스팅·검색·카테고리 카운트), `src/app/categories/[slug]/page.tsx`(카테고리 페이지·총개수), `src/app/use-cases/[slug]/page.tsx`, `src/app/sitemap.ts`.\n- 결과: \"업체 숨김\" 처리해도 홈/카테고리/유스케이스/사이트맵에서 **그대로 노출됨**. 옵트아웃·삭제 요청 처리가 사실상 무력화.\n\n**3-2. 사이트맵이 use-cases/* URL 누락 + 페이지네이션 없음**\n- `src/app/sitemap.ts`는 `use-cases/[slug]`를 포함하지 않음 → 유스케이스 랜딩페이지 색인 누락.\n- 회사 1,396개 + 가이드 + 카테고리를 단일 sitemap으로 출력. Google 한도(50K/50MB) 가까워질 시 분할 필요.\n\n---\n\n### 4. 검색·필터 정합성\n\n**4-1. RPC 텍스트 검색에서 다중값 필터가 무시됨**\n- `src/app/api/companies/route.ts:43-46`, `src/app/page.tsx:159-160`: `material_type`/`packaging_form`이 1개일 때만 RPC에 전달, 2개 이상이면 `null`로 무시 → 사용자가 \"종이+플라스틱\" 동시 선택해도 텍스트 검색 시 필터 적용 안 됨.\n- 주석도 \"fall through to legacy filter query below\"라 적혀 있지만, 실제로는 fallthrough 코드가 없음(검색 경로는 RPC만 실행 후 return).\n\n**4-2. 동의어/별칭 처리 일부만 반영**\n- `certification` 다중 선택 시 RPC에는 첫 번째 별칭 한 개만 전달(`route.ts:38-44`, `page.tsx:149-152`). 텍스트 검색 + 인증 다중 선택의 정확도 저하.\n\n---\n\n### 5. React/Hydration 정합성 (lint 12 errors)\n\n`npx eslint .` 결과 12 error / 16 warning. 핵심:\n\n**5-1. `react-hooks/set-state-in-effect` 위반 4건**\n- `src/components/TermsNoticeBanner.tsx:19`, `src/components/TermsNoticeFooterLine.tsx:20`: 조건부 노출 배너가 `useEffect` 안에서 `setState` → 불필요한 더블 렌더, hydration mismatch 가능성.\n- `src/app/categories/[slug]/CategoryFilterBar.tsx:60`, `src/app/categories/[slug]/MobileFilterSheet.tsx:89`: 드롭다운 열릴 때 동기 `setState`. 캐스케이드 렌더 + 커서/포커스 튐 가능.\n\n**5-2. 옵셔널 체이닝 + non-null assertion 안티패턴**\n- `src/app/page.tsx:904`, `src/app/categories/[slug]/page.tsx:372/374`: `(arr as string[] | null)?.length! > 0`. `arr`가 `null`이면 `undefined > 0` → false로 동작은 하지만 의도 모호하고 타입 안전 깨짐.\n\n**5-3. `prefer-const` 등 잡음 1건 + 미사용 import 4건**\n- `src/app/api/admin/dashboard/route.ts:78` `companyNames` 재할당 없는데 `let` 사용.\n\n---\n\n### 6. ISR/캐시 설정 무효화\n\n**6-1. `revalidate = 300`이 의미 없음**\n- `src/app/page.tsx:40` `export const revalidate = 300` 설정.\n- 같은 파일에서 `createClient()`(supabase server client)가 `cookies()`를 호출 → Next.js가 페이지를 강제 dynamic으로 전환.\n- 결과: 5분 ISR 의도와 달리 **모든 요청마다 SSR + DB 풀 호출**. 트래픽 증가 시 비용·지연 누적.\n\n**6-2. 카테고리 카운트 N+1 쿼리**\n- `src/app/page.tsx:269-274`: 산업 카테고리 수 만큼(현재 ~10개+) 병렬 `count: 'exact', head: true` 쿼리를 매 요청 발생. ISR도 끊긴 상태(6-1)라 캐싱 안 됨 → DB 부하.\n\n---\n\n### 7. 인프라/외부 연동\n\n**7-1. `/api/events` 인메모리 레이트리밋**\n- `src/app/api/events/route.ts:12-29`: `Map<string, ...>` 기반. Vercel/서버리스에서는 인스턴스마다 별도 카운터, cold start 시 초기화. 실제 60req/min 보호 효과 거의 없음(브루트포스/스팸 통과).\n\n**7-2. Takedown 신고 통지 누락 (법적 리스크)**\n- `src/app/api/opt-out-request/route.ts:51-58`: 권리침해 신고가 들어오면 DB 저장 후 `console.warn`만 찍고 끝. 이메일/슬랙/관리자 알림 없음(KOR-540 pending 코멘트만 있음).\n- 결과: 정보통신망법 임시조치 의무 대응 시간(24시간) 내 인지 자체가 누락될 수 있음.\n\n**7-3. GA4 측정 ID 하드코딩**\n- `src/app/layout.tsx:11` `const GA_MEASUREMENT_ID = 'G-86MD7T3881'`. 환경별(스테이징/프로덕션) 분리 불가, 시크릿/구성 관리 원칙 위배.\n\n**7-4. 분석 4중 적재**\n- GA4 + Vercel Analytics + Speed Insights + 자체 `conversion_events` 테이블. 의도된 아키텍처일 수 있으나 page_view 이중·삼중 카운팅, 비용 중복.\n\n---\n\n### 8. 디자인 시스템 일관성\n\n**8-1. DESIGN.md 토큰 미사용 / 인라인 hex 난립**\n- `DESIGN.md`는 `--color-brand`, `brand-700`, `info-600` 등 CSS 변수/Tailwind 토큰을 정의했지만 실제 페이지는 `bg-[#C2410C]`, `text-[#2563EB]`, `bg-[#0F172A]` 등 인라인 hex를 직접 사용.\n- 결과: 토큰 변경(리브랜딩, 다크모드)이 한 곳에서 안 됨, 토큰 문서와 실제 UI 드리프트 발생 중.\n\n---\n\n### 9. 에러 처리·관측성\n\n**9-1. RPC 실패 fallback의 SQL 인젝션 가능성 — 낮음이지만 점검 필요**\n- `src/app/page.tsx:187`: RPC 실패 시 `.or(\\`name.ilike.%${sanitized}%,description.ilike.%${sanitized}%\\`)` 사용. `sanitized`는 `[,().]` 만 제거 → `%`, `\\`, 기타 PostgREST/PostgreSQL 메타문자 미처리. 공격이라기보다 검색이 깨질 가능성.\n\n**9-2. supabase 에러 swallow**\n- 다수 `from('companies').select(...)` 호출이 `error` 분기를 무시하고 `data ?? []`로 진행. 카테고리 페이지·홈·use-case 페이지 모두 DB 일시 오류 시 \"결과 0개\"로 표시되어 운영자가 장애 인지 어렵게 함.\n\n---\n\n### 우선순위 제안 (실행하지 말고 우선순위만 보고)\n\n| 등급 | 항목 |\n|------|------|\n| P0 | 1-1 로그인 페이지, 2-1/2-2 어드민 대시보드 작동, 3-1 `is_hidden` 누수, 7-2 takedown 통지 |\n| P1 | 1-2 세션 미들웨어, 4-1 다중값 필터, 6-1 ISR vs cookies, 5-1 set-state-in-effect |\n| P2 | 6-2 N+1 카운트, 8-1 토큰 일관성, 7-1 인메모리 레이트리밋, 3-2 sitemap |\n| P3 | 5-2/5-3 lint 잔여, 7-3 GA ID, 9-2 error swallow |\n\n---\n\n이번 하트비트는 **현황 파악·보고**만 수행. 어떤 항목부터 처리할지 지시 주시면 P0부터 착수하겠습니다.\n"
