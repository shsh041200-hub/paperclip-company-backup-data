        body: "## 리마인더 + 재검토 (PACAA-228 sweep 일환)\n\n2026-05-01 14:36 이후 무진행. 보드 처리 큐. 보드 직접 지시: \"정말 진짜 내가 필요한 작업인지 아니면 잘못 만들어진 작업인지\" — 냉철 재평가 결과:\n\n### 5종 token 별 necessity 매트릭스\n\n| # | Token | Blocking 작업 | 즉시성 | 평가 |\n|---|---|---|---|---|\n| 1 | Vercel API | (없음 — git push 자동 deploy 작동 확인 됨, 방금 PACAA-228 commit 으로 검증) | 낮음 | DEFER. 필요 발생 시점에 1건 ask. |\n| 2 | Cloudflare DNS API | (없음 — 신규 subdomain 추가 시점에만) | 낮음 | DEFER. one-off 작업이라 보드 UI 가 더 빠를 수도. |\n| 3 | GSC + Naver SA | **PACAA-95 routine `caf070e6` (2026-05-05 09:07 KST 자동 fire) — sitemap submit + URL inspection 자동화** | **높음 (2일 내)** | GRANT. 2일 후 routine fire 시 token 없으면 stall. |\n| 4 | Plausible API | **PACAA-89 (2026-05-04 W18 WUV 캡처) — 내일** | **높음 (1일 내)** | GRANT. 토큰 없으면 manual Dashboard query, 자동화 불가. |\n| 5 | GitHub PAT | (없음 — 방금 PACAA-228 commit/push 캐시 cred 로 성공) | 낮음 | DEFER. PR automation 도입 시점에. |\n\n### 잘못 만들어진 측면\n- **Batch 5종 = over-engineered.** PACAA-161 자율성 Phase 1 \"보드 4 항목 → 3 항목 → 토큰만\" 으로 좁혀졌지만, 토큰 자체도 5종 → 2종으로 더 좁힐 수 있음.\n- 1·2·5 는 **just-in-time 발급** 이 적절 — 발급 후 30일 미사용 = 회전 비용만 발생, scope 도 미리 정확히 정의 어려움.\n\n### 정말 필요한 측면\n- 3·4 는 **이미 wired routine/calendar** 가 사용 예정 → 발급 안하면 routine fire 시점에 stall + 보드에 다시 ping 발생.\n- 토큰 발급 자체는 보드(founder) 만 가능 — CEO 자가-grant 불가능.\n\n### 추천 액션\n\n**Option A — Shrink to 2 (권장):** 본 ticket 을 #3 GSC/Naver SA + #4 Plausible 로 좁힘. 1·2·5 는 cancel + 필요 시점에 1건 ticket 신규.\n\n**Option B — 원안 유지 (5종 일괄):** 1회 보드 작업으로 전부 처리. 회전/감사 부담 ↑.\n\n**Option C — 전체 cancel + just-in-time:** 모든 토큰 발급을 \"필요한 ticket 이 발생할 때마다 그 ticket 안에서 board ask\" 로 전환. 본 ticket 은 닫음.\n\n각각 trade-off:\n- A: 2일/1일 내 stall 회피 + scope 최소. 1·2·5 는 사용 시점에 다시 ask (~수 분 효율 손실).\n- B: 한 번 처리로 끝. 미사용 토큰 audit 부담.\n- C: 가장 미니멀. 단, 내일 05-04 PACAA-89 fire 시점에 보드 ping 필요 → 이미 stall.\n\n별도 인터랙션으로 보드 선택 라우팅합니다."
