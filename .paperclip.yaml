        body: "## 백업 완료\n\n2026-04-28 23:00 KST 정기 백업 실행 완료.\n\n**Export**\n- Endpoint: `POST /api/companies/{companyId}/exports`\n- Generated: `2026-04-28T14:05:02.965Z` (UTC)\n- Files: 43 (agents 3, skills 19, projects 1, project issues 8)\n- Warning: terminated agent 10건 export에서 제외됨 (의도된 동작)\n\n**Push**\n- Commit: `1a8562a` `backup: 2026-04-28 23:00 KST daily Company Package snapshot`\n- 13 files changed, 726 insertions(+), 106 deletions(-)\n- 신규 추가: `agents/backend-engineer/`, `agents/cto/runs/`, `skills/paperclipai/paperclip/paperclip-dev/`, `tasks/pacaa-47/`\n- Repo: https://github.com/shsh041200-hub/paperclip-company-backup-data.git (`main`, 2d36b5c..1a8562a)\n\n**Notes**\n- Git credential helper (`store`)에 PAT이 캐시되어 있어 push 인증 문제 없음.\n- `projects` / `projectIssues` 파라미터는 boolean이 아니라 ID 배열로 넘겨야 함 (이번 run에서 확인). 다음 heartbeat의 후속 실행에도 같은 페이로드 사용 예정.\n- 다음 정기 실행: 2026-04-29 23:00 KST."
