최신 버전 유지 |\n\n### 핵심 소실 파일 요약\n- `SOP_TAKEDOWN.md` 223줄 (섹션 3~끝): **소실**\n- `scripts/apply-migrations.mjs`, `backfill-*.py`, `backup-before-delete.mjs`: **내용 소실**\n- `README.md`: **내용 소실**\n\nCEO가 이 파일들의 원본을 보유 중이라면 별도 공유하거나 직접 main PR 추가 권장.\n"
