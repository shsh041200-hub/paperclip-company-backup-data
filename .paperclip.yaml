  pacaa-700:
    comments:
      -
        authorAgentSlug: "ceo"
        authorType: "agent"
        body: "## 검토 결과 — 결론 먼저\n\n**현재 작업:** 텔레그램 시스템 다운그레이드 검토 완료. 권장은 \"유지 + Haiku 요약만 비활성화\" (옵션 B).\n**보드님 필요 행동:** 별도 interaction 으로 3-옵션 중 1개 선택.\n\n---\n\n## 1. 현재 텔레그램 시스템 실측\n\n구성요소 (모두 `~/.paperclip/instances/default/tools/board-visibility/` — Paperclip 외부 사이드카):\n\n| 컴포넌트 | 종류 | 빈도 | LLM 호출 |\n|---|---|---|---|\n| `notify-telegram.py` | cron 1분 | 신규 actionable 항목만 | Haiku (요약, item당 1~2회) |\n| `bot-server.py` | systemd 상시 | 텔레그램 polling 2초 | **없음** (순수 API 중계) |\n| `generate-dashboard.py` | cron 10분 | HTML 렌더 | 없음 |\n| `deferred-watcher.py` | reboot 상시 | 보드 \"나중에\" 트레일 | 없음 |\n| `update-deferred.py` | cron 1분 | deferred 상태 동기 | 없음 |\n\n총 ~3,500 LOC, 외부 의존: 텔레그램 Bot API.\n\n## 2. 실제 토큰 소모 측정 (오늘 2026-05-14)\n\n- 전송 성공: **3건**\n- Haiku 호출: 약 6~9회 (item당 body 25자 요약 + cap 초과 시 field 요약)\n- Haiku 4.5 단가 ($1/$5 per M tokens, 프롬프트 ~200토큰): **하루 약 $0.0001** (10원 미만)\n- bot-server / dashboard / deferred-watcher: LLM 호출 0\n\n**텔레그램이 직접 소모하는 토큰 ≈ 0.** \"토큰 줄이기\" 목표 관점에선 거의 효과 없음.\n\n## 3. 진짜 토큰 driver 는 따로 있음\n\nAgent token spend ≈ heartbeat × 컨텍스트(평균 ~수십K tokens) × 모델 단가.\n트리거: idle wake, routine fire, interaction 응답, child issue assignment, comment.\n**텔레그램은 wake 생성 안 함** — 보드의 응답이 wake 트리거. 텔레그램 없으면 보드 응답이 느려져서 → agent 가 in_review 상태로 더 오래 떠 있음 → **idle wake 더 자주** → **오히려 token 증가 가능**.\n\n## 4. 보드 제안 (\"paperclip-api.com 서버에서 알람\") 구체화\n\n3가지 구현 형태 가능:\n\n### A. 폴링형 (대시보드만)\n- `dashboard.html` 은 이미 있음 (10분마다 갱신)\n- 보드가 \"필요할 때\" 열어서 확인\n- **장점:** 텔레그램 완전 제거. 인프라 단순.\n- **단점:** push 없음 → 보드가 잊으면 wake 누적. 응답 latency 시간단위.\n- **mobile:** 데스크톱 브라우저 가정. 휴대폰엔 안 맞음.\n\n### B. 서버 push형 (브라우저 SSE/WebSocket)\n- paperclip-api.com 이 보드 브라우저로 SSE 알림\n- **장점:** 실시간. 텔레그램 외부 의존 제거.\n- **단점:** 브라우저 탭 유지 필요. 화면 잠금 시 무력. 새 코드 작성 필요 (PaperclipUI 측 작업).\n\n### C. OS native push (Pushover/ntfy/이메일 등)\n- paperclip-api 가 외부 push 서비스로 webhook\n- **장점:** 모바일 push 유지. 텔레그램 봇 대비 단순 (단방향).\n- **단점:** 양방향 인터랙션 (✅/❌ 버튼, Reply→comment) 손실. 보드가 매번 대시보드 열어 클릭.\n- 또 다른 외부 서비스 의존 (단지 텔레그램 → 다른 서비스 swap).\n\n## 5. 손실되는 기능 (제거 시)\n\n- ✅/❌ 인라인 버튼 → request_confirmation 즉시 응답\n- 1~8 번호 버튼 → suggest_tasks / ask_user_questions 즉시 응답\n- 답장(Reply) → 자동 issue 코멘트 라우팅 (PACAA-125)\n- `/status` `/issues` `/goals` `/pending` 명령\n- 모바일 push (보드 휴대폰)\n- 첨부 plan.md 자동 전달\n\n## 6. 비용·복잡도 정리표\n\n| 옵션 | 일일 토큰 절감 | 보드 응답 latency 영향 | 신규 코드 | 보드 모바일 |\n|---|---|---|---|---|\n| 현상유지 | $0 | 기준선 | 0 | ✅ |\n| **B. Haiku 요약 OFF** | $0.0001 | 무영향 | 5줄 (1 PR) | ✅ |\n| 텔레그램→대시보드만 | ~$0.0001 + agent wake 증가 risk | **악화** | 0~중간 | ❌ |\n| 텔레그램→SSE | ~$0.0001 + 동일 risk | 비슷 | 큼 (UI+API) | △ (브라우저 활성 시) |\n| 텔레그램→Pushover | ~$0.0001 + 양방향 손실 | 양방향 응답 느려짐 | 중간 | ✅ |\n\n## 7. 권장\n\n**옵션 B: 현재 시스템 유지 + Haiku 요약기만 비활성화.**\n\n근거:\n1. 측정된 텔레그램 토큰 소모 = **사실상 0** (하루 10원 미만). \"토큰 줄이기\" 명분이 약함.\n2. 텔레그램 제거 시 보드 응답 latency 가 늘어나 **간접 token 증가** 위험이 훨씬 큼.\n3. 양방향 버튼/Reply 라우팅은 보드 응답 속도의 핵심 자산.\n4. 그래도 \"조금이라도\" 줄이고 싶다면, 유일하게 의미있는 절감 포인트는 `_summarize_for_board` / `_make_field_summarizer` 두 함수 — 비활성화하면 25자 압축이 사라져 메시지가 살짝 장황해지지만 보드 가독성 영향은 미미. PR 1개로 5분 작업.\n\n## 8. 부수적으로 발견한 issue (별건)\n\n- `delivery-failures.json` 에 dead-letter 70건 — 대부분 emoji 포맷 검증 실패 (`❓ 🔑 📅 ⚠ 🚀`). agent prompt 들이 정책 위반 emoji 포함해서 발의 → 텔레그램으로 안 가고 사일런트 누적. \n- 이건 별도 티켓으로 정리 권장 (보드 가시성 누락).\n\n다음 단계: 보드가 옵션 선택하면 → 옵션 B 시 5줄 PR, 다른 옵션 시 별도 plan + child issue 발의."
        createdAt: "2026-05-14T07:33:17.175Z"
