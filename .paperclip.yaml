schema: "paperclip/v1"
agents:
  backend-engineer:
    role: "engineer"
    icon: "code"
    capabilities: "Owns the Packlinx data layer — schema, ingestion pipeline, dedup + canonicalization, profile completeness audit. SG-1 (8-category vendor registration 90%) named owner; direct owner of P1.1–P1.4. Cross-cuts data model with CTO; co-owns P4.3 vendor-self-exposure analytics with Frontend Engineer post Pair 2."
    adapter:
      config:
        chrome: true
        effort: "medium"
        graceSec: 50
        model: "claude-sonnet-4-6"
      type: "claude_local"
  ceo:
    role: "ceo"
    adapter:
      config:
        chrome: true
        dangerouslySkipPermissions: true
        effort: "high"
        graceSec: 500
        maxTurnsPerRun: 3000
        model: "claude-opus-4-7"
      type: "claude_local"
    runtime:
      heartbeat:
        intervalSec: 300
        maxConcurrentRuns: 1
    permissions:
      canCreateAgents: true
  cto:
    role: "cto"
    icon: "circuit-board"
    capabilities: "Owns Packlinx technical foundations: architecture, code review, infrastructure, plugin authoring."
    adapter:
      config:
        chrome: true
        effort: "medium"
        graceSec: 50
        model: "claude-sonnet-4-6"
      type: "claude_local"
  legal-counsel:
    role: "general"
    icon: "shield"
    capabilities: "한국 법률 한정 사내 자문 — PIPA / 표시광고법 / 통신판매업 / 저작권·상표권 / 약관·처리방침. 호출 시 자문 + 주 1회 정기 점검. 자문 산출만 수행, 다른 에이전트에 배정 금지."
    adapter:
      config:
        dangerouslySkipPermissions: true
        effort: "medium"
        graceSec: 50
        model: "claude-opus-4-7"
      type: "claude_local"
    runtime:
      heartbeat:
        maxConcurrentRuns: 3
company:
  attachmentMaxBytes: 10485760
  requireBoardApprovalForNewAgents: true
projects:
  packlinx-website:
    color: "#6366f1"
    status: "planned"
    workspaces:
      pkging-platform:
        name: "pkging-platform"
        isPrimary: true
        repoUrl: "https://github.com/shsh041200-hub/pkging-platform.git"
        sourceType: "git_repo"
        visibility: "default"
routines:
  daily-board-digest:
    concurrencyPolicy: "skip_if_active"
    priority: "low"
    triggers:
      -
        kind: "schedule"
        cronExpression: "0 9 * * *"
        label: "Daily 09:00 KST"
        timezone: "Asia/Seoul"
  daily-company-packages-backup:
    concurrencyPolicy: "skip_if_active"
    triggers:
      -
        kind: "schedule"
        cronExpression: "0 23 * * *"
        label: "Daily 23:00 KST"
        timezone: "Asia/Seoul"
  legal-counsel-weekly-self-audit:
    concurrencyPolicy: "skip_if_active"
    status: "archived"
  legal-counsel-weekly-self-audit-2:
    concurrencyPolicy: "skip_if_active"
    triggers:
      -
        kind: "schedule"
        cronExpression: "30 9 * * 1"
        label: "Monday 09:30 KST weekly self-audit"
        timezone: "Asia/Seoul"
  pacaa-103-psi-quota-retry-one-shot:
    concurrencyPolicy: "skip_if_active"
    priority: "low"
  pacaa-104-5d-index-audit-one-shot:
    concurrencyPolicy: "skip_if_active"
  pacaa-121-t-14d-gsc-alternate-canonical-pool-one-shot:
    concurrencyPolicy: "skip_if_active"
    triggers:
      -
        kind: "schedule"
        cronExpression: "0 9 14 5 *"
        label: "PACAA-121 T+14d one-shot 2026-05-14 09:00 KST"
        timezone: "Asia/Seoul"
  stale-blocked-issue-sweep:
    concurrencyPolicy: "skip_if_active"
    priority: "low"
    triggers:
      -
        kind: "schedule"
        cronExpression: "0 9 * * 1"
        label: "Mon 09:00 KST"
        timezone: "Asia/Seoul"
sidebar:
  agents:
    - "ceo"
    - "backend-engineer"
    - "cto"
    - "legal-counsel"
  projects:
    - "packlinx-website"
