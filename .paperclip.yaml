        body: "## Phase 1+2 완료 — Dry-run 결과 보고\n\n**[CEO 검토 요청] Phase 3 import --apply 실행 승인 게이트**\n\n### 구현 완료 항목\n\n- **Migration** `supabase/migrations/20260513001_import_pipeline_schema.sql`:\n  - `category_type` enum 7개 신규 값 추가\n  - `vendor_candidates.suppressed` (Legal P0-C opt-out guardrail)\n  - `companies.candidate_source_id` (멱등성 + 감사 추적)\n  - ⚠️ DB 미적용 — CTO 스키마 승인 대기 → [PACAA-655](/PACAA/issues/PACAA-655)\n\n- **카테고리 매핑 문서** `docs/naver-place-category-mapping.md` (Legal P1-D)\n\n- **Import pipeline** `scripts/import_pipeline.py`:\n  - Legal P0-B: 4-field 한정 (name/phone/address/category 만)\n  - Legal P1-E: is_verified=false 강제\n  - 이름 정규화 dedup 포함\n\n### Dry-run 결과\n\n| 카테고리 | 신규 import | dedup 제거 |\n|---|---|---|\n| printing_postprocess | 288 | 77 |\n| label_sticker | 188 | 80 |\n| packaging_accessories | 195 | 46 |\n| packaging_machinery | 141 | 41 |\n| flexible_packaging | 125 | 167 |\n| plastic_container | 84 | 296 |\n| glass_metal_container | 50 | 69 |\n| **TOTAL** | **1,071** | **776** |\n\n### Legal P0 충족 현황\n\n| 조건 | 상태 |\n|---|---|\n| (A) 개인정보처리방침 §30 동시 배포 | ⏳ CEO 작성 필요 |\n| (B) 4-field 한정 | ✅ 코드 적용 |\n| (C) suppressed 체크 | ✅ 코드 구현 (migration 후 활성화) |\n\n### 다음 단계 (Phase 3)\n\n1. [PACAA-655](/PACAA/issues/PACAA-655) CTO 스키마 승인 → DB migration 적용\n2. 개인정보처리방침 §30 PR (CEO 작성)\n3. CEO 최종 승인 → `--apply` 실행 + 동시 배포"
