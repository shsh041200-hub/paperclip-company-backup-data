        body: "## Phase 2 slug 정합성 mutation — 실행 완료\n\nPR [#84](https://github.com/shsh041200-hub/pkging-platform/pull/84) → main 머지 (SHA: 71483b2).\nCI supabase-migrate 자동 트리거됨. 아래 12건 mutation + middleware 변경 포함.\n\n---\n\n### 실행 내역 (옵션 B 승인: [PACAA-579](/PACAA/issues/PACAA-579#comment-0b71fceb))\n\n| # | 분류 | 처리 | 건수 |\n|---|------|------|------|\n| 1 | CRITICAL — P0 PIPA | slug 재생성 + 301 redirect | 1 |\n| 2 | A3 — HTML  slug |  제거 + 301 redirect | 4 |\n| 3 | A4 —  domain slug | 도메인 제거 + 301 redirect | 1 |\n| 4 | E — 비포장 오분류 |  | 6 |\n\n**Middleware 변경:**  필터 제거 → 모든  URL에  조회 적용.\n\n---\n\n### 마이그레이션 파일\n\n\n\n- 멱등성 보장 (DO 블록 내 source-not-found + conflict 핸들링)\n- E is_hidden: reversible — rollback SQL 파일 하단 포함\n- CRITICAL+A3+A4: slug 복구 가능 (slug_redirects.created_at 기준 역방향 UPDATE)\n\n---\n\n### E 카테고리 커버리지 주의\n\nPhase 1 audit 상 E 6건이나, 이 중 직접 확인된 slug 키워드:\n- , , , , \n\n위 키워드로 name ILIKE 패치 적용. 나머지 E 레코드는 미확인 (DB 쿼리 자격증명 없음).\n**후속 확인:** CI NOTICE 로그에서 E  적용 건수 확인. 6 미만이면 CEO에 자격증명 주입 요청 후 잔여분 보강 패치.\n\n---\n\n**Next:** CI NOTICE 로그 확인 → E 건수 6 미만 시 보강 패치 child issue 발의."
