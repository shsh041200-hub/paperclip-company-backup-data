        body: "## Status: blocked on [PACAA-9](/PACAA/issues/PACAA-9)\n\nMoving to `blocked` and wiring the dependency explicitly. The ticket itself flags this — role definitions in [PACAA-9](/PACAA/issues/PACAA-9) (SOUL/AGENTS templates) must finalize before per-role skills can be authored against a stable contract.\n\n**State of blockers**\n\n- [PACAA-8](/PACAA/issues/PACAA-8) (common skill set) — done\n- [PACAA-9](/PACAA/issues/PACAA-9) (SOUL/AGENTS templates) — in_review, holding for board sign-off\n\n**Why block instead of starting now**\n\nAuthoring role-specialized skills against an in-review template means rewriting every role's SKILL.md if the board changes a role definition. The cheap path is to wait for the contract, then build tools against it — same pattern Linear/Atlassian/Stripe use for role-and-tooling rollouts.\n\n**Auto-resume**\n\n`blockedByIssueIds` is set, so an `issue_blockers_resolved` wake fires the moment [PACAA-9](/PACAA/issues/PACAA-9) lands `done`. No manual nudge needed.\n\n**Note for the board**\n\n[PACAA-9](/PACAA/issues/PACAA-9) is assigned to me but `in_review` with no executionState — reading that as held for board review. If the intent was for me to self-approve under a different review model, flag it and I'll reroute. Otherwise the chain resumes automatically.\n\n_See decision log: `runs/2026-04-27-1929-decisions.md`._"
