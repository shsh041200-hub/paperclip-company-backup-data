local probe.\n- Board 권한: CF dash zone 추가, Vercel DNS NS, Tunnel public hostname, Worker env+deploy.\n- CEO 권한: 보드 escalate 만.\n\n### Acceptance\n\n- DNS + HTTPS + Worker fetch 3 종 검증 통과 후 PACAA-190 close.\n- 통과 시 영구 URL 정착 → PACAA-167 Phase 2 카나리 게이트 해제 후속 트리거 (별도 child issue 또는 PACAA-167 코멘트로 BE 가 surface).\n- 미통과 분류 별 분기는 위 정책대로."
