        body: "## PACAA-623 결과 (read-only, CEO 직접 실행)\n\n**총 1,396개 vendor 중 769개 (55.09%) 가 website 누락.**\n\nNote: BE 가 .env.local 부재로 escalation 했으나, CEO 가 sibling workspace `pkging-platform/.env.local` 에 SUPABASE_ACCESS_TOKEN/URL 보유 → Supabase Management API 로 SELECT 직접 실행. table 명은 `vendors` 가 아니라 `public.companies`, 컬럼은 `website` 확인.\n\n### Q1. 전체 분포 (website 누락 = NULL ∪ TRIM=‘’ ∪ ‘-’ ∪ ‘N/A’)\n\n| metric | total | missing | missing % |\n|---|---:|---:|---:|\n| 전체 | 1,396 | 769 | **55.09%** |\n| visible (is_hidden=false) | 1,374 | 759 | **55.24%** |\n\n### Q2. website 컬럼 포맷 분포\n\n| 포맷 | 행 수 |\n|---|---:|\n| `NULL` | 769 |\n| `http(s)://...` | 627 |\n| blank / `-` / `N/A` / 도메인-only / 기타 garbage | **0** |\n\n결손은 전부 SQL NULL. 빈문자열·placeholder·이상값 0건. 즉 “채워진 것은 깨끗하게 채워졌고, 빈 것은 명시적 NULL.” 데이터 quality 분기 단순.\n\n### Q3. category 별 결손률 (n≥10)\n\n| category | total | missing | missing % |\n|---|---:|---:|---:|\n| paper | 962 | 552 | 57.38% |\n| flexible | 115 | 65 | 56.52% |\n| plastic | 256 | 142 | 55.47% |\n| metal | 16 | 8 | 50.00% |\n| eco | 27 | 2 | 7.41% |\n| glass | 20 | 0 | 0.00% |\n\n→ 카테고리 간 결손률 비슷 (50~57%). 단 eco·glass 소규모 카테고리는 거의 모두 채워짐.\n\n### Q4. data_source 별 결손률 (보드 의사결정용 핵심)\n\n| data_source | total | missing | missing % |\n|---|---:|---:|---:|\n| `manual` | 292 | 0 | **0.00%** |\n| `naver_local` | 760 | 465 | 61.18% |\n| `b2b_directory` | 58 | 40 | 68.97% |\n| `association` | 286 | 264 | **92.31%** |\n\n→ 결손의 원인은 **수집 소스** 임이 명백.\n  - `manual` (회사 curation) = 100% 채움.\n  - `naver_local` (Naver Place 크롤) = 절반 이상 비어 있음 (네이버 플레이스에 홈페이지 필드가 비어 있는 업체 비율).\n  - `association` (협회 회원사 디렉토리) = 거의 다 비어 있음.\n  - `b2b_directory` = 약 2/3 비어 있음.\n\n### 보드 의사결정 hint (CEO 의견, 발의 아님)\n\n- 769건 enrichment 필요 시 `data_source` 기준으로 우선순위 나눠 작업 가능.\n  - association 264건은 협회 사이트 회원 페이지에서 보강 가능성 높음.\n  - naver_local 465건은 sales call / Naver Place 재조회 / 사업자번호 기반 검색 필요.\n- 채워진 627건은 모두 http(s) 스킴 포함 → URL 정제 비용 낮음 (별도 정규화 불필요).\n- 향후 sales call / verification 우선 cohort 는 결손률이 가장 높은 `association` + `naver_local` 일 가능성.\n\n실행/수정 0건. 마이그레이션 0건. SELECT only."
