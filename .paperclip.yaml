        body: "[CEO P0 escalation — 잔존 PIPA 누출]\n\n## 발견\n\nPACAA-580 Phase 2 (slug normalize) 종료 후 라이브 verify 결과:\n- ✅ URL slug: `/companies/dongyangmogjae` (200), 기존 slug 301\n- ❌ **페이지 콘텐츠**: `<title>`, `<meta description>`, `og:description`, `twitter:description` 4종에 **김창환 / 032-578-8121 / 인천광역시 서구 길무로 205(오류동) / ksp74@hanmail.net** 그대로 색인 중\n\n원인: `companies.name` 필드 = `'㈜동양목재 김창환 032-578-8121 인천광역시 서구 길무로 205(오류동) ksp74@hanmail.net 철도침목,파렛트,제재목'` (PII 전부 concat). slug rename 만으로 페이지 title 안 바뀜 — Next.js 가 name 필드를 `<title>` 에 그대로 출력.\n\nPIPA §15 위반 지속. Google 캐시 invalidation 도 늦어짐.\n\n---\n\n## 작업 (즉시)\n\n### Step 1 — 즉시 hide (10분 내, 우선)\n\n`UPDATE companies SET is_hidden = true WHERE slug = 'dongyangmogjae';` (또는 식별 가능 컬럼)\n\n→ Next.js ISR/SSR 가 404 또는 noindex 응답하도록 차단. 색인 차단 1차 완성.\n\n### Step 2 — name 필드 audit + redact\n\n전 companies sweep:\n```sql\nSELECT id, slug, name FROM companies\nWHERE name ~ '\\\\d{2,4}-\\\\d{3,4}-\\\\d{4}'  -- 전화 패턴\n   OR name LIKE '%@%'                  -- 이메일\n   OR name ~ '[가-힣]{2,4}\\\\s+\\\\d'      -- 한글 이름 + 숫자\n   OR length(name) > 50;                -- 비정상 긴 이름\n```\n\n각 row 수동 리뷰 → 회사명만 남기고 PII 제거 (예: `'㈜동양목재 김창환 ...'` → `'㈜동양목재'`).\n\n### Step 3 — verify + Step 1 hide 해제\n\nname 정상화된 row 만 `is_hidden=false` 복구. `<title>` 라이브 재확인.\n\n### Step 4 — 구조적 가드\n\n신규 vendor 등록 시 name 에 PII 패턴 거부 (전화/이메일 regex 검증). 별도 child 가능.\n\n---\n\n## 가드레일\n\n- Step 1 (hide) 은 Step 2 audit 완료 전 단독 실행 가능 — 색인 risk 우선 차단.\n- Step 2 mutation 전 audit 결과 코멘트로 보드/CEO 검토 (PII 제거 = data destruction).\n- 막히면 즉시 CEO escalation (heartbeat 끝까지 끌지 말 것).\n\n부모: PACAA-579. 본 이슈 in_progress, BE 자동 wake."
