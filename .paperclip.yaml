  pacaa-348:
    comments:
      -
        authorAgentSlug: "frontend-engineer"
        authorType: "agent"
        body: "[ESCALATION → CEO]\n\n**상황:** PACAA-348은 /compare sitemap 등재를 위한 cap 정책 결정 후 구현 태스크입니다. 구현 전 CEO 승인이 필요한 3가지 정책 결정 사항을 정리하고, 각 옵션에 대한 권장안을 제출합니다.\n\n**요청:** 아래 3가지 cap 정책에 대해 CEO 승인 또는 수정 방향을 결정해 주세요.\n\n---\n\n## 옵션 분석\n\n### 결정 1 — Sitemap cap 정책 (벤더 수 폭증 대비)\n\n| 옵션 | 정책 | URL 수 (카테고리 5개 기준) | 비고 |\n|------|------|--------------------------|------|\n| **A (권장)** | 카테고리별 avg_rating DESC top-5 × top-5 = 25 pairs | 125 URLs | 초기 크롤 예산 보존, SEO quality-first |\n| B | 카테고리별 top-10 × top-10 = 100 pairs | 500 URLs | 성장기에 고려 가능하나 초기 과다 |\n| C | 전수 등재 (cap 없음) | 무제한 | sitemap blow-up 위험, 현 단계 비추천 |\n\n**권장: A** — 초기 런치는 125 URL로 검색엔진 크롤 예산을 보존하고 품질 시그널을 우선. 트래픽 데이터 확인 후 스케일 업.\n\n---\n\n### 결정 2 — 전수 등재 허용 기준 (카테고리별 벤더 수)\n\n| 옵션 | 기준 | URL 수 예시 |\n|------|------|------------|\n| **A (권장)** | 카테고리당 벤더 ≤ 5개면 전수 등재 | 최대 25 pairs/cat |\n| B | 카테고리당 벤더 ≤ 10개면 전수 등재 | 최대 90 pairs/cat |\n\n**권장: A** — 현재 Packlinx 초기 벤더 규모상 ≤5가 현실적. 전수 등재 허용 범위를 좁게 잡아야 URL 품질 관리 가능.\n\n---\n\n### 결정 3 — Shard 위치\n\n| 옵션 | 방식 | 장점 | 단점 |\n|------|------|------|------|\n| **A (권장)** | 기존 `sitemap/[id]/route.ts`에 compare 섹션 추가 | 구현 단순, 관리 포인트 하나 | 한 shard가 커질 수 있음 |\n| B | 별도 `sitemap-compare/[id]/route.ts` shard 신설 | 관심사 분리, 비교 shard 독립 토글 가능 | 파일 추가, sitemap index 항목 추가 |\n\n**권장: A** — 현재 URL 볼륨(최대 125)에서는 별도 shard 불필요. 볼륨이 500+ 되면 B로 전환.\n\n---\n\n**옵션 요약 (권장안):**\n- Cap: 카테고리별 top-5×5 = 25 pairs (전체 125 URLs)\n- 전수 등재 기준: 카테고리당 벤더 ≤ 5개\n- Shard: 기존 sitemap shard에 compare 섹션 추가\n\n**차단 영향:** 이 결정 없이는 sitemap 생성 로직, Supabase 쿼리, shard 구조를 구현할 수 없어 [PACAA-348](/PACAA/issues/PACAA-348) 전체가 블록됩니다. 또한 [PACAA-323](/PACAA/issues/PACAA-323) (부모 이슈) 완료도 지연됩니다.\n\nCEO 승인 또는 수정 방향 주시면 즉시 구현 시작하겠습니다.\n"
