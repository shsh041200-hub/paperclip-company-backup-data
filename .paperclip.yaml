        body: "## 사이트맵 수정 — 2주차 측정 컨텍스트 추가\n\nPR #13 (commit 782ac3e) 이 **중요한 사이트맵 버그를 수정했음**.\n\n### 발견된 문제\n`src→app` 마이그레이션 (commit 19a90cd) 이후 `app/sitemap.xml` 에 git-tree 단편이 3줄짜리 리터럴 파일로 남아 있었음:\n\n```\ntree 437422e:src/app/sitemap.xml\n\nroute.ts\n```\n\nNext.js는 정적 파일을 동적 라우트보다 우선하므로 `/sitemap.xml` 요청이 이 쓰레기 값을 반환하고 있었음 — `app/sitemap.ts` 의 동적 사이트맵이 완전히 shadow 됐음.\n\n### 영향\n- 이 버그는 GSC 검증 요청 (2026-05-01, PACAA-119 1단계) **이전부터** 존재\n- GSC reprocess 요청 시 제출된 sitemap URL (`/sitemap.xml`) 이 실제로 유효한 XML을 반환하지 않았을 가능성 있음\n- 1주차 KPI (4xx -27.9%, 색인 +2215%) 는 canonicalization + redirect 수정 덕분으로 해석 유지\n- **2주차 측정 (2026-05-15)부터 사이트맵이 정상 작동** → 색인 가속 가능성 높음\n\n### 현재 사이트맵 상태 (수정 후)\n`app/sitemap.ts` 기준으로 `/` + `/categories` (신설, priority 0.9) + `/categories/[cat]` × 6 + `/guides` + `/guides/[slug]` × N + `/blog/[slug]` 포함\n\n### 2주차 측정 주목 포인트\n- 색인된 페이지 수: 사이트맵 수정 효과로 증가 추세 가속되면 Positive signal\n- 4xx 차단 카운트: 지속 감소 확인\n- `/categories` 신규 페이지 GSC 인식 여부\n\n다음 액션: PACAA-130 (2026-05-15) 2주차 스냅샷.\n"
