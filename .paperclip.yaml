        body: "## PACAA-104 +5d 인덱싱 감사 결과\n\n**실행**: 2026-05-05 (GSC+Naver sitemap submit +5d)\n**스크립트**: site/scripts/index_audit.py\n**대상**: https://keywords.packlinx.com/keywords/* (50 URLs)\n\n### DoD 평가: **50/50 PASS** (기준 ≥40/50) ✅\n\n| 항목 | 결과 |\n|------|------|\n| HTTP 200 reachable | 50/50 ✅ |\n| canonical href 정합 (미스매치 0) | 50/50 ✅ |\n| robots meta = index, follow | 50/50 ✅ |\n| h1 존재 | 50/50 ✅ |\n| 본문 thick (≥4KB, 실제 min 12,484B) | 50/50 ✅ |\n| noindex 차단 | 0건 ✅ |\n\n### 세부 지표\n\n- body_bytes 범위: 12,484 ~ 25,297 (평균 22,094)\n- canonical href: raw 한글 슬러그 그대로 — Google/Naver 정상 처리\n- 전체 verdict: `OK × 50`\n\n### GSC URL Inspection 가이드 (50건)\n\n인덱싱 미확인 시 우선 점검 순서:\n1. Google Search Console → URL 검사 → `https://keywords.packlinx.com/keywords/{slug}`\n2. 상위 우선 점검 슬러그 (검색량 기준): 스티커-제작, 박스제작, 쇼핑백제작, 비닐봉투-제작, 라벨-스티커-제작\n3. crawl date 공백 = 미방문 → **색인 요청** 버튼 클릭\n4. noindex / canonical off = 0건이므로 기술 차단 없음; 크롤 예산 대기 상태로 판단\n\n### 결론\n\n50개 페이지 전부 인덱싱 기술 조건 충족. canonical 정합, robots 허용, h1/본문 완비.\nGSC/Naver Webmaster에서 크롤 완료 확인 시 DoD #2 최종 달성. 기술적 블로커 없음.\n\nCSV 감사 파일: audit_20260505.csv (50행, 9열 — slug/url/status/canonical/robots_meta/h1/title/body_bytes/verdict)"
