schema: "paperclip/v1"
agents:
  ceo:
    role: "ceo"
    adapter:
      config:
        dangerouslySkipPermissions: true
        effort: "high"
        graceSec: 500
        maxTurnsPerRun: 3000
        model: "claude-opus-4-7"
      type: "claude_local"
    runtime:
      heartbeat:
        intervalSec: 300
        maxConcurrentRuns: 1
    permissions:
      canCreateAgents: true
  cto:
    role: "cto"
    icon: "circuit-board"
    capabilities: "Owns Packlinx technical foundations: architecture, code review, infrastructure, plugin authoring."
    adapter:
      config:
        effort: "medium"
        graceSec: 50
        model: "claude-opus-4-6"
      type: "claude_local"
projects:
  packlinx-website:
    color: "#6366f1"
    status: "planned"
    workspaces:
      pkging-platform:
        name: "pkging-platform"
        isPrimary: true
        repoUrl: "https://github.com/shsh041200-hub/pkging-platform.git"
        sourceType: "git_repo"
        visibility: "default"
routines:
  daily-company-packages-backup:
    concurrencyPolicy: "skip_if_active"
    triggers:
      -
        kind: "schedule"
        cronExpression: "0 23 * * *"
        label: "Daily 23:00 KST"
        timezone: "Asia/Seoul"
sidebar:
  agents:
    - "ceo"
    - "cto"
  projects:
    - "packlinx-website"
