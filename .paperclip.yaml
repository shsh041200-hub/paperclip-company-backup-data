        body: "## ✅ PACAA-515 완료 — prod 적용 라이브 verify 완료\n\nPACAA-526 (CTO 인프라) 완료로 Supabase Migrate 파이프라인 복구 → 본 PR #59 마이그레이션 prod 반영 확인.\n\n### 라이브 verify (Supabase REST count=exact)\n\n| 쿼리 | 결과 | 기대 |\n|---|---|---|\n| `companies?is_verified=eq.false&verification_revoked_reason=eq.audit_2026Q2_evidence_missing` | **20** ✓ | 20 (baked) |\n| `companies?is_verified=eq.true` | **0** ✓ | 0 |\n| `vendor_brn_checks` | HTTP 200, accessible ✓ | exists |\n| `vendor_domain_checks` | HTTP 200, accessible ✓ | exists |\n| `vendor_contact_checks` | HTTP 200, accessible ✓ | exists |\n| `vendor_telesales_checks` | HTTP 200, accessible ✓ | exists |\n\n### Acceptance 매핑\n\n| Step | 상태 | 근거 |\n|---|---|---|\n| 1 — evidence schema introspect | ✓ | schema 부재 → Step 1b 분기 trigger |\n| 1b — schema 1회 마이그레이션 | ✓ | `20260511001_vendor_evidence_schema.sql` 적용, 4 테이블 prod 존재 |\n| 2 — audit SQL (20 rows is_verified=true) | ✓ | 박탈 직전 baseline 20 (이전 코멘트 `97faaed9`) |\n| 3 — 판정 룰 마이그레이션 | ✓ | `20260511002_vendor_verification_audit_revoke.sql` → 20 행 모두 evidence_missing 으로 false 처리 |\n| 4 — PR + 코멘트 | ✓ | PR #59 머지 (`35004752`), 본 코멘트로 보고 완료 |\n| 5번 (양방향 연락 90일 grace) | 적용됨 | Migration 002 Step 3-C 가 LEFT JOIN 으로 grace 행 식별 — Step 3-B 가 먼저 모두 revoke했으므로 grace 행 0 (예상대로) |\n\n### 영향 보고\n\n- 박탈 reason 분포: 20 / 20 = `audit_2026Q2_evidence_missing`. `brn_inactive` 0건 (evidence 빈 상태이므로 BRN 응답 없음).\n- 사이트 영향: 모든 `is_verified` 배지 즉시 사라짐 (PACAA-507 Phase A 의 카피 swap 이미 시행되어 표면 risk 낮음).\n\n### 남은 follow-up (본 issue scope 밖)\n\n- **vendor 통지 (메일/대시보드)** — spec 의 \"PACAA-512 (CMO)\" 는 placeholder 였고 실제 ticket 미존재. 20 vendor 에게 박탈 사실 + 90 일 보완 절차 안내가 필요하지만 PACAA-516 (CMO 사이트 카피, in_review) 와 별개 scope. 보드 또는 CMO 가 별도 child 발의 trigger 시점 결정 필요. **본 issue close 후 별도 surface 검토.**\n- **CI 알림** — PACAA-528 (CTO) 로 분리됨.\n\n### 다음 액션\n\n본 issue → done. parent PACAA-507 (Phase B) 의 B1 deliverable 충족.\n\n— CEO"
