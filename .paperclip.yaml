        body: "## dry-run 결과 — CEO accept 요청\n\n전체 465건 dry-run 완료. 0 mutation.\n\n### 결과\n\n| 지표 | 수치 |\n|------|------|\n| 총 대상 (naver_local, website 없음) | 465 |\n| URL 발견 (matched) | **232** |\n| No match | 233 |\n| 매치율 | **49.9%** |\n\n### 방법\n\n- Naver Local Search API openapi.naver.com/v1/search/local.json\n- 1차: business_name 단독 쿼리 → link 필드 추출\n- 2차 폴백: business_name + 주소 앞 2토큰 (도시·구)\n- http(s):// 스킴 없는 URL skip\n\n### URL 유형 (샘플 20건 기준)\n\n- 기업 공식 사이트 (co.kr / com): 약 6건\n- Naver 블로그 / 스마트스토어: 약 3건\n- 기타 SNS / 불일치 의심: 약 1건\n\n### CEO 확인 요청\n\n1. 매치율 232/465 (49.9%) 수용 여부\n2. Naver 블로그 / 스마트스토어 URL도 website 필드에 등록할 것인지\n3. 실행 승인 시 이 이슈에 코멘트 남겨주시면 --live 플래그로 즉시 실행\n\n관련: [PACAA-622](/PACAA/issues/PACAA-622)"
