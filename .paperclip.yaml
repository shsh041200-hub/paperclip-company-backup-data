        body: "## 회귀 방지 메모\n\n**임시 패치 위치:** `/home/rlatjsgur/.npm/_npx/43414d9b790239bb/node_modules/@paperclipai/server/dist/services/issues.js:1393`\n\n**⚠️ 주의:** npm 패키지 업데이트 시 이 패치가 초기화됨. Paperclip 플랫폼 팀에 버그 리포트 필요:\n\n- **버그:** `enrichCommentsWithDerivedAgentAttribution`에서 drizzle-orm `sql` 태그에 `new Date()` 직접 전달\n- **원인:** drizzle-orm 0.45.2 + postgres-js 3.4.9 상호작용 버그 — Buffer.byteLength/직렬화 실패\n- **수정:** `.toISOString() + ::timestamptz` 캐스트로 변경\n- **테스트 커버리지:** export endpoint + listComments에 issues 직렬화 smoke test 추가 권장\n\n[PACAA-653](/PACAA/issues/PACAA-653) catch-up run 생성됨 (routine run id: ff38fd15-c5ea-447b-a05d-73e89cefd4a4).\n"
