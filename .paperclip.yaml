        body: "## 현재 작업 / 보드님 필요 행동\n\n- 현재 작업: C1 compare 완료. 다음 우선순위 결정 대기.\n- 보드님 필요 행동: 텔레그램 인터랙션 (13:24 발의, `post_c1_pick`) 에서 **4개 중 1개 선택**. 아래 설명 참고.\n\n---\n\n## 4개 옵션 — 초보자 설명\n\n각 옵션은 (1) 무엇을 하는지 (2) 왜 하는지 (3) 누가/얼마나 걸리는지 (4) 사용자 체감 4 요소로 풀었습니다.\n\n### 1. S2 — /compare GSC 재제출  ⭐ 가장 쉬움\n\n- **무엇**: 오늘 머지된 새 `/compare` 디자인을 구글에 \"빨리 다시 크롤해줘\" 라고 알리는 작업. Google Search Console 사이트에서 URL 1개 입력 후 \"색인 요청\" 버튼 클릭.\n- **왜**: 디자인 개선이 검색 결과에 반영되려면 구글이 재크롤해야 함. 자동 재크롤은 며칠~수 주 걸리는데, 수동 요청은 보통 1~3일.\n- **누가 / 시간**: **보드님이 GSC UI 에서 클릭 1회 (~1분)**. CEO 가 가이드 제공.\n- **사용자 체감**: 며칠 내 검색 결과에 새 디자인 카드/스니펫 노출. **즉시 효과 가장 큼.**\n- **위험/비용**: 없음 (무료, 되돌리기 필요 없음).\n\n### 2. S1 — Sitemap-index 도입\n\n- **무엇**: 현재는 `/sitemap.xml` + `/sitemap/1.xml ... /sitemap/N.xml` 구조. 이를 표준 `sitemap_index.xml` 패턴으로 정리.\n- **왜**: 페이지 수가 늘어 자동 분할되어도 검색엔진이 안정적으로 발견. 장기 SEO 자산 정리.\n- **누가 / 시간**: **CTO 가 1~2시간 코드 작업**.\n- **사용자 체감**: 직접 변화는 없음. 인프라 자산.\n- **위험/비용**: 낮음. 무료.\n\n### 3. D1 — Slug ↔ entity 정합성 정리\n\n- **무엇**: vendor URL 슬러그 (예: `/vendors/donghae-packaging`) 와 실제 vendor 데이터 정합성이 깨진 케이스 정리. 잘못된 슬러그 redirect or 보정.\n- **왜**: 사용자가 URL 보고 \"엉뚱한 vendor 인가?\" 의심하거나, 검색엔진이 중복 페이지로 오해.\n- **누가 / 시간**: **BE 도메인이 audit + 마이그레이션 (~2~4시간)**. 영향 vendor 몇 건인지 먼저 측정 단계 필요.\n- **사용자 체감**: 신뢰도 ↑, 검색 노출 ↑ (중간 정도).\n- **위험/비용**: 데이터 변경이라 audit 먼저. 무료.\n\n### 4. C2 — Vendor density push  💰 예산 필요\n\n- **무엇**: 비교 페이지에 등장하는 vendor 수를 늘림. 외주 sourcing 또는 자동 크롤로 신규 vendor 등록.\n- **왜**: vendor 가 적으면 비교 자체가 의미 없음. \"선택지 많다\" 인식이 가입/문의 funnel 의 핵심.\n- **누가 / 시간**: **CMO 가 sourcing 계획. 외주/크롤러 예산 결정 필요 (가격 옵션은 별도 ask 로 surface 예정).**\n- **사용자 체감**: 가장 큼. 비교 페이지의 본질 가치 ↑.\n- **위험/비용**: **돈이 들 수 있음** (수십만~수백만원 범위, 옵션 따라). 보드 예산 결정 mandate.\n\n---\n\n## CEO 추천 순서 (참고용)\n\n1. **S2** (1분, $0, 즉시 SEO 효과) — C1 일을 \"검색에 알리는 마무리\". 이미 한 일의 ROI 확정.\n2. **S1** (CTO 1-2h, $0) — 인프라 정리. 다음 페이지 추가 작업에 자동 대응.\n3. **D1** (BE 2-4h, $0) — 데이터 신뢰도. audit 먼저라 보드 추가 결정 가볍게.\n4. **C2** ($수십만~, sourcing) — 가장 효과 크지만 비용/시간 큼. 위 3개 후 보드와 별도 예산 논의.\n\n## 보드 액션\n\n텔레그램에서 받으신 인터랙션 \"C1 compare 완료. 다음 우선순위를 골라주세요\" 에서:\n\n- **\"S2 — /compare GSC 재제출\"** 누르면 → CEO 가 GSC 클릭 가이드 작성\n- **\"S1 — Sitemap-index 도입\"** 누르면 → CTO 발의\n- **\"D1 — Slug↔entity mismatch cleanup\"** 누르면 → BE audit 발의\n- **\"C2 — Vendor density push\"** 누르면 → 먼저 sourcing 비용 옵션 ask\n\n선택 시 CEO 가 이어서 진행합니다."
