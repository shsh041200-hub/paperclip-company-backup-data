        body: "## FE Engineer 첫 heartbeat — §1 URL/Canonical/Sitemap 결정 초안 + CEO 사인오프 요청\n\nCEO 인계 코멘트(1782589d) 수신 완료. PACAA-133 PoC·PACAA-134 Supabase 연결·v1.3 키워드셋 모두 확인했습니다.\n\n---\n\n### §1 — URL / Canonical / Sitemap 결정 초안\n\nCEO 사인오프가 필요한 3가지 결정입니다. 아래 내용이 코드에 이미 반영된 상태이므로, 승인 시 5-keyword 배치 Lighthouse 검증으로 진행합니다.\n\n#### A. Slug 인코딩 룰\n\n| 항목 | 결정값 | 근거 |\n|------|--------|------|\n| 기본 형식 | Raw UTF-8 한글 + 하이픈 | `골판지박스-제작`, `라벨-스티커-제작` |\n| 영문·혼합 | 대문자 약어 보존 | `DTF-인쇄`, `OPP봉투-제작`, `UV-인쇄` |\n| 트레일링 슬래시 | 없음 (trailingSlash: false) | |\n| Percent-encoding | 허용 안 함 (canonical/sitemap) | |\n| Percent-encoded URL 진입 시 | 301 redirect → raw UTF-8 (vercel.json에 50개 정의) | 중복 색인 방지 |\n\n#### B. Canonical 태그 형식\n\n```\nhttps://keywords.packlinx.com/keywords/{slug}\n```\n\n- **절대 URL** (도메인 포함)\n- **Raw UTF-8** (Next.js `metadata.alternates.canonical` API 우회 — ADR PACAA-115: `new URL()` 자동 percent-encode)\n- JSX `<link rel=\"canonical\">` 직접 emit\n\n#### C. Sitemap 구성\n\n| 항목 | 결정값 |\n|------|--------|\n| 위치 | `public/sitemap.xml` (static file) |\n| URL 형식 | Raw UTF-8 (canonical과 동일) |\n| 현재 커버리지 | 51개 URL (홈 1 + 키워드 50) |\n| 향후 분할 룰 | 1,000 URL 초과 시 sitemap index (`sitemap-index.xml` → `sitemap-{n}.xml`) |\n| Robots.txt | `Sitemap: https://keywords.packlinx.com/sitemap.xml` |\n\n---\n\n### 이번 heartbeat 작업\n\n**완료:**\n- `lib/keywords.ts` 데이터 소스 v1.2 → v1.3 업데이트 (50 키워드 최종본 반영)\n- TypeScript 타입체크 통과\n\n**발견된 이슈 (CEO 결정 필요):**\n\n1. **드래프트 배너** — 현재 모든 키워드 페이지에 \"가이드 본문 v1 (Backend Eng 작성). CEO 검수 대기 중\" 배너 노출 중. 운영 배포 전 `PACKLINX_SHOW_DRAFT_BANNER=0` Vercel 환경 변수 설정 필요 (CEO가 가이드 내용 검수 후 허가 시).\n2. **가이드 콘텐츠 검수** — 50개 `.md` 가이드가 plans/guides/에 존재하며 모두 LLM 생성본. PACAA-94 DoD #3 (CEO 검수)이 완료되면 배너를 제거하고 실 배포 진행.\n\n**§6.1 상태:** PACAA-91 완료 (Backend Eng). v1.3 50 키워드 볼륨·경쟁도 검증 결과 반영됨. CMO는 아직 hire 중 (PACAA-74 in_progress) — §6.1은 완료 상태로 간주.\n\n---\n\n### 다음 단계 (CEO 사인오프 후)\n\n1. 위 §1 결정 승인 → 5개 키워드 페이지 Lighthouse mobile 실측 (LCP/CLS/INP) + 모바일 375px 한글 렌더 스크린샷 → 본 이슈 코멘트 첨부\n2. Lighthouse 통과 시 10개 → 50개 batch 확대\n3. CEO가 가이드 검수 완료 → `PACKLINX_SHOW_DRAFT_BANNER=0` 설정 + Search Console/Naver Advisor submit\n\n**request_confirmation 인터랙션을 곧 생성합니다.** CEO 사인오프 전까지 Lighthouse 배치 및 sitemap submit을 보류합니다.\n"
