  pacaa-404:
    comments:
      -
        authorAgentSlug: "ceo"
        authorType: "agent"
        body: "## 가이드 페이지 개선안 — 진단 + 우선순위 제안\n\n라이브 페이지(`https://www.packlinx.com/guides`)와 코드(`app/guides/page.tsx`, `app/guides/layout.tsx`, `lib/guide-data.ts`) 동시 점검 결과 보드 평가 정확합니다. 본문이 사실상 unstyled 상태입니다.\n\n### 현재 상태 진단\n\n- **`app/guides/page.tsx` 본문에 className 0개** — `<main>/<h1>/<ul>/<li>/<p>/<strong>` 모두 브라우저 default 렌더 (h1 거대, 링크 파란색+밑줄, ul 디스크 불릿)\n- layout 의 `prose-guide` 클래스는 globals.css 에 정의 0건 → **dead class** (Tailwind typography 미설치). grep 결과 `layout.tsx` 단일 출현\n- 컨테이너 `max-w-3xl` (882px) 좁은 컬럼에 가이드 20개가 카테고리/카드 없이 평면 단일 리스트로 세로 나열\n- 헤더(navy + 카테고리/가이드/업체검색 chip)와 푸터만 정돈 → 본문이 임시 mock 처럼 떠 보임 (\"ui도 개선이 안되었어\"와 일치)\n- 검색·필터·카테고리·카드 메타(업데이트 일자/키워드) 0\n- description 길이 편차 큼 (15~95자) → 카드화 시 row 높이 들쭉날쭉 우려\n\n### 개선안 — P0 / P1 / P2\n\n#### P0 — 정보 구조(IA) 재설계\n20개 flat list → **5개 카테고리 그루핑**:\n\n| 카테고리 | 개수 | 가이드 |\n|---|---|---|\n| 박스·골판지 | 6 | 골판지 박스 업체 선정, 골판지 플루트, 택배 박스 가격, 소량 맞춤 박스, 이사박스 대량구매, 이사박스 사이즈 |\n| 소재 | 7 | 라벨 인쇄, 연포장재, 플라스틱 용기, 유리·금속 용기, 부자재, 포장재 소재 종합, 포장 테이프 |\n| 산업별 | 4 | 식품 포장재, 친환경 포장, 화장품 박스, 전자제품 포장 |\n| 공정·인쇄 | 2 | 포장 인쇄, 포장기계·자동화 |\n| 트렌드 | 1 | 2026 한국 패키징 트렌드 |\n\n**구현 포인트**\n- `lib/guide-data.ts` `GuideMeta` 에 `category: GuideCategory` 필드 추가 (단일 source of truth 유지)\n- index 페이지에서 `groupBy(category)` 후 섹션별 `<h2>` + 카드 그리드\n\n#### P0 — 카드 그리드 + 비주얼\n- 본문 컨테이너 `max-w-3xl` → `max-w-7xl`\n- 그리드: `grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4`\n- 카드 스타일 (디자인 토큰 globals.css 에 모두 정의됨, 재사용만 하면 됨):\n  - 흰 배경 + `border border-[var(--color-border)]` + `rounded-xl` + `p-5`\n  - hover: `shadow-card-hover` + border `brand-200`\n  - 상단 카테고리 chip: `bg-brand-50 text-brand-700 px-2 py-0.5 rounded-full text-[11px] font-semibold uppercase tracking-wider`\n  - 제목: `text-[17px] font-semibold leading-snug` (navy)\n  - 설명: `text-sm leading-relaxed text-slate-500 line-clamp-3`\n  - 하단 CTA: `→ 가이드 보기` (brand-700, hover brand-hover)\n\n#### P1 — 히어로 섹션 추가\n현재 평범한 h1 한 줄 → 가치 전달 약함.\n- `bg-[var(--color-bg-subtle)]` 또는 `bg-dot-grid` 배경, `py-14 sm:py-20`\n- h1: `text-3xl sm:text-4xl font-bold tracking-tight`\n- 카피 예시:\n  - 메인: **\"포장재 구매, 어디서부터 봐야 할지 막막하신가요?\"**\n  - 서브: \"구매 담당자가 자주 묻는 20개 주제 — 소재·MOQ·납기·인증 한 번에\"\n- 메타 라인: `20개 가이드 · 2026년 5월 업데이트`\n\n#### P1 — 검색·필터\n- 카테고리 chip 필터 (전체 / 박스 / 소재 / 산업별 / 공정 / 트렌드) — 클라이언트 useState (서버 컴포넌트 감싸는 client island)\n- 검색 input: 제목+설명+키워드 includes 매칭\n- 결과 카운트: \"12개 가이드\"\n\n#### P1 — 카드 메타 보강 (`GuideMeta` 필드 추가)\n- `keywords?: string[]` — 카드 하단 chip 2~3개 (예: `MOQ` `식약처` `2026 단가`)\n- `updatedAt: string` — freshness 시그널 (\"2026.04 업데이트\")\n- (선택) `readMinutes?: number` — \"5분 읽기\"\n\n#### P2 — description 카피 정규화\n- 현재 15~95자 편차 → 35~55자 통일\n- 끝맺음 동사 통일: \"~ 비교\" / \"~ 정리\" / \"~ 가이드\"\n- 핵심 키워드는 description 본문에서 빼고 `keywords[]` 배열로 분리\n\n#### P2 — SEO 보강\n- index 페이지 `ItemList` JSON-LD (Google 가이드 캐러셀 노출 가능)\n- 카테고리 섹션마다 `<h2 id=\"category-box\">` 앵커 → in-page anchor\n\n#### P2 — 모바일/접근성\n- 카드 터치 타겟 `min-h-[44px]`\n- 카테고리 chip 모바일 가로 스크롤 (`scrollbar-none` 유틸 globals.css 에 존재)\n- focus-visible outline 이미 적용됨 → 유지\n\n### 텍스트 시안 (P0 적용 후 첫 화면)\n\n```\n┌──────────────────────────────────────────────────┐\n│ [navy 헤더 — 변경 X]                              │\n├──────────────────────────────────────────────────┤\n│ [Hero · bg-subtle 또는 dot-grid]                  │\n│   포장재 구매, 어디서부터 봐야 할지 막막하신가요?    │\n│   20개 주제 — 소재·MOQ·납기·인증 한 번에           │\n│   20개 가이드 · 2026.05 업데이트                  │\n│   [🔍 검색 input]                                 │\n│   [전체] [박스] [소재] [산업별] [공정] [트렌드]    │\n├──────────────────────────────────────────────────┤\n│ ## 박스·골판지 (6)                                │\n│ ┌──────────┐ ┌──────────┐ ┌──────────┐           │\n│ │ 박스 chip │ │  ...      │ │  ...      │           │\n│ │ 골판지... │ │           │ │           │           │\n│ │ 설명...    │ │           │ │           │           │\n│ │ MOQ 단가   │ │           │ │           │           │\n│ │ → 가이드  │ │           │ │           │           │\n│ └──────────┘ └──────────┘ └──────────┘           │\n│ ## 소재 (7)                                       │\n│ ...                                              │\n└──────────────────────────────────────────────────┘\n```\n\n### 우선순위 권장\n\n- **P0 두 개 (IA + 카드 그리드)** 만 적용해도 보드 체감 개선 80%. 1~2 PR (2~4시간 추정).\n- **P1 (히어로 + 검색 + 카드 메타)** 는 별도 후속. 카피 워크 + UI 컴포넌트.\n- **P2** 는 backlog 누적 가능 (SEO/카피 정규화).\n\n### 다음 액션 (보드 결정)\n\n보드님 응답 옵션:\n1. **P0 만 진행** — child issue 발의 (CTO 또는 프론트 작업자)\n2. **P0 + P1 묶음 진행** — 단일 epic 으로 PR 1개\n3. **시안 먼저 보고 결정** — 정적 HTML 또는 Figma 시안 1차 (CMO/디자인)\n4. **추가 의견 / 보강 필요 영역 지정**\n\n본 코멘트는 **개선안 제출만** (보드 명시 \"실행은 X\"). status `in_review` 로 전환, 보드 응답 대기.\n\n— [PACAA-404](/PACAA/issues/PACAA-404)\n"
