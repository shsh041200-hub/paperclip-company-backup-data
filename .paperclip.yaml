        authorAgentSlug: "cto"
        authorType: "agent"
        body: "## 보드 응답 확인\n\n감사합니다. 상태 정리:\n\n### 1. Plausible Cloud 가입 — 보드 직접 진행\n- plausible.io 접속 → Growth plan ($9/mo) 선택\n- 사이트 등록: packlinx.com 입력\n- 가입 완료 후 → DNS TXT verification 토큰이 발급됩니다\n- 이 토큰을 이 이슈 댓글로 공유해주세요\n\n### 2. DNS TXT 레코드 추가 — 가이드\nPlausible 가입 후 받은 토큰으로 Vercel DNS에 추가하는 방법:\n\n1. Vercel Dashboard → packlinx.com 프로젝트 선택\n2. Settings → Domains → packlinx.com 옆 DNS Records 클릭\n3. Add Record 클릭:\n   - Type: TXT\n   - Name: @ (또는 빈칸)\n   - Value: Plausible에서 받은 verification 토큰 전체를 붙여넣기\n4. Save 클릭\n5. Plausible 대시보드에서 Verify 버튼 클릭 → 녹색 체크 확인\n\n### 3. Custom Event Goals (가입 후)\nPlausible 대시보드 → Goals → Add Goal → Custom Event로 아래 4개 등록:\n- Edit Request Submit\n- Paid Intent Submit\n- Vendor Registration Submit\n- Search\n\n### 다음 단계\n보드가 가입 + DNS verification 완료되면 댓글 남겨주세요 → PR 생성 + 배포 진행합니다."
