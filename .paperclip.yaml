        body: "## 보드 승인 요청 — PACAA-7 인프라 빌드 4종 완료\n\n조직 운영 인프라 초기화 빌드가 디렉티브 범위 내에서 마무리됐습니다. 보드 사인오프 요청합니다.\n\n## 완료된 4개 산출물\n\n- **PACAA-8 (7.1) — 회사 공통 스킬 세트** ✓ done 2026-04-27 10:13\n  - 7종 공통 스킬 (encoding-discipline, packlinx-context, benchmark-methodology, packlinx-comms, packlinx-decision-log, paperclip, para-memory-files)\n- **PACAA-9 (7.2) — SOUL/AGENTS/HEARTBEAT 표준 템플릿** ✓ done 2026-04-27 18:22 (보드 승인)\n  - `templates/agent/` 하위 4개 파일 + CTO 스모크 인스턴스\n- **PACAA-10 (7.3) — 직무별 특화 스킬 9종** ✓ done 2026-04-27 18:41 (보드 승인)\n  - `<role>-playbook` 9종 (CTO/CMO/COO/HoP/FE/BE/Designer/Sales/Legal)\n- **PACAA-11 (7.4) — 신규 에이전트 온보딩 런북** ✓ done 2026-04-27 18:52 (보드 승인)\n  - `templates/agent/ONBOARDING.md` 6단계 풀 절차 + 12항목 실패모드 체크리스트 + 모델 배정 결정 트리\n\n## 디렉티브 범위 검증\n\n원 지시문 4개 항목 모두 산출물 매핑됨. \"각 작업은 개별 이슈 생성을 통해 퀄리티를 높이고\" 조건 충족 (4개 자식 이슈 분리 운영). \"솔로 운영 / 토큰 효율 / 한국어 사용자 + 영어 내부 문서\" 방향성은 각 자식 이슈의 plan 문서 및 보드 사인오프 단계에서 검증 완료.\n\n## 다음 단계 — 디렉티브 범위 밖, 별도 승인 필요\n\n인프라는 완성됐지만 \"기존 ceo 제외 모든 에이전트는 삭제/해고 후 실행할것\" 절은 보드 콘솔 액션이 필요합니다.\n\n- **Phase 0 — 기존 9 에이전트 종료**: [approval 6b6a9300](/PACAA/approvals/6b6a9300-8323-4c30-a68c-957fc0757523) 에서 보드 승인됐으나, 플랫폼 가드레일(`DELETE /api/agents/:id` → `403 Board access required`)로 보드 콘솔에서 직접 실행 필요. 현재 9명 모두 idle, 0 heartbeat 상태로 남아있음.\n- **Phase 2 — 새 템플릿으로 재채용**: Phase 0 후 CTO부터 시작 (PACAA-11 런북의 첫 프로덕션 검증 겸용). 직무별 hire 제안서를 별도 이슈로 올릴 예정.\n- **Phase 3 — 검증**: CTO 재채용으로 온보딩 런북 검증 후 잔여 직무 일괄 재채용.\n\n## 사인오프 요청\n\n이 이슈에 대해 다음 중 하나 회신 부탁드립니다:\n\n- **승인** → 이슈 done 처리 후 다음 heartbeat에 Phase 0 보드 액션 대기 상태 유지\n- **변경 요청** → 어떤 부분 보강할지 알려주시면 반복\n- **무응답 2 heartbeat** → 자체 판단으로 done 마크 (직전 7.x 이슈에서 동일 패턴)\n\nPhase 0 9건 삭제는 보드 직접 액션이 필요한 별개 작업입니다 — 이 이슈 사인오프와 무관하게 진행 가능합니다.\n"
