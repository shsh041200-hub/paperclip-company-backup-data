        body: "## 김선혁님, 답장(Reply) 라우팅 즉시 구현 + 견본 재발사\n\n### 한 줄 결론\n\n**답장이 이슈 코멘트로 안 들어왔던 건 라우팅 미구현 때문 — 방금 구현 + 봇 재시작 + 견본 재발사 (msg_id=218~219). 이번 메시지에 답장(Reply) 주시면 PACAA-125 코멘트로 자동 저장됩니다.**\n\n### 무엇이 문제였나\n\n직전 코멘트에서 \"코멘트백 라우팅 구현은 사인오프 후 진행 예정\" 이라고 적어 두고 견본만 발사했어요. 김선혁님이 답장을 보냈는데 봇이 답장을 받기만 하고 이슈 코멘트로 라우팅하는 코드가 없어서 무반응이었습니다. 사인오프 기다릴 일이 아니었어요 — 자유 입력 kind 의 핵심 contract 가 답장이라 라우팅 없으면 검증 자체가 불가능. 즉시 구현했습니다.\n\n### 코드 패치\n\n- **`notify-telegram.py`**:\n  - `state.message_index` 필드 추가 — telegram message_id → {issue_id, interaction_id, kind, sample, ts} 매핑.\n  - `record_message_mapping(state, message_id, ...)` 헬퍼 — 발송 직후 매핑 저장 (FIFO 500개 한도).\n  - sample 발사 경로: 모든 견본 메시지를 PACAA-125 로 라우팅.\n  - 실서비스 발사 경로: `_extract_issue_meta` 가 issue UUID 를 meta 에 보존하도록 수정 → 실제 cron 발송에도 라우팅 등록.\n- **`bot-server.py`**:\n  - `_load_message_index()` 헬퍼 — `.notify-state.json` 의 매핑 조회.\n  - `handle_reply(chat_id, msg)` 함수 — 보드 답장 (`reply_to_message` 포함) 감지 → 매핑 조회 → `POST /api/issues/{id}/comments` 로 \"[보드 답장 — Telegram Reply]\" prefix 와 함께 저장 → ack 메시지 \"✅ 코멘트 추가됨: PACAA-XX\".\n  - `process_update`: 답장 메시지는 명령어 처리보다 우선.\n- **봇 재시작**: 기존 PID 189004 종료 → 새 PID 241568 실행. 새 코드 활성.\n\n### 방금 발사한 견본\n\nmsg_id=218~219 (Paperclip0412_bot, --sample=freeform-v2). state.message_index 에 `\"218\": {issue_id: PACAA-125, kind: freeform, sample: freeform-v2}` 저장 확인 완료.\n\n**테스트 방법**: 이번 견본 메시지 (\"김선혁님,\" 으로 시작하는 것) 에 텔레그램 답장 기능으로 아무 텍스트나 답장 주시면:\n1. 봇이 즉시 \"✅ 코멘트 추가됨: PACAA-125\" 답합니다.\n2. PACAA-125 에 \"[보드 답장 — Telegram Reply] (sample=freeform-v2)\" 로 시작하는 코멘트가 생깁니다.\n\n실패 시: 봇이 \"❌ 답장 라우팅 실패\" 답하거나 무반응. 무반응이면 알려 주세요 — 로그 보고 디버그하겠습니다.\n\n### 결재 라인\n\nrev4 결재 `331d1b0d` 는 살아 있습니다. 이번 답장 라우팅 동작 확인 + 견본 3종 만족하면:\n\nA) 승인 — cron `_build_for_interaction` v2 빌더 전환 + v1 deprecated + SOUL baking + 메모리 영구화 + close.\nB) 추가 수정 — 답장 또는 코멘트로 알려 주세요.\nC) 폐기 — v1 유지.\n\n(이 코멘트나 견본 메시지 어느 쪽에든 답장 주시면 됩니다.)"
