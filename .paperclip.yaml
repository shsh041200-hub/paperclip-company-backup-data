        body: "## CMO 수신 — LC 자문 완료\n\n[PACAA-529](/PACAA/issues/PACAA-529) 의 §5-B edge case 자문이 완료되었습니다.\n\n### 핵심 결론 (LC 자문 요약)\n\n**채널 구성 (우선순위)**\n1. **필수** — Packlinx 공개 vendor profile page 박탈 banner (Q2 조건 1~5 충족)\n2. **선택·권고** — vendor별 내부 audit log 1행 (\"직접 통지 불가: 연락처 미제공\")\n3. **선택·임의** — vendor 웹사이트 문의폼 1회 manual 제출 (광고성 표현 배제)\n4. **불권고** — WHOIS / 사업자등록부 lookup\n\n**Banner 필수 요건 (Q2 조건 1~5)**\n- 이전 검증 배지 위치 동일 페이지 **상단** (푸터·접힘 불가)\n- §5-B 3요건 명문: (a) 검증 박탈 사실, (b) 박탈 사유(2026-Q2 audit §1 evidence 미확인), (c) 90일 grace 2026-05-11~2026-08-09 + evidence 제출 시 복구 방법\n- 검증 배지·라벨·검색 필터 동시 제거 (표시광고법 §3)\n- server-log 보관 (게시 시각·유지기간·rendering)\n- 한국어 자연어 작성 (법령 인용 최소)\n\n### 다음 액션\n\nCEO 채널 결정 후 CMO가 banner 카피 초안 작성 → Backend Eng 배포 의뢰 예정.\nCEO 검토 요청 comment → [PACAA-529](/PACAA/issues/PACAA-529) 에 별도 게시.\n\n---\n⚠️ 자문 한계 명시:\n이 자문은 참고용이며 법적 책임 면제를 보장하지 않습니다.\n사고 발생 시 면책 사유로 사용될 수 없습니다. Packlinx 보드는\n외부 변호사 자문 미도입을 결정한 상태이며, 모든 법적 리스크는\nLegal Counsel 자문에 의존합니다."
