        body: "## Naver Search Advisor URL 수집 요청 — 상세 절차 안내\n\n`need_help` 응답 확인. 30초 1-회 클릭 절차이지만 처음이면 위치를 찾기 어려운 부분이 있어 단계별로 정리합니다.\n\n---\n\n### 사전 확인 (1회 한정 — 이미 완료되어 있을 수 있음)\n\nNaver Search Advisor 에 packlinx.com 사이트가 **이미 등록되어 있어야** URL 수집 요청이 가능합니다. 등록되어 있지 않다면 1단계가 추가됩니다.\n\n**확인 방법:**\n- https://searchadvisor.naver.com 접속 → 우측 상단 **로그인** (네이버 계정)\n- 로그인 후 좌측 **사이트 관리** 메뉴 진입\n- 등록된 사이트 목록에 `packlinx.com` 또는 `https://www.packlinx.com` 이 있으면 OK\n- 없으면 → **사이트 등록** 버튼 → URL 입력 → 소유 확인 (HTML 파일 업로드 또는 메타태그 — 이미 sitemap 인프라가 되어 있어 메타태그 방식이 가장 빠름)\n\n**이미 등록되어 있다면 아래 1~5단계만 진행.**\n\n---\n\n### 1~5단계 — URL 수집 요청\n\n**1.** https://searchadvisor.naver.com/console/board 접속 (로그인 필요)\n\n**2.** 좌측 사이드바에서 **요청 → 웹페이지 수집** 클릭\n   - 영문 UI: `Request → Request URL Collection`\n   - URL 패턴: `https://searchadvisor.naver.com/console/site/request/collect?site=...`\n\n**3.** 사이트 선택 드롭다운에서 `https://www.packlinx.com` 선택\n\n**4.** URL 입력란에 다음 경로 입력:\n   ```\n   /guides/label-printing-guide\n   ```\n   (앞에 `https://www.packlinx.com` 자동 prefix)\n   \n   또는 전체 URL:\n   ```\n   https://www.packlinx.com/guides/label-printing-guide\n   ```\n\n**5.** **확인** 버튼 클릭 → \"수집 요청이 완료되었습니다\" 토스트 메시지 확인\n\n---\n\n### 트러블슈팅\n\n| 증상 | 원인 / 해결 |\n|------|-------------|\n| \"사이트가 등록되어 있지 않습니다\" | 사전 확인 1단계 필요 (사이트 등록) |\n| \"1일 수집 요청 한도 초과\" | Naver SA 는 사이트당 일일 50회 제한 — 24시간 후 재시도 |\n| \"로그인 세션 만료\" | 다시 로그인 후 재시도 |\n| URL 입력 후 버튼 비활성화 | URL이 사이트 등록 도메인과 일치하지 않음 (www. 접두사 확인) |\n\n---\n\n### 소요 시간 추정\n\n- 사이트 이미 등록됨: **30초 ~ 1분**\n- 사이트 신규 등록 필요: **5분** (메타태그 추가 → CTO 경유 → 재배포 1회)\n\n신규 등록이 필요하면 별도 child ticket 발의해 CTO 에게 메타태그 추가 위임. 알려주시면 즉시 발의합니다.\n\n---\n\n### 다음 인터랙션\n\n본 가이드 확인 후 진행 상황을 다시 알려주시도록 신규 인터랙션 발의 예정 — 답변 옵션은 동일 (완료 / 보류 / 생략 / 신규 등록 필요 / 모름).\n"
