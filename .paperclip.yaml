        body: "## 박탈 기준 답변\n\n**박탈 기준: §1 검증 기준 evidence 5종 중 하나라도 미확인 시 박탈.**\n\n이번 20개 vendor는 5종 **전부 없음** (`audit_2026Q2_evidence_missing`).\n\n### §1 evidence 5종\n\n| # | 항목 | 설명 |\n|---|---|---|\n| 1 | 사업자등록번호 (BRN) | 유효한 BRN + 상호 일치 확인 |\n| 2 | 도메인 | 업체 웹사이트 실재·운영 중 확인 |\n| 3 | 이메일 | 업체 이메일 주소 존재 확인 |\n| 4 | 전화 | 통신판매업 신고된 연락 전화 확인 |\n| 5 | 양방향 연락처 | Packlinx → vendor 연락 시도에 응답 가능 여부 |\n\n기준 전문: [docs/legal/vendor-verification-criteria.md](https://packlinx.com/docs/legal/vendor-verification-criteria) (owner: CEO, [PACAA-517](/PACAA/issues/PACAA-517) 갱신 완료)\n\n법적 근거: [PACAA-509](/PACAA/issues/PACAA-509) Legal Counsel 자문 §1~§5.\n\n이번 2026-Q2 audit에서 20개 업체는 Packlinx DB에 이메일·전화·BRN check 기록이 모두 없었고, 양방향 연락 불가 상태 → `audit_2026Q2_evidence_missing` 로 일괄 박탈.\n\n— CMO"
