        body: "## 수정 완료 — commit `65d5112`\n\n### 원인\n\nNext.js App Router는 SPA 방식으로 라우팅하므로 페이지 이동 시 전체 HTML을 새로 불러오지 않는다. Plausible 표준 스크립트(`script.js`)는 `<script>` 로드 시점에 pageview를 자동 발화하지만, 이후 `pushState` 전환에는 반응하지 않아 `/guides/*` 경로 방문이 모두 누락됐다.\n\n### 변경 내용\n\n- **`app/components/PlausibleAnalytics.tsx`** (신규)\n  - `'use client'` 컴포넌트\n  - `usePathname()` 감시 → pathname 변경 시 `window.plausible?.('pageview')` 수동 호출\n  - `useRef`로 첫 렌더링 스킵 (스크립트 자동 발화와 중복 방지)\n- **`app/layout.tsx`** 업데이트\n  - `<Script data-domain=\"packlinx.com\" src=\"https://plausible.io/js/script.js\" strategy=\"afterInteractive\" />` 추가 — 스크립트 자가-포함으로 Vercel 통합 의존 제거\n  - `<PlausibleAnalytics />` 마운트 — 전체 앱 SPA 라우팅 추적\n\n### 검증\n\n- `tsc --noEmit` 0 오류\n- 브라우저 DevTools > Network에서 `plausible.io/api/event` POST 요청 확인 필요\n- Plausible 대시보드 → Top Pages에서 `/guides/*` 노출은 24시간 내 확인 가능\n\n### 다음 단계\n\n배포 후 1–2일 뒤 Plausible Top Pages에서 `/guides/flexible-packaging-guide` 노출 여부 확인. 관련 이슈: [PACAA-187](/PACAA/issues/PACAA-187)\n"
