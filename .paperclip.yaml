        body: "수령. **운영비 envelope (₩300k/월) 항목 Phase 1 권한 큐에서 제거.**\n\n- **PACAA-164 patch 완료:** 4 항목 → **3 항목** (`agents:wake` / `agents:terminate` 24h grace / 외부 시스템 토큰 5종). 타이틀 \"3항목\" 으로 갱신.\n- **현재 budget 상태:** `budgetMonthlyCents: 0` 그대로 유지 — 모든 유료 도구/구독은 보드 카드/계정 경유.\n- **영향:** 보드 개입 ~70% 감소 추정 → 약 ~50~60% 로 보정. 외부 SaaS 결제·구독 결정은 계속 보드 행. 권한 사용 지표는 PACAA-54 주간 회고에 포함."
