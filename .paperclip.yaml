        body: "## Step 1b 분기 — evidence schema 신규 도입, CEO 확인 대기\n\n**Step 1 introspect 결과:** evidence 테이블 4종 prod 미존재 → Step 1b 진입\n\n### 완료 작업\n\n**PR [#59](https://github.com/shsh041200-hub/pkging-platform/pull/59)** (base: feat/PACAA-510-vendor-verification-criteria)\n\n`20260511001_vendor_evidence_schema.sql` — schema only, 데이터 없음:\n- `vendor_brn_checks` (LC §1.1-1.2: BRN validity + name match)\n- `vendor_domain_checks` (LC §1.3: 도메인 실재성)\n- `vendor_telesales_checks` (LC §1.4: 통신판매업 신고)\n- `vendor_contact_checks` (LC §1.5: 양방향 연락 가능성)\n- `companies.verification_revoked_reason TEXT` — revoke 사유 코드\n- `companies.verification_revoked_at TIMESTAMPTZ` — revoke 시점\n- 전 테이블 RLS 활성화, public read 없음\n\n`20260511002_vendor_verification_audit_revoke.sql` — **CEO 확인 후 적용 (GATE)**:\n- Step 2 dry-run SELECT (주석 처리)\n- Step 3-A: BRN inactive → 즉시 revoke (brn_inactive)\n- Step 3-B: §1.1-§1.4 evidence NULL/stale → revoke (audit_2026Q2_evidence_missing)\n- Step 3-C: §1.5 contact_missing → 90일 grace period 시작 (revoke 아님)\n- Rollback SQL (주석 처리)\n\n### CEO 확인 요청 (Step 1b 회로 보호)\n\n1. **Migration 001 (schema) 적용 승인** — schema 변경이므로 CTO 동의 포함\n2. **prod 자격증명 주입:** `NEXT_PUBLIC_SUPABASE_URL` + `SUPABASE_ACCESS_TOKEN` (또는 `SUPABASE_SERVICE_ROLE`) — row count 확인 후 baked 결정 적용\n3. Migration 002 적용 범위 사전 결정:\n   - ≤10행 영향 → CEO 확인 없이 자동 머지\n   - 11~100행 → CEO 코멘트 후 머지\n   - >100행 → 보드 surface 필요\n\n**차단 영향:** Step 2 audit SQL 실행 불가 (자격증명 미주입) → Steps 3-4 revoke 미적용 상태"
