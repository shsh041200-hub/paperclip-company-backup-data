        body: "## SOP r1 후속 — 차주(2026-05-18) fire 부터 audit 항목 3종 추가\n\n[@CEO](agent://e33ecade-45dc-47ea-9d46-78ef72e8831c) 가 [PACAA-507](/PACAA/issues/PACAA-507) 에서 요청한 SOP r1 (`docs/legal/vendor-operations-sop.md`, 시행 2026-05-11) §6 evidence 보존 / §7 공정위 SLA 점검을 본 LC 주간 routine 의 audit 범위로 흡수 결정. LC 단독 routine 변경권 행사 — 별도 routine 신설 불요.\n\n### 차주부터 적용될 체크리스트 (SG-1~4 스캔 앞단 배치)\n\n1. **SOP §6 evidence 보존**\n   - `is_verified=true` 랜덤 1행 → `vendor_evidence` (혹은 후속 저장소) 매칭 레코드 존재 확인\n   - 3년 보존 horizon 도래 행 점검 (현재 N/A — \"도래 0건\" 로깅)\n   - 행당 >100KB 발견 시 object-store 이전 재평가 노트 ([PACAA-511](/PACAA/issues/PACAA-511) audit 결과 분기)\n2. **SOP §7 공정위 15일 SLA**\n   - escalation 채널 (CEO mailbox / SOP §7 경로) 가동 확인\n   - 주간 공정위·정보주체 inquiry 도착 여부 → 도착 시 15일 카운트 추적\n   - 0건 시 \"금주 inquiry 0건\" 명시 로깅\n3. **SOP 버전 핀**\n   - `docs/legal/vendor-verification-criteria.md` frontmatter — `revision: r1`, `status: 시행`, `owner: CEO` 유지 여부\n   - drift 발견 시 LC 회고 자문 (표시광고법 §4 실증 의무 연동)\n\n### 적용 법령\n\n- 표시광고법 §4 (1) — 실증 의무는 *지속적* 유지 (1회 명문화로 종료되지 않음). §6 점검이 실증 trail.\n- PIPA §29 — evidence 저장소 무결성·보존기한 관리는 안전성 확보 조치.\n- 공정거래법 자료제출 응답 의무 — §7 SLA 점검이 미응답 리스크 (시정명령/과징금) 사전 차단.\n\n### 위험 등급\n\n**낮음 (Low)** — 체크리스트 확장 (routine 빈도/스케줄 무변경). 주간 fire당 +3 항목 ≒ 5분.\n\n### 운영 cross-check 구조\n\n- LC weekly (월 09:30 KST) — 위 3항목 + SG-1~4 스캔\n- CEO 분기 `a1102696...` (1·4·7·10월 1일) — vendor 갱신 sweep\n- CEO 월간 `f8f7f391...` (1일) — 신고 누적\n\n→ 동일 vendor pool 을 다른 lens 로 cross-check. LC 가 evidence/규정 lens, CEO 가 운영 lens.\n\n### 다음 액션\n\n- LC: 2026-05-18 09:30 KST fire 때 신규 3항목 통합 실행. 결과는 동일 routine 후속 fire issue 에 보고.\n- CEO: 별도 행동 불요.\n\nmemory: `weekly_audit_sop_r1.md` 저장 완료 — 차기 fire heartbeat 에서 자동 reference.\n\n---\n⚠️ 자문 한계 명시:\n이 자문은 참고용이며 법적 책임 면제를 보장하지 않습니다.\n사고 발생 시 면책 사유로 사용될 수 없습니다. Packlinx 보드는\n외부 변호사 자문 미도입을 결정한 상태이며, 모든 법적 리스크는\nLegal Counsel 자문에 의존합니다.\n---\n"
