        body: "## BE Engineer 작업 지시 — CF Named Tunnel 영구화\n\n보드 결정: Option A (CF Named Tunnel) 확정. 토큰 발급 완료.\n\n### 입력 자산\n\n- **CF API Token:** 직전 코멘트 [e7e9e581](#comment-e7e9e581-52c0-46d0-a01e-7eb9acb10ed8) 에 board 가 paste. (cfd_tunnel:Edit scope, paperclip-tunnel)\n- **현재 임시 URL:** `https://gather-spent-assistance-retailers.trycloudflare.com` (재시작 시 변경)\n- **paperclip 서버:** founder 로컬 머신, port 3100 (env `PAPERCLIP_LISTEN_PORT`)\n- **E5 Worker:** Cloudflare Worker, env `PAPERCLIP_API_URL` 갱신 필요\n\n### 작업 단계\n\n1. **토큰 환경변수 주입**\n   ```bash\n   export CLOUDFLARE_API_TOKEN=[REDACTED-CloudflareUserAPIToken]\n   ```\n   (또는 `cloudflared` config 의 `credentials-file` 로 저장)\n\n2. **Named tunnel 생성**\n   ```bash\n   cloudflared tunnel login   # 토큰 사용\n   cloudflared tunnel create paperclip-api\n   ```\n   → UUID 발급, `~/.cloudflared/<UUID>.json` 자격증명 생성, URL `<UUID>.cfargotunnel.com` 확정.\n\n3. **config.yml 작성** (`~/.cloudflared/config.yml`)\n   ```yaml\n   tunnel: <UUID>\n   credentials-file: /home/<user>/.cloudflared/<UUID>.json\n   ingress:\n     - hostname: <UUID>.cfargotunnel.com\n       service: http://127.0.0.1:3100\n     - service: http_status:404\n   ```\n\n4. **systemd service 등록** (재부팅 자동 복구)\n   ```bash\n   sudo cloudflared service install\n   sudo systemctl enable cloudflared\n   sudo systemctl start cloudflared\n   ```\n\n5. **임시 trycloudflare 프로세스 정리** — 기존 `gather-spent-assistance-retailers.trycloudflare.com` 띄운 프로세스 kill (founder 로컬에서 `pkill -f \"cloudflared.*tunnel\"` 후 named tunnel 만 재시작).\n\n6. **E5 Worker env 갱신**\n   - Cloudflare Worker dashboard → E5 Worker → Settings → Variables\n   - `PAPERCLIP_API_URL` = `https://<UUID>.cfargotunnel.com`\n   - Save & Deploy\n\n7. **검증** — 테스트 PR 1건 머지 → E5 Worker 가 paperclip API 에 wake 코멘트 작성 확인 → audit log row 1개 추가 확인.\n\n### DoD\n\n- [ ] Named tunnel 활성화 + systemd persist 확인 (`systemctl status cloudflared`)\n- [ ] E5 Worker env 갱신 + 재배포\n- [ ] 테스트 PR 머지 → wake 코멘트 작성 성공\n- [ ] 본 이슈에 final URL + 검증 결과 코멘트 → status=done\n\n### Phase 2 카나리 트리거\n\n본 이슈 done 시 [PACAA-167](/PACAA/issues/PACAA-167) Phase 2 카나리 child 발의 가능 (CEO 가 발의, blockedByIssueIds=[PACAA-190 done]).\n\n### 주의\n\n- 토큰은 본 이슈 코멘트에 plaintext 노출. 작업 완료 후 founder 가 CF dashboard 에서 revoke 권장 (이미 자격증명 파일 로컬 저장 완료 상태).\n- ingress hostname 을 cfargotunnel.com 그대로 쓸지, 추후 paperclip.packlinx.com CNAME 으로 upgrade 할지는 별도 child (현재 결정 X).\n"
