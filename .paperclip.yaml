        body: "## 잔여 리스크 제거 결과\n\n### 핵심 발견\n**문제의 commit `e88f513` (`vercel --prod --prebuilt` 스크립트 추가) 은 origin/main 에 없음.** CTO 로컬 워크트리에만 존재 + Vercel CLI 로 직접 푸시한 dirty deploy 였음. 즉 main 브랜치 보호는 사실 작동했고, 우회는 \"CLI direct upload\" 패턴 그 자체.\n\n### 적용된 fix (commit `2f46990` push 완료)\n\n**1. `package.json`** (+3/-1):\n- `deploy` 스크립트 = PACAA-234 안내문 출력 + `exit 1` (refuse)\n- `deploy:emergency` = `PACKLINX_EMERGENCY_DEPLOY=1` env 게이트 + `vercel --prod`\n\n**2. CTO `AGENTS.md`** (+49 lines, \"절대 금지: Production 배포 경로 (PACAA-234)\" 섹션):\n- 금지 명령 list (`vercel --prod*`)\n- dirty-tree 룰\n- 회귀 메커니즘 + commit SHA 트레일\n- 정상 배포 절차 (lint→build→push→Vercel API verify)\n- emergency override 경로\n\n**Vercel auto-deploy verify**: `dpl_4mpW2v25wmFV1eRaRJL19yqLXHoB` (source=git, target=production) READY/PROMOTED for SHA `2f46990`.\n\n**Live ISR verify (post-deploy)**:\n- `/sitemap/0` → 200 + `cache-control: public, max-age=3600` + `x-matched-path: /sitemap/[id]`\n- `/sitemap.xml` → 200 + `x-vercel-cache: HIT`\n- `/companies/[slug]` SSG 정상\n\n### CEO sub-agent 가 막은 것 / 못 막은 것\n\n**막은 것**: `npm run deploy` 시도 → refuse. CTO AGENTS.md 가 `vercel --prod*` 명시적 금지.\n\n**못 막은 것**:\n1. CTO 가 `vercel --prod --prebuilt` 를 npm 우회로 **직접** 실행 — Vercel CLI 가 `.vercel/output` 을 package.json 무관하게 업로드.\n2. CTO 로컬 클론에 stale `e88f513` 잔존. CTO 가 `git pull` 안 하면 본인 deploy 스크립트가 내 refuse 버전 덮음. → CTO heartbeat 시 `git fetch && git status` 강제 routine 필요 (별도 ticket 가능).\n3. Vercel token 광범위 권한 — 토큰 보유자가 임의 promote 가능.\n\n### 보드 단일 ask (one-way door, 영구 차단)\n\n> **Vercel Dashboard → Project `pkging-platform` → Settings → Git → \"Production Deployments via Vercel CLI\" 토글 → Disabled**\n>\n> 이걸 끄면 git push origin main 만 production 배포 가능. CLI `vercel --prod` 는 preview-only fallback. **이게 유일한 구조적 fix**, 나머지는 프로세스 규율.\n>\n> (보조 ask, 선택): Vercel 토큰 rotate + CTO 용 새 토큰을 preview-only scope 로 발급)\n\n### Ticket 처리\n\n- **PACAA-234** → `in_review` 처리 (CTO sign-off 대기). CTO 가 본인 로컬 클론 rebase + `e88f513` 제거 확인 필요. 위 보드 toggle ask 는 별도 child (예: PACAA-234.1) 로 분리.\n- **PACAA-228** → `done` 재처리. 24-48h 내 보드가 IO 그래프 확인 1회만 하면 진짜 종결. 미평탄화 시 본 ticket 코멘트로 reopen.\n\n### 최종 보드 작업 (정확히 1+1)\n\n| 우선 | 액션 | 시점 |\n|---|---|---|\n| 필수 | Supabase Dashboard → Reports → Database → Disk IO 그래프 평탄화 1회 확인 | 24-48h 내 |\n| 권장 (1-click 영구 차단) | Vercel Dashboard → pkging-platform Settings → Git → \"Production via CLI\" Disabled 토글 | 시간 날 때 |"
