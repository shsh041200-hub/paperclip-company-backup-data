        body: "## PACAA-114 — 보드 핸드오프 + 자체 probe 결과\n\nCTO 1차 분석(5c74c293) 강가설은 데이터 시그니처와 일치합니다. 입력 3종 중 #1은 자체 해결, #2/#3은 보드 영역이라 분리 처리합니다.\n\n---\n\n## CEO 자체 probe 결과 (3종 산출)\n\n### ① 운영 도메인 = `packlinx.com` (확정)\n\n`https://packlinx.com` → `https://www.packlinx.com` 307 (Vercel). 카노니컬은 `packlinx.com` (apex). 사이트맵은 `https://packlinx.com/sitemap.xml` 기준 `packlinx.com` URL 발행.\n\n### ② 현재 (4/30) 라이브 sitemap 분석\n\n총 **1,031 URL**:\n\n| 경로 | 건수 |\n|---|---:|\n| `/companies/{slug}` | **1,000** ← hard-cap 의심 |\n| `/guides/{slug}` | 14 |\n| `/products/{slug}` | 10 |\n| `/categories/{slug}` | 5 |\n| `/services` | 1 |\n| `/` | 1 |\n\n**핵심 함의**: GSC 4/27 스냅샷 25,029 vs 현재 sitemap 1,031 = **24배 갭**. 즉 4/25 폭증의 상당 부분은 **이미 부분 롤백**되었거나, sitemap 외부 소스(내부 링크/캐노니컬)에서 계속 생성 중. CTO Task B 가설 — \"단일 sitemap 변경 한 건의 시그니처\" — 와 일관됩니다. 단, 정확한 시점 확정은 #3(배포 로그) 필요.\n\n### ③ CTO #1 가설(auth-gate sitemap 노출) 반증\n\n라이브 직접 probe (`https://www.packlinx.com/...`):\n\n| URL | HTTP |\n|---|---:|\n| `/admin` | **404** |\n| `/dashboard` | **404** |\n| `/login` | **404** |\n| `/account` | **404** |\n| `/companies/wontekeu/edit` | **404** |\n| `/companies?page=9999` | **404** |\n| `/companies?sort=invalidvalue` | **404** |\n| `/companies/{nonexistent-slug}` | **404** |\n\nGSC \"다른 4xx 문제\" 카테고리는 404 별도 분류이므로, **auth-gate 가설의 비중을 高 → 低 로 하향**. 5,667의 다수는 실제 401/403/410/400 응답을 한 URL이어야 합니다 — Vercel 미들웨어/edge function 에서 토큰/헤더 검사로 401·403 떨어진 경우, 또는 410 Gone 발행 케이스가 더 유력.\n\n### ④ 신규 시그니처: `/companies` 1,000건 cap\n\n현재 sitemap 의 `/companies/{slug}` 가 정확히 **1,000건**. 실제 vendor 수가 1k 이상이면 **P1 색인 누락 별건 이슈** (사이트맵 정화 child issue 와 묶을 후보). 4/25 변경의 \"롤백\" 부산물로 1k cap 이 들어갔을 가능성도 있음.\n\n---\n\n## 보드(@founder) 부탁 — 입력 #2 + #3\n\nCTO 인터랙션 `829a5083` ([수락] 액션) 에 들어갈 입력입니다. 답변 후 인터랙션 accept 부탁드립니다.\n\n### #2 GSC 4xx URL 100샘플 (가장 중요)\n\nGoogle Search Console → `packlinx.com` 속성 → **색인 → 페이지** → 사유 **\"다른 4xx 문제로 인해 차단됨\"** 클릭 → \"예시\" 탭에서 URL 100건 export (CSV) 후 본 이슈에 첨부.\n\n### #3 4/24 18:00 ~ 4/25 24:00 KST 배포/import 이벤트 한 줄\n\n다음 중 알고 계신 내용 1줄로 요약:\n- Vercel deployments (vercel.com/dashboard → packlinx 프로젝트 → Deployments 탭)\n- Supabase migration / data import (vendor 일괄 업로드 등)\n- cron / scheduled job 변경\n\n기억에 없으시면 \"기억 없음 — Vercel/Supabase 직접 확인 필요\" 로 답해주시면 CTO 에게 해당 권한 부여 여부를 별건으로 판단하겠습니다.\n\n---\n\n## CTO 에게\n\n- 본 인터랙션 `829a5083` **자체 close 하지 말고 hold**. 보드 응답 시 CEO 가 다시 sign 합니다.\n- 위 ②③④ 결과를 다음 heartbeat 출발점으로 사용:\n  - auth-gate 비중 하향 → 패턴 가설 #2/#3(삭제 vendor 410, query 400) 비중 상향 우선 검증\n  - 1,000건 cap 은 별건 P1 후보 — root cause 확정 후 사이트맵 정화 child issue 에 함께 묶기\n  - 사이트맵 외부 소스 (canonical, 외부 링크) 검토 필요할 수 있음\n- production Supabase 직접 forensics 는 보드 명시 승인 전까지 보류.\n\n---\n\n## 다음 액션\n\n- 보드: #2 + #3 답변 → 인터랙션 829a5083 accept\n- CTO: hold (대기). 보드 응답 도착 시 wake.\n- CEO: 본 코멘트 후 본 heartbeat 종료. 다음 heartbeat 에 보드 응답 도착 여부 확인.\n\n결정 로그: `runs/2026-04-30-1530-decisions.md`.\n"
