        body: "## 법률 자문 회신 — Phase 2 batch 2 가이드 5종\n\n[PACAA-439](/PACAA/issues/PACAA-439) 워크스페이스 `content/phase2-batch2.md` 검토 완료. 가이드별 리스크 등급과 수정 권고를 정리합니다.\n\n---\n\n### 1. `eco-friendly-packaging` — 리스크 **중간**\n\n**적용 법령:** 표시광고법 §3 (부당 표시·광고), 「환경 관련 표시·광고에 관한 관리지침」(공정위), 자원재활용법상 분리배출 표시.\n\n**판단**\n- \"생분해\" 표시 주의 callout(20행)에 표시광고법 §3와 EN 13432 / KS M ISO 17088 요건이 명시되어 있어 1차 안전장치 확보. 양호.\n- TL;DR과 본문은 **사용자(발주자)에게 인증서 확인을 권고**하는 톤이며, Packlinx가 직접 \"FSC·GRS·생분해 인증 보증\" 주체로 표시하지 않음 → 표시광고법 §3 직접 위반 리스크 낮음.\n- 단, end-CTA 부제 \"FSC·GRS 인증 업체\"(52행)는 **Packlinx가 인증 사실을 확약하는 톤**으로 읽힐 여지 있음. 검색·필터 결과가 실제 인증서 검증 절차를 거치지 않은 경우 부당 표시 우려.\n\n**수정 권고**\n- end-CTA 부제 변경: \"FSC·GRS **인증서 보유 표기** 업체\" 또는 \"FSC·GRS 인증 **여부 표시** 업체, 발주 전 인증서 확인 필요\" 식으로 **검증 책임이 발주자에게 있음을 명확화**.\n- FAQ A2(36행) FSC·GRS 정의는 정확. 변경 불요.\n\n---\n\n### 2. `packaging-material-complete-guide` — 리스크 **낮음**\n\n**적용 법령:** 식품위생법 §9 / 식약처 「기구 및 용기·포장의 기준 및 규격」, 화장품법 §8.\n\n**판단**\n- \"소재 변경 시 식약처 기준 재확인\" warn(68행), \"이행성 시험 성적서\" 권고(90행) 모두 사실관계 정확.\n- 화장품법 인용(87행)은 일반론 수준이며 단정적 의무 표현 회피.\n\n**수정 권고**\n- 없음. 발행 가능.\n\n---\n\n### 3. `flexible-packaging-guide` — 리스크 **낮음**\n\n**적용 법령:** 식품위생법, 식약처 「기구 및 용기·포장의 기준 및 규격」.\n\n**판단**\n- 내층 소재 식약처 기준 + 이행성 시험 성적서 요청(119행)은 정확하고 적절.\n- 친환경 PLA·PBAT 차단성 한계 언급(141행)은 표시광고법 §3상 안전(과장 회피).\n\n**수정 권고**\n- 없음. 발행 가능.\n\n---\n\n### 4. `label-printing-guide` — 리스크 **높음 🚨**\n\n**적용 법령:** 「식품 등의 표시·광고에 관한 법률」(이하 식표법), 동법 시행규칙 별표, 식약처 「식품등의 표시기준」 고시, 화장품법 §10·§12.\n\n**판단 (수정 필수)**\n1. **법령명 오류** — \"식품표시법\"(164·170·186행)이라는 약칭의 법률은 존재하지 않음. 정식 명칭은 **「식품 등의 표시·광고에 관한 법률」(약칭: 식품표시광고법)**. 2019년 시행으로 구 식품위생법 §10에서 분리된 법령. 오기는 표시광고법 §3 직접 위반은 아니나, **법률 정보 제공자로서의 신뢰도 훼손 + 사용자가 잘못된 법령으로 검색 시 정보 누락** 위험.\n2. **숫자 정확성 — \"글자 크기(최소 8포인트 이상)\"(186행)** 표현이 부정확.\n   - 실제 식약처 「식품등의 표시기준」은 표시 면적·항목별로 차등 적용: 일반 표시사항은 한글 **10포인트 이상**(장평 90% 이상, 자간 -5% 이상)이 기본이며, 표시 면적 협소 시 8포인트까지 허용 등 단계적 기준.\n   - \"최소 8포인트\"는 **하한 일부만 인용해 잘못된 의무 기준을 유포**할 수 있음 → 표시광고법 §3 \"기만적 표시\"에는 미해당하나, **콘텐츠 출처로 인용될 경우 사용자가 법령 위반에 노출**될 수 있음. 출판물의 정확성 의무 측면에서 수정 필요.\n3. **화장품법 인용**(170행) \"전성분·사용기한·사용 방법 필수 기재\"는 화장품법 §10 표시 의무에 부합. 정확.\n\n**수정 권고 (발행 전 필수)**\n- 본문 모든 \"식품표시법\" → **\"식품표시광고법(식품 등의 표시·광고에 관한 법률)\"**으로 일괄 교체.\n- FAQ Q2 답변(186행) 글자 크기 부분 수정안:\n  > \"글자 크기는 표시 면적·항목별로 식약처 「식품등의 표시기준」이 차등 규정합니다(일반적으로 한글 10포인트 이상, 표시 면적 협소 시 별도 완화 기준 적용). 구체적 수치는 식약처 고시를 직접 확인하거나 라벨 인쇄 업체에 식품표시광고법 검수를 요청하세요.\"\n- callout #2(170행) 끝부분 \"회수·판매 중지 처분이 가능합니다\"는 일반론으로 OK이나, **\"가능합니다\"** 톤 유지(단정적 \"처분됩니다\" 사용 금지) — 현재 표현 적절.\n\n---\n\n### 5. `plastic-container-guide` — 리스크 **중간**\n\n**적용 법령:** 식품위생법 §9, 식약처 「기구 및 용기·포장의 기준 및 규격」(고시 2024-XX 등), 동 별표 BPA 용출 규격.\n\n**판단**\n- \"PC(폴리카보네이트)는 비스페놀 A 용출 우려로 **식품 직접 접촉용 사용이 제한됩니다**\"(221·234행) 표현은 **부정확**.\n  - 한국에서 PC가 전면 제한된 식품 접촉 용도는 **영유아용 젖병·젖꼭지**(2012년부터 사용 금지). 그 외 일반 식품 접촉 용기에는 PC 사용이 **여전히 허용**되며, BPA 용출 규격(현행 0.6 mg/L 이하 등) 준수 시 적법.\n  - 현재 표현은 PC 사용이 광범위하게 위법한 것처럼 오인을 유도 → **표시광고법 §3 \"사실과 다른 표시\"** 가능성. 실제 PC 용기 제조·유통 업체에 대한 영업 방해 소지도 있음(부당 비교에 해당하지는 않으나 신중).\n- \"이행성 시험 성적서\" 용어(221·234행) 정확.\n- \"내열성 70°C / 120°C\" 등 수치는 일반 산업 통념 수준이며 법령 인용이 아니므로 OK.\n\n**수정 권고 (발행 전 필수)**\n- callout #2(221행) 및 FAQ Q1 답변(234행) 수정안:\n  > \"PC(폴리카보네이트)는 **영유아용 젖병에는 사용이 금지**되어 있고, 일반 식품 접촉 용기에 사용할 경우 **비스페놀 A 용출 규격(식약처 고시 기준)**을 충족해야 합니다. 식품 포장 용도로 발주할 때 업체에 식약처 이행성 시험 성적서를 요청하세요.\"\n- 위 수정으로 사실 정확성 확보 + 사용자에게 실질적 가이드 유지.\n\n---\n\n### 한국 외 법령 트리거 검토\n\n본 콘텐츠는 한국어로 한국 시장 발주자를 대상으로 하며, 외국 데이터 주체 데이터 수집·외국 시장 직접 광고 요소가 없음 → **GDPR / CCPA 트리거 미발생**. 보드 보고 불요.\n\n---\n\n### 종합\n\n| 가이드 | 리스크 | 발행 |\n| --- | --- | --- |\n| eco-friendly-packaging | 중간 | end-CTA 부제 보강 후 발행 |\n| packaging-material-complete-guide | 낮음 | 즉시 발행 가능 |\n| flexible-packaging-guide | 낮음 | 즉시 발행 가능 |\n| **label-printing-guide** | **높음** | **법령명·글자 크기 수정 후 발행** |\n| **plastic-container-guide** | **중간** | **PC 표현 수정 후 발행** |\n\nCMO/FE는 본 자문에 따라 [PACAA-439](/PACAA/issues/PACAA-439)에서 콘텐츠 수정 후 발행 진행. 수정본 재검수 필요 시 본 이슈에 코멘트 남겨주시면 동일 자문 절차로 회신합니다.\n\n---\n⚠️ 자문 한계 명시:\n이 자문은 참고용이며 법적 책임 면제를 보장하지 않습니다.\n사고 발생 시 면책 사유로 사용될 수 없습니다. Packlinx 보드는\n외부 변호사 자문 미도입을 결정한 상태이며, 모든 법적 리스크는\nLegal Counsel 자문에 의존합니다.\n---\n"
