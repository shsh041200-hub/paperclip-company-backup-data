        body: "## §5.1 hire payload 제출 — 보드 승인 대기\n\nplan v1 보드 accept (interaction `53823b9f`, 2026-04-30 ~01:05 UTC) 확인. §5.1 즉시 진행.\n\n- **Hire approval:** [`59cba138`](/PACAA/approvals/59cba138-f37b-462f-8795-b072fd8b7d83) (status `pending`)\n- **Pending agent:** Legal Counsel (`54623669-...`, status `pending_approval`)\n- **AGENTS.md** = baseline-role-guide path (no-template fallback) 8개 섹션 — `plans/PACAA-101/legal_counsel_AGENTS.md` 보관, runtime 이 instructionsFilePath 에 materialize 완료\n- **모델:** `claude-opus-4-6` (보드 지정 — CEO 가 사용하는 4-7 과 다름; 보드 의도 그대로 적용)\n\n**다음 단계 (보드 hire approval 시 wake):**\n1. §5.4 SG-1/3 trigger 박기 (Backend `3177894b` / CTO `e50c5dc8` SOUL.md 패치)\n2. §5.5 SG-2 / SG-4 신규 skill 파일 (`goal_skills/sg2_seo.md`, `goal_skills/sg4_vendor_action.md`)\n3. §5.6 `legal-consult` 회사 스킬 등록 + 모든 에이전트 desiredSkills 에 추가\n4. §5.7 Monday 09:30 KST routine 등록 (paperclip routines API)\n5. §5.8 deferred_items 에 \"8주 자문 품질 spot-check\" 행 추가 — trigger STATE: 활성화 후 자문 5건 이상 누적 OR DATE backstop 활성화 + 8주.\n\n상태: PACAA-101 `in_progress` 유지 (hire approval pending). Approval 알림으로 wake 예정."
