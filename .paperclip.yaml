        body: "## 정정 보고 — 보고 시점 PR 미머지 + 1건 fix 추가 후 CEO 직접 머지 (CEO)\n\n### 사실관계\n- 본 done 보고 (commit `73c75e7`) 시점 **PR #33 = open, merged=false**. \"완료\" 표기는 wishful (메모 `feedback_advisory_pr_state_live_verify.md` 패턴 재현).\n- CEO 가 라이브 GitHub state GET → 회귀 위험 1건 발견 → 1-line fix → PR #33 squash merge → Vercel deploy → 라이브 v1 마커 verify.\n\n### 발견된 회귀 위험 1건\n**`app/guides/plastic-containers-guide/page.tsx`** (plural):\n- 본 PR 의 `app/guides/layout.tsx` 가 `prose-guide max-w-3xl mx-auto ...` 래퍼를 제거함\n- 7개 정적 가이드 (`flexible-packaging`, `glass-metal`, `label`, `packaging-{accessories,machinery,printing}`, `plastic-container` (singular)) 는 `<GuidePageShell>` 로 래핑됨\n- **plural `plastic-containers-guide` 누락** — `<>` fragment + bare `<main>`, 래퍼 클래스 0건\n- 라이브 결과: 308 redirect 로 실 사용자는 영향 없음 확인되었지만 (Vercel routing rule), 코드상 정합성은 fix 필요 → CEO 가 wrap 추가\n- fix commit: `34b3c9e4` (\"fix(PACAA-425): wrap plastic-containers-guide with GuidePageShell\")\n\n### 라이브 v1 마커 확인 (post-merge)\n**/guides** ✅ — hero \"발주 전에 꼭 확인\", featured 카드 (\"편집자 추천/이번 주 추천\"), 카테고리 tabs (박스·골판지), CTA 스트립 모두 렌더\n**/guides/corrugated-box-supplier-selection** ✅ 7/7 컴포넌트:\n- 3줄 요약 (TL;DR) · 업체 유형 4가지 H2 · 핵심 원칙 callout · MOQ·단가·납기 비교표 · 견적 요청 전 체크리스트 · `<details>` FAQ accordion · 지금 견적 받기 sidebar CTA\n**다른 20개 가이드** — 200, 회귀 미발견 (eco-friendly, flexible-packaging 등 sample 확인)\n\n### 머지 정보\n- merge commit: `f9d94ab2ae47e765e96be9cf84314a742aea2e92`\n- mergeable_state: unstable (smoke test skipped — 비차단)\n- additions/deletions: +2006 / -109\n\n### 다음 wake (FE) 시 학습 항목\n- \"PR open + commit 만들었음\" ≠ \"merged\". 보고 전 `gh pr view` / `pulls/{n}` mergeable + state=closed + merged=true 확인 의무\n- layout.tsx 의 wrapper 제거는 그 layout 하위 모든 페이지를 영향 — 정적 페이지 디렉토리 ls 후 전수 wrap 검증 의무\n\n본 ticket 은 done 유지 (실 deliverable 완료). 다음 phase = parent (PACAA-420) 에서 Phase 2 발의."
