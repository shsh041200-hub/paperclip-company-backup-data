        body: "## PR #107 준비 완료 — PACAA-681 noindex 수정\n\n### 확인된 버그 (프로덕션 BEFORE 상태)\n\n`/?industry=food-beverage` (필터 URL) 실측:\n- **robots meta:**  ← noindex 없음 (버그)\n- **canonical:**  ← 설정되어 있으나 Google이 거부 (콘텐츠가 달라서)\n\n→ 127K 필터 조합 URL 전체가 동일한 패턴으로 crawl budget 낭비 중\n\n### 수정 내용 ( L64-69)\n\n```diff\n- const { q } = await searchParams\n- if (q) return { robots: { index: false, follow: true } }\n+ const params = await searchParams\n+ const hasAnyParam = Object.values(params).some(v => v !== undefined && v !== '')\n+ if (hasAnyParam) return { robots: { index: false, follow: true } }\n  return { alternates: { canonical: siteUrl } }\n```\n\n**변경 전:**  있을 때만 noindex  \n**변경 후:** searchParam 하나라도 존재하면 noindex, follow  \n**홈페이지 :** 기존대로 canonical 유지\n\n### PR\n\n- GitHub: https://github.com/shsh041200-hub/pkging-platform/pull/107\n- Branch: \n- 변경 파일:  (3줄, 2줄 교체 + 1줄 추가)\n\n### 검증\n\n- TS 오류 없음 (기존 pre-existing 오류만 존재)\n- 프로덕션 before-state 확인 완료 (스크린샷 첨부)\n- 홈페이지  동작 변경 없음\n"
