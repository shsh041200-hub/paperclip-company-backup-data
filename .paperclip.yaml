        body: "## Vendor 비교 테이블 — Spec (PACAA-265)\n\n> Frontend Engineer 작성. 코드베이스 감사 (`/src/types/index.ts`, `src/app/companies/[slug]/page.tsx`, `src/app/categories/[slug]/page.tsx`) 기반. DB schema 변경 필요 여부 별도 섹션에 명시.\n\n---\n\n### 1. 유저 시나리오\n\n**주 사용자:** 카테고리 목록 페이지에서 여러 벤더를 탐색 중인 구매 담당자 (모바일, 375px 기준).\n\n#### 플로우 A — 카테고리 탐색 중 비교 시작\n\n```\n[카테고리 목록] ─▶ 벤더 카드에 \"비교 추가\" 버튼 클릭\n                ─▶ 하단 비교 카트(드로어) 등장 (최대 3개)\n                ─▶ 2개 이상 선택 시 \"비교하기\" CTA 활성화\n                ─▶ 비교 페이지 /compare?ids=slug-a,slug-b[,slug-c] 로 이동\n                ─▶ 테이블 형식으로 필드 나란히 비교\n                ─▶ \"문의하기\" 또는 \"프로필 보기\" → 각 벤더 상세로 이탈\n```\n\n#### 플로우 B — 벤더 프로필에서 비교 추가\n\n```\n[벤더 상세 페이지] ─▶ \"비교에 추가\" 버튼 클릭\n                  ─▶ 비교 카트 열림 + 현재 벤더 추가 확인\n                  ─▶ \"목록으로 돌아가기\" or \"비교하기\"\n```\n\n#### 플로우 C — URL 공유 (딥링크)\n\n```\n/compare?ids=slug-a,slug-b 직접 접근\n─▶ SSR로 2개 벤더 데이터 fetch\n─▶ 비교 테이블 즉시 렌더\n```\n\n---\n\n### 2. 데이터 모델 후보 — 비교 가능 필드\n\n현재 `Company` 인터페이스 기반. DB schema 변경 없이 기존 필드만 사용.\n\n| 섹션 | 필드 | 타입 | 비교 방식 |\n|------|------|------|----------|\n| **기본** | `name` | string | 텍스트 |\n| | `industry_categories` | string[] | 배지 목록 |\n| | `city`, `province` | string | 텍스트 |\n| | `is_verified` | boolean | ✓ / — |\n| | `founded_year` | number | 텍스트 |\n| **소재/형태** | `material_type` | enum | 배지 |\n| | `packaging_form` | string | 배지 |\n| **인증** | `certifications` | string[] | 배지 목록 |\n| **서비스** | `service_capabilities` | string[] | 배지 목록 |\n| | `is_print_design_service` | boolean | ✓ / — |\n| **거래 조건** | `moq_value` + `moq_unit` | number+string | 숫자 |\n| | `lead_time_standard_days` | number | 숫자 (일) |\n| | `lead_time_express_days` | number | 숫자 (일) |\n| | `price_tier` | enum | 배지 (예산/중간/프리미엄) |\n| | `sample_available` | boolean | ✓ / — |\n| **특수 역량** | `is_cold_chain` | boolean | ✓ / — |\n| | `is_eco` | boolean | ✓ / — |\n| | `reuse_model` | enum | 텍스트 |\n| **평가** | `avg_rating` | number | 별점 or 숫자 |\n| | `review_count` | number | 숫자 |\n\n> **DB schema 변경 필요 없음.** 모든 필드가 현재 `Company` 타입에 존재. `get_companies_by_slugs` RPC 또는 `IN (slug-a, slug-b)` 쿼리로 조회 가능.\n\n---\n\n### 3. UI 와이어프레임 (ASCII)\n\n#### 3-A. 비교 카트 — 하단 고정 드로어 (모바일 375px)\n\n```\n┌─────────────────────────────────────────────────┐\n│  비교 중 (2/3)                          [닫기 ✕] │\n│ ┌─────────┐ ┌─────────┐ ┌─ ─ ─ ─ ─ ┐           │\n│ │[로고]   │ │[로고]   │ │  + 추가   │           │\n│ │ABC포장  │ │XYZ패키지│ └─ ─ ─ ─ ─ ┘           │\n│ │  [✕]   │ │  [✕]   │                          │\n│ └─────────┘ └─────────┘                          │\n│          ┌─────────────────┐                     │\n│          │   비교하기 →    │                     │\n│          └─────────────────┘                     │\n└─────────────────────────────────────────────────┘\n```\n\n#### 3-B. 벤더 카드 — \"비교 추가\" 버튼 (카테고리 목록)\n\n```\n┌─────────────────────────────────┐\n│ [로고]  ABC포장㈜         [인증] │\n│ 종이/골판지 포장 전문...         │\n│                                  │\n│ [ISO9001] [HACCP] [FSC]          │\n│ 서울 강남구 · 2015년 설립        │\n│ ─────────────────────────────── │\n│ [abc.co.kr ↗]   [+ 비교에 추가] │←── NEW\n└─────────────────────────────────┘\n```\n\n#### 3-C. 비교 페이지 — 데스크톱 (2개 벤더)\n\n```\n/compare?ids=abc-packaging,xyz-packaging\n\n┌──────────────────┬──────────────────┬──────────────────┐\n│  항목            │  ABC포장㈜       │  XYZ패키지㈜     │\n├──────────────────┼──────────────────┼──────────────────┤\n│  기본 정보       │                  │                  │\n│  위치            │  서울 강남구     │  경기 성남시     │\n│  설립연도        │  2015            │  2008            │\n│  인증 여부       │  ✓ 인증완료      │  ✓ 인증완료      │\n├──────────────────┼──────────────────┼──────────────────┤\n│  소재/형태       │                  │                  │\n│  소재 유형       │  종이·골판지     │  필름·파우치     │\n│  포장 형태       │  박스/케이스     │  파우치/백       │\n├──────────────────┼──────────────────┼──────────────────┤\n│  인증            │                  │                  │\n│                  │[ISO9001][HACCP]  │[FSC][GMP]        │\n├──────────────────┼──────────────────┼──────────────────┤\n│  거래 조건       │                  │                  │\n│  최소발주(MOQ)   │  500개           │  1,000개         │\n│  표준 납기       │  7일             │  10일            │\n│  급행 납기       │  3일             │  5일             │\n│  가격대          │  중간가          │  프리미엄        │\n│  샘플 제공       │  ✓               │  —               │\n├──────────────────┼──────────────────┼──────────────────┤\n│  특수 역량       │                  │                  │\n│  냉장 포장       │  —               │  ✓               │\n│  친환경          │  ✓               │  —               │\n├──────────────────┼──────────────────┼──────────────────┤\n│  평가            │  ★ 4.5 (23건)   │  ★ 4.2 (11건)   │\n├──────────────────┼──────────────────┼──────────────────┤\n│                  │[프로필 보기] [문의]│[프로필 보기][문의]│\n└──────────────────┴──────────────────┴──────────────────┘\n```\n\n#### 3-D. 비교 페이지 — 모바일 (375px, 스크롤 방향 전환)\n\n```\n┌───────────────────────────────┐\n│ ← 비교 결과                   │\n│ 벤더 2개 선택됨               │\n├───────────┬───────────────────┤\n│ 항목      │ ABC포장 │ XYZ패키지│  ← sticky header\n│ ─────────────────────────────│\n│ 위치      │ 강남구  │ 성남시   │\n│ 설립      │ 2015   │ 2008    │\n│ MOQ       │ 500개  │ 1,000개 │\n│ 납기      │ 7일    │ 10일    │\n│ 샘플      │  ✓     │  —      │\n│ 냉장      │  —     │  ✓      │\n│ 인증      │[ISO]   │ [FSC]   │\n│ ─────────────────────────────│\n│[프로필보기] [프로필보기]       │\n└───────────────────────────────┘\n```\n\n---\n\n### 4. MVP 스콥 (첫 릴리스)\n\n#### In scope — MVP\n\n| # | 항목 | 비고 |\n|---|------|------|\n| 1 | 벤더 카드에 \"비교에 추가\" 버튼 | 카테고리 목록 페이지 |\n| 2 | 비교 카트 (하단 고정, 최대 3개) | localStorage 기반 상태 |\n| 3 | `/compare?ids=` 비교 페이지 (SSR) | SEO 인덱싱 불필요이므로 SSR 충분 |\n| 4 | 텍스트/배지 기반 비교 테이블 (차트 없음) | 위 필드 목록 기준 |\n| 5 | 모바일 (375px) + 데스크톱 (1280px) 레이아웃 | |\n| 6 | \"프로필 보기\" 링크 → 각 벤더 상세 | |\n| 7 | URL 공유 (딥링크 직접 접근) | |\n\n#### Out of scope — MVP 이후\n\n- 차트 비교 (Recharts 는 이미 설치됨 — v2에서 가능)\n- 즐겨찾기/저장 비교 목록\n- PDF/Excel 내보내기\n- 4개 이상 벤더 비교\n- 비교 항목 커스터마이즈 (필드 on/off)\n\n---\n\n### 5. DB Schema 변경 필요 여부\n\n**변경 불필요.** 현재 `companies` 테이블의 기존 필드 조합으로 MVP 전체 구현 가능.\n\n- 신규 쿼리: `SELECT ... FROM companies WHERE slug = ANY($1)` — 인덱스 존재 (slug UNIQUE).\n- 신규 RPC 불필요 (단순 IN 쿼리로 충분).\n- 비교 \"세션\" 상태는 URL params + localStorage 로 처리 → DB 불필요.\n\n> **별도 보드 승인 게이트: 없음.** DB 변경이 없으므로 이 spec 은 보드 승인 없이 implementation 진행 가능.\n\n---\n\n### 6. 구현 시 주요 고려사항\n\n1. **SEO:** `/compare` 페이지는 유니크 URL 이지만 검색 인덱싱 대상 아님 → `<meta name=\"robots\" content=\"noindex\">` 추가 예정.\n2. **SSR:** 비교 페이지는 slug params 로 서버에서 데이터 fetch → CSR fallback 불필요.\n3. **한국어 폰트:** 비교 테이블 내 한국어 텍스트 렌더링 — 기존 font stack 그대로 사용.\n4. **모바일 가로 스크롤:** 3개 벤더 비교 시 모바일에서 sticky 첫 컬럼 + horizontal scroll 처리 필요.\n5. **접근성:** 비교 테이블은 `<table>` 시멘틱 HTML + `scope=\"col\"` headers.\n6. **Core Web Vitals:** 비교 페이지 이미지 없음 → LCP 는 텍스트 기반, CLS 위험 낮음.\n\n---\n\n### 7. 다음 단계\n\n- [ ] CEO + 보드 이 spec review → accept\n- [ ] Accept 시 implementation child issue 발의 (담당: Frontend Engineer)\n- [ ] Backend Engineer 확인 필요 사항: `companies` 테이블에서 slug array 조회 쿼리 권한 확인 (RLS 정책)\n\n---\n\n*작성: Frontend Engineer ([@82e7ef44](/PACAA/agents/82e7ef44-fa1d-41e2-be68-11d97f8a167e)) · 2026-05-07*\n"
