        body: "## Heartbeat — 2026-04-29 11:00 KST\n\nPACAA-86 ack. v1 plan ([PACAA-82 §4](/PACAA/issues/PACAA-82#document-plan)) 50 키워드 셋이 보드 사인오프된 상태. 11주 일정이라 단일 이슈 폴링은 비효율 — 6개 child issue 로 분해 후 1단계 즉시 실행했음.\n\n### Child issues (6)\n\n| # | 이슈 | 상태 | 의존 |\n|---|---|---|---|\n| §6.1 볼륨 검증 | [PACAA-91](/PACAA/issues/PACAA-91) | **blocked** (CEO API access) | — |\n| §6.2 vendor density | [PACAA-92](/PACAA/issues/PACAA-92) | **in_progress** (1차 실행 완료) | — |\n| §6.3 SERP 경쟁 (수동) | [PACAA-93](/PACAA/issues/PACAA-93) | blocked | §6.1 |\n| §6.4 50 페이지 빌드 | [PACAA-94](/PACAA/issues/PACAA-94) | blocked | §6.1, §6.3 |\n| §6.5 sitemap + 인덱싱 | [PACAA-95](/PACAA/issues/PACAA-95) | blocked | §6.4 |\n| §6.6 주간 SERP 트래킹 | [PACAA-96](/PACAA/issues/PACAA-96) | blocked | §6.5 |\n\n### 이번 heartbeat 실행: §6.2 vendor density (완료)\n\n소스: [PACAA-77](/PACAA/issues/PACAA-77) post-dedup vendor_candidates (2,780 vendors across 8 categories).\n스크립트: `plans/keyword_density_pacaa86.py` (read-only, 멱등).\n\n**결과**:\n\n* 50 키워드 중 **49개 ≥ 3 vendor 매칭** (정상 vendor 리스트 노출 가능)\n* **1개 fallback** (vendor < 3): `라벨링 머신 가격` (packaging_machinery, 0 매칭) — §7 예비 풀에서 교체 후보\n* 평균 vendor/키워드 = **65.2**, 중앙값 ≈ 50\n\n카테고리별 fallback 비율 0% ~ 20%. 빌드 진행 시 fallback 템플릿 (가이드 + claim CTA, vendor 리스트 빈약 노출 회피) 은 1개 페이지에만 적용 — Google SpamBrain doorway-page 리스크 매우 낮음.\n\n### CEO 액션 요청 (§6.1 blocker, [PACAA-91](/PACAA/issues/PACAA-91))\n\n§6.1 볼륨 검증은 Naver Search Ads / Google Keyword Planner 데이터 필요. Backend 환경에는 두 도구 자격증명이 없음 (Naver Search Ads = 사업자 인증 + 계정, Google Ads = OAuth client 발급).\n\n**옵션**:\n\n* **A. 수동 (권장, 1~2시간)** — CEO 가 두 도구 UI 에서 60 키워드 (50 본진 + 10 예비) 일괄 조회 결과를 csv 로 [PACAA-91](/PACAA/issues/PACAA-91) 에 첨부. Backend 가 §7 교체 로직 자동 적용.\n* B. API access 발급 — Naver Search Ads API 사업자 인증 + Google Ads developer token (며칠 소요).\n\nA 권장: Naver/Google 도구는 둘 다 UI 일괄 조회 (\\>=60 키워드 한 번에) 지원, 1회성 측정에는 자동화 파이프라인 ROI 낮음.\n\n### 다음 heartbeat 우선순위\n\n1. CEO 가 [PACAA-91](/PACAA/issues/PACAA-91) 에 csv 올리면 → §7 예비 풀 교체 로직 적용 + plan §12 갱신.\n2. 그동안 §6.4 빌드 사전 준비 (Next.js SSG 라우트 골격, vendor 리스트 컴포넌트, 카테고리 가이드 LLM 프롬프트 템플릿) — §6.1 결과 무관하게 진행 가능. 다음 heartbeat 에서 실행.\n\n본 이슈는 in_progress 유지 (parent 추적용). 실제 실행은 child 들이 이어받음.\n"
