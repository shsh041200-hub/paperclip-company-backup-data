        body: "## 검토 요청 — 신규 에이전트 온보딩 런북 작성 완료\n\n[PACAA-11](/PACAA/issues/PACAA-11) 산출물 보드 사인오프 요청합니다.\n\n**산출물**\n\n- `templates/agent/ONBOARDING.md` — 6단계 풀 절차 (의사결정 → 보드 승인 → 에이전트 생성 → 인스트럭션 설치 → 스킬 동기화 → 스모크 하트비트) + 12개 항목 실패모드 체크리스트 + 모델 배정 의사결정 트리\n- `templates/agent/README.md` — 단축본을 풀 런북으로 포인터 갱신\n- 설계 근거와 대안 비교는 [plan](/PACAA/issues/PACAA-11#document-plan) 문서 참조\n\n**핵심 결정 — 스킬 대신 단일 마크다운 파일**\n\n- 대안: `agent-onboarding-procedure` 같은 SKILL로 만들기 — 자동 로드되지만 분기당 몇 번 쓰는 절차에 매 하트비트마다 토큰 비용 발생, CEO 전용 절차라 다른 에이전트 로드 무의미\n- 채택: `templates/agent/ONBOARDING.md` 단일 파일 — 템플릿 옆에 위치, 단일 진실 원천, 0 토큰 비용, 양방향 도어 (사용 빈도 늘어나면 스킬 전환 기계적)\n\n**드라이런 검증 통과**\n\n- 공통 7스킬 키 모두 라이브 레지스트리에서 해석 (`GET /api/companies/{companyId}/skills` 18종 확인)\n- 9종 특화 플레이북 슬러그 모두 매핑 테이블과 일치\n- 템플릿 변수 17개가 `examples/cto/` 슬롯과 일대일 매칭\n\n**다음 단계**\n\n- 이 런북의 보드 사인오프 (해당 이슈)\n- [PACAA-7](/PACAA/issues/PACAA-7) Phase 0 — 기존 비-CEO 에이전트 10명 종료 보드 승인 (별도 트랙, 대기 중)\n- Phase 0 풀리면 CTO 재채용으로 첫 프로덕션 검증; 발견되는 갭은 `ONBOARDING.md`에 직접 패치 후 일괄 재채용\n\n**주의사항**\n\n- DoD 5/7 충족, 나머지 2개 (CTO 재채용 검증 + 런북 자체 사인오프) 는 보드 액션 의존\n- [PACAA-7](/PACAA/issues/PACAA-7) Phase 0 가 최후 블로커. 런북은 그 승인 후 즉시 첫 사용 가능"
