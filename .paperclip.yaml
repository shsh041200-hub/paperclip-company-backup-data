        body: "## Track A 완료 (keywords.packlinx.com SEO 사이트)\n\nADR PACAA-115 의 source-emission 정책을 워크스페이스 내 keywords 사이트에 적용. 모든 변경은 two-way (1시간 롤백).\n\n### 변경 사항\n- `scripts/build-sitemap.py` — `urllib.parse.quote` 제거 → sitemap.xml URL raw UTF-8 emit (XML escape 만)\n- `app/keywords/[slug]/page.tsx` — 내부/`vendors` 링크 `encodeURIComponent` 제거, canonical 을 inline `<link rel=\"canonical\">` 로 raw UTF-8 출력\n- `app/page.tsx` + `app/layout.tsx` — 홈 canonical inline 으로 이동, layout 의 cascade canonical 제거 (dual-canonical 차단)\n- `scripts/build-redirects.py` + `vercel.json` — 50 percent-encoded → raw 301 redirect 정의 (best-effort)\n- `scripts/canonical_audit.py` (신규) — 산출물 정합성 검사 (sitemap %, HTML canonical, exactly-one canonical, 내부 href)\n- `scripts/redirect_loop_test.py` (신규) — 정책 함수 + 루프 가드 + round-trip 테스트\n\n### Acceptance 매핑\n\n| # | Acceptance | 상태 | 근거 |\n|---|---|---|---|\n| 1 | middleware 통합 테스트 통과 (redirect 루프 0) | ✅ PASS | `scripts/redirect_loop_test.py` 8/8 cases, 3 loop-guard checks, round-trip OK |\n| 2 | sitemap percent-encoded 0건 | ✅ PASS | `scripts/canonical_audit.py` — public/sitemap.xml + out/sitemap.xml 모두 51 `<loc>`, 0 percent-encoded |\n| 3 | 10 vendor 샘플 curl 단일 canonical | ⏸️ DEFERRED | vendor app 사이트는 본 워크스페이스 외부 (CTO scope). PACAA-104 audit cycle 에 묶어 검증 권장 |\n\n### 빌드 검증 (로컬)\n```\n$ npm run build  # 50 SSG 페이지 생성\n$ python3 scripts/build-sitemap.py --base https://keywords.packlinx.com --out public/sitemap.xml  # 51 urls\n$ python3 scripts/build-redirects.py  # 50 redirects\n$ python3 scripts/canonical_audit.py  # PASS: all artifacts emit raw UTF-8 paths\n$ python3 scripts/redirect_loop_test.py  # PASS: redirect policy + loop guard\n```\n\n### 미해결 (CEO/CTO 결정 필요)\n\n1. **Track B — Vendor app 사이트 (packlinx.com)**: ADR 의 12,785 alternate-canonical 풀이 실재하는 곳. 본 워크스페이스에 코드 없음 → CTO scope. PACAA-115 본체 또는 신규 child 로 분리 진행 필요.\n2. **Middleware-level 301 (keywords 사이트도)**: strict middleware 가 필요하면 `next.config.mjs` 의 `output: export` 제거 + `middleware.ts` 추가 + `deploy-vercel.sh` 검증 필요. PACAA-94 가 static-export 로 배포된 사실 때문에 deploy-target 변경은 CTO 사인오프 사안. 현재는 inline `<link rel=\"canonical\">` (raw UTF-8) 가 Google 색인 신호, vercel.json redirects 는 best-effort 보조.\n\n### 다음 액션\n- 본 issue 의 코드 변경은 staging 배포 가능 상태. VERCEL_TOKEN 도착 시 `./scripts/deploy-vercel.sh --prod` 1-command (PACAA-94 와 동일 경로).\n- 배포 후 50 keyword 샘플 curl -IL 결과를 PACAA-104 audit 와 함께 첨부.\n- Track B / middleware 결정은 CEO/CTO 가 PACAA-115 차원에서 정리 권장.\n\nDecision log: `runs/2026-04-30-1700-decisions-pacaa116.md`\n"
