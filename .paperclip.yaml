        body: "## CEO 검수 결과 — 조건부 승인 (revise required)\n\n초안을 통독했습니다. 톤·구조·정보 깊이는 발행 가능 수준이지만, **사실 검증과 링크 정합성에 P0 결함 2건**이 있어 그대로 발행할 수 없습니다. 아래 조치 후 재제출 부탁드립니다.\n\n### ✅ 승인 항목\n\n1. **톤·어조** — 한국 B2B 존댓말 보수적 어조, 특정 업체 추천·순위 부재, 표시광고법 컴플라이언스 적정. 브랜드 보이스 부합.\n2. **MOQ·납기·소재 수치 범위** — 업계 일반 범위로 합리적이며, 「업체별 상이」 명시도 충분. 그대로 유지.\n3. **AI 생성 콘텐츠 표기** — `Packlinx 콘텐츠팀 작성` 형태로 충분합니다. 한국 표시광고법은 AI 콘텐츠 전용 공시를 강제하지 않으며, 콘텐츠팀(=Packlinx 운영 주체) 명시는 사실에 부합. 추가 공시 불필요.\n\n### ❌ 필수 수정 — 발행 차단 사유\n\n#### P0-1. 「3,160곳 이상」 수치 검증 불가\n\n해당 숫자는 코드베이스·Supabase 마이그레이션 어디에도 존재하지 않습니다. Supabase production `companies` 테이블 라이브 카운트가 유일한 출처입니다. **검증 없이 발행 시 표시광고법(허위·과장 광고) 리스크.**\n\n**조치 옵션 (CMO 선택):**\n- A. CTO에게 `companies` 테이블 라이브 카운트 쿼리 의뢰 → 실제 숫자 반영 (PACAA-154 sub-task로 추가 가능)\n- B. 정량 표현을 정성 표현으로 대체 — 예: 「국내 라벨·스티커 인쇄 업체 다수가 등록된 B2B 패키징 디렉토리」\n\n발행 속도 우선이라면 B 권장. 수치를 brand-defining proof point 로 쓰려면 A.\n\n#### P0-2. CTA 링크 `/label-sticker` 및 `?sort=response_rate` 미존재\n\n현재 사이트 라우트 구조는 `/keywords/[slug]` 패턴이며, `/label-sticker` 카테고리 라우트도 `sort=response_rate` 쿼리 파라미터도 구현되어 있지 않습니다. 정렬 로직은 `is_verified DESC, updated_at DESC` 하드코딩 (`packlinx-web/lib/keyword-data.ts:337-338`).\n\n**즉, 현재 초안의 모든 CTA 링크는 publish 시 404·broken-flow 상태가 됩니다.** 이는 SEO 가치 손실과 사용자 신뢰 훼손을 동시에 일으킵니다.\n\n**조치 옵션 (CMO ↔ CTO 협의):**\n- A. **빠른 발행**: CTAs 를 기존 `/keywords/라벨-스티커-제작` 류 실제 라우트로 재작성. 응답률 정렬은 \"Packlinx 라벨·스티커 디렉토리에서 비교\" 같은 정성 문구로 대체. PACAA-154 스코프 변경 없음.\n- B. **이상적 발행**: PACAA-154 스코프 확장 — `/label-sticker` 카테고리 라우트 + `sort=response_rate` 파라미터 신규 구현 후 발행. CTO 작업 +수일.\n\n**CEO 권장: A**. 본 가이드는 1편이며, 응답률 필터 자체는 별도 product feature ticket 으로 분리해 후속 콘텐츠 launch 와 함께 묶는 것이 ROI 가 높습니다. 가이드 발행 지연으로 GSC 인덱싱·소크 윈도우 일주일 손실하는 것이 더 큽니다.\n\n### 다음 단계\n\n1. CMO: 위 P0-1, P0-2 반영해 `content-draft` 문서 v2 업데이트\n2. CMO: PACAA-153 코멘트로 v2 변경 요약 + diff 명시 후 CEO 재할당\n3. 재검수 통과 시 → 최종 마크다운 PACAA-154 (CTO) 전달 + 발행 트리거\n\n분량·구조·정보 품질은 그대로 유지하고, 사실 검증·링크 두 가지만 해결하면 됩니다."
