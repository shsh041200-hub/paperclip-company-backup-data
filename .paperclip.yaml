        body: "## 김선혁님, 답장 라우팅 버그 잡았습니다 — 5분 cron 이 매핑을 지우고 있었어요\n\n### 한 줄 결론\n\n**실패 원인은 `notify-telegram.py` 의 5분 cron이 `seen_ids` 만 저장하고 `message_index` 를 매번 덮어써서 지우고 있던 버그. 수정 + 첨부 메시지도 매핑 추가 + 견본 재발사 (msg_id=222~223 둘 다 매핑됨). 이번엔 답장 동작합니다.**\n\n### 무엇이 잘못됐나\n\n직전 패치 후:\n- `--sample=freeform-v2 --really-send` 발사 시점: msg_id=218 매핑 OK.\n- 하지만 5분 후 `*/5 * * * * notify-telegram.py` cron 이 자동 실행 → `save_state({\"seen_ids\": [...]})` 가 `message_index` 필드를 덮어 지움.\n- 김선혁님이 답장한 시점에는 매핑 사라진 상태 → 봇 \"❌ 답장 라우팅 실패\".\n\n추가로: 견본 발사는 본문 메시지 (msg_id=218) + 첨부 .txt 메시지 (msg_id=219) **두 개**를 보냅니다. 본문에만 매핑 등록되어 있어서, 첨부에 답장하면 라우팅 실패.\n\n### 코드 패치\n\n- **`notify-telegram.py`**:\n  - 메인 cron 의 `save_state({...})` 를 `state[\"seen_ids\"] = ...; save_state(state)` 로 변경. `message_index` 보존.\n  - 견본 발사 경로: 본문 + 첨부 둘 다 `record_message_mapping` 호출.\n  - 실서비스 발사 경로: 본문 + 참고문서 + plan 첨부 모두 매핑.\n- 봇 코드 변경 없음 (이전 heartbeat 패치 그대로).\n\n### 견본 재발사 + 검증\n\n- 발사: msg_id=222 (본문) + msg_id=223 (첨부 .txt). 둘 다 매핑됨.\n- 직후 cron 1회 실행 후 매핑 카운트: 2 (유지). 버그 재발 안 함.\n\n### 테스트 방법 (재차)\n\n방금 보낸 견본 (msg_id=222 또는 223 어느 쪽이든) 에 텔레그램 답장 (Reply) → 봇이 \"✅ 코멘트 추가됨: PACAA-125\" 답하고 PACAA-125 에 \"[보드 답장 — Telegram Reply] (sample=freeform-v2 또는 freeform-v2-attachment)\" 코멘트 생성.\n\n실패 시 알려 주시면 봇 로그로 디버그합니다 (현재 봇 PID 241568 가 새 코드로 동작 중, message_index 매핑 살아 있음).\n\n### 결재 라인\n\nrev4 결재 `331d1b0d` 살아 있습니다. 답장 동작 확인 후 응답 부탁드려요.\n\nA) 승인 — cron `_build_for_interaction` v2 빌더 전환 + v1 deprecated + SOUL baking + 메모리 영구화 + close.\nB) 추가 수정 — 답장 또는 코멘트로.\nC) 폐기 — v1 유지."
