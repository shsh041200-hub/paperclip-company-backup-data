        body: "## PACAA-367 보류항목 재검토 — 계획서 v1\n\n현재 작업: 31건 보류항목 전수 검토 → 7개 액션 plan 작성 완료\n보드님 필요 행동: plan 승인 (request_confirmation 인터랙션 발사 예정)\n\n---\n\n# PACAA-367 — 보류항목 재검토 계획서 v1\n\n작성: 2026-05-08 (CEO)\n오늘 기준 회사 보류항목 = backlog 30 + blocked 1 + in_review 0 = **31건**\n\n## 1. 분류 요약\n\n| 카테고리 | 건수 | 액션 |\n|---|---|---|\n| A. 정상 (미래 트리거, 그대로 유지) | 13 | 액션 없음 |\n| B. 즉시 평가 (트리거 도래, in_progress 전환) | 1 | PACAA-223 (내일 평가일) |\n| C. 상태 오기재 (정정 필요) | 1 | PACAA-167 (blocked → in_progress) |\n| D. 폐기 후보 | 1 | PACAA-192 (E5 Wake Event Log — 빈 본문) |\n| E. 보드 액션 펜딩 (현재 surfacing) | 3 | PACAA-53/54/284 |\n| F. agent owner 작업 미시작 — 트리거 강제 발사 | 5 | PACAA-240/241/298/304/355 |\n| G. PACAA-322 children (정상, 의존 체인) | 5 | 액션 없음 (체인 자동) |\n| H. SEO soak — 정상 (트리거 미도래) | 2 | 액션 없음 |\n\n(중복 카운트 없음. 합계 31.)\n\n## 2. 카테고리별 상세\n\n### A. 정상 — 미래 트리거 유지 (13건)\n\n오늘 기준 트리거 미도래. 회사 현황과 일치. **액션 없음.**\n\n| ID | 트리거 | 비고 |\n|---|---|---|\n| PACAA-119 | 발행 후 4-6주 (~2026-05-28~06-11) | GSC 측정 child 130/131/132 의 모항목 |\n| PACAA-130 | 2026-05-15 (1주 후) | GSC 2주차 |\n| PACAA-131 | 2026-05-29 | GSC 4주차 |\n| PACAA-132 | 2026-06-12 | GSC 6주차 final |\n| PACAA-155 | event: GSC 인덱싱 + 쿼리 노출 | label-printing-guide |\n| PACAA-202 | event: 첫 impression + 14일 / 백스탑 2026-07-31 | plastic-container |\n| PACAA-275 | 2026-05-21 (2주 후) | 미색인 가이드 3건 |\n| PACAA-325 | 2026-05-22 / impressions ≥10 | flexible-packaging |\n| PACAA-327 | 2026-05-17 / impressions ≥10 | packaging-machinery |\n| PACAA-328 | 2026-05-21 / impressions ≥10 | packaging-accessories |\n| PACAA-347 | 2026-05-29 (3주 후) | shipping-box-pricing CTR |\n| PACAA-361 | 2026-06-19 (6주 후) | corrugated-flute |\n| PACAA-366 | 2026-05-15 (1주 후) | /compare/* 색인 |\n\n### B. 즉시 평가 — 1건\n\n**PACAA-223 (Phase 2 카나리: E5 webhook soak)** — high priority.\n- 카나리 윈도우 종료: **2026-05-09 11:55 KST (내일)**\n- 평가 routine `phase2_canary_eval_due` 가 spawn → CEO wake 예정\n- **액션:** 내일 평가 wake 시 incident criteria 6종 grep → 사고 0 → in_progress 후 done. 사고 1+ → halt + 보드 escalation.\n- **상태 변경 없음** (트리거 도래 시 routine 이 wake 시킴).\n\n### C. 상태 오기재 — 1건\n\n**PACAA-167 (이벤트 기반 wake 시스템 — 실행, blocked)** — high priority.\n- Phase 1A (PACAA-168 done) + Phase 1B (PACAA-169 done) 완료\n- Phase 2 (PACAA-223) 카나리 진행 중 (2026-05-09 평가 예정)\n- 현재 `blocked` 상태 부정확. **액션:** PATCH status `blocked → in_progress`, `blockedByIssueIds = [PACAA-223 의 UUID]` 명시. 보드 대시보드 stall 신호 정정.\n- Reversibility: two-way (단순 status 정정).\n\n### D. 폐기 후보 — 1건\n\n**PACAA-192 ([E5] Wake Event Log — GitHub PR merge events)** — low priority.\n- 본문 비어 있음 (1주+ 미작성).\n- PACAA-223 description 에 \"E5 worker fire → PACAA-192 하위 child issue 자동 생성. CEO 가 PACAA-192 children 카운트 monitor\" 라고 의도 박혀 있음 → 이건 **사용 의도 확인됨, 폐기 X**.\n- 정정 액션: **본문에 모니터링 컨트랙트 1단락 박기** (worker 가 child 생성 시 어떤 데이터, CEO 가 어떻게 grep). 폐기 X, 본문 보강 O.\n\n### E. 보드 액션 펜딩 — 현재 surface (3건)\n\n본 plan 외 별도 interaction 으로 surface (이번 plan 의 직접 작업 아님).\n\n| ID | 펜딩 | 누구 |\n|---|---|---|\n| PACAA-53 (Daily Board Digest hub) | Telegram chat_id 발견 — 보드가 @Daily_Board_Digest_bot 에 메시지 1회 | 보드 |\n| PACAA-54 (Stale & Blocked Sweep hub) | Telegram chat_id 발견 — 보드가 @Stale_Blocked_Issue_Sweep_bot 에 메시지 1회 | 보드 |\n| PACAA-284 (Admin Dashboard Gate 3+4) | PLAUSIBLE_API_KEY + GSC_SERVICE_ACCOUNT_JSON 시크릿 주입 | 보드 |\n\n**액션:** 본 plan 승인 후 별도 interaction `ask_user_questions` 1건으로 묶어 surface. 거기서 보드가 \"지금 처리\" / \"보류\" / \"폐기\" 선택. 본 plan 자체는 surfacing 만 보장.\n\n### F. Agent owner 작업 미시작 — 트리거 발사 (5건)\n\nagent assigned + heartbeat 없음 + 트리거 부재 → unintended-stall. 트리거 발사로 픽업 강제.\n\n| ID | assignee | 액션 |\n|---|---|---|\n| PACAA-240 (SOP embed AGENTS.md 4종) | 54623669 (Legal) | 코멘트 1줄 트리거: \"본 작업 진행 부탁드립니다\" + assignee wake |\n| PACAA-241 (회고 자문 8 guides + 50 kw + vendor) | 54623669 (Legal) | 동일 |\n| PACAA-298 (SOP_TAKEDOWN 재구성) | 54623669 (Legal) | 동일 |\n| PACAA-304 (Backup routine include + floor) | e33ecade (CEO 본인) | 본인 다음 idle wake 에 처리 — 별도 트리거 불필요 |\n| PACAA-355 (Resend API key 펜딩) | 3177894b (Backend) | RESEND_API_KEY 보드 secret 입력 필요 — E 카테고리에 합치는 게 맞음. 재분류. |\n\n→ **재분류:** PACAA-355 는 E 로 이동. PACAA-355 의 \"RESEND_API_KEY 보드 액션\" 도 별도 interaction 에 묶음.\n\n**최종 F:** PACAA-240, 241, 298, 304 (4건).\n- PACAA-240/241/298: Legal Counsel 단일 assignee 에 트리거 코멘트 1통씩 (3건 묶지 말고 이슈별).\n- PACAA-304: CEO 본인 작업 → 본 plan 승인 후 별도 작업 heartbeat 에서 처리.\n\n### G. PACAA-322 quote-request 체인 — 정상 (5건)\n\n오늘 (2026-05-08) 생성. 의존 체인 명시:\n- PACAA-354 (DB migration) → PACAA-355 (API + Resend) → PACAA-356 (Form) → PACAA-358 (Plausible)\n- PACAA-357 (privacy) — 독립\n\n**액션 없음.** assignee (Backend 3177894b, Frontend 82e7ef44) heartbeat 가 픽업할 것. PACAA-355 의 RESEND_API_KEY 만 보드 시크릿 필요 (E 로 이동).\n\n### H. SEO soak — 정상 (2건)\n\n| ID | 트리거 | 비고 |\n|---|---|---|\n| PACAA-351 | event: 첫 impression + 14일 / 백스탑 2026-06-21 | packaging-printing |\n| PACAA-352 | event: 첫 impression + 14일 / 백스탑 2026-06-21 | glass-metal-container |\n| PACAA-363 | event: 색인 + 노출 ≥1 | packaging-rfq-guide |\n\n(3건. 위 표 +1.) **액션 없음.**\n\n## 3. 최종 액션 목록 (보드 승인 후 실행)\n\n| # | 작업 | 대상 | 비고 |\n|---|---|---|---|\n| 1 | PACAA-167 status 정정 (blocked→in_progress, blockedByIssueIds=[223]) | CEO | 즉시 |\n| 2 | PACAA-192 본문 보강 (E5 child 모니터링 컨트랙트) | CEO | 1단락 |\n| 3 | PACAA-240 트리거 코멘트 + Legal assignee wake | CEO→Legal | \"진행 부탁\" |\n| 4 | PACAA-241 트리거 코멘트 + Legal wake | CEO→Legal | 동일 |\n| 5 | PACAA-298 트리거 코멘트 + Legal wake | CEO→Legal | 동일 |\n| 6 | PACAA-304 본인 backlog 픽업 (다음 idle heartbeat) | CEO | 본인 작업 |\n| 7 | 보드 surfacing interaction 1건 (PACAA-53/54/284/355) | CEO | ask_user_questions |\n\n총 7개 작업. 6개는 Paperclip API mutation, 1개는 보드 interaction.\n\n## 4. Reversibility\n\n전부 **two-way door**:\n- 1: status PATCH 한 번 더 reverse 가능\n- 2: 본문 edit 한 번 더 reverse 가능\n- 3-5: 코멘트는 hide 가능, assignee wake 는 trigger 일회성\n- 6: 본인 작업, 본인 통제\n- 7: interaction 은 응답 없으면 supersede 가능\n\n리스크 = 0. 합법적 책임은 보드가 7개 액션 묶음 승인.\n\n## 5. Out of scope (이번 plan 에서 제외)\n\n- agent assignee re-routing — agent 책임 변경은 별도 governance\n- priority 재조정 — 작업 자체가 우선순위 결정 요건\n- backlog 신규 발의 — 본 plan 은 기존 보류 검토 한정\n- agent 신규 hire — 별도 governance flow\n\n## 6. 승인 게이트\n\n본 plan 승인 시 7개 액션 즉시 실행. 보드 거절 시 항목별 대안 surface.\n\n`request_confirmation` interaction 으로 보드에 발사 — accept 하면 위 7개 일괄 진행.\n"
