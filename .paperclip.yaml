        body: "## 7개 캡처 분석 — **현 시점 위기 아님**\n\n### 메트릭 요약\n\n| 메트릭 | 현재 | 한도 | % | 평가 |\n|---|---:|---:|---:|---|\n| **Disk IOPS** | **6** | 3,000 | 0.2% | ✅ 매우 낮음 |\n| **Disk Throughput** | 695 KB/s | 125 MB/s | 0.5% | ✅ 매우 낮음 |\n| CPU | 14.09% | 100% | 14% | ✅ 정상 (idle 대부분, IOwait 약간) |\n| Memory | 408.76 MB | 572.2 MB | 71% | ✅ 정상 (cache+buffer 포함) |\n| DB Connections | 15 | 60 | 25% | ✅ 정상 |\n| Disk Usage | 946.49 MB | 8 GB | 12% | ✅ 여유 |\n| Database Size | **0.04 GB** | 8 GB | **0.5%** | ✅ 거의 빈 상태 |\n\n### 핵심 관찰\n\n1. **IOPS / Throughput = 24h 동안 거의 0 평탄선.** 현재 임박 IO 위기 없음. 코드 fix 가 효과를 봤거나, 원래 낮은데 Supabase 가 budget alarm 트리거한 거 둘 중 하나.\n2. **단발 스파이크 1회** (Throughput chart 좌측 끝, ~125 MB/s) — 자정 maintenance/backup 추정. 사용자 트래픽 아님.\n3. **Database 크기 0.04 GB** — sub-agent audit 결과 (28MB) 와 일치. 사이즈 prune 의 잠재 효과 = 0 재확인.\n\n### 그런데 왜 Supabase 알림이 왔나?\n\n2가지 가능:\n\n**(a) 과거 burst (며칠 전) 가 monthly Disk IO Budget 을 누적 소진.** Supabase \"Disk IO Budget\" = 월간 burst 한도 (compute tier 별 GB·시간 단위). 현재 raw IOPS 가 낮아도 누적 사용량이 한도 가까우면 알림 발송. \n\n**(b) Supabase 가 7일 trend 기반 사전 경고.** 실제 임박 X 인데 우상향 패턴 감지 시 generic 메일 발송. 경험상 흔함.\n\n어느 쪽인지 분명히 알려면 **Project Settings → Compute & Disk add-on (또는 Usage 페이지) → \"Disk IO Budget\" 또는 \"Disk Bandwidth Used\" 잔여 %** 캡처 1장 보내주시면 즉시 판정 가능. (위 7장은 Database Reports 페이지 — Budget 자체 패널이 따로 있음)\n\n### 결론 — 액션\n\n- **즉각 위기 없음.** 사이트 영향 0, fix 가 효과 봤든 아예 안 필요했든 현재는 안전.\n- **본 ticket → done 재처리.** 사후 모니터링은 6-12h 후 같은 페이지 재캡처 + Budget 패널 추가 캡처로 마무리.\n- **2026-05-04 ~ 05-05 한 번만 더 확인 부탁** — IOPS/Throughput 평탄 유지면 진짜 종결 + 보드 다음 Vercel toggle 액션도 우선순위 ↓.\n\n### 부수 의미\n\n코드 fix (force-dynamic 제거 → ISR) 자체는 **preventive 가치** + **회귀 막은 인프라 hardening (PACAA-234) 부산물** 가치 있음. 트래픽 폭증/봇 크롤 사이클 다음번에는 fix 없이 위기 진짜 왔을 가능성. 즉 over-engineer 아님."
