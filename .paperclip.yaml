on=repo mount + deploy creds 또는 위탁 결정)\n- Decision log: `runs/2026-04-30-0921-decisions-pacaa123.md`\n- ADR PACAA-115 유효 — 정책은 변경 없음, 적용 경로만 결정 필요\n"
