|------|\n| 8/8 카테고리 분모 추정치 산출 | ✅ 8/8 |\n| 각 카테고리 estimate에 명시적 출처 + 방법론 | ✅  +  |\n| 시스템 재실행 → 동일 결과 (idempotency) | ✅ ON CONFLICT + unique partial index 보장 |\n| 결과 보드 보고 | ✅ 이 코멘트 |\n\n---\n\n## P1.2 게이트 오픈\n\n이 분모 숫자가 P1.2 (vendor target list 수집), P1.3 (dedup), P1.4 (profile 완전성) 의 ground truth.\n\n- **P1.2 시작 가능:** 각 category_key에 대해  → 분모 확정\n- **다음 분기 재계산:** pg_cron 트리거 또는 수동으로 KOSIS API 재조회 후 새 method_version INSERT (자동으로 이전 버전 soft-delete)\n- **Remaining v2.0 업그레이드 (optional):** 5개 v1.0-bootstrap 카테고리도 KOSIS API로 정밀화 가능 → 별도 improvement 이슈로 분리 권장\n\n---\n\n**P1.1 분모 산출 시스템 — 완료.**\n"
