        body: "## PACAA-95 진입 — 도메인 미스매치 발견, CEO 결정 필요\n\nPACAA-94 종료 직후 본 이슈 진입했고 사전 작업/audit 완료 후 **하나의 one-way 결정**이 남았습니다. 결정 받기 전엔 sitemap 제출하지 않습니다.\n\n### 발견\n\n| 항목 | 상태 |\n| --- | --- |\n| PACAA-81 GSC + Naver verified property | `https://packlinx.com` ✅ |\n| PACAA-81 sitemap.xml (1,031 URLs) | packlinx.com 측 Supabase 동적 sitemap |\n| PACAA-94 50 keyword 페이지 deploy | `https://pacaa94-keywords.vercel.app` ✅ live |\n| 두 도메인 간 verification 공유 | ❌ |\n\n→ packlinx.com sitemap 에 vercel URL 끼워 넣기 = cross-domain (Google 무시). vercel 도메인 그대로 신규 등록 = packlinx.com 브랜드 authority 미사용. **도메인 결정이 PACAA-95 의 진짜 게이트** 입니다.\n\n### 옵션 요약 (full reasoning: `runs/2026-04-30-0156-decisions-pacaa95.md`)\n\n* **A. 통합** — packlinx-web repo 에 50 페이지 이식 + 기존 sitemap 에 추가. 도메인 authority 100% 사용. **단점**: packlinx-web 접근권 미보유 → CTO/CEO unblock 필요. 1~2 heartbeat 추가.\n* **B. 신규 vercel property** — `pacaa94-keywords.vercel.app` 을 GSC/Naver 신규 property 로 등록. **단점**: 도메인 authority 0, vercel 무료 도메인은 SEO 부정 신호, 폐기 시 인덱스 손실.\n* **C. (추천) `keywords.packlinx.com` 서브도메인** — Vercel 에 custom domain 연결 + GSC/Naver 서브도메인 property 등록. main 도메인 authority 의 서브도메인 신뢰 상속 + 추후 `/keywords/*` 통합 시 301 한 번으로 인덱스 이전 가능. **비용**: CEO 20분 (DNS CNAME + 두 콘솔), BE 측 metadataBase + sitemap base URL 갱신 + redeploy.\n\n### 사전 작업 완료 (옵션 무관)\n\n* `site/scripts/build-sitemap.py` — 51-URL sitemap 생성기 (base URL 인자화 → A/B/C 즉시 적용)\n* `site/out/sitemap.xml` — 51 URLs 생성됨 (현 base = vercel; A/C 결정 시 1줄 재실행)\n* `site/out/robots.txt` — Googlebot + Yeti 허용 + Sitemap 디렉티브\n* `site/scripts/index_audit.py` — 50 URL 인덱싱 진단 (canonical/robots/h1/thin-content)\n* `site/runs/pacaa95_audit_pre_submit.csv` — **50/50 OK** (200 + canonical self + h1 + ≥4KB body)\n\n### 다음 액션\n\n별도 `request_confirmation` 인터랙션 발행. 응답 도착 시 본 에이전트 자동 재가동:\n\n* 옵션 A 선택 → `[CTO 채용 미상태 → CEO 가 packlinx-web repo 접근 경로 또는 ingestion 옵션] 안내 코멘트` 후 그 unblock 따라 진행.\n* 옵션 B 선택 → `site/app/layout.tsx` 에 GSC/Naver verification 메타 추가 (PACAA-81 코드 재사용) → VERCEL_TOKEN 으로 redeploy →