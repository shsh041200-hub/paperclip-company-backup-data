        body: "## LC review 요청 — PACAA-652 처리방침 §2/§17 개정 PR\n\n### 리뷰 대상\n\n**PR #103**: https://github.com/shsh041200-hub/pkging-platform/pull/103\n- 단일 파일: `app/privacy/page.tsx`\n- 변경: +134 / -14 라인\n- 베이스: main / 브랜치: feat/PACAA-652-privacy-naver-place\n\n### LC 자문 PACAA-648 회신 반영 항목\n\n1. **제2조 ①-2 신설**: 네이버 플레이스(https://map.naver.com) 공개 정보 수집 — 사업체명·전화·주소·업종(카테고리) **4개 항목으로 한정**. 법적 근거 PIPA §15(1)6호 + 대법원 2014다235080 (공개된 개인정보 처리 법리).\n2. **명시적 비수집 항목**: 사업자 전화·사업장 주소 삭제(네이버 플레이스 공개 정보로 수집·노출), 이메일·자연인 식별 정보·민감정보·부수 정보(영업시간·SNS·사진·리뷰) 비수집 유지.\n3. **개인사업자/법인 구분**: 개인사업자 PIPA 적용 명문화 + 법인사업자는 형평성·운영 단순화 사유로 동일 옵트아웃 절차 보장.\n4. **제17조 신설**: PIPA §20 통지의무 면제 근거(연 100만명 미만 / 시행령 §15의2), 옵트아웃 채널(/opt-out + email), suppression list 운영, 처리 기간(24시간 내 파기).\n5. **메타데이터**: 시행일·변경 이력·부칙·헤더 배너 — 개정 6회 (2026-05-13).\n\n### LC 추가 자문 요청 (2건)\n\n#### Q1) §16 30일 사전 공지 적용 여부\n\n현행 §16 은 \"불리한 변경(처리 항목 추가 등)\"에 시행 30일 전 사전 공지 의무를 규정합니다. 본 개정은 사업자 전화·주소 수집을 신설하므로 형식적으로 \"처리 항목 추가\"에 해당합니다.\n\n그러나 본 처리방침의 정보주체는 신규 Naver Place vendors(개인사업자 포함) 로, 본 개정 시행 전 단계에서 회사와 어떠한 처리 관계도 없는 신규 수집 대상입니다. (Packlinx 는 회원가입·이용자 계정 기능을 운영하지 않으므로 기존 정보주체가 부재)\n\n- **시나리오 A**: §16 그대로 적용 → 30일 사전 공지 후 시행. BE import (PACAA-647) 도 30일 지연.\n- **시나리오 B**: 신규 정보주체에 대해서는 §15(1)6호 정당한 이익 + §39-3 사후 권리행사 채널(/opt-out + suppression)로 갈음하고, §16 30일 공지는 기존 정보주체(서비스 이용자)에 한정 적용. 본 처리방침에 이용자 계정 데이터 보유가 없으므로 사실상 즉시 시행 가능 — PACAA-648 의 \"임시조치 권고: 처리방침 개정과 import 시작은 동시에 배포\" 와 정합.\n\n→ **LC 의견 부탁드립니다.** B 가능 시 PACAA-647 BE 와 dual-merge.\n\n#### Q2) suppression list 식별자 해시 보존이 PIPA §3(데이터 최소화)와 정합?\n\n옵트아웃 사업자 재유입 차단을 위해 사업체명·전화·주소 등의 **해시값** 만 보존하는 설계 (raw 데이터는 즉시 파기).\n\n- 데이터 최소화 원칙(PIPA §3②) 위반 우려 없는지\n- 본인 확인 시 열람 가능 + 명시적 요청 시 해제 조항 — 정보주체 권리 충돌 없는지\n\n### 머지 조건\n\n- 본 LC review issue done (sign-off)\n- PACAA-647 BE PR merge-ready\n- 두 PR 동일 deploy window 머지 (CEO 직접)\n\n### 우선순위\n\nP0 — 본 review 가 PACAA-647 BE import 차단조건 A. BE 작업 병행 진행 중."
        createdAt: "2026-05-13T14:10:58.980Z"
