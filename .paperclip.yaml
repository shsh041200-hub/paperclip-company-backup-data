        authorType: "agent"
        body: "# Option A 초보자 가이드 — `paperclip-api.cf.packlinx.com` 영구 URL 만들기\n\n## 큰 그림 (왜 단계가 여러 개인가)\n\n`paperclip-api.cf.packlinx.com` 같은 주소를 CF Tunnel 에 등록하려면, **그 도메인을 Cloudflare 가 관리**해야 합니다. 현재 `packlinx.com` 은 Vercel 이 관리 중이라, CF Tunnel 의 \"Add public hostname\" 화면에서 도메인 드롭다운에 `cf.packlinx.com` 이 안 뜹니다.\n\n그래서 순서가:\n\n1. **CF 에 `cf.packlinx.com` 만 따로 위임** (NS 레코드로) — `packlinx.com` 본체는 Vercel 그대로\n2. CF 가 관리하기 시작하면, **CF Tunnel 에서 public hostname 추가**\n3. 검증 (BE 자동)\n\n총 6 단계, 약 20–30 분 (DNS 전파 대기 5–15분 포함).\n\n참고: 지금 `PAPERCLIP_API_URL` 이 또 새로운 trycloudflare URL (`texture-poultry-exports-records....`) 로 리셋된 게 보입니다 — PACAA-190 영구화의 시급성이 라이브로 증명됨. 빨리 끝내봅시다.\n\n---\n\n## Step 1. Cloudflare 에 `cf.packlinx.com` 사이트 추가\n\n1. https://dash.cloudflare.com 로그인\n2. 왼쪽 사이드바 **\"Websites\"** 클릭 (없으면 상단 \"Account Home\" 에서 \"Websites\")\n3. 오른쪽 위 파란색 **\"+ Add a site\"** 또는 **\"사이트 추가\"** 버튼 클릭\n4. 도메인 입력칸에 정확히 `cf.packlinx.com` 입력 (← 앞에 `cf.` 꼭 붙이기, `packlinx.com` 단독 X)\n5. \"Continue\" 클릭\n6. 플랜 선택 화면 → 맨 아래 **\"Free\"** 선택 → \"Continue\"\n7. \"Quick scan for DNS records\" 화면 → 비어있을 거임 (정상). \"Continue\" 클릭\n8. **\"Change your nameservers\"** 화면이 나옴. 여기에 CF 가 부여한 **NS 호스트명 2개**가 표시됨. 예시 형태:\n   - `anna.ns.cloudflare.com`\n   - `bob.ns.cloudflare.com`\n   (사람 이름 형태. 계정마다 다름)\n9. **이 2개를 메모해 두세요.** Step 2 에서 Vercel 에 입력합니다.\n10. 이 화면은 그대로 두거나 \"Continue\" 눌러도 됨 (NS 추가 후 자동 활성화됨)\n\n---\n\n## Step 2. Vercel DNS 에 NS 레코드 2개 추가\n\n1. https://vercel.com/dashboard 로그인\n2. 상단 메뉴 또는 좌측에서 **\"Domains\"** 클릭 (Team/Personal 계정 → Domains 탭)\n3. 목록에서 **`packlinx.com`** 클릭\n4. \"DNS Records\" 또는 \"Records\" 탭으로 이동\n5. **\"Add\"** 또는 **\"+ Add Record\"** 버튼 클릭\n6. 첫 번째 레코드 입력:\n   - **Type:** `NS` (드롭다운에서 선택)\n   - **Name:** `cf` (점·도메인 없이 \"cf\" 만. 자동으로 `cf.packlinx.com` 으로 풀림)\n   - **Value:** Step 1 에서 메모한 **첫 번째** NS 호스트명 (예: `anna.ns.cloudflare.com`)\n   - **TTL:** 기본값 (60 또는 3600) 그대로\n   - \"Save\" 클릭\n7. 다시 \"Add Record\" 눌러 **두 번째 레코드** 동일 방식:\n   - Type: `NS` / Name: `cf` / Value: 두 번째 NS 호스트명 (예: `bob.ns.cloudflare.com`)\n8. 완료 후 DNS 레코드 목록에 Type=NS, Name=cf 인 레코드 **2 개**가 보여야 함\n\n⚠ 만약 Vercel UI 가 \"NS records on subdomains are not supported on this plan\" 같은 에러를 띄우면 — 그 메시지 그대로 코멘트 부탁드립니다. 다른 우회 옵션 (CF Registrar 신규 도메인) 으로 즉시 pivot 합니다.\n\n---\n\n## Step 3. NS 추가 완료 코멘트 → BE 즉시 cross-check\n\nStep 2 끝나면 PACAA-190 에 다음 형식으로 코멘트:\n\n```\nNS 추가 완료.\nNS1: anna.ns.cloudflare.com\nNS2: bob.ns.cloudflare.com\n```\n\n(실제 메모한 호스트명 그대로) BE 가 5초 안에 dns.google 로 입력 정확성 + 전파 상태 확인합니다.\n\n---\n\n## Step 4. CF 사이트 \"Active\" 전환 대기 (5–15분)\n\n1. Step 1 의 CF Dashboard 사이트 페이지로 돌아가기 (Websites → cf.packlinx.com 클릭)\n2. 상단 상태 표시:\n   - **\"Pending Nameserver Update\"** = NS 전파 대기 중 (정상, 5–15분)\n   - **\"Active\"** = 준비 완료, Step 5 진행 가능\n3. 자동 갱신 안 되면 \"Re-check now\" 버튼 클릭\n\n---\n\n## Step 5. CF Tunnel 에 public hostname 추가\n\n1. CF Dashboard 좌측 메뉴 **\"Zero Trust\"** 클릭 (별도 페이지로 이동)\n2. Zero Trust 좌측 메뉴: **\"Networks\"** → **\"Tunnels\"** 클릭\n3. 터널 목록에서 **`paperclip-api`** (ID 시작이 `9c0ced8e...`) 클릭\n4. 상단 탭 중 **\"Public Hostnames\"** 클릭\n5. **\"+ Add a public hostname\"** 버튼 클릭\n6. 입력값:\n   - **Subdomain:** `paperclip-api`\n   - **Domain:** 드롭다운에서 **`cf.packlinx.com`** 선택\n     (← Step 4 에서 \"Active\" 됐으면 자동으로 옵션에 보임. 안 보이면 Step 4 미완료)\n   - **Path:** 비워둠\n   - **Service Type:** `HTTP`\n   - **URL:** `127.0.0.1:3100` (`http://` 자동 prefix)\n7. \"Save hostname\" 또는 \"Save tunnel\" 클릭\n8. 완료 후 PACAA-190 에 \"Public hostname 추가 완료\" 코멘트\n\n---\n\n## Step 6. BE 검증 (자동)\n\nStep 5 코멘트 도착 → BE wake → 다음 검증:\n\n```\n$ curl -sI https://paperclip-api.cf.packlinx.com/\n→ HTTP/2 200 (또는 404 from Express, Server: cloudflare)\n→ Server: cloudflare  ← Vercel 이 아니어야 함\n```\n\n성공 시:\n- PACAA-190 close\n- Worker `wrangler.toml` env 업데이트 + redeploy\n- Phase 2 카나리 게이트 후속 트리거\n\n---\n\n## 막히는 부분 / 모르는 부분\n\n각 Step 에서 화면이 다르거나 에러 뜨면 **그 단계 번호 + 에러 메시지/스크린샷** 코멘트 부탁드립니다. 즉시 대응 옵션 surface 합니다. 특히:\n\n- Step 1: \"This site is already added to another Cloudflare account\" → 다른 계정 사용 흔적. 상세 알려주세요.\n- Step 2: NS Type 안 보임 / 거부 → Vercel 플랜 제약 가능. 즉시 CF Registrar 신규 도메인 옵션 pivot.\n- Step 4: 30분 지나도 \"Pending\" → NS 입력 오타 가능. 코멘트 호스트명 vs Vercel 입력값 cross-check.\n- Step 5: 도메인 드롭다운에 `cf.packlinx.com` 안 보임 → Step 4 미완료 또는 wrong 계정.\n\n어느 Step 부터 하실지, 또는 특정 Step 에서 막힌 화면 캡처 공유 환영합니다."
