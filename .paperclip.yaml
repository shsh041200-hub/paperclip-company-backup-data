        body: "## 도구 추천 메모 — 보드 결정 요청\n\n[@CEO](/PACAA/agents/ceo) 위임받은 도구 리서치 완료. 영구 무료 조건 준수, 한국 안정성 우선으로 분석함.\n\n---\n\n### 1. 대시보드 (데스크톱) — Goal 트리 진척률\n\n**추천: Standalone HTML 대시보드 (자체 개발)**\n\n| 항목 | 내용 |\n|------|------|\n| 구현 | 단일 HTML 파일, Paperclip REST API 조회 |\n| 시각화 | Vision → TG → SG → P 트리 구조, 하위 이슈 상태 기반 진척률 |\n| 갱신 | 10분 자동 새로고침 |\n| 비용 | $0 (영구) |\n| 유지보수 | 거의 없음 — API 변경 시에만 수정 |\n| 한국 안정성 | 로컬 실행, 외부 의존성 없음 |\n\n**후보 비교:**\n\n| 도구 | 비용 | 적합성 | 판정 |\n|------|------|--------|------|\n| Standalone HTML | $0 | Goal 트리 구조에 최적화 가능 | ✅ 추천 |\n| Paperclip 웹 UI 확장 | $0 | 코어 개발 필요, 시간 비용 높음 | 🔄 백업 |\n| Grafana Cloud Free | $0 | 메트릭 기반 — REST API 데이터에 부적합 | ❌ 제외 |\n| Google Sheets | $0 | localhost API 접근 불가 | ❌ 제외 |\n\n**외부 SaaS 제외 사유:** Paperclip API가 localhost에서만 접근 가능. 외부 서비스(Grafana Cloud, Google Sheets 등)가 로컬 API에 도달할 수 없으므로 자체 개발이 유일한 실용적 선택.\n\n---\n\n### 2. 모바일 알림 — 보드 액션 큐 24/7 푸시\n\n**추천: Telegram Bot + Paperclip Routine**\n\n| 항목 | 내용 |\n|------|------|\n| 채널 | Telegram Bot API |\n| 트리거 | Paperclip routine — 5분 주기 cron |\n| 알림 조건 | 보드 결재/승인/검토 대기 항목 발생 시 |\n| 비용 | $0 (영구 — Bot API 2015년 출시 이후 무료 유지) |\n| 유지보수 | 거의 없음 — 1회 셋업 후 자동 |\n| 한국 안정성 | 안정적 (한국 IT 커뮤니티 널리 사용) |\n\n**후보 비교:**\n\n| 채널 | 비용 | 24/7 푸시 | 한국 안정성 | 판정 |\n|------|------|----------|------------|------|\n| Telegram Bot | $0 영구 | ✅ 즉시 | ✅ 안정 | ✅ 추천 |\n| ntfy.sh | $0 (OSS) | ✅ 즉시 | ⚠️ 인지도 낮음, SLA 없음 | 🔄 백업 |\n| Discord Webhook | $0 영구 | ✅ | ⚠️ 비즈니스 사용 적음 | ❌ |\n| Slack Free | $0 | ✅ | ✅ | ❌ 1인에 과도 |\n| Email (Gmail) | $0 | ❌ 지연 | ✅ | ❌ 즉시 요건 불충족 |\n\n---\n\n### 향후 유료 전환 위험\n\n| 도구 | 위험도 | 근거 |\n|------|--------|------|\n| Telegram Bot API | 매우 낮음 | 10년 무료 유지. 수익 모델(Premium, 광고)이 Bot API와 무관 |\n| ntfy.sh (백업) | 거의 없음 | Apache 2.0 오픈소스, 셀프호스팅 가능 |\n\n---\n\n### 셋업 계획 (보드 승인 후)\n\n1. **Telegram 셋업** (~30분): @BotFather 봇 생성 → 토큰 획득 → 보드 Telegram에서 봇 시작 → chat ID 획득 → 환경변수 저장\n2. **Paperclip Routine 생성** (~1시간): 5분 cron → pending approvals + in_review 이슈 조회 → 신규 항목 Telegram 전송 (중복 방지 로직 포함)\n3. **HTML 대시보드 개발** (~2-3시간): Paperclip goals API + issues API 조회 → 트리 렌더링 → 10분 자동 갱신\n4. **검증 + 보드 사인오프 요청**\n\n예상 총 소요: 1일 이내 (보드 승인 후).\n\n---\n\n### 보드 결정 요청\n\n위 추천안 (대시보드: Standalone HTML, 알림: Telegram Bot) 승인 여부를 결정해 주세요. 승인 시 즉시 셋업 착수합니다.\n\n대안 선호 시 코멘트로 알려주세요."
