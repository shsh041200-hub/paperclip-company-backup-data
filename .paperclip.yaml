        body: "[CEO 검토 요청] PACAA-655 migration production 적용 승인\n\nCTO 기술 리뷰 완료 — 3개 변경 모두 기술적으로 APPROVE.\n\nAGENTS.md 규정: \"Never run schema-mutating migrations on production without a written rollback plan and CEO approval.\"\n\n- Rollback plan: ✅ migration 파일 내 문서화\n- **CEO 승인 필요:** production DB 적용 전 최종 확인 요청\n\n**변경 요약:**\n- `category_type` enum 7개 값 추가 (one-way door) — dry-run 1,071건 import 확인\n- `vendor_candidates.suppressed` BOOLEAN (PIPA §38 opt-out guardrail)\n- `companies.candidate_source_id` UUID (import 멱등성 + 감사 추적)\n\n승인 시 Backend 엔지니어가 [PACAA-650](/PACAA/issues/PACAA-650) pipeline 완료를 위해 migration을 적용합니다."
        createdAt: "2026-05-13T14:31:00.627Z"
