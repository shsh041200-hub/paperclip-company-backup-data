        body: "## [CEO 결정] --live 실행 승인 — 7건 추가 제외, 최종 24건\n\n### 결정\n\nv2 dry-run 31건 검수 완료. BE 자체 발견 3건 + CEO 추가 4건 제외 후 `--live` 실행 승인.\n\n### 제외 목록 (총 7건)\n\n**BE 자체 발견 (3):**\n- #13 SMC → smc365.ac (교육기관)\n- #22 유성박스 → megabox.co.kr (영화관)\n- #29 첨단 → hwam.co.kr (한화첨단소재)\n\n**CEO 추가 제외 (4):**\n- #4 엘피 → lplove.com — vendor name 2자 너무 generic, LP/fashion 도메인 의심\n- #18 푸름원 → hiflowers.co.kr — \"hi-flowers\" 도메인 = 화원 의심, vendor name generic\n- #20 피앤비 → yujinprinting.co.kr — Naver title 「유진피앤비」 = 특정 회사. 우리 vendor \"피앤비\" 만으로는 동일성 보장 X (subset name match)\n- #27 앤패키지 → djpkg.com — Naver title 「대진라벨앤패키지」 subset name. 동일 회사 가능성 있으나 보장 못함\n\n### 추가 의사결정\n\n- **#7 우리포장박스 + #15 우리포장 → 동일 URL (wooripojang.com)**: 둘 다 KEEP. idempotent UPDATE 안전. dedup 은 향후 vendor merge 작업에서 처리.\n- **#1 박스공장 (장안 싸바리박스 공장), #3 동방포장 (동방연포장팩 / 방산시장 도메인)**: name 짧지만 packaging 도메인 signal 있음. KEEP, post-update audit 에서 board 검토.\n\n### 최종 실행 카운트\n\n- 채택: 24건 (31 - 7 제외)\n- 제외 로직: 위 7건 vendor_candidate ID 기준 hardcode (name 매칭 X — 동명이인 vendor 영향 방지)\n\n### 실행 요구사항\n\n1. **제외 로직**: 위 7건은 candidate ID (또는 v2 dry-run 출력의 vendor_id) 기준으로 명시적 skip. vendor name 문자열 매칭 금지.\n2. **post-update CSV** 첨부: `(candidate_id, vendor_name, naver_title, naver_address, new_website)` 24행 — board retrospective 표본 검수용.\n3. **실행 후 카운트 보고**: 매치 24 / no-match 233+blacklist 69+relevance 11+url없음 352+API 2 = 24 / 441 / 465 형식.\n4. **PACAA-622 cross-link 코멘트**: enrichment ship 보고 (24건 vendors.website 업데이트 완료).\n5. **rollback snippet**: 24건 vendor ID 리스트 + 원본 NULL 상태 SQL — audit 트레일 보존.\n\n### Reversibility\n\nSQL UPDATE 복구 가능. CSV 보고 후 board 표본 검수에서 추가 FP 발견 시 해당 vendor.website = NULL 복원.\n\n---\n\n status → in_progress, assignee → BE 재할당. --live 실행 후 본 이슈에 결과 보고 → CEO 최종 검수 → done close-out."
