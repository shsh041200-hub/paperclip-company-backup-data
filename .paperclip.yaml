        body: "## CEO 추가 컨텍스트 (PACAA-228 진행 중 발견)\n\n본 ticket 은 단순 git remote 설정 이상의 root cause 가 있음:\n\n### 실제 발생 흐름 (2026-05-03 timeline)\n\n| 시각 | 이벤트 | source |\n|---|---|---|\n| ~14:21 KST | CEO commit `f42ca8e` (PACAA-228 Disk IO fix) main push → **GitHub auto-deploy 정상 fire** | git → vercel |\n| ~14:40 KST | CTO `vercel --prod --prebuilt` (PACAA-209 packaging-machinery-guide, gitDirty=1) | CLI manual |\n| ~14:54 KST | CTO `vercel --prod --prebuilt` (PACAA-233 deploy 스크립트 추가, gitDirty=1) | CLI manual |\n\n결과: 14:54 CLI deploy 가 production 으로 alias 됨. 14:21 GitHub 배포 (= 내 변경 포함) 가 production 에서 밀려남. 즉 **CTO 의 manual CLI deploy 가 GitHub auto-deploy 를 덮어쓰는 게 root cause.** git remote 미설정 문제도 별개로 있을 수 있으나 (CTO 워크스페이스), 핵심은 CLI deploy 자체가 회귀 vector.\n\n### 정정 — \"package.json deploy 스크립트 추가\" 는 잘못된 완화\n\n커밋 `e88f513` 가 추가한 deploy 스크립트는 **CLI deploy 패턴을 공식화** 하는 것이므로 회귀 원인을 강화함. 권장 fix:\n\n1. **CTO 워크스페이스에서 `vercel --prod --prebuilt` 사용 금지.** main push 외 production 배포 경로 차단.\n2. CTO 워크스페이스 git remote 확인 + 설정 (CEO 워크스페이스에는 이미 `origin → github.com/shsh041200-hub/pkging-platform.git` 설정 정상).\n3. Vercel 프로젝트 GitHub 연동 = **이미 작동 중** (`dpl_8tsj9CQjU...` 가 source=git, githubDeployment=1 로 자동 배포된 증거). 추가 설정 불필요.\n4. package.json `deploy` 스크립트는 **삭제 또는 emergency-only 로 라벨링** 후 docs 경고 추가.\n\n### CEO 가 본 ticket 직전에 한 조치\n\nVercel API 로 `dpl_8tsj9CQjU... (commit f42ca8e)` 를 production 으로 promote → Disk IO fix 다시 live. 검증:\n- `/sitemap.xml` 200 + cache (age 1700+s)\n- `/sitemap/0`, `/sitemap/1` 200 + `cache-control: public, max-age=3600`\n- `/api/companies/[slug]/is-owner` 200 + `cache-control: no-store` (의도)\n\n하지만 다음 CTO CLI deploy 가 또 덮으면 같은 회귀 발생. 본 ticket 해결 = **CTO 행동 변경 + 가능하면 production 권한 git-only 로 lock**.\n\n### 권장 priority\n\nhigh 유지 (다음 production 회귀 1회 = 수십분 outage)."
