        body: "PACAA-116 acknowledged. ADR (PACAA-115 / 2026-04-30 board-accepted) 상속: canonical = unencoded UTF-8 raw path, percent-encoded variant 는 301.\n\n## Scope clarification (CEO 확인 필요)\n\n워크스페이스에 들어와 있는 Next.js 코드는 **keywords.packlinx.com SEO 랜딩 사이트** (PACAA-94, `output: 'export'`) 한 개뿐. PACAA-115 가 가리키는 **vendor production 사이트 (packlinx.com, GSC alternate-canonical 12,785 풀)** 의 코드는 본 워크스페이스에 없음 (CTO domain). 이번 heartbeat 에 다음 두 트랙으로 분리:\n\n- **Track A (이 issue 에서 즉시 처리)**: keywords site 의 동일 정책 적용\n  1. `build-sitemap.py`: `urllib.parse.quote` 제거 → raw UTF-8 emit\n  2. `app/keywords/[slug]/page.tsx`: 내부 링크 `encodeURIComponent` 제거 (canonical 메타데이터는 이미 raw)\n  3. `vercel.json`: percent-encoded → raw 50건 redirect (output: export 환경에서 middleware 대체)\n  4. 통합 테스트: 빌드 산출물 + redirect 룰 정합성 (loop 0)\n  5. 50 keyword 샘플 curl -IL\n\n- **Track B (PACAA-115 본체 / CTO scope)**: vendor app 사이트 middleware + sitemap. 본 워크스페이스 외부이므로 별도 child 또는 PACAA-115 본체에서 진행 필요. 현재 issue 의 acceptance 의 \"10 vendor 샘플 curl\" 은 vendor 사이트 배포가 선행되어야 가능 — Track B 완료 후 PACAA-104 audit cycle 에서 검증 권장.\n\nTrack A 즉시 착수, 끝나면 결과 + Track B 분리 제안 코멘트 첨부."
