        body: "v2 검토 완료. 일부 보강 후 사인오프하겠다.\n\n## 즉시 resolved\n\n§8 #1: DAU vs SEO 위계 — Top\\=WUV / Sub\\=SEO 확정 ✅\n§8 #3: 실 방문자 정의 — Plausible 7d unique + 한국 IP only +\nbot/admin 필터 ✅\n§8 #6: voluntary edit 임계 20건 ✅\n§8 #7: self-reg 임계 30건 ✅\n§8 #8: Kill criterion 중간 강도 ✅\n§8 #9: 분석 도구 Plausible ✅\n\n## 보드 결정 (남은 §8 항목)\n\n§8 #2: WUV 6개월 목표 → **minimum 4,000 / stretch 5,000** 이중 임계값\n§8 #4: 카테고리 8개 → 후보 리스트 받은 후 결정 (보강 2 참조)\n§8 #5: paid-intent 임계 5건 ✅\n단, 보드 보고 routine에 \"비즈니스 모델 검증이 아닌 약한 신호\"\n명시 추가\n\n## 보강 후 사인오프 (CEO 추가 작업)\n\n### 보강 1 — TG 임계값 이중화\n\nWUV 6개월 목표를 단일 5,000이 아닌 이중 임계값으로:\n\n* minimum success: 4,000\n* stretch: 5,000\n\n체크포인트는 현재안 유지:\n\n* 1개월: 500\n* 3개월: 2,000\n* 6개월: minimum 4,000 / stretch 5,000\n\n이유: 현재 baseline 100~~300 → 6개월 5,000은 17~~50배 성장.\n이중 임계값이 정확한 진척 측정.\n\n### 보강 2 — 카테고리 8개 후보 리스트 (사전 결정 게이트)\n\n§8 #4 결정 전 다음 자료 별도 child 이슈로 제출:\n\n* 한국 패키징 시장 카테고리 통상 분류\n* 8개 후보 명시 + 각 사업체 수 추정 + 월간 검색량\n* 동시 vs 순차 진행 권장\n* 4개로 줄일 경우의 우선순위\n\n8개 후보 리스트를 받은 후 §8 #4 사인오프.\n\n### 보강 3 — 페어 채용 (수정)\n\n§5의 \"사인오프 직후 4명 동시 채용\"을 페어 채용으로 변경.\n\n**현재 인력 확인:**\nCTO 이미 채용됨. SG-3 즉시 킥오프 가능 (다른 채용 대기 불필요).\n\n**페어 1 (사인오프 직후):**\n\n* Backend Engineer 단독 채용\n* SG-1 (vendor coverage 분모 산출 + 데이터 파이프라인) 담당\n* CTO와 데이터 레이어에서 협업\n* 모델: Sonnet 4.6\n\n**페어 2 (페어 1 안정화 후, 약 2\\~3주차):**\n\n* CMO + Frontend Engineer 동시 채용\n* SG-2 (SEO) + SG-4 (UX) 사용자 입구 작업\n* programmatic SEO 랜딩 페이지(P2.5)에서 협업\n* Frontend Engineer 모델: Sonnet 4.6\n* CMO 모델: 추천 제시 (Sonnet 권장이지만 카피 품질 따라 결정)\n\n**Designer:** P4.1 진입 시 재판단 (조건부)\n\n페어 사이 1\\~2주 간격:\n\n* 페어 1의 협업 패턴 정착 후 페어 2 합류\n* 페어 1에서 발견한 셋업 결함을 페어 2 채용에 반영\n* 본인 검토 부담 분산\n\n### 보강 4 — SG-2 키워드 50개 보드 게이트\n\nCMO 채용 후 키워드 50개 후보 리스트를 보드에 별도 제출.\n승인 전까지 P2.5 (programmatic SEO 랜딩 페이지) 시작 금지.\n\n검토 기준:\n\n* 각 키워드의 월간 검색량\n* 경쟁 강도\n* buyer-intent 정합성\n* 카테고리 8개와의 매핑\n\n이유: 키워드 선정이 잘못되면 6개월 SEO 작업 통째 낭비.\n\n## 진행 절차\n\n1. 위 보강 1, 3, 4를 plan v3에 반영\n2. 보강 2 (카테고리 8개 후보 리스트)는 별도 child 이슈로 제출\n3. v3 + 카테고리 후보 리스트 모두 사인오프되면 트리 일괄 등록\n4. 트리 등록 후:\n   * SG-3 즉시 킥오프 (CTO 단독 가능)\n   * Backend Engineer 채용 절차 시작\n5. Backend Engineer 검증 통과 후 (약 2\\~3주차) 페어 2 채용 진행\n\n## 부가 사항\n\n* Backend Engineer, Frontend Engineer 모델: Sonnet 4.6 확정\n* Heartbeat 간격: 현행 유지\n* 토큰 예산 제약 완화됨 (Pro Max x20). 이는 CEO/CTO/CMO 등\n  주요 의사결정 직무에 Opus 활용 여지가 있다는 뜻이지,\n  Backend/Frontend까지 자동 Opus 승격 의미는 아님.\n\n전반적으로 잘 만든 plan이야. v1 피드백 반영(WUV 채택)과 §9 정직한\n보고는 SOUL의 calibrated uncertainty 원칙을 정확히 적용한 사례다.v2 검토 완료. 일부 보강 후 사인오프하겠다.\n\n\n\n\\## 즉시 resolved\n\n\n\n§8 #1: DAU vs SEO 위계 — Top\\=WUV / Sub\\=SEO 확정 ✅\n\n§8 #3: 실 방문자 정의 — Plausible 7d unique + 한국 IP only +&#x20;\n\n&#x20;        bot/admin 필터 ✅\n\n§8 #6: voluntary edit 임계 20건 ✅\n\n§8 #7: self-reg 임계 30건 ✅\n\n§8 #8: Kill criterion 중간 강도 ✅\n\n§8 #9: 분석 도구 Plausible ✅\n\n\n\n\\## 보드 결정 (남은 §8 항목)\n\n\n\n§8 #2: WUV 6개월 목표 → \\*\\*minimum 4,000 / stretch 5,000\\*\\* 이중 임계값\n\n§8 #4: 카테고리 8개 → 후보 리스트 받은 후 결정 (보강 2 참조)\n\n§8 #5: paid-intent 임계 5건 ✅\n\n&#x20;       단, 보드 보고 routine에 \"비즈니스 모델 검증이 아닌 약한 신호\"\n\n&#x20;       명시 추가\n\n\n\n\\## 보강 후 사인오프 (CEO 추가 작업)\n\n\n\n\\### 보강 1 — TG 임계값 이중화\n\n\n\nWUV 6개월 목표를 단일 5,000이 아닌 이중 임계값으로:\n\n\n\n\\- minimum success: 4,000\n\n\\- stretch: 5,000\n\n\n\n체크포인트는 현재안 유지:\n\n\\- 1개월: 500\n\n\\- 3개월: 2,000\n\n\\- 6개월: minimum 4,000 / stretch 5,000\n\n\n\n이유: 현재 baseline 100\\~300 → 6개월 5,000은 17\\~50배 성장.&#x20;\n\n이중 임계값이 정확한 진척 측정.\n\n\n\n\\### 보강 2 — 카테고리 8개 후보 리스트 (사전 결정 게이트)\n\n\n\n§8 #4 결정 전 다음 자료 별도 child 이슈로 제출:\n\n\\- 한국 패키징 시장 카테고리 통상 분류\n\n\\- 8개 후보 명시 + 각 사업체 수 추정 + 월간 검색량\n\n\\- 동시 vs 순차 진행 권장\n\n\\- 4개로 줄일 경우의 우선순위\n\n\n\n8개 후보 리스트를 받은 후 §8 #4 사인오프.\n\n\n\n\\### 보강 3 — 페어 채용 (수정)\n\n\n\n§5의 \"사인오프 직후 4명 동시 채용\"을 페어 채용으로 변경.\n\n\n\n\\*\\*현재 인력 확인:\\*\\*\n\nCTO 이미 채용됨. SG-3 즉시 킥오프 가능 (다른 채용 대기 불필요).\n\n\n\n\\*\\*페어 1 (사인오프 직후):\\*\\*\n\n\\- Backend Engineer 단독 채용\n\n\\- SG-1 (vendor coverage 분모 산출 + 데이터 파이프라인) 담당\n\n\\- CTO와 데이터 레이어에서 협업\n\n\\- 모델: Sonnet 4.6\n\n\n\n\\*\\*페어 2 (페어 1 안정화 후, 약 2\\~3주차):\\*\\*\n\n\\- CMO + Frontend Engineer 동시 채