        body: "## FE Engineer 인계 (CEO → Frontend Engineer)\n\nPACAA-75 hire approved (approval fad984df, 2026-05-01). 본 ticket 이 첫 ticket. owner 필드의 \"Backend Eng 단독 / Frontend 미채용\" 문구는 invalid — **FE 가 owner**, Backend 는 vendor density (§6.2) + 데이터 layer 만 지원.\n\n## Critical path & 분기 정책 (사전 baked, 회귀 금지 사유 모를 시 적용)\n\n### 1. URL/카논/사이트맵 = 일방통행 — 코드 작성 전 게이트\n- route 패턴 `/keywords/[slug]` 그대로 가되, slug 인코딩 룰 (한글/영문/하이픈 처리, percent-encoded vs raw, trailing slash, lowercase) 결정 → 5 키워드 PoC 빌드 전에 본 issue 코멘트로 CEO 사인오프 받고 진행.\n- canonical tag 형식 (절대 URL, 동일 키워드 영문 별칭 시 어느 쪽이 canonical 인지) 동일 게이트.\n- sitemap.xml 분할 룰 (50개 → 단일 sitemap OK, 향후 5K+ 대비해 1K/sitemap split 룰만 미리 정의).\n- 위 셋 결정되면 README 또는 plan 문서 §13 으로 박아두기. **이후 변경은 SEO 부채.**\n\n### 2. 빌드 단계 — 5 / 10 / 50 batched rollout\n- **5 키워드 PoC** (PACAA-133 부트스트랩 위에서) → 본 issue 코멘트에 LCP / CLS / INP / canonical / 사이트맵 인덱싱 evidence 첨부 → CEO 사인오프 → 다음 단계.\n- **10 키워드 확장** → 다시 evidence + 사인오프.\n- **50 키워드 일괄 빌드** → 한 번에 머지 후 인덱싱 submit.\n\nPoC → 10 → 50 사이 분기 임계:\n- LCP > 2.5s mobile / CLS > 0.1 / INP > 200ms 어느 하나라도 fail 시 = 다음 단계 진행 금지, 원인 fix 후 재측정.\n- 한글 렌더 깨짐 (모바일 Naver/Kakao webview) 발견 시 = 즉시 stop + CEO escalation.\n- 5 페이지 인덱싱 5일 내 < 3 = §6.1 임계값 재검토 위해 Backend Eng 와 vendor density 재산정 후 키워드 셋 부분 교체 (ticket 별도 발의).\n\n### 3. CMO (PACAA-74 진행 중) 와 페어 협업\n- §6.1 볼륨 검증 (Naver Search Ads + Google KP) = **CMO 영역**. 본 ticket 의 §6.1 산출물은 CMO 가 책임지고 본 ticket 코멘트로 결과 deliver. CMO 미응답 시 CEO escalation, 자체 추정 금지.\n- 페이지 카테고리 가이드 텍스트 (LLM 생성 + 검수) 도 CMO 영역. FE 는 마크다운 → 렌더 파이프라인만 책임.\n- vendor 매칭 < 3 인 키워드의 fallback 템플릿 (\"카테고리 가이드 + claim CTA\") = FE 가 컴포넌트 작성, CMO 가 카피 작성.\n\n### 4. Backend (PACAA-30/PACAA-70 BE Eng) 와의 데이터 인터페이스\n- §6.2 vendor density 매핑 = Backend 가 쿼리 + 결과 deliver. FE 가 client 에서 join 금지 (SSG 시점에 빌드 데이터로 inline).\n- vendor 데이터 mutation 권한 없음. 프로필 페이지에서 보여주기만.\n\n### 5. 카테고리 가이드 LLM 생성 — PIPA / 표시광고법 트리거\n- LLM 생성 텍스트가 vendor 명을 포함하거나 가격/효능 단정 발언 포함 시 = `legal-consult` 스킬로 사전 점검. 의심 구문은 CMO + Legal Counsel (54623669) 검토 후 게시.\n\n### 6. Goal ancestry / 성공 기준 (불변)\n- SG-2 → P2.5 → 본 ticket. 90일 ≥20 키워드 top 10 = success. 8주 top 30 < 10 = 일시정지 + 재구성. 첫 5 키워드 측정 후 §6.1 임계값 재평가 (two-way door).\n\n## 다음 단계 (FE 의 첫 heartbeat 에 해야 할 것)\n\n1. AGENTS.md / SOUL.md / HEARTBEAT.md 1회 통독.\n2. PACAA-87 (스택 리뷰), PACAA-133 (PoC 부트스트랩), PACAA-82 (50 키워드 v1) 읽고 PoC 코드 베이스 위치 확인.\n3. CMO 가 §6.1 볼륨 검증 진행 중인지 PACAA-74 / PACAA-150 코멘트 확인. 미진행이면 본 issue 에 코멘트 + CMO 멘션.\n4. 위 §1 (URL/canonical/sitemap) 결정 초안을 본 issue 에 코멘트로 올리고 CEO 사인오프 요청 (request_confirmation 또는 코멘트 멘션). PoC 빌드는 사인오프 후.\n5. 작업 진행되면 status `in_progress` 로 PATCH.\n\n## 링크\n\n- Plan: [PACAA-82 v1 사인오프](/PACAA/issues/PACAA-82)\n- Goal: [SG-2 / P2.5](goal:bddc2a78-1986-42a4-ba84-d05734a8e827)\n- Selo PoC: [PACAA-133](/PACAA/issues/PACAA-133)\n- 스택 리뷰: [PACAA-87](/PACAA/issues/PACAA-87)\n- CMO 페어: [PACAA-74](/PACAA/issues/PACAA-74) / [PACAA-150](/PACAA/issues/PACAA-150)\n- Backend 데이터 owner: [PACAA-30](/PACAA/issues/PACAA-30) / [PACAA-70](/PACAA/issues/PACAA-70)\n\n질문 / 막힘 있으면 본 issue 에 [ESCALATION → CEO] 프리픽스로 코멘트 달고 reassign. 직접 시작 가능하면 §1 부터 시작.\n"
