        body: "## v2 dry-run 결과 보고\n\n스크립트 보강 완료 후 전체 465건 dry-run 실행 결과입니다.\n\n### v2 보강 내용 (CEO 요청사항 적용)\n\n- **items[0] only**: 첫 번째 결과만 사용 (v1은 5개 결과 중 URL 있는 첫 번째 사용)\n- **Relevance guard**: vendor name ↔ Naver 결과 title 2-gram overlap ≥ 0.5 필터\n- **Host blacklist**: instagram, facebook, twitter, blog.naver.com, café.naver.com, youtube, starbucks, abcmart, coupang, smartstore.naver.com 등 차단\n- **URL sanitize**: HTML entity decode, 스킴 검증, 비정상 길이 차단\n- **Audit 강화**: `naver_title`, `naver_address`, `reject_reason` 필드 추가\n\n---\n\n### 전체 결과 (465건)\n\n| 구분 | v1 | v2 |\n|------|----|----|\n| 매치 (URL 채택) | 232 (49.9%) | **31 (6.7%)** |\n| Blacklist 차단 | - | 69 |\n| Relevance 필터 | - | 11 |\n| URL 없음 | - | 352 |\n| API 결과 없음 | - | 2 |\n\nmatch rate 감소(232→31)는 예상된 결과입니다. v1의 232 중 다수는 items[1~4]에서 가져온 관련성 낮은 URL이었고, v2는 items[0]+relevance로 걸러냈습니다.\n\n---\n\n### 채택된 31건\n\n| # | vendor name | found_url | naver_title |\n|---|-------------|-----------|-------------|\n| 1 | 박스공장 | http://www.janganbox.com | 장안 싸바리박스 공장 |\n| 2 | 삼우테크 | http://www.mynumbering.co.kr | 삼우테크 |\n| 3 | 동방포장 | http://bangsancijang.com | 동방연포장팩 |\n| 4 | 엘피 | http://www.lplove.com/ | 엘피러브 |\n| 5 | 엠아이테크 | http://www.mecvel.co.kr | 엠아이테크 |\n| 6 | 미광상사 | http://mk3m.co.kr/ | 미광상사 |\n| 7 | 우리포장박스 | http://www.wooripojang.com/ | 우리포장비닐 |\n| 8 | 에이스포장산업 | http://www.acevac.co.kr/ | 에이스포장산업 |\n| 9 | 한국포장 | http://www.hkpackage.co.kr/ | 한국포장 |\n| 10 | 제일포장 | http://www.jpackage.co.kr | 제일포장 |\n| 11 | 아이박스 | http://www.iboxcom.com/ | 아이박스컴퍼니 |\n| 12 | 케이씨테크 | http://www.kctechtube.com/ | 케이씨테크 |\n| **13** | **SMC** | **https://www.smc365.ac** | **SMC아카데미 본점** ⚠️ 교육기관 |\n| 14 | 한국유니콤 | http://www.koreaunicom.com/ | 한국유니콤 |\n| 15 | 우리포장 | http://www.wooripojang.com/ | 우리포장비닐 |\n| 16 | 태화산업 | http://www.taehwabag.com/ | 태화산업 |\n| 17 | 성광포장 | http://www.boxsk.co.kr/ | 성광수출포장 |\n| 18 | 푸름원 | http://www.hiflowers.co.kr/ | 푸름원 |\n| 19 | 거성식품 | http://gs-food.co.kr/ | 거성식품 |\n| 20 | 피앤비 | http://www.yujinprinting.co.kr/ | 유진피앤비 |\n| 21 | 한성글로벌 | http://hansungmall.net | 한성글로벌 |\n| **22** | **유성박스** | **https://www.megabox.co.kr/** | **메가박스 대전유성** ⚠️ 영화관 |\n| 23 | 동주산업 | http://dongjufilter.co.kr/ | 동주산업 |\n| 24 | 세종포장 | http://www.sejongvinyl.com/ | 세종비닐포장 |\n| 25 | 제이패키지 | http://www.jnjpackage.co.kr/ | 제이앤제이패키지 |\n| 26 | 웅진산업 | http://www.woongjinco.com/ | 웅진산업 |\n| 27 | 앤패키지 | https://www.djpkg.com | 대진라벨앤패키지 |\n| 28 | 하나포장 | http://www.hanavinyl.com/ | 하나비닐포장 |\n| **29** | **첨단** | **http://www.hwam.co.kr** | **한화첨단소재** ⚠️ 대기업 계열사 |\n| 30 | 맑음컴퍼니 | http://malgumcompany.co.kr/ | 맑음컴퍼니 |\n| 31 | 성일산업 | http://www.braider.co.kr/ | 성일산업 |\n\n---\n\n### BE 자체 발견 false positive 3건 (⚠️)\n\n1. **#13 SMC → SMC아카데미** (smc365.ac): 교육기관. 포장 vendor 아님 → 제외 필요\n2. **#22 유성박스 → megabox.co.kr**: 메가박스 영화관. \"유성\"은 대전유성 지명 → 제외 필요\n3. **#29 첨단 → 한화첨단소재** (hwam.co.kr): 대기업 계열사, 소재회사 → 제외 필요\n\n추가: **#7 우리포장박스 + #15 우리포장** → 동일 URL (wooripojang.com). idempotent UPDATE라 실제 중복 write는 없음.\n\n3건 제외 시 실제 매치: **28건**.\n\n---\n\n### CEO 요청 사항\n\n위 표 검수 후 승인 시 `--live` 실행 (3건 자동 제외 로직 포함) → 최대 28건 companies.website 업데이트.\n추가 false positive 발견 시 알려주시면 제외 목록에 추가하겠습니다.\n"
