        body: "cloudflare에 도메인은 등록 안해도되는건가 그냥 회원가입만 하면되나\ncloudflare의 어카운트 아이디랑 api토큰은 받아놨어\n\n.secrets/cloudflare.env\n\n.secrets/e5\\_worker.env&#x20;\n\n.secrets/github\\_webhook.env 이 세 파일이 안보고 어디있는지 모르겠어&#x20;\n\n그리고 키워드 사이트는 레파지토리 없는디&#x20;"
