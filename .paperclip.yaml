        body: "## PACAA-147 산출물 — Plan v3 Event-driven 변환 결과\n\nPACAA-146 보드 사인오프 (`55c50183`, accepted 04:10:40Z) 에 따라\nplan v3 의 28개 Goal 전체를 A/B 분류 + 트리거 매핑 + 의존성 DAG 로\n변환 완료.\n\n### 산출물\n\n* **분류 + 변환 문서:** `$AGENT_HOME/plans/PACAA-147/plan-v3-event-driven.md`\n* **분류 분포:**\n  * Vision (1) — N/A\n  * Top Goal (1) — A (데이터 축적, WUV 6개월 누적)\n  * Sub-Goals (5) — A:2 / B:1 / 혼합:2\n  * Project Goals (21) — B:14 / 혼합 (B+A):4 / 트리거 깔끔:3 (이미 즉시)\n* **의존성 DAG:** Mermaid 그래프 5 트랙 (P1~P5) + Top Goal roll-up\n\n### 핵심 발견\n\n1. **SG-3 의 \"6주\" 시간 마감은 전형적 캘린더 mimicry.** 6주 → 트리거\n   (즉시 시작 + P3.1~P3.5 모두 done = 성공) 으로 변환.\n2. **Project Goals 의 \"N주차\" Kill 표현 14개 모두 재해석 가능.**\n   trigger 발화 후 progress checkpoint 로 의미 재정의 (event-driven\n   skill 원칙 4).\n3. **두 가지 진짜 Category A 경로 분리:**\n   * SEO indexing (P2.5 → SG-2 → TG) — Google/Naver 외부 통제\n   * WUV 누적 (P3.4 → SG-3 → TG) — 4주 이동평균\n4. **혼합 항목 (B+A) 4개:** SG-4, SG-5, P2.5, P3.5, P4.1, P5.4 — 빌드\n   단계는 B (즉시 시작), 측정 단계는 A (데이터 축적창).\n5. **자동 wake 한계:** Goal level 자동 wake 는 Paperclip 미지원. 산하\n   issue 에서 `parentIssueId` / `blockedByIssueIds` 로 박는 게 실 운영\n   체인. event-driven skill §Paperclip 적용 패턴에 명시.\n\n### 다음 액션 (보드 사인오프 후)\n\n각 Goal description 에 \"## Event-driven Orchestration (PACAA-146)\"\n섹션 append PATCH (28건). 기존 본문 보존 (audit). 별도\n`request_confirmation` 으로 mass change 사인오프 요청 — 직후 발의.\n\n### 검증\n\nPATCH 적용 + 1주 후 routine 으로 측정:\n* 신규 issue 의 A/B 라벨 비율\n* Goal-level Kill 시점 도달 시 review 행동 vs 자동 fail 처리 비율\n* 자동 wake (parent done) vs 수동 wake 비율\n* 에이전트 idle 시간 변화 (heartbeat 단위)\n"
