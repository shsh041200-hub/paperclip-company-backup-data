        body: "Paperclip API가 이 워크스페이스에서 여전히 네트워크 미접근 상태입니다. 보드에 댓글을 달 수 없어 여기서 직접 답변드립니다.\n\n---\n\n## 보드가 지금 해야 할 것 — 3가지 (순서대로)\n\n### Step 1 — E5 Worker agent key 발급\n\nPaperclip 보드 UI 또는 API로 직접 실행:\n\n```\nPOST /api/agents/6fb76456-5c80-4d8d-bdf8-6325ae2be76d/keys\n{ \"label\": \"cloudflare-worker-e5\" }\n```\n\n응답에서 나온 `key` 값을 PACAA-219 댓글에 붙여넣기 → BE가 `wrangler secret put PAPERCLIP_API_KEY`로 주입\n\n---\n\n### Step 2 — Cloudflare API 토큰 발급 후 댓글에 붙여넣기\n\n1. [Cloudflare 대시보드](https://dash.cloudflare.com/profile/api-tokens) → Create Token\n2. Template: **Edit Cloudflare Workers** 선택 (또는 수동으로 `Workers Scripts: Edit` 권한만)\n3. Zone 설정 불필요\n4. 생성된 토큰 → PACAA-219 댓글에 붙여넣기\n\n→ BE가 즉시 `wrangler secret put PAPERCLIP_API_KEY` + `wrangler secret put WEBHOOK_SECRET` 실행 + Worker 재배포\n\n---\n\n### Step 3 — GitHub Webhook 등록\n\nStep 2 완료 후 BE가 `WEBHOOK_SECRET` 값을 공유드리면, 보드가 GitHub에서 직접 등록:\n\n- `shsh041200-hub/pkging-platform` → Settings → Webhooks → Add webhook\n  - **Payload URL:** `https://pacaa-e5-pr-webhook.rlatjsgur2.workers.dev`\n  - **Content type:** `application/json`\n  - **Secret:** BE가 공유한 값\n  - **Events:** `Pull requests` 만 선택\n\n---\n\n### 체크리스트\n\n| # | 액션 | 담당 |\n|---|------|------|\n| 1 | agent key 발급 → 댓글 붙여넣기 | **보드 지금** |\n| 2 | Cloudflare 토큰 → 댓글 붙여넣기 | **보드 지금** |\n| 3 | GitHub Webhook 등록 | **보드** (Step 2 후) |\n| 4 | `wrangler secret put` × 2 + deploy | BE 자동 |\n| 5 | Test PR → 검증 완료 | BE 자동 |\n\n**Step 1과 2만 PACAA-219 댓글에 붙여넣어 주시면 나머지는 BE가 한 번에 처리합니다.**"
