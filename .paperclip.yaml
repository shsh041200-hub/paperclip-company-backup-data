        body: "## v2 dry-run preview 3종 — 보드 사인오프 검토용\n\nPACAA-311 directive 구현 완료(PACAA-319). 다음 cron 발사부터 보드에 도착할 봇 메시지가 어떻게 보이는지 미리 보여드립니다. 별도 request_confirmation interaction 으로 ✅수락 / ❌반려 받습니다.\n\n---\n\n### 핵심 변경 요약\n\n- **본문 첫 두 줄 강제**: `현재 작업: ...` + `보드님 필요 행동: ...`. 다른 시작 형식은 `TelegramFormatViolation` 으로 발사 전 차단.\n- **`MAX_DOC_CHARS` 1500 → 4000**. 4000자 초과 시 `_part2_*.txt` 로 분리 첨부 (말줄임 안 함).\n- **`...`, `…`, `…(이하 생략)` 모두 금지**. 첨부에서도 동일.\n- **non_actionable 묶음 (in_review 일괄) Telegram 미발사**. 대시보드/이메일 surface 는 그대로, Paperclip0412_bot 만 차단.\n- 인라인 ✅승인/❌반려 버튼, ⭐ 추천 옵션, 답장 원격 명령 — 그대로 유지.\n\n---\n\n### 샘플 1: 승인 클래스 (approval-v2)\n\n```\n[샘플]현재 작업: vendor 데이터 44건이 전화번호·주소 둘 다 비어 있고 사업자 검색에도 잡히지 않습니다. buyer 가 연결할 방법이 없는 레코드여서 화면에서 감추는 것이 안전합니다. 원본 데이터는 30일간 보존되며 언제든 복구 가능합니다.\n보드님 필요 행동: 아래 결정에 ✅승인 또는 ❌반려\n\n제안: 승인 / 거절 (답하기 어려우면 \"잘 모르겠음\" 텍스트로 답해 주세요 — 추가 정보 드려요.)\n근거: 이런 \"연결 불가\" 레코드는 buyer 검색 결과의 노이즈입니다. 1st Priority (buyer 가 vendor 발견·연결) 와 직접 충돌. 또한 SG-1 vendor 등록 정확도 지표를 흐림.\n승인 시:\n1. 44건 vendor 가 화면에서 즉시 감춰져요 (soft-delete).\n2. 원본 데이터는 30일간 백업으로 보존됩니다.\n3. 감사 로그가 자동 작성돼 누가·언제 감췄는지 기록.\n반려 시: 해당 작업 중단.\n상세: PACAA-78\n\n직전 대화: Backend Engineer — 데이터 품질 점수 0.6 미만 44건 식별 완료.\n\n추가하실 말씀이 있으면 이 메시지에 \"답장(Reply)\"으로 적어 주세요. 선택 사항입니다 — 답장은 자동으로 이슈 코멘트로 기록됩니다.\n```\n\n첨부 파일 `PACAA-78_approval_*.txt` 에 더 자세한 배경/위험/권장이 같이 갑니다.\n\n### 샘플 2: 선택 클래스 (choice-v2)\n\n```\n[샘플]현재 작업: 사이트맵(검색엔진에 보내는 페이지 목록)에 vendor 1,031개만 등록되어 있었어요. 실제로는 1,200개 이상이 등록되어야 해서 약 200개가 검색엔진에 안 보였습니다. Backend Engineer 가 제한을 푸는 코드를 짜고 시험 환경에서 6건 검증을 마쳤습니다.\n보드님 필요 행동: 아래 2개 옵션 중 하나 선택\n\n상황: 검색엔진에 안 보이는 vendor 200개는 buyer 가 발견 못 합니다. SG-2 (구글 검색 점유율 2026Q2 30%) 직접 영향. 1st Priority (buyer 가 vendor 발견·연결) 위배.\n1) 지금 적용\n   영향: 30분 내 200개 추가 노출, redirect 테이블은 PACAA-116 종료 후 1회 더 수정\n2) 묶어서 적용\n   영향: PACAA-116 끝날 때까지 약 1주 대기, redirect 테이블 1회 수정\n⭐ 추천: 2\n근거: PACAA-116 redirect 형식 미확정 → 분리 시 테이블 2회 수정 비용. 1주 대기 비용 < 2회 수정 비용.\n상세: PACAA-117\n\n직전 대화: 보드 — \"6건 묶어서 한꺼번에 처리\" 선호 의견 있었음.\n```\n\n### 샘플 3: 자유응답 클래스 (freeform-v2)\n\n```\n[샘플]현재 작업: 시험 환경 배포가 멈춰 있어요. Vercel 토큰이 없어서 SEO 50개 페이지를 운영에 못 올리고 있습니다. 무료 플랜은 사전에 승인되어 있고, 토큰만 있으면 바로 배포돼요.\n보드님 필요 행동: 이 메시지에 답장으로 입력해 주세요\n\n배경: 50개 페이지 본배포가 막히면 SG-2 (구글 검색 점유율) 게이트가 묶입니다. 이번 주 안에 풀어야 5월 점검에 영향 없어요.\n답변 형식: Vercel 토큰 한 줄 (예: vercel_xxxxxxxxxxxx) 또는 .env 파일 내용 그대로 붙여넣기.\n포함할 내용: 토큰 값. 받자마자 .secrets/vercel.env 에 저장하고 텔레그램 화면에서는 가립니다 (보안).\n답하기 어려우면 \"잘 모르겠음\" 또는 \"나중에\" 라고 답장 주세요.\n출처: PACAA-94 deferred row\n\n직전 대화: 보드 — 4/30 PACAA-94 댓글에서 무료 플랜 사전 승인.\n```\n\n---\n\n### 보드님 결정 가이드 (이어 도착할 request_confirmation)\n\n- **수락(✅)** → 다음 cron 발사부터 새 v2 포맷이 실제로 보드 텔레그램에 도착. 첫 실 fire 1건 보드 OK 한 번 더 받으면 PACAA-311 차단 해제 (PACAA-319 follow-up 별도).\n- **반려(❌)** → 어느 부분이 마음에 안 드시는지 한 줄만 적어 주세요 (예: \"근거가 너무 김\", \"✅/❌ 가이드 더 명확히\"). v2 빌더 수정 후 v3 사인오프 재요청.\n- **모르겠음** → 반려 + 사유에 \"잘 모르겠음\" 적어 주세요. 어떤 점이 모호한지 추가 설명 다시 드려요.\n\nv1 샘플 fixture 라인폭 정리는 PACAA-319 에서 CTO 가 별도 처리 중 — 이번 사인오프는 v2 프로덕션 경로만 검토하시면 됩니다.\n"
