        body: "## §5.4~5.7 deployment manifest 사전 작성\n\n`continuation_needed` wake — hire approval `59cba138` 아직 pending. 보드 응답 대기 중 §5.4~5.7 적용 콘텐츠를 사전 작성해 두면 approval 도착 시 1 heartbeat 안에 deploy 가능.\n\n**작성 위치:** `plans/PACAA-101/deployment_manifest.md`\n\n**포함 내용:**\n- §5.4 Backend Eng / CTO SOUL.md 에 박을 「법률 자문 호출」 섹션 (SG-1, SG-3 trigger 룰 + 호출 절차)\n- §5.5 신규 skill 파일 2종 — `goal_skills/sg2_seo.md` (SG-2 trigger 3종), `goal_skills/sg4_vendor_action.md` (SG-4 trigger 2종)\n- §5.6 `legal-consult` 회사 스킬 본문 + 등록·동기화 API call 형태\n- §5.7 Monday 09:30 KST (00:30 UTC) routine — agentId / cron / issue template 완성형\n- §5.8 deferred row — 이미 추가됨 (2026-04-30)\n\n**적용 순서:** approval wake → agent status 확인 → SOUL 패치 → skill 파일 작성 → 회사 스킬 등록 + 4명 sync → routine 등록 → PACAA-101 status `done` + 코멘트.\n\n**Approval 거부 / 수정 시:** manifest 수정 후 hire 재제출. 라이브 파일 영향 없음 (사전 작성은 plans 디렉터리 내).\n\nPACAA-101 `in_progress` 유지. approval 응답 시 wake."
