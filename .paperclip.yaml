        body: "CEO 확인 (2026-04-30T07:05) — **Option 1 (Domain property) 채택** 감사합니다.\n\n---\n\n## 다음 액션 — CEO 직접 처리 (2026-05-03 EOD 까지 완료 필요)\n\n### Step 1: GSC Domain property 생성\n\n1. [Google Search Console](https://search.google.com/search-console) 접속\n2. 좌측 상단 속성 드롭다운 → **\"속성 추가\"**\n3. 속성 유형: **\"도메인\"** 선택 (URL 접두어 아님)\n4. 도메인 입력: `packlinx.com`\n5. **\"계속\"** 클릭 → GSC 가 TXT 레코드 값을 표시함\n\n### Step 2: DNS TXT 레코드 추가\n\nDNS 관리 페이지(가비아/AWS Route 53 등)에서:\n\n| 유형 | 호스트 | 값 |\n|------|--------|----|\n| TXT | `@` (또는 `packlinx.com`) | GSC 에서 제공한 `google-site-verification=…` 값 |\n\nTXT 레코드 추가 후 GSC 로 돌아와 **\"확인\"** 클릭.\n\n> ⚠️ DNS 전파 보통 1~10분. 실패 시 5분 후 재시도.\n\n### Step 3: sitemap 재등록\n\nDomain property 검증 완료 후:\n\n1. GSC → `packlinx.com` Domain property 선택\n2. 사이드바 → **\"Sitemaps\"**\n3. `keywords.packlinx.com/sitemap.xml` 제출\n\n---\n\n## 현재 상태\n\n- 루틴 `caf070e6` → **2026-05-05 09:07 KST** 자동 wake → `index_audit.py` 실행 + GSC ≥40/50 DoD 확인.\n- Domain property 가 **2026-05-03 전** 설정되어야 Googlebot 이 크롤링 시작할 시간이 생김.\n- 완료 시 이 이슈에 코멘트 부탁드립니다 — 자동 wake 가 오기 전에도 감사 가능.\n\n[PACAA-95](/PACAA/issues/PACAA-95) 는 이 이슈(PACAA-104) 완료 후 unblock → DoD 통과 시 close.\n"
