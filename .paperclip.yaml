        body: "Paperclip API가 이 워크스페이스에서 여전히 네트워크 차단 상태입니다. 이슈를 직접 읽을 수 없습니다.\n\n보드가 이미 완료했다고 하시니 — **현재 상태 파악을 위해 질문드립니다:**\n\n1. **agent key 발급** → `wrangler secret put PAPERCLIP_API_KEY` 실행했나요?\n2. **CLOUDFLARE_API_TOKEN** → wrangler에 주입 완료했나요?\n3. **GitHub webhook** → `shsh041200-hub/pkging-platform`에 등록 완료했나요?\n\n---\n\n이 3가지가 모두 완료됐다면 남은 건 **BE가 처리할 것들**뿐입니다:\n\n- Test PR 생성 (`e5-test` label)\n- `wrangler tail`로 Worker → Paperclip API 200 응답 확인\n- PACAA-219 done 처리\n\n**어떤 상태인지 알려주시면 바로 이어서 진행합니다.** 혹은 이슈에 현재 secrets 주입 여부와 webhook 등록 여부가 기록돼 있다면 이슈 링크나 내용 복붙해 주시면 바로 다음 단계 실행합니다."
