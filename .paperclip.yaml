        authorAgentSlug: "ceo"
        authorType: "agent"
        body: "# P2.5 50 키워드 후보 리스트 v1 — 보드 사인오프 요청\n\n## TL;DR\n\n8개 우선 카테고리 (PACAA-77 분모) × buyer-intent 모디파이어 mix로 **48개 카테고리 키워드 + 2개 head 키워드 = 50개** 도출. 사인오프 시 P2.5 (programmatic SEO 50 랜딩 페이지) 즉시 unlock. 트래킹 이슈: PACAA-82.\n\n## 키워드 도출 원칙\n\n1. **buyer intent 우선** — head term(예: \"패키징\")보다 transactional term(예: \"골판지 박스 제작 업체\") 비중↑\n2. **8 카테고리 균등 배분** — 각 6개씩 = 48 + cross-category 2 head = 50\n3. **모디파이어 mix** — 제작·제조·인쇄·도매·OEM·견적·업체·추천 단어를 카테고리에 맞게 배치\n4. **벤치마크 참조** — Packhelp KR, noissue, Thomasnet 한국어 검색 패턴 + 다나와·엠파크 카테고리 어휘\n5. **현실적 경쟁 제약** — 솔로 운영 + SG-2 6주 시한 고려, head term 2개로 제한 (long-tail 48개에 자원 집중)\n\n## Cross-category Head (2)\n\n1. 패키징 업체\n2. 포장 업체 추천\n\n## 카테고리별 6개 (8 × 6 = 48)\n\n### 1. corrugated_box (골판지 박스) — coverage 88.8% ✅\n3. 골판지 박스 제작\n4. 종이 박스 인쇄\n5. 택배 박스 제작 업체\n6. 골판지 상자 도매\n7. 박스 OEM 제작\n8. 골판지 박스 견적\n\n### 2. flexible_packaging (연포장)\n9. 연포장 제작\n10. 파우치 제작 업체\n11. 비닐 포장지 인쇄\n12. 식품 파우치 제작\n13. 알루미늄 파우치 제작\n14. 연포장 OEM\n\n### 3. glass_metal_container (유리·금속 용기)\n15. 유리병 제작 업체\n16. 화장품 유리 용기\n17. 알루미늄 캔 제작\n18. 금속 용기 제조\n19. 식품 유리병 제작\n20. 화장품 용기 OEM\n\n### 4. label_sticker (라벨·스티커)\n21. 라벨 인쇄 업체\n22. 스티커 제작\n23. 화장품 라벨 인쇄\n24. 식품 라벨 스티커\n25. 투명 라벨 인쇄\n26. 라벨지 제작 업체\n\n### 5. packaging_accessories (포장 부자재)\n27. 포장 부자재 도매\n28. 에어캡 도매\n29. PP밴드 도매\n30. 박스 테이프 도매\n31. 완충재 도매\n32. 포장 비닐 도매\n\n### 6. packaging_machinery (포장 기계)\n33. 포장 기계 제조\n34. 자동 포장 기계\n35. 충진기 제조 업체\n36. 진공 포장기\n37. 라벨 부착기\n38. 박스 제함기\n\n### 7. plastic_container (플라스틱 용기)\n39. 플라스틱 용기 제작\n40. PET 용기 제조\n41. 화장품 플라스틱 용기\n42. 식품 플라스틱 용기\n43. 플라스틱 용기 OEM\n44. 플라스틱 통 제작\n\n### 8. printing_postprocess (인쇄·후가공)\n45. 패키지 인쇄 업체\n46. 인쇄 후가공 업체\n47. UV 인쇄 업체\n48. 박 인쇄 (foil)\n49. 엠보싱 인쇄\n50. 옵셋 인쇄 업체\n\n## 의도적 선택 (보드 검토 포인트)\n\n1. **head term을 2개만 둔 이유** — \"패키징\"·\"포장\"은 단일 단어로 검색량은 크지만 intent가 다양(B2C 포함). 솔로 운영으로 head term 경쟁을 이기긴 어렵고, long-tail로 vendor density 매칭이 더 정확함. Thomasnet·Capterra 패턴.\n2. **카테고리별 균등 6개** — 현재 vendor density가 낮은 카테고리(예: printing_postprocess 1.7%)도 동등 배분. SEO 트래픽이 카테고리별 vendor 등록 유인이 되어 SG-1과 양의 피드백.\n3. **모디파이어 \"추천\" / \"비교\"는 1개만** — 한국 buyer는 \"추천\" 검색을 많이 쓰지만 SEO 경쟁도 살벌. v1에선 head term 1개만 채우고 P2.5 결과 보고 추가.\n4. **\"OEM\" / \"도매\"** — 정확 buyer intent 단어. v1에 의도적 포함.\n5. **누락한 카테고리 변형** — 골판지의 \"골판지 상자\" vs \"골판지 박스\" 같은 동의어는 우선 1개만, P2.5 구현 단계에서 Search Console 데이터로 추가 결정.\n\n## 사인오프 시나리오\n\n- **(A) 전부 승인** → P2.5 구현 즉시 시작 (Backend SSR/MDX). 50 페이지 scaffold + 1차 indexing.\n- **(B) 일부 수정 후 승인** → 보드가 변경 키워드를 댓글로 명시 → CEO 반영 → request_confirmation v2.\n- **(C) 구조 자체 거부** (예: head 비중 늘리기, 카테고리 우선순위 재조정) → CEO 재작성.\n\n기본값: **A 권장**. v1 list는 카테고리 균형 + buyer-intent 비중을 의도적으로 설계했고, 실제 트래픽 데이터(Search Console)는 P2.4 완료 후 1~2주 내 들어오므로 v2에서 정밀 조정 가능.\n\n## 검증 / 사후 보강 계획\n\n- P2.4 (PACAA-81, Search Console 연결) 완료 후 1주 indexing 데이터 확보\n- v1 50 키워드의 실제 impression / click → 저성과 키워드 식별\n- v2: 저성과 5~10개를 새 후보로 교체 (Naver Keyword Planner 데이터 기반) → 보드 사인오프\n- 6주 SG-2 마일스톤 (점유율 40%) 달성도 측정\n\n## 보드 사인오프 옵션\n\n다음 댓글로 회신 부탁:\n- **\"승인\"** — 50개 그대로 P2.5 unlock\n- **\"수정: [키워드 번호] → [대체 키워드]\"** — 부분 수정 후 승인\n- **\"재작성\"** — v1 구조 재검토 필요\n"
