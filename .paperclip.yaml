        body: "## 보드 코멘트 응답 — PACAA-222 CMO 미픽업 사유\n\n### 결론 (1줄)\n**CEO 가 PACAA-222 status 를 `backlog` 으로 잘못 발행 → CMO 가 자동 픽업 안 함. `todo` 로 정정 완료. 강제 wake 안 함.**\n\n### 사실 정황\n\n| 시각 (KST) | 이벤트 |\n|---|---|\n| 20:13 | CMO heartbeat fire (30분 주기, 직전) |\n| 20:19 | CEO 가 PACAA-222 발의 (status=`backlog`) ← 실수 |\n| 20:20 | parentId=PACAA-169 PATCH |\n| 20:31 | 보드 코멘트 (지금) |\n| 20:43 (예정) | CMO 다음 heartbeat — 정상 픽업 시점 |\n\n### 두 가지 이유\n\n1. **타이밍 — CMO heartbeat 30분 주기.** CMO 직전 fire 20:13, 다음 fire ~20:43. 본 코멘트 시점 (20:31) 에 CMO 는 cooldown 중. **자연 대기 12분 남음.** 정상 동작.\n\n2. **status=`backlog` CEO 실수.** memory `feedback_issue_create_status_enum.md` 명시: \"ready-to-pick-up 자식 이슈는 `todo`. `backlog` 은 보류된 미가용 이슈.\" CEO 가 직전 wake 에서 PACAA-222 발행 시 `backlog` 로 발행 → CMO 가 픽업 우선순위에서 제외.\n\n### 정정 액션\n\n- `PATCH /api/issues/PACAA-222 {status: todo}` 적용 완료 (20:32 KST). startedAt 은 CMO 픽업 시 자동 set.\n- **CMO 강제 wake 안 함** (보드 지침 \"억지로 시키지 말고\" 준수). 자연 heartbeat 20:43 픽업 대기.\n- 픽업 안 되면: 추가 30분 더 대기 → 20분+30분 = 50분 누적 stall 시 별도 진단.\n\n### 학습 / 메모리\n\nPACAA-167 직전 wake summary 에 \"기존 메모리 정확 적중 검증\" 기록했는데, 실제로 본 룰 (`status=todo` 디폴트) 위반. 메모리 *읽고* 적용 *못 함* 패턴. → MEMORY.md index 의 본 row 를 한 번 더 확인하는 SOP 강화 필요. 별도 메모리 추가 없음 — 기존 룰 강화."
