        body: "# 옵션 A 초보자 가이드 — CF Registrar 에서 신규 도메인 등록\n\n먼저: $10/yr 비용을 처음에 명확히 안 띄운 점 죄송합니다. 다음부터는 비용 제안 시 첫 줄에 \"이거 ${X} 듭니다\" 부터 적겠습니다.\n\n## 보드가 할 일 (총 3 단계, ~5분)\n\n### Step 1. CF Registrar 에서 도메인 검색\n\n1. https://dash.cloudflare.com 로그인\n2. 왼쪽 사이드바 맨 아래쪽 **\"Domain Registration\"** (또는 \"도메인 등록\") 클릭\n3. **\"Register Domains\"** 또는 **\"도메인 등록\"** 탭 클릭\n4. 검색창에 다음 중 하나 입력 후 검색:\n   - **`packlinx-api.com`** ← CEO 추천 (브랜드 일관성 + 가장 저렴)\n   - 만약 위 도메인 누가 가져갔으면 (지금은 비어있음 확인): `packlinxapi.com`, `paperclip-api.dev`, `pkx-api.com` 순으로 시도\n\n### Step 2. 결제\n\n1. 검색 결과에 도메인이 \"Available\" 상태로 나오면 가격 확인:\n   - .com 도메인: 보통 **$10.44/yr** 정도\n   - .dev 도메인: 보통 **$11.50/yr** 정도\n2. **\"Purchase\"** 또는 **\"Add to Cart\"** 클릭\n3. 결제 정보 입력 (이미 카드 등록되어 있으면 한 번에 진행)\n4. **\"Complete Purchase\"** 또는 **\"Place Order\"** 클릭\n5. 등록 완료 확인 — 보통 30초 ~ 1분 안에 완료 (\"Domain successfully registered\" 메시지)\n\n### Step 3. 등록한 도메인명 코멘트로 알려주기\n\nPACAA-190 에 다음과 같이 짧게 코멘트:\n\n```\n등록 완료: packlinx-api.com\n```\n\n(실제 등록한 도메인명) 끝.\n\n---\n\n## 그 다음은 BE 가 자동 처리\n\n보드 코멘트 도착 → BE wake → 다음 자동 진행:\n\n1. CF 대시보드에서 zone 자동 생성 확인 (CF Registrar 등록 시 자동)\n2. Cloudflare Tunnel `paperclip-api` 의 Public Hostname 추가:\n   - subdomain: `paperclip-api`\n   - domain: `packlinx-api.com` (보드가 등록한 도메인)\n   - service: `http://127.0.0.1:3100`\n3. cloudflared local config 도 새 hostname 으로 갱신\n4. CF Worker `wrangler.toml` 의 `PAPERCLIP_API_URL` 새 값으로 변경\n5. Worker redeploy\n6. HTTPS probe 검증 (`curl https://paperclip-api.packlinx-api.com/api/health`)\n7. 통과 시 PACAA-190 close + Phase 2 카나리 게이트 후속 트리거\n\n예상 BE 작업 시간: 5분 (보드 코멘트 후 한 번에 처리, 추가 보드 액션 없음).\n\n---\n\n## 막히는 부분\n\n- **Step 1 \"Domain Registration\" 메뉴 안 보임:** CF 계정 결제 정보 미등록 상태일 가능. 좌측 \"Manage Account\" → \"Billing\" 에서 카드 등록 후 다시.\n- **Step 1 검색 결과 \"Not available / Already registered\":** 추천 도메인 후순위 시도. 그래도 다 막히면 본인이 원하는 다른 이름으로 검색 (예: `packlinx-infra.com`, `pakingo-api.com` 등). 인프라용 (사용자 노출 X) 이라 brand 부담 없음.\n- **Step 2 결제 거부:** 카드 한도 / 해외 결제 제한 가능. 다른 카드 시도 또는 나중에 재시도.\n- **Step 3 등록 후에도 BE 가 zone 못 찾음:** CF 등록 후 ~5분 propagation 필요할 수 있음. 재시도 자동 분기됨.\n\n---\n\n*요약: dash.cloudflare.com → Domain Registration → `packlinx-api.com` 검색 → 결제 → 코멘트로 도메인명 알려주기. 끝.*"
