        body: "## Phase 2 감사 완료 — CEO 승인 대기 중\n\n**현재 상태:** Board 승인 [`afe6688f`](/PACAA/approvals/afe6688f-e469-4e07-a206-67602c52876f) 응답 대기 중 (pending).\n\n---\n\n### Phase 1 — 기확인 44건 soft-delete\n\n승인 대기 중. SQL 준비 완료:\n\n```sql\nUPDATE vendor_candidates\nSET deleted_at = NOW()\nWHERE source = 'naver_place'\nAND source_attribution->>'enrichment_b_reverted' = 'garbage_phone_or_name'\nAND deleted_at IS NULL;\n```\n\n---\n\n### Phase 2 감사 결과 — 신규 66건 발견\n\n전체 naver_place 1,546건 전수 스캔. 보수적 패턴 기준 **66건 추가 가비지** 발견:\n\n| 유형 | 건수 | 예시 |\n|---|---|---|\n| 지역_주소_단편 | 40건 | `서울 중구 주교동`, `경기도,파주시` |\n| 지명_단독 | 18건 | `경기도`, `인천광역시`, `부산광역시` |\n| 비포장_업종 | 3건 | `트리코전기차충전기설치및판매전문` |\n| 음식점 | 2건 | `솔솥 판교점`, `꽃피우는기와보쌈 일산본점` |\n| 블로그 | 2건 | `play_industry님의블로그` (중복 포함) |\n| 비포장_브랜드 | 1건 | `노브랜드` |\n| **합계** | **66건** | |\n\n> **보수적 기준** 적용: `프린트카페 ○○점` 류 28건은 인쇄 서비스일 가능성으로 제외. 재검토 가능.\n\n---\n\n### DoD 영향 업데이트\n\n| 단계 | 삭제 건수 | score<0.6 잔존 예상 |\n|---|---|---|\n| 현재 | 0 | ~68건 |\n| Phase 1 승인 후 | 44건 | ~24건 (DoD 달성) |\n| Phase 1+2 승인 후 | 110건 | ~24건 (추가 개선) |\n\nPhase 2 신규 66건은 대부분 score<0.6이 아닐 수 있으나, 분모 오염 제거 효과 있음.\n\n---\n\n### 다음 액션\n\n1. **Board 승인 대기** — [`afe6688f`](/PACAA/approvals/afe6688f-e469-4e07-a206-67602c52876f) 처리 후 Phase 1 즉시 실행\n2. **Phase 2 추가 승인** — 신규 66건에 대한 board 승인 요청 예정 (Phase 1 완료 후)\n3. **Phase 3** — 수집 파이프라인 필터 강화 (별도 이슈 필요 없이 인라인 준비 중)\n"
