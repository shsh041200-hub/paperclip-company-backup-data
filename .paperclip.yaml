        body: "## 지적 인지 — 형식 v1.1 보강\n\n**한 줄 결론: 보드 지적 맞음. 어제 디지스트는 코멘트 제목 자체가 \"Daily Board Digest\"였고 \"in_progress\", \"Blocked\", \"Next\", \"(substantive only)\", \"no change\", \"umbrella\", \"epic\" 같은 영어 잔재 다수. 사양 v1에 코멘트 제목 + 누락 용어 추가했음.**\n\n### 보강 내용\n\n**1. 제목까지 한국어 강제.**\n- 일일: `## 일일 보드 보고 — YYYY-MM-DD (KST)` (\"Daily Board Digest\" 금지)\n- 주간: `## 주간 점검 — YYYY-MM-DD (KST)` (\"Stale & Blocked Sweep\" 금지)\n\n**2. 용어집 추가:** Daily Board Digest → 일일 보드 보고 / Stale & Blocked Sweep → 주간 점검 / no change → 변동 없음 / umbrella → 묶음 이슈 / epic → 대형 작업 / owner → 담당자 / substantive only → 핵심만.\n\n**3. 본문 섹션 헤더도 한국어:** \"어제 완료\" / \"오늘 진행 중\" / \"가로막힌 이슈\" / \"보드 결재 대기\" / \"정리\".\n\n### 견본 A 재작성 (영어 잔재 0)\n\n> ## 일일 보드 보고 — 2026-04-29 (KST)\n>\n> **한 줄 결론: 오늘 보드가 직접 할 일은 없음.** PACAA-34 가로막힘은 외부(Vercel) 응답 대기 중, 결재 대기도 없음.\n>\n> #### 보드 액션\n>\n> 없음. PACAA-34 풀리는 것만 모니터하면 됨 (CTO가 처리).\n>\n> #### 어제 완료 (핵심만)\n>\n> - 거버넌스/조직: [PACAA-25](/PACAA/issues/PACAA-25) Goal 트리 사인오프, [PACAA-28](/PACAA/issues/PACAA-28) Backend Engineer 채용, [PACAA-12](/PACAA/issues/PACAA-12) CTO 재채용.\n> - SG-1 (분모/카테고리): [PACAA-26](/PACAA/issues/PACAA-26) 카테고리 8종 확정, [PACAA-30](/PACAA/issues/PACAA-30) 분모 산출 시스템 (대형 작업) 진척, [PACAA-38](/PACAA/issues/PACAA-38) vendor 수집 (대형 작업) 진척.\n> - SG-3 (측정): [PACAA-27](/PACAA/issues/PACAA-27) Plausible 셋업 + 1주차 계획 승인.\n>\n> #### 오늘 진행 중 (에이전트가 알아서)\n>\n> - [PACAA-34](/PACAA/issues/PACAA-34) Plausible Day 0 — Vercel DNS TXT 처리 후 CTO가 도메인 검증 마무리 중.\n> - [PACAA-30](/PACAA/issues/PACAA-30) / [PACAA-38](/PACAA/issues/PACAA-38) 대형 작업 계속 진행.\n>\n> #### 가로막힌 이슈\n>\n> - [PACAA-34](/PACAA/issues/PACAA-34) — Vercel 응답 대기. 풀어줄 사람: Vercel 지원팀.\n>\n> #### 보드 결재 대기\n>\n> 없음.\n>\n> #### 정리\n>\n> 다음 발사: 내일 09:00 KST. 변동 없으면 \"오늘 할 일 없음\" 한 줄로 끝.\n\n### 적용\n\n다음 09:00 KST 일일 보고 발사부터 위 형식 (제목 \"## 일일 보드 보고 — ...\" 시작, 본문 섹션 헤더 한국어, 모든 영어 시스템 용어 치환). 주간 점검은 다음 월요일부터 동일.\n\n사양 갱신: `runs/board_report_format_v1.md`. 메모리: `feedback_routine_report_format_v1.md`."
