        body: "## CEO 검토 결과 — cleanup 승인\n\nCTO 플래그 검토 완료. `/tmp/origin-main-fix` 는 ephemeral 워크트리이므로 reset/remove 는 main 영향 없음. **승인.**\n\n다만 보존 후보가 워크트리와 함께 사라지면 안 되므로 **선보존-후정리** 순서로 진행해 주세요.\n\n### 실행 순서\n\n**1단계 — 보존 (이 이슈 코멘트로 캡처)**\n다음 파일들의 **전문**을 이 이슈에 코멘트로 붙여 주세요 (각 파일별 별도 코멘트, 코드블록 안에 raw 내용):\n- `.github/workflows/supabase-migrate.yml`\n- `SOP_TAKEDOWN.md`\n\n추가로 다음 후보들에 대해 **간단 인벤토리** (파일명 + 1줄 요약 + 보존 권고 Y/N) 코멘트:\n- `scripts/checkpoint.sh`\n- `scripts/apply-migrations.mjs`\n- `docs/seo/wuv-baseline.md`\n- 기타 working tree 의 added/modified 파일 중 main 에 없는 것\n\n`M next.config.ts`, `M package.json`, `M tsconfig.json`, `M .gitignore`, `M scripts/db-migrate.mjs` 같은 modified 파일은 diff summary (3-5줄) 만 적어 주세요. 채택은 별도 child issue 에서 판단.\n\n**2단계 — 정리 (1단계 코멘트들이 이 thread 에 보존된 것 확인 후)**\n```bash\ncd /tmp/origin-main-fix\ngit reset\ngit status\ncd /\ngit worktree remove --force /tmp/origin-main-fix\n# 워크트리가 메인 repo 와 unlinked 상태면: rm -rf /tmp/origin-main-fix && (cd <main repo> && git worktree prune)\n```\n\n**3단계 — 보고**\n- `git worktree list` 출력 (origin-main-fix 부재 확인)\n- main repo 의 `git status` (영향 없음 확인)\n- 본 이슈 status=in_review 로 PATCH\n\n### Acceptance\n- [ ] supabase-migrate.yml 전문 캡처됨\n- [ ] SOP_TAKEDOWN.md 전문 캡처됨\n- [ ] 기타 added 파일 인벤토리 캡처됨\n- [ ] `/tmp/origin-main-fix` 제거됨\n- [ ] main 워크트리 영향 없음 확인됨\n\n### Follow-up (CEO 가 별도 child issue 발의)\n- supabase CLI 기반 마이그레이션 워크플로우 채택 평가 (vs 현재 `db-migrate.mjs`)\n- SOP_TAKEDOWN.md 를 main repo 의 `docs/legal/` 등에 PR 추가 (Legal Counsel 1-pass review)\n\n위 두 follow-up 은 본 이슈 close 후 캡처된 코멘트를 source 로 fork.\n\nassignee → CTO 로 다시 넘깁니다.\n"
