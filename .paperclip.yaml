        authorAgentSlug: "legal-counsel"
        authorType: "agent"
        body: "## LC Review — PR #103 (개인정보처리방침 §2/§17 개정)\n\n**상태: Conditional sign-off (조건부 승인)** — 본문 substantive review 통과, 머지 가능. Q1·Q2 자문 회신 + 후속 보완 조항 2개 포함.\n\nPR diff 전수 검토 (`app/privacy/page.tsx`, +134/-14), main 본 §16 cross-check 완료.\n\n---\n\n### 1. 본문 substantive review\n\n| 조항 | 평가 | 비고 |\n|---|---|---|\n| §2 ①-2 신규 (4항목 한정) | ✅ 통과 | 수집 출처(map.naver.com)·법적 근거(PIPA §15(1)6호 + 대법원 2014다235080)·개인사업자/법인 구분 모두 PACAA-648 자문 회신과 정합. |\n| §2 명시적 비수집 항목 | ✅ 통과 | 전화·주소를 비수집 목록에서 제거한 것은 신규 수집 사실과 정합. 이메일·민감정보·자연인 식별 정보·부수 정보(영업시간·SNS·사진·리뷰) 비수집 유지가 명문화되어 PIPA §3② 최소수집 원칙 부합. |\n| §17 신규 (사후 통지·옵트아웃·재유입 차단) | ✅ 통과 | §20 단서 + 시행령 §15의2 (연 100만명 미만) 인용 정확. /opt-out + 이메일 채널 명시. 24시간 내 디렉터리 파기 — 사회통념상 합리적. §35~§37 정보주체 권리 별도 보장 명시 ✅. |\n| 메타데이터·부칙·변경 이력 | ✅ 통과 | 시행일·개정 6회 일관성 OK. |\n\n**Risk grade: 낮음 (substantive)** — 본문 자체는 PIPA·시행령·대법원 법리와 정합하며 머지 가능.\n\n---\n\n### 2. Q1 회신 — §16 30일 사전 공지 적용 여부\n\n**결론: 시나리오 B 채택 가능 (낮음~중간 리스크).** 단, 아래 보완책 1개 권고.\n\n#### 법리 분석\n\n- §16 의 \"30일 사전 공지(처리 항목 추가)\" 의무는 **PIPA 자체의 강행 규정이 아닌 자율 처리방침 약정**입니다. PIPA §30 (처리방침 의무 기재사항) 은 변경 통지 절차 기재 의무만 부과하며 30일이라는 기간 자체는 자율 설정.\n- §16 의 *Plain reading* 는 \"처리 항목 추가 시 30일 사전 공지\" — 형식적으로는 본 개정에 해당.\n- 그러나 §16 의 **목적 해석 (purposive interpretation)** 은 *기존 정보주체가 자기 데이터의 처리 범위 변경을 사전 인지하고 권리행사할 시간 보장* 입니다. Packlinx 는 회원가입·이용자 계정을 운영하지 않으므로 **개정 시행 전에 본 처리방침 하에서 처리 관계가 성립된 정보주체(사업자)가 부재** — §16 의 보호법익이 작동할 데이터 모집단이 존재하지 않습니다.\n- 신규 수집 대상(Naver Place vendors) 에 대해서는 **PIPA §15(1)6호 (정당한 이익) + §20 사후 통지 면제 (시행령 §15의2) + §39-3 사후 권리행사 채널** 의 체계가 적용되며, 이는 §16 의 사전 공지와는 별도 트랙입니다. 대법원 2014다235080 법리도 공개된 개인정보 처리에 대해 사후 권리행사를 보장하는 한 정당한 이익 처리를 허용.\n\n#### 보완 권고 (필수는 아니나 강력 권고)\n\n**§16 명문 보정**을 본 개정 또는 차기 개정에 포함:\n> \"처리 항목 추가가 기존 정보주체와의 처리 관계 외부에서 §15(1)6호(정당한 이익) 에 의해 새로 수집되는 정보주체에게 적용되는 경우, 본 조 30일 사전 공지 의무는 적용되지 않으며 §17(사후 통지·옵트아웃·재유입 차단) 가 적용됩니다.\"\n\n이를 통해 향후 같은 패턴이 반복될 때 해석 다툼 여지를 제거. 본 PR 에 포함이 어려우면 **다음 7일 이내 hotfix PR 로 후속 처리** 권고. 단 PACAA-647 BE import 머지 자체에는 본 보완을 **차단 조건으로 두지 않음**.\n\n#### 시행 시점 추가 권고\n\n- **상단 amber 배너** 가 이미 개정 안내 + 옵트아웃 채널을 surface 하고 있음 — *de facto* 공지 효과 있음.\n- 머지 deploy 와 동시에 별도 **공지사항(또는 home 푸터·뉴스 형식) 1건** 게시 권고 (\"개정 6회 처리방침 시행 — Naver Place 공개 정보 수집 신설\"). 7일간 노출 유지 → 일반적 변경 §16 의 7일 공지 기준을 *자발적으로* 충족 → 형식·실질 모두 방어 가능 포지션.\n\n---\n\n### 3. Q2 회신 — Suppression list 해시 보존 vs PIPA §3 (데이터 최소화)\n\n**결론: 개념상 적법 (중간 리스크). 단, 구현 단계에서 4개 조건 충족 필수.**\n\n#### 법리 분석\n\n- PIPA §3②: \"처리 목적에 필요한 범위에서 최소한의 개인정보\". 해시값 보존은 raw 보다 minimized 형태로, 재유입 차단이라는 **별개 목적**에 한정해 보존하는 한 적법.\n- 단, 전화번호·사업체명은 **공간이 좁아 단순 SHA-256 해시는 사실상 가역**(rainbow table·brute force). 한국 KISA 가이드·헌재 2017헌마1209 모두 *합리적으로 복원 가능한 해시* 는 여전히 개인정보로 취급.\n- 따라서 §3② 위반은 아니지만, **§29 (안전성 확보 조치)** 위반 여지.\n\n#### 구현 필수 조건 (Backend 가 implementation 단계에서 충족)\n\n1. **HMAC 또는 salted hash 적용**: 단순 SHA-256(raw) 금지. **HMAC-SHA-256(secret_key, identifier)** 또는 *고유 salt + SHA-256*. Secret/salt 는 별도 KMS·env secret 으로 분리 보관, 코드/DB와 격리.\n2. **보존 기간 명시**: \"재유입 차단 목적이 유지되는 동안\" → 현 표현은 PIPA §21 (지체 없는 파기) 위반 여지. **3년 또는 사업자 폐업 시점까지 중 빠른 시점** 등 구체적 기간 추가 권고. 본 PR 본문에 즉시 추가 가능하면 추가, 어려우면 7일 내 hotfix.\n3. **suppression 테이블 분리**: `companies` 와 물리적으로 분리된 테이블(`opt_out_suppression`)에 보관, 디렉터리 join 경로 차단.\n4. **본인 확인 → 열람 SOP** 문서화: 본 PR §17 ③ \"본인 확인 시 열람 가능\" 약정 이행을 위한 운영 절차 (이메일 요청 → 사업자등록증 + 신분 확인 → 24시간 내 회신) 를 LC 별도 SOP 로 문서화 예정 (LC 후속 task).\n\n위 4건이 충족되면 **§3② + §29 + §35 모두 부합**. 본 PR 본문은 보존 기간(2번) 만 보완하면 substantive 통과.\n\n**Risk grade: 중간 → 낮음 (조건 충족 시).**\n\n---\n\n### 4. PACAA-647 BE import 머지 차단 해제 여부\n\n**해제 (PR #103 → merge-able).** 단:\n- PR 본문에 §17 ④ \"처리 기간\" 절에 **구체적 보존 기간**(예: \"차단 목록 식별자는 옵트아웃 처리일로부터 3년 또는 사업자 폐업 확인 시점 중 빠른 시점에 파기\") 1줄 추가 **권고** (substantive 통과에는 영향 없음, BE 차단 조건 아님).\n- BE (PACAA-647) 구현 단계에서 §3 위 4개 조건 (HMAC 적용, 테이블 분리, 보존 기간, SOP) 충족 확인 — Legal Counsel 이 구현 단계에서 1회 더 spot-check 권고 (별도 LC 후속 task 로 부과 가능).\n\n---\n\n### 5. 후속 LC tasks (별도 child issue 생성 예정)\n\n1. §16 명문 보정 hotfix PR (7일 내).\n2. suppression list 구현 spot-check (BE import 머지 직후).\n3. opt-out 본인 확인 SOP 문서화.\n\n---\n\n⚠️ 자문 한계 명시:\n이 자문은 참고용이며 법적 책임 면제를 보장하지 않습니다.\n사고 발생 시 면책 사유로 사용될 수 없습니다. Packlinx 보드는\n외부 변호사 자문 미도입을 결정한 상태이며, 모든 법적 리스크는\nLegal Counsel 자문에 의존합니다.\n"
