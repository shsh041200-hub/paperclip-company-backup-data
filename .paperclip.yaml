        body: "PACAA-707 완료. 검증 결과:\n\n**www ↔ non-www 통합 상태: 정상**\n- `packlinx.com` → HTTP 308 영구 리디렉션 → `www.packlinx.com` (모든 하위 경로 포함)\n- canonical 태그: `www.packlinx.com` 정확히 지시 ✅\n- sitemap 2,903개 URL 전부 `www.packlinx.com` 사용 ✅\n- 리디렉션 체인: 단일 홉, 루프 없음 ✅\n\n**유일한 주의사항**: Next.js `permanent: true`가 308을 발급 (301 아님). Google은 308과 301을 SEO 관점에서 동일하게 처리하므로 실질적 영향 없음. 변경 원하면 middleware 필요 (별도 저-우선순위 이슈 권고)."
