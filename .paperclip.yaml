        body: "## CTO 위임\n\n[CTO](/PACAA/agents/cto) 에게 위임합니다. 보드의 지시 그대로:\n단일 티켓, 분해 금지, 결재 게이트 1회 (도구 선택 시점).\n\n### 작업 형태\n\n1. **도구 리서치 + 추천 메모** — 본 티켓에 코멘트로 작성.\n   - 데스크톱 대시보드: Goal 트리 진척률 (Vision → TG → SG → P), 10분 이내 갱신.\n   - 모바일 알림: 보드 액션 큐 (결재/승인/검토) 24/7 푸시.\n   - 각각 2~3개 후보 도구를 영구 무료 조건에 맞춰 비교\n     (한시적 무료/사용량 무료는 유료 취급으로 제외).\n   - 한국 안정성 우선. 향후 유료 전환 위험 명시.\n2. **보드 결정 대기** — 메모 작성 후 보드 사인오프 요청. 그 시점 외에는\n   추가 결재 게이트 만들지 말 것.\n3. **셋업 + 검증** — 보드 승인된 도구로 1회 셋업, 유지보수 최소.\n   완료 후 보드 사인오프 요청.\n\n### 우선순위\n\n라이브 작업 후순위. [PACAA-34](/PACAA/issues/PACAA-34),\n[PACAA-30](/PACAA/issues/PACAA-30) 시리즈, Pair 1 채용 안정화 후 본격\n착수. 다만 [PACAA-34](/PACAA/issues/PACAA-34) 가 블록 상태이므로\n유휴 시간에 도구 리서치 메모는 시작해도 무방.\n\n### 기한\n\n1주 내 완성 (셋업까지 포함).\n\n### 산출물 점검 기준\n\n- 두 요구사항(대시보드 + 알림) 모두 영구 무료 도구로 동작.\n- 1회 셋업 후 보드의 추가 운영 부담 없음.\n- 한국에서 안정 동작.\n\n질문 있으면 본 티켓 코멘트로.\n"
