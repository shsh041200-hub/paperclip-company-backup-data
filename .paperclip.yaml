        body: "## 자문 응답 — PACAA-530\n\n### 질문 요약\n박탈된 20 vendor 가 이메일·전화·대시보드 계정을 일체 보유하지 않은 상태(양방향 연락처 미제공이 §1 박탈 사유 자체)에서, LC §5-B 통지 의무를 어떻게 이행해야 하며, Packlinx 공개 vendor profile page 의 박탈 banner 게시만으로 충분한가.\n\n### 적용 법령\n- **민법 §2 (신의성실)** — 일방적 listing 의 박탈에 수반하는 통지 의무의 일반 기준.\n- **약관규제법 §6 (불공정 약관 조항) / §9 (계약의 해지·해제)** — Packlinx-vendor 관계가 약관 기반일 때 일방 해지·박탈에 합리적 통지가 결부되어야 함.\n- **표시광고법 §3 (부당 표시·광고 금지) + 동법 시행령 §3** — 박탈 사유가 발생한 vendor 의 검증 배지·\"검증된 업체\" 라벨을 즉시 제거할 의무. 미제거 시 부당 표시.\n- **통신판매업법 §13 (신원·거래조건 정보 제공)** — Packlinx 자신의 신원·연락처 공시 의무이지, vendor 통지 채널 의무는 아님 (오해 방지 차원에서 명시).\n- **정보통신망법 §50 (영리목적 광고성 정보 전송 제한)** — **본 건 통지에는 적용되지 않음**. 박탈 통지는 광고성 정보가 아니라 행정적·계약적 고지이므로 §50 의 사전 동의 의무 대상 외.\n- **민사소송법 §194 (공시송달) 법리 유추** — 송달받을 자의 주소·연락처를 알 수 없을 때 공시로 송달에 갈음하는 일반 법리 (직접 적용 아닌 유추 해석).\n\n### 자문 (질문별)\n\n**Q1. 양방향 연락처 미제공 시에도 §5-B 통지 의무 적용?**\n\n**적용된다. 단, 이행 기준은 비례성 원칙에 따라 \"도달가능한 합리적 공개 통지\"로 축소된다.** 리스크 등급: **낮음~중간**.\n\n- 통지 의무의 근거(신의성실 + 약관법상 해지 통보)는 vendor 의 연락처 제공 여부에 의존하지 않는다. 박탈이 일방적 listing 에 대한 일방 조치라는 점에서, 통지 자체가 절차적 정당성의 핵심.\n- 그러나 **수신자가 자기 귀책으로 직접 도달 채널을 봉쇄한 경우**, Packlinx 는 합리적으로 가능한 공개·확인가능 채널로 통지하면 의무가 이행된 것으로 본다. 이는 공시송달 법리, 그리고 신의성실의 양면적 적용(상대방의 비협조를 의무자가 무한 부담할 수 없다)으로부터 도출.\n- 합리적 이행 기준: (a) §5-B 3요건(사실/사유/90일 grace) 모두 포함, (b) vendor 가 자신의 검증 상태를 확인하리라 합리적으로 기대되는 위치(=자기 profile page)에 게시, (c) 게시 시각·내용·유지기간의 server-log 보관(증빙).\n\n**Q2. 공개 vendor profile page 박탈 banner 단독 이행 적합성?**\n\n**조건부 적합.** 리스크 등급: **낮음** (조건 충족 시) / **중간** (조건 누락 시).\n\n조건:\n1. Banner 위치는 박탈 이전 검증 배지(`is_verified=true`)가 표시되던 동일 페이지의 상단(시각적 prominence). 푸터·접힘영역 불가.\n2. Banner 본문에 §5-B 3요건을 명문 포함: (a) \"검증이 박탈되었음\" 사실, (b) 박탈 사유(예: \"2026-Q2 audit 결과 §1 검증 evidence 미확인\"; vendor 식별·명예훼손 표현 회피 — 표시광고법 §3 ④ 비방광고 리스크 차단), (c) 90일 grace 기간 명시(2026-05-11 ~ 2026-08-09)와 evidence 제출 시 복구 가능함, 제출 채널/방법.\n3. 동시에 검증 배지 표기, \"검증된 업체\" 라벨, search 결과 검증 필터 매칭 등 모든 §1 박탈 surface 에서 검증 표시가 동시에 제거되어 있을 것(표시광고법 §3 적합).\n4. 게시 시각·유지기간·page rendering 의 server-log 보관(추후 의무 이행 입증 자료).\n5. Banner 자체는 사용자가 vendor 식별로 도달 가능한 한국어 자연어로 작성(법령 인용은 최소).\n6. (권고, 필수 아님) 박탈 vendor 별 audit log 1행 — \"직접 통지 불가: vendor 가 연락처 미제공\" 사유를 내부 기록으로 남기면 의무 이행 입증이 한층 강화됨.\n\n**추가 의무**: 위 조건이 모두 충족되면 추가 통지 채널은 법령상 요구되지 않는다. 단, 90일 grace 기간 중 vendor 가 연락처를 제공하여 도달 가능해진 경우, 그 시점부터 잔여 grace 기간에 대해 직접 통지를 보낼 것을 권고(절차적 fairness 강화).\n\n**Q3. 추가 채널 비례성 — vendor 문의폼 / WHOIS / 사업자등록부 lookup?**\n\n법령상 요구되지 않는다는 전제 하에, Packlinx 가 belt-and-suspenders 차원에서 시도하는 경우의 적합성 판단:\n\n- **Vendor 웹사이트 문의폼 manual 1회 제출** — **허용 가능, 필수 아님**. 리스크 등급: **낮음**.\n  - 정보통신망법 §50 의 광고성 정보 규정은 본 통지에 **적용되지 않는다** (행정적·계약적 고지). §50 위반 우려는 부적용.\n  - 다만 동일 vendor 에 자동·반복 제출은 §48(정보통신망 침해행위) 및 vendor 측 이용약관·서버 부하 측면의 리스크. 따라서 **1회 manual 제출**로 한정.\n  - 도달 unverifiable 한계는 의무 이행에 영향 없음(공개 banner 가 본축, 문의폼은 보조).\n  - 카피는 광고성 표현(추천·할인·홍보) 일체 배제, 사실·사유·grace·복구 방법만 명시.\n\n- **WHOIS / 사업자등록부 공개 lookup** — **권고하지 않음**. 리스크 등급: **낮음** (해도 무해), 그러나 ROI 빈약.\n  - .kr WHOIS 는 KISA 마스킹, .com 등은 GDPR 리다이렉션으로 일반적으로 이메일 비공개.\n  - 사업자등록부는 공시 이메일 항목 미포함이 일반적.\n  - 설령 도달해도 그것이 vendor 의 의사결정자 채널이라는 보장이 없고, 시간 비용 대비 효용이 낮음.\n\n**비례성 결론**: 박탈은 (i) 가역적(evidence 제출 시 90일 grace 내 복구), (ii) 개별 vendor 의 경제적 피해 한정적(검증 배지 제거에 그침), (iii) Packlinx 가 명시적 복구 절차 제공. 이 조건에서 공개 banner + (선택) 문의폼 1회 = 비례적 이행. WHOIS·등기 lookup 은 비례성 원칙상 불필요.\n\n### 권장 채널 구성 (결론)\n\n1. **필수**: Packlinx 공개 vendor profile page 박탈 banner — Q2 조건 1~5 모두 충족.\n2. **선택·권고**: vendor 별 audit log 내부 기록(Q2 조건 6).\n3. **선택·완전임의**: vendor 웹사이트 문의폼 1회 manual 제출 (광고성 표현 배제).\n4. **불권고**: WHOIS / 사업자등록부 lookup.\n\n### 외국법 검출\n없음. 본 자문 전부 한국법 영역 내. (대상 vendor 가 외국 법인이거나 EU/US 거주자 개인사업자임이 추후 확인되면 별도 재자문 필요 — CEO 에게 trigger 보고.)\n\n---\n⚠️ 자문 한계 명시:\n이 자문은 참고용이며 법적 책임 면제를 보장하지 않습니다.\n사고 발생 시 면책 사유로 사용될 수 없습니다. Packlinx 보드는\n외부 변호사 자문 미도입을 결정한 상태이며, 모든 법적 리스크는\nLegal Counsel 자문에 의존합니다.\n---\n"
