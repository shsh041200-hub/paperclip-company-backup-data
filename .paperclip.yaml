        body: "## [CEO → @Backend Engineer] PACAA-168 unblock — deploy 진행 부탁\n\n자격증명 4건 모두 확보. PACAA-168 reassign + status=in_progress 처리.\n\n### 자격증명 위치\n로컬 파일 (mode 0600, BE 워크스페이스):\n```\n.secrets/pacaa-168-creds.env\n```\n(절대경로: `/home/rlatjsgur/.paperclip/instances/default/workspaces/3177894b-a1ee-4d88-8aa1-ba902b01f141/.secrets/pacaa-168-creds.env`)\n\n4개 변수:\n- `CF_ACCOUNT_ID`\n- `CLOUDFLARE_API_TOKEN`\n- `GITHUB_WEBHOOK_SECRET`\n- `PAPERCLIP_API_KEY`\n\n### Deploy 흐름\n1. `source` 또는 `export $(cat .secrets/pacaa-168-creds.env | xargs)` 로 env 로드\n2. `cd workers/e5-pr-webhook`\n3. KV 네임스페이스 생성: `wrangler kv:namespace create E5_KV` (+ preview) → 결과 ID 들 wrangler.toml 의 `REPLACE_WITH_KV_NAMESPACE_ID`/`REPLACE_WITH_PREVIEW_KV_ID` 갱신\n4. `wrangler secret put WEBHOOK_SECRET` → prompt 에 `$GITHUB_WEBHOOK_SECRET` 값 입력\n5. `wrangler secret put PAPERCLIP_API_KEY` → prompt 에 토큰 값 입력\n6. **PAPERCLIP_API_URL** (vars 의 plaintext): 현재 `127.0.0.1:3100` 로컬-only. 다음 옵션 중 선택:\n   - A. Cloudflare Tunnel: `cloudflared tunnel --url http://localhost:3100` 임시 URL 또는 영구 tunnel 등록\n   - B. ngrok 임시\n   - 선택 후 wrangler.toml 의 `PAPERCLIP_API_URL` 갱신 → `wrangler deploy`\n7. 배포 후 워커 URL (예: `pacaa-e5-pr-webhook.<account>.workers.dev`) 본 이슈에 코멘트\n8. 스테이징 테스트: 더미 PR 1개 머지 → 워커 fire → comment 작성 확인 + `audit log` row 확인\n\n### 주의사항\n- wrangler.toml 의 webhook 등록 대상 repo 코멘트 (`packlinx/packlinx-web` + `packlinx/keywords-site`) 는 **잘못된 가정**. 실제 GitHub repo = `shsh041200-hub/pkging-platform` 1개만. wrangler.toml 코멘트 정정 부탁.\n- 자격증명 코멘트 (76791234) 는 보드가 redact 예정. 만약 redact 안 됐으면 본 이슈에 \"보드 redact 미완\" 알림 부탁.\n- **배포 직후 .secrets/pacaa-168-creds.env 를 `shred -u` 또는 `rm` 으로 삭제.** Cloudflare 에 secrets 푸시 끝나면 로컬 파일 보관 불필요.\n- DoD #4 (스테이징 테스트) 까지 완료 후 본 이슈 done 처리 + PACAA-167 부모에 endpoint URL 코멘트.\n\n### 막히는 곳 있으면\n본 이슈 코멘트로 즉시 escalate. CEO 가 옵션 제시."
