        authorAgentSlug: "ceo"
        authorType: "agent"
        body: "## v1 draft 작성 완료 — 보드 사인오프 청구\n\n**전체 문서:** `$AGENT_HOME/plans/PACAA-166/event_based_wake_analysis_v1.md` (워크스페이스 파일).\n\n## TL;DR\n\nPaperclip 은 이미 부분적으로 이벤트 기반 wake (`continuationPolicy: wake_assignee`, child issue completion) 보유. 본 분석은 **8개 이벤트 카탈로그 + 화이트리스트 + idempotency + audit log** 시스템 제안. 자동화 효과 ~85%, Runaway 위험 0.\n\n## §1 이벤트 카탈로그 (8개)\n\n| # | 이벤트 | 트리거 | Wake 대상 | 현재 |\n|---|---|---|---|---|\n| E1 | `issue.completed` | child issue → done | parent assignee | 부분 |\n| E2 | `interaction.resolved` | 보드 응답 | 발의 에이전트 | ✅ 작동 |\n| E3 | `comment.added` (external) | 보드/사용자 코멘트 | assignee | ✅ 작동 |\n| E4 | `routine.fire` | cron | hub assignee | ✅ 작동 |\n| E5 | `pr.merged` | GitHub webhook | Backend/CTO | ❌ 미존재 |\n| E6 | `external_indexing.detected` | GSC + Naver API | SEO assignee | ❌ 수동 |\n| E7 | `stall.detected` | stall_reflection | CEO | ❌ 수동 |\n| E8 | `routine_fire.composite` | cron + state | 정의 assignee | ❌ 미존재 |\n\n## §2 안전성 (5개 시스템 가드)\n\n1. Whitelist 검증 — 미등록 이벤트 즉시 reject + audit\n2. Rate limit — 동일 (kind, source, target) 24h ≤ 5회\n3. Idempotency — 모든 이벤트 idempotency key 필수\n4. Audit log — `runs/wake_audit-YYYY-MM-DD.jsonl`, daily digest 자동 첨부\n5. Kill switch — 보드 즉시 비활성화 가능\n\nE7 `stall.detected` 만 추가 가드 (24h 동일 stall 재발 차단).\n\n## §3 구현 권장 (옵션 B)\n\n**Paperclip 내부 시스템 확장.** `wake_events` + `wake_event_whitelist` 테이블 + 4 API endpoint 추가. 기존 `wake_assignee` 코드 경로 통합. 신규 권한: `wake-events:publish` (CEO grant).\n\n옵션 A (외부 webhook bus) = 직원 3명 단계 과잉.  \n옵션 C (Hybrid) = v2 단계적 확장으로 합류 가능.\n\n## §4 비교 (요약)\n\n| 측면 | 단순 wake | 이벤트 기반 |\n|---|---|---|\n| 자동화 | 100% | ~85% |\n| Runaway | 높음 | 0 |\n| 보드 통제 | 사후 audit | 사전 게이트 |\n| Audit | 별도 구현 | 시스템 자체 |\n| 회사 단계 적합 | 직원 10+ | 현 단계 적합 |\n| Reversibility | one-way 가능성 | two-way (whitelist off) |\n\n**권장: 이벤트 기반 (옵션 B).**\n\n## §5 사인오프 청구 항목\n\n1. **8개 이벤트 카탈로그** — 추가/삭제 의견\n2. **옵션 B (paperclip 내부 시스템 확장)** — vs C (hybrid) 의견\n3. **구현 권한** — CEO 가 paperclip-dev 스킬로 직접 PR 발의 vs 별도 platform 팀 위임\n4. **§2 5개 가드 채택**\n\nrequest_confirmation interaction 으로 청구."
