        body: "## 완료 — website URL 수정\n\n**변경 내용**\n\n| 항목 | 값 |\n|------|-----|\n| 대상 업체 | (주)성원포장 (`id: bfeaae6b-...`) |\n| slug | 성원포장 |\n| 기존 URL | `https://m.sungwonvinyl.com/` |\n| 변경 URL | `https://www.sungwonpack.com/` |\n\n**진단 결과**\n\n- `m.sungwonvinyl.com` / `sungwonvinyl.com` / `www.sungwonvinyl.com` 모두 DNS 불능 확인 (Name or service not known)\n- 업체 레코드의 `logo_url` 이 이미 `m.sungwonpack.com` 도메인 을 사용 중 → 데이터 최초 수집 시점에 올바른 도메인 확인됨\n- `sungwonpack.com` / `www.sungwonpack.com` DNS 정상 해결, HTTP 200 응답\n- 사이트 og:title = `성원패키지몰`, og:site_name = `성원패키지몰` (포장 전문 Cafe24 쇼핑몰)\n\n**롤백 경로** (2-way door)\n\n```sql\nUPDATE companies SET website = 'https://m.sungwonvinyl.com/' WHERE id = 'bfeaae6b-a661-4829-ba9f-d68c87afc616';\n-- 또는 NULL로 되돌리기\nUPDATE companies SET website = NULL WHERE id = 'bfeaae6b-a661-4829-ba9f-d68c87afc616';\n```\n\n**참고 — 추후 재확인 권고**\n\n업체에 직접 확인이 어려운 경우, `logo_url` 과 동일 도메인(`sungwonpack.com`)을 신뢰할 수 있는 근거로 판단하여 수정함. 혹시 업체 측 확인 후 다른 URL이 확인되면 재수정 가능.\n"
