        body: "## 완료 — Phase 3 발굴 6 키워드 채택, v1.2-final 50/50\n\n### 방법\n\nPACAA-91 의 21 xlsx 풀 (3,304 연관키워드) 을 두 카테고리 head-term + B2B modifier 필터로 재마이닝. 외부 API (DataLab/pytrends) 호출 불필요 — 기존 xlsx 데이터에서 더 깊은 필터링으로 충분히 도출됨.\n\n핵심 변경: **포장기계·자동화 카테고리는 head term 자체가 B2B intent** (consumer 가 검색하지 않는 산업기계, 예: 진공포장기 / 실링기 / 밴딩기) 이므로 modifier 없이도 채택. 유리·금속은 modifier 필수 유지.\n\n### 채택 6 키워드\n\n| slot | keyword | category | vol | comp |\n|---|---|---|---|---|\n| G01 | 유리병 도매 | 유리·금속 용기 | 140 | high |\n| G02 | 유리병 구매 | 유리·금속 용기 | 60 | high |\n| G03 | 캔음료 제작 | 유리·금속 용기 | 90 | high |\n| G04 | 진공포장기 | 포장기계·자동화 | 15,790 | medium |\n| G05 | 실링기 | 포장기계·자동화 | 7,650 | medium |\n| G06 | 자동테이핑기 | 포장기계·자동화 | 910 | high |\n\n총 vol 합계 24,640. 모두 vol≥50 + B2B intent + Naver Search Ads 측정값 (추정 아님).\n\n### 카테고리 분포 (v1.2-final, 50/50)\n\n| 카테고리 | v1.1 | v1.2 |\n|---|---|---|\n| 골판지·종이박스 | 9 | 9 |\n| 라벨·스티커 | 8 | 8 |\n| 연포장재 | 7 | 7 |\n| 인쇄·후가공 | 6 | 6 |\n| 플라스틱 용기·병 | 6 | 6 |\n| 포장 부자재 | 6 | 6 |\n| 유리·금속 용기 | 1 | **4** (+3) |\n| 포장기계·자동화 | 1 | **4** (+3) |\n| **합계** | 44 | **50** |\n\n### 산출물\n\n- 슬레이트: `plans/pacaa91_v1_2_final.csv` (50/50)\n- 후보 풀: `plans/pacaa91_phase3_candidates.csv` (81 mined)\n- 마이닝 스크립트: `plans/pacaa91_phase3_mine.py`, `plans/pacaa91_apply_phase3.py`\n- 픽 사유: `plans/pacaa91_phase3_picks.csv`\n- 플랜: [PACAA-82 plan v1.2-final](/PACAA/issues/PACAA-82#document-plan) (rev `19cad3a2`) §12.7~12.10 추가\n\n### 보드 사후 검토 포인트\n\n- G04 진공포장기 (vol 15,790) 는 가정용/업소용 양쪽 의도 혼재 — 랜딩에서 vendor 리스트 + B2B CTA 로 산업용 트래픽 흡수 가능. P44 (진공포장기 가격) 와 head/modifier 페어로 SERP 다중 점유.\n- G03 캔음료 제작 은 \"음료캔 OEM\" 의도 — 금속용기 vendor 가 우리 DB 에 충분한지 §6.2 vendor density 재실행 시 확인 필요. <3 매칭이면 fallback 템플릿.\n\n### DoD\n\n1. ✅ 6 키워드 후보 csv (vol + 카테고리 + intent)\n2. ✅ PACAA-82 plan §12 v1.2 패치\n3. ✅ PACAA-93 / PACAA-94 full unblock 알림 게시 예정 (다음 액션)\n"
