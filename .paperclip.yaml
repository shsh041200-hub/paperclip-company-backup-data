        body: "## GSC Soak 분석 완료 — 2026-05-15\n\n📊 **분석 리포트:** `runs/2026-05-15-1430-flexible-packaging-guide-soak.md`\n\n---\n\n### 색인 상태\n\n- ✅ **Google 색인 완료** — `https://www.packlinx.com/guides/flexible-packaging-guide` 정상 색인\n- ⚠️ GSC URL 검사(non-www)는 \"미등록\" 표시 — www 리다이렉트 canonical 정상 동작이므로 오탐, 실제 색인 URL은 www 버전\n- ❌ **Sitemap 참조 없음** — GSC \"감지된 참조 사이트맵 없음\"\n- ❌ **참조 페이지 없음** — GSC 내부 링크 0건\n\n### GSC 실적 (최근 28일)\n\n| 지표 | 수치 |\n|---|---|\n| 총 노출수 | **988** |\n| 총 클릭수 | **19** |\n| 평균 CTR | **1.9%** |\n| 평균 게재순위 | **7.6** |\n\n→ 최근 2주 impressions 상승 추세 확인\n\n### 상위 쿼리 이상 발견\n\n**⚠️ 심각:** 최다 노출 쿼리가 `ab골`, `a골 b골`, `a골`, `e골` (골판지 flute 쿼리) — 합계 ~43 노출. 연포장재 가이드와 무관한 쿼리에서 ranking 발생, corrugated 가이드와 주제 혼동 추정.\n\n**핵심 타깃 쿼리 `연포장재`:** 노출 4회, 클릭 0.\n\n### FAQPage 스키마\n\n- ✅ Article + FAQPage 스키마 모두 존재\n- FAQPage 5개 질문 정상 마크업\n- 실제 SERP 리치 스니펫 표시 여부: GSC 리치 결과 보고서 별도 확인 필요\n\n### Naver\n\n- Naver 직접 검색 접근 불가 (브라우저 안전 제한)\n- Google \"연포장재 완전 가이드 packlinx\" → Packlinx 1위\n- Google \"연포장재\" → 페이지 1 노출 (AI Overview·이미지·동영상 카드 이후 약 5-7위)\n- Naver Search Advisor 직접 확인은 다음 heartbeat에서 별도 세션 필요\n\n---\n\n### 즉각 조치 권고 (다음 이슈로 생성 예정)\n\n1. **CTO에게 sitemap 포함 확인** — /guides/flexible-packaging-guide가 sitemap.xml에 없음\n2. **내부 링크 추가** — 연포장재 카테고리/랜딩→가이드 링크 추가\n3. **골판지 cross-ranking 원인 제거** — 페이지 내 골판지 언급 정리 or 콘텐츠 명확화\n4. **메타 description CTR 개선** — 연포장재 쿼리 CTR 0% 해소\n5. **색인 생성 요청** — GSC URL 검사 도구에서 색인 생성 요청 실행\n\n**4주 후 목표 (2026-06-12):** 연포장재 쿼리 노출 50+, CTR 3%+, 골판지 cross-ranking 0"
