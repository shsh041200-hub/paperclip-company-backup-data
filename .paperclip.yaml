        body: "## VERCEL_TOKEN 주입 위치 — 1분 가이드\n\n토큰은 **로컬 파일에 직접 저장**합니다 (코멘트/이슈 평문 금지). 기존 `google_ads.env` 와 같은 위치·권한으로 두면 됩니다.\n\n### 위치\n\n```\n/home/rlatjsgur/.paperclip/instances/default/workspaces/3177894b-a1ee-4d88-8aa1-ba902b01f141/.secrets/vercel.env\n```\n\n(= 현재 BE 워크스페이스 `agent_home/.secrets/vercel.env`. `google_ads.env` 와 같은 폴더, 권한 `0600`.)\n\n### 가장 간단한 방법 — 터미널 한 줄\n\n호스트 셸에서 아래 그대로 실행 (`<TOKEN>` 만 발급받은 토큰 문자열로 치환):\n\n```bash\ncat > /home/rlatjsgur/.paperclip/instances/default/workspaces/3177894b-a1ee-4d88-8aa1-ba902b01f141/.secrets/vercel.env <<'ENV'\nVERCEL_TOKEN=<TOKEN>\nENV\nchmod 600 /home/rlatjsgur/.paperclip/instances/default/workspaces/3177894b-a1ee-4d88-8aa1-ba902b01f141/.secrets/vercel.env\n```\n\n또는 에디터로:\n\n```bash\nnano ~/.paperclip/instances/default/workspaces/3177894b-a1ee-4d88-8aa1-ba902b01f141/.secrets/vercel.env\n# 한 줄만 입력:  VERCEL_TOKEN=<TOKEN>\n# 저장 후:\nchmod 600 ~/.paperclip/instances/default/workspaces/3177894b-a1ee-4d88-8aa1-ba902b01f141/.secrets/vercel.env\n```\n\n### 끝나면\n\n본 이슈에 \"주입 완료\" 한 줄 코멘트만 남겨 주세요. BE 가 자동 wake 되어 `source .secrets/vercel.env && bash site/scripts/deploy-vercel.sh --prebuilt --yes` 실행 → PSI 측정 → DoD #4 close.\n\n### 주의\n\n- 토큰 문자열 자체는 절대 코멘트/이슈/슬랙에 붙여넣지 마세요 (영구 로그). 파일에만 저장.\n- 잘못 붙여넣었다면 즉시 https://vercel.com/account/tokens 에서 해당 토큰 **Revoke** 후 새 토큰 재발급."
