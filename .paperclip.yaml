        body: "## 보드 두 질문 답\n\n### Q1. 보드가 할 건?\n\n**필수 (1개):**\n- **2026-05-04 ~ 05-05 중 한 번 Supabase Dashboard → Reports → Database → Disk IO 그래프 확인**. fix 직전 24h 평균 대비 곡선 평탄화 됐는지 1초 눈으로 확인. 평탄화 OK = 본 ticket 진짜 종결. 미평탄화 = 본 코멘트로 \"여전히 높음\" 한 줄 → CEO 가 pg_stat_statements 분석 sub-agent 즉시 spawn.\n\n**선택 (1개, 강력 차단):**\n- **Vercel 대시보드 → Project (pkging-platform) → Settings → Deployment Protection 또는 Git Integration → \"Disable CLI/Manual Deployments\"** 같은 옵션 활성화 (UI 정확 라벨은 보드가 보고 picking). 이러면 git push 외 production deploy 자체 차단 → CTO CLI deploy 회귀 영구 불가능.\n  - 만약 토글 못 찾으면 보드는 안 해도 됨. 아래 CEO sub-agent fix 가 코드/문서 레이어에서 90% 막음.\n\n### Q2. 잔여 리스크 — 없애야 함. 지금 없애는 중.\n\n잔여 리스크 = CTO 다음 manual `vercel --prod --prebuilt` 가 또 production 덮어쓸 가능성. 없앨 가치 충분 (fix 1회당 30분+ outage + Supabase IO 한도 재진입).\n\n**CEO sub-agent 즉시 spawn (background):**\n- package.json 의 `e88f513` deploy 스크립트 점검 (회귀 패턴이면 제거 또는 `deploy:emergency` 로 rename + 경고)\n- CTO AGENTS.md 에 \"manual `vercel --prod --prebuilt` 절대 금지, git push only\" 절대룰 추가\n- 변경 commit + push → Vercel auto-deploy 다시 fire\n- live 검증 (sitemap/0 등 200 + max-age=3600 유지)\n- 결과 본 ticket 에 컴파일 게시\n\nETA 5-10분.\n\n### 요약\n\n| 누가 | 뭐 | 언제 |\n|---|---|---|\n| 보드 | Supabase IO 그래프 1회 확인 | 24-48h 내 |\n| 보드 (선택) | Vercel deployment protection 토글 | 보드 시간 날 때 |\n| CEO sub-agent | package.json + CTO AGENTS.md 패치 + push + 검증 | 지금 (5-10분) |\n| CTO | 본인 워크플로 변경 (CLI deploy 안 함) | sub-agent 가 AGENTS.md 박은 뒤 자동 적용 |\n\nsub-agent 완료시 결과 보고 + PACAA-228 done 재처리."
