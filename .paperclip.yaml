        body: "## v2 plan — 결정 3 추가 분석 + PACAA-146 paradigm 관계\n\n**전체 문서:** `$AGENT_HOME/plans/PACAA-166/event_based_wake_analysis_v2.md`.\n**보드 v1 부분 사인오프 반영:** E1~E7 채택 / E8 deferred (deferred_items.md row 추가, 백스톱 2026-08-01) / Option B / 5 가드 — 모두 v2 에 반영 완료.\n\n---\n\n## ① 결정 3 — Option 1 vs 2 vs 3 비교\n\n| 측면 | Option 1 (CEO paperclip-dev PR) | Option 2 (platform 팀) | Option 3 (외부 우회) |\n|---|---|---|---|\n| 자동화 효과 (vs v1 ~85%) | ~85% | ~85% | ~75% (-10~15pp) |\n| Paperclip 본체 코드 변경 | 大 | 大 | **0** |\n| Reversibility | one-way door 가능 | 동일 | **two-way door** |\n| One-way door 위험 | 中-高 | 동일 | **0** |\n| 외부 시스템 관리 부담 | 0 | 0 | 中 (~1h/월) |\n| PACAA-115 (wake/terminate 플랫폼 거절) 일관성 | ⚠ 깨뜨림 | ⚠ 깨뜨림 | **✅ 유지** |\n| Solo-operated 적합 | △ | △ (가상 팀 미존재) | **○** |\n\n## ② Option 3 자동화 효과 감소 정량 (월간)\n\n- 월 추정 fire ~140건 → Option B/1 약 140 자동, Option 3 약 135 자동 + 5건 lag/누락.\n- 보드 수동 wake 환산: v0 (10/주) → Option B (1/주) → **Option 3 (1.5/주)**. 둘 다 v0 대비 -85%.\n- **결론: 자동화 효과 감소 -10~15pp 는 수용 가능 범위.**\n\n## ③ 외부 관리 부담 vs Option 1 one-way door 위험\n\n| 차원 | Option 1 | Option 3 | 차이 |\n|---|---|---|---|\n| 초기 구축 | ~10~15h | ~8h | Option 3 -5h |\n| 월간 유지 | 0 | ~1h | Option 1 +1h/월 |\n| 사고 expected loss | ~3~7h | ~0.05h | Option 3 -3~7h |\n| Reversibility | one-way | two-way | Option 3 |\n| PACAA-115 일관성 | 깨뜨림 | 유지 | Option 3 |\n\n**Break-even ~3~5개월.** 그 이전에는 Option 3 우위 명확.\n\n## ④ CEO 추천: **Option 3 + 1~2개월 soak 후 재고**\n\n사유: (1) PACAA-115 일관성, (2) two-way door reversibility, (3) -10~15pp 자동화 감소 수용 가능, (4) solo-operated 적합, (5) 1~2개월 후 데이터 기반 Option 1 재고 가능.\n\n**Phase 1 (~2주):** 외부 worker (E5) + paperclip routine 2~3개 (E6, E7) 구축, 5 가드 외부 강제.\n**Phase 2 (1주 카나리):** E5 만 활성화.\n**Phase 3 (1~2개월 soak):** 운영 데이터 수집.\n**Phase 4 (재고):** soak 결과로 Option 1 재제안 여부.\n\n---\n\n## ⑤ PACAA-146 paradigm 과의 관계 (보드 신규 질문)\n\n**같은 스택의 다른 계층, 중복/충돌 0.**\n\n| 계층 | 시스템 | 출력 | 적용 시점 |\n|---|---|---|---|\n| L1: 의미 (Semantic) | PACAA-146 | dueAt vs trigger 선택, Category A/B 라벨링 | 작업 정의 시 |\n| L2: 런타임 (Runtime) | PACAA-166 | 정의된 trigger 가 실제 발화하면 자동 wake | trigger 충족 시 |\n\n- **개념 중복:** 0. 같은 단어 \"트리거\" 사용하지만 146=정의, 166=발화 메커니즘.\n- **artifact 중복:** 0. 146=skill+SOUL 섹션, 166=카탈로그+worker+audit log.\n- **충돌:** 0. 146 이 trigger 를 명시 → 166 이 받아 발화. 정확히 정합.\n- **gap:** 0 (E8 deferred 제외, 7개 카탈로그가 146 의 주요 trigger 패턴 포괄).\n- **상호 보완:** 강함. 146 없으면 166 가 처리할 trigger 가 의미 있게 정의 안 됨. 166 없으면 146 의 trigger 는 보드 수동 발화 의존.\n- **순서:** 146 먼저 (의미) → 166 후 (런타임). 현재 진행 정확.\n\n## ⑥ 사인오프 청구 — v2\n\n1. **결정 3 권장: Option 3** (외부 우회 hybrid) + 1~2개월 soak 후 재고.\n2. **§7 paradigm 관계** — 같은 스택 다른 계층, 중복/충돌 0 진단 채택.\n\nrequest_confirmation interaction (idempotencyKey `confirmation:PACAA-166:plan:v2`) 으로 청구."
