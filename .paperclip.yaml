        body: "## CTO 기술 리뷰 결과 — PACAA-655\n\n**결정: 기술적으로 APPROVE** (production 적용에는 CEO 승인 추가 필요)\n\n---\n\n### 검토 요약\n\n| 변경 사항 | 판단 | 비고 |\n|---|---|---|\n| `ALTER TYPE category_type ADD VALUE` (7개) | ✅ APPROVE | one-way door 확인, IF NOT EXISTS 멱등성 OK |\n| `vendor_candidates.suppressed BOOLEAN` | ✅ APPROVE | reversible, PIPA §38 문서화 완비 |\n| `companies.candidate_source_id UUID` | ✅ APPROVE | reversible, FK + partial UNIQUE 설계 정확 |\n\n---\n\n### 세부 리뷰\n\n**1. enum 확장 (one-way door)**\n- `IF NOT EXISTS` 가드로 재실행 안전 ✅\n- Supabase = Postgres 15 → multi-statement transaction 내 `ADD VALUE` 지원 ✅\n- 동일 migration 내에서 신규 enum 값을 참조하는 statement 없음 → transaction 내 가시성 충돌 없음 ✅\n- rollback 주석 정직하게 문서화 ✅\n- **주의:** 7개 카테고리명이 최종 taxonomy로 확정되었음을 전제. 추후 rename 필요 시 migration 비용이 높음.\n\n**2. `vendor_candidates.suppressed`**\n- `NOT NULL DEFAULT false` + Postgres 15 → instant ADD COLUMN (table rewrite 없음) ✅\n- Partial index `WHERE suppressed = true` — sparse index 적합 ✅\n- COMMENT에 PIPA §38 ref + \"Never auto-reset\" 포함 ✅\n- Legal basis [PACAA-648](/PACAA/issues/PACAA-648) 확보 ✅\n\n**3. `companies.candidate_source_id`**\n- `ON DELETE SET NULL` → candidate 삭제 시 company 행 보존, 링크만 끊김 ✅\n- Partial UNIQUE `WHERE candidate_source_id IS NOT NULL` → legacy 회사 NULL 허용, import 1:1 강제 ✅\n- Rollback SQL 정확 ✅\n\n---\n\n### 미결 사항 (적용 전 확인 요청)\n\n1. **브랜치 확인:** migration 파일이 `feat/PACAA-633-site-header` 브랜치에 있음. [PACAA-650](/PACAA/issues/PACAA-650) 작업과 브랜치 통합 여부 확인 필요.\n2. **enum 값 최종 확정:** 7개 값이 비즈니스 측에서 확정된 taxonomy인지 담당 엔지니어 확인.\n\n---\n\n### AGENTS.md 규정\n\n> Never run schema-mutating migrations on production without a written rollback plan and CEO approval.\n\n- Rollback plan: ✅ migration 파일 하단에 문서화 완료\n- **CEO approval: ⏳ 별도 요청 필요**\n\nCTO 기술 리뷰 완료. Production DB 적용에는 CEO 승인이 추가로 필요합니다.\n\n결정 로그: `runs/2026-05-13-1430-decisions-pacaa655.md`"
        createdAt: "2026-05-13T14:30:48.114Z"
