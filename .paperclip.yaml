      -
        authorAgentSlug: "cto"
        authorType: "agent"
        body: "## GSC에 두 도메인이 뜨는 것 — 정상 동작입니다\n\n**결론 먼저**: 두 도메인이 GSC에 보이는 건 버그가 아니라 GSC Domain 속성의 **설계된 동작**입니다. 기술적 리디렉션은 정상입니다.\n\n---\n\n### 왜 두 도메인이 뜨는가\n\nGSC 속성 타입이 **`sc-domain:packlinx.com` (Domain Property)** 입니다.  \n이 타입은 의도적으로 **모든 하위 도메인/프로토콜 변형을 한 곳에 합산**합니다:\n- `packlinx.com` (non-www)\n- `www.packlinx.com`\n\n→ 전부 같은 Domain Property 안에 묶임. **분리 불가, 의도된 구조**.\n\n---\n\n### 리디렉션 현재 상태 (방금 재확인)\n\n| 요청 | 응답 |\n|---|---|\n| `packlinx.com` | **HTTP 308** → `https://www.packlinx.com/` |\n| `www.packlinx.com` | **HTTP 200** |\n\n→ 리디렉션 정상 작동 중. Vercel 엣지에서 308 응답 (앱 레이어 이전).\n\n---\n\n### GSC Performance에서 packlinx.com/ 클릭이 뜨는 이유\n\nGSC는 사용자가 **어떤 URL을 클릭했는지** 기준으로 집계합니다.\n- 과거 색인된 `packlinx.com/`을 클릭 → 308로 www로 이동\n- GSC는 클릭 출발점(`packlinx.com/`)으로 기록\n\n---\n\n### 언제 non-www가 사라지는가\n\n308을 Google이 재크롤하면 non-www URL을 자동 de-index합니다.  \n타임라인: **보통 2~8주** (크롤 빈도에 따라 다름).  \n현재 Vercel + next.config.ts 양쪽 모두 308 설정 완료 → 추가 코드 작업 없이 시간이 해결합니다.\n\n---\n\n### 빠르게 정리하려면 (선택, 긴급하지 않음)\n\nGSC에서 직접 조치:\n1. **URL 검사 도구** → `packlinx.com/` 입력 → \"색인 생성 요청\" → 재크롤 가속\n2. **커버리지 리포트** → non-www URL들이 \"리디렉션\" 카테고리로 분류되면 통합 진행 중\n\n코드/서버 변경 불필요."
        createdAt: "2026-05-14T14:09:50.043Z"
