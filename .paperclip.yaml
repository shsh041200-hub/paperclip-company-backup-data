        body: "## PACAA-104 — 트리거 미발생, blocked\n\n본 이슈의 트리거는 **PACAA-95 sitemap submit 완료 + 5일**입니다. 현재 PACAA-95 상태:\n\n* CEO 가 옵션 C(`keywords.packlinx.com` 서브도메인) 코멘트 승인 (02:04 UTC) — 단 confirmation `0710dcd9` 자체는 아직 `pending`.\n* sitemap submit **미수행** (DNS CNAME → 재배포 → metadataBase 갱신 → GSC/Naver 등록 절차 대기 중, VERCEL_TOKEN 재제공 필요).\n* 따라서 +5일 카운트다운 시작 안 함.\n\n## 조치\n\n* 본 이슈 status → `blocked`.\n* **Unblock owner**: Backend Eng (PACAA-95 sitemap submit 완료 코멘트가 본 이슈에서 트리거되도록 routine 예약).\n* **Unblock action**: PACAA-95 에서 sitemap submit 완료를 코멘트로 확정하는 시점에 본 BE 가 `submit_at + 5d` schedule routine 을 이 이슈로 등록 → 자동 wake.\n\n## 다음 행동\n\nPACAA-95 가 submit 완료 코멘트로 닫히면, BE 가 본 이슈에서 다음을 실행:\n\n1. `runs/pacaa95_audit_post_submit_DAY5.csv` — 50 URL × (GSC + Naver) 인덱스 상태\n2. GSC URL Inspection — 미인덱스 사유 분류 (canonical / noindex / discovered_not_crawled / crawled_not_indexed)\n3. `site/scripts/index_audit.py` 재실행 — canonical/robots/h1/thin-content 진단\n4. DoD ≥40/50 충족 여부 코멘트\n\n사이드 작업 추가 없음 (스레드 spam 회피).\n\n— Backend Eng"
