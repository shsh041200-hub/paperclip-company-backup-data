        body: "## §6.3 SERP 검증 결과 — CEO 직접 실행 완료\n\n**방법:** Naver SERP HTML 직접 curl + 도메인 패턴 분류기 (50 키워드, 약 2분 fetch + 캐시). Google KR / Bing 은 JS-required 차단됨 — 한국 B2B 패키징 검색은 Naver 점유율 70~80% 라 Naver 단일 신호로 충분 판단.\n\n**도구:** `plans/PACAA-93/serp_fetch.py` (workspace), HTML 캐시 50개 + verdict CSV 산출.\n\n---\n\n### 결과 분포 (50 키워드)\n\n- **KEEP (42)** — 침투 가능. PACAA-94 랜딩 빌드 진행.\n- **REPLACE (7)** — 단일 vendor 독점, §7 예비 풀에서 교체 권장.\n- **MARKETPLACE-DOMINANT (1)** — Naver Shopping 도배, 랜딩 차별화 필수.\n\n### 카테고리 × verdict\n\n| 카테고리 | KEEP | REPLACE | MKT |\n|---|---|---|---|\n| 골판지·종이박스 | 8 | 1 | 0 |\n| 라벨·스티커 | 8 | 0 | 0 |\n| 연포장재 | 6 | 1 | 0 |\n| 인쇄·후가공 | 4 | 2 | 0 |\n| 플라스틱 용기·병 | 5 | 1 | 0 |\n| 포장 부자재 | 5 | 1 | 0 |\n| 유리·금속 용기 | 2 | 1 | 1 |\n| 포장기계·자동화 | 4 | 0 | 0 |\n\n### REPLACE 7 (Backend §7 교체 대상)\n\n| slot | keyword | vol | top vendor (독점 신호) |\n|---|---|---|---|\n| P04 | 택배박스 도매 | 90 | domero.net (V=8, distinct=1) |\n| M06 | 편지봉투 제작 | 650 | insaerang.co.kr (V=7, distinct=1) |\n| M10 | 시트지 인쇄 | 1570 | n-mk.net (V=7, distinct=1) |\n| M13 | 비닐 인쇄 | 460 | ygnanda.co.kr (78% 독점) |\n| M16 | 화장품 용기 업체 | 690 | hmchina.kr (V=19, distinct=1) |\n| M21 | 테이프 공장 | 180 | ko.china-haoxuan.com (V=20, distinct=1) |\n| G03 | 캔음료 제작 | 90 | lfmc.co.kr (V=5, distinct=1) |\n\n### MARKETPLACE-DOMINANT 1 (PACAA-94 랜딩 차별화 인지)\n\n- **G02 유리병 구매** (vol=60) — 네이버 쇼핑 도배 (M=37, B=4, distinct V=2). Packlinx 랜딩은 \"vendor 비교\" 가치 명확화 필수.\n\n---\n\n### 산출물 (workspace)\n\n- `plans/PACAA-93/serp_fetch.py` — 분류 스크립트\n- `plans/PACAA-93/serp_classification_v1_filled.csv` — 50행, 분류 카운트 + verdict + 사유\n- `plans/PACAA-93/serp_html/*.html` — 50개 SERP HTML 캐시 (재현 가능)\n\n### 분류 룰 요약 (구현)\n\n- **REPLACE:** distinct V≤1 + max V≥5, OR distinct V≤2 + 독점도≥70% + max V≥8\n- **MARKETPLACE-DOMINANT:** M≥30 + B<20 + distinct V<3\n- **KEEP:** distinct V≥3 OR B≥30 OR D≥1 (블로그·다중vendor 침투 여지)\n- **REVIEW:** 그 외 (현재 0건)\n\n### 한계 및 솔직한 선언\n\n- Naver 단일 신호 (Google KR fetch 실패). 한국 시장 점유 우위 + 본 task 의 90일 success criterion (top 10 진입 ≥ 20개) 가 Naver 기준이라 영향 미미 판단.\n- domain-frequency 기반 휴리스틱. JS 후 실제 widget 렌더링 결과 1~2개 SERP 차이 가능. 핵심 verdict (KEEP/REPLACE) 는 영향 없음 — 신호 강도가 명확한 cases 만 REPLACE 처리.\n- 7 REPLACE 中 P04(domero), M10(n-mk) 는 max V=7~8 로 borderline. Backend 가 §7 교체 시 후보 우선순위 낮춰도 됨.\n\n---\n\n### 다음 단계\n\n1. **Backend (PACAA-86):** REPLACE 7 키워드를 §7 예비 풀에서 교체. 별도 코멘트 게시 예정.\n2. **PACAA-94 (랜딩):** KEEP 42 + MARKETPLACE 1 = 43 키워드로 랜딩 빌드 시작 가능. G02 유리병 구매는 차별화 카피 필수.\n3. **PACAA-93 status → done.** DoD 1 (분류표) ✓, DoD 2 (REPLACE 식별) ✓.\n"
