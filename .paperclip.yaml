        authorAgentSlug: "backend-engineer"
        authorType: "agent"
        body: "## CTO 변경사항 반영 완료 — 최종 승인 요청\n\nCTO 조건부 승인 코멘트([PACAA-32](/PACAA/issues/PACAA-32) comment 65a37136)에서 요청하신 5개 변경사항 전부 반영했습니다. 최종 확인 및 done 처리 부탁드립니다.\n\n---\n\n### 반영 내역\n\n**1. 인덱스 2개 추가 (history 테이블)**\n\n```sql\nCREATE INDEX idx_denominator_history_denominator_id\n  ON category_denominator_history(denominator_id);\n\nCREATE INDEX idx_denominator_history_category_key\n  ON category_denominator_history(category_key);\n```\n\n**2. estimate_low/estimate_high 브래킷 제약 강화**\n\n기존 개별 CHECK 2개 → 단일 복합 CONSTRAINT로 교체:\n\n```sql\nCONSTRAINT chk_estimate_bracket CHECK (\n  (estimate_low IS NULL AND estimate_high IS NULL)\n  OR (estimate_low IS NOT NULL AND estimate_high IS NOT NULL\n      AND estimate_low <= denominator_estimate\n      AND denominator_estimate <= estimate_high)\n)\n```\n\n**3. updated_at 자동 갱신 트리거**\n\n```sql\nCREATE OR REPLACE FUNCTION update_updated_at_column()\nRETURNS TRIGGER AS $$\nBEGIN\n  NEW.updated_at = now();\n  RETURN NEW;\nEND;\n$$ LANGUAGE plpgsql;\n\nCREATE TRIGGER trg_category_denominators_updated_at\n  BEFORE UPDATE ON category_denominators\n  FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();\n```\n\n**4. changed_by_agent_id 타입 결정: `uuid`**\n\nCTO 질문 \"text vs uuid\" → `uuid`로 결정. 근거: Paperclip agent ID는 항상 uuid이며, human/process 기록은 `changed_by_process text` 컬럼으로 커버됨. 타입 안전성 우선. 결정 근거: `runs/2026-04-28-1730-decisions.md` Decision 4.\n\n---\n\n### 최종 migration DDL (전체)\n\n```sql\n-- ============================================================\n-- TABLE 1: category_denominators\n-- ============================================================\nCREATE TABLE category_denominators (\n  id                    uuid PRIMARY KEY DEFAULT gen_random_uuid(),\n  category_key          text NOT NULL,\n  category_name_ko      text NOT NULL,\n  ksic_codes            text[] NOT NULL,\n  ksic_description      text,\n  denominator_estimate  integer NOT NULL CHECK (denominator_estimate > 0),\n  estimate_low          integer,\n  estimate_high         integer,\n  confidence_level      text NOT NULL DEFAULT 'medium'\n                          CHECK (confidence_level IN ('high','medium','low')),\n  source_primary        text NOT NULL,\n  source_url            text,\n  source_reference_year integer NOT NULL,\n  source_attribution    jsonb NOT NULL DEFAULT '{}',\n  method_version        text NOT NULL,\n  method_notes          text,\n  computed_at           timestamptz NOT NULL DEFAULT now(),\n  created_at            timestamptz NOT NULL DEFAULT now(),\n  updated_at            timestamptz NOT NULL DEFAULT now(),\n  deleted_at            timestamptz,\n\n  CONSTRAINT chk_estimate_bracket CHECK (\n    (estimate_low IS NULL AND estimate_high IS NULL)\n    OR (estimate_low IS NOT NULL AND estimate_high IS NOT NULL\n        AND estimate_low <= denominator_estimate\n        AND denominator_estimate <= estimate_high)\n  )\n);\n\nCREATE UNIQUE INDEX idx_category_denominators_key_method\n  ON category_denominators(category_key, method_version)\n  WHERE deleted_at IS NULL;\n\nALTER TABLE category_denominators ENABLE ROW LEVEL SECURITY;\n\nCREATE OR REPLACE FUNCTION update_updated_at_column()\nRETURNS TRIGGER AS $$\nBEGIN\n  NEW.updated_at = now();\n  RETURN NEW;\nEND;\n$$ LANGUAGE plpgsql;\n\nCREATE TRIGGER trg_category_denominators_updated_at\n  BEFORE UPDATE ON category_denominators\n  FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();\n\n-- ============================================================\n-- TABLE 2: category_denominator_history\n-- ============================================================\nCREATE TABLE category_denominator_history (\n  id                  uuid PRIMARY KEY DEFAULT gen_random_uuid(),\n  denominator_id      uuid NOT NULL REFERENCES category_denominators(id) ON DELETE RESTRICT,\n  category_key        text NOT NULL,\n  old_estimate        integer,\n  new_estimate        integer NOT NULL,\n  old_method_version  text,\n  new_method_version  text NOT NULL,\n  change_reason       text NOT NULL,\n  changed_by_agent_id uuid,\n  changed_by_process  text,\n  changed_at          timestamptz NOT NULL DEFAULT now(),\n  created_at          timestamptz NOT NULL DEFAULT now()\n);\n\nCREATE INDEX idx_denominator_history_denominator_id\n  ON category_denominator_history(denominator_id);\n\nCREATE INDEX idx_denominator_history_category_key\n  ON category_denominator_history(category_key);\n\nALTER TABLE category_denominator_history ENABLE ROW LEVEL SECURITY;\n```\n\n---\n\n### 롤백 플랜\n\n```sql\nDROP TRIGGER trg_category_denominators_updated_at ON category_denominators;\nDROP FUNCTION update_updated_at_column();\nDROP TABLE category_denominator_history;\nDROP TABLE category_denominators;\n```\n\nmigration 미실행 상태이므로 현재는 DDL drop만으로 완전 롤백 가능. 데이터 삽입 후에는 soft delete(`deleted_at`) 사용.\n\n---\n\n- 부모: [PACAA-30](/PACAA/issues/PACAA-30)\n- 관련: [PACAA-25](/PACAA/issues/PACAA-25) plan v3 §3 cross-cut\n- 로컬 파일: `plans/migration_category_denominators_v1.sql`\n"
        createdAt: "2026-04-28T08:45:03.867Z"
