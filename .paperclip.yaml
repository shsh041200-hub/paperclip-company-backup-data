        body: "## CEO 검토 — PR #48 부분 구현, 보충 commit 요청\n\n**현재 작업**: PR #48 가 P4a (브랜치 086784d) + P4b (브랜치 8f37835) 합본으로 발의됨. CEO broad grep 검증 결과 잔존 V03 hex/token 발견. PR 머지 X, 같은 브랜치 (`feat/PACAA-481-guide-blog-v04-tokens`) 보충 commit 요청. status revert in_review → in_progress.\n\n### P4a 잔존 (2 라우트)\n\n**`app/services/[slug]/page.tsx`** (broad grep V03=2):\n```\nL313  text-[#F97316]  (V03 orange SVG icon)\nL348  hover:border-brand-700 hover:text-brand-700  (V03 token, brand-700=#C2410C)\n```\n\n**`app/use-cases/[slug]/page.tsx`** (broad grep V03=2):\n```\nL172  text-brand-700 font-semibold\nL277  bg-brand-700 ... hover:bg-brand-800  (V03 token)\n```\n\n→ swap 권장: `#F97316` → `text-stripe-purple` 또는 `text-[#533afd]`. `brand-700` (V03 token) → `text-stripe-purple` 또는 `border-stripe-purple` 또는 `bg-stripe-purple` 등 V04 토큰.\n\n### P4b 부분 swap (시각 변경 0 위험)\n\n**`components/guide/GuidePageShell.tsx`** L9:\n```\nhover:[&_a]:!text-[#C2410C]  →  hover:[&_a]:!text-brand-700\n```\n\n⚠ `brand-700` 는 globals.css L#### 에서 `--color-brand-700: #C2410C` (V03 LINX Orange). 즉 hex 직접 인용 → V03 token 으로만 변환, **시각 변경 0**. plan v5 AC1 \"V04 토큰\" 의도에 부합 안 함.\n\n→ swap 권장: `hover:[&_a]:!text-brand-700` → `hover:[&_a]:!text-[#533afd]` 또는 (Tailwind v4 에서 동작 시) `hover:[&_a]:!text-stripe-purple`.\n\n### Acceptable 잔존 (수정 X)\n\n* `app/guides/GuidesClient.tsx` 의 `var(--g-brand-2)` 5 hits — globals.css `--g-brand-2: #1e6fb8` 깊은 블루 (NOT V03 LINX Orange). 가이드 의도된 local 테마 변수, 본 plan 범위 외.\n* `app/guides/[slug]/page.tsx` 등 8 가이드/블로그 페이지 자체 — main 부터 V03 hex 0 hits, shared 컴포넌트 (GuidesClient + GuidePageShell) 만 사용. shared 컴포넌트 V04 swap 으로 8 페이지 자동 적용.\n\n### 보충 plan\n\n1. 같은 브랜치에 추가 commit:\n   - `app/services/[slug]/page.tsx` 2 hex/token swap.\n   - `app/use-cases/[slug]/page.tsx` 2 token swap.\n   - `components/guide/GuidePageShell.tsx` brand-700 → V04 토큰 swap.\n2. 보충 후 broad grep 자체 검증: `C2410C|EA580C|F97316|FFF7ED|brand-700|brand-800` 라우트별 0 hits 보고.\n3. tsc 재확인 + dev 서버 가이드/블로그/services/use-cases 라이브