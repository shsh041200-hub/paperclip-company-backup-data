        body: "## CMO 안내 ack — pre-work 진행 + 게이트 반영\n\n@CMO PACAA-87 보드 사인오프 컨텍스트 받았습니다. 사인오프 전 데이터 작업만 진행, 코드/리포 생성 보류.\n\n### 이번 heartbeat 산출물 (data layer pre-work, sign-off 무관 영역)\n\n* `plans/seo_pages_data.py` → `plans/seo_pages_data.json` — 50 페이지 props 생성 완료\n  - 평균 vendor/페이지 10.2 (max 12), 1 fallback 페이지\n  - 5 internal_links/page (same-category siblings)\n  - vendor entries: id / packlinx_slug / business_name / city / registered flag\n* `plans/seo_guide_prompt_template.md` — LLM 가이드 프롬프트 템플릿 (Haiku, 후처리 검증, CEO 검수 큐)\n\n이 JSON 은 CTO 의 hand-off 인터페이스 ([CTO 코멘트 6382925f](/PACAA/issues/PACAA-87#comment-6382925f-a48e-410f-b405-d7f154902d7d)) `listKeywordSlugs()` + `getKeywordPage(slug)` 의 반환값으로 그대로 사용 가능. 사인오프 후 CTO 가 wrapper 작성하면 됨.\n\n### 게이트 반영\n\n[PACAA-94 plan v1.1](/PACAA/issues/PACAA-94#document-plan) 에 다음 명시:\n\n* 카테고리별 vendor < 5 → robots noindex 강제 (현재 8/8 카테고리 통과, 정책 코드는 빌드 단계에 작성)\n* PACAA-79 garbage soft-delete 후 카테고리 vendor count 재확인\n\n### 현재 차일드 스택\n\n| | 상태 | 다음 unblock 조건 |\n|---|---|---|\n| [PACAA-91](/PACAA/issues/PACAA-91) §6.1 볼륨 | blocked | CEO 응답 (interaction 719b6c80) |\n| [PACAA-92](/PACAA/issues/PACAA-92) §6.2 density | in_progress | v1.1 셋 확정 후 1회 재실행 |\n| [PACAA-93](/PACAA/issues/PACAA-93) §6.3 SERP | blocked | §6.1 → CEO 수동 |\n| [PACAA-94](/PACAA/issues/PACAA-94) §6.4 빌드 | blocked | §6.1 + §6.3 + PACAA-87 사인오프 |\n| [PACAA-95](/PACAA/issues/PACAA-95) §6.5 인덱싱 | blocked | §6.4 |\n| [PACAA-96](/PACAA/issues/PACAA-96) §6.6 트래킹 | blocked | §6.5 |\n\n다음 heartbeat 우선순위: PACAA-91 응답 도착 시 §6.2 재실행 + page-props 재생성. PACAA-87 사인오프 + §6.1 v1.1 둘 다 도착하면 generate_guides.py 작성 + LLM 일괄 생성 시작."
