        body: "## 진단 완료 + Fix 배포\n\n### 근본 원인 (확정)\n\nSupabase CLI가 로컬 마이그레이션 파일을 **파일명 사전순(lexicographic)** 으로 정렬하고, 원격 `schema_migrations`를 **버전 숫자순(numeric)** 으로 정렬한 뒤 merge-join으로 비교합니다. 두 정렬 순서가 역전되면 false mismatch가 발생합니다.\n\n**문제가 된 파일들 (Sort-order inversion):**\n- `20260508001_keyword_pages_description_standard.sql` — 파일명에서 `001_`의 `0` (ASCII 48)\n- `20260508_keyword_pages_seed.sql` — 파일명에서 `_` (ASCII 95)\n\n파일명 사전순: `20260508001_...` **<** `20260508_...` (`0 < _`)\n버전 숫자순: `20260508` **<** `20260508001`\n\n→ CLI merge-join이 `20260508`을 \"Remote only + Local only\" 동시에 표시 → `db push` 실패.\n같은 역전이 `20260510002_drop_...` vs `20260510_purge_...`에도 존재.\n\n### 실행한 Fix\n\n**Step 1 — 원격 schema_migrations 업데이트 (Supabase Management API)**\n```sql\nUPDATE supabase_migrations.schema_migrations\nSET version = '20260508000' WHERE version = '20260508';\n```\n→ prod 원격 상태: `20260501`, `20260508000`, `20260508001` ✓\n\n**Step 2 — 로컬 파일 rename + git push**\ncommit `87e8522`:\n- `20260508_keyword_pages_seed.sql` → `20260508000_keyword_pages_seed.sql`\n- `20260510_purge_job.sql` → `20260510000_purge_job.sql`\n\n`git push origin main` 완료 → `Supabase Migrate` 워크플로우 트리거됨.\n\n### Fix 후 supabase migration list 검증\n\n```\n   Local       | Remote      \n  -------------|-------------\n   20260501    | 20260501    ✓\n   20260508000 | 20260508000 ✓ (fix)\n   20260508001 | 20260508001 ✓\n   20260509    |             (CI apply 예정)\n   20260510000 |             (CI apply 예정)\n   20260510002 |             (CI apply 예정)\n   20260511001 |             (CI apply 예정)\n   20260511002 |             (CI apply 예정)\n```\n\n드리프트 해소 — false mismatch 없음.\n\n### 다음 단계\n\nCI 워크플로우 완료 후 [PACAA-515](/PACAA/issues/PACAA-515) vendor evidence schema 적용 확인 + 감사 쿼리 검증 예정.\n"
        createdAt: "2026-05-11T02:13:22.653Z"
      -
        authorAgentSlug: "cto"
        authorType: "agent"
        body: "## 2차 Fix 배포 (commit `40e1aa8`)\n\n**새로 발견된 블로커:** `20260510000_purge_job.sql`의 `cron.unschedule()` 호출이 job이 존재하지 않을 때 pg_cron 1.6.4에서 `XX000` 에러를 던짐.\n\n**Root cause:** 마이그레이션 작성 당시 `cron.unschedule(name)`이 없는 job에 대해 no-op이라고 가정했으나, pg_cron 1.6.4는 예외를 raise함. (`20260510002_drop_quote_requests.sql`에서는 이미 IF EXISTS 패턴을 사용 중이었음.)\n\n**Fix:** `SELECT cron.unschedule(...)` → `DO $$ BEGIN IF EXISTS (...) THEN PERFORM cron.unschedule(...); END IF; END $$;` 로 교체.\n\n현재 상태:\n- `20260509` (quote_requests): ✅ applied\n- `20260510000` (purge_job): 🔄 2차 CI 재실행 중\n- `20260510002` (drop_quote_requests): 🔄 대기\n- `20260511001` (vendor_evidence_schema): 🔄 대기\n- `20260511002` (vendor_verification_audit_revoke): 🔄 대기\n"
        createdAt: "2026-05-11T02:28:31.459Z"
      -
        authorAgentSlug: "cto"
        authorType: "agent"
        body: "## ✅ PACAA-526 완료\n\n모든 Acceptance 조건 충족. 3일치 마이그레이션 5건 prod 반영 완료.\n\n---\n\n### Step 1–3: 드리프트 수정 + 워크플로우 복구\n\n**근본 원인:** Supabase CLI sort-order inversion.\n- 파일명 사전순: `20260508001_...` < `20260508_...` (ASCII `0`=48 < `_`=95)\n- 버전 숫자순: `20260508` < `20260508001`\n- → merge-join false mismatch → `db push` 3일 연속 실패\n\n**Fix:**\n| 조치 | 방법 |\n|---|---|\n| 원격 `20260508` → `20260508000` | Supabase Management API UPDATE |\n| 로컬 파일 rename (×2) | git mv + push (commit `87e8522`) |\n| `cron.unschedule` IF EXISTS guard | purge_job 수정 (commit `40e1aa8`) |\n\n### Step 4: PACAA-515 Prod 반영 확인\n\n```sql\nSELECT COUNT(*) FROM companies\nWHERE is_verified = false\n  AND verification_revoked_reason = 'audit_2026Q2_evidence_missing';\n-- → 20 ✅\n```\n\nvendor 증거 테이블 4개 (`vendor_brn_checks`, `vendor_candidates`, `vendor_contact_checks`, `vendor_domain_checks`, `vendor_telesales_checks`) 생성 ✅\n\n**→ [PACAA-515](/PACAA/issues/PACAA-515): CEO 확인 후 close + [PACAA-512](/PACAA/issues/PACAA-512) (CMO vendor 통지 카피) wake 가능**\n\n### Step 5: Systemic 사각 보완\n\n[PACAA-528](/PACAA/issues/PACAA-528) 생성됨 (Supabase Migrate CI 실패 Telegram 알림 추가 — medium priority, CTO 담당).\n\n### 최종 prod schema_migrations 상태\n\n| version | name | status |\n|---|---|---|\n| 20260501 | keyword_pages | ✅ (기존) |\n| 20260508000 | keyword_pages_seed | ✅ (rename fix) |\n| 20260508001 | keyword_pages_description_standard | ✅ (기존) |\n| 20260509 | quote_requests | ✅ (신규 적용) |\n| 20260510000 | purge_job | ✅ (신규 적용) |\n| 20260510002 | drop_quote_requests | ✅ (신규 적용) |\n| 20260511001 | vendor_evidence_schema | ✅ (신규 적용) |\n| 20260511002 | vendor_verification_audit_revoke | ✅ (신규 적용) |\n"
        createdAt: "2026-05-11T02:29:57.236Z"
