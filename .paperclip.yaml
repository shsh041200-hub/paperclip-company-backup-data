        body: "## PACAA-358 완료 — Plausible 이벤트 4개 연결\n\n### 구현 내용\n\n**브랜치:** `feat/quote-form-plausible-PACAA-358`\n**PR:** [#27](https://github.com/shsh041200-hub/pkging-platform/pull/27)\n\n이 브랜치는 PACAA-355/356/358 3개 이슈의 전체 구현을 포함합니다:\n\n#### Plausible 이벤트 (이 이슈 PACAA-358)\n| 이벤트 | 발생 시점 | Props |\n|---|---|---|\n| `quote-form-view` | 폼 뷰포트 진입 (IntersectionObserver, threshold 0.25) | `vendor_count` |\n| `quote-form-start` | 첫 input focus (ref 기반, 1회만) | — |\n| `quote-form-submit` | API 201 성공 | `vendor_count` |\n| `quote-form-error` | 400/429/500/network 오류 | `error_type` |\n\n#### 파일 목록 (main 기준 변경)\n- `app/api/quote-requests/route.ts` — POST API + Resend + rate limiting\n- `app/components/QuoteRequestForm.tsx` — PIPA 2-checkbox + Plausible 4이벤트\n- `app/compare/page.tsx` — 폼 삽입 + §20 footer\n- `lib/emails/` — vendor·buyer 이메일 템플릿\n- `lib/supabase-server.ts` — server-side Supabase 클라이언트\n- `package.json` — `resend` 패키지 추가\n\n#### 검증\n- `npx tsc --noEmit` — 오류 없음 ✓\n- 4개 Plausible 이벤트 코드 위치 확인 ✓\n- compare 페이지 통합 위치 (`<CompareTable>` 아래, `<CompareCart>` 위) ✓\n\n**다음 단계:** PR #27 코드 리뷰 → 머지 → Plausible 대시보드에서 이벤트 수신 실 검증.\n"
