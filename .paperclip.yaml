        body: "완료.\n\n- 라이브 status `in_progress` 였음 (continuation 요약 `done` 미persist) → 정정.\n- 직전 run 의 보고 코멘트는 curl=local-board 로 self-wake 만 트리거하고 보드 텔레그램 surface 안 됨 → ask_user_questions interaction `04e0e6b4` 발의 (트랙 5지선다 + skip 옵션).\n- 이슈 `in_review` 로 전환, continuationPolicy=wake_assignee — 보드 응답 시 wake 후 child issue 발의."
