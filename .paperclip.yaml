        body: "## 벤더 비교 심층 분석 (PACAA-308)\n\n분석 범위: `/compare` 페이지 + `CompareCart` + `AddToCompareButton` + `lib/compare-data.ts` + 라이브 probe (`www.packlinx.com/compare`, `/categories/food-beverage`). 실행 없음, 개선안 제출만.\n\n---\n\n### 1. 현재 상태 요약 (사실 only)\n\n| 항목 | 현 구현 |\n|---|---|\n| 진입점 | 카테고리 상세(`/categories/[slug]`) 카드, 업체 프로필(`/companies/[slug]`) 헤더. **2개**. |\n| 카트 저장 | `localStorage` (`packlinx_compare_cart`), 디바이스 단일·세션 비공유 |\n| 비교 한도 | 최대 3개 |\n| URL 공유 | `/compare?ids=slug1,slug2,slug3` 가능하나 `noindex, nofollow` |\n| 데이터 컬럼 | 18행 (위치/설립/인증/카테고리/소재/형태/인증서/서비스/인쇄/MOQ/표준납기/급행/가격대/샘플/냉장/친환경/재사용/평점) |\n| 후행 액션 | `프로필 보기` / `+ 비교(토글)` / `문의하기 ↗` (외부 사이트 새창) |\n| 모바일 | 첫 컬럼 sticky, 가로 스크롤 |\n| 차이 강조 | 없음 (전 셀 동일 스타일) |\n| 추천/요약 | 없음 |\n| 빈 데이터 처리 | 모든 빈 셀 \"—\" |\n| 분석/이벤트 | 코드상 트래킹 hook 없음 |\n\n### 2. 진단 — Vision 필터 적용\n\nVision: \"한국 패키징 모든 소싱 결정이 Packlinx를 거친다\". 비교 플로우는 buyer-intent 가 가장 농축된 funnel. 이 단계의 결함은 단순 UX 손실이 아니라 **discovery infrastructure 의 정체성 손실**.\n\n**Vision 3축 점검:**\n\n| 축 | 현 비교 플로우 점수 | 근거 |\n|---|---|---|\n| 벤더 자발적 참여 유도 | **0/3** | 비교 결과·횟수가 벤더에게 보이지 않음. 비교에서 \"진 항목\" 이 자가 수정 욕구를 자극 못 함. |\n| Default search surface | **1/3** | 외부 SEO 가치 0 (`noindex`). 비교 자체는 좋은 long-tail keyword (\"X사 vs Y사 포장\") 인데 미활용. |\n| 6개월 내 모방 난이도 | **0/3** | 일반 비교표는 어디에나 있음. 데이터 깊이/매칭 로직/벤더 행동 데이터 어느 것도 우리만의 moat 가 아님. |\n\n**합산: 1/9.** 핵심 funnel 이 vision 어느 축에도 기여 못 하는 상태.\n\n### 3. 7대 Gap (우선순위 순)\n\n#### G1. 비교 진입점 부족 (Discoverability)\n- 카테고리 상세·업체 프로필에만 노출. `/`(홈), `/categories`(인덱스), `/products`, `/services`, 향후 검색 결과에는 없음.\n- 결과: 비교를 *써본* 유저가 매우 적을 가능성 높음. 분석 hook 도 없어 정량 검증 불가.\n\n#### G2. 데이터 완성도 신호 부재\n- 18행 중 18행 채운 벤더 vs 4행 채운 벤더가 **시각적으로 동일**. 빈 셀 \"—\".\n- 결과: (a) 유저는 \"이 벤더가 빈약한 건지 데이터가 없는 건지\" 구분 불가, (b) **벤더 자가 보정 인센티브 미발동** (vision 1축).\n\n#### G3. \"무엇이 다른가\" 미강조\n- 18행 중 차이 나는 행 / 동일한 행 구분 없음.\n- 비교의 본질 = 차이 식별인데, 유저가 행 18개를 눈으로 diff 해야 함.\n- 가벼운 토글 (\"차이만 보기\") 만으로 inform-to-decide 시간 50%+ 단축.\n\n#### G4. 후행 전환의 일방향 leak\n- 현재 외향 CTA = `문의하기 ↗` (벤더 외부 사이트 새창). Packlinx 는 buyer 의 문의 의도·내용·결과 어떤 것도 captures 못 함.\n- 결과: (a) 우리는 lead 데이터 0, (b) 벤더는 \"Packlinx 가 보내준 lead\" 인지 추적 못 함 → 유료 전환 주장 근거 부재 (vision 의 \"비용 자발적 지불\" 단계 도달 불가).\n- **이 갭이 최대 비즈니스 임팩트.**\n\n#### G5. SEO 가치 0\n- `/compare?ids=...` 가 `noindex, nofollow`. 한국어 long-tail (\"포장박스A vs 포장박스B\", \"식품포장 비교\") 누수.\n- 다나와·G2·Capterra 모두 비교 페이지를 **indexable + canonical** 로 운영. 패턴 자체가 검증됨.\n\n#### G6. 카트 휘발성·세션 단절\n- localStorage 단일 디바이스. 모바일에서 카트 채우고 데스크탑에서 결정 = 손실.\n- URL share 는 가능하나 \"내가 비교한 벤더 다시 보기\" 같은 유저 stash 모델 없음.\n- 솔로 운영 단계에선 P2 — 단, 향후 buyer 계정/이메일 캡처 도입시 자연스러운 기능 hook.\n\n#### G7. 비교 한도·필드 fitness\n- 한도 3개. 다나와·Capterra·G2 = 4개. **3 vs 4 의 결정적 데이터는 없음**, 단 모바일 가독성 측면에서 3 유지 합리.\n- 18행 중 `cold_packaging_available`, `greenwashing_verified`, `reuse_model` 등 niche 필드는 식품·이커머스 외 카테고리에서 거의 항상 \"—\". → 카테고리별 가변 컬럼셋 검토 가치 있음.\n\n### 4. Benchmark — WHAT/WHY/HOW/SIMULATE\n\n| 회사 | WHAT | WHY 작동 | Packlinx HOW |\n|---|---|---|---|\n| **G2 / Capterra** | 비교 페이지 indexable, `/compare/A-vs-B` URL 슬러그, 차이 hl, 4개까지, vendor-curated answer fields | long-tail SEO 의 가장 강한 commerce intent 키워드 = \"X vs Y\". 비교 페이지가 단독 traffic 채널. | URL 패턴 `/compare/{slug-a}-vs-{slug-b}` (2-way) + `noindex` 제거 + canonical. |\n| **Clutch.co** | 프로필에 \"reviewed by N buyers\", 비교시 review 발췌 + filter 가중치 (\"price 우선\" 토글) | 매칭은 본질적으로 다축 의사결정. 사용자 가중치 노출 = 결정 마찰 감소. | \"우선순위\" 토글 (납기/MOQ/가격대 중 1개) → 정렬·하이라이트만 변경. 데이터 추가 0. |\n| **Houzz Pro** | 비교 결과에서 \"Get quotes from all 3\" 단일 폼 → 3업체 동시 견적 요청 | 비교 끝 = 액션 의도 정점. 마찰 1개로 lead 3배 + 우리는 모든 lead 데이터 보유. | 필수 신규 surface = 견적 의뢰 폼. lead capture P0 후보. |\n| **다나와** | 비교 페이지 SEO 만점, 차이만 보기 토글, 가격 변동 기록 | 비교는 한국 유저의 1차 의사결정 surface. 한국 유저 행동 패턴 일치. | \"차이만 보기\" 토글 + Packlinx 등급 배지 가시화. |\n| **잡코리아 (적용 X 데이터)** | 검색 결과에서 직접 \"비교에 추가\" 체크박스 + bulk 액션 | 진입점 분산 = 사용률 기반. | `/categories/[slug]` 외에 `/`, `/products`, 검색결과에 mount. |\n\n### 5. 개선안 12개 — 우선순위 + 노력/ROI/Reversibility\n\n표기: **노력** S=≤0.5d M=1-2d L=3-5d / **ROI** = vision 3축 합산점수 / **D** = door (T=two-way, O=one-way).\n\n#### **P0 (강추: 다음 sprint trigger 시 곧장 발의)**\n\n| # | 제안 | 노력 | ROI (3축) | D | Vision 임팩트 |\n|---|---|---|---|---|---|\n| 1 | **`/compare/{slug-a}-vs-{slug-b}` 2-way URL + `noindex` 제거 + canonical + 정적 메타** | M | +2 (search surface) | T | long-tail SEO 신규 채널. 다나와·G2 검증. |\n| 2 | **\"차이만 보기\" 토글** (행 단위 동일값 hide) | S | +1 (UX) | T | 의사결정 시간 단축. niche 필드의 \"—\" 빈 셀 노이즈 제거 부수효과. |\n| 3 | **데이터 완성도 배지** (예: \"프로필 75%\" + 빈 행 별도 시각) | S | +2 (벤더 자가 보정 자극) | T | vendor self-initiated participation 직접 자극 (vision 1축 핵심). |\n| 4 | **비교 결과 lead capture form** — \"3업체에 한 번에 견적 요청\" CTA + 이메일·요청 내용 + 수량/마감일/요구사항 | M | +3 (모든 축) | T | Houzz Pro 검증. **이 1개로 vision 3축 동시 진전.** Lead 데이터 = 향후 paid placement 근거. 최대 ROI 후보. |\n\n#### **P1 (P0 결과 측정 후 4주 내 검토)**\n\n| # | 제안 | 노력 | ROI (3축) | D | Vision 임팩트 |\n|---|---|---|---|---|---|\n| 5 | **검색 결과·`/categories` 인덱스에 비교 mount** + 카드에 분석 hook | S | +1 (default surface) | T | 진입점 산포 → 사용률 기반 데이터 수집. |\n| 6 | **카테고리별 가변 컬럼 set** (`food-beverage` = 냉장/냉동 강조, `electronics-industrial` = 정전기/완충 강조) | M | +1 (UX) | T | niche 필드 \"—\" 누적 해소 + 도메인 전문성 신호. |\n| 7 | **우선순위 토글** (납기/MOQ/가격대 중 1개) — 정렬+행 강조만, 데이터 추가 0 | S | +1 (UX, default surface) | T | Clutch 패턴. |\n| 8 | **비교 페이지에 review 발췌 1줄** (avg_rating 외에 텍스트) | M | +1 | T | review 데이터 의존 — 우선 데이터 채워진 카테고리만. |\n\n#### **P2 (조건부 — Phase 5 idle 회전에서 분기 가능)**\n\n| # | 제안 | 노력 | ROI | D | 비고 |\n|---|---|---|---|---|---|\n| 9 | **\"비교 결과 PDF 저장\" / 이메일 송부** | M | +0.5 | T | buyer 가 사내 결재용으로 가져갈 자료 = retention. PoC 가치 검증 후. |\n| 10 | **3 → 4 한도 확장** | S | +0 | T | 데이터 강한 정당성 부재. 모바일 가독성 손실 가능. **현재는 보류 권고.** |\n| 11 | **카트 cross-device sync (이메일 stash)** | L | +0.5 | T | buyer 계정 시스템 부재 시 over-engineering. |\n| 12 | **AI 요약 (\"A는 저MOQ에 강함, B는 프리미엄\")** | L | +1 (모방난이도 ↑) | T | LLM 비용 + 정확성 리스크. P0/P1 데이터 채워진 후 검토. |\n\n#### **반대 (실행 안 함)**\n- \"전부 다 비교\" 한도 무제한 — 결정 피로 증가, 모바일 깨짐, ROI -.\n- 비교 페이지에 vendor 광고 배너 / 추천 — buyer 신뢰 감소, vision 의 \"trust 기반 인프라\" 와 충돌.\n- 별도 \"비교 전문\" 서브도메인 — SEO 분산, solo 운영 부담 증가, 모방 난이도 0.\n\n### 6. 권고 시퀀스 (트리거 기반, 캘린더 X)\n\n1. **트리거: 보드 P0 4개 중 어느 것을 먼저 갈지 결정** → CEO 가 child 발의.\n2. **G3 (P0 #2) + G2 (P0 #3) 우선** — S effort, two-way, 분석 hook 미설치 상태에서도 명백 가치.\n3. **P0 #4 (lead capture) 는 별도 plan** — 데이터 모델 (요청 테이블, 벤더 배포 채널), 법적 (개인정보 동의) 검토 동반. 단독 issue.\n4. **P0 #1 (SEO URL)** 은 P0 #2/#3 후 — 빈 비교 indexable 화 = 저품질 시그널 위험. 데이터·UX 보강 후 색인 노출.\n5. **P1/P2 는 P0 4주 후 메트릭 (compare 진입률, 견적 요청 conversion) 보고 후 결정.**\n\n### 7. 측정 지표 (P0 진입 시 baking 의무)\n\n- compare 진입 / 일 (현재 hook 부재 → 첫 결과는 \"hook 설치 필요\" 일 것)\n- compare → 견적 요청 폼 진입율\n- 견적 요청 완료율\n- 비교 결과 페이지 organic search impression (Search Console)\n- \"프로필 75%\" 표기 도입 후 vendor 자발적 수정 요청 수 (vision 1축 핵심 측정)\n\n---\n\n**다음 액션 (보드 input 필요):**\n\n4개 P0 중 어느 것을 먼저 갈지, 또는 \"4개 모두 발의\" 인지 보드 결정 요청. CEO 는 결정시 즉시 child issue 발의 (3 dependency-aware DAG, 현재 \"Idle improvement 모드 PACAA-263\" cap 6개/주 내 흡수 가능).\n\n결정이 늦어도 무방한 경우 CEO 가 자체 우선순위 (`#3 → #2 → #4 → #1`) 로 발의 진행 권고. 이유: #3, #2 = S effort + two-way + 단독 가치. #4 = M effort + 별도 데이터 모델, plan 필요. #1 = #3/#2 결과물 위에 쌓는 게 효율적."
