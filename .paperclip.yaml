        authorAgentSlug: "legal-counsel"
        authorType: "agent"
        body: "# [회고 자문 1/3] Surface 1 — 가이드 8건 (외부 콘텐츠)\n\n## 질문 요약\n지난 7일간 사전 자문 없이 발행된 가이드 8건([PACAA-153](/PACAA/issues/PACAA-153), [PACAA-185](/PACAA/issues/PACAA-185), [PACAA-198](/PACAA/issues/PACAA-198), [PACAA-205](/PACAA/issues/PACAA-205), [PACAA-207](/PACAA/issues/PACAA-207), [PACAA-208](/PACAA/issues/PACAA-208), [PACAA-209](/PACAA/issues/PACAA-209), [PACAA-233](/PACAA/issues/PACAA-233))이 표시광고법 §3, 저작권법 §28, 상표법 §108을 위반하는지에 대한 회고적 검토.\n\n## 적용 법률\n- **표시광고법 §3** — 부당한 표시·광고(허위·과장·기만·부당비교·비방)\n- **저작권법 §28** — 공표된 저작물의 인용\n- **상표법 §108** — 상표권 침해(동일·유사 상표 + 동일·유사 상품·서비스 + 혼동가능성)\n\n## 권고 / 위험 등급: **낮음**\n\n### 검토 결과 (`app/guides/*/page.tsx` 본문 직접 검사)\n1. **표시광고법 §3 — 양호.** 본문의 \"최고/최상/100%\" 표현은 모두 (a) 소재 등급 자체의 기술 표준 명칭(\"A골 압축강도 최고\", \"Type I 유리 최상 내화학성\", \"100% 재용융\") 또는 (b) 객관적 수치 비교(가격 차이 50~100%, 두께 5mm 등)로 사용됨. 자사·자사 협력 업체에 대한 \"국내 최고\", \"업계 1위\" 식의 비교 우위 주장은 **발견되지 않음**.\n2. **저작권법 §28 — 양호.** 인용된 외부 이미지 / 표 / 도표 없음(외부 이미지 URL 0건 검출). 본문은 가이드 자체 작성 텍스트 + 사내 OG 이미지로 구성.\n3. **상표법 §108 — 양호.** 본문에서 제3자 제조사·브랜드명(\"CJ\", \"롯데\", \"아모레\" 등) 매칭 0건. 언급된 인증명(\"FSC\", \"GRS\", \"PPWR\")은 일반 인증 명칭으로 상표 사용에 해당하지 않음(인증 보유자만 사용한다고 주장하지 않는 한 침해 아님).\n\n### 단서 / 보완 권고 (필수 아님)\n- 가이드 본문의 정량 수치(예: \"B골 대비 A골 단가 약 15~20% 높음\", \"rPET 버진 PET 대비 10~25% 추가 비용\", \"PLA 50~100% 비용 상승\")는 추후 표시광고법 §3 분쟁 시 **객관적 근거 자료(업계 단가표·공급사 견적·논문 등) 보관 책임**이 발행자에 있음. 발행 시점에 출처를 commit message나 문서 메타데이터에 남겨두면 사후 입증 부담이 줄어듦.\n- \"양산 품질 보장 여부를 문서로 확인하라\"는 가이드 자체의 권고 문구라 자사가 보장한다는 표현이 아니므로 문제 없음.\n\n## 후속 액션\n- 본 자문 결과 **risk grade 낮음** — 본 issue 에는 후속 remediation child 생성하지 않음.\n- 향후 가이드 발행 시: SG-2 트리거(외부 인용·이미지·로고·제3자 상표 사용 시) 충족 시 발행 전 자문 호출 SOP 준수 권고.\n\n---\n⚠️ 자문 한계 명시:\n이 자문은 참고용이며 법적 책임 면제를 보장하지 않습니다.\n사고 발생 시 면책 사유로 사용될 수 없습니다. Packlinx 보드는\n외부 변호사 자문 미도입을 결정한 상태이며, 모든 법적 리스크는\nLegal Counsel 자문에 의존합니다.\n---\n"
