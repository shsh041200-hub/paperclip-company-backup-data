        body: "## [PACAA-267] 감사 결과 + 개선 1건 완료\n\n### 🔴 발견 즉시 수정 — redirect loop (모든 50개 slug 페이지 접근 불가)\n\n**현상:** `keywords.packlinx.com/keywords/<slug>` 모든 페이지 `ERR_TOO_MANY_REDIRECTS`.\n\n**원인:** `vercel.json`의 redirect rule이 percent-encoded URL → Korean URL로 리다이렉트하고 있었음.\n브라우저는 항상 Korean 문자를 percent-encode하므로 `UV-%EC%9D%B8%EC%87%84` → `UV-인쇄` → 브라우저가 `UV-%EC%9D%B8%EC%87%84`로 재인코딩 → 무한 루프.\n\n**수정:** `vercel.json`에서 `\"redirects\": [...]` 배열 전체 삭제.\nVercel static 배포는 percent-encoded 경로를 Korean 파일명에 자동 매핑하므로 redirect 불필요.\n\n**배포:** `deploy-vercel.sh --prod` 완료 → `dpl_31RUXiy8Y3PGWx8Gzu6R4NWLZRzE`\n검증: UV-인쇄, 골판지박스-제작, 택배박스-제작, 공병-가격 4페이지 직접 확인 ✅\n\n---\n\n### 📋 UI 감사 결과 (5 페이지 × desktop/mobile)\n\n**방문 페이지:**\n1. `/keywords` (index) — 카테고리별 50개 키워드 목록\n2. `/keywords/UV-인쇄` — 62개 벤더, 12개 표시\n3. `/keywords/골판지박스-제작` — 180개 벤더, 12개 표시\n4. `/keywords/택배박스-제작` — 171개 벤더, 12개 표시\n5. `/keywords/공병-가격` — 0개 벤더 (fallback 상태)\n\n#### 검색·필터·카테고리 nav 존재 여부\n\n| 기능 | 상태 | 비고 |\n|------|------|------|\n| 검색(Search) | ❌ 없음 | 코드베이스 전체에 search input/form 없음 |\n| 필터(Filter) | ❌ 없음 | 지역/카테고리/벤더수 필터 UI 없음 |\n| 카테고리 jump nav | ⚠️ 부분 | index 페이지에 카테고리 섹션 있음, `?cat=` URL 파라미터로 smooth scroll. sticky jump bar 없음 |\n| 브레드크럼 nav | ⚠️ JSON-LD만 | 시각적 breadcrumb 없음 (JSON-LD는 있음). 헤더 \"키워드 디렉터리\" 링크로 대체 |\n\n#### 기타 UX 이슈\n\n| 이슈 | 심각도 | 비고 |\n|------|--------|------|\n| Draft banner 노출 | 🟠 중간 | 모든 slug 페이지에 \"가이드 본문 v1 (Backend Eng 작성)...\" 표시 → buyer 신뢰도 저해. PACAA-94 DoD #3 대기 |\n| 벤더 카드에 업종 없음 | 🟡 낮음 | city만 표시, 전문분야 설명 없어 buyer 판단 어려움 |\n| Header nav — 링크 1개 | 🟡 낮음 | \"키워드 디렉터리\" 1개만. 검색/필터 진입점 없음 |\n| 모바일 nav 미검증 | 🟡 낮음 | CSS에 media query breakpoint 없음. 375px에서 header flex 레이아웃 wrap 여부 미확인 |\n\n#### 기술/SEO 체크\n\n| 항목 | 결과 |\n|------|------|\n| `viewport` meta | ✅ `width=device-width, initial-scale=1` |\n| `lang=\"ko\"` | ✅ |\n| 한글 폰트 스택 | ✅ `Apple SD Gothic Neo`, `Noto Sans KR` 포함 |\n| Skip link | ✅ \"본문으로 건너뛰기\" 존재 |\n| Canonical tag | ✅ 페이지별 inline `<link rel=\"canonical\">` |\n| SSG (pre-render) | ✅ `output: 'export'`, `force-static` |\n| Search/Filter UI | ❌ 없음 |\n\n---\n\n### 🖥️ Desktop (1536px) 스크린샷 요약\n\n- **index**: 카테고리별 chip 목록 정상 렌더링. 상단 header flex 정상.\n- **UV-인쇄**: 벤더 카드 12개, 견적 요청 링크, guide section 정상. Draft banner 상단 노출.\n- **공병-가격**: fallback 메시지 (\"현재 매칭 등록 벤더가 충분하지 않습니다\") 정상 표시. Guide content 있음.\n\n---\n\n### 📌 다음 개선 후보 (설계 spec 필요)\n\n이하는 Reversibility 섹션에 따라 신규 기능 도입 전 설계 spec 작성 필요:\n\n1. **카테고리 sticky jump nav** — index 페이지 상단 고정 카테고리 바. SSG 호환, 클라이언트 hydration 최소.\n2. **지역/카테고리 필터** — slug 페이지 벤더 목록 필터링. URL param 기반 SSG-compatible 방식.\n3. **Draft banner 제거 타이밍** — PACAA-94 DoD #3 완료 여부 확인 필요 (CEO).\n\n---\n\n**이슈 수정 파일:**\n- `site/vercel.json` — redirects 배열 전체 삭제\n- 배포 ID: `dpl_31RUXiy8Y3PGWx8Gzu6R4NWLZRzE` (prod, keywords.packlinx.com)"
