        body: "## 진단: 데이터 안 뜨는 거 = Supabase placeholder 때문\n\n뭐가 안 보이는지 dev 로그 + 직접 API 콜로 확인했어.\n\n### 증거\n1. **`/api/companies` 직접 콜** → `HTTP 500 {\"error\":\"Invalid path specified in request URL\"}` — Supabase REST가 `placeholder.supabase.co`로 가서 실패\n2. **`/api/events` (analytics 비콘)** → 로그에 반복적으로 `POST /api/events 500` — 이벤트도 Supabase에 못 씀\n3. 홈 HTML 응답은 정상 200으로 오지만 **업체 카드/카테고리 데이터가 placeholder 응답으로 비어 들어옴** → 그래서 레이아웃은 보이는데 \"비어 보이는\" 부분 발생\n\n### 즉, 안 보이는 게 정상 (현재 환경에서)\n- 모든 업체 리스트, 카테고리 카운트, 인증 배지, 가이드/use-case 페이지 데이터는 **전부 Supabase 의존**\n- placeholder 키가 들어 있으니 SSR fetch는 실패 → fallback 빈 결과 → \"몇 개가 안 보임\"\n\n### 해결책 = Supabase 자격증명 채워주기\n지금 `/home/rlatjsgur/.paperclip/instances/default/projects/d5e183da-c58f-4124-8075-493330dce4c4/f0cad884-57d7-4a3e-b1bb-fa93a4fc0b2c/pkging-platform/.env.local` 내용:\n\n```env\nNEXT_PUBLIC_SITE_URL=http://localhost:3000\nNEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co        # ← 교체 필요\nNEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder-anon-key              # ← 교체 필요\nSUPABASE_SERVICE_ROLE_KEY=placeholder-service-role              # ← 교체 필요\n```\n\nboard가 아래 3개 값을 코멘트로 알려주면 내가 즉시 적용 + 재기동:\n1. `NEXT_PUBLIC_SUPABASE_URL` (예: `https://jnrciibwtutzymkoepfp.supabase.co`)\n2. `NEXT_PUBLIC_SUPABASE_ANON_KEY` (anon public, eyJ로 시작하는 긴 JWT)\n3. `SUPABASE_SERVICE_ROLE_KEY` (service_role secret, eyJ로 시작하는 긴 JWT)\n\n> 위치: Supabase 대시보드 → 프로젝트 `jnrciibwtutzymkoepfp` → Settings → API\n\n### 참고: 브랜치도 확인\n- 현재 체크아웃: **`main`** (HEAD `bfac38d`)\n- 다른 브랜치 후보: `feat/premium-b2b-design`, `feat/checkpoint-auto-resume`, `hello`, `v0/shsh041200-7631-*` (3개)\n- 만약 board가 보고 싶은 게 main이 아닌 다른 브랜치면 알려줘 — `git checkout` + 재기동 가능\n\n### 결정 대기\n- 옵션 A: Supabase 키 3개 알려주기 → 정상 데이터로 즉시 가동\n- 옵션 B: 보고 싶은 브랜치 지정 → 그 브랜치로 띄움\n- 옵션 C: 둘 다 (보통 이게 정답)\n"
