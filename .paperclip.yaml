        body: "## [BE] PACAA-691 분석 결과 — 8쌍 dedup 판정\n\n### 현재 DB 상태 (2026-05-14 조회 기준)\n- 16개 레코드 전부 `category=corrugated_box`, `is_hidden=False`\n- 구 \"paper\" 레코드들은 이전 PACAA-682 migration 으로 corrugated_box 재분류된 상태\n\n---\n\n### 판정 결과\n\n#### ✅ GROUP A — SAME_VENDOR 확정 (4쌍, 주소 완전 일치)\n\n| 회사명 | OLD (구) | NEW (step5) | 공통 주소 |\n|---|---|---|---|\n| 박스공장 | `07256ef1` (강릉시/강원도) | `aeb3038b` | 강원특별자치도 강릉시 주문진읍 참샘길 116 |\n| 우리포장박스 | `2162838f` (김포시/경기도) | `44d8a2b3` | 경기도 김포시 대곶면 오니산로 61 1층 |\n| 동화포장박스 | `223761fc` (부산광역시) | `6bb5956e` | 부산광역시 강서구 평강로 8-7 |\n| 미성포장박스 | `2250102b` (청주시/충청북도) | `70153ded` | 충청북도 청주시 서원구 현도면 시목외천로 332 |\n\n**실행 계획 (CEO 승인 필요):**\n1. NEW 레코드에 OLD 의 city/province 복사 (데이터 보존)\n2. OLD 레코드 `is_hidden=true` 설정\n\n---\n\n#### ⚠️ GROUP B — AMBIGUOUS (4쌍, 주소·전화 없음)\n\n| 회사명 | OLD (구) | OLD city | NEW (step5) | NEW city | 권장 |\n|---|---|---|---|---|---|\n| 박스타운 | `04f420cb` | 광진구/서울 | `77a457fe` | — | 다른 vendor (지역명 추가) |\n| 소마박스 | `08a2e725` | 시흥시/경기도 | `3b00bf6b` | — | 다른 vendor (지역명 추가) |\n| 박스제작소 | `31b817a7` | 광주시/경기도 | `a8d8375e` | — | 다른 vendor (지역명 추가) |\n| 박스공장닷컴 | `5de5a93c` | 사무소/서울 | `ebf00793` | — | SAME 가능성 높음 (유니크 상호) |\n\n**분석 근거:**\n- 박스타운/소마박스/박스제작소: 한국에서 동명 업체 다수 가능 (일반적 상호)\n- 박스공장닷컴: 도메인 기반 상호(유니크) → 동일 업체 가능성 높음\n- OLD 레코드 4개 모두 city 데이터 보유, NEW 4개는 미보유\n\n**CEO 결정 필요 옵션:**\n\n**옵션 A** — GROUP B도 SAME_VENDOR 처리 (OLD → is_hidden=true)\n- 장점: 중복 즉시 해소, 커버리지 카운트 정상화\n- 단점: 실제 다른 업체일 경우 레코드 손실 (reversible이나 노출 기간 손실)\n\n**옵션 B** — GROUP B는 DIFFERENT_VENDOR 처리 (이름 disambiguate)\n- 장점: 데이터 안전, 두 업체 모두 보존\n- 실행: OLD 레코드 이름에 도시명 추가 (e.g. \"박스타운 (광진구)\")\n- 단점: 이름 변경, 4개 추가 수동 검토 필요\n\n**BE 권장:** 옵션 A (박스공장닷컴) + 옵션 B (나머지 3건)\n\n---\n\n### 요청\n\nCEO 승인 확인 후:\n1. GROUP A 4쌍 merge+hide 즉시 실행\n2. GROUP B 옵션 결정 → 실행\n\n"
