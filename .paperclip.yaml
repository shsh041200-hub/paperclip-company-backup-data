  pacaa-6:
    comments:
      -
        authorAgentSlug: "ceo"
        authorType: "agent"
        body: "## 검토 요청 — 검색 결과 페이지 디자인 방향성\n\n방향성 초안과 단계별 검증 계획을 [plan 문서](/PACAA/issues/PACAA-6#document-plan)에 정리했어요.\n\n### 한 줄 결론\n\n**\"조달급 정보 밀도 + 한국형 신뢰 신호.\"** Thomasnet의 패싯 필터 골격 + 다나와의 스펙 비교 사고방식 + 네이버 스마트스토어의 신뢰 시그널(사업자번호, 인증, 연혁). 후기·별점·프리미엄 노출·AI 추천은 v1 배제.\n\n### 핵심 결정\n\n* **레이아웃**: 좌측 패싯 필터 + 메인 세로 리스트 + 페이지네이션 (무한 스크롤 X)\n* **카드 정보**: 업체명·사업자번호 확인 뱃지·위치·설립연도·직원규모·카테고리·인증·작업 사례 thumbnail·견적요청 CTA\n* **v1 필터**: 카테고리, 지역(시/도), 인증, MOQ, 가공옵션, 설립연도\n* **의도적 배제**: 후기/별점, 프리미엄 노출, AI 추천, 무한 스크롤, 거리 기반 정렬(데이터 정확도 확보 후)\n\n### 4단계 검증\n\n1. **Phase 0** (1주) — 와이어 3안 + 구매 담당자 5명 인터뷰. 합격: ≥3/5 한 안 선호.\n2. **Phase 1** (1주) — 클릭 프로토타입 + 다른 5명 과제 테스트. 합격: time-to-task < 60s, ≥4/5 성공.\n3. **Phase 2** (2주) — 50업체 실데이터 라이브. 메트릭: CTR ≥ 30%, 견적 제출률 ≥ 5%.\n4. **Phase 3** (지속) — 펀널 기반 반복.\n\n### Kill criteria\n\n* Phase 0에서 3/5 선호 안 모이면 카드 항목 재설계 → 그래도 안 되면 보드 보고.\n* Phase 2 CTR < 15%면 디자인이 아니라 포지셔닝 문제로 격상.\n\n### 보드 승인 시 즉시 분기 예정 서브태스크\n\n1. Designer — Phase 0 와이어 3안 + 인터뷰 (1주)\n2. Head of Product — 인터뷰 5명 섭외 + 가이드 (3일)\n3. Backend — 카드 필드 스키마 + 검색/필터 API 명세 (1주, 병행)\n4. CTO — 페이지네이션·URL 인코딩·SSR/CSR 결정 메모 (3일)\n\n### 보드께 묻는 것\n\n* 본 방향성에 동의하시는지.\n* 보드 네트워크에서 Phase 0 인터뷰에 응할 수 있는 구매 담당자 5명 섭외 가능 여부 (없으면 데이터 검증 게이트로 대체 필요).\n* 본 이슈에 `goalId`가 비어 있어요. 1순위 골(검색·발견 핵심)에 묶어주시면 후속 서브태스크들이 자동 정렬됩니다.\n\n승인 주시면 위 4개 서브태스크 분기하고 Designer/Head of Product에 즉시 할당하겠습니다.\n"
        createdAt: "2026-04-27T09:49:09.091Z"
