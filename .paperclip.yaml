        body: "## 🚨 보드님 행동 필요\n\n없음 — 설명만. 각 항목 읽고 \"이건 해보자\" 항목 있으면 알려주시면 child 발의.\n\n---\n\n5개 후보를 **현상 → 왜 문제 → 어떻게 → 안 하면**  4단계로 풀어 설명합니다.\n\n---\n\n### 1. \"127K canonical 없는 중복 페이지 진단\"\n\n**현상**  \nGoogle 이 우리 사이트에서 **905,341개 URL** 을 발견했는데, 이 중 약 **127,955개가 \"내용은 사실상 같은데 주소만 다른 페이지\"** 로 분류됨. 그런데 우리가 Google 에게 \"원조는 이거야\" 라고 알려주지 않음.\n\n**비유**  \n한 식당 메뉴 `김치찌개`가 메뉴판에 100가지 주소로 적혀 있는 셈:\n- `/김치찌개`\n- `/김치찌개?테이블=3`\n- `/김치찌개?할인=true`\n- `/김치찌개?이벤트=봄`\n\n전부 같은 음식인데 Google 은 \"어느 게 진짜 메뉴 페이지냐?\" 헷갈림.\n\n**왜 문제**  \n- Google이 진짜 페이지 (가이드, 회사소개 등) 색인할 시간을 가짜 페이지 보는 데 다 씀 → **크롤 예산 낭비**\n- 진짜 페이지 노출 순위 낮아짐 (Google 이 사이트를 \"스팸성 양산형\" 으로 판단할 수 있음)\n\n**어떻게**  \n각 페이지 HTML 에 `<link rel=\"canonical\" href=\"원조주소\">` 한 줄 넣음. 우리 사이트 코드 (Next.js) 에서 페이지 템플릿에 자동 삽입하도록 설정.\n\n**작업량 예상**: 엔지니어 0.5~1일\n\n---\n\n### 2. \"corrugated-flute-types 메타 개선\"\n\n**현상**  \n가이드 페이지 `/guides/corrugated-flute-types` 가 Google 검색결과에 **238번 노출** 됐는데 클릭은 **2번** (CTR 0.8%). 평균 8등에 표시됨.\n\n**비유**  \n서점 진열대에 우리 책이 8번째 자리에 238번 놓였는데, 책 표지·제목이 매력 없어서 손님 2명만 집어듦. 옆 책은 같은 위치에서 25명이 집어감.\n\n**왜 문제**  \n- 노출 = 이미 SEO 효과 있음 (8등). 이건 무료 광고\n- 그런데 **사람들이 우리 검색결과를 보고도 안 누름** → 제목 (`<title>`) 과 설명문 (`<meta description>`) 이 매력 없음\n\n**어떻게**  \n1. 현재 제목: `골 종류 가이드 | Packlinx` (예시, 실제로 봐야 함)\n2. 사용자가 검색하는 단어 (`ab골`, `a골 b골`, `박스 골 종류`) 가 제목에 안 들어있을 가능성\n3. 제목·설명문 다시 써서 클릭 유도 (예: \"ab골 a골 e골 차이? 박스 골 종류 5분 정리\")\n\n**작업량 예상**: 마케터 1~2시간 (코드 변경 안 함, content 수정만)\n\n**기대 효과**: CTR 0.8% → 5% 가면 월 2 → 12 클릭\n\n---\n\n### 3. \"4,058 페이지 4xx 차단 확인\"\n\n**현상**  \nGoogle 이 우리 사이트의 **4,058 페이지** 를 크롤하려 했더니 **\"권한 없음\" 에러 (4xx)** 반환됨.\n\n**비유**  \n배달 기사가 4,058번 우리 가게 문 두드렸는데 매번 \"출입금지\" 표시. 진짜 출입금지면 OK, 그런데 **알고 보니 직원이 실수로 푯말 잘못 걸어둔 것** 일 수 있음.\n\n**4xx 의미**:\n- 401: 로그인 필요\n- 403: 권한 없음\n- 404: 없는 페이지 (별도 분류됨, 여기 4,058 에 안 들어감)\n- 429: 너무 많은 요청\n\n**왜 문제**  \n- **의도한 차단** 이면 (관리자 페이지, 로그인 뒷쪽 페이지) → OK, 무시\n- **의도하지 않은 차단** 이면 → 우리 콘텐츠가 Google 에 안 보임 = SEO 손실\n\n**어떻게**  \nGSC 에서 4,058 페이지 URL 샘플 export → 어떤 패턴인지 확인 (예: `/admin/*` 이면 정상, `/guides/*` 면 사고)\n\n**작업량 예상**: SEO 담당 30분\n\n---\n\n### 4. \"www.packlinx.com vs packlinx.com 통합\"\n\n**현상**  \n홈페이지가 Google 검색결과에 두 주소로 따로 색인됨:\n- `packlinx.com/` → 15 클릭\n- `www.packlinx.com/` → 11 클릭\n\n**비유**  \n한 가게가 **본점, 별관 두 간판** 으로 등록됨. 손님 26명 중 15명은 본점 간판으로, 11명은 별관 간판으로 옴. 사실 같은 가게.\n\n**왜 문제**  \n- Google 이 \"이 사이트는 신뢰도 100\" 줄 걸 → 50 + 50 으로 나눠 줌\n- 백링크 (외부에서 우리 사이트 거는 링크) 도 둘로 갈라짐\n- 사용자도 어느 주소가 정식인지 모름\n\n**어떻게**  \n서버 설정에서 한 쪽 (예: `packlinx.com`) 접속 → `www.packlinx.com` 으로 **301 영구 리다이렉트**. 또는 반대.\n\n**작업량 예상**: 엔지니어 1시간 (DNS·서버 config 수정)\n\n**주의**: 이미 통합돼있을 가능성도 있음 (확인 필요). GSC 가 그냥 둘 다 표시했을 수도.\n\n---\n\n### 5. \"filter URL 차단 (noindex / robots.txt)\"\n\n**현상**  \n홈페이지에 산업·소재·형태·인증 등 **필터** 가 있어서 사용자가 누르면 URL 이 이렇게 됨:\n```\npacklinx.com/?industry=ecommerce&material=paper&form=tube&cert=kfda&leadtime=lt_14\n```\n\n이런 필터 조합이 **수십만 가지** 가능 → Google 이 다 따로 페이지로 인식 → **905K URL 폭발의 주범**.\n\n**비유**  \n옷가게에서 \"남자 + 검정 + L사이즈 + 신상\" 필터 누르면 URL 이 바뀌는데, Google 은 이걸 **별도 페이지로 색인하려 함**. 필터 조합 = (2 성별 × 10 색 × 5 사이즈 × 4 상태) = 400페이지. 실제론 **물건 100개짜리 쇼핑몰** 인데 페이지는 400개로 보임.\n\n**왜 문제**  \n- Google 이 진짜 콘텐츠 (가이드, 회사) 색인 시간을 필터 URL 보는 데 씀\n- 필터 URL 끼리 내용 거의 같음 → \"스팸\" 으로 오해받을 수 있음\n- 우리 서버도 Google 크롤러 트래픽 받느라 자원 낭비\n\n**어떻게** (2가지 방식)\n- **방식 A**: 필터 URL HTML 에 `<meta name=\"robots\" content=\"noindex\">` 추가 → \"이 페이지 색인하지 마\" 표시\n- **방식 B**: `robots.txt` 에 `Disallow: /?industry=` 같은 규칙 → 크롤러가 아예 안 옴\n\n**트레이드오프**: 사실 1번 (canonical 추가) 으로 대부분 해결됨. 5번은 1번 보완.\n\n**작업량 예상**: 엔지니어 2~4시간\n\n---\n\n## 우선순위 (제 추천)\n\n| 순위 | 항목 | 이유 |\n|---|---|---|\n| 1 | **2번 (메타 개선)** | 즉시 트래픽 ↑, 코드 변경 X, 1~2시간 |\n| 2 | **1번 (canonical)** | 색인 폭발 근본 해결, 0.5~1일 |\n| 3 | **4번 (www 통합)** | 빠르고 효과 명확 |\n| 4 | **3번 (4xx 진단)** | 30분 진단 → 액션은 그 다음 |\n| 5 | **5번 (filter noindex)** | 1번으로 대부분 해결되므로 후순위 |\n\n---\n\n\"이건 해보자\" 항목 골라주시면 child issue 발의하겠습니다. 또는 \"전체 패스\" 도 OK.\n"
