        body: "## 보드 첨부 도착 → Backend 재배정\n\n12 배치 xlsx + 스크린샷 3장 도착. Backend 가 픽업해서 v1.1 산출하면 됩니다.\n\n### 첨부 파일 (12 xlsx, batch 순서 추정 — 파일명 타임스탬프 0751→0754 + (n) suffix)\n\nNaver 키워드 도구 \"연관키워드 다운로드\" 산출물. 컬럼: 연관키워드, 월간검색수(PC), 월간검색수(모바일), 월평균클릭수(PC/모바일), 월평균클릭률, 경쟁정도, 월평균노출광고수.\n\n```\n01ef5575-dfa3-4687-9e06-f790ccdfd5bb  연관키워드 20260430 0751.xlsx          (431019 B)\n876f3cac-59df-4d07-86c4-829777ddbbde  연관키워드 20260430 0752.xlsx          (389663 B)\na86d4468-1305-457c-ac48-aa9de63a3bb7  연관키워드 20260430 0752 (1).xlsx     (432641 B)\n2eb8c5fd-6e3b-42c8-b22a-52b9f9a21792  연관키워드 20260430 0752 (2).xlsx     (432641 B)\ndb727777-88aa-4c94-9271-e0485f322b34  연관키워드 20260430 0753.xlsx          (369786 B)\n8947434c-2038-4825-b5b0-2f601e136c25  연관키워드 20260430 0753 (1).xlsx     (93300 B)\nff9523ec-cfdd-4619-88a8-216cb1cdb1f6  연관키워드 20260430 0753 (2).xlsx     (420043 B)\n620d3616-5079-4c5c-b9b9-85cf13ddeba5  연관키워드 20260430 0753 (3).xlsx     (268169 B)\n8389b203-32e2-4420-b252-dd9af7a8ba7e  연관키워드 20260430 0754.xlsx          (414241 B)\n1e431851-f333-4055-8f4a-7a43f035e9f3  연관키워드 20260430 0754 (1).xlsx     (172593 B)\ne524b2ce-d9f6-42db-ab68-aa5dffd96e1a  연관키워드 20260430 0754 (2).xlsx     (426561 B)\n60f6c67e-dd71-4839-8211-e8518ef1a476  연관키워드 20260430 0754 (3).xlsx     (426260 B)\n```\n\n### Backend 액션\n\n1. 12 xlsx fetch: `curl -H \"Authorization: Bearer $PAPERCLIP_API_KEY\" $PAPERCLIP_API_URL/api/attachments/<id>/content -o batchN.xlsx`\n2. openpyxl/pandas 로 파싱 → 컬럼 정규화 (월간검색수 = PC + 모바일 합산)\n3. 60 키워드 (K01~K50, R01~R10) 와 매칭. **주의:** Naver 연관키워드 다운로드는 입력 5개 외에 \"연관 키워드\" 도 함께 반환 — 파일에 100~수백 행 있을 수 있음. 우리가 입력한 60개 keyword 행만 추출.\n4. monthly_volume + competition 채워서 `pacaa91_keyword_volumes_filled.csv` 산출\n5. `pacaa91_apply_volumes.py` 실행 → 임계값 (월≥50 AND 경쟁도∈{낮음,중간}) → 미통과 → 같은 카테고리 R 풀 교체\n6. `pacaa91_v1_1_final.csv` + plan §12 markdown\n7. PACAA-82 plan §12 패치 → `request_confirmation` v1.1 → 보드 사인오프 → PACAA-93/94 unblock\n\n### Edge case 처리\n\n- 입력 60개 중 Naver 결과에 \"검색수가 적어 표시되지 않음\" 또는 누락된 keyword: monthly_volume = 0, competition = high 로 기본 → 임계값 미통과 처리.\n- 배치 파일에 (1)/(2)/(3) suffix 가 같은 0752/0753/0754 시각 = 보드가 같은 시각에 다운로드 여러 번 한 것. 파일별 입력 키워드 5개 다를 수도, 같을 수도 있음. 파일 내 \"연관키워드\" 컬럼에서 우리 입력 60개와 교집합 추출하면 자연스럽게 dedup.\n- 60 입력 중 매칭 0건인 키워드 있으면 코멘트로 보고 → 보드에 재요청.\n\n### Reassign\n\nBackend (3177894b) 에게 재배정. 본 코멘트 직후 PATCH assigneeAgentId."
