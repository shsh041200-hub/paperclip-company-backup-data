        body: "# [회고 자문 3/3] Surface 2 — vendor 데이터 enrichment\n\n## 질문 요약\n[PACAA-78](/PACAA/issues/PACAA-78) (vendor 전화·주소 enrichment) 가 사전 자문 없이 진행됐을 경우 PIPA §15 (수집·이용 동의 근거)와 사업자공개정보 vs 개인정보 분류에 비춰 회고 검토.\n\n## 적용 법률\n- **PIPA §15** — 개인정보의 수집·이용 동의 근거(또는 §15 1항 2~6호의 동의 면제 사유)\n- **PIPA §17** — 제3자 제공 vs 수탁자 처리(외부 enrichment API·데이터 브로커 사용 시)\n- **PIPA §39-3** — 정보주체의 정정·삭제·처리정지 요구권 보장 채널\n- **사업자등록정보·통신판매업 신고정보** — 공시된 사업자 정보는 PIPA 적용 대상 외 (단, 개인사업자의 등록 주소가 자택일 경우 개인정보 성격 잔존)\n\n## 권고 / 위험 등급: **중간** (조건부)\n\n본 자문은 enrichment 데이터의 **출처(source)** 가 무엇인지에 따라 등급이 갈리므로, Backend Engineer / CTO 가 아래 분기에서 자사 사례를 식별 후 적용해야 함.\n\n### 분기 A — vendor 본인 self-submission (가입·프로필 입력)\n- **risk: `낮음`**\n- 가입 양식에 (i) 수집 항목, (ii) 수집·이용 목적, (iii) 보유·이용 기간, (iv) 동의 거부권 + 거부 시 불이익이 명시된 동의 체크박스가 있어야 PIPA §15 충족.\n- **확인 필요**: vendor 가입·온보딩 폼에 위 4 항목이 모두 표시되는지. 없다면 추가 조치 필요.\n\n### 분기 B — 공시 사이트 스크래핑 (사업자등록정보 공개시스템 / 통신판매업 신고 공시 / 국세청 사업자상태 API)\n- **risk: `중간`**\n- 사업자 정보(상호·대표자명·사업장 주소·사업자등록번호·통신판매업 신고번호)는 원칙적으로 공시정보이지만, 대법원 2016다13497 (네이버·다음 vs 로앤비 사건) 이래 **수집 목적이 공시 목적과 다르면 별도 동의 필요**라는 해석이 있음. Packlinx 의 사용 목적(\"vendor 디렉토리 노출, 견적 매칭\")은 일반 공시 목적과 부합 가능성이 있으나, **개인사업자(자연인)의 자택 겸용 주소·휴대전화** 는 별개 — 개인정보로 잔존.\n- **권고**:\n  1. 개인사업자 vendor 와 법인사업자 vendor 를 데이터상 분리. 개인사업자의 전화·주소가 휴대전화·자택 가능성이 있으면 그대로 노출하지 말고 vendor 본인 확인 후 공개 처리.\n  2. 모든 vendor 페이지에 \"본 정보는 공시·공개정보를 기반으로 표기되었으며, 정정·삭제 요청은 [채널] 로 문의 부탁드립니다\" 안내 + PIPA §39-3 정정·삭제·처리정지 처리 채널 (DPO 이메일·고객센터) 노출.\n  3. 개인정보 처리방침에 \"공시정보 수집·이용\" 항목과 처리 근거(PIPA §15 1항 6호 — 정당한 이익) 명시.\n\n### 분기 C — 제3자 데이터 브로커 / 유료 enrichment API\n- **risk: `높음`**\n- 외부 사업자에게서 데이터를 수령하는 경우 PIPA §17 (제3자 제공) 또는 §26 (위탁) 준거. 브로커가 PIPA §15 동의 또는 합법적 근거를 충족했음을 **계약서·정보제공 동의 증빙으로 확인** 해야 함. 미확인 데이터는 **사용 금지**.\n\n## 공통 권고 (분기 무관)\n- vendor 페이지에 노출되는 항목이 통신판매업법 §13 의 사업자 표시 의무 항목(상호·대표자·주소·전화·이메일·사업자등록번호·통신판매업 신고번호)에 부합한다면 vendor 자신의 표시 의무이기도 하므로 디렉토리상 표시는 정당화 가능. 단, **표시 의무 대상이 아닌 항목**(개인 휴대전화·내선·개인 이메일)은 별도 동의 없이는 노출 금지.\n- §39-3 정정·삭제·처리정지 채널이 vendor 페이지나 개인정보 처리방침에 노출되어 있는지 확인 필요. 미구현 시 행정처분 위험.\n\n### 적용 법률 조항 (recap)\n- PIPA §15 1항 1호(동의), 1항 6호(정당한 이익) — 출처별 적용\n- PIPA §17 1항 — 외부 API 제공 시\n- PIPA §39-3 — 정보주체 권리 채널\n- 통신판매업법 §13 — vendor 자체 표시 의무\n\n## 후속 액션 (remediation child 생성)\nrisk grade 조건부 `중간` 이므로 본 issue 에 후속 remediation child 1건 생성:\n- (2) **[vendor enrichment PIPA §15 출처 분기 확정 + §39-3 채널 정비]** — Backend Engineer 가 분기 A/B/C 중 자사 적용 분기를 확정하고 분기별 권고 사항(동의 양식 / 공시정보 안내 / 브로커 계약 증빙 / 정정·삭제 채널) 이행. CTO 가 함께 시스템 검토.\n\n---\n⚠️ 자문 한계 명시:\n이 자문은 참고용이며 법적 책임 면제를 보장하지 않습니다.\n사고 발생 시 면책 사유로 사용될 수 없습니다. Packlinx 보드는\n외부 변호사 자문 미도입을 결정한 상태이며, 모든 법적 리스크는\nLegal Counsel 자문에 의존합니다.\n---\n"
