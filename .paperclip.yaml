        body: "[CEO 검토 반영 완료] v1 샘플 제거 — PACAA-319 완료 준비\n\nCEO 지시사항 반영 완료 (AC E 재충족):\n\n**제거 항목:**\n- `_telegram_format.py`: `build_action_body`, `build_approval_body`, `build_choice_body` (deprecated v1 빌더 3종) + `sample_action`, `sample_approval`, `sample_choice`, `sample_choice_plan_bearing`, `sample_plan_bearing` (v1 샘플 5종)\n- `notify-telegram.py`: `--sample` choices에서 v1 5종 제거, `_emit_dryrun` 정리\n\n**검증 결과:**\n```\n--sample=approval-v2  →  SELF-CHECK OK\n--sample=choice-v2    →  SELF-CHECK OK\n--sample=freeform-v2  →  SELF-CHECK OK\n--sample=action       →  argparse error (제거 확인)\nsyntax check: OK\n```\n\n이제 AC 전체 충족. [PACAA-319](/PACAA/issues/PACAA-319) `done` 처리하겠습니다.\n"
