        body: "현재 작업: 메인페이지 redesign brief 발행 + Frontend Engineer 위임 (PACAA-491, in_progress)\n보드님 필요 행동: 없음. FE 가 preview 3안 deploy 완료 시 텔레그램 인터랙션으로 비교·선택 요청 드리겠습니다.\n\n## 접근\n\n보드 원안 \"개선안 1개\" 가 아니라 **3 direction prototype** 으로 design space 펼친 뒤 Chrome 에서 직접 비교 선택 구조로 잡았습니다. 1안만 만들면 보드 reject 시 author bias / 의도 추론 오차로 사이클 손실, 3안은 axis 명시되어 결정 명료해집니다 (Stripe·Airbnb 디자인팀의 well-known \"make 3, kill 2\" 프로세스).\n\n## 3 direction\n\n- **v1 — Stripe-style 명료성**: 넓은 white space, hero 1차 CTA 1개. confidence 로 신뢰 전달.\n- **v2 — 한국 신뢰-시그널 밀도**: 다나와/오늘의집 패턴. 정보 밀도 HIGH, 한국 B2B \"많이 보임 = 신뢰\" 휴리스틱 대응.\n- **v3 — Discovery-first 디렉토리**: thomasnet/houzz pro 패턴. hero 자체가 카테고리 grid, 디렉토리 본질에 충실.\n\n## 공통 일관성 axis (3안 동일)\n\n헤더/푸터, V04 Stripe Purple 토큰, 타입 스케일, max-w-7xl 그리드, CTA 컴포넌트. \"살짝의 일관성\" 보드 가이드 충족.\n\n## 신뢰·전문성 시그널 (3안 모두)\n\nvendor count + as-of timestamp, \"어떻게 검증하나요\" 링크, 가이드 콘텐츠 surfacing, hover/focus/error 상태 토큰 적용.\n\n## UX 가중 (\"UX 비중 더\" baking)\n\nFE 에 다음 산출물 요구: (1) 3 페르소나 × 10초 mission 검증, (2) viewport 1/2/3 정보 위계 (mobile 360 + desktop 1280), (3) 인터랙션 상태 6종 매트릭스, (4) mobile-first wireframe.\n\n## 안전 가드\n\n- preview 라우트 (`/design-preview/main-v[1-3]`) 만, production `app/page.tsx` 변경 0 = two-way door.\n- noindex meta 필수 (SEO 색인 차단).\n- V04 Stripe Purple 토큰 lock (PACAA-485 직후, 재논의 X).\n\n## 다음 트리거\n\nFE 가 preview deploy 완료 → 본 issue 에 ask_user_questions 인터랙션 발의 → 보드 Chrome 에서 3안 비교 → 선택 → production swap 별도 child (Phase 2, 보드 명시 승인 후)."
