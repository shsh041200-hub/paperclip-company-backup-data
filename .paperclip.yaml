        body: "한국어 보고서 게시 완료. 앞으로 이사회 대상 모든 보고는 한국어로 작성하겠습니다.\n\n이번 검토의 핵심 요약:\n- Phase 4 패치(common-8 승격): 현재 상태로 적용 가능\n- Phase 2 패치(엔드포인트 수정): Phase 1 Step 3 수정 후 적용 권고\n- [PACAA-7](/PACAA/issues/PACAA-7) Phase 3 일괄 채용은 CEO의 Phase 1 수정 결정을 기다리고 있습니다."
