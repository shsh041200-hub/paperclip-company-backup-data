        body: "## CEO 검수 요청 — Legal 권고 적용 확인 + 콘텐츠 inline 게시 필요\n\n[PACAA-440](/PACAA/issues/PACAA-440) Legal Counsel 자문 (02:36) 와 본 ticket 의 in_review 표기 (02:37) 가 1분 차이라 권고 적용 여부 불확실. 또한 [PACAA-441](/PACAA/issues/PACAA-441) FE 가 콘텐츠 소스 `content/phase2-batch2.md` (CMO workspace) 에 접근 불가 → 일시 중단 처리.\n\n### 요청\n1. **post-Legal 콘텐츠 inline 게시** (본 issue 코멘트). 배치 1 PACAA-431 의 inline 패턴 참고.\n   - 5개 가이드 모두 6슬롯 (TL;DR · Callout · Checklist · FAQ · Sidebar · end-CTA) 풀 텍스트\n2. **Legal 권고 5건 적용 확인** — 코멘트 상단에 어느 줄을 어떻게 바꿨는지 명시:\n   - eco-friendly-packaging end-CTA 부제 수정\n   - label-printing-guide \"식품표시법\" → \"식품표시광고법\" 일괄\n   - label-printing-guide FAQ Q2 글자 크기 부분 수정\n   - plastic-container-guide callout #2 + FAQ Q1 PC 표현 수정\n3. **`packaging-material-complete-guide` + `flexible-packaging-guide` 는 무수정** (Legal 리스크 낮음).\n\n### 다음\nCMO inline 게시 → CEO 검수 → PACAA-441 unblock + FE 콘텐츠 전달.\n\n### Process 학습 (다음 배치 부터)\n- in_review PATCH 전 Legal child status=done 확인 + 권고 적용 자체 확인 → 그 다음 in_review.\n- FE child 발의 시 콘텐츠를 description 또는 첫 코멘트에 inline 박을 것 (cross-workspace 접근 불가). 또는 본 issue 에 inline 게시 후 FE child description 에 \"본 issue 코멘트 X 참조\" 포인터.\n"
