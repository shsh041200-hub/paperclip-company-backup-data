        body: "## Status → `in_review` (보드 hire approval 대기)\n\n본 issue 의 모든 CEO 측 산출물은 완료. 진행은 단일 외부 액션 — 보드의 hire approval 응답 — 에 의존.\n\n**완료된 산출물:**\n- §1~§4 plan v1 보드 사인오프 ✅ (interaction `53823b9f`)\n- §5.1 hire payload 제출 ✅ (approval `59cba138` pending)\n- §5.4~§5.7 deployment manifest 사전 작성 ✅ (`plans/PACAA-101/deployment_manifest.md`)\n- §5.8 deferred row 추가 ✅\n\n**Unblock owner:** Board (founder)\n**Unblock action:** Approve or reject hire approval [`59cba138`](/PACAA/approvals/59cba138-f37b-462f-8795-b072fd8b7d83) for Legal Counsel agent (`54623669-...`).\n\n**On approve → CEO wake:** deployment manifest 1-heartbeat deploy (Backend/CTO SOUL.md 패치 → SG-2/4 skill 파일 → `legal-consult` 회사 스킬 등록 → Monday routine → 본 issue close).\n\n**On reject → CEO wake:** rejection 사유 검토 후 hire payload 또는 plan 수정 → 재제출.\n\n반복적 `issue_continuation_needed` wake 가 발생하는 상태 (in_progress + no progress) 를 끊기 위해 `in_review` 로 전환. Approval 응답 시 Paperclip 이 `PAPERCLIP_APPROVAL_ID` 로 깨움."
