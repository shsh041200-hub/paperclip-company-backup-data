        body: "## 보드 질문 응답 — \"운영 owner\" 정의\n\n**현재 작업**: 보드 질문 응답.\n**보드님 필요 행동**: 정의 확인 후 텔레그램 `fe585fae` Q1 답변.\n\n### 정의 (LC PACAA-509 §6)\n\n\"운영 owner\" = **`is_verified` 컬럼 라이프사이클 단일 책임자**. 사이트 SRE/uptime 운영이 아니라, **vendor 데이터 운영** 의미.\n\n### 구체적 책무 (LC criteria.md §1~3)\n\n| # | 책무 | 빈도 | 시간 추정 (vendor 1건당) |\n|---|---|---|---|\n| 1 | 신규 vendor 등록 시 §1 5종 기준 (BRN 유효·명의 일치·도메인 실재·통신판매업 신고·양방향 연락) 검증 + 결과 evidence 보존 | 신규 등록마다 | ~10분 (자동화 시 ~2분) |\n| 2 | 정기 갱신 (12개월 1회) — 1·2번 기준 재조회 | 연 1회 vendor 별 | ~5분 |\n| 3 | 이벤트 트리거 갱신 (vendor 정보 self-update / 도메인 변경 / 사용자 신고 누적 3건) | 발생 시 | ~10분 |\n| 4 | 박탈 결정 — 7종 사유 (휴·폐업·도메인 다운·연락 불가·통신판매업 말소·사용자 신고 사실 확인·공정위 시정조치) | 발생 시 | ~15분 |\n| 5 | 박탈 시 vendor 통지 (메일·대시보드) | 박탈마다 | ~5분 |\n| 6 | evidence 자료 3년 보존 + 공정위 자료 요구 시 15일 내 제출 | 분기 점검 + 사건 시 | 분기 ~1h |\n| 7 | criteria.md 개정 시 LC 와 사전 검토 | 연 1회 또는 중대 변경 시 | ~2h |\n\n→ **현재 vendor 카운트** 기준 estimate: vendor ~50건 가정 시 정기 갱신 연 ~4h + 신규 등록 trigger 기반 (월 0~몇 건). **연 ~10~20h 이내 운영 부담** (자동화 진척에 따라 감소).\n\n### LC 표시광고법 §4(1) 컨텍스트\n\n공정위 조사 시 \"이 표시 (`정보 등록`/`is_verified`) 의 실증 자료를 누가 보유하느냐\" 가 질문. 이름·역할이 회사 내부 문서에 명시된 단일 인물이 답이어야 면책 자료가 된다. \"전사 공동 책임\" / \"미지명\" = 공정위 시각상 책임 회피로 간주 가능.\n\n### 후보별 fit (참고)\n\n| 후보 | fit | 이유 |\n|---|---|---|\n| **CEO 본인** | ★★★ 가장 정합 | 이미 컴플라이언스/Legal Counsel oversight 보유. 운영 부담 ~10~20h/연. 단, founder 의 보드 시간 분배에 영향 미미. |\n| CMO | ★★ 부분 정합 | vendor 관계·content owner 자연 정합. 단 §6 책임 (박탈·evidence) 은 운영 mode CMO 가 익숙치 않을 수 있음. |\n| 보드 본인 | ★ 비권고 | founder 직속 = 운영 부담 증가. governance 결정만 보드 권한이 일반적. |\n| defer | △ 단기만 | LC: 미지명 상태 = §4(1) 책임 공백. 1주 내 지명 권고. defer 시 임시 비활성화 옵션 (Q2) 와 paired 권장. |\n\n### 추가 옵션 (질문에 없던)\n\n보드가 위 4개 외에 다른 인물 (예: 외주 운영 인력 / 신규 hire) 지명 의향이면 텔레그램 `fe585fae` 의 \"기타\" 자유 입력 활용.\n\n---\n\n질문 더 있으면 코멘트 또는 텔레그램 응답 부탁드립니다."
