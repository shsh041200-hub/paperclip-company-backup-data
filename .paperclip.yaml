        authorAgentSlug: "ceo"
        authorType: "agent"
        body: "## 업체 카테고리 개선안 — 진단 + 옵션 + 권고\n\n**한 줄 결론.** 현재 L1 카테고리 8개에는 *서로 다른 분류 축* 4가지가 섞여 있어 사용자 멘탈 모델과 어긋남. **권고 = \"축 분리 하이브리드(옵션 C)\"** — 다만 SEO가 일부 비가역이라 **실행 전 보드 결정 필요**.\n\n---\n\n### 1. 진단 — 무엇이 잘못됐나\n\n현재 L1 산업 카테고리(`IndustryCategory`, 8종) 구성:\n\n| 슬러그 | 라벨 | 실제 분류 축 |\n|---|---|---|\n| food-beverage | 식품·음료 포장 | 산업 수직 |\n| cosmetics-beauty | 화장품·뷰티 포장 | 산업 수직 |\n| pharma-health | 의약·건강 포장 | 산업 수직 |\n| electronics-industrial | 전자·산업 포장 | 산업 수직 |\n| **ecommerce-shipping** | 이커머스·배송 포장 | **사용처(use-case)** |\n| **eco-special** | 친환경·특수 포장 | **소재 속성** |\n| **fresh_produce_packaging** | 농산물·신선 포장 | **food-beverage의 부분집합** |\n| **print_design_services** | 인쇄·디자인 서비스 | **서비스 유형(제품 아님)** |\n\n**문제점 4가지:**\n\n1. **분류 축 혼재.** 산업 수직 / 사용처 / 소재 / 서비스 — 4개 축이 같은 레벨에 섞여 있음. 사용자가 \"친환경 식품 포장\"을 찾을 때 `food-beverage`를 봐야 할지 `eco-special`을 봐야 할지 모호.\n2. **의미 중복.**\n   - `eco-special`(L1 산업) ↔ `eco-material`(L2 소재 필터) — 같은 개념이 두 레이어에 중복.\n   - `fresh_produce_packaging` ⊂ `food-beverage` — 신선식품은 식품의 부분집합인데 형제 카테고리로 분리됨.\n3. **슬러그 네이밍 비일관.** kebab-case(`food-beverage`) + snake_case(`fresh_produce_packaging`) 혼용. 향후 URL/리포트/AI 분류기 모두 취약.\n4. **분류 신호 다중.** `category`(소재) + `industryClassification`(산업) + `tags` + `subcategory` 4종이 각각 다른 룰셋으로 동시 결정됨 → 분류기 충돌 가능. (`tags`의 6종은 `IndustryCategory` 6종과 거의 1:1 중복.)\n\n---\n\n### 2. 벤치마크 — 어떻게 풀고 있나\n\n| 사례 | WHAT | WHY | Packlinx 시사점 |\n|---|---|---|---|\n| **Uline** (북미 카탈로그 1위) | L1 = 제품 형태 (박스/파우치/라벨/테이프…). 산업은 별도 사이드바. | B2B 바이어는 \"박스가 필요하다\"부터 시작 — 제품 진입점이 보편적. | 제품 형태 축이 SEO/검색 매칭에 가장 강함. |\n| **Thomasnet** (북미 산업 디렉토리) | 제품 × 공정 × 소재 = 직교 다축 분류. 산업 수직은 부가 필터. | 산업은 *인증·규제* 신호이지 *제품* 신호가 아님 → 두 축은 분리해야 함. | 우리도 산업과 제품을 같은 레벨에 두면 안 됨. |\n| **Alibaba** | 1차 제품 카테고리, 2차 공급자 검증 필터(Verified, MOQ). | 신뢰 필터는 *제품 안에서* 작동해야 B2B 의사결정과 맞음. | 인증·검증은 카테고리가 아닌 패싯 필터. |\n| **위키트(국내 포장 버티컬)** | 산업 중심 진입. | 한국 식품/제약 발주는 *인증* 부터 묻기 때문에 산업 진입이 자연스러움. | 산업 축을 *완전히* 제거하면 규제 산업 바이어의 진입 경로를 잃음. |\n\n**핵심 통찰:** 어느 한 축만 선택한 디렉토리는 모두 다른 축을 *필터/태그*로 보완한다. Packlinx는 두 축을 **같은 레벨**에 섞어버린 게 문제.\n\n---\n\n### 3. 옵션 비교\n\n| 옵션 | 내용 | 공수 | SEO 리스크 | 사용자 효익 | 가역성 |\n|---|---|---|---|---|---|\n| **A. 정리** | 슬러그 통일(kebab-case), `eco-special` → 소재 필터로 흡수, `fresh_produce` → `food-beverage` 흡수, 라벨 다듬기 | 1~2일 | 중 (4개 슬러그 변경 + 301) | 낮음 (구조는 그대로) | 부분 비가역 |\n| **B. 제품 중심 재설계** | L1 = 제품 형태(박스·파우치·라벨·용기·완충재…). 산업은 패싯 필터로 강등. Uline 모델. | 1~2주 | **높음** (전체 URL 구조 변경) | 높음 (보편적 진입점) | 비가역 (백링크 손실) |\n| **C. 축 분리 하이브리드** ★ | L1을 **두 축**으로 명시 분리: ① 제품 형태(`/products/박스`) ② 산업 수직(`/industries/식품`). 둘 다 일급 페이지. 소재·인증·용도는 패싯 필터. | 1주 + 데이터 재라벨 | 중 (산업 슬러그는 유지, 제품 신설) | 높음 (두 입구 모두 확보) | 추가는 가역, 산업 정리는 부분 비가역 |\n\n---\n\n### 4. 권고 — 옵션 C, 단계적 실행\n\n**근거:**\n- 한국 시장 특성상 **산업 진입(인증 중심)** 을 버릴 수 없고, 글로벌 B2B 디렉토리 표준상 **제품 진입(보편 검색)** 도 필수.\n- 두 축을 같은 레벨에 섞은 게 현재 문제이므로, **분리하면 두 축 모두 강해진다.**\n- 산업 슬러그는 유지하므로 인덱싱된 SEO 자산 보존.\n- 제품 카테고리는 신설이므로 점진 추가 가능 → 두 번째 SEO 자산 축적 시작.\n\n**제안 구조 (안):**\n\n```\n/industries/[slug]   ← 산업 수직 (현 IndustryCategory를 정리)\n  ├ food-beverage           (fresh_produce 흡수)\n  ├ cosmetics-beauty\n  ├ pharma-health\n  ├ electronics-industrial\n  └ ecommerce-shipping       (사용처지만 한국에서 검색량 확실 → 유지)\n\n/products/[slug]    ← 제품 형태 (신규 L1, Uline 패턴)\n  ├ 박스·골판지\n  ├ 파우치·필름\n  ├ 용기·보틀\n  ├ 라벨·스티커\n  ├ 완충재·테이프\n  └ 인쇄·디자인 서비스       (현 print_design_services 이전 — 산업 아님)\n\n패싯 필터 (모든 페이지 공통):\n  ├ 소재  (paper / plastic / film / glass-metal / eco)\n  ├ 인증  (HACCP / ISO 22716 / GMP / FSC / GRS …)\n  ├ 친환경 여부  (현 eco-special을 패싯으로 전환)\n  ├ 사용처 태그\n  └ MOQ / 샘플 가능\n```\n\n**제거/통합:**\n- `eco-special` (L1) → 패싯 \"친환경 인증\" 으로 강등.\n- `fresh_produce_packaging` → `food-beverage` 흡수, 패싯 \"신선·콜드체인\"으로 표현.\n- `print_design_services` → `/products/인쇄·디자인` 으로 이동(산업이 아니므로).\n- `tags` 6종 ↔ `IndustryCategory` 중복 제거 — 단일 분류 신호로 통합.\n\n---\n\n### 5. 리스크 / 가역성\n\n| 항목 | 가역성 | 대응 |\n|---|---|---|\n| `/categories/[slug]` URL 구조 | **One-way door (SEO)** | 변경 전 네이버/구글 인덱싱된 페이지 트래픽 점유율 조사 → 301 매핑 표 필수 |\n| DB 분류 키/라벨 정리 | Two-way door | 안전. 분류기 룰만 단일화 |\n| 신규 `/products/*` 페이지 신설 | Two-way door | 추가만 하므로 무위험 |\n| `fresh_produce` 흡수 | One-way (slug 폐기) | 301 + sitemap 갱신 |\n\n---\n\n### 6. 보드 결정 요청\n\n다음 셋 중 하나를 선택해 주십시오:\n\n- **(A) 정리만 진행** — 빠르지만 구조 문제 잔존. 권장하지 않음.\n- **(B) 제품 중심 재설계** — 깨끗하나 SEO 리스크 큼, 산업 진입 잃음.\n- **(C) 축 분리 하이브리드** ★ — CEO 권고. 단, 다음을 선결:\n  1. 현재 카테고리 페이지의 검색 유입 점유율 조사 (CTO에게 발주)\n  2. 제품 형태 L1 슬러그 안 확정 (디자인/리서치 필요 시 별도 인력 검토)\n  3. 301 리다이렉트 매핑표 작성 후 보드 재승인\n  4. 마이그레이션은 단계적: ① 제품 페이지 신설 → ② 산업 정리 → ③ 패싯 필터 통합\n\nC를 승인하시면 위 4단계 각각을 별도 티켓으로 발주하고, 단계별로 보드 체크포인트를 두겠습니다.\n\n— CEO\n"
