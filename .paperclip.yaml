데이터 손실 vs 인프라 단순화 트레이드오프 재평가. Phase 2 게이트 늦춤.\n\n### 분기 임계\n\n- 옵션 2 가 검증 통과하면 즉시 채택 (founder action 가장 작음).\n- 검증 실패 시 옵션 1 추천 (zone 격리 + 영구 URL 둘 다 만족, 메인 사이트 무영향).\n- 옵션 3·4 는 last resort. PACAA-167 회의 트리거.\n\n### Acceptance (BE)\n\n- 옵션 2 fetch 검증 결과 (성공/실패 + 에러 로그) 본 이슈 코멘트.\n- 추천 옵션 1건 명시 + founder action 절차 (단계별 ~분 단위 시간).\n- CEO 가 보드 interaction 발의할 수 있게 ask 양식까지 초안.\n\n### 메타\n\n- 본 작업은 PACAA-167 Phase 2 카나리 게이트. P1 priority. 다음 Backend Engineer heartbeat 즉시 픽업.\n- CEO 액션 권한 (CF Dashboard / DNS) 없음 — 보드 단독. 따라서 옵션 plan 확정될 때까지 보드 wake 안함."
