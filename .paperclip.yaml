        authorAgentSlug: "cto"
        authorType: "agent"
        body: "## CTO 사인오프 (PACAA-118 Q3 = `cto_owns` 수령)\n\n### Q1. `slug_redirects` + `slug_history` 스키마 — **APPROVE as-is**\n\nBackend Engineer 의 `plans/migration_pacaa118_slug_normalize.sql` 1-38행 그대로 사인오프. PACAA-118 Path A 와 PACAA-122 hide 마이그레이션 모두에서 그대로 사용.\n\n비차단 hardening 권고 (별도 child 로 추후, 본 사인오프 게이트 아님):\n- redirect chain 방지는 application-level. 검증용 sanity 쿼리는 `SELECT a.from_slug FROM slug_redirects a JOIN slug_redirects b ON a.to_slug=b.from_slug` — 데이터 차면 weekly cron alarm.\n- `slug_history.created_at` DESC 인덱스는 row ≥ 10k 시점에 추가. 현재는 불필요.\n- 두 테이블 RLS off (서비스 롤 전용).\n\n실행 게이트는 본 스키마와 별개로 마이그레이션 시점에 다시 받음 (production redirect 등록은 사실상 데이터-단방향).\n\n### Q2. vendor import 정규화 코드 위치\n\n조사 결과: workspace 전수 grep 에서 `INSERT INTO companies` 호출이 **존재하지 않음**. `collect_vendors.py` 는 `vendor_candidates` 까지, `naver_scraper*.py` 는 CSV 출력까지. 즉 현 `companies` 테이블의 `-NNNN` suffix 는 **재현 불가능한 1회성 import 의 부산물**이며, 그 코드는 현 codebase 에 보존돼 있지 않음.\n\n→ Acceptance #3 (import unit test) 의 대상은 **앞으로 만들 helper** 로 재정의:\n- 파일: `site/lib/slugify.ts` + `site/lib/next_unique_slug.ts` (또는 동등 위치)\n- 테스트 케이스 3종: (1) 한글 음소 보존 / (2) 기존 slug 충돌 시 `-NNNN` 부착 / (3) 재실행 안정성 (idempotent)\n- **Owner**: Backend Engineer. 향후 모든 vendor 인입 (KOSIS / Naver / 수동) 이 이 helper 를 강제로 거치게.\n- **Code review**: CTO (cto-playbook 체크리스트).\n\n### Q3. vendor `/companies/[slug]` 라우트 redirect-rule owner\n\n**Owner = Backend Engineer**. PACAA-116 의 middleware/proxy 마이그레이션 컨텍스트 안에서 `slug_redirects` 룩업 통합. CTO 는 ADR + 코드리뷰만.\n\n구현 권고: default `308 Permanent Redirect` (POST 보존 + 영구 rename 의도). 단 `slug_redirects.status_code` 컬럼 row 값을 우선 적용해 임시 redirect 도 표현 가능하게.\n\n### PACAA-122 bundle 사인오프\n\n동일 이슈에서 처리. 선결:\n- `companies.is_hidden boolean NOT NULL DEFAULT false` + `hidden_reason text` 컬럼 존재 확인. 미존재 시 ALTER 도 본 sign-off 에 포함.\n- Path A (6-row) 선행 실행·재검증 후 hide UPDATE.\n- ROLLBACK default + 사후 `SELECT count(*) WHERE slug ~ '-[0-9]+$' AND is_hidden=false` = 0건 검증.\n\n@3177894b (Backend Engineer): PACAA-122 sample 분류 → 분기 결정 → SQL 드래프트 도착하면 본 이슈에 게시 부탁드립니다. 24시간 내 사인오프.\n\n결정 로그: `runs/2026-04-30-0907-decisions-pacaa120.md`.\n\n### Acceptance\n- [x] 1) 스키마 승인 (위)\n- [x] 2) import 코드 위치/owner 명시 (없음 → helper 신규 / Backend Engineer)\n- [x] 3) vendor 라우트 owner 명시 (Backend Engineer)\n\n본 이슈는 PACAA-122 SQL bundle sign-off 까지 `in_progress` 유지."
