schema: "paperclip/v1"
agents:
  backend-engineer:
    role: "engineer"
    icon: "code"
    capabilities: "Owns the Packlinx data layer — schema, ingestion pipeline, dedup + canonicalization, profile completeness audit. SG-1 (8-category vendor registration 90%) named owner; direct owner of P1.1–P1.4. Cross-cuts data model with CTO; co-owns P4.3 vendor-self-exposure analytics with Frontend Engineer post Pair 2."
    adapter:
      config:
        chrome: true
        effort: "medium"
        graceSec: 50
        model: "claude-sonnet-4-6"
      type: "claude_local"
    runtime:
      heartbeat:
        enabled: true
        intervalSec: 1800
    inputs:
      env:
        GOOGLE_API_KEY:
          description: "Optional default for GOOGLE_API_KEY on agent backend-engineer"
          kind: "secret"
          default: ""
          requirement: "optional"
        GOOGLE_CSE_ID:
          description: "Optional default for GOOGLE_CSE_ID on agent backend-engineer"
          kind: "plain"
          default: "855ca665efef34152"
          requirement: "optional"
        NAVER_CLIENT_ID:
          description: "Optional default for NAVER_CLIENT_ID on agent backend-engineer"
          kind: "plain"
          default: "b2ukaD9bJtRo9C83IBRT"
          requirement: "optional"
        NAVER_CLIENT_SECRET:
          description: "Optional default for NAVER_CLIENT_SECRET on agent backend-engineer"
          kind: "secret"
          default: ""
          requirement: "optional"
  ceo:
    role: "ceo"
    adapter:
      config:
        chrome: true
        dangerouslySkipPermissions: true
        effort: "high"
        graceSec: 500
        maxTurnsPerRun: 3000
        model: "claude-opus-4-7"
      type: "claude_local"
    runtime:
      heartbeat:
        cooldownSec: 30
        intervalSec: 300
        maxConcurrentRuns: 1
    permissions:
      canCreateAgents: true
  cmo:
    role: "cmo"
    icon: "search"
    capabilities: "Owns SG-2 SEO acquisition end-to-end: search-intent mapping, programmatic landing optimization, in-depth category guides, and Naver SA + GSC ops — with E-E-A-T discipline and Legal sign-off for competitor-touching content."
    adapter:
      config:
        chrome: true
        effort: "medium"
        graceSec: 50
        model: "claude-sonnet-4-6"
      type: "claude_local"
    runtime:
      heartbeat:
        enabled: true
        intervalSec: 1800
        maxConcurrentRuns: 3
  cto:
    role: "cto"
    icon: "circuit-board"
    capabilities: "Owns Packlinx technical foundations: architecture, code review, infrastructure, plugin authoring."
    adapter:
      config:
        chrome: true
        effort: "medium"
        graceSec: 50
        model: "claude-sonnet-4-6"
      type: "claude_local"
    runtime:
      heartbeat:
        enabled: true
        intervalSec: 1800
        maxConcurrentRuns: 1
  e5-worker:
    role: "general"
    icon: "git-branch"
    capabilities: "Identity-only service account. Holds the JWT used by the Cloudflare Worker (PACAA-168) to call POST /api/issues/{id}/comments when a GitHub PR with PACAA-XXX in title/body is merged. No autonomous behavior, no LLM, no heartbeat. The agent record exists solely so wake-event comments are stamped 'E5 Worker' (clean audit) instead of 'CEO' (mis-attribution)."
    adapter:
      config:
        timeoutSec: 5
      type: "process"
    permissions:
      canCreateAgents: true
  frontend-engineer:
    role: "engineer"
    icon: "code"
    capabilities: "Owns the buyer-facing and vendor-facing rendered surface of Packlinx — programmatic SEO landing pages (P5.1~P5.3), search/browse, vendor profile pages, and the vendor self-action portal (SG-4 / P4.1~P4.3). Korean-first, mobile-first, SSG/SSR for SEO. Coordinates with CMO on content/keyword strategy and Backend Engineer on data shape."
    adapter:
      config:
        chrome: true
        effort: "medium"
        graceSec: 50
        model: "claude-sonnet-4-6"
      type: "claude_local"
    runtime:
      heartbeat:
        enabled: true
        intervalSec: 1800
  legal-counsel:
    role: "general"
    icon: "shield"
    capabilities: "한국 법률 한정 사내 자문 — PIPA / 표시광고법 / 통신판매업 / 저작권·상표권 / 약관·처리방침. 호출 시 자문 + 주 1회 정기 점검. 자문 산출만 수행, 다른 에이전트에 배정 금지."
    adapter:
      config:
        dangerouslySkipPermissions: true
        effort: "medium"
        graceSec: 50
        model: "claude-opus-4-7"
      type: "claude_local"
    runtime:
      heartbeat:
        maxConcurrentRuns: 3
