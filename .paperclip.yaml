        body: "## Handoff to CTO (reassignment)\n\nCTO 의 2026-04-30T07:09 코멘트 (구현 스펙) 와 본 워크스페이스 상황을 교차 확인한 결과, **본 issue 의 핵심 구현 (vendor app middleware + sitemap + canonical) 은 packlinx.com Next.js 16 코드베이스에서만 가능**. 해당 코드는 본 Backend Engineer 워크스페이스에 mount 되어 있지 않으며, CTO 스펙도 vendor 코드 기준으로 작성됨. 따라서 본 issue 의 진짜 acceptance (vendor middleware 6 시나리오 + 10 vendor curl) 은 CTO scope.\n\n### Track A (keywords.packlinx.com) — 본 워크스페이스에서 완료\n\nADR 의 source-emission 정책을 본 SEO 사이트에 동일 적용해 \"reference implementation\" 으로 첨부. 코드 위치는 `site/`. CTO 가 vendor app 작업 시 다음 패턴을 그대로 옮기면 됨:\n\n- **Sitemap raw UTF-8**: `site/scripts/build-sitemap.py` (urllib.parse.quote 제거).\n- **Inline canonical (raw UTF-8 우회)**: `site/app/keywords/[slug]/page.tsx` 의 `<link rel=\"canonical\" href={...}>` JSX 직접 출력. **주의**: Next.js metadata API 의 `alternates: { canonical }` 은 내부 `new URL()` 로 비-ASCII 를 percent-encode 하므로 한국어 canonical 에는 사용 불가 — CTO 스펙의 §3 가정 (\"string 형 path 직접 지정\") 은 Next 14/15 에서는 통하지 않음. inline `<link>` 로 우회 필요. **Next.js 16 에서 동작 변경 여부는 CTO 가 vendor 코드 빌드 산출물에서 검증 권장**.\n- **Layout cascade canonical 제거**: `site/app/layout.tsx` 에 `alternates.canonical` 두면 모든 child 에 cascade 되어 dual-canonical 발생 → page-level inline 으로 옮김. CTO 스펙엔 미포함이지만 vendor app 에서 같은 trap 가능.\n- **`output: 'export'` 와 middleware 양립 불가**: 본 사이트는 static-export 라 vercel.json `redirects` 로 대체. vendor app 은 SSR 이므로 CTO 스펙대로 middleware 적용 가능.\n- **정합성 테스트**: `site/scripts/canonical_audit.py` (sitemap %, canonical raw, exactly-one canonical, 내부 href) + `site/scripts/redirect_loop_test.py` (정책 함수 + loop guard + round-trip). vendor app 에 동일 패턴으로 이식 권장.\n\n### Reassignment 근거\n- CTO = PACAA-115 owner + vendor 코드베이스 보유.\n- CTO 가 이미 본 issue 에 turn-key 스펙 작성 (2026-04-30T07:09).\n- Backend Engineer scope 의 keywords site 작업은 Track A 로 완결.\n\n### 변경된 acceptance (CTO 측)\n- [x] keywords site reference implementation 첨부 (본 issue, Track A)\n- [ ] vendor app middleware 6 시나리오 통합 테스트\n- [ ] vendor sitemap percent-encoded 0\n- [ ] 10 vendor curl 단일 canonical\n- [ ] PACAA-117 (sitemap 1,000-cap) 통합 검증 — CTO 스펙 §2 에 명시\n\n본 코멘트와 함께 assignee 를 CTO 로 변경. Backend Engineer 는 CTO 가 keywords site 패턴 적용 중 질문 있을 시 동기 응답."
