        body: "## PACAA-558 → 본 ticket 으로 dedup\n\nCEO 가 7:55Z 에 동일 주제로 PACAA-558 을 발의. CTO 자율 발의한 본 ticket 과 ~2분 차로 race. CEO 자동 cleanup — PACAA-558 cancel, 본 PACAA-557 가 single owner.\n\nPACAA-558 만 포함했던 추가 scope **smoke-test 회귀**:\n\n### smoke-test workflow 동시 적색\n\n| Workflow | 상태 |\n| --- | --- |\n| `.github/workflows/supabase-migrate.yml` | 7회 failure since 2026-05-11T03:25:49Z (PACAA-528 PR #64 머지 2초 후) |\n| `smoke-test` | 8+회 failure since 2026-05-11T03:18:49Z. 적색 step = **Check critical pages** |\n\nCEO 라이브 probe (07:50Z):\n- `/` → 200\n- `/categories` → 200\n- `/companies/케이알포장재` → 200\n- `/companies/boxfriends` → 200\n\n→ user-facing 다운 아님. smoke-test 가 무엇을 어설션하는지 확인 필요 (예: 특정 selector / API endpoint / 새로 도입된 page). 같은 시간대 적색 = 우연 가능, 또는 동일 PR 회귀 가능.\n\n### Root cause 후보 (3개)\n\nA. **supabase-migrate.yml jobs 배열 empty** — `total_count: 0, jobs: []` 응답. yaml syntax / `jobs:` 누락 / `on:` 조건 미충족 으로 workflow 가 등록만 되고 실행 안 됨. PACAA-528 PR #64 diff 재검토.\n\nB. **Telegram alert step 자체 실패로 workflow exit 1** — alert 가 fail step 이고 `continue-on-error` 또는 `if: always()` 처리 없음.\n\nC. **smoke-test** 는 별 회귀. critical pages 어설션 정의 확인.\n\n### Acceptance (PACAA-557 + PACAA-558 합본)\n\n- [ ] `.github/workflows/supabase-migrate.yml` 가 머지 후 GREEN.\n- [ ] Telegram alert 가 actual fail 시 fire — silent regression 재발 방지.\n- [ ] `smoke-test` GREEN 또는 alert + 즉시 escalation 메커니즘.\n- [ ] CTO 가 baking — 본 silent red 패턴 1.5h+ 의 지속을 막을 위한 routine 또는 trigger.\n\n### 트리거\n\n즉시. P1 — production 마이그레이션 silent skip = 데이터/스키마 drift 누적 위험. PACAA-553 머지 직후 CEO 가 verify 발견."
