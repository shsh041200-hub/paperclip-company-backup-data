        body: "## 진행 보고 (PACAA-311 / CEO)\n\n보드님 directive 정확히 이해했습니다. 정리:\n\n- 봇 알림은 **보드 행동이 꼭 필요할 때만** 보낸다 (FYI/관찰/상태보고 금지).\n- 본문은 **\"현재 X 작업중인데 보드님의 Y 행동이 필요합니다\"** 형태로 시작.\n- **한국어 디폴트** (영어가 의미 전달에 필수일 때만).\n- **`...` / `…(이하 생략)` 같은 말줄임 금지** — 보드가 내용 모르면 선택·승인 자체가 의미 없음.\n- 승인 ✅/❌ 버튼 / 선택지 버튼 / 답장 원격 명령 — **이 기능들은 그대로 유지**.\n- 톤은 전문가가 초보자에게 설명하듯, 간략하지만 중요 내용은 다 담는다.\n\n## 처리 결과\n\n### 1. comms 규칙 (방금 시행)\n\n[packlinx-comms](https://paperclip-api.packlinx-api.com/) skill 의 \"Board-facing Telegram output\" 섹션 갱신 완료. 모든 에이전트 (CEO/CTO/CMO/COO/Engineers/Legal) 가 다음 heartbeat 부터 새 규칙 적용:\n\n- send-gate: 보드 행동 필요 없으면 봇 안 보냄.\n- 두 줄 frame opener: \"현재 작업\" / \"보드님 필요 행동\".\n- A(액션)/B(승인)/C(선택) 템플릿 모두 갱신 — 한 줄 영향만 적던 것을 2~3줄로 확장 (보드가 본문만 보고 결정 가능하게).\n- 말줄임 금지 + 길이 한도 1500자→4000자, 초과시 part2 첨부로 split.\n\n### 2. 봇 코드 변경 (CTO 위임)\n\n[PACAA-319](/PACAA/issues/PACAA-319) 생성, CTO 에 P1 으로 할당. 변경 대상: `tools/board-visibility/_telegram_format.py`, `notify-telegram.py`. 핵심 변경:\n\n- `MAX_DOC_CHARS=1500→4000` + `…(이하 생략)` 코드 경로 전체 제거.\n- `non_actionable` 분류 (in_review 묶음 등) Telegram fire 차단.\n- `assert_telegram_safe` 가 frame opener (\"현재 작업:\" / \"보드님 필요 행동:\") 강제, 말줄임 발견시 reject.\n- 새 템플릿 sample 3종 (action/approval/choice) dry-run 으로 보드에게 미리 본 그림 보여드리고 sign-off 받은 다음 실 fire.\n\n### 3. 보드님 필요 행동\n\n**지금 당장 필요한 행동 없음.** CTO 가 PACAA-319 ship 하면 sample 3종 dry-run 결과를 코멘트로 올리고, 그때 \"이 포맷이면 OK\" 사인오프 한 번만 받으면 됩니다.\n\n## 다음 신호\n\n- CTO PACAA-319 PR 생성 → CEO 코드 리뷰.\n- dry-run sample 3종 PACAA-311 코멘트 게시 → 보드 sign-off.\n- sign-off 후 첫 실 fire 1건 보드 OK 받기 → PACAA-311 close.\n\n이 PACAA-311 자체는 PACAA-319 가 머지될 때까지 `blocked` (blocker: PACAA-319) 로 둡니다."
