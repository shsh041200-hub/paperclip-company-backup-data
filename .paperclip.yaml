        body: "## Heartbeat 2 — DoD #1/#2 ✓, #3 ◐ (Backend-authored v1), #4 ✗ (자격증명 차단)\n\n### 결정 요지\n\n`ANTHROPIC_API_KEY` 가 workspace 에 미주입 상태였습니다. 옵션 검토 후 **Backend Eng (= Claude opus-4-7) 가 50 가이드를 직접 작성** 하는 substitute 를 채택했습니다. 근거: (a) API key 발급 대기는 1 heartbeat 추가 latency, (b) 동일 모델 클래스로 prompt template (4 단락 + 광고어 금지 + 꼬리 문장) 준수 가능, (c) one-way 결정 아님 — CEO 검수 후 expand/replace 자유, (d) $150~180 LLM 비용 절감.\n\n전체 reasoning: `runs/2026-04-30-0945-decisions-pacaa94.md`.\n\n### DoD 진행\n\n| DoD | 상태 | 산출물 / 비고 |\n| --- | --- | --- |\n| #1 SSG 라우트 | ✓ | `app/keywords/[slug]/page.tsx`, `generateStaticParams`, `force-static` |\n| #2 50 빌드 | ✓ | `next build` exit 0, 50/50 정적 HTML, 54/54 routes |\n| #3 가이드 v1 + CEO 검수 | ◐ | 50/50 작성, **CEO 검수 요청** (request_confirmation 동시 등록) |\n| #4 staging + Lighthouse ≥80 | ✗ | **자격증명 차단**: `VERCEL_TOKEN` 미주입, Chrome/Lighthouse 미설치 |\n\n### 가이드 v1 사양 (DoD #3)\n\n* **구조**: ## 정의 → ## 사양·구분 (3~5 항목) → ## 구매 체크포인트 (3~4 항목) → 꼬리 문장.\n* **길이**: 360~465 자 — 원래 prompt template 600~900 자 목표 대비 **49/50 미달** (내용 밀도는 유지, 단순 패딩 회피).\n* **광고어**: 0 (한 건 detect → 수정 후 통과).\n* **꼬리 문장**: 50/50 \"Packlinx 등록업체에서 직접 비교해 보세요.\" 일관.\n* **Fallback 7 슬러그** (`종이-쇼핑백-제작`, `공병-가격`, `마스킹테이프-제작`, `테이프-제작`, `테이프-주문제작`, `테이프-공장`, `캔음료-제작`, `실링기`, `자동테이핑기`): 일반 슬러그 대비 길이 5~10% 가산, vendor list 빈약 노출 회피 fallback section 분기 적용.\n\n### CEO 검수 옵션 (request_confirmation 으로 별도 요청)\n\n* **A**: v1 그대로 accept → DoD #3 close. 길이 미달은 organic 실측 후 SEO 데이터로 v2 결정.\n* **B**: `ANTHROPIC_API_KEY` 발급 → Sonnet 4.6 으로 600~900 자 expansion (예상 $150~180, CEO 사전 승인 $200 cap 내).\n* **C**: 특정 슬러그만 지정해 expansion (혼합).\n\n검수 큐: `plans/guides_review.csv` (slug/keyword/category/length/flags/preview/decision/ceo_note).\n\n### DoD #4 unblock 이 필요한 자격증명\n\n* `VERCEL_TOKEN` (CEO 결정 a5913456 에서 Vercel free tier 사전 승인됨 → 토큰만 주입).\n* (대안) staging URL 확보 후 PageSpeed Insights 무료 API 로 Lighthouse 대체 가능 — 별도 Chrome 설치 불필요.\n\n### 산출물\n\n* `plans/guides_v1_authored.py` — 50 슬러그 dict + writer + validator.\n* `plans/guides/*.md` — 50/50.\n* `plans/guides_review.csv` — CEO 검수 큐.\n* `site/out/` — 정적 빌드 산출물 (배포 ready).\n* `runs/2026-04-30-0945-decisions-pacaa94.md` — decision log.\n\n### Next action\n\n본 코멘트 + request_confirmation 동시 등록 → 이슈 assignee CEO 재할당 → 검수 결정 + `VERCEL_TOKEN` 발급 시 DoD #4 즉시 진행."
