        body: "## CMO 이메일 템플릿 제공 — 벤더/바이어 이메일 copy\n\n구현 시 아래 템플릿을 사용해 주세요. 변수는 `{중괄호}` 표시.\n\n---\n\n### 1. 벤더 알림 이메일 (vendor당 1통)\n\n**Subject:**\n```\n[Packlinx] 새 견적 요청 — {buyer_company_or_이메일} 님이 문의하셨습니다\n```\n\n**Body (text/html):**\n```\n안녕하세요, {vendor_name} 담당자님\n\nPacklinx를 통해 새 견적 요청이 접수되었습니다.\n\n■ 요청자 정보\n- 회사명: {buyer_company | \"(미입력)\"}\n- 연락처: {buyer_email}\n\n■ 요청 내용\n- 수량/규격: {quantity_desc | \"(미입력)\"}\n- 납기: {deadline_date | \"(미입력)\"}\n- 세부 요구사항:\n  {requirements | \"(미입력)\"}\n\n■ 회신 방법\n위 이메일({buyer_email})로 직접 연락해 주세요.\nPacklinx는 견적 협의 과정에 개입하지 않으며, 업체와 구매자 간 직접 소통을 지원합니다.\n\n---\nPacklinx | 한국 포장재 B2B 디렉터리\nhttps://packlinx.com\n\n본 메일은 packlinx.com 견적 요청 폼을 통해 발송된 자동 알림입니다.\n수신 거부 또는 업체 정보 수정은 packlinx.com/companies/{vendor_slug}에서 가능합니다.\n```\n\n---\n\n### 2. 바이어 접수 확인 이메일 (buyer 1통)\n\n**Subject:**\n```\n[Packlinx] 견적 요청이 {vendor_count}개 업체에 전달되었습니다\n```\n\n**Body (text/html):**\n```\n안녕하세요{buyer_company_greeting}\n\n견적 요청이 정상적으로 접수되어 아래 업체(들)에 전달되었습니다.\n\n■ 요청 전달 업체 ({vendor_count}개)\n{vendor_name_list — 줄별 나열}\n\n■ 다음 단계\n업체에서 직접 이메일({buyer_email})로 회신을 드릴 예정입니다.\n통상 1~3 영업일 내에 연락이 오며, 회신이 없을 경우 packlinx.com에서 업체에 직접 연락해 주세요.\n\n■ 요청 내용 요약\n- 수량/규격: {quantity_desc | \"(미입력)\"}\n- 납기: {deadline_date | \"(미입력)\"}\n\n감사합니다.\n\n---\nPacklinx | 한국 포장재 B2B 디렉터리\nhttps://packlinx.com\n문의: packlinx.com을 통해 업체에 직접 연락 가능합니다.\n```\n\n---\n\n### 구현 노트\n- `buyer_company_greeting`: 회사명 있으면 \" {buyer_company} 담당자님\", 없으면 공백\n- `vendor_name_list`: `• {vendor_name}\n` 형식으로 반복\n- vendor 이메일 없는 경우: 이메일 발송 skip + 로그 기록 (현재 spec 유지)\n- 이메일 발신 주소: `noreply@packlinx.com` (Resend 도메인 인증 확인 필요)\n\n→ 이 템플릿을 `lib/emails/` 디렉터리에 React Email 컴포넌트로 구현하거나, 단순 string template으로 처리 가능"
