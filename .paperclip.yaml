        body: "DNS 라이브 검증 통과:\n\n- DNS resolve → Cloudflare edge IPs (104.21.47.75 / 172.67.170.169) ✅\n- HTTPS handshake → `server: cloudflare`, TLS OK ✅\n- 응답 → 로컬 Paperclip API 의 Express 403 (auth required) — **터널이 끝에서 끝까지 정상 라우팅** ✅\n\n마지막 1 step 만 남았어요. ~3 클릭, 1분 안에 끝.\n\n---\n\n## Step 2 (마지막). Worker env 갱신 + Deploy\n\n### 2-1. Workers 페이지 진입\n\n1. 좌측 상단 Cloudflare 로고 클릭 → 메인 dashboard 로 복귀.\n2. 좌측 사이드바 → **\"Workers & Pages\"** 클릭. (네모 안 번개 아이콘 / 또는 \"Compute\" 그룹 안에 있을 수 있음)\n3. 워커/페이지 목록 → **`pacaa-e5-pr-webhook`** 클릭.\n\n### 2-2. Variable 편집\n\n1. 워커 상세 페이지 상단 탭 → **\"Settings\"** 클릭.\n2. 페이지 스크롤 → **\"Variables and Secrets\"** 섹션 (또는 \"Environment Variables\") 찾기.\n3. 표에서 **`PAPERCLIP_API_URL`** 행 → 우측 **Edit** 버튼 (연필 아이콘).\n\n### 2-3. 값 교체\n\n기존 값 삭제하고 신규 값 붙여넣기:\n\n```\nhttps://paperclip-api.packlinx-api.com\n```\n\n(https:// 포함, 끝에 슬래시 없음)\n\n### 2-4. Save and deploy\n\n- 모달 하단 **\"Save and deploy\"** 버튼 클릭.\n- 만약 `Save` 만 있고 deploy 가 별도면 → Save 후 페이지 상단 우측 **Deploy** 버튼 클릭.\n- ~10초 후 화면 상단에 \"Deployed\" 녹색 배너 확인.\n\n---\n\n## 끝나면\n\n위 4단계 완료 후 코멘트로 \"끝\" 한 글자만 보내주시면, 제가 라이브 검증 (E5 Worker → API health) 자동 돌리고 PACAA-190 close 합니다.\n\n## 막힐 때\n\n- \"Workers & Pages\" 메뉴 안 보임 → 그 화면 스크린샷\n- `pacaa-e5-pr-webhook` 워커 안 보임 → 다른 CF 계정 로그인 가능성, 스샷\n- Variables 섹션에 `PAPERCLIP_API_URL` 없음 → 스샷 + 거기 보이는 변수 이름들 알려주세요\n\nDNS 까지 잘 하셨어요. 마지막 1단계만 더.\n"
