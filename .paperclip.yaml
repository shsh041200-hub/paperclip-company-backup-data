        authorType: "user"
        body: "## Routine 보고 형식 v1 — sample 사인오프 요청\n\n**한 줄 결론: 보드는 아래 sample 2건 형식을 보고 OK 또는 수정 사항 회신.** OK 시 데일리 digest는 오늘 09:00 KST 다음 발사부터, 주간 sweep은 다음 월요일부터 적용.\n\n---\n\n### 진단 (왜 어제 보고가 가독성 나빴나)\n\n- PACAA-56 (주간 sweep)에 영어 시스템 용어 그대로 노출: \"Stale\", \"Blocked\", \"Goal-orphan\", \"Unblock owner\", \"Deferred items\", \"proposed-date\".\n- PACAA-57 / PACAA-53 (데일리 digest)는 한국어이지만 \"in_progress\", \"Blocked\", \"Highlights\", \"Next\", \"substantive only\" 영어 잔재. 한 줄 결론 부재.\n- 빈 링크 텍스트 `[](http://...)` 와 끝이 끊긴 `(루틴 ).` 같은 깨진 마크다운 잔존.\n- 보드 액션 vs 에이전트 액션 시각적 분리 안 됨.\n\n### 표준 (한 줄 → 풀어서 → 정리)\n\n1. **한 줄 결론 — 첫 줄 필수.** 보드가 지금 당장 할 일 한 문장. 없으면 \"오늘 할 일 없음\" / \"이번 주 할 일 없음\".\n2. **풀어서 — 본문.** 보드 액션 섹션 먼저 → 에이전트가 알아서 처리하는 일 섹션. 영어 시스템 용어는 일상 한국어로 강제 치환 (용어집 첨부).\n3. **정리 — 마지막 1~2줄.** 다음 발사 시점.\n\n번역하지 않는 항목: 이슈 ID(`PACAA-34`), 파일명(`deferred_items.md`), 외부 서비스명(Plausible, Vercel), 코드 키(`goalId`, `status=blocked`), 사람/에이전트 식별자.\n\n전체 사양 + 용어집은 `runs/board_report_format_v1.md` 에 정리.\n\n---\n\n### Sample A — 데일리 Board Digest (2026-04-29 KST 09:00 발사 가정, 어제 데이터 재렌더)\n\n> **한 줄 결론: 오늘 보드가 직접 할 일은 없음.** 어제 Vercel DNS TXT 추가는 이미 처리되어 PACAA-34 가로막힘 해소 진행 중. 결재 대기도 없음.\n>\n> #### 보드 액션\n>\n> 없음. 현재 PACAA-34 풀리는 것만 모니터하면 됨 (CTO가 처리).\n>\n> #### 에이전트가 알아서 처리 중\n>\n> - **SG-1 (분모/카테고리)**: [PACAA-30](/PACAA/issues/PACAA-30) 분모 산출 시스템 진행 중, [PACAA-38](/PACAA/issues/PACAA-38) 외부 vendor 수집 진행 중.\n> - **SG-3 (측정)**: [PACAA-34](/PACAA/issues/PACAA-34) Plausible Day 0 — 어제까지 Vercel DNS TXT 대기였으나 처리 완료, CTO가 도메인 검증 마무리 중.\n> - **루틴 셀프**: 이 데일리 digest 본 코멘트 + 주간 sweep [PACAA-56](/PACAA/issues/PACAA-56) 다음 월요일 발사 예정.\n>\n> #### 보드 결재 대기\n>\n> 없음.\n>\n> #### 정리\n>\n> 다음 발사: 내일 09:00 KST. 변동 없으면 \"오늘 할 일 없음\" 1줄로 끝.\n\n---\n\n### Sample B — 주간 Stale & Blocked Sweep (다음 월요일 09:00 KST 발사 가정, 현재 데이터 재렌더)\n\n> **한 줄 결론: 이번 주 보드가 직접 할 일은 없음.** 가로막힌 이슈 1건은 외부 서비스(Vercel) 응답 대기 중이고 풀어줄 사람은 보드가 아닌 외부 지원팀.\n>\n> #### 보드 액션\n>\n> 없음.\n>\n> #### 가로막힌 이슈 (참고)\n>\n> - [PACAA-34](/PACAA/issues/PACAA-34) Plausible Day 0 셋업 — Vercel 도메인 복구 응답 대기 (보드가 약 36시간 전 지원 티켓 제출). 풀어줄 사람: Vercel 지원팀. 풀리는 즉시 CTO가 PR #1 머지하고 Plausible 검증 자동 통과.\n>\n> #### 오래 멈춘 이슈 (7일 이상 업데이트 없음)\n>\n> 없음.\n>\n> #### 목표에 안 붙은 이슈\n>\n> 없음. (`goalId=null`인 4건은 모두 [PACAA-52](/PACAA/issues/PACAA-52) 부모를 통해 Vision 루트 상속.)\n>\n> #### 미루어둔 항목 — 재검토 예정일 도래\n>\n> 없음. 현재 활성 행 1건([PACAA-52](/PACAA/issues/PACAA-52) ROI 점검)은 재검토 2026-05-26 예정.\n>\n> #### 보드 확정 대기 7일 초과\n>\n> 없음.\n>\n> #### 정리\n>\n> 다음 발사: 다음 주 월요일 09:00 KST.\n\n---\n\n### 사인오프 요청\n\n위 두 sample 형식이 OK 인지, 또는 수정 지시 회신 요청. OK 시 다음 발사부터 즉시 적용. 첨부 사양(`runs/board_report_format_v1.md`)도 같은 원칙으로 작성됨."
