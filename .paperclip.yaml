        body: "## 김선혁님, 텔레그램 알림 형식 v2 사인오프 요청\n\n### 한 줄 결론\n\n**v2 표준 + 견본 1건 발사 완료. 검토 후 결재 요청 인터랙션에서 승인/거절 부탁드려요.**\n\n### 무엇\n\nPACAA-117 결재 알림이 \"PACAA-117\", \"child B\", \"lib probe\", \"SELECT/LIMIT\" 같은 시스템 코드로 시작했고, 왜 승인해야 하는지·승인 후 무엇이 일어나는지 흐릿했습니다. 이번 작업으로 **모든 보드 텔레그램 알림에 5단계 구조**를 강제하는 v2 표준을 만들었습니다.\n\n### 5단계 구조 핵심\n\n1. **호명** — 첫 줄 \"김선혁님,\"\n2. **무엇 (현재 상황)** — 일상 한국어 1단락. 시스템 용어 금지\n3. **왜 (배경/맥락)** — 회사 비전·Goal·1st Priority 와 연결\n4. **작업 내용 (승인 후 진행)** — 평이한 한국어 단계\n5. **결정해야 할 것** — 명확한 선택지 + 결과 한 줄\n\n시스템 용어 → 일상 한국어 매핑 사전 30+ 항목 (sitemap, probe, hard cap, generator, SELECT/LIMIT, preview, merge, PR, URL, lib, schema, redirect 등) 포함. 본문에서 자동 치환 강제.\n\n### 견본 (방금 텔레그램으로 발송됨, message_id=5)\n\nPACAA-117 의 옛 결재 요청을 v2 형식으로 다시 쓴 견본입니다. 비교용이라 실제 결재 요청 아닙니다.\n\n```\n김선혁님,\n\n[v2 형식 검증 sample 입니다 — 이건 PACAA-117 의 옛 결재 요청을 새 형식으로 다시 쓴 견본이에요. 실제 결재 요청 아닙니다.]\n\n▶ 무엇이 일어났나\n사이트맵(검색엔진에 보내는 페이지 목록)에 vendor 1,031개만 등록되어 있었어요. 실제로는 1,200개 이상이 등록되어야 해서 약 200개가 검색엔진에 안 보였습니다. Backend Engineer 가 제한을 푸는 코드를 짜고 시험 환경에서 6건 검증을 마쳤습니다.\n\n▶ 왜 중요한가\n검색엔진에 안 보이는 vendor 200개는 buyer 가 발견 못 합니다. SG-2 (구글 검색 점유율 2026Q2 30%) 직접 영향. 1st Priority (buyer 가 vendor 발견·연결) 위배라 빨리 풀어야 했어요.\n\n▶ 승인하시면 무엇이 일어나나\n1. 1,000개 제한이 풀려요.\n2. 5,000개씩 묶음 사이트맵으로 나누어 운영에 적용돼요.\n3. 30분 내 검색엔진에 200개 추가 노출 시작.\n4. 자세한 검증 로그·코드 변경 내용은 PACAA-117 코멘트에 첨부.\n\n▶ 결정해야 할 것\nA) 지금 적용 — 30분 내 200개 추가 노출\nB) PACAA-116 (대표 페이지 주소 통일) 끝나고 묶어서 적용 — 1주 대기\n어느 쪽?\n(답하기 어려우면 \"잘 모르겠음\" — 추가 정보 드려요.)\n```\n\n### PACAA-117 옛 형식 vs v2 비교\n\n| 항목 | 옛 (PACAA-117) | v2 |\n|---|---|---|\n| 첫 줄 | \"PACAA-117 PR #4 머지 승인…\" | \"김선혁님,\" |\n| 시스템 용어 | child B, lib probe, SELECT/LIMIT, generator hard cap 노출 | 일상 한국어 자동 치환 |\n| 왜 | 없음 | SG-2 + 1st Priority 명시 |\n| 승인 후 | 모호 | 4단계 평이 한국어 |\n| 결정 | \"PR #4 머지 승인 가능한가?\" | A/B + 모름 옵션 |\n\n### 보드 검증 항목\n\n발송된 견본을 받으셨다면 다음 5개 모두 충족 하나요?\n\n1. 첫 줄이 \"김선혁님,\" 으로 시작 — 시스템 코드 없음.\n2. 본문만 읽고 \"왜 승인해야 하는지\" 잡힘.\n3. 본문만 읽고 \"승인하면 무엇이 일어나는지\" 잡힘.\n4. \"child\", \"lib\", \"probe\", \"SELECT\", \"merge\" 같은 영어 시스템 용어 노출 없음.\n5. 결정 라인이 명확 — A/B + 모름 옵션 포함.\n\n### 사인오프 후 진행\n\n승인 시 즉시:\n1. 본 표준을 CEO·CTO·Backend Engineer·Legal Counsel SOUL/AGENTS 에 baking.\n2. 다음 결재 요청부터 v2 강제 (이미 발생한 결재는 그대로).\n3. 메모리에 `feedback_board_notification_v2.md` 영구 룰 기록.\n4. PACAA-125 status=done 처리.\n\n### 자료\n\n- 표준 전문: `runs/board_report_format_v2.md` (workspace).\n- 시스템 용어 사전 (30+ 항목): 같은 문서 §2.\n- 일관성 체크리스트 10항목: 같은 문서 §6.\n\n### 결재 라인\n\n바로 아래 결재 요청 인터랙션에서 응답 부탁드려요.\nA) v2 그대로 승인 — 즉시 시행.\nB) 일부 수정 후 재발송 — 어떤 부분 수정 필요한지 코멘트 부탁.\nC) v2 폐기 — 옛 형식 유지.\n(답하기 어려우면 \"잘 모르겠음\" — 추가 정보 드려요.)"
