        body: "근본 원인 확인 완료. 보고드립니다.\n\n---\n\n**현재 작업**: 로컬 dev 서버가 `unhandledRejection` 으로 죽는 이유는 동적 라우트 segment param 이름 충돌 2건 + sitemap 중복 1건. 현재 코드 상태에 그대로 박혀 있고 재시작해도 동일 증상 재현됩니다.\n\n**보드님 필요 행동**: 아래 3개 fix 중 어떤 방향으로 갈지 결정만 해 주세요. 결정 주시면 PACAA-319 (CTO) 로 위임해서 코드 수정 진행하겠습니다.\n\n---\n\n### 근본 원인 — 라우트 트리 충돌\n\n**Next.js 규칙**: 같은 경로 레벨의 dynamic segment 는 param 이름이 같아야 함 (`[id]` 와 `[slug]` 공존 불가). 위반 시 `unhandledRejection` 으로 dev 서버가 라우트 리로드 실패.\n\n**충돌 1 — `app/sitemap/` 하위**\n```\napp/sitemap.ts                       (10:32 수정)  ← Next.js 가 /sitemap/[__metadata_id__] 자동생성\napp/sitemap/[__metadata_id__]/route.ts (09:24 생성) ← 위와 중복 (\"Duplicate page\" 경고)\napp/sitemap/[id]/route.ts             (09:52 생성) ← __metadata_id__ vs id 이름 충돌 (메인 에러)\n```\n로그의 `Error: ... '__metadata_id__' !== 'id'` 가 이거.\n\n**충돌 2 — `app/api/companies/` 하위**\n```\napp/api/companies/[slug]/is-owner          (09:24)\napp/api/companies/[slug]/similar-optout    (09:24)\napp/api/companies/[id]/similar-optout      (09:52 추가) ← slug vs id 이름 충돌\n```\n로그의 `Error: ... 'slug' !== 'id'` 가 이거. is-owner 호출은 `[slug]` 쪽으로 200 OK 가 찍히지만, 라우트 리로드 사이클마다 충돌 에러가 누적되어 결국 페이지가 Internal Server Error 로 떨어집니다.\n\n**시간순 추정**: 09:24 베이스라인 → 09:52 에 `[id]` 디렉터리 2개를 새로 추가 → 10:32 에 `app/sitemap.ts` 추가. 즉 **오늘 추가된 변경**이 충돌을 일으킨 것이고, 09:24 시점 코드는 정상이었을 가능성이 높습니다.\n\n---\n\n### Fix 방향 3가지 (보드 결정 필요)\n\n| 방향 | 무엇을 할지 | 영향 |\n|---|---|---|\n| **A. 신규 `[id]` 두 개 + 신규 `app/sitemap.ts` 모두 삭제 (롤백)** | 09:24 베이스라인으로 복구 | 가장 안전. 오늘 누가 무슨 의도로 추가했는지 모르면 작업 손실 위험 |\n| **B. 기존 `[slug]`/`[__metadata_id__]` 를 모두 `[id]` 로 통일 (rename)** | 충돌 해소하면서 신규 코드 유지. is-owner / similar-optout 등 호출부도 같이 수정 | 호출 grep 필요, 영향 범위 큼 |\n| **C. 신규 `[id]` 만 제거 + `app/sitemap.ts` vs `[__metadata_id__]/route.ts` 중 하나만 남김** | 09:52~10:32 의도 일부 살림 | 어느 것을 살릴지 추가 확인 필요 |\n\n**부가 항목** (서버 크래시와 무관, 같이 처리 가능):\n- `middleware.ts` → `proxy.ts` 로 rename (Next.js 16 deprecation, 경고만)\n- `next.config.js` 에 Supabase 이미지 호스트 등록 (`jnrciibwtutzymkoepfp.supabase.co`)\n- `hreflang` → `hrefLang` 오타\n\n**저의 추천**: **방향 A (롤백)**. 09:52 / 10:32 변경의 의도를 모르면 B/C 는 추측 수정이 됩니다. 롤백 후 보드님께 \"원래 무엇을 하려 했나\" 물어보고 다시 진행이 안전합니다.\n\n어떤 방향으로 갈까요?"
