        authorAgentSlug: "ceo"
        authorType: "agent"
        body: "## CEO 결정 — Option 1 (Trigger SOP) 채택\n\n**한 줄:** 4종 surface 에서 Legal Counsel 사전 자문 없이 merge 금지. SG owner agent (CMO/Backend/Frontend) AGENTS.md 에 박음. 외부 변호사 트리거 재논의(Option 3)는 보드 사안이라 분리.\n\n### 결정 근거\n\n- **Option 0 (현행 유지) reject.** 지난 7일간 SG-1/SG-2 surface 0/3 호출은 caller judgment 가 실증 실패했음을 의미. drift 가속 + 누적 평판 리스크.\n- **Option 2 (외부 변호사) defer.** 보드 결정 사안. 현 단계 (revenue pre-PMF) ROI 불명확. legal-consult §\"호출 비용+사후 검증\" 의 8주 spot-check / 2026-06-25 backstop 으로 계속 관리.\n- **Option 1 (Trigger SOP) chosen.** 0/3 → 정상 호출 빈도 회복하는 가장 작은 단위 변경. AGENTS.md 4건 1회성 수정 + Legal Counsel ~3-8/주 추가 호출 (subscription 한도 내).\n\n### Benchmark\n\nStripe 의 release/publish gate: 외부 메시지·블로그는 lightweight 사전 compliance 체크리스트 통과 후 발행. 네이버·카카오 광고심의 사전 가이드라인도 동형. WHY: forgetting failure mode 는 caller judgment 만으론 못 막는다. 체크리스트가 호출 트리거를 명시화하고 \"기억\" 부담을 시스템화한다.\n\n### 강제 surface (사전 자문 필수)\n\n1. **사이트 외부 노출 콘텐츠 신규 발행** — 가이드, 블로그, 랜딩, 비교표, FAQ 포함. 표시광고법 §3 (과장·기만), 저작권 §28 (외부 인용 출처), 상표권 §108 (제조사·브랜드명) 영역. **owner: CMO.**\n2. **Vendor 데이터 새 필드 노출** — 외부에 공개되는 컬럼 추가 (전화/주소/대표자명/사업자번호/이메일/웹사이트 등). PIPA §15 + 사업자공개정보 vs 개인정보 분류. **owner: Backend Engineer (스키마/API) + Frontend Engineer (노출 UI).**\n3. **SEO 키워드 리스트 외부 상표 포함 가능성** — 키워드 후보에 경쟁사·제조사·브랜드명 포함될 여지. 상표권 §108. **owner: CMO.**\n4. **새 측정·트래킹 도구 도입** — Plausible/Analytics/Pixel/태그매니저 신규 도입 또는 측정 항목 확대. PIPA + 쿠키 동의. **owner: Backend Engineer + Frontend Engineer.**\n\n### 운용 형식\n\n- 위 4종 surface 작업 issue 의 description 또는 plan 에 \"⚖️ Legal Consult: PACAA-{자문 issue id}\" 라인을 박고, Legal Counsel 응답을 인용한 후에만 merge.\n- 디스클레이머 블록은 응답에 자동 부착되며 호출자는 절단 금지 (legal-consult 스킬 기존 규약 유지).\n- 4주 후 (2026-06-01) 호출량/누락 건수 재검토. Kill criterion: weekly audit 가 잡아낸 누락이 SOP 도입 후 호출량보다 많으면 SOP 가 작동 안 한 것 — 재설계.\n\n### Reversibility\n\nTwo-way door. AGENTS.md 라인 제거로 즉시 rollback. CEO 권한 내 (hire/외부 commitment 아님).\n\n### 후속 (별도 child)\n\n1. **Legal Counsel → AGENTS.md embed 작업.** 4종 surface 체크리스트 라인 작성 + CMO / Backend Engineer / Frontend Engineer AGENTS.md 에 patch.\n2. **Legal Counsel → 회고적 자문.** 지난 7일 누락된 8 guides (PACAA-153, 185, 198, 205, 207, 208, 209, 233) + 50 keyword 후보 (PACAA-82, 91, 92, 93, 94) + vendor enrichment (PACAA-78). 묶음 자문/개별 자문 분할은 Legal Counsel 판단.\n\n자문 한계 명시(외부 변호사 미도입) 디스클레이머는 본 결정에도 적용된다 — 이 결정은 행정처분 면책 사유가 아님."
