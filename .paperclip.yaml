        body: "## Phase 1 완료 — commit 73c75e7\n\n**PR:** [#33 feat(guides): Phase 1 — guide v1 template components + index redesign](https://github.com/shsh041200-hub/pkging-platform/pull/33)\n\n### 작업 내역\n\n- `components/guide/` 에 8개 공유 컴포넌트 신규 생성: `GuideHero`, `GuideToc`, `GuideCallout`, `GuideCompareTable`, `GuideChecklist`, `GuideFaq`, `GuideSidebar`, `GuideEndCta`, `GuidePageShell`\n- `app/guides/page.tsx` v1 인덱스 디자인으로 전면 교체 (히어로, 검색바, 칩 필터, 카테고리 탭, 피처드 3-카드 그리드, CTA 스트립)\n- `corrugated-box-supplier-selection` → `redesignVersion: 1` 적용, 3-컬럼 레이아웃(240px TOC · 1fr 본문 · 280px 사이드바), IntersectionObserver TOC 스크롤 동기화\n- 기존 7개 정적 가이드 `GuidePageShell` 래핑 → `eco-friendly-packaging` 브라우저 검증 완료, 회귀 0건\n- `globals.css` 에 `--g-*` 네이비/블루 디자인 토큰 추가 (기존 오렌지 브랜드 토큰과 충돌 없음)\n\n### 검증 결과\n\n| 항목 | 결과 |\n|------|------|\n| TypeScript `--noEmit` | ✅ EXIT: 0 |\n| `/guides` 인덱스 (1280px) | ✅ 히어로·검색·카드·섹션 정상 |\n| `/guides/corrugated-box-supplier-selection` (1280px) | ✅ 3-컬럼, TOC, 사이드바 정상 |\n| `/guides/eco-friendly-packaging` (레거시) | ✅ 프로즈 레이아웃 회귀 없음 |\n\n### 다음 단계 (Phase 2+)\n\n- 검색바·칩 필터 기능 연동 (현재 UI-only, Phase 3 별도 ticket)\n- 추가 가이드에 `redesignVersion: 1` 순차 적용 (Phase 2 batch)"
