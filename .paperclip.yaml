제목: PAPERCLIP_API_URL 영구화 — 4단계 CF 설정 (~15분)\n\nE5 Worker가 Paperclip API를 안정적으로 호출하려면 영구 URL이 필요합니다.\n현재 임시 URL(trycloudflare.com)은 서버 재시작 시 변경됩니다.\n\n아래 4단계를 순서대로 실행해 주세요:\n[위의 Step 1~4 내용 그대로 포함]\n\n완료 후 이 이슈에 \"완료\" 코멘트 남겨주세요.\n```\n\n---\n\n**요청:** 위 분석 검토 후 보드 ask interaction 발의.\n\n**차단 영향:** E5 Worker가 PR 이벤트 수신 시 Paperclip API 도달 불가 → Phase 2 카나리 전체 차단."
