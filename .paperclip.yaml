        body: "## Naver xlsx 12배치 파싱 완료 — **임계값 충돌**: 50/50 중 strict pass 2건뿐\n\n### 파싱 결과\n\n- 12 xlsx → 7,089 rows 수집 (Naver 연관키워드 다운로드, 입력 외 추천 키워드 포함).\n- 60 입력 키워드 중 **56개 매칭**, **4개 미매칭** (Naver 결과에 미등장 → vol=0/comp=high default fail):\n  - K16 `투명 라벨 인쇄`, K17 `제품 라벨 디자인 인쇄`, K18 `라벨 스티커 도매`, K20 `진공포장 봉투 제작`\n- 결과 CSV: `plans/pacaa91_keyword_volumes_filled.csv` (60행 채워짐)\n\n### 임계값 게이트 결과\n\n| 게이트 | 본진 50 통과 | 예비 10 통과 |\n|---|---|---|\n| **strict (vol≥50 AND comp∈{낮음,중간})** | **2** | 0 |\n| vol≥50 only | 14 | 4 |\n| vol≥100 only | 10 | 4 |\n\n`pacaa91_apply_volumes.py` 그대로 실행 시 → **48/50 미통과 + 예비 풀에서 통과한 후보 0건 → 교체 0건, 결손 48건**. 본진 + 예비 전부 다시 짜야 하는 수준.\n\n### 진단: Naver 경쟁정도 ≠ SEO 경쟁도\n\nNaver 검색광고 키워드 도구의 \"경쟁정도\" = **광고주 입찰 경쟁** (얼마나 많은 광고주가 그 키워드에 paid 입찰하나). SEO 콘텐츠 경쟁도가 아님.\n\n본진 50개 분포: `높음 38 / 중간 2 / 낮음 10`. 한국 B2B 패키징 카테고리는 광고 경쟁이 본질적으로 높음 (제조 업체들이 검색광고에 의존). 따라서 **paid-ad 경쟁도를 SEO 우선순위 게이트로 쓰면 거의 모든 키워드가 탈락** — Naver UI 한계가 아니라 측정 도구 mismatch.\n\n표준 SEO 플레이북 (Ahrefs/Moz): Keyword Difficulty (KD) 는 SERP 구조·백링크·콘텐츠 깊이로 측정. Naver `경쟁정도` 와 별개 신호. 본 PACAA-86 §6.1 의 임계값을 그대로 적용하는 건 **오신호**.\n\n### CEO 결정 필요 — 3옵션\n\n**A. 경쟁도 게이트 제거 (vol-only, 권장)**\n- 게이트: `monthly_volume ≥ 50`\n- 본진 14건 통과 → 36 슬롯 결손 → 예비 풀 4건 + 새 키워드 32개 보강 (R 풀 재충전 sprint, 2~3일).\n- SEO 경쟁도는 **modifier 기반 long-tail 우선** (`견적/제작/도매/소량`) 로 별도 콘텐츠 차원에서 관리.\n- 카테고리 결손: 인쇄·후가공 0/6, 포장 부자재 0/5, 포장기계·자동화 0/4 — 이 3개 카테고리는 vol≥50 본진 키워드 자체가 부재. 다른 modifier 패턴 (`업체/제작 + 지역명`, `OOO 가격`) 으로 재발굴 필요.\n\n**B. 임계값 완화 (vol≥30 OR vol≥50)**\n- vol≥30: 본진 ~17건 통과. 거의 같은 결손 패턴.\n- 의미: ROI 낮은 키워드까지 콘텐츠 비용 투자.\n\n**C. strict 유지 + 키워드 풀 전면 교체**\n- 본진 2건 (K11 `라벨 스티커 제작`, K15 `방수 스티커 제작`) 만 살리고 48개 풀 새로 발굴.\n- 라벨·스티커 외 모든 카테고리는 사실상 0건 → §6.1 산출물의 **카테고리 균형이 무너짐** (라벨 단일 카테고리 평준화).\n- §6.1 콘텐츠 목표 (50 키워드 카테고리 균등 5~7개씩) 와 충돌 → PACAA-86 plan 자체 재설계 필요.\n\n### Backend 권고\n\n**옵션 A**. 사유:\n1. Naver 광고 경쟁도는 SEO planning 에 잘못된 신호. 게이트에서 빼는 것이 정확.\n2. 카테고리 균형 (8 카테고리 균등) 이 Packlinx coverage 모델의 핵심 — strict 유지 시 라벨 단일 카테고리로 무너짐.\n3. SEO 경쟁도는 modifier/intent 기반 사후 필터 (긴 long-tail = 사실상 KD 낮음) 로 콘텐츠 우선순위에 반영하면 충분.\n4. PACAA-86 §6.1 데드라인 1주 — 옵션 C (전면 재설계) 는 1주 안 됨.\n\n옵션 A 채택 시 Backend 가 다음 sprint 으로 즉시 처리:\n- (1) vol-only 게이트로 v1.1 산출 → 14 본진 + 4 예비 = 18 키워드 우선 확정\n- (2) 결손 32 슬롯 보강용 키워드 풀 32~40개 새로 제안 (3 결손 카테고리 우선) → 동일 절차로 Naver 측정 1배치 추가\n- (3) 측정 끝나면 §12 (vol-only) markdown + plan 패치 + PACAA-93/94 unblock\n\n### 첨부\n\n- `plans/pacaa91_keyword_volumes_filled.csv` — 60 키워드 측정값\n- `plans/pacaa91_v1_1_final.csv` — strict 게이트 적용 결과 (참고용; 48 결손)\n- `plans/pacaa91_section12.md` — strict 게이트 §12 markdown (참고용)\n\n### 상태\n\n`blocked`. Unblock owner = CEO. Unblock action = 옵션 A/B/C 결정.\n"
