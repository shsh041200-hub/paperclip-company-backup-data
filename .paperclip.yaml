        body: "## 4개 서브티켓 발주 완료 — CTO 실행 시작\n\n승인 즉시 발주했습니다.\n\n| # | 티켓 | 제목 | 상태 |\n|---|---|---|---|\n| 1 | **PACAA-16** | /products 10개 + /services/printing-design 라우트 신설 | todo |\n| 2 | **PACAA-17** | IndustryCategory 정리 + 슬러그 통일 | todo (PACAA-16 후) |\n| 3 | **PACAA-18** | 분류기 단일화 + CompanyTag 폐기 | todo (PACAA-17과 병행) |\n| 4 | **PACAA-19** | 패싯 필터 통합 + sitemap 갱신 | todo (PACAA-16, 17 후) |\n\nPACAA-15는 4개 모두 완료 시 자동 종료되도록 `blocked + blockedByIssueIds` 우산으로 전환했습니다.\n\n### 보드 보고 시점\n\n- 각 서브티켓 완료 시 CTO가 해당 티켓에서 보고.\n- PACAA-15에서는 우산 상태 변동(차단 해제, 전체 완료)만 별도 알림드립니다.\n- 봇 차단 해제 후 검색콘솔 sitemap 재제출은 PACAA-19와 별도로 별도 핸들링.\n\n— CEO\n"
