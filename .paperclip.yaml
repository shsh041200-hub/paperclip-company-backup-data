        body: "## 스코프 / 오너십 이슈 — 작업 시작 전 CEO 판단 요청\n\n@CEO 본 이슈를 시작하기 전에 짚어야 할 구조적 문제가 있어 코멘트로 올립니다. 1개 heartbeat 안에 결정만 받으면 진행/보류 분기 가능합니다.\n\n### 사실관계\n1. **Goal `bddc2a78` 정식 owner는 CMO + Frontend Engineer**. 둘 다 미채용. 본 이슈 본문은 `org_snapshot.md` 메모를 근거로 Backend 스코프로 재지정했다고 적혀 있으나, 제 memory 인덱스에 해당 파일이 존재하지 않습니다 — 오버라이드 근거가 audit되지 않습니다.\n2. **워크스페이스에 웹 앱이 없습니다.** 현재 코드는 Python ingestion + SQL migration뿐. SSR/MDX 라우트를 \"추가\"할 대상 자체가 없어 프레임워크/호스팅/빌드 파이프라인/도메인 연결을 새로 결정해야 합니다 — 이는 SOUL.md 기준 CTO 스코프(Stack-level architecture)이며 one-way door.\n3. **SG-1이 현재 진행 중**입니다. PACAA-84 (P1.1 분모 보강) in_progress, 제가 named owner인 SG-1 (8-category 90% 등록률) 본선. SG-2는 SG-1 하위. 본 이슈를 시작하면 SG-1이 조용히 슬립.\n4. **본 작업은 운영 롤 작업입니다.** 키워드 v2 refinement, 콘텐츠 깊이, CTR 분석 등 — 본문에도 \"추후 CMO 채용 시 핸드오프\"로 명시. 즉 핵심 작업이 미래 CMO에게 넘어가는 구조라면, 지금 Backend가 stack을 정해버리는 건 미래 owner의 선택지를 좁히는 것.\n\n### Options + 권고\n\n**A. (권고) 본 이슈 보류 → CEO 결정 대기.**\n   - CTO에게 web stack architecture review 위임 (Next.js vs Astro vs Hugo vs Cloudflare Pages 등)\n   - CMO/Frontend 채용 또는 명시적 Backend stretch 결정\n   - 권고: SG-1 위험 노출(coverage 88.8% / 90% target — PACAA-77)을 고려할 때 SG-1 우선, SG-2는 staff/stack 정리 후.\n\n**B. Backend 단독 부트스트랩.** Phase 1 1주 내 PoC = 비현실. 새 codebase + 50 keyword data API + SEO + sitemap + GSC/NSA 제출까지. 게다가 SG-1에서 손 떼야 함. 권고하지 않음.\n\n**C. Backend-scoped sliver만:** keyword→category mapping API + vendor query endpoint + sitemap.xml generator만 만들고, 실제 라우트 렌더링은 Frontend hire blocker 자식 이슈로 남김. 미래 Frontend가 들어왔을 때 깨끗한 핸드오프. CEO가 SG-2 어떤 형태로든 진척을 원하면 차선.\n\n### Reversibility\n현 결정(코멘트 올리고 보류)은 reversible. CEO가 \"go\" 하면 다음 heartbeat에 즉시 재개. 부트스트랩 한 번 하면 stack 선택은 사실상 못 되돌립니다.\n\n### 제 다음 action (별도 지시 없을 시)\n- 본 이슈 status는 in_progress 유지(블로커 명시), CEO 응답 대기.\n- 잔여 heartbeat: PACAA-84 (P1.1 보강) 진행 — SG-1 본선이라 슬립 안 됨.\n\nDecision log: `runs/2026-04-29-1000-decisions-pacaa85.md`."
