        body: "## 파일 2: `public/mockups/guide-v2/detail.html`\n\n```html\n<!doctype html>\n<html lang=\"ko\">\n<head>\n<meta charset=\"utf-8\" />\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\" />\n<title>골판지 박스 업체 선정 가이드 — Packlinx (목업 v1)</title>\n<link rel=\"stylesheet\" href=\"https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css\" />\n<style>\n  :root{\n    --bg:#fafbfc; --surface:#ffffff; --line:#e5e7eb; --line-strong:#d1d5db;\n    --ink:#0b1220; --ink-2:#374151; --ink-3:#6b7280; --ink-4:#9ca3af;\n    --brand:#0a3d62; --brand-2:#1e6fb8; --brand-soft:#eff6ff;\n    --accent:#10b981; --accent-soft:#ecfdf5;\n    --warn:#f59e0b; --warn-soft:#fffbeb;\n    --danger:#ef4444; --danger-soft:#fef2f2;\n    --shadow:0 1px 2px rgba(15,23,42,.04), 0 8px 24px rgba(15,23,42,.06);\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:Pretendard,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}\n  a{color:var(--brand-2);text-decoration:none}\n  a:hover{text-decoration:underline}\n  .container{max-width:1180px;margin:0 auto;padding:0 24px}\n\n  /* nav */\n  .nav{position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:saturate(140%) blur(8px);border-bottom:1px solid var(--line);z-index:30}\n  .nav-inner{display:flex;align-items:center;gap:28px;height:64px}\n  .logo{font-weight:800;letter-spacing:-.02em;font-size:18px;color:var(--brand)}\n  .nav a.item{color:var(--ink-2);font-weight:500;font-size:15px;text-decoration:none}\n  .nav a.item:hover{color:var(--ink);text-decoration:none}\n\n  /* reading-progress */\n  .progress{position:sticky;top:64px;height:3px;background:transparent;z-index:29}\n  .progress .bar{height:100%;width:38%;background:linear-gradient(90deg,var(--brand-2),var(--accent))}\n\n  /* hero */\n  .hero{padding:48px 0 28px;border-bottom:1px solid var(--line);background:#fff}\n  .crumb{font-size:13px;color:var(--ink-3);margin-bottom:14px}\n  .crumb a{color:var(--ink-3);text-decoration:none}\n  .tag{display:inline-block;background:var(--brand-soft);color:var(--brand);font-size:12px;font-weight:600;padding:5px 10px;border-radius:6px;letter-spacing:.02em;margin-bottom:12px}\n  h1.title{font-size:38px;line-height:1.25;letter-spacing:-.02em;margin:0 0 14px;font-weight:800}\n  h1.title small{display:block;font-size:18px;font-weight:500;color:var(--ink-3);margin-top:8px;letter-spacing:0}\n  .meta{display:flex;flex-wrap:wrap;gap:18px;color:var(--ink-3);font-size:13.5px}\n  .meta span{display:inline-flex;align-items:center;gap:6px}\n  .meta .author{display:inline-flex;align-items:center;gap:8px;color:var(--ink-2);font-weight:500}\n  .meta .author .ava{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--brand) 0%,var(--brand-2) 100%);color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center}\n\n  /* TL;DR card */\n  .tldr{margin:24px 0 0;background:linear-gradient(180deg,#f3f7fb 0%,#fff 100%);border:1px solid var(--line);border-radius:16px;padding:22px 24px}\n  .tldr h4{margin:0 0 10px;font-size:13px;color:var(--brand);letter-spacing:.04em;text-transform:uppercase}\n  .tldr ul{margin:0;padding-left:20px;color:var(--ink-2);line-height:1.75}\n  .tldr ul li{margin:4px 0}\n  .tldr ul li b{color:var(--ink)}\n\n  /* layout */\n  .layout{display:grid;grid-template-columns:240px 1fr 280px;gap:48px;padding:40px 0 80px}\n  @media (max-width:1100px){.layout{grid-template-columns:1fr;gap:32px}}\n\n  /* TOC */\n  aside.toc{position:sticky;top:120px;align-self:start;font-size:13.5px}\n  aside.toc h5{margin:0 0 12px;font-size:12px;letter-spacing:.06em;color:var(--ink-3);text-transform:uppercase;font-weight:600}\n  aside.toc ol{list-style:none;margin:0;padding:0;border-left:2px solid var(--line)}\n  aside.toc li{padding:6px 14px;color:var(--ink-3);cursor:pointer;border-left:2px solid transparent;margin-left:-2px}\n  aside.toc li.on{color:var(--brand);border-left-color:var(--brand);font-weight:600}\n  aside.toc li:hover{color:var(--ink-2)}\n  @media (max-width:1100px){aside.toc{display:none}}\n\n  /* article */\n  article.body{font-size:17px;line-height:1.78;color:var(--ink-2);max-width:760px}\n  article.body p{margin:0 0 18px}\n  article.body h2{font-size:26px;line-height:1.3;letter-spacing:-.015em;margin:48px 0 14px;color:var(--ink);font-weight:800}\n  article.body h2 .num{display:inline-grid;place-items:center;width:30px;height:30px;border-radius:8px;background:var(--brand);color:#fff;font-size:14px;margin-right:10px;vertical-align:middle}\n  article.body h3{font-size:19px;margin:30px 0 10px;color:var(--ink);font-weight:700;letter-spacing:-.01em}\n  article.body ul,article.body ol{padding-left:22px;margin:0 0 18px}\n  article.body li{margin:6px 0}\n  article.body strong{color:var(--ink)}\n\n  /* highlight box */\n  .callout{margin:22px 0;border-radius:12px;padding:18px 20px;border:1px solid;display:flex;gap:14px;align-items:flex-start}\n  .callout.info{background:var(--brand-soft);border-color:#bfdbfe;color:#0c2c52}\n  .callout.tip{background:var(--accent-soft);border-color:#a7f3d0;color:#064e3b}\n  .callout.warn{background:var(--warn-soft);border-color:#fde68a;color:#78350f}\n  .callout .ico{flex:0 0 auto;width:28px;height:28px;border-radius:50%;background:#fff;display:grid;place-items:center;font-size:14px}\n  .callout p{margin:0 0 6px;line-height:1.65;font-size:15px}\n  .callout p:last-child{margin:0}\n  .callout b{display:block;font-size:14px;margin-bottom:4px;color:inherit}\n\n  /* table */\n  .tbl-wrap{overflow:auto;margin:18px 0 24px;border:1px solid var(--line);border-radius:12px;background:#fff}\n  table.compare{width:100%;border-collapse:collapse;font-size:14px;min-width:680px}\n  table.compare th{background:#f3f7fb;color:var(--ink);font-weight:700;text-align:left;padding:14px 16px;border-bottom:1px solid var(--line);position:sticky;top:0}\n  table.compare td{padding:14px 16px;border-bottom:1px solid #f1f3f5;color:var(--ink-2);vertical-align:top;line-height:1.55}\n  table.compare tr:last-child td{border-bottom:0}\n  table.compare tr:hover td{background:#fafbfc}\n  table.compare .pillv{display:inline-block;font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;background:#eef4fb;color:var(--brand-2)}\n  table.compare .pillv.warn{background:var(--warn-soft);color:#92400e}\n  table.compare .pillv.good{background:var(--accent-soft);color:#065f46}\n\n  /* checklist */\n  .checklist{background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px 24px;margin:22px 0}\n  .checklist h4{margin:0 0 12px;font-size:15px;color:var(--brand);font-weight:700}\n  .checklist ul{list-style:none;padding:0;margin:0}\n  .checklist li{display:flex;gap:10px;align-items:flex-start;padding:8px 0;font-size:15px;color:var(--ink-2);border-bottom:1px dashed #eef0f3}\n  .checklist li:last-child{border-bottom:0}\n  .checklist li::before{content:\"\";flex:0 0 18px;height:18px;border:1.5px solid var(--brand-2);border-radius:5px;margin-top:3px;background:#fff}\n\n  /* FAQ */\n  .faq{margin:22px 0}\n  .faq details{background:#fff;border:1px solid var(--line);border-radius:12px;padding:0;margin-bottom:10px;transition:.15s}\n  .faq details[open]{border-color:var(--brand-2);box-shadow:var(--shadow)}\n  .faq summary{cursor:pointer;list-style:none;padding:18px 22px;font-size:16px;font-weight:600;color:var(--ink);display:flex;justify-content:space-between;align-items:center;gap:14px}\n  .faq summary::-webkit-details-marker{display:none}\n  .faq summary::after{content:\"+\";font-size:22px;color:var(--ink-3);font-weight:400;transition:.15s}\n  .faq details[open] summary::after{transform:rotate(45deg);color:var(--brand-2)}\n  .faq .ans{padding:0 22px 20px;color:var(--ink-2);font-size:15px;line-height:1.7}\n\n  /* sidebar */\n  aside.side{position:sticky;top:120px;align-self:start;display:flex;flex-direction:column;gap:18px;font-size:14px}\n  @media (max-width:1100px){aside.side{position:static}}\n  .side-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px}\n  .side-card h5{margin:0 0 12px;font-size:13px;letter-spacing:.04em;color:var(--ink-3);text-transform:uppercase;font-weight:600}\n  .side-card p{margin:0;color:var(--ink-2);line-height:1.6}\n  .vendor-cta{background:linear-gradient(135deg,#0b1220 0%,#0a3d62 100%);color:#fff;border:0;padding:24px}\n  .vendor-cta h5{color:rgba(255,255,255,.7)}\n  .vendor-cta h3{margin:0 0 8px;font-size:18px;letter-spacing:-.01em}\n  .vendor-cta p{color:rgba(255,255,255,.78);font-size:13.5px;margin:0 0 16px}\n  .vendor-cta .btn{display:block;text-align:center;background:#fff;color:var(--brand);font-weight:700;padding:11px 0;border-radius:9px;text-decoration:none;font-size:14px}\n  .related ul{list-style:none;margin:0;padding:0}\n  .related li{padding:10px 0;border-bottom:1px solid #f1f3f5}\n  .related li:last-child{border-bottom:0}\n  .related a{color:var(--ink);font-weight:500;font-size:14px;text-decoration:none;display:block;line-height:1.45}\n  .related a:hover{color:var(--brand-2)}\n  .related .small{color:var(--ink-3);font-size:12px;display:block;margin-top:3px}\n\n  .share{display:flex;gap:8px}\n  .share button{flex:1;background:#f3f7fb;border:1px solid var(--line);color:var(--ink-2);padding:8px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:500}\n  .share button:hover{background:#e2e8f0}\n\n  /* end CTA */\n  .end-cta{margin:40px 0 0;background:var(--brand-soft);border:1px solid #bfdbfe;border-radius:16px;padding:28px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}\n  .end-cta h3{margin:0 0 4px;font-size:20px;color:var(--ink)}\n  .end-cta p{margin:0;color:var(--ink-2);font-size:14px}\n  .end-cta .btn{background:var(--brand);color:#fff;padding:12px 20px;border-radius:10px;font-weight:600;text-decoration:none;font-size:14px}\n\n  footer{border-top:1px solid var(--line);padding:30px 0;color:var(--ink-3);font-size:13px;margin-top:40px}\n</style>\n</head>\n<body>\n\n<header class=\"nav\">\n  <div class=\"container nav-inner\">\n    <a class=\"logo\" href=\"/\">Packlinx</a>\n    <a class=\"item\" href=\"/categories\">카테고리</a>\n    <a class=\"item\" href=\"/services/printing-design\">인쇄·디자인</a>\n    <a class=\"item\" href=\"/guides\" style=\"color:var(--brand);font-weight:600\">가이드</a>\n  </div>\n</header>\n<div class=\"progress\"><div class=\"bar\"></div></div>\n\n<section class=\"hero\">\n  <div class=\"container\">\n    <div class=\"crumb\"><a href=\"/\">홈</a> · <a href=\"/guides\">가이드</a> · <a href=\"#\">박스·골판지</a></div>\n    <span class=\"tag\">박스·골판지 · 업체 선정</span>\n    <h1 class=\"title\">\n      골판지 박스 업체, 어떻게 골라야 후회 안 할까?\n      <small>MOQ·납기·인쇄·인증을 동일 기준으로 비교하는 4단계 체크리스트</small>\n    </h1>\n    <div class=\"meta\">\n      <span class=\"author\"><span class=\"ava\">PL</span> Packlinx 콘텐츠팀</span>\n      <span>📅 2026-04 업데이트</span>\n      <span>⏱ 6분 읽기</span>\n      <span>👁 4,128 조회</span>\n    </div>\n\n    <div class=\"tldr\">\n      <h4>3줄 요약 (TL;DR)</h4>\n      <ul>\n        <li><b>업체 유형 4가지</b> — 직판 제조, 도매 유통, 인쇄 특화, 종합 패키징. 각각 MOQ·단가·납기 구조가 다름.</li>\n        <li><b>견적 받기 전 체크</b> — 골 종류, 인쇄 사양, 후가공, 납기, 샘플 수령 가능 여부 5가지를 확정해야 정확한 비교가 가능.</li>\n        <li><b>샘플 검수 5항목</b> — 압축강도·인쇄 정합·접착·치수·발주 식별 — 이 5가지만 통과하면 양산 리스크 80% 차단.</li>\n      </ul>\n    </div>\n  </div>\n</section>\n\n<div class=\"container\">\n<div class=\"layout\">\n\n  <!-- TOC -->\n  <aside class=\"toc\">\n    <h5>목차</h5>\n    <ol>\n      <li class=\"on\">1. 업체 유형 4가지</li>\n      <li>2. MOQ·단가·납기 비교표</li>\n      <li>3. 견적 전 5가지 체크</li>\n      <li>4. 샘플 검수 체크리스트</li>\n      <li>5. 자주 묻는 질문</li>\n    </ol>\n  </aside>\n\n  <!-- article -->\n  <article class=\"body\">\n\n    <h2><span class=\"num\">1</span>업체 유형 4가지 — 무엇이 다른가</h2>\n    <p>같은 \"골판지 박스\"라도 어디서 발주하느냐에 따라 단가는 <strong>최대 2배 이상</strong> 차이가 납니다. 첫 단계는 우리 회사가 어떤 유형의 업체에 발주해야 적합한지 파악하는 것입니다.</p>\n\n    <div class=\"callout info\">\n      <div class=\"ico\">💡</div>\n      <div>\n        <b>핵심 원칙</b>\n        <p>월 발주량 5,000매 이하라면 도매 유통, 5,000~30,000매는 인쇄 특화, 30,000매 이상은 직판 제조가 보통 가장 유리합니다. 단, 인쇄 컬러 수가 4도 이상이면 발주량과 무관하게 인쇄 특화 업체를 권장합니다.</p>\n      </div>\n    </div>\n\n    <h2><span class=\"num\">2</span>MOQ·단가·납기 한눈에 비교</h2>\n    <p>아래 표는 2026년 1분기 등록 업체 평균치 기준입니다. 단가는 200×150×100mm·BC골·1도 인쇄 기준으로 환산했습니다.</p>\n\n    <div class=\"tbl-wrap\">\n      <table class=\"compare\">\n        <thead>\n          <tr>\n            <th>업체 유형</th>\n            <th>MOQ</th>\n            <th>단가 (매)</th>\n            <th>납기</th>\n            <th>인쇄 역량</th>\n            <th>적합 발주 규모</th>\n          </tr>\n        </thead>\n        <tbody>\n          <tr>\n            <td><strong>직판 제조</strong></td>\n            <td><span class=\"pillv warn\">3,000매~</span></td>\n            <td>₩280~420</td>\n            <td>10~14일</td>\n            <td>1~2도</td>\n            <td>월 30,000매 이상</td>\n          </tr>\n          <tr>\n            <td><strong>도매 유통</strong></td>\n            <td><span class=\"pillv good\">100매~</span></td>\n            <td>₩520~780</td>\n            <td>2~5일</td>\n            <td>무지·기성</td>\n            <td>월 5,000매 이하</td>\n          </tr>\n          <tr>\n            <td><strong>인쇄 특화</strong></td>\n            <td><span class=\"pillv\">500매~</span></td>\n            <td>₩460~650</td>\n            <td>7~10일</td>\n            <td>4~8도·후가공</td>\n            <td>브랜드 박스·중간 발주</td>\n          </tr>\n          <tr>\n            <td><strong>종합 패키징</strong></td>\n            <td><span class=\"pillv warn\">1,000매~</span></td>\n            <td>₩430~590</td>\n            <td>5~10일</td>\n            <td>2~4도</td>\n            <td>다품종 동시 발주</td>\n          </tr>\n        </tbody>\n      </table>\n    </div>\n\n    <div class=\"callout warn\">\n      <div class=\"ico\">⚠️</div>\n      <div>\n        <b>흔한 실수</b>\n        <p>\"단가만 보고 직판 제조에 의뢰\" — MOQ 미달이면 견적이 도매 수준으로 올라가거나 거절당합니다. 발주 전 MOQ를 먼저 확인하세요.</p>\n      </div>\n    </div>\n\n    <h2><span class=\"num\">3</span>견적 받기 전 5가지를 확정하세요</h2>\n    <p>업체 5곳에 같은 사양으로 견적을 받아야 비교가 됩니다. 다음 5가지가 빠지면 받은 견적은 의미가 없습니다.</p>\n\n    <div class=\"checklist\">\n      <h4>견적 요청 전 확정 항목</h4>\n      <ul>\n        <li><strong>외경 치수</strong> — 너비×길이×높이 (mm). 내경 기준이면 별도 명시</li>\n        <li><strong>골 종류</strong> — A·B·E·F골 또는 BC·EB 합지</li>\n        <li><strong>인쇄 사양</strong> — 도수, Pantone 컬러 코드, 인쇄 면적 비율</li>\n        <li><strong>후가공</strong> — 코팅, 박, 형압, 창 (불필요시 \"없음\" 명시)</li>\n        <li><strong>납기·납품 방법</strong> — 희망 납기일, 분납 여부, 직배송/택배</li>\n      </ul>\n    </div>\n\n    <h2><span class=\"num\">4</span>샘플 검수 — 5가지만 보면 됩니다</h2>\n    <p>샘플은 <strong>최소 3매 이상</strong> 받아 다음 5가지 항목을 평가하세요. 한 가지라도 통과하지 못하면 양산 후 더 큰 비용이 발생합니다.</p>\n\n    <h3>① 압축강도 (Compression Strength)</h3>\n    <p>적재 시 무너지지 않는지 확인. 책상 모서리에 박스 모서리를 맞대고 체중을 실어 눌러도 함몰되지 않아야 합니다.</p>\n    <h3>② 인쇄 정합·색상</h3>\n    <p>Pantone 색상 일치, 도판 어긋남(misregister) 없음, 인쇄면 긁힘 없음.</p>\n    <h3>③ 접착·접합</h3>\n    <p>이음새 부위를 손으로 꺾어 5회 반복. 접착이 떨어지면 양산 시 운송 중 파손률 급증.</p>\n    <h3>④ 치수 정밀도</h3>\n    <p>±2mm 이내. 자동 포장 라인을 쓴다면 ±1mm 이내 요구 가능.</p>\n    <h3>⑤ 발주 식별 정보</h3>\n    <p>박스 내부 또는 측면에 발주 코드·생산일자가 인쇄/스탬핑 되어 있어야 추후 클레임 시 추적이 가능.</p>\n\n    <div class=\"callout tip\">\n      <div class=\"ico\">✅</div>\n      <div>\n        <b>Pro tip</b>\n        <p>샘플 평가표를 PDF로 저장해 모든 업체에 동일 기준으로 적용하세요. 주관 평가가 아닌 객관 데이터가 협상력을 만듭니다.</p>\n      </div>\n    </div>\n\n    <h2><span class=\"num\">5</span>자주 묻는 질문</h2>\n\n    <div class=\"faq\">\n      <details open>\n        <summary>해외(중국·동남아) 업체와 국내 업체 단가 차이는?</summary>\n        <div class=\"ans\">평균적으로 국내 대비 30~45% 저렴하지만, 운송·통관·MOQ(보통 5,000매 이상)·리드타임(30~45일)을 합산하면 월 50,000매 이상 안정적 발주가 가능한 경우에만 유리합니다. 시즌성 발주는 권장하지 않습니다.</div>\n      </details>\n      <details>\n        <summary>샘플은 무료인가요? 비용이 든다면 얼마인가요?</summary>\n        <div class=\"ans\">기성 박스 샘플은 대부분 무료(택배비만 부담)이며, 인쇄·후가공 포함 커스텀 샘플은 1~5만원 또는 양산 시 차감 조건이 일반적입니다.</div>\n      </details>\n      <details>\n        <summary>발주 후 디자인 수정이 가능한 시점은?</summary>\n        <div class=\"ans\">제판(인쇄용 동판) 제작 전까지만 무료 수정. 제판 이후 수정 시 ₩100,000~₩300,000의 재제판 비용이 발생합니다.</div>\n      </details>\n      <details>\n        <summary>친환경 인증 (FSC) 박스는 단가가 얼마나 더 비싼가요?</summary>\n        <div class=\"ans\">동일 사양 대비 8~15% 추가. 자세한 비교는 <a href=\"/guides/eco-friendly-packaging\">친환경 패키징 가이드</a>를 참고하세요.</div>\n      </details>\n    </div>\n\n    <div class=\"end-cta\">\n      <div>\n        <h3>이 가이드대로 견적 받을 업체 찾으세요</h3>\n        <p>골판지 박스 등록 업체 320곳 — MOQ·납기 필터로 즉시 비교</p>\n      </div>\n      <a class=\"btn\" href=\"/products/box\">업체 비교하기 →</a>\n    </div>\n\n  </article>\n\n  <!-- side -->\n  <aside class=\"side\">\n    <div class=\"side-card vendor-cta\">\n      <h5>지금 견적 받기</h5>\n      <h3>MOQ 500개부터 가능한 업체</h3>\n      <p>등록된 320개 골판지 박스 업체 중 조건에 맞는 곳만 추려 비교하세요.</p>\n      <a class=\"btn\" href=\"/products/box\">업체 찾기 →</a>\n    </div>\n\n    <div class=\"side-card\">\n      <h5>이 가이드 공유</h5>\n      <div class=\"share\">\n        <button>🔗 링크</button>\n        <button>📧 메일</button>\n        <button>💬 카톡</button>\n      </div>\n    </div>\n\n    <div class=\"side-card related\">\n      <h5>관련 가이드</h5>\n      <ul>\n        <li><a href=\"/guides/corrugated-flute-types\">골판지 골 종류 (A·B·E·F골) 선택<span class=\"small\">⏱ 4분</span></a></li>\n        <li><a href=\"/guides/shipping-box-pricing\">택배 박스 단가 — 수량·사이즈별<span class=\"small\">⏱ 5분</span></a></li>\n        <li><a href=\"/guides/small-quantity-custom-box\">소량 맞춤 박스 — 100~500매 발주<span class=\"small\">⏱ 4분</span></a></li>\n        <li><a href=\"/guides/eco-friendly-packaging\">친환경 패키징 — 인증·비용·로드맵<span class=\"small\">⏱ 7분</span></a></li>\n      </ul>\n    </div>\n  </aside>\n\n</div>\n</div>\n\n<footer>\n  <div class=\"container\">© Packlinx · 가이드 · 카테고리 · 개인정보 · 약관 · 본 가이드는 Packlinx 콘텐츠팀이 작성·검수합니다.</div>\n</footer>\n\n</body>\n</html>\n\n```\n"
