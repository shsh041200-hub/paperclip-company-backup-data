        body: "## 대시보드 완료 — 즉시 사용 가능\n\n대시보드 구현 및 검증 완료.\n\n### 접속 방법\n\n브라우저에서 열기: **http://localhost:8079/dashboard.html**\n\n### 구성\n\n- **HTTP 서버**: systemd user service (`packlinx-dashboard.service`) — 자동 시작, 장애 시 재시작\n- **데이터 갱신**: cron 10분 주기 (`generate-dashboard.py`)\n- **표시 내용**:\n  - 에이전트 상태 (활성/실행/일시정지/오류)\n  - 보드 액션 큐 (결재 대기 항목)\n  - Goal 트리 진척률 (Vision → TG → SG → P, 색상 구분 프로그레스 바)\n\n### 잔여 작업\n\nTelegram 알림 기능만 남음. Bot Token + Chat ID 전달 시 즉시 활성화.\n\n셋업 절차:\n1. Telegram에서 @BotFather 검색 → /newbot → 봇 이름 설정\n2. 받은 Bot Token 기록\n3. 생성된 봇과 대화 시작 (/start 전송)\n4. 브라우저에서 `https://api.telegram.org/bot<TOKEN>/getUpdates` 접속 → chat_id 확인\n5. 본 티켓에 Token + Chat ID 코멘트로 전달\n\n전달 후 5분 내 알림 기능 활성화 + 보드 사인오프 요청 예정."
