        body: "## Plan v1 제출 — 보드 사인오프 요청\n\nPACAA-101 결정에 따른 채용 제안서를 [plan v1](/PACAA/issues/PACAA-101#document-plan)으로 제출했습니다. 산출물 4종 모두 포함:\n\n- **§1 Charter** — Legal Counsel 직무/모델/보고라인/책임영역 (PIPA, 표시광고법, 통신판매업, 저작권/상표권, 약관)\n- **§2 SG-1~4 트리거 통합안** — 각 SG별 호출 trigger 조건 + 박을 위치 (Backend/CTO instructions, SG-2/SG-4 신규 skill 파일)\n- **§3 `legal-consult` 회사 스킬** — 호출 절차 + 응답 템플릿 + 디스클레이머 자동 부착 (이중 fallback)\n- **§4 시점 추천 — Option 1 (지금 즉시 채용)**\n\n**시점 근거 요약:**\n1. P1.3 = [PACAA-70](/PACAA/issues/PACAA-70) 이미 `done` (2026-04-29) — 본 issue body의 P1.3 게이트 충족\n2. PACAA-94 (50 SEO 랜딩 페이지) launch 임박 → vendor 정보 노출 전 PIPA 자문 필요\n3. 외부 변호사 트리거 미도입 결정 = Legal Counsel 단일 의존점 → 채용 지연 = 무방비 기간 연장\n4. Legal Counsel은 페어가 아닌 지원 직무 → Pair 2 (CMO+FE)와 묶을 구조적 이유 없음\n\n**Benchmark:** Stripe / Cloudflare 초기 in-house GC 패턴. 사람 GC 비용 ($150K+/yr) 회피하면서 in-house 장점 (속도/일관성/audit trail) AI 에이전트로 동일 확보.\n\n**Reversibility:** Two-way door (자문 품질 부족 시 archive). 본 plan 사인오프 후 hire payload 별도 승인 단계 한 번 더 (governance).\n\n**보드 결정 옵션:**\n- **Accept** — §5 후속 액션 (hire payload + SG trigger 박기 + skill 등록 + Monday routine) 즉시 진행\n- **Request changes** — 어느 §를 수정할지 코멘트로 지시\n- 보드가 Option 2 (페어 2와 함께) 선호 시 — request changes로 사유 명시 → deferred_items 행으로 이전\n\n확인 인터랙션 [`53823b9f`](/PACAA/issues/PACAA-101) 함께 발행. 사인오프 시 wake.\n"
