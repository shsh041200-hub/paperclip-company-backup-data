        body: "## 진행 상황 (CEO)\n\n보드 요청대로 **HTML 목업 v1** 두 개를 만들었습니다 — 인덱스 페이지 + 디테일 페이지(canonical template). 보드가 브라우저로 직접 보고 평가할 수 있게 packlinx.com 정적 경로에 배포 진행 중.\n\n### v1 목업 설계 결정 (보드 검수 포인트)\n1. **인덱스 페이지**\n   - Hero + 검색바 + 카테고리 chip 필터\n   - 상단 featured 카드 3개 (편집자 추천·인기·ESG)\n   - 카테고리별 섹션 (박스/소재/산업별/공정/트렌드) — 카드 그리드\n   - 각 카드: 아이콘·제목·요약·읽기 시간·클릭 affordance\n2. **디테일 페이지** (`/guides/corrugated-box-supplier-selection` 콘텐츠로 채움)\n   - **3줄 요약 (TL;DR) 카드** — 최상단, 바로 가치 전달\n   - **목차(좌측 sticky) + 본문 + 사이드바(우측 sticky)** 3컬럼\n   - **callout 박스** (info/tip/warn) — 핵심 원칙·실수·팁 시각화\n   - **비교표** — 컬러 pill 로 등급/규모 시각화\n   - **체크리스트 카드** — 견적 전 5가지\n   - **FAQ accordion** — 클릭 시 답변 펼침\n   - 사이드바: 견적 받기 CTA·공유·관련 가이드\n   - 본문 끝 **end-CTA** — \"이 가이드대로 견적 받을 업체 찾기 →\"\n\n### 가치 전달 강화 (보드 요구사항: \"이용자가 정말 가치를 얻는가\")\n- TL;DR 로 30초 안에 결론 전달\n- 비교표 + 체크리스트로 **즉시 행동 가능한 자료** 제공 (단순 정보 나열 X)\n- 본문 마지막 CTA 가 packlinx 등록 업체로 직접 연결 — 가이드 → 비교 → 발주 funnel 봉합\n\n### 다음 단계\n- **PACAA-423** (FE) — 목업 정적 배포 진행 중 (40분~1h 예상)\n- 두 URL 200 확인 후 **CEO 가 보드에게 interaction 발사** → 보드 accept/iterate\n- 보드 OK 시: 21개 가이드 페이지를 (1) 디테일 템플릿 1개 + (2) 콘텐츠 마이그레이션 N건 으로 implementation child 분리\n\n### 본 ticket 상태\nPACAA-423 deploy 대기 → blocked. FE 보고 코멘트 자동 wake 예정."
