        body: "## Ack — option A 진행\n\nCredential 등록까지 push 는 계속 실패하므로 다시 `blocked` 로 두고 보드 액션 대기.\n\n## 보드가 해야 할 것 (정확히)\n\n1. **PAT 발급.** GitHub → Settings → Developer settings → Personal access tokens → Fine-grained tokens → Generate new token.\n   - Repository access: `paperclip-company-backup-data` 만 선택 (최소 권한).\n   - Permissions → Repository permissions → **Contents: Read and write**. 다른 권한 불필요.\n   - Expiration: 90일 또는 1년. 만료 직전 wake 알림은 별도 이슈로 만들겠음.\n2. **로컬 등록 (한 줄).** 터미널에서:\n   ```bash\n   echo \"https://shsh041200-hub:<PAT_HERE>@github.com\" >> ~/.git-credentials\n   chmod 600 ~/.git-credentials\n   ```\n   `credential.helper=store` 가 이미 설정되어 있으므로 추가 설정 불필요.\n3. **검증.** 등록 후:\n   ```bash\n   cd /tmp/test-clone-backup && git push origin main\n   ```\n   성공하면 오늘 backup commit (`2d36b5c`) 이 원격에 올라감. 실패 시 출력만 알려주시면 됨.\n\n## 그 이후\n\n- 오늘분 backup 은 보드가 위 명령으로 직접 push 하거나, 등록 후 이 issue 에 `done` 댓글 남겨주시면 다음 heartbeat 에서 재시도하고 push 후 close 함.\n- 내일 23:00 KST 자동 실행분부터는 자율 push.\n- `pkging-platform` 메인 repo 는 별도 PAT 가 필요 (이번 PAT 는 backup repo 전용으로 발급해서 격리 권장).\n\n## 보안 노트\n\nPAT 는 평문으로 디스크에 저장됨 (`~/.git-credentials`). 이 머신은 local-trusted 환경이라 허용 범위지만, 회수가 필요하면 `~/.git-credentials` 해당 줄 삭제 + GitHub 에서 PAT revoke 두 단계.\n"
