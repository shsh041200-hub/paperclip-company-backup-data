        body: "보드 선택 **cf_token** 접수. CF API 토큰 주입 가이드입니다.\n\n## ⚠️ 보안 주의 (필수)\n토큰을 **이 이슈 코멘트에 절대 붙여넣지 마세요**. Paperclip 코멘트는 DELETE/hide 엔드포인트가 없어 영구 노출됨. **adapterConfig.env 경로** 만 사용하세요.\n\n## Step 1: Cloudflare 에서 토큰 생성 (최소 권한)\n1-A. https://dash.cloudflare.com/profile/api-tokens 접속\n1-B. **\"Create Token\"** 클릭\n1-C. 하단 **\"Get started\" (Custom token)** 클릭\n1-D. 설정:\n   - **Token name**: `Packlinx CEO audit (read-only)`\n   - **Permissions** (4줄 추가, 전부 **Read** 만):\n     - Zone → Zone → **Read**\n     - Zone → Analytics → **Read**\n     - Zone → SSL and Certificates → **Read**\n     - Account → Domain Registration → **Read**\n   - **Zone Resources**: Include → Specific zone → **`packlinx-api.com`**\n   - **Account Resources**: Include → All accounts (또는 본인 계정)\n   - **TTL** (선택, 권장): 90 days 후 자동 만료\n1-E. **Continue to summary** → **Create Token**\n1-F. **토큰 문자열 복사** (이 화면 닫으면 다시 못 봄)\n\n## Step 2: Paperclip Dashboard 에서 CEO adapterConfig 에 주입\n2-A. https://paperclip-api.packlinx-api.com 접속 → 본인 회사 (Packlinx)\n2-B. 사이드바 **\"Agents\"** → **CEO** 카드 클릭\n2-C. **\"Edit\"** 또는 \"Configuration\" 탭 → **adapterConfig.env** 섹션\n2-D. 새 항목 추가:\n   - Key: `CLOUDFLARE_API_TOKEN`\n   - Value: (Step 1-F 에서 복사한 토큰 붙여넣기)\n2-E. **Save**\n2-F. 확인 신호: CEO 카드에 \"Config updated\" 또는 환경변수 항목에 마스킹된 `CLOUDFLARE_API_TOKEN=********` 표시\n\n## Step 3: CEO wake → audit 실행\nadapterConfig save → CEO 다음 wake (또는 보드가 이 이슈에 \"토큰 주입 완료\" 코멘트) 때 audit 자동 시작.\nCEO 가 audit 할 항목:\n- Zone settings (DNS records 전수, security 설정)\n- WAF / Firewall / Rate limit 규칙 활성 여부\n- Analytics (지난 7일 트래픽/요청 수)\n- TLS 인증서 만료/갱신 자동화 상태\n- Domain Registration auto-renew **실 상태 검증** (CF Dashboard 토글 보드 확인 → API 로 실제 verify)\n\n주입 완료하시면 아래 interaction accept 해주세요."
