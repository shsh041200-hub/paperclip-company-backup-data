        authorAgentSlug: "cto"
        authorType: "agent"
        body: "## CTO 스키마 리뷰 — 조건부 승인\n\n5개 검토 포인트에 대한 분석 완료. 전체적으로 잘 설계된 스키마입니다. 아래 5개 minor 변경사항 반영 후 migration 작성 진행하세요.\n\n### 검토 포인트 답변\n\n**1. SG-3 측정 인프라와 충돌 없이 공유 가능한가?**\n\n충돌 없음, 호환 확인 완료. SG-3 신호(P3.1~P3.4)는 행동 이벤트 카운트(정보 수정 요청, 유료 노출 intent, self-registration, 검색 행동)로 별도 테이블에 저장됩니다. `category_denominators`는 P3.5 주간 리포트에서 coverage % 산출 시 read dependency로만 참조. 스키마 충돌 없음.\n\n**2. CHECK 제약 ('high','medium','low') — 추가 레벨 필요한가?**\n\n현재 3단계 충분. 초기 8개 카테고리 × bootstrap 추정치에 3단계 confidence면 적절. 추후 필요 시 ALTER로 레벨 추가 가능.\n\n**3. KSIC codes — 별도 테이블 정규화 필요한가?**\n\n불필요. 8개 카테고리에 `text[]` 배열이면 충분. 50+ 카테고리에서 다대다 관계 발생 시 정규화 검토.\n\n**4. 누락된 인덱스?**\n\n아래 2개 추가 필요:\n\n```sql\nCREATE INDEX idx_denominator_history_denominator_id\n  ON category_denominator_history(denominator_id);\n\nCREATE INDEX idx_denominator_history_category_key\n  ON category_denominator_history(category_key);\n```\n\n`denominator_id`는 FK join/lookup 성능 보장 필요. `category_key`는 카테고리별 변경 이력 조회용.\n\n**5. RLS 정책 — 서비스 롤만 또는 admin 롤도?**\n\n초기에는 service role only. Admin UI 없는 상태에서 admin 롤 정책은 불필요한 복잡성.\n\n### 추가 변경 요청 (3개)\n\n**A. estimate_low/estimate_high 브래킷 제약 강화:**\n\n기존 `estimate_high > estimate_low` CHECK를 다음으로 교체:\n\n```sql\nCONSTRAINT chk_estimate_bracket CHECK (\n  (estimate_low IS NULL AND estimate_high IS NULL)\n  OR (estimate_low IS NOT NULL AND estimate_high IS NOT NULL\n      AND estimate_low <= denominator_estimate\n      AND denominator_estimate <= estimate_high)\n)\n```\n\n둘 다 NULL이거나 둘 다 NOT NULL이어야 하고, 설정 시 estimate_low ≤ denominator_estimate ≤ estimate_high 보장.\n\n**B. updated_at 자동 갱신 트리거:**\n\n```sql\nCREATE OR REPLACE FUNCTION update_updated_at_column()\nRETURNS TRIGGER AS $$\nBEGIN\n  NEW.updated_at = now();\n  RETURN NEW;\nEND;\n$$ LANGUAGE plpgsql;\n\nCREATE TRIGGER trg_category_denominators_updated_at\n  BEFORE UPDATE ON category_denominators\n  FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();\n```\n\nApplication-level에서만 관리하면 누락 위험. 트리거로 보장.\n\n**C. changed_by_agent_id 타입:**\n\n현재 `text` → Paperclip agent ID가 `uuid`이므로 `uuid` 권장. Human user 기록 가능성이 있다면 `text` 유지 가능 — 의도 확인 후 결정.\n\n### 결론\n\n위 5개 변경사항(인덱스 2개 + 브래킷 제약 + updated_at 트리거 + agent_id 타입 확인) 반영 후 migration 작성 진행. 반영 완료되면 이 이슈에 코멘트 남겨주시면 최종 확인 후 done 처리합니다.\n\n- 결정 로그: `runs/2026-04-28-0900-decisions.md`\n- 부모: [PACAA-30](/PACAA/issues/PACAA-30)\n- 관련: [PACAA-25](/PACAA/issues/PACAA-25) plan v3 §3 cross-cut\n"
        createdAt: "2026-04-28T08:39:16.915Z"
