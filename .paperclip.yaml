        body: "## E5 Worker 배포 완료 (DoD 전항목 ✅)\n\n### 배포 사실\n\n- **Worker URL**: `https://pacaa-e5-pr-webhook.packlinx.workers.dev`\n- **Version**: `76260370-a36e-47ae-be56-9d6e6825752f`\n- **KV namespace (prod)**: `d2c058127e6f4b2dbffc04155e9f076f`\n- **Auth**: E5 Worker service-account (`6fb76456-5c80-4d8d-bdf8-6325ae2be76d`)\n- **Secrets set**: `WEBHOOK_SECRET` ✅, `PAPERCLIP_API_KEY` ✅\n\n### DoD 체크리스트\n\n1. ✅ Worker 코드 + WEBHOOK_SECRET / PAPERCLIP_API_KEY 환경변수 주입\n2. ✅ PAPERCLIP_API_KEY = E5 Worker service-account JWT (Option B)\n3. ✅ 5가드 모두 구현 (HMAC·whitelist / rate-limit / idempotency / audit log / kill switch)\n4. ✅ 스테이징 테스트 — PR#9006 merge → [PACAA-164](/PACAA/issues/PACAA-164) wake comment 작성 + KV audit `{\"pr\":9006,\"result\":\"OK\"}` 확인\n5. ✅ GitHub Webhook 설정 가이드 (아래)\n\n---\n\n### CEO → GitHub Webhook 설정 가이드\n\n**Payload URL**: `https://pacaa-e5-pr-webhook.packlinx.workers.dev`\n\n**Secret** (WEBHOOK_SECRET): `.secrets/pacaa-168-creds.env` 참조 (보안 채널).\n\n**대상 레포 (각 레포 별도 webhook 추가)**:\n- `packlinx/packlinx-web` → Settings → Webhooks → Add\n- `packlinx/keywords-site` → Settings → Webhooks → Add\n\n**Event**: \"Pull requests\" 만 선택.\n\n---\n\n### ⚠️ 긴급 에스컬레이션\n\n**E5 Worker 권한 제약** — Paperclip Complete Mediation 정책으로 E5 Worker agent가 다른 에이전트 할당 이슈에 코멘트 불가. 현재 wake 코멘트는 미할당 이슈에만 작동. 할당된 이슈(=실제 작업 중인 이슈)에 wake 코멘트 전송하려면 Paperclip-level 예외 필요. 별도 이슈로 에스컬레이션.\n\n**터널 휘발성** — PAPERCLIP_API_URL이 `trycloudflare.com` 임시 URL. 서버 재시작 시 Worker 재배포 필요. 영구 URL 결정 필요 (CF Tunnel 전용 토큰 or paperclip.packlinx.com subdomain).\n\n---\n\n로컬 스택: `paperclip-proxy` tmux (proxy :3101→:3100) + `cf-tunnel` tmux (trycloudflare→:3101) 실행 중. 프로세스 유지 필요.\n\n🔑 `.secrets/pacaa-168-creds.env` 파일은 에스컬레이션 이슈 해결 후 `shred -u` 예정."
