        body: "## 보드, 로컬 서버 직접 띄우는 법 (초보자용 단계별)\n\n### 1) 지금 에러가 난 진짜 이유 (먼저 이해하고 가야 함)\n\n로그 마지막 줄:\n> `Error: You cannot use different slug names for the same dynamic path ('id' !== 'slug').`\n\n쉽게 풀면: **Next.js 는 같은 폴더 안에 변수 이름이 다른 동적 폴더 두 개를 못 둠.** 우리 코드 보면\n\n```\napp/api/companies/[id]/similar-optout/route.ts\napp/api/companies/[slug]/is-owner/route.ts\n```\n\n둘 다 `app/api/companies/` 바로 아래 자식인데, 한 쪽은 `[id]` 다른 쪽은 `[slug]`. URL 로 들어왔을 때 Next.js 가 \"이 변수를 `id` 라고 부를까 `slug` 라고 부를까?\" 결정 못 해서 빌드 자체를 거부함. **이거 안 고치면 절대 안 뜸.**\n\n그 위에 `⚠ The \"middleware\" file convention is deprecated` 는 경고일 뿐 — 무시해도 서버는 뜸.\n\n---\n\n### 2) 보드가 직접 고치는 방법 (파일 이름 1번만 바꾸면 됨)\n\n둘 중 한 폴더 이름을 통일해야 함. 안전한 선택은 `[id]` → `[slug]` 로 통일 (왜냐하면 공개 페이지 `app/companies/[slug]/` 가 이미 `slug` 를 쓰므로 동선이 맞음).\n\n터미널에서:\n\n```bash\ncd ~/.paperclip/instances/default/projects/d5e183da-c58f-4124-8075-493330dce4c4/f0cad884-57d7-4a3e-b1bb-fa93a4fc0b2c/pkging-platform\n\nmv 'app/api/companies/[id]' 'app/api/companies/[slug-tmp]'\nmv 'app/api/companies/[slug-tmp]/similar-optout' 'app/api/companies/[slug]/similar-optout'\nrmdir 'app/api/companies/[slug-tmp]'\n```\n\n*(원래 `[id]` 안에 `similar-optout` 만 있어서 `[slug]` 안으로 옮기고 빈 폴더 지우는 식. `[slug]` 폴더가 이미 있어서 바로 `mv` 하면 충돌 → 그래서 `[slug-tmp]` 임시 거쳐가기.)*\n\n그리고 옮긴 파일 한 군데를 살짝 수정:\n\n파일: `app/api/companies/[slug]/similar-optout/route.ts`\n\n7번째 줄:\n```ts\n  { params }: { params: Promise<{ id: string }> }\n```\n→\n```ts\n  { params }: { params: Promise<{ slug: string }> }\n```\n\n9번째 줄:\n```ts\n  const { id: companyId } = await params\n```\n→\n```ts\n  const { slug: companyId } = await params\n```\n\n*(기능은 그대로 — \"이 자리에 들어오는 값을 `companyId` 라고 부를게\" 이름표만 `id` → `slug` 로 통일. 안에서 쓰는 변수 이름 `companyId` 는 그대로라 다른 줄은 안 건드려도 됨.)*\n\n---\n\n### 3) 로컬 서버 직접 띄우는 5단계 (외워두면 평생 씀)\n\n```bash\n# 1. 사이트 폴더로 들어가기 (\"내 웹사이트 로컬\" = pkging-platform 이 디폴트)\ncd ~/.paperclip/instances/default/projects/d5e183da-c58f-4124-8075-493330dce4c4/f0cad884-57d7-4a3e-b1bb-fa93a4fc0b2c/pkging-platform\n\n# 2. 환경변수 파일 있는지 확인 (없으면 Supabase 키 없어서 페이지가 깨짐)\nls -la .env.local\n\n# 3. 의존성 깔려있는지 확인 (없거나 오래됐으면 한 번 깔기)\nls node_modules >/dev/null 2>&1 && echo \"OK\" || npm install\n\n# 4. 개발 서버 띄우기\nnpm run dev\n\n# 5. 브라우저에서 접속\n# → http://localhost:3000\n```\n\n---\n\n### 4) 성공 신호\n\n터미널에 이렇게 떠야 됨:\n```\n✓ Ready in ~XXXms\n```\n그리고 `Error:` 라인이 **없어야** 함. 브라우저에서 `http://localhost:3000` 들어가면 메인 페이지 뜸.\n\n### 5) 끄는 법\n\n터미널에서 `Ctrl + C` 한 번. 다 끝나면 까만 프롬프트로 돌아옴.\n\n---\n\n### 막혔을 때 자가-진단 순서\n\n1. **빨간 `Error:` 메시지 마지막 줄을 그대로 복붙해서 검색** — 99% 답 나옴\n2. 포트 충돌 (`EADDRINUSE :3000`) 이면 → `lsof -i :3000` 로 누가 잡고있는지 본 뒤 `kill -9 <PID>`\n3. `.env.local` 없으면 → Supabase URL/anon key 가 없어서 DB 조회만 깨짐 (서버 자체는 뜸)\n4. 어디 막히면 그 시점 터미널 전체 로그를 그대로 댓글 달아주세요 — 추측 안 하고 정확히 짚을 수 있게.\n\n---\n\n위 1~2 번이 지금 막힌 거 풀어주는 핵심이고, 3 번이 앞으로 매번 쓸 5단계입니다. 직접 해보시고 막히면 로그 붙여주세요."
