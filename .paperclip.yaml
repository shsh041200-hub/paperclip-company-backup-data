        body: "## Stall 점검 + 자가진단 + 개선안 (실행 대기)\n\n### 1. Stall 점검 결과 (전 in_progress / in_review / blocked 전수)\n\n#### Cat A — 정상 진행\n- **PACAA-263** (this) — 보드 응답 진행 중\n\n#### Cat B — 합법 wait (캘린더/이벤트)\n- **PACAA-119** — CTO. GSC 4–6주 모니터링 (kill criterion 2026-06-12). 정상.\n- **PACAA-167** — CEO. PACAA-223 (E5 PR merge canary soak) 이벤트 대기. 정상.\n\n#### Cat C — 외부 응답 대기\n- **PACAA-266** — Backend. 보드 dashboard 요구사항 ask_user_questions (a37630ff) 응답 대기. 정상.\n\n#### Cat D — **STALL (CEO 미응답, 즉시 처리 필요)**\n| ID | 상태 | 마지막 활동 | Stall 시간 | 필요 액션 |\n|----|------|------------|----------|-----------|\n| **PACAA-265** vendor 비교 spec | in_review (CEO) | Frontend spec 제출 07:40 | **~1h22m** | spec 리뷰 + accept/reject |\n| **PACAA-264** 메인 사이트 | in_review | Frontend 감사 + PR 07:49 | **~1h13m** | 감사 결과 검토 + PR 머지/피드백 |\n| **PACAA-267** keywords PoC | in_review | Frontend 배포 + 2 질문 08:02 | **~1h** | 2 질문 (Draft banner / 다음 우선순위) 답변 |\n\n**전 heartbeat 에서 보드가 지적한 gap:** 로컬 서버 이슈로 wake → 그 이슈만 다루고 sleep. 위 3건 in_review 이 그 사이 누적. 정확함.\n\n---\n\n### 2. 하트비트 시스템 자가진단\n\n#### Gap 1. \"이번 wake = 이번 이슈만\" 규칙이 read 까지 차단\n현재: wake 트리거된 이슈만 GET. 다른 in_progress / in_review 누적되어도 모름.\n→ in_review 로 reassign 된 이슈는 별도 wake 안 떠서 stall.\n\n#### Gap 2. Self-wake 노이즈 (curl 게시 → user=local-board)\n내가 코멘트 단 직후 echo wake. 무의미한 사이클 소모. 현재는 silent exit 으로 대응하지만 wake 자체는 발생 = 비용.\n\n#### Gap 3. in_review reassign 시 wake 트리거 부족\nFrontend Eng 가 spec 완성 + assignee=CEO 로 PATCH 했지만 CEO 가 즉시 wake 안 됨. PR 발생 시 wake 가 와야 함.\n\n#### Gap 4. CEO ownership 백로그 가시성 zero\n매 heartbeat 시작 시 \"내가 owner 인 미처리 이슈\" 한눈 view 없음. → stall 누적 회피 못 함.\n\n---\n\n### 3. 개선안 (보드 사인오프 대기)\n\n#### 개선 A. **Heartbeat 첫 단계 = CEO ownership 라이트 스캔 (read-only)**\n매 wake 도입부에:\n```\nGET /issues?assigneeAgentId=CEO&status=in_progress,in_review\n```\n→ 미응답 in_review 발견 시 \"본 wake 이슈\" 처리 후 즉시 다음 heartbeat 에서 stall 자동 처리. read 만 하므로 \"이번 wake = 이번 이슈\" 액션 룰 위반 안 함.\n\n#### 개선 B. **Self-wake 자동 인식 + 1-라인 silent exit**\nlatest comment.id 가 직전 heartbeat 산출물이고 user=local-board 인데 createdByAgentId=null 이면 self-wake 로 분류. 재처리 없음. (이미 적용 중, 메모리 baking 만 강화)\n\n#### 개선 C. **in_review 자동 priority bump**\n내가 owner 인 in_review 가 30분 이상 stall 시, 다음 heartbeat 에서 본 wake 이슈보다 우선 처리. (보드 대응 후 즉시 backlog clear.)\n\n#### 개선 D. **Stall threshold 축소: 1h → 30min**\n현재 \"1h+ 무응답\" 을 stall 로 봤음 (memory). 보드 기준은 더 엄격해 보임. 30 min 으로 낮춤.\n\n---\n\n### 4. 보드 신호 대기\n위 4개 개선안 (A/B/C/D) 중 어떤 걸 적용할지 보드가 신호 주면 즉시 적용 + 메모리 baking. accept = 전체 4개, decline = 의견 받아 수정. 부분 accept 도 가능 (\"A,C 만\" 같은 식).\n\n**stall 3건 (PACAA-264/265/267) 처리는 신호 받기 전까지 대기** (실행 x 지시 준수). 단 보드가 \"개선안 채택 + 즉시 stall 3건 처리\" 한 번에 시키면 다음 heartbeat 에 모두 처리."
