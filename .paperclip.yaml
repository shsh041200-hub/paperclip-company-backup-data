        body: "## Vision 기반 Goal 트리 제안 (v1) — 보드 사인오프 요청\n\n전체 제안은 plan 문서로 제출했어. 길어서(10 섹션) 댓글 본문에는 의사결정\n포인트만 추리고, 디테일은 문서 링크로 연결할게.\n\n→ [PACAA-25 Goal 트리 v1 plan](/PACAA/issues/PACAA-25#document-plan)\n\n### 핵심 요약\n\n- **구조:** Vision → Top Goal 1 → Sub-Goal 4 → Project Goal 17.\n- **Top Goal (6개월):** 한국어 패키징 핵심 50 키워드의 종합 SEO 점유율\n  **40%**.\n- **Sub-Goal (3개월씩, SG-3은 6주):**\n  1. 8개 우선 카테고리 한국 업체 등록률 90%\n  2. 검색 후 행동한 일 활성 사용자(Qualified DAU) 500\n  3. Vision 4개 신호 측정 인프라 가동 ← *모든 다른 SG의 선행*\n  4. Vendor self-action UX (claim / edit / paid-intent / self-reg)\n- **임계 경로:** SG-3가 가장 먼저 킥오프되고 6주 안에 안 끝나면 전체\n  지연. CTO 단독 가능 → 다른 채용 대기 불필요.\n\n### DAU vs SEO 위계 — **옵션 A (SEO=Top, DAU=Sub) 추천**\n\n이 단계의 binding constraint는 \"유저가 우릴 찾는가\"이지 \"다시 오는가\"가\n아냐. SEO가 actionable한 입력이고 DAU는 그 결과. DAU는 Sub-Goal로\nfirst-class 유지(SG-2)해서 vision-alignment 보존. 자세한 근거는 plan\n§1.\n\n### 보드 결정 필요 8개 항목 (요약)\n\n| # | 항목 | 추천 | 대안 |\n|---|---|---|---|\n| 1 | DAU/SEO 위계 | 옵션 A | 옵션 B |\n| 2 | TG SEO 점유율 목표 | 40% | 30% / 60% |\n| 3 | 카테고리 수 | 8 | 4 / 12 |\n| 4 | SG-4 paid-intent 임계 | 5건/3개월 | 1 / 20 |\n| 5 | SG-4 voluntary edit 임계 | 20건/3개월 | 5 / 50 |\n| 6 | SG-4 self-reg 임계 | 30건/3개월 | 10 / 100 |\n| 7 | Kill criterion 강도 | 중간 | 빡빡 / 느슨 |\n| 8 | 분석 도구 | Plausible | GA4 / Vercel |\n\n각 항목 근거는 plan §8.\n\n### Owner 공석 (사인오프 후 채용 게이트)\n\n| 직무 | 담당 | 즉시 채용 |\n|---|---|---|\n| CMO | TG, SG-2 | 사인오프 직후 |\n| Backend Eng / Data | SG-1 | 사인오프 직후 |\n| Frontend Eng | SG-4 | 4주차 (SG-4 킥오프 시점) |\n| Designer | SG-4 IC | 조건부 (P4.1 시점 재판단) |\n\n이 Goal 트리가 PACAA-7 후속의 \"hire-on-demand\" demand를 명시화함 —\n승인 시 위 직무에 대해 별도 채용 티켓 4개를 child issue로 생성 (각각\n별도 보드 승인 게이트).\n\n### 측정 인프라 (신규 구축 9개)\n\nPlausible · Ahrefs · Naver Search Advisor · GSC · vendor 분모\nestimator · 신호 1~4 카운터 / 폼 / 대시보드 · 주간 자동 리포트.\n유료 도구는 Plausible(~$9/mo) + Ahrefs(~$129/mo). budget 승인 필요\n항목.\n\n### 정직한 보고 — 측정 한계 (plan §9)\n\nVision 신호 2(유료 의향)는 실제 paid product launch 전에는 intent만\n측정되므로 conversion 검증 불가. 신호 4(default search)는 in-product만\n으로는 부족, external survey 없이는 근사 지표만 가능. 한계를 인정한\n상태에서 측정 안 하는 것보다 측정하는 게 낫다는 입장.\n\n### 진행 절차\n\n이 댓글 + plan v1을 검토 후:\n- 사인오프 → 별도 흐름으로 Goal 일괄 등록 + 채용 티켓 생성\n- 수정 요청 → plan v2 revision 배포\n\n이 댓글에 이어 `request_confirmation` interaction을 plan v1 revision에\n바인딩해서 올릴게. 수정 요청은 reject + 코멘트로, 사인오프는 accept으로\n처리해 주면 돼.\n"
