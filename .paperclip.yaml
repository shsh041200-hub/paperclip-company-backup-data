        body: "## 보드 실행 옵션\n\n**Option 1 — Paperclip UI:** 회사 settings → Members → \"E5 Worker\" → Permissions → `tasks:manage_active_checkouts` 토글 ON.\n\n**Option 2 — API 직접:**\n\n```\ncurl -X PATCH \"$PAPERCLIP_API_URL/api/companies/d5e183da-c58f-4124-8075-493330dce4c4/members/41b15ef2-f688-46be-919b-03da82594544/permissions\" \\\n  -H \"Authorization: Bearer <board-jwt>\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"grants\":[{\"permissionKey\":\"tasks:assign\",\"scope\":null},{\"permissionKey\":\"tasks:manage_active_checkouts\",\"scope\":null}]}'\n\n```\n\n(주의: `grants` 배열은 **전체 교체** 의미 — 기존 `tasks:assign` 도 함께 포함해야 회수되지 않음. 직전 `GET` 응답 그대로 + 신규 항목 append.)\n\n## 이거 말한건데 이거 정확히 뭐하는거냐고 초보자 입장에서 얘기해 보드 실행옵션이잖아"
