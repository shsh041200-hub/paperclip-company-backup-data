        body: "## v1.3 final — REPLACE 7 적용, 50/50 도달\n\n[PACAA-93](/PACAA/issues/PACAA-93) §6.3 hand-off ack. R-pool 잔여 (R01/R02/R05/R06/R09/R10) 모두 vol<50 → exhausted. 21 xlsx 풀 (3,304 keyword) 재마이닝으로 7 대체 발굴.\n\n### v1.3 substitutes (S01-S07)\n\n| slot | keyword | category | vol | replaces | density |\n|---|---|---|---|---|---|\n| S01 | 비닐봉투인쇄제작 | 인쇄·후가공 | 150 | M10/M13 | 64 vendors |\n| S02 | 쇼핑백인쇄제작 | 인쇄·후가공 | 145 | M10/M13 | 62 |\n| S03 | 박스제작 | 골판지·종이박스 | 5780 | P04 | 170 |\n| S04 | 파우치제작 | 연포장재 | 2850 | M06 | 5 |\n| S05 | 포장용기도매 | 플라스틱 용기·병 | 230 | M16 | 78 |\n| S06 | 쇼핑백제작 | 포장 부자재 | 5240 | M21 | 0 (fallback) |\n| S07 | 공병판매 | 유리·금속 용기 | 200 | G03 | 10 |\n\n### 산출물\n\n- `plans/pacaa86_v1_3_final.csv` — 50 keyword (43 KEEP + 7 substitutes)\n- `plans/pacaa86_replace_mine.py` + `pacaa86_replace_candidates.csv` (259 후보)\n- `plans/keyword_density_pacaa86_v1_3.json` — 50/50, **6 fallback** (vendor < 3), 평균 57.7\n- `plans/seo_pages_data_v1_3.json` — 50 페이지 props (CTO API hand-off 형태), 평균 9.5 vendor 노출\n- `plans/sitemap_keywords.xml` — 50 url, noindex excluded 0\n\n### Fallback 6 (guide+CTA 템플릿 적용 대상)\n\n| slot | keyword | category | n |\n|---|---|---|---|\n| R08 | 종이 쇼핑백 제작 | 부자재 | 2 |\n| M15 | 공병 가격 | plastic ❗카테고리 mislabel (실제 glass) | 0 |\n| M18 | 마스킹테이프 제작 | 부자재 | 1 |\n| M19 | 테이프 제작 | 부자재 | 1 |\n| M20 | 테이프 주문제작 | 부자재 | 1 |\n| S06 | 쇼핑백제작 | 부자재 | 0 |\n\n5/6 fallback 이 packaging_accessories — 카테고리 vendor 등록 부족 실신호. PACAA-79 garbage 정리 + 추가 수집 sprint 병행 검토 가능. M15 공병 가격 카테고리 재분류 권고 (glass_metal_container 가 자연).\n\n### 알려진 trade-off\n\n- S02 쇼핑백인쇄제작 (printing) ↔ S06 쇼핑백제작 (accessories) — head-term 중복 (\"쇼핑백\"). 페이지 차별화는 S02=인쇄 스펙 / S06=일반 제작 으로 가이드 톤 분리. 9주차 SERP 공조 시 cannibalization 모니터링.\n- S03 박스제작 (vol 5780) — 매우 generic, K01 골판지박스 제작 (vol 220) 과 부분 겹침. 그러나 head-term 차이 (\"박스\" vs \"골판지박스\") 로 SERP 분리 예상.\n- S07 공병판매 (200) — vol borderline. v1.3 기준 통과.\n\n### 카테고리 분포 (v1.3)\n\n골판지 9 / 라벨 8 / 연포장재 7 / 인쇄 6 / 플라스틱 6 / 부자재 6 / 유리·금속 4 / 기계 4 = 50 ✓.\n\n### Status\n\nPACAA-93 done 처리 후 → PACAA-86 unblock. PACAA-94 빌드 게이트 = PACAA-87 보드 사인오프만 남음. 본 이슈는 PACAA-87 알림 대기.\n\nCEO 확인 후 v1.3 사인오프 부탁. accept 시 PACAA-94 enter (단, PACAA-87 사인오프 후) → generate_guides.py 실 LLM 호출 → CEO 검수 큐 → 빌드."
