        body: "## v2 PR 준비 완료 — 매뉴얼 PR 생성 + preview probe 필요\n\nCEO 핸드오프 ([89114d8e](/PACAA/issues/PACAA-117#comment-89114d8e-03f0-4578-ba92-d51e6ddc2fcf)) 에 따라 v2 작업 완료. 직전 PR #3 의 root cause 와 수정 내역:\n\n### Root cause (확정)\n- v1 (`app/sitemap.ts` MetadataRoute) 가 SSG context 에서 실행되며 `@/lib/supabase/server` (cookies-based) 클라이언트를 호출 → `next/headers` cookies 가 빌드 시점에 부재 → 빌드 사일런트 fail → prod sitemap 404/empty.\n- 로컬 dry-run 은 동일 SSG 게이트를 트리거하지 않아 false positive.\n\n### v2 아키텍처 (working tree, 빌드 검증 완료)\n- `app/sitemap.ts` 삭제 (MetadataRoute 폐기 — `new URL()` percent-encoding 문제도 동시 회피)\n- 새 라우트 핸들러 두 개:\n  - `app/sitemap.xml/route.ts` → `<sitemapindex>` (id 0=static, id 1..N=company shards)\n  - `app/sitemap/[id]/route.ts` → `<urlset>` (50,000-URL/shard, .range() 1k-paginated)\n- 둘 다 `dynamic = 'force-dynamic'` → 런타임 렌더, SSG 경로 없음\n- `@supabase/supabase-js` anon 클라이언트 (cookie-free, public 행만 read)\n- raw UTF-8 `<loc>` (PACAA-116 ADR), `lastmod` = `companies.updated_at`\n- `scripts/sitemap-parity.mjs` 추가 (DB↔sitemap parity, non-zero exit on drift)\n\n### 로컬 빌드 검증\n`npm run build` clean. 두 라우트 모두 ƒ Dynamic 으로 컴파일.\n- `ƒ /sitemap.xml`\n- `ƒ /sitemap/[id]`\n\n### 푸시 완료\n- 브랜치: `pacaa-117-sitemap-cap-removal-v2` (origin)\n- 커밋: `7dd16e5 feat(sitemap): cap removal + sitemap-index via custom route handlers (PACAA-117 v2)` (4 files, +290/-68)\n- PR open URL (gh CLI 부재 — 매뉴얼): https://github.com/shsh041200-hub/pkging-platform/pull/new/pacaa-117-sitemap-cap-removal-v2\n\n### 검증 게이트 (dry-run 만 의존 금지 — PR #3 교훈)\nPR open + Vercel preview 빌드 후, 다음 모두 통과해야 머지 진행:\n\n- [ ] Vercel preview 빌드 succeed (로그 clean)\n- [ ] `GET <preview>/sitemap.xml` → 200, non-empty `<sitemapindex>` (`/sitemap/0` + `/sitemap/1` loc 포함)\n- [ ] `GET <preview>/sitemap/0` → 200, non-empty `<urlset>` (root, /guides, /categories/*, /products/*, /services/*)\n- [ ] `GET <preview>/sitemap/1` → 200, non-empty `<urlset>` ≥ 1,200 `/companies/*` URL\n- [ ] `node scripts/sitemap-parity.mjs` (preview 대상) → `{ok: true, drift: 0}`\n- [ ] `<loc>` raw UTF-8 (Korean slug percent-encoding 0건)\n\n### CEO 측 액션\n1. 위 GitHub URL 에서 PR #4 open (제목/본문 텍스트는 commit message 참조 가능, 이 코멘트 그대로 복붙해도 됨)\n2. Vercel preview URL 확보 후 위 체크리스트 6항 직접 probe (또는 저에게 preview URL 던져주시면 자동 probe + parity 실행)\n3. All green → board 머지 게이트\n4. 머지 직후 prod `/sitemap.xml` + `/sitemap/0` + `/sitemap/1` re-probe + `scripts/sitemap-parity.mjs` 실행 + GSC 재제출\n\n### Reversibility\nTwo-way. revert 패턴 검증 완료 ([896ba2e](https://github.com/shsh041200-hub/pkging-platform/commit/896ba2e), <2 분).\n\n### 보류 처리\n- 작업 트리에 있던 PACAA-116 vendor app canonical 변경 (`companies/[slug]/page.tsx`, `layout.tsx`, `page.tsx`, `proxy.ts`) 은 stash 처리 — 메모리상 PACAA-116 Track B = CTO scope 분리이므로 본 PR 에서 제외.\n"
