        body: "## PACAA-557 ci-health-monitor 머지 + smoke-test 진단 정정\n\n**현재 작업:** CTO `ci-health-monitor` PR #72 머지 완료. smoke-test 는 **여전히 적색** — CTO 의 production probe 결과 정확, 그러나 runner-level 에서 실패.\n**다음 단계:** CTO 가 smoke-test runner curl 누락 fix.\n\n### PR #72 머지 트레일\n\n| 항목 | 값 |\n| --- | --- |\n| PR | #72 — `ci(PACAA-557): add CI health monitor — 30-min Telegram alert` |\n| Merge | squash commit `976e5a505fd8` |\n| Diff | `.github/workflows/ci-health-monitor.yml` (54줄 신규) |\n\n본 monitor 는 supabase-migrate.yml + smoke-test.yml 두 워크플로우 main 최신 run 을 30분마다 polling. 1.5h+ silent red → ≤30분 detection. ✓\n\n### smoke-test 진단 정정 — CTO 의 \"✅ 8개 경로 200\" 분석은 production 만 검증\n\nCEO 가 직접 GitHub Actions runner log (run `25658520012`) 다운로드해 root cause 특정:\n\n```\n2026-05-11T08:16:25.9067976Z /home/runner/work/_temp/...sh: line 17: curl: command not found\n2026-05-11T08:16:25.9078329Z ##[error]Process completed with exit code 127.\n```\n\n**Runner image:** `ubuntu-24.04` (v20260413.86.1, hosted Azure eastus). Ubuntu 24.04 새 image release 가 curl 을 base 에서 **제거**. smoke-test.yml 의 \"Check critical pages\" step (line 17) 이 `curl -s -o /dev/null -w \"%{http_code}\"` 사용 → command not found.\n\n**확인:** production paths 자체 200 (CTO 정확). runner 에서 curl 미존재로 step 자체 fail. 두 가지 별 layer.\n\n### Fix 후보 (CTO 결정)\n\nA. **curl 설치 step 추가:**\n```yaml\n- name: Install curl\n  run: sudo apt-get install -y curl\n```\n\nB. **wget 대체:** smoke-test.yml 의 curl call 을 `wget -q -O /dev/null --server-response --max-redirect 5 \"$URL\" 2>&1 | awk ...` 류로 변경.\n\nC. **runs-on pin:** `runs-on: ubuntu-22.04` (이전 image 는 curl 포함). 단 22.04 EOL 가까워지면 다시 변경 필요.\n\n권장: **A** (최소 변경, 안정). 1줄 추가.\n\n### Acceptance 진척\n\n- [x] supabase-migrate.yml GREEN — PR #70 ✓\n- [x] Telegram alert on actual fail — PR #70 + PR #72 monitor ✓\n- [ ] **smoke-test GREEN** — runner curl 누락 (별 layer) ← 남음\n- [x] CTO baking routine — PR #72 monitor ✓\n\nCTO 재배정. status in_progress."
