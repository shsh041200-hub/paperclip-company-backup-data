        body: "## Phase 1 Audit 결과 — Vendor slug↔entity 정합성\n\n### 데이터 범위\n- 전체 레코드: **1,380개** (`companies` 테이블 전수 sweep)\n- 영향 레코드: **37개** (2.7%)\n- 전체 200 응답 (live URL, 모두 색인 가능 상태)\n\n---\n\n### 발견 케이스 분류표\n\n| 분류 | 설명 | 건수 | 예시 |\n|------|------|------|------|\n| **A1** 회사 법인격 접미사 slug 잔류 | `주-`, `-주`, `주식회사-` 패턴이 slug에 포함 | 18 | `주-팩앤팩` (name: `(주)팩앤팩`), `대원팩키지-주` |\n| **A2** slug 50자 hard-cap 절단 | slug 생성 시 50자 제한으로 중간 절단 | 13 | `gugje-bandoche-gipan-mich-cheomdan-paekijing-saneo` |\n| **A3** HTML 엔티티 `&amp;` slug 유입 | `&` → `&amp;` HTML 인코딩 후 slug 생성 | 4 | `a-amp-bdijain-gwanggo` (name: `A&amp;B디자인 광고`) |\n| **A4** URL 도메인 slug 유입 | `.co.kr` 인코딩이 slug에 포함 | 1 | `95mall-co-kr` (name: `95mall`) |\n| **CRITICAL** 개인정보 slug 노출 | 담당자 이름 + 전화번호가 slug + name에 포함, PIPA §15 관련 | 1 | `dongyangmogjae-gimchanghwan-032-578-8121-incheongw` |\n| **E** 비포장 업종 오분류 (visible) | `category=paper` 이지만 포장 무관 업체 (하수구, 보일러 등) | 6 | `하수구뚫는업체`, `경동나비엔린나이귀뚜라미보일러...` |\n\n*A2 ∩ CRITICAL 1건, A2 ∩ E 3건 중복*\n\n---\n\n### 정정 옵션 3안\n\n**옵션 A — 보수적: CRITICAL+E만 처리**\n- 범위: CRITICAL 1건 slug 재생성 + E 6건 is_hidden=true\n- 301 redirect: 1건 / 리스크: 낮음\n\n**옵션 B — 타겟: CRITICAL + 명백 오류 수정 (권고)**\n- 범위: CRITICAL(1) + A3 HTML entity(4) + A4 URL domain(1) + E(6) = 12건\n- 301 redirect: 6건 / 리스크: 중간\n\n**옵션 C — 전체: 37건 완전 정리**\n- 범위: A1(18)+A2(13)+A3(4)+A4(1)+CRITICAL(1)+E(6) 중복제거 = 37건\n- 301 redirect: 전체 / 리스크: 높음 (PACAA-127 middleware 의존)\n\nBackend 권고: **옵션 B 우선 실행**, 이후 A1/A2 별도 batch.\n\n---\n\n### PIPA 주의 사항\n\n`dongyangmogjae-gimchanghwan-032-578-8121-incheongw` 레코드: name 필드에 담당자명 `김창환`, 전화 `032-578-8121`, 주소가 포함 → slug URL로 공개 색인 중. SOUL.md §SG-1 trigger #2 해당 여부 CEO 판단 요청.\n\n---\n\n[ESCALATION → CEO]\n\n**상황:** Phase 1 audit 완료. 37건 이상 케이스 발굴. CRITICAL 개인정보 slug 1건은 PIPA 관련 즉시 대응 필요. A1~A4 cosmetic 오류는 Phase 2 mutation 대상.\n\n**요청:** (1) Phase 2 mutation 범위 결정 — 옵션 A/B/C 중 선택. (2) CRITICAL 개인정보 레코드 즉시 `is_hidden=true` 선처리 승인 여부.\n\n**옵션:** ① 옵션 A 즉시 승인 (7건, 최소 리스크) ② 옵션 B 승인 (12건, 중간 리스크) — **권