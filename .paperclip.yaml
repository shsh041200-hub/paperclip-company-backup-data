        body: "## 김선혁님, 답장 라우팅 동작 확인 ✅ — \"나중에\" 신호 받았어요\n\n### 한 줄 결론\n\n**텔레그램 답장 → 이슈 코멘트 라우팅이 end-to-end 동작합니다. 답장 내용 \"나중ㅇ에에\" 는 자유 입력 kind 의 fallback 신호 (\"잘 모르겠음 / 나중에\") 로 해석. 진행 옵션 두 가지 드려요.**\n\n### 무엇이 동작했나\n\n1. msg_id=222 또는 223 견본에 김선혁님이 답장 → 텔레그램 봇이 받음.\n2. `bot-server.py` 의 `handle_reply` 가 `.notify-state.json` 의 message_index 조회 → PACAA-125 매핑 발견.\n3. `POST /api/issues/8397d253-.../comments` 로 \"[보드 답장 — Telegram Reply] (sample=freeform-v2)\n\n나중ㅇ에에\" 코멘트 생성.\n4. 봇이 \"✅ 코멘트 추가됨: PACAA-125\" ack.\n5. 코멘트가 issue_reopened_via_comment wake 트리거 → CEO 가 응답.\n\n자유 입력 kind contract 가 cron 발사 → 보드 답장 → 이슈 코멘트 → CEO wake 까지 완전히 닫혔어요.\n\n### \"나중에\" 신호 해석\n\n견본 본문에 적었던 fallback: \"답하기 어려우면 '잘 모르겠음' 또는 '나중에' 답장 주세요 — 다른 대안을 제안드립니다.\" 자유 입력 kind 표준대로 두 가지 해석 가능합니다.\n\n**해석 A — v2 표준 자체에 대한 \"나중에\"** (사인오프 보류)\n- 형식·라우팅 동작은 OK 지만 cron `_build_for_interaction` v2 전환은 일단 미루고 싶음.\n- → 표준 문서 (`runs/board_report_format_v2.md`) + 코드 패치는 그대로 두고, cron 전환만 deferred row 로 기록.\n- 권장 re-review 날짜: 2026-05-14 (2주 후, 새 인프라 도입 기본).\n\n**해석 B — 견본의 fallback 테스트일 뿐** (사인오프는 별도)\n- VERCEL_TOKEN 견본의 \"나중에\" 경로를 테스트한 것.\n- 실제 사인오프는 별도 응답 필요.\n- → 다음 답장이나 코멘트로 A/B/C 판단 부탁.\n\n어느 쪽인지 답장 또는 코멘트 한 줄 부탁드려요.\n\n### 사인오프 옵션 (재차)\n\nA) **승인 — 지금 cron v2 전환** : 다음 결재/액션/선택/자유 알림부터 v2 형식 + 답장 라우팅 적용.\nB) **일부 수정 후 재발사** : 어느 견본·어느 항목?\nC) **Cron 전환 나중에 (해석 A)** : 표준 문서·코드 패치 유지, 전환만 deferred. 2026-05-14 재검토.\nD) **폐기** : v1 유지.\n\n### 자유 입력 fallback contract 자가검수\n\n자유 입력 kind 의 fallback 처리 방식이 표준대로 동작했는지 메모:\n- 본문에 \"답하기 어려우면 '잘 모르겠음' / '나중에'\" 명시 ✅\n- 보드 답장 후 1 wake 안에 CEO 가 \"다른 대안 제안\" 또는 의도 확인 ✅ (이 코멘트가 그것)\n- deferred row 후보 자동 인식 ✅ (해석 A 옵션)\n- 보드 의도 확정 전 자동 실행 금지 ✅ (cron 전환 보류)"
