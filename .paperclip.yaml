        body: "## boxcunserting.com — 만료 방치 (보드 결정 기록)\n2027-03-07 자동 만료. 별도 액션 없음.\n\n---\n\n## packlinx-api.com 용도\n**Paperclip 컨트롤 플레인 API host.** 모든 agent (CEO/FE/BE/CMO/CTO/Legal 등) 가 task/comment/interaction/checkout 통신할 때 호출하는 endpoint. 사이트 본체(packlinx.com) 와 도메인 분리한 이유 추정:\n- CORS/쿠키/CSP 격리 (API 토큰이 메인 사이트 쿠키와 섞이지 않음)\n- 보안 사고 시 도메인 단위로 차단 가능\n- 운영 편의 (DNS/SSL 관리 분리)\n\n주: 이건 **end-user 가 절대 안 보는 내부 인프라 endpoint**. SEO/브랜드 가치 0.\n\n---\n\n## .com 굳이 필요? **아니요**\n\n### TLD 가격 비교 (Vercel API 라이브 조회)\n| TLD | 갱신가/yr | 비고 |\n|-----|----------|------|\n| .com | **$11.25** | 현재 사용 (실제로는 CF 도매 ~$9.77) |\n| .xyz | $13 | .com 보다 비쌈 (예상 외) |\n| .dev | $13 | 비쌈 |\n| .app | $15 | 비쌈 |\n| .io | $46 | 4배 비쌈 |\n\n**결론: 다른 TLD 로 바꿔도 절약 없음.** .com 이 오히려 가장 저렴한 그룹.\n\n### 진짜 절약 방법: 서브도메인 활용 (무료)\n새 도메인 사지 말고 **`api.packlinx.com`** 또는 **`paperclip-api.packlinx.com`** 으로 마이그레이션:\n- 추가 도메인 0원\n- packlinx.com DNS 에 CNAME/A 레코드만 추가\n- TLS 는 Vercel/CF 자동 발급\n- **영구 ~$10/yr 절감**\n\n### 마이그레이션 비용 (작업)\n- $PAPERCLIP_API_URL env var 전수 교체 (agent .env, paperclipai 서버 config, plugin 등)\n- packlinx.com 에 DNS 레코드 1줄 추가 (CF 또는 Vercel)\n- TLS 인증서 자동 발급 대기 (~5분)\n- Paperclip API 서버 재기동 (allowed hostname 등록 + restart)\n- 모든 agent 재기동\n- 예상 다운타임: 5~15분 (DNS TTL 의존)\n- 예상 작업 시간: **CEO 1~2 wake (1시간 내외)**\n\n### 권장: \"즉시 마이그레이션\" 보다 \"만료 임박 시 마이그레이션\"\n- packlinx-api.com 만료: 2027-05-02 (약 12개월 남음)\n- 2027-04 즈음 마이그레이션 후 만료 방치 = 자연 cutover, $0 손실\n- 지금 당장 하면 절감액 $10 vs 작업 1h. ROI 낮음.\n\n### 보드님 액션 옵션\n1. **A. 만료 임박 시 (2027-04) 마이그레이션 + 만료 방치** — 추천. routine 등록해서 CEO 가 2027-04-01 알람.\n2. **B. 지금 바로 마이그레이션** — $10 절감은 작지만 도메인 정리 깔끔.\n3. **C. 그냥 .com 유지 + 갱신** — $9.77/yr 큰돈 아님. auto-renew ON 만 켜면 끝.\n\n어느 옵션 선호하시는지 알려주시면 그대로 진행하겠습니다."
