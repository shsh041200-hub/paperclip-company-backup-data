        body: "네 — Naver 키 보유 확인. 이번 댓글은 **Google 쪽 2개 (API Key + CSE ID)** 를 처음부터 끝까지 클릭 단위로 안내합니다. SERP 트래커는 두 값이 모두 있어야 동작해서 같이 발급하시는 게 효율적이에요.\n\n## 미리 알아둘 것\n\n- 두 개를 발급해야 합니다:\n  - **GOOGLE_API_KEY** — Google Cloud Console 에서 발급 (구글 검색 API 호출권)\n  - **GOOGLE_CSE_ID** (= `cx` 값) — Programmable Search Engine 에서 발급 (검색 엔진 ID)\n- 두 사이트가 **다릅니다**. 헷갈리지 마세요.\n  - Cloud Console: `console.cloud.google.com`\n  - Programmable Search Engine: `programmablesearchengine.google.com`\n- 같은 구글 계정으로 둘 다 로그인하시면 됩니다.\n- **무료 한도**: 일 100 쿼리 무료. 우리는 주 1회 50 키워드 × 2 페이지 ≈ 100 쿼리 = 무료 한도 안. 결제 카드 등록은 **필요 없습니다**.\n\n---\n\n## STEP 1 — Google API Key 발급 (Cloud Console)\n\n### 1-A. 프로젝트 만들기\n\n1. 브라우저에서 `https://console.cloud.google.com/` 접속\n2. 구글 계정으로 로그인 (Packlinx 운영용 계정 권장)\n3. 처음이면 약관 동의 화면 → 국가=Korea, 약관 체크 → **동의 및 계속**\n4. 화면 **상단 가운데** 에 프로젝트 선택 드롭다운이 있어요 (글자가 \"Select a project\" 또는 기존 프로젝트명).\n5. 드롭다운 클릭 → 우측 상단 **NEW PROJECT** (한국어: **새 프로젝트**) 클릭\n6. Project name = `packlinx-serp` 입력 → **CREATE** (만들기)\n7. 30초~1분 기다리면 우측 상단 종 모양 알림에 \"Create Project: ...succeeded\" 뜸 → **SELECT PROJECT** 클릭해서 그 프로젝트로 들어가기\n   - 또는 다시 상단 드롭다운 → `packlinx-serp` 선택\n\n### 1-B. Custom Search API 활성화\n\n1. 좌측 햄버거 메뉴 (≡) 클릭 → **APIs & Services** → **Library** (한국어: **API 및 서비스** → **라이브러리**)\n   - 또는 검색창에 `Custom Search API` 입력해도 OK\n2. 검색창에 `Custom Search API` 입력 → 결과 카드 클릭\n3. 파란 **ENABLE** (한국어: **사용**) 버튼 클릭\n4. \"API enabled\" 화면이 뜨면 성공 (5~10초 걸림)\n\n### 1-C. API Key 만들기\n\n1. 좌측 메뉴 → **APIs & Services** → **Credentials** (한국어: **사용자 인증 정보**)\n2. 상단 **+ CREATE CREDENTIALS** → **API key** 선택\n3. 팝업에 키가 뜸 — `AIzaSy...` 로 시작하는 약 39자 문자열\n4. **이 값이 GOOGLE_API_KEY 입니다.** 메모장에 복사해두세요.\n5. (선택, 권장) 팝업 하단 **EDIT API KEY** → \"API restrictions\" 섹션 → **Restrict key** → 드롭다운에서 `Custom Search API` 만 체크 → **SAVE**\n   - 키가 노출되어도 다른 API 못 쓰게 막는 안전장치\n\n---\n\n## STEP 2 — Google CSE ID 발급 (Programmable Search)\n\n### 2-A. 검색 엔진 만들기\n\n1. 새 탭에서 `https://programmablesearchengine.google.com/` 접속\n2. **Get started** 또는 **Add** 클릭 (이미 다른 엔진이 있다면 좌측 상단 **Add** 또는 **새 검색엔진**)\n3. 검색 엔진 만들기 폼:\n   - **Name (이름)**: `Packlinx SERP Tracker`\n   - **What to search? (검색 대상)**: **Search the entire web** (전체 웹 검색) 선택 — 이 옵션이 핵심입니다. 특정 사이트 한정 모드 X.\n     - 화면에 따라 \"Search the entire web\" 토글이 따로 보일 수 있고, 또는 \"Sites to search\" 칸을 비워두고 \"Search the entire web\" 체크하라고 나올 수 있어요. 어느 쪽이든 **전체 웹** 으로 만드세요.\n   - **Region (지역)**: Korea\n   - 로봇 인증 체크 → **CREATE** (만들기)\n4. \"Your search engine has been created\" 화면이 뜸\n\n### 2-B. CSE ID (cx) 복사\n\n1. 같은 화면에서 **Customize** 또는 **Edit search engine** 버튼 클릭\n2. 좌측 메뉴 또는 상단 탭 **Overview** (개요) → **Basic** 섹션에서 **Search engine ID** 항목을 찾으세요\n   - 또는 좌측 **Setup** → **Basics** 탭\n3. 값이 표시됨 — 보통 `017576...` 또는 `a1b2c3d4e5f6g7h8i:abcdefg` 같은 형태 (영숫자 혼합 ~30자)\n4. **이 값이 GOOGLE_CSE_ID 입니다.** 메모장에 복사해두세요.\n\n---\n\n## STEP 3 — 발급된 4개 값 저보드에게 전달\n\n다음 두 값을 이 이슈 댓글에 붙여주세요 (Naver 두 개는 이미 갖고 계시니 함께):\n\n```\nNAVER_CLIENT_ID=<이미 보유>\nNAVER_CLIENT_SECRET=<이미 보유>\nGOOGLE_API_KEY=AIzaSy...\nGOOGLE_CSE_ID=017576...\n```\n\n**보안 주의**: 이 4개 값은 비밀입니다. Telegram/공개 채널에는 올리지 마시고, **이 Paperclip 댓글**(비공개) 에만 붙여주세요. 제가 받으면 즉시 adapterConfig 주입하고 댓글에서 마스킹 처리합니다.\n\n---\n\n## STEP 4 — 검증 (선택, 5분 안에 가능)\n\n발급이 잘 됐는지 보드가 직접 확인하시려면 브라우저 주소창에 아래 URL 을 본인 키 채워서 한 번 호출해보세요 (값 노출되니 시크릿창 권장):\n\n```\nhttps://www.googleapis.com/customsearch/v1?key=<GOOGLE_API_KEY>&cx=<GOOGLE_CSE_ID>&q=packlinx\n```\n\n- JSON 응답에 `items` 배열이 보이면 성공\n- `\"error\": { \"code\": 403 }` 이면 → STEP 1-B (API 활성화) 안 됐거나 키 제한이 잘못됨\n- `\"error\": { \"code\": 400, \"message\": \"Invalid Value\" }` 이면 → CSE ID (cx) 가 잘못 복사됨\n\n---\n\n## 자주 막히는 지점 FAQ\n\n- **Q. \"이 프로젝트는 결제가 필요합니다\" 라고 떠요** → Custom Search API 는 일 100 쿼리 무료라 결제 등록 불필요. 다른 API (Maps, Translate 등) 활성화하면 결제 필요. **Custom Search API 만** 활성화 하셨는지 확인.\n- **Q. CSE ID 가 어디 있는지 못 찾겠어요** → `programmablesearchengine.google.com/controlpanel/all` 에 접속하면 만든 엔진 목록 + 각 엔진의 ID 가 한 화면에 보입니다.\n- **Q. \"Search the entire web\" 옵션이 안 보여요** → 처음 만들 때 \"Sites to search\" 칸에 임의로 `google.com` 같은 거 넣고 만든 뒤, 만든 후 **Setup → Basics** 들어가면 \"Search the entire web\" 토글이 나타납니다. 켜고 저장.\n\n---\n\n## 다음 단계 (보드 → CEO)\n\n위 4개 값 댓글로 주시면 제가:\n1. Backend Engineer 의 adapterConfig 에 4개 환경변수 주입\n2. PACAA-237 unblock + Backend 재할당\n3. 다음 월요일(2026-05-11 09:00 KST) 루틴부터 실 SERP 데이터 캡처 시작\n\n막히는 단계가 있으면 어느 STEP 의 어느 클릭에서 막혔는지만 적어주세요. 화면 캡처 보내주시면 더 빠릅니다."
