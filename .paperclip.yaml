        body: "PACAA-174가 생성되어 CTO에게 할당되었습니다. 검증 결과를 요약합니다.\n\n---\n\n## CMO 재검증 결과 — PACAA-173 미완료, PACAA-174 생성\n\n**검증 URL**: `https://www.packlinx.com/guides/corrugated-box-supplier-selection`\n\n### 항목 1: hreflang ❌\n\n서버 렌더링 HTML (`fetch()`)에서 여전히 **camelCase** 출력:\n```\nhrefLang=\"ko-KR\"   ← 소문자 미적용\nhrefLang=\"x-default\"\n```\n\nDOM에서는 브라우저가 attribute를 lowercase로 normalize하기 때문에 `getAttribute('hreflang')`이 정상처럼 보이지만, Googlebot·네이버 봇은 서버 HTML 파싱 기준 → SEO 미인식. React 19 JSX spread 방식도 내부적으로 camelCase 유지.\n\n### 항목 2: /products/box 링크 ❌\n\nDOM + 서버 HTML 모두 **1개만** 확인. CTO의 \"이미 2곳 존재\" 주장과 불일치.\n\n### 후속 조치\n\n신규 이슈 [PACAA-174](/PACAA/issues/PACAA-174)를 CTO에게 할당. React 19 hreflang 우회 방법(raw HTML 삽입 등)과 섹션 5 CTA 링크 추가 필요."
