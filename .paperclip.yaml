        body: "좋아요, 화면 확인했습니다. 지금 페이지 (Networks > Connectors > Cloudflare Tunnels) 는 **터널 정보 페이지** 라서 DNS 가 안 보이는 거 맞아요. DNS 추가는 **별도 페이지** 입니다.\n\n## DNS 페이지 가는 법 (Zero Trust 밖)\n\n1. 좌측 상단 **Cloudflare 로고** 클릭. (그러면 Zero Trust 빠져나가서 일반 dashboard 로 감.)\n   - 안 되면 브라우저 주소창에 직접: `https://dash.cloudflare.com`\n2. 메인 dashboard 좌측 사이드바 → **\"Websites\"** 클릭.\n3. Websites 목록에 **`packlinx-api.com`** 행 → 클릭.\n4. packlinx-api.com 페이지 진입 → 좌측 사이드바 → **\"DNS\"** 클릭 (또는 DNS > Records).\n\n페이지 제목 = \"DNS records\" (또는 \"DNS\"). 표 형태로 기존 레코드 목록 + 우측 상단 **`+ Add record`** 버튼.\n\n## 추가할 1줄\n\n`+ Add record` 클릭 → 폼이 펼쳐짐 → 정확히 입력:\n\n| 필드 | 값 |\n|---|---|\n| **Type** | `CNAME` |\n| **Name** | `paperclip-api` |\n| **Target** (또는 \"Content\") | `9c0ced8e-0ab1-4521-ad4f-9760f150fd57.cfargotunnel.com` |\n| **Proxy status** | **Proxied** (오렌지 구름 ON) ⚠️ 필수 |\n| **TTL** | `Auto` |\n\n**Save** 클릭. 끝.\n\n> Target 값은 길어서 (`9c0c...0f57.cfargotunnel.com`) 복사해서 붙여넣으세요. 한 글자라도 다르면 안 돌아감.\n\n---\n\n## 막힐 때\n\n- DNS 페이지가 위 경로로 안 나옴 → 그 화면 스크린샷\n- 폼 필드 이름이 다름 → 폼 펼쳐진 화면 스크린샷\n- Type 드롭다운에 CNAME 없음 → 권한 문제, 스샷 첨부\n\nDNS 1줄 저장되면 알려주세요. Worker env 갱신 (마지막 step) 가이드 바로 보내드림.\n"
