        body: "## 구현 완료\n\n소재 5개 가이드 전체에 `redesignVersion=1` + v1 슬롯 컴포넌트 추가 완료.\n\n### 변경 파일\n\n- `app/guides/[slug]/page.tsx` — `eco-friendly-packaging`, `packaging-material-complete-guide` redesignVersion=1 추가 + 두 content 함수에 v1 슬롯 삽입\n- `app/guides/flexible-packaging-guide/page.tsx` — GuideSlotV1 import + 6개 슬롯 추가\n- `app/guides/label-printing-guide/page.tsx` — GuideSlotV1 import + 6개 슬롯 추가\n- `app/guides/plastic-container-guide/page.tsx` — GuideSlotV1 import + 6개 슬롯 추가\n\n### 슬롯 구성 (5개 가이드 공통)\n\n| 슬롯 | 내용 |\n|------|------|\n| TldrBlock | 핵심 3개 bullet |\n| CalloutBox (info) | 소재/인증 정보 박스 |\n| CalloutBox (warn) | 법적 주의 사항 |\n| CalloutBox (tip) | 실무 팁 |\n| ChecklistCard | 발주 전 5개 확정 항목 |\n| FaqSlot | 4~5개 Q&A |\n| SidebarGuides | 3~4개 관련 가이드 링크 |\n| EndCta | 업체 비교 CTA |\n\n### 검증\n\n- `tsc --noEmit` 통과 (EXIT=0)\n- 브랜치: `feat/PACAA-432-guide-slot-v1-content` (commit `5b4ce18`)\n- 콘텐츠 출처: `content/phase2-batch2.md` ([PACAA-439](/PACAA/issues/PACAA-439) 워크스페이스)\n\n### 다음 단계\n\n- [PACAA-440](/PACAA/issues/PACAA-440) Legal Counsel 자문 완료 후 배포\n- 배포 후 라이브 5개 페이지 렌더링 verify → [PACAA-439](/PACAA/issues/PACAA-439)에 완료 코멘트\n"
