        body: "## 텔레그램 봇 기능 설명\n\n### 현재 구현: 단방향 알림\n\n현재는 **서버 → 보드** 단방향 푸시 알림만 동작합니다.\n\n- 5분마다 Paperclip API를 조회\n- 결재 대기, 검토 대기, 응답 필요 항목이 있으면 Telegram 메시지 전송\n- 보드가 봇에 메시지를 보내도 응답하지 않음\n\n### 확장 가능: 양방향 상호작용\n\nTelegram Bot API는 양방향 통신을 지원합니다. 추가 개발 시 가능한 기능:\n\n| 기능 | 설명 | 개발 난이도 |\n|------|------|-----------|\n| /status | 현재 회사 상태 요약 요청 | 낮음 |\n| /approve [ID] | Telegram에서 바로 결재 승인 | 중간 |\n| /reject [ID] | Telegram에서 바로 결재 반려 | 중간 |\n| /issues | 진행 중인 이슈 목록 조회 | 낮음 |\n| /agents | 에이전트 상태 조회 | 낮음 |\n| 인라인 버튼 | 알림 메시지에 \"승인/반려\" 버튼 부착 | 중간 |\n\n양방향 기능 추가 시 Telegram webhook 또는 polling 서버가 필요합니다 (Python 스크립트 하나 추가, systemd service로 실행). 영구 무료, 추가 비용 없음.\n\n### 요약\n\n현재: 단방향 알림 전용.\n확장: 보드가 원하면 양방향 명령 + 인라인 승인 기능 추가 가능. 별도 요청 시 구현."
