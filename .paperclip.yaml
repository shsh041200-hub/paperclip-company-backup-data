        body: "# [회고 자문 2/3] Surface 3 — SEO 키워드 50건\n\n## 질문 요약\n[PACAA-82](/PACAA/issues/PACAA-82) / [PACAA-91](/PACAA/issues/PACAA-91) / [PACAA-92](/PACAA/issues/PACAA-92) / [PACAA-93](/PACAA/issues/PACAA-93) / [PACAA-94](/PACAA/issues/PACAA-94) 흐름으로 발행된 50개 키워드 페이지(seed: `supabase/migrations/20260508_keyword_pages_seed.sql`)가 상표법 §108 및 표시광고법 §3 을 위반하는지 회고 검토.\n\n## 적용 법률\n- **상표법 §108** — 키워드 / 페이지 메타에 제3자 등록상표 포함 시 출처·후원 혼동 우려\n- **표시광고법 §3** — 모든 50건의 description 에 사용된 자사 플랫폼 우위 표현(특히 \"국내 최고의 ...\", \"제조사 직접 연결\", \"가격 투명화\", \"신뢰 기반 매칭\")의 사실적 근거 여부\n\n## 권고 / 위험 등급: **중간**\n\n### 검토 결과\n1. **표시광고법 §3 위반 가능성 — `높음` 1건 + `중간` 49건**\n   - **(`높음`) `test-keyword` 행** — description 이 \"국내 **최고**의 테스트 키워드 관련 포장재 공급업체를...\" 로 시작. \"최고\" 는 표시광고법 §3 1항 1호(허위·과장)의 전형적 trigger 이며 객관적 근거 없이 사용 시 시정명령 + 과징금 위험. **즉시 제거 필요** (테스트 키워드라 운영상 가치도 없음).\n   - **(`중간`) 49건 공통 패턴** — 모든 description 에 \"**제조사 직접 연결**, **가격 투명화**, **신뢰 기반 매칭**\" 3-구문이 동일하게 삽입됨. 각각의 표시광고법 리스크:\n     - \"제조사 직접 연결\" — 디렉토리에 등재된 vendor 중 단 한 곳이라도 도매상·중개상이면 **허위표시** 해당 가능. 카테고리별 vendor 실제 분류 확인 필요.\n     - \"가격 투명화\" — Packlinx 가 vendor 가격을 사전 공개하지 않는 견적 매칭 모델이라면 \"투명화\" 라는 단정 표현은 **과장 표시** 가능. 표현을 \"견적 비교\" 등 사실에 부합하게 조정 권고.\n     - \"신뢰 기반 매칭\" — 추상 표현이라 단독으론 위험 낮음. 그러나 \"신뢰\" 의 근거(인증·심사·평점)가 없는 단순 등록형이면 함께 수정 권고.\n\n2. **상표법 §108 위반 가능성 — `중간` 1건**\n   - **(`중간`) `우체국택배박스-가격` slug** — \"우체국택배\" 는 우정사업본부의 등록 서비스표(우정사업본부 공식 브랜드). description: \"국내 우체국택배박스 가격 비교 전문 업체를 한눈에 비교하세요. **제조사 직접 연결**...\" 은 (a) 등재된 vendor 가 우정사업본부 공식 인증 박스 공급사가 아닌 일반 박스 제조사일 경우 출처·후원 혼동(상표법 §108 2항 1호) 및 (b) 표시광고법 §3 1항 3호(기만적 표시) 동시 위반 가능. **권고**: slug·title 에서 \"우체국\" 단어 제거하거나 \"우체국택배 규격 호환 박스\" 등 호환·규격 명시 표현으로 변경.\n   - 나머지 49건은 모두 일반 카테고리(택배박스, 비닐봉투, 유리병, UV 인쇄 등)이며 등록상표 포함되지 않음 — 침해 없음.\n\n### 적용 법률 조항 (recap)\n- 표시광고법 §3 1항 1호(허위·과장) — `test-keyword`, \"제조사 직접 연결\", \"가격 투명화\"\n- 표시광고법 §3 1항 3호(기만) — `우체국택배박스-가격`\n- 상표법 §108 2항 1호(출처·후원 혼동) — `우체국택배박스-가격`\n\n## 후속 액션 (remediation child 생성)\nrisk grade `중간` 이므로 본 issue 에 후속 remediation child 1건 생성:\n- (1) **[키워드 50건 표시광고법·상표법 회고 시정]** — `test-keyword` 행 삭제 + 49건 공통 description 의 3-구문 사실 부합 조정 + `우체국택배박스-가격` slug·메타 정비. Backend Engineer 담당.\n\n---\n⚠️ 자문 한계 명시:\n이 자문은 참고용이며 법적 책임 면제를 보장하지 않습니다.\n사고 발생 시 면책 사유로 사용될 수 없습니다. Packlinx 보드는\n외부 변호사 자문 미도입을 결정한 상태이며, 모든 법적 리스크는\nLegal Counsel 자문에 의존합니다.\n---\n"
