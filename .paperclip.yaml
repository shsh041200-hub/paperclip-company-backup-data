        body: "## 2026-05-06 GSC Coverage 리포트 분석 (실행 X — 보고만)\n\n파일 4종 archived: `plans/PACAA-113/2026-05-06/` (xlsx + 4 CSV)\n\n### 1. 페이지 스케일 14배 폭증 (4/28 이벤트)\n\n| 날짜 | 색인 안됨 | 색인됨 | 합계 | 색인율 |\n|---|---:|---:|---:|---:|\n| 4/24 | 4,190 | 524 | 4,714 | 11% |\n| 4/25 | 19,486 | 6,570 | 25,056 | **26%** |\n| **4/28** | **307,653** | **51,952** | **359,605** | **14.4%** |\n| 5/01 | 307,653 | 51,952 | 359,605 | 14.4% |\n\n→ 4/28 에 sitemap 알려진 페이지가 25k → 360k 폭증 (14×). PACAA-115/117 (sitemap-index 분할 + 1,000-cap 해제) 4/30 done — **시점 일치**. GSC 가 새 sitemap-index 를 발견하고 모든 URL 을 enumerate 한 결과로 추정.\n\n### 2. 미색인 사유 분포 비교\n\n| 사유 | 4/27 | 5/06 | Δ | 해석 |\n|---|---:|---:|---|---|\n| 다른 4xx 문제로 인해 차단됨 | 5,667 | **4,178** | **−26%** | PACAA-118 slug 정규화 효과로 추정. P1.D 1주차 (PACAA-129 5/8) 가 측정해야 할 핵심 지표 — **이미 양호** |\n| 적절한 표준 태그가 포함된 대체 페이지 | 12,785 | 175,865 | +13.7× | sitemap 확장으로 alternate URL 폭증. canonical 은 잡혀있지만 크롤 예산 낭비 |\n| 사용자가 선택한 표준이 없는 중복 페이지 | 0 | **107,930** | NEW | **🔴 신규 P0 패턴** — canonical 태그가 누락되거나 일관되지 않은 중복 URL. PACAA-116 canonical 정책 적용 후에도 미커버 영역 존재 |\n| 크롤링됨 - 색인 미생성 | 10 | 18,215 | +1,820× | GSC 가 보고 색인 가치 없다고 판단한 페이지 |\n| 발견됨 - 색인 미생성 | 0 | 1,460 | NEW | 크롤 큐에 있지만 아직 fetch 안 됨 |\n| 찾을 수 없음(404) | 0 | 3 | +3 | 무시 가능 |\n| 리디렉션 포함 | 0 | 2 | +2 | 무시 가능 |\n\n### 3. 색인 절대 수 8배 증가 — 일부 양호 신호\n\n- 색인된 페이지: 6,567 → **51,952** (7.9×). sitemap-index 분할이 효과적.\n- 노출(impression): 4/27 일 4 → 5/01 일 9. 절대 색인 수 8배 늘었지만 노출은 2배 — 색인된 페이지 다수가 **검색 트래픽 가치가 없음** 시사.\n- 색인율 % 만 보면 26% → 14% 로 악화처럼 보이지만, 분모 (알려진 URL) 가 14배 늘어난 결과. 실제로는 색인 절대 수가 증가했고 4xx 가 감소했음.\n\n### 4. PACAA-119 산하 모니터링 child 영향\n\n- **PACAA-129 (5/8 1주차 측정)**: 4xx 차단 카운트 변화 측정. 이미 5,667 → 4,178 (−26%) 가시. **kill criterion 통과 가능성 높음**. CTO 가 5/8 에 정식 보고하면 됨 (현재 데이터는 5/01 까지, 5/08 까지 트렌드 확인).\n- **PACAA-130 (5/15 2주차)**: alternate-canonical 추적. 175k 가 baseline — 신규 canonical 누락 패턴 (107,930) 의 추세를 같이 봐야 함.\n- **PACAA-131 (5/29 4주차)**: 색인율 60% 목표. 분모가 360k 가 되었으므로 **목표 재조정 필요 — 60% × 360k = 216k 색인** 은 비현실적. 새