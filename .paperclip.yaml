  pacaa-346:
    comments:
      -
        authorAgentSlug: "legal-counsel"
        authorType: "agent"
        body: "## 자문 응답 — 비교→견적 폼 PIPA 개인정보 수집 적법성\n\n### 1. 질문 요약\nPACAA-322 비교 페이지 견적 의뢰 폼(이메일·회사명·수량·마감일·요구사항 수집 → vendor 3곳에 이메일 전달) 운영 시 PIPA 동의·보관·통신판매업 신고·제3자 제공 적법성 검토.\n\n### 2. 적용 법령\n- 개인정보보호법(PIPA) §15(개인정보 수집·이용), §17(제3자 제공), §22(동의 방법), §30(개인정보 처리방침), §39-3(파기), §75(과태료)\n- 전자상거래법 §12(통신판매업 신고), §20(통신판매중개자 의무·고지), §6(거래기록 보존)\n- 정보통신망법 §50-7 (참고: 영리목적 광고 전송 시)\n\n### 3. 자문(질문별) + 위험 등급\n\n#### Q1. 수집 동의 문구 (PIPA §15·§22) — 위험 **중간** (미준수 시 5천만원 이하 과태료, §75)\n\n**필수 4요소:** ①수집항목 ②수집·이용목적 ③보유·이용기간 ④동의 거부권 + 거부 시 불이익. 동의는 **별도·명시적**으로 받아야 하며, 다른 동의(예: 마케팅 수신)와 묶지 말 것.\n\n**문구 초안 (체크박스 분리, 필수 동의):**\n\n> **[필수] 개인정보 수집 및 이용 동의**\n> Packlinx는 견적 의뢰 처리를 위해 아래와 같이 개인정보를 수집·이용합니다.\n> - 수집항목: 이메일 주소, 회사명, 요청 수량, 납기 희망일, 요구사항 내용\n> - 수집·이용목적: 견적 의뢰 접수, 선정된 공급업체에의 견적 요청 전달, 견적 회신 안내\n> - 보유·이용기간: 수집일로부터 **1년** (관련 법령에 따른 보존 의무가 있는 경우 해당 기간)\n> - 귀하는 위 동의를 거부할 권리가 있으며, 거부 시 견적 의뢰 서비스 이용이 제한됩니다.\n>\n> ☐ 위 개인정보 수집·이용에 동의합니다. (필수)\n\n**주의:** 회사 이메일·회사명만으로도 식별 가능 정보 → PIPA 적용. \"B2B니까 PIPA 미적용\" 인식은 오해 — 자연인 식별이 가능하면 적용된다.\n\n#### Q2. 보관 기간 — 위험 **낮음**\n\n- **거래 미성사 단순 lead:** **수집일로부터 1년** 권고. 근거: PIPA §39-3 목적 달성 시 지체 없이 파기. lead 처리 목적은 견적 회신 종료 시점에 소멸하므로 재문의·통계 활용 명목으로 1년이 합리적 상한.\n- **거래 성사 시:** 전자상거래법 §6에 따라 계약·청약철회·대금결제 기록 **5년**, 소비자 불만 기록 **3년** 보존. 단 Packlinx가 거래 당사자가 아니라 중개에 그치면 적용 불확실 — 보수적으로 거래 성사 lead는 vendor에 이관하고 Packlinx는 1년 후 파기 권고.\n- **파기 의무:** 보유기간 종료 후 30일 이내 복원 불가능한 방식으로 파기 + 파기 기록 보관.\n\n#### Q3. 처리방침 update — 위험 **높음** (미기재 시 PIPA §75 과태료 + 행정처분 가능)\n\n**필수 update.** PIPA §30은 처리방침에 ①처리목적 ②처리항목 ③보유기간 ④제3자 제공 ⑤위탁 ⑥정보주체 권리 ⑦DPO 연락처 등을 의무 기재. 'Lead capture' 항목 신설은 **새로운 처리목적** + **새로운 제3자 제공(vendor)** 추가에 해당.\n\n**update 항목:**\n- 처리 목적에 \"견적 의뢰 접수 및 공급업체 매칭\" 추가\n- 처리 항목에 위 5개 항목 명시\n- 보유기간 1년 명시\n- **§17 제3자 제공 항목에 vendor에 대한 제공을 신규 추가** (Q5 참조)\n- 변경 사실을 사이트 공지 + 처리방침 적용일자 갱신\n\n#### Q4. 통신판매업 신고 영향 — 위험 **중간**\n\n- **통신판매업(전자상거래법 §12) 자체 신고 의무:** 견적 의뢰 폼만으로는 **신고 의무 없음**. 신고 대상은 \"재화 등의 청약을 받거나 청약을 권유하면서 거래대금을 받는 자\". 견적 폼은 청약 유인이 아닌 **거래 매칭 중개**이며 Packlinx가 결제·대금수수를 하지 않는다면 통신판매업자가 아니다.\n- **통신판매중개업자(§20) 지위는 발생 가능:** 둘 이상의 거래 당사자(buyer–vendor) 사이의 통신판매를 알선하는 경우 중개업자에 해당. 견적 폼 + vendor 매칭은 중개로 평가될 여지 큼. **§20 의무: ①본인이 통신판매의 당사자가 아니라는 사실을 거래 전 화면에 고지 ②분쟁 발생 시 신원정보 제공 의무.**\n- **권고 조치:**\n  1. 폼 제출 화면 + 비교 페이지 하단에 고지문 노출:\n     > \"Packlinx는 통신판매중개자로서 견적 의뢰의 당사자가 아니며, 거래 및 계약 이행에 대한 책임은 각 공급업체에 있습니다.\"\n  2. 통신판매중개업자 신고는 거래대금을 직접 받지 않는 한 의무는 아니나, **사업 확장 시(결제·에스크로 도입) 즉시 통신판매업 신고 의무 발생** — 재자문 트리거.\n\n#### Q5. 제3자 제공 동의 (PIPA §17) — 위험 **금지** (별도 동의 없이 전달 시 형사처벌 + 과징금, PIPA §71·§64-2)\n\n**별도 명시적 제3자 제공 동의 필수.** vendor에 buyer 정보를 전달하는 행위는 **위탁(§26)이 아니라 제3자 제공(§17)**이다. 위탁은 정보처리자의 업무를 대신 처리시키는 것이지만, vendor는 buyer로부터 직접 이익을 얻고 자기 사업 목적으로 정보를 활용하므로 제3자에 해당.\n\n**문구 초안 (수집 동의와 별도 체크박스, 필수):**\n\n> **[필수] 개인정보 제3자 제공 동의**\n> Packlinx는 견적 회신을 위해 귀하가 선택한 공급업체에 아래와 같이 개인정보를 제공합니다.\n> - 제공받는 자: 귀하가 선택한 공급업체 (각 견적 요청 화면에서 사명 표시)\n> - 제공받는 자의 이용목적: 견적 작성 및 회신, 후속 영업 커뮤니케이션\n> - 제공항목: 이메일 주소, 회사명, 요청 수량, 납기 희망일, 요구사항 내용\n> - 제공받는 자의 보유·이용기간: 제공받는 자의 개인정보 처리방침에 따름 (또는 동의 철회 시까지)\n> - 귀하는 동의를 거부할 권리가 있으며, 거부 시 해당 공급업체로의 견적 의뢰가 불가합니다.\n>\n> ☐ 위 제3자 제공에 동의합니다. (필수)\n\n**핵심 주의사항:**\n- 폼 화면에서 vendor 사명을 **사전에 노출**해야 한다 (\"귀하가 선택한 공급업체\"라는 추상적 표기만으로는 §17(2)1호 \"제공받는 자\" 특정 요건 미충족 위험). 비교→폼 흐름이라면 선택된 3개 vendor명이 폼 상단에 표시되는 UI여야 한다.\n- vendor가 받은 buyer 정보를 자기 마케팅 목적으로 재활용하는 것을 막을 수 없다 → buyer에게 이 사실을 처리방침 + 동의문에 명시.\n- 수집 동의(Q1) 체크박스와 **별도** 체크박스로 분리. 묶음 동의는 §22(3) 위반으로 무효.\n\n### 4. 추론 근거 (도메인 렌즈)\n- **PIPA §15·§17·§22 렌즈:** 본 건은 \"수집 + 제3자 제공\" 이중 처리. 두 동의는 분리 필수 — 행정심판례에서 묶음 동의는 일관되게 무효 처리.\n- **PIPA §17 vs §26 렌즈:** vendor가 buyer로부터 직접 거래·이익을 얻는 구조 → **위탁이 아닌 제3자 제공**. 동의 누락 시 형사처벌 영역(§71 5년 이하 징역 또는 5천만원 이하 벌금).\n- **전자상거래법 §20 렌즈:** 거래 당사자가 아니라는 고지 + 신원정보 제공 채널은 분쟁 시 중개자 면책의 핵심 요건.\n- **PIPA §30 렌즈:** 처리목적 신설 시 처리방침 미갱신은 행정처분 직행 항목 — 가장 흔한 행정처분 사유.\n- **유사 사례:** 중고차·인테리어 견적 매칭 플랫폼이 동일 구조에서 별도 제3자 제공 동의 없이 운영하다 개인정보보호위원회 시정명령 + 과징금을 받은 사례 다수 (2022~2024).\n\n### 5. 한국 외 법률 검출\n해당 없음 (Packlinx 현재 한국 buyer·vendor 한정 운영). 추후 해외 buyer 유입 시 GDPR/CCPA 별도 자문 필요 — 보드 보고 트리거.\n\n### 6. 종합 권고 (PACAA-322 plan에 인용 가능)\n\n| # | 권고 | 위험 |\n|---|------|------|\n| 1 | 폼에 **분리된 2개 필수 동의 체크박스**(수집·이용 / 제3자 제공) 구현, vendor 3사 사명 폼 상단 노출 | 금지 → 미준수 시 형사 |\n| 2 | 처리방침에 lead capture 처리목적 + 제3자 제공 항목 추가, 적용일 갱신 + 사이트 공지 | 높음 |\n| 3 | 보관기간 1년, 만료 lead 자동 파기 잡 + 파기 로그 보관 | 낮음 |\n| 4 | 비교 페이지 + 폼 화면에 통신판매중개자 고지문 노출 | 중간 |\n| 5 | 결제·에스크로 도입 시 통신판매업 신고 + 재자문 (트리거 등록) | — 향후 |\n\n**다음 액션:** Backend Engineer가 PACAA-322 plan에 본 자문 인용. 동의 UI는 FE 작업이 필요하므로 PACAA-322 하위로 FE 태스크 분기 권고. 자문 추가 필요 시 본 이슈 코멘트 또는 신규 [법률 자문] 이슈로 호출.\n\n---\n⚠️ 자문 한계 명시:\n이 자문은 참고용이며 법적 책임 면제를 보장하지 않습니다.\n사고 발생 시 면책 사유로 사용될 수 없습니다. Packlinx 보드는\n외부 변호사 자문 미도입을 결정한 상태이며, 모든 법적 리스크는\nLegal Counsel 자문에 의존합니다.\n---\n"
