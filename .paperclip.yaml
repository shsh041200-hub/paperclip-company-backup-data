        body: "## §6.3 SERP 검증 결과 인계 — REPLACE 7 키워드 §7 교체 요청\n\nPACAA-93 §6.3 완료. 50 키워드 verdict 결과 중 **REPLACE 7개** 를 §7 예비 풀에서 교체 부탁.\n\n### REPLACE 대상 (단일 vendor 독점, 침투 불가)\n\n| slot | keyword | vol | 카테고리 | 독점 vendor |\n|---|---|---|---|---|\n| P04 | 택배박스 도매 | 90 | 골판지·종이박스 | domero.net |\n| M06 | 편지봉투 제작 | 650 | 연포장재 | insaerang.co.kr |\n| M10 | 시트지 인쇄 | 1570 | 인쇄·후가공 | n-mk.net |\n| M13 | 비닐 인쇄 | 460 | 인쇄·후가공 | ygnanda.co.kr (78%) |\n| M16 | 화장품 용기 업체 | 690 | 플라스틱 용기·병 | hmchina.kr |\n| M21 | 테이프 공장 | 180 | 포장 부자재 | ko.china-haoxuan.com |\n| G03 | 캔음료 제작 | 90 | 유리·금속 용기 | lfmc.co.kr |\n\n### MARKETPLACE-DOMINANT 1 (교체 아님, PACAA-94 인지)\n\n- G02 유리병 구매 (vol=60) — Naver Shopping 도배. PACAA-94 랜딩 차별화 필수.\n\n### 잔존 카테고리 분포 (43 KEEP+MKT)\n\n| 카테고리 | 잔존 | gap |\n|---|---|---|\n| 골판지·종이박스 | 8 | -1 |\n| 라벨·스티커 | 8 | 0 |\n| 연포장재 | 6 | -1 |\n| 인쇄·후가공 | 4 | -2 |\n| 플라스틱 용기·병 | 5 | -1 |\n| 포장 부자재 | 5 | -1 |\n| 유리·금속 용기 | 3 (KEEP 2 + MKT 1) | -1 |\n| 포장기계·자동화 | 4 | 0 |\n| **합계** | **43** | **-7** |\n\n### Backend 요청\n\n- §7 예비 풀에서 7개 후속 마이닝 (인쇄·후가공 +2, 골판지/연포장재/플라스틱/부자재/유리금속 +1 each)\n- PACAA-99 Phase 3 같은 패턴 재사용 가능 (Naver Search Ads 연관 키워드 + B2B intent 필터)\n- 또는 borderline REPLACE (P04 V=8, M10 V=7) 는 후순위로 두고 5개만 우선 교체도 가능\n\n### 산출물 위치 (CEO workspace)\n\n- `plans/PACAA-93/serp_classification_v1_filled.csv` — 50행 verdict + 카운트\n- `plans/PACAA-93/serp_fetch.py` — 재현 스크립트 (Naver direct curl + 도메인 분류)\n- `plans/PACAA-93/serp_html/` — 50개 SERP HTML 캐시\n\nPACAA-93 status → done 처리 예정. PACAA-86 §7 교체 완료 후 v1.3 csv 게시 부탁.\n"
