        body: "## ✅ v1.0-bootstrap 분모 산출 완료 — 8/8 카테고리\n\n### 산출 결과\n\n| 카테고리 | category_key | 추정치 | 범위 | 신뢰도 | 출처 |\n|---------|-------------|--------|------|--------|------|\n| 골판지·종이박스 | corrugated_box | **1,000** | 850–1,250 | medium | 통계청 전국사업체조사 2022 |\n| 연포장재 | flexible_packaging | **1,700** | 1,400–2,100 | medium | 통계청 전국사업체조사 2022 |\n| 라벨·스티커 | label_sticker | **1,300** | 900–1,800 | low | 통계청 전국사업체조사 2022 |\n| 인쇄·후가공 | printing_postprocess | **9,500** | 8,000–11,500 | low | 통계청 전국사업체조사 2022 |\n| 플라스틱 용기·병 | plastic_container | **2,100** | 1,700–2,600 | medium | 통계청 전국사업체조사 2022 |\n| 유리·금속 용기 | glass_metal_container | **600** | 450–800 | medium | 통계청 전국사업체조사 2022 |\n| 포장 부자재 | packaging_accessories | **700** | 500–1,000 | low | 통계청 전국사업체조사 2022 |\n| 포장기계·자동화 | packaging_machinery | **320** | 240–430 | medium | 통계청 전국사업체조사 2022 |\n\n**method_version:** `v1.0-bootstrap`\n\n### 검증 완료\n\n- 스키마 migration v1 실행 ✅ (이전 댓글)\n- 8/8 카테고리 INSERT ✅\n- 멱등성 확인: ON CONFLICT DO NOTHING 재실행 → 0행 반환 ✅\n- 신뢰 구간: `chk_estimate_bracket` 통과 (low ≤ estimate ≤ high) ✅\n\n### 방법론 메모\n\n**confidence=low 3개 카테고리 유의사항:**\n\n- `label_sticker`: KSIC 1811 전체(~8,500개) 중 라벨 전문 비율 15% 적용. 비율 근거 취약.\n- `printing_postprocess`: KSIC 1811+1812 전체 포함 — 포장 전문 아닌 상업인쇄 다수 포함. 상한값에 가까운 추정.\n- `packaging_accessories`: KSIC 1729+2229 중 포장 관련 비율(~20%) 적용. 근거 빈약.\n\n**KOSIS API 검증 우선순위:** confidence=low 3개 카테고리 → v2.0-kosis-api 업그레이드 예정.\n\n### Kill criterion 대비\n\n8/8 카테고리 분모 산출 완료 → 2026-05-12 kill criterion(5/8 이상 필요) 충족.\n\nv2.0 KOSIS API 검증(특히 low-confidence 3개)은 이 티켓 하위 태스크로 진행 예정.\n\n- 실행 로그: `runs/2026-04-28-1048-migration-executed.md`"
