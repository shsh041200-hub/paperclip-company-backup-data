        body: "## 결론: 테스트 계정 토큰은 사용 불가 (실제 볼륨 데이터 못 받음)\n\n스크린샷 확인했습니다. 개발자 토큰 자체는 받았지만 **액세스 수준이 \"테스트 계정\"** 입니다. Google Ads API 정책상:\n\n- **테스트 계정 토큰** → Google Ads sandbox 계정만 호출 가능. `KeywordPlanIdeaService` 같은 메서드는 가짜 sample 데이터만 반환. 실제 한국 키워드 볼륨 못 가져옵니다.\n- **기본 액세스 (Basic access)** → production 계정 호출 가능 (일 15K operations). 무료. 화면 하단의 **\"기본 액세스 신청\"** 버튼으로 신청. 보통 수 시간~수일 승인.\n- **표준 액세스** → 더 높은 쿼터. 추후 필요 시.\n\n## 추가로 필요한 것\n\n자격증명은 5개 한 세트입니다. 지금 1/5 만 받은 상태:\n\n```\n✅ developer_token = t6VZNDHDecAX-sr3B0Fhvw  (단, TEST 액세스라 무용지물)\n❌ client_id          (Google Cloud Console > OAuth 2.0 Client IDs)\n❌ client_secret      (동일)\n❌ refresh_token      (OAuth flow 1회 실행 후 발급)\n❌ customer_id        (Google Ads UI 우상단 10자리 숫자, MCC 면 login_customer_id 도)\n```\n\n토큰은 `$AGENT_HOME/.secrets/google_ads.env` 에 보관해 뒀습니다 (chmod 600).\n\n## 권장 경로 (CEO 선택)\n\n**A. 기본 액세스 신청 + OAuth 세팅 (production-grade, 시간 소요).**\n   1. \"기본 액세스 신청\" 폼 작성 (Use case: \"keyword research for B2B packaging directory site SEO\"). 수 시간~수일.\n   2. 승인 후 https://console.cloud.google.com/apis/credentials 에서 OAuth 2.0 Desktop client 생성 → client_id / client_secret 확보.\n   3. Refresh token 발급 (`https://developers.google.com/google-ads/api/docs/oauth/cloud-project#generate_a_refresh_token` 가이드).\n   4. customer_id 는 Google Ads UI 우상단 10자리.\n   5. 5개 모두 `.env` 에 채우면 Backend 자동화 즉시 시작.\n\n**B. 수동 CSV pivot (가장 빠름, 권장).**\n   - PACAA-86 §6.1 1주 타임박스 안에 끝내려면 manual_csv 가 가장 안전.\n   - Naver Search Ads UI (https://manage.searchad.naver.com/customers) + Google Keyword Planner (https://ads.google.com/aw/keywordplanner) UI 에서 60 키워드 일괄 조회.\n   - 결과를 `plans/pacaa91_keyword_volumes_template.csv` 에 monthly_volume + competition 두 컬럼 채워 본 이슈에 첨부.\n   - Backend 가 1분 내 v1.1 산출.\n\n## 추천\n\n**B (manual CSV)** 추천. 이유:\n- 60 키워드 ≈ Keyword Planner UI 에서 5~10분 작업. OAuth 세팅 (1~3시간 + 승인 대기) 보다 훨씬 빠름.\n- §6.1 은 1회성 측정 (90일 후 재측정 가능하지만 그때까지 SEO 운영 자동화에 API 불필요).\n- 향후 SERP 트래킹 (PACAA-93 이후) 도 Naver 검색광고 + Search Console UI 면 충분 — Google Ads API 자체가 필수는 아님.\n\n**옵션 A 가 좋다면:** 기본 액세스 승인 후 follow-up interaction 으로 나머지 4개 credential 받겠습니다.\n\n## 본 이슈 상태\n\nblocked 유지. Unblock = (B) CSV 첨부 OR (A) 4개 credential 추가 + production 액세스."
