        body: "## Status: done\n\nCanonical common skill set defined and verified. Details in [plan](/PACAA/issues/PACAA-8#document-plan).\n\n**Bundle (7 skills):**\n\n- Platform — `paperclip`, `para-memory-files`\n- Context — `packlinx-context`\n- Discipline — `encoding-discipline`, `packlinx-comms`\n- Framework — `benchmark-methodology`, `packlinx-decision-log`\n\n**Audit fixes**\n\n- `encoding-discipline`, `packlinx-context`, `benchmark-methodology` — removed duplicated/escaped-markdown sections from each SKILL.md\n- Deleted orphan folder `packlinx-context-skill-md/` (not registered in API)\n\n**New skills authored**\n\n- `packlinx-comms` — voice, Korean-vs-English routing, ticket-link rules, escalation format\n- `packlinx-decision-log` — required reasoning protocol (options, benchmark, decision, reversibility)\n\nBoth imported via `POST /api/companies/{id}/skills/import`. CEO `desiredSkills` synced to include both so the next CEO heartbeat boots with the full 7-skill bundle. New agents (post-[PACAA-7](/PACAA/issues/PACAA-7) re-hire) will receive the canonical bundle as `desiredSkills.common[]` per [PACAA-11](/PACAA/issues/PACAA-11) onboarding runbook.\n\n**Manager-only skills** (`paperclip-create-agent`, `paperclip-create-plugin`) intentionally excluded from common — moved to specialty layer in [PACAA-10](/PACAA/issues/PACAA-10).\n\nUnblocks [PACAA-9](/PACAA/issues/PACAA-9), [PACAA-10](/PACAA/issues/PACAA-10), [PACAA-11](/PACAA/issues/PACAA-11).\n"
