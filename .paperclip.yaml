        authorAgentSlug: "ceo"
        authorType: "agent"
        body: "## \"managed checkout 자동 트리거\" 이슈 설명\n\n### 그게 뭔데\nPaperclip은 프로젝트에 git repo URL을 등록하면, **자체적으로 그 레포를 디스크에 clone해서 \"managed folder\"** 라는 정해진 경로에 두고 관리해야 함. 그래야:\n1. 에이전트가 작업할 때 매번 clone하지 않아도 됨\n2. 여러 worktree (issue별 격리 작업공간)를 그 managed folder에서 파생시킬 수 있음\n3. board UI에서 \"프로젝트 보기\"가 실제 파일을 가리킬 수 있음\n\nAPI 스키마상 등록 정보:\n```json\n\"codebase\": {\n  \"repoUrl\": \"https://github.com/shsh041200-hub/pkging-platform.git\",\n  \"managedFolder\": \"/home/rlatjsgur/.paperclip/instances/default/projects/{companyId}/{projectId}/pkging-platform\",\n  \"effectiveLocalFolder\": \"(같은 경로)\",\n  \"origin\": \"managed_checkout\"   ← 자동 클론된다는 약속\n}\n```\n\n### 실제로 본 것 (현재 인스턴스)\nPaperclip 인스턴스 디렉터리 직접 확인:\n\n```\n/home/rlatjsgur/.paperclip/instances/default/projects/\n├── c31c062b-...  ← 다른 회사\n│   └── ee1e88bd-.../_default/   ← 빈 디렉터리, .git 없음, 소스파일 없음\n└── d5e183da-...  ← 이번 회사 (PACAA)\n    └── (이 heartbeat 시작 시점엔 디렉터리 자체가 없었음)\n```\n\n즉:\n- **이번 PACAA 프로젝트**: `managedFolder` 경로의 부모 회사 디렉터리조차 미생성 → 내가 수동으로 `mkdir -p` + `git clone` 해야 했음\n- **다른 회사 프로젝트**: 폴더 골격(`_default`)은 만들어졌지만 그 안에 **clone이 안 됨** (소스도 `.git`도 없음)\n\n→ **두 회사 모두에서 managed checkout 자동 클론이 동작 안 한 것 확인됨.** 단발성 이슈가 아닌 인스턴스 전반의 인프라 이슈.\n\n### 왜 문제인지\n1. **에이전트 일관성 깨짐**: 다른 에이전트가 이 프로젝트로 깨어나면, 등록된 `effectiveLocalFolder`를 기준으로 작업하려 들 텐데 폴더가 비어 있어서 즉시 실패하거나 본인이 다시 clone하게 됨. 매 에이전트마다 다른 경로/상태에서 작업할 수 있음.\n2. **워크스페이스 상속 무용지물**: PACAA-2 만들 때 `inheritExecutionWorkspaceFromIssueId` 썼는데, 그 효과는 managed folder가 정상 존재해야 의미 있음. 지금처럼 우연히 채워진 상태는 재현성 없음.\n3. **무성한 clone**: `npm install` 503 packages 27초가 매 에이전트/매 worktree마다 반복될 수 있음 → budget 낭비.\n4. **board가 본 \"사이트 안 보임\" 현상의 진짜 원인 중 하나**: 처음에 `/tmp/pacaa/...`에 clone해서 띄운 것도 결국 managed checkout이 자동으로 안 돼서 임시 우회한 것.\n\n### 가능한 원인 (어디 보면 됨)\n1. **프로젝트 생성 핸들러에서 clone 단계 누락**: `POST /api/companies/{id}/projects` 가 `codebase` 메타데이터만 기록하고 실제 git clone job을 enqueue하지 않을 수 있음.\n2. **워커/잡 스케줄러 미가동**: clone job이 큐엔 들어갔지만 백그라운드 워커가 안 돌고 있을 가능성. `paperclipai onboard --yes` 프로세스 (PID 824)가 띄운 환경엔 일반적인 job runner가 빠졌을 수 있음.\n3. **첫 체크아웃 시점 lazy clone 미구현**: \"lazy\"하게 첫 issue checkout 때 clone하기로 설계했는데 그 hook이 누락된 경우. PACAA-1 체크아웃은 정상이었지만 폴더는 안 생겼으니 이쪽이 의심됨.\n4. **로컬 어댑터 한정 버그**: `claude_local` / 로컬 인스턴스에서만 발생하고 클라우드 어댑터에선 정상일 수 있음.\n\n### 권장 후속 티켓\n> `[infra] 프로젝트 managed checkout 자동 clone 트리거 누락`\n> - **재현**: 새 프로젝트 생성 → `effectiveLocalFolder` 경로 확인 → 빈 디렉터리 또는 부재 확인\n> - **현재 회피**: 에이전트가 수동 `git clone`\n> - **수정 범위**: 프로젝트 생성 시 clone job enqueue + 워커 처리 + 실패 시 issue 코멘트로 board에 알림\n> - **검증**: 새 프로젝트 생성 후 N초 이내 `effectiveLocalFolder`에 `.git` + 소스 트리 존재\n> - **중요도**: medium (현재는 에이전트 수동 우회로 동작 중, 단 재현성/일관성 깨짐)\n\n원하면 이 후속 티켓도 지금 만들어 둠 (PACAA-3). 만들까?\n"
