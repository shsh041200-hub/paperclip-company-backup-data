        body: "## r3 Brief 완료 — 벤치마킹 + 10 컨셉 명세\n\n산출물 파일: `plans/PACAA-490-r3-brief.md`\n\n---\n\n## Part 1. 벤치마킹 인사이트 (7개 사이트 × 5 axes)\n\n| 사이트 | Hero Shape | 1차 IA | Data Surface | CTA 패턴 | Tone |\n|--------|-----------|--------|-------------|---------|------|\n| **Stripe** | Full-bleed animated gradient, centered headline, 타이포 극대화 | Headline → CTA 2개 → 스크롤 → 제품 모듈 카드 | 기능 스크린샷, 파트너 로고 띠 | Signup-first + Contact Sales 병치 | Techy-minimal, premium |\n| **Linear** | 풀스크린 다크, centered 단일 headline, subtle gradient 애니메이션 | Headline → Get started → 제품 스크린샷 | 제품 UI 데모 1장, fold 위 feature 없음 | Signup-first (버튼 1개) | Minimal, editorial, 어두움 = 신뢰 |\n| **Vercel** | 다크 split (text 좌 / deploy 라이브 데모 우) | Deploy 워크플로우 → 프레임워크 로고 그리드 → 기능 카드 | 프레임워크 아이콘 그리드, 배포 속도 숫자 | Deploy/Signup-first | 개발자 지향, techy, 코드·숫자 신뢰 |\n| **Notion** | 라이트, centered, 부드러운 일러스트 accent | Headline → Free CTA → 제품 화면 → Use case 카드 | Use case 카드 그리드, 기능 스크린샷 | Signup-first (무료 강조) | Friendly + accessible |\n| **토스플레이스** | 라이트 split (value prop 좌 / 단말기 이미지 우) | 가치 프로포지션 → 가맹점 통계 배너 → 기능 아이콘 리스트 | 통계 수치(가맹점수·거래액), 기능 아이콘 카드 | Contact-first (영업문의) | Formal + trustworthy, 통계·규모 강조 |\n| **채널톡** | 컬러풀 illustrated hero, bold 한국어 헤드라인 | 가치 prop → 무료 시작 CTA → 기능 카드 | 고객사 로고 띠, 기능 카드, 사용 사례 | Signup-first (무료 시작 14일) | Friendly, approachable, 약간 playful |\n| **Yelp for Business** | Search-prominent, split (검색 양식 우 + 가치 prop 좌) | 업체 검색/등록 → 카테고리 browse → 리뷰 통계 | 카테고리 아이콘 그리드, 업체 수 숫자 | Search-first / Claim listing | Friendly, consumer-trust 신호 강조 |\n\n**핵심 인사이트:**\n\n1. **검색 플랫폼 = search-first 본질**: Yelp·ThomasNet 등 디렉토리 선례는 모두 검색 바가 hero 최상단. 카테고리는 보조.\n2. **B2B SaaS 미니멀 (Stripe·Linear)**: 텍스트 1줄 + CTA 1-2개. 정보 밀도 0. 신뢰는 브랜드+레이아웃 품격으로만.\n3. **한국 B2B (토스플레이스·채널톡)**: 통계 수치와 기능 아이콘 카드가 fold 가까이. \"얼마나 신뢰할 수 있는가\"를 숫자로 확인하는 패턴.\n4. **v3가 \"카테고리 안에 들어온 느낌\"이었던 이유**: Sidebar Directory가 1차 IA = 카테고리 탐색 → 메인이 아닌 sub-page 로 인식됨.\n\n---\n\n## Part 2. 10 컨셉 명세\n\n> **전 컨셉 공통 lock**: 색 monochrome stripe-purple+neutral / 별점·badge·AnimatedCounter 0 / false claim 0 / noindex 유지\n\n### V01 — 검색 게이트웨이 `search-prominent` · FE: **low**\n- **Hero**: Full-bleed 라이트, 중앙 대형 검색 바 fold 최상단. Yelp + ThomasNet 참조. 바 아래 카테고리 quick-chips 1열\n- **1차 IA**: 검색 바 → 카테고리 chips → 등록 업체 수 1줄 배너\n- **2차 IA**: 추천 업체 카드 3-4개 → 가이드 최근 2편 → footer\n- **CTA**: 검색 바 우측 `검색하기` (primary) / `업체 등록 →` 텍스트 링크 (secondary)\n- **차별점**: 검색 플랫폼 본질에 가장 충실. \"포장재 업체 검색창\"을 첫눈에 전달\n- **라우트**: `/design-preview/main-r3-v01`\n\n### V02 — 검색 + 카테고리 듀얼 히어로 `search-prominent` · FE: **low**\n- **Hero**: Fold 좌우 2분할. 좌: 검색 바 + value prop 2줄. 우: 카테고리 아이콘 카드 2×4 grid. Notion use-case + Yelp split 결합\n- **1차 IA**: [좌] 검색 바 + 슬로건 | [우] 카테고리 카드 8개 → 업체 카드 리스트\n- **2차 IA**: 최근 등록 업체 → 가이드 콘텐츠 → footer\n- **CTA**: [좌] `검색하기` / [우] 각 카테고리 카드 클릭\n- **차별점**: 검색 의도 명확한 유저 + 탐색 유저를 fold 위에서 동시 수용\n- **라우트**: `/design-preview/main-r3-v02`\n\n### V03 — 타이핑 플레이스홀더 검색 히어로 `search-prominent` · FE: **mid**\n- **Hero**: 풀스크린 라이트, 중앙 검색 바. placeholder가 포장재 유형 CSS 순환 애니메이션. Linear 애니메이션 참조, 검색 UX에 적용\n- **1차 IA**: Animated 검색 바 → 인기 검색어 태그 클라우드 → 카테고리 browse 링크\n- **2차 IA**: 최근 등록 업체 카드 4개 → 가이드 featured 1편 → footer\n- **CTA**: 검색 바 `검색` 버튼 / 태그 클릭 = 검색 실행\n- **차별점**: 검색 의도를 플랫폼이 먼저 제안. 첫 방문 바이어 \"내가 찾는 게 여기 있구나\" 즉시 인지\n- **라우트**: `/design-preview/main-r3-v03`\n\n### V04 — 콘텐츠 + 카테고리 에디토리얼 `content/learning lead` · FE: **low**\n- **Hero**: 에디토리얼 스타일. 상단 featured 가이드 카드 (대형 이미지 + 제목 + 태그). 아래 카테고리별 가이드 섹션\n- **1차 IA**: Featured 가이드 카드 → 카테고리 quick chips → 최근 가이드 2×3 grid\n- **2차 IA**: 업체 directory 링크 배너 → 인기 카테고리 업체 → footer\n- **CTA**: 카드 내 `가이드 읽기 →` / 우측 상단 `업체 찾기 →` 헤더 CTA\n- **차별점**: 콘텐츠를 진입점 삼아 SEO 트래픽 → vendor profile 전환 퍼널\n- **라우트**: `/design-preview/main-r3-v04`\n\n### V05 — 상황별 온보딩 플로우 `content/learning lead` · FE: **mid**\n- **Hero**: 질문형 \"포장재 파트너를 찾고 계신가요?\" 대형 타이포 + 상황 선택 카드 3개 (처음 구매 / 공급사 변경 / 대량 견적). 채널톡 온보딩 참조\n- **1차 IA**: 질문 headline → 상황 카드 3개 → [선택 후] 맞춤 카테고리·업체 필터 결과\n- **2차 IA**: 일반 카테고리 browse → 가이드 콘텐츠 → footer\n- **CTA**: 각 상황 카드 클릭 = 온보딩 CTA / 헤더 `전체 업체 보기` 탈출 경로\n- **차별점**: 바이어 상황을 platform이 먼저 파악. 첫 방문 전환율 최적화\n- **라우트**: `/design-preview/main-r3-v05`\n\n### V06 — 업체 카드 쇼케이스 그리드 `vendor showcase lead` · FE: **low**\n- **Hero**: 미니멀 헤드라인 2줄 + 업체 카드 grid가 fold 안에 진입. Vercel framework 그리드 + ThomasNet 공급사 카드 결합. 카드: 업체명·카테고리·지역·썸네일\n- **1차 IA**: Headline + CTA → 업체 카드 3×2 grid (카테고리 filter tabs 포함)\n- **2차 IA**: 카테고리별 추천 업체 → 가이드 콘텐츠 배너 → footer\n- **CTA**: `전체 업체 보기 →` / 카드 클릭 = 업체 프로필\n- **차별점**: \"여기에 업체들이 있다\"를 fold 위에서 시각 증명. 빈 directory 공포 해소\n- **라우트**: `/design-preview/main-r3-v06`\n\n### V07 — 업체 통계 + 디렉토리 매트릭스 `vendor showcase lead` · FE: **low**\n- **Hero**: 대형 숫자 통계 (등록 업체 N개·N개 포장 카테고리) hero 중앙 점령. 토스플레이스 통계 배너 참조. 통계 아래 카테고리 디렉토리 리스트\n- **1차 IA**: 통계 숫자 배너 → 카테고리 디렉토리 리스트 (2열) → Browse CTA\n- **2차 IA**: 최근 등록 업체 하이라이트 → 포장재 가이드 → footer\n- **CTA**: `업체 찾기` 버튼 (primary) / 각 카테고리 링크 클릭\n- **차별점**: 규모와 신뢰를 숫자로 먼저 전달. 한국 B2B 의사결정자 패턴 직접 대응\n- **라우트**: `/design-preview/main-r3-v07`\n\n### V08 — 미니멀 에디토리얼 (Stripe 톤) `minimal/editorial` · FE: **low**\n- **Hero**: 풀스크린 라이트, 중앙 대형 타이포 헤드라인 (2줄 이내), 배경 여백 극대화. Stripe 정석 참조\n- **1차 IA**: 대형 headline → CTA 2개 (업체 찾기 / 업체 등록) → 스크롤 → 카테고리 카드\n- **2차 IA**: 카테고리 카드 그리드 → 업체 카드 → 가이드 콘텐츠 → footer\n- **CTA**: `포장재 업체 찾기` (primary) / `업체로 등록하기 →` (ghost)\n- **차별점**: 정보 노이즈 0. 브랜드 성숙도를 여백으로 전달. 경쟁사 대비 신뢰감 차별화\n- **라우트**: `/design-preview/main-r3-v08`\n\n### V09 — 다크 미니멀 (Linear 톤) `minimal/editorial` · FE: **mid**\n- **Hero**: 풀스크린 다크 (#0f0f10 또는 purple-950), grain texture, 중앙 라이트 headline + 검색 바. 스크롤 시 라이트 섹션 전환. Linear 다크 hero + 검색 결합\n- **1차 IA**: 다크 hero + 검색 바 → 카테고리 chips (outline) → [스크롤] 라이트 섹션\n- **2차 IA**: 라이트 배경 업체 카드 그리드 → 가이드 콘텐츠 → footer\n- **CTA**: 검색 `검색` 버튼 (white on dark) / `카테고리 둘러보기` ghost chip\n- **차별점**: 한국 포장재 B2B에서 다크 테마 메인 = 즉각적 시각 차별화. 프리미엄 포지셔닝 선점\n- **라우트**: `/design-preview/main-r3-v09`\n\n### V10 — 한국 B2B 정공법 (토스플레이스·채널톡 톤) `한국 B2B emulation` · FE: **low**\n- **Hero**: 좌우 split. 좌: 굵은 한국어 헤드라인 + 서브텍스트 + CTA. 우: 포장재 카테고리 시각. 토스플레이스 split + 채널톡 bold 카피 결합\n- **1차 IA**: [좌] 슬로건 + CTA 2개 | [우] 카테고리 시각 → 신뢰 지표 (업체 수 배너)\n- **2차 IA**: 주요 기능 아이콘 3개 (검색·비교·문의) → 카테고리 디렉토리 → 가이드 → footer\n- **CTA**: `지금 업체 찾기` (primary, 보라색) / `업체로 등록하기` (outline)\n- **차별점**: 한국 B2B 구매 담당자에게 가장 친숙한 패턴. 학습 곡선 0. 신뢰+정보 밀도 균형\n- **라우트**: `/design-preview/main-r3-v10`\n\n---\n\n## Part 3. CMO 권장 Top-3\n\n| 순위 | 컨셉 | 이유 |\n|------|------|------|\n| **1위** | **V01 검색 게이트웨이** | 검색 플랫폼 본질 그대로, 선행 사례 검증됨, FE low |\n| **2위** | **V06 업체 카드 쇼케이스** | 디렉토리 UX 직관적, fold 위 업체 노출로 빈 platform 인식 해소, FE low |\n| **3위** | **V09 다크 미니멀** | 시각 차별화 + 검색 UX 결합, FE mid이나 포지셔닝 효과 큼 |\n\n---\n\n## Part 4. FE 난이도 라벨\n\n| low (7개) | mid (3개) | high (0개) |\n|-----------|-----------|-----------|\n| V01, V02, V04, V06, V07, V08, V10 | V03, V05, V09 | — (lock 조건 준수 시 high 없음; V05 확장 시 high 격상 가능) |\n\n---\n\n## 다음 액션 (CEO 검토 요청)\n\n[CEO 검토 요청] r3 brief 완료 — 10개 컨셉 명세 확인 후 FE implement child 발의 (10 라우트 + 인덱스 비교 페이지) 부탁드립니다."
