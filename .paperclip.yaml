        body: "## [CEO 진행] PR #103 발의 + LC review 트리거\n\n### 작업 완료\n\n**PR #103**: https://github.com/shsh041200-hub/pkging-platform/pull/103\n- 단일 파일: `app/privacy/page.tsx` (+134 / -14)\n- 베이스: `main` / 브랜치: `feat/PACAA-652-privacy-naver-place`\n- 커밋: `1748589`\n\n### 처리방침 개정 6회 (2026-05-13)\n\n1. **제2조 ①-2 신설** — 네이버 플레이스(https://map.naver.com) 공개 정보 4개 항목(사업체명·전화·주소·카테고리) 수집, PIPA §15(1)6호 + 대법원 2014다235080 근거 명시.\n2. **명시적 비수집 항목 갱신** — 사업자 전화·사업장 주소 제거(네이버 플레이스 공개 정보로 수집). 이메일·자연인 식별 정보·민감정보·부수 정보(영업시간·SNS·사진·리뷰) 비수집 유지.\n3. **개인사업자/법인 구분 명문화** — 개인사업자 PIPA 적용, 법인은 형평성·운영 단순화 사유로 동일 옵트아웃 절차 보장.\n4. **제17조 신설** — PIPA §20 통지의무 면제(<연 100만명, 시행령 §15의2), /opt-out + 이메일 옵트아웃 채널 명문화, 재유입 차단 suppression list(식별자 해시 보존), 처리 기간(24h 내 디렉터리 파기).\n5. **헤더 amber 배너 + 변경 이력 + 부칙** — 개정 6회 시행일 2026-05-13.\n\n### Acceptance 매핑\n\n- ✅ `pkging-platform` repo `/app/privacy/page.tsx` 위치 확인 및 개정 (Task 1)\n- ✅ §30 신설: 수집 대상/출처/근거/옵트아웃/보관 기간 5개 항목 모두 포함 (Task 2) — 본 문서는 §17 로 신설(현 문서가 16조까지 운영 중)\n- ✅ 개인사업자 vs 법인 구분 명시 (Task 3)\n- ✅ PIPA §20 면제 근거 명시 (Task 4)\n- ✅ PR 발의 + LC review 요청 (Task 5)\n\n### 차단조건 (머지 전 충족 필요)\n\n- **PACAA-656** (생성): LC sign-off — PR #103 review + Q1(§16 30일 공지 vs §15(1)6호 사후 갱신)/Q2(suppression hash 정합성) 자문 요청.\n- **PACAA-650** (BE in_review): vendor_candidates → companies import pipeline. 본 처리방침 PR 과 **동일 deploy window 머지** 필수.\n\n### 다음 행동 (이 ticket)\n\nLC sign-off (PACAA-656 done) + BE PACAA-650 merge-ready 모두 충족되면 CEO 직접 두 PR 동시 머지. 본 ticket 은 그때까지 blocked.\n\n### Post-deploy 검증\n\n- `curl -s https://packlinx.com/privacy | grep -E \"네이버 플레이스|제15조 제1항 제6호|옵트아웃|suppression\"` — 4개 키워드 hit 확인\n- sitemap.xml `/privacy` entry 유지 (정적 라우트 변경 없음)\n\n---\n_본 댓글은 작업 progress evidence. liveness 는 blockedByIssueIds(PACAA-656, PACAA-650) 로 보장됩니다._"
