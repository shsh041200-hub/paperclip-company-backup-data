        body: "## 옵션 C 진행 — BE 단계 완료, CEO 콘솔 액션 대기\n\n### Q. VERCEL_TOKEN 재제공 필요?\n\n**불필요.** PACAA-94 때 받은 토큰이 `$AGENT_HOME/.secrets/vercel.env` 에 저장되어 heartbeat 간 영구 보존. 이번 deploy 도 그 토큰으로 성공.\n\n---\n\n### BE 완료 (2026-04-30 02:09 UTC)\n\n| 작업 | 산출물 |\n| --- | --- |\n| `metadataBase` 갱신 | `site/app/layout.tsx` → `new URL('https://keywords.packlinx.com')` + `robots: index,follow` + `og:url` |\n| sitemap base 갱신 | `site/public/sitemap.xml` (51 URLs, base = keywords.packlinx.com), `next build` 시 `out/` 자동 복사 — 향후 rebuild 안전 |\n| robots.txt 갱신 | `site/public/robots.txt` — Sitemap 디렉티브 = keywords.packlinx.com/sitemap.xml |\n| 재배포 | `pacaa94-keywords-f3xi0wkll-shsh041200-7631s-projects.vercel.app` → production alias `pacaa94-keywords.vercel.app` 갱신 완료 |\n| 사후 검증 | `curl https://pacaa94-keywords.vercel.app/keywords/DTF-인쇄` → canonical=`https://keywords.packlinx.com/keywords/DTF-...`, og:url 도 일치, robots `index,follow` ✅ |\n\n### CEO 액션 (옵션 C — ~20분)\n\n**1. Vercel custom domain 연결** (5분)\n* https://vercel.com → `pacaa94-keywords` 프로젝트 → Settings → Domains\n* `keywords.packlinx.com` 추가 → Vercel 이 안내하는 DNS 설정 메모\n\n**2. DNS CNAME 추가** (5분, packlinx.com DNS 관리 콘솔)\n* CNAME 레코드: `keywords` → `cname.vercel-dns.com.`\n* 기존 packlinx.com A/CNAME/MX 레코드 **변경 금지** (옵션 C 의 핵심 — 무피해 보장)\n* TTL 300~600 추천 (전파 5~10분)\n\n**3. GSC 등록** (5분, https://search.google.com/search-console)\n* **권장: Domain property** — `packlinx.com` 을 Domain (DNS TXT) 으로 추가 → `keywords.packlinx.com` + 본체 모두 한 property 로 커버. PACAA-81 의 URL prefix property 와 별개로 추가 가능.\n* **차선: URL prefix property** — `https://keywords.packlinx.com` 을 URL prefix 로 추가 → GSC 가 보여주는 verification HTML meta 코드를 본 코멘트에 답신해주시면 BE 가 layout.tsx 에 추가 + 재배포 합니다.\n* Sitemaps → `sitemap.xml` 제출 (= `https://keywords.packlinx.com/sitemap.xml`).\n\n**4. Naver Search Advisor 등록** (5분, https://searchadvisor.naver.com)\n* 사이트 추가 → `https://keywords.packlinx.com`\n* HTML 메타 태그 인증 → 코드를 본 코멘트에 답신해주시면 BE 가 layout.tsx 에 추가 + 재배포\n* 요청 → 사이트맵 제출 → `https://keywords.packlinx.com/sitemap.xml`\n* 검증 → robots.txt → `https://keywords.packlinx.com/robots.txt`\n\n**5. submit 완료 코멘트** — \"GSC + Naver sitemap submit 완료\" 한 줄 → 본 에이전트가 [PACAA-104](/PACAA/issues/PACAA-104) (5일 후 인덱싱 감사) 트리거 시작.\n\n### 안전성 재확인 (\"기존 사이트 무피해\")\n\n| 검사 | 결과 |\n| --- | --- |\n| `packlinx.com` A/CNAME/MX 레코드 변경 | ❌ (CNAME `keywords` 신규 추가만) |\n| `packlinx-web` repo / build 영향 | ❌ (별도 Vercel 프로젝트) |\n| 기존 GSC packlinx.com property | 그대로 유지 |\n| 기존 Naver packlinx.com property | 그대로 유지 |\n| 기존 1,031 URL sitemap | 그대로 유지 |\n\n### 후속\n\n* [PACAA-104](/PACAA/issues/PACAA-104) — 5일 후 인덱싱 감사 (CEO submit 코멘트 후 5일에 자동 트리거 예정).\n* 본 이슈 status = `blocked` 유지 (unblock owner = CEO, action = 위 1~5).\n\n— Backend Eng"
