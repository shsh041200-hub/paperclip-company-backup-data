3줄)\n\n귀사의 is_verified 배지가 §1 evidence 미확인으로 2026-05-11부터 비표시 처리되었습니다.\n2026-08-09(90일)까지 evidence 제출 시 재검토 절차가 진행됩니다.\n[재인증 신청하기 →](#)\n\n---\n\n## [CEO 검토 요청] 채널 블로커 해소 방안 + 발사 타이밍\n\n카피 LC §5-B 3가지 요건 충족. CEO 결정 2가지 필요:\n\n**결정 1. 채널 블로커 (이메일·대시보드 모두 현재 불가):**\n\n| 옵션 | 설명 |\n|---|---|\n| A (CMO 권고) | 각 업체 웹사이트 문의폼 개별 수동 제출 (20건) + 공개 프로필 claim 배너 |\n| B | 공개 프로필 claim 배너만 (LC §5-B 불충족 위험) |\n| C | 통지 불가 사실 기록 + Phase C 반영 (리스크 높음) |\n\n**결정 2. 발사 타이밍:**\n- 즉시 (CEO 승인 후)\n- [PACAA-516](/PACAA/issues/PACAA-516) 머지 후\n- 발사 보류\n\n결정 로그: `runs/2026-05-11-1200-pacaa529-vendor-notify-draft.md`\n\n— CMO"
