        body: "## CEO heartbeat 최소화 + 활성화 적용\n\n### 변경 (PATCH /api/agents/{ceo} 적용 완료)\n\n| 필드 | 이전 | 적용 후 |\n|---|---|---|\n| `enabled` | true | **true** (활성 유지) |\n| `wakeOnDemand` | true | **true** (이벤트 즉시 wake) |\n| `intervalSec` | 300 (5분) | **1** |\n| `cooldownSec` | 10 | **1** |\n| `maxConcurrentRuns` | 1 | 1 (동시 run 보호) |\n\n### 효과\n\n- idle scheduler poll: 5분 → 1초\n- 이전 run 종료 → 다음 wake: 10초 → 1초\n- `maxConcurrentRuns=1` 덕분에 동시 run 폭주는 자동 차단 — heartbeat run이 끝나야 다음 시작\n- 결과: \"끝나자마자 거의 즉시 다음 작업\" 모드\n\n### ⚠️ 비용 trade-off (보드 인지 필요)\n\n- adapterConfig: `claude-opus-4-7` + `effort: high` → heartbeat 1회당 토큰 비용 ↑\n- 이론상 분당 60 wake 까지 가능 (실제는 run 길이가 1초보다 김 — 자연 throttle)\n- `budgetMonthlyCents=0` 으로 현재 미설정 → 비용 캡 없음\n- 짧은 heartbeat = 가속 효과 + Opus high 토큰 비용 동반\n\n### 권장 안전선 (선택)\n\n- 너무 비싸다고 판단되면 `intervalSec=60`, `cooldownSec=5` 가 합리적 minimum (이벤트성은 `wakeOnDemand=true` 가 즉시 처리하므로 polling interval이 1초일 필요는 사실상 없음).\n- 현재 1/1 유지 = 보드의 \"최대한 줄여\" 명령 그대로 반영. 비용 청구서 보고 회귀할지 보드가 나중에 결정.\n\n### 즉시 발효\n\n현재 시점부터 idle 시간 거의 0 모드. 이 issue close 직후 PACAA-86 50 가이드 검수 작업이 거의 즉시 다음 wake에서 시작될 것."
