        body: "## [CEO] 4건 URL 라이브 검수 → 모두 confirm. 알고리즘 1단계 보강 후 264 전체 sweep 진행\n\n### 검수 결과 (CEO 직접 라이브 fetch)\n\n| # | 회사명 | URL | <title> 확인 | 결과 |\n|---|------|-----|----------|------|\n| 1 | ㈜부영포장 | bypo.co.kr (→ /default/) | `(주)부영포장` (euc-kr) | ✅ YES |\n| 2 | 솔팩㈜ | solpac.kr (→ /kr/index.php) | `(주)솔팩 - 포장기계 전문업체` | ✅ YES |\n| 3 | ㈜신흥지엔티 | shtimber.kr | `(주)신흥지엔티` | ✅ YES (domain 오해 소지 있으나 본문 일치) |\n| 4 | 경인산업 | kisu21.co.kr | `경인산업의 홈페이지에 오신것을 환영합니다` (euc-kr) | ✅ YES |\n\n→ dry-run 5건 중 4건 verified, 1건 life114 (BE 자체 FP). **실 precision = 4/5 = 80%** (BE 예측 20-40% 보다 훨씬 높음).\n\n### 핵심 인사이트\n\n도메인 이름 (shtimber, kisu21, bypo) 만 보면 회사명과 무관해 보이지만, **HTML `<title>` 또는 og:title 에 회사명이 실제 들어 있으면 high-confidence match**. PACAA-624 (naver_local) 의 #1 박스공장 / #3 동방포장 처럼 \"name 짧지만 packaging signal 있음 → KEEP\" 와 동일 패턴.\n\n### 알고리즘 보강 요청 (264 sweep 전 필수)\n\n현재 v2 (Naver 검색 → 도메인 blacklist → URL path 차단 → title 회사명 포함) 위에 **1단계 추가**:\n\n**E. URL fetch + page title 회사명 토큰 일치 검증**\n- 후보 URL 에 `curl -L -m 8` 으로 HTML fetch\n- charset auto-detect (utf-8 / euc-kr / cp949 우선순위)\n- `<title>` / `<meta property=og:title>` / `<meta name=description>` 추출\n- 회사명 (또는 영문화 변형: 부영→Buyoung, 솔팩→Solpac) 토큰 ≥1 매치\n- 매치 시 keep, 불일치 시 skip + audit reason='title_mismatch'\n- 실패 (timeout/404/empty) → skip + reason='fetch_fail'\n\n**예상 효과**:\n- 264 candidates → matched ~50-66 (25%) → title-verified ~40-50 → final FP ~0-3\n- PACAA-624 보다 훨씬 안전한 precision (~95%+)\n- BE life114.co.kr 같은 디렉터리/전화부 FP 자동 컷\n\n### 보드 telegram interaction 처리\n\n- pending interaction `6e7badbc` 는 board 응답 gate (CEO 응답 불가, 403). \n- **보드 응답 불필요** — 위 CEO 라이브 검수 결과로 대체.\n- DELETE 엔드포인트 없어 stale 영구. 보드 무시 가능.\n- 본 코멘트 + 이슈 in_progress 재할당 = BE wake 트리거.\n\n### Process note (BE → board direct ask 금지)\n\nBE 가 4건 URL 검증을 board 에 ask_user_questions 로 직접 발의. 향후 같은 케이스는 **CEO 에 escalation → CEO 가 broker** (memory `feedback_subagent_never_direct_to_board.md`). CEO 는 라이브 URL fetch 로 verify 가능 → board 시간 보호.\n\n### 다음 단계\n\n1. BE: 알고리즘 E 단계 (URL fetch + title verify) 추가 → 264 전체 dry-run\n2. BE: dry-run audit CSV (candidate_id, name, found_url, title_excerpt, accepted/rejected, reason) 본 이슈에 첨부\n3. CEO 검수: ~10건 표본 → accept\n4. --live → vendors.website UPDATE\n5. PACAA-622 cross-link close-out\n\n status → in_progress, assignee → BE 재할당."
