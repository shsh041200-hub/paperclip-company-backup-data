        body: "## 정정 — 제가 앞 코멘트에서 다른 라우트를 가리켰습니다\n\n**보드가 본 URL `http://localhost:3001/keywords/test-keyword` 가 진짜 \"키워드 페이지\" 가 맞습니다.** 제가 앞에서 `/use-cases/[slug]` 로 답한 건 메인 레포(github `pkging-platform`)의 다른 라우트였고, **실제 PACAA-86 키워드 페이지는 별도 PoC 코드베이스에 있습니다.**\n\n## 키워드 페이지 = `/keywords/{슬러그}` (정확한 답)\n\n- **위치:** `~/.paperclip/instances/default/workspaces/e50c5dc8-…/life/projects/packlinx-web` (PoC 별도 Next 프로젝트, git remote 없음, local-only)\n- **포트:** 3001 (tmux `packlinx-web-verify` 가 prod-build 로 가동 중)\n- **라우트:** `app/keywords/[slug]/page.tsx` (Next.js App Router, ISR 6h revalidate)\n- **데이터 레지스트리:** `lib/keyword-data.ts` 의 `KEYWORD_REGISTRY` — **50 키워드 + 1 테스트 슬러그 = 총 51개**\n  - 예: `골판지박스-제작`, `택배박스-제작`, `박스-견적`, `소량-박스-제작`, `박스-주문제작`, `우체국택배박스-가격` 등\n  - `test-keyword` = 보드가 방금 본 더미 슬러그 (\"테스트 키워드 포장재 공급업체\")\n\n## 페이지가 하는 일\n\n사용자가 네이버/구글에서 \"골판지박스 제작 업체\" 같은 검색어를 치면 → 이 페이지가 검색 결과 상위에 떠서 유입 → 페이지 내용:\n\n1. **H1 + meta:** 키워드별 한국어 타이틀/디스크립션 (KEYWORD_REGISTRY 에서 직접 박힘)\n2. **벤더 리스트:** 키워드의 `category` (paper / plastic / flexible / eco / glass / metal) 와 매칭되는 Supabase `companies` 테이블 row top 20\n   - 정렬: `is_verified` desc, `updated_at` desc\n   - DoD 가드: 벤더 < 5개면 noindex 권고 (현재 미구현 — Backend 가 교체할 stub)\n3. **JSON-LD:** ItemList 구조화 데이터 (Google 리치 결과용)\n4. **canonical:** `${SITE_URL}/keywords/{slug}` — `https://packlinx.vercel.app` 기본\n\n## 진행 상태 (PACAA-86 관점)\n\n- **PoC 부트스트랩 완료** (commit `9fe1ddf` \"feat: Next.js PoC bootstrap — keyword route + hand-off interface\")\n- **Backend 가 lib/keyword-data.ts stub 교체** 단계 — Supabase 실데이터 연결, 정확도 검증.\n- **메인 레포 통합 vs 영구 분리**는 아직 미결정 — PoC 가 메인 `pkging-platform` 레포에 없는 채로 별도 codebase 로 운영 중. (\\*PACAA-86 마무리 즈음 마이그레이션 검토 필요 — 운영 부담 ↓ 하려면 메인으로 합쳐야 sitemap/도메인/배포 일관성 확보됨.)\n\n## 한 줄로\n\n**`/keywords/{슬러그}` = 50 키워드 × 카테고리 매핑된 벤더 리스트 SEO 랜딩** — 12주 후 ≥20개 SERP top 10 진입이 success/kill 게이트."
