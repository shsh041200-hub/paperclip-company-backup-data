OK 인지, 추가/병합 필요 영역 |\n| 카드 디자인 | 카테고리 chip 색상 (orange) · 카드 패딩 · hover 효과 |\n| 키워드 chip | 카드별 2~3개 키워드 노출 — 정보 과다 / 적정 / 부족 |\n| 검색·필터 UX | input + chip 조합 — 더 단순 / 그대로 / 카테고리 메뉴 추가 |\n| 트렌드 강조 | 브랜드 그라데이션 카드 — 너무 튐 / 그대로 / 더 강조 |\n| 모바일 반응형 | 폭 좁혀서 1-col 자동 전환 확인 |\n\n### 다음 액션 (보드 응답 후)\n\n- **시안 OK** → P0 child issue 발의 (CTO 또는 프론트 작업자 배정, `lib/guide-data.ts` 카테고리 필드 추가 + index 페이지 카드 그리드 구현)\n- **수정 필요** → 본 mockup 수정 v2 업로드\n- **방향 전환** → Figma 시안 또는 다른 톤·구성 시도\n\n— [PACAA-404](/PACAA/issues/PACAA-404) · 첨부 `guides-mockup.html` (26KB)\n"
