        body: "## 외부 소스 vendor 수집 완료 — 6개 카테고리 모두 목표 달성\n\n### 최종 수집 결과\n\n| 카테고리 | 이전 raw | 최종 raw | 목표 | 달성 | 신규 |\n|---|---|---|---|---|---|\n| 라벨·스티커 | 3 | 200 | 200 | ✅ 100.0% | +197 |\n| 인쇄·후가공 | 38 | 302 | 300 | ✅ 100.7% | +264 |\n| 포장 부자재 | 23 | 206 | 200 | ✅ 103.0% | +183 |\n| 연포장재 | 111 | 259 | 255 | ✅ 101.6% | +148 |\n| 유리·금속 용기 | 36 | 102 | 100 | ✅ 102.0% | +66 |\n| 포장기계·자동화 | 9 | 89 | 80 | ✅ 111.2% | +80 |\n\n**총 신규 수집: 938건 (source: naver_place)**\n\n---\n\n### 수집 방법\n\n**소스:** naver_place — `search.naver.com?where=place` 검색 결과 사전 렌더링 JSON 파싱\n\n**접근 실패 소스 (네트워크/인증 제한):**\n- Naver Maps API: 404 (URL 구조 변경)\n- Naver pcmap GraphQL: 429 rate-limited\n- Enterkorea (enter.co.kr): SSL 인증서 오류\n- KPA (kpacking.or.kr): DNS 해석 실패\n- Kakao Maps REST API: KakaoAK 인증키 없음\n\n**파이프라인:** `plans/naver_scraper.py`\n- 카테고리별 20-25개 키워드 × 평균 5-8건/검색어 = 목표 달성\n- Supabase Management API 직접 SQL INSERT 사용 (PostgREST partial-index ON CONFLICT 미지원 우회)\n- `ON CONFLICT (category_id, source, source_id) WHERE source_id IS NOT NULL AND deleted_at IS NULL DO NOTHING` — 멱등성 보장\n- `collection_run_id` 포함 (모든 배치 감사 추적 가능)\n\n---\n\n### P1.3 dedup 준비 사항\n\n1. **source_id 품질:** place_id 미확인 레코드는 `name+address` MD5 해시 사용 → 동일 업체 키워드별 중복 가능성 있음. P1.3 pg_trgm 유사도 매칭으로 처리.\n2. **단일 소스 수집:** 네트워크 제한으로 naver_place만 사용. google_business/kpa_member/enterkorea 보완 수집은 API 키 확보 후 별도 heartbeat로 가능.\n3. **비즈니스명 정규화:** dedup_status='raw' 전부 — 이름 정규화는 P1.3 범위.\n\n---\n\n### 완료 조건 달성\n\n6개 카테고리 모두 raw_count 목표 달성 (2026-05-12 마감 대비 2주 조기 완료).\n\n**다음 단계:** [PACAA-38](/PACAA/issues/PACAA-38) P1.3 dedup pipeline 착수 준비 완료."
