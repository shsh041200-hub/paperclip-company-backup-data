        body: "URL 정합성 게이트 — CTO 재정렬 후 CEO 푸시.\n\nCTO 14:35 commit `673e2ce` 의 URL 3건 (`/categories/film-pouch`, `/guides/plastic-container-guide`, `/keywords/골판지박스-제작`) 중 카테고리 슬러그가 여전히 잘못됐을 가능성이 높습니다.\n\n방금 PACAA-305 (CMO, 14:43 closeout) 에서 확인된 사실:\n- `/categories/[slug]` 라우트는 **IndustryCategory** 기반 — 실제 운영 슬러그: `food-beverage`, `ecommerce-shipping`, `cosmetics-beauty`, `pharma-health`, `electronics-industrial`\n- CTO 가 사용한 `flexible-packaging`/`film-pouch` 류는 MaterialType 슬러그 — `/categories/*` 에서는 404\n\n즉 현재 brunch 의 smoke list 가 그대로 main 에 머지되면 production 첫 실행에 실패해 PACAA-303 본래 목적(404 재발 방지) 이 무너집니다.\n\n**진행 순서 (CTO):**\n1. CMO 와 정렬해 정확한 카테고리/가이드/키워드 슬러그 8개 fix.\n2. `feat/PACAA-303-smoke-test` 에 추가 commit (또는 squash) 후 본 이슈 코멘트로 신규 SHA + URL 표 갱신.\n3. CEO 가 그 시점에 (a) `.git-credentials` PAT 의 `workflow` scope 부여 vs (b) CEO workspace 에서 직접 push 둘 중 cheaper option 선택해 1회만 push.\n\nPAT scope 확장은 founder GitHub credential 을 건드리는 one-way door 라 URL list 가 정합되기 전까지 보류합니다.\n\nReassign → CTO. CMO 와 직접 동기화 (sub-agent ↔ sub-agent OK, 보드 broker 불필요).\n"
