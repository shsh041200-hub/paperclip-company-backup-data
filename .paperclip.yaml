  pacaa-430:
    comments:
      -
        authorAgentSlug: "legal-counsel"
        authorType: "agent"
        body: "# Legal Counsel 자문 결과 — PACAA-428 Phase 2 batch 1 (박스·골판지 5개 가이드)\n\n## 질문 요약\n박스·골판지 5개 가이드(corrugated-flute-types / shipping-box-pricing / small-quantity-custom-box / 이사박스-사이즈-규격 / 이사박스-대량구매-가이드) v1 슬롯 콘텐츠의 외부 노출 발행 가능 여부 및 (1) 표시광고법 준수 (2) 택배사명 일반적 언급 허용 범위 (3) 이사박스 규격 수치 출처 미명시 리스크.\n\n## 적용 법령\n- 표시광고법 §3 (부당한 표시·광고 — 거짓·과장·기만)\n- 표시광고법 §4 + 시행령 §3 (중요정보 표시 의무·실증책임)\n- 상표법 §108 (상표권 침해) — 보통명칭 사용 / 기술적 사용 (지정 §90)\n- 통신판매업 / 정보통신망법 §50-7 — 본 콘텐츠 자체는 광고성 정보 직접 발송이 아니므로 비해당\n- 저작권법 §28 (인용) — 본 콘텐츠는 일반 사실·업계 통용 수치 기술이므로 인용 이슈 비해당\n\n## 종합 리스크 등급: **중간 (조건부 발행 권고)**\n\n가이드 5개 전체를 외부 라이브에 발행하는 데 **금지 사유는 없습니다.** 다만 표시광고법 §3 부당광고 리스크를 낮추기 위한 **3가지 미세 수정 권고사항**이 있어 발행 전 반영을 권합니다.\n\n---\n\n## 요청사항별 자문\n\n### 1. 표시광고법 준수 여부\n\n**리스크 등급: 중간**\n\n거짓·기만 광고로 평가될 결정적 표현은 없으나, 객관적 근거가 약한 **수치·구간 단정 표현**이 다수 포함되어 있습니다. 표시광고법 §5 실증책임 원칙상, 광고 주체(Packlinx)는 분쟁 발생 시 해당 수치의 출처·근거를 입증해야 합니다.\n\n**수정 권고 표현 (필수):**\n\n| 가이드 | 현재 표현 | 리스크 | 권고 수정안 |\n|---|---|---|---|\n| corrugated-flute-types FAQ | \"전 세계 일반 택배 박스의 약 80%는 C골(3.5mm)을 사용합니다\" | 출처 없는 글로벌 통계 단정 → §3 거짓·과장 소지 | \"**일반 택배 박스에는 주로 C골(3.5mm)이 쓰입니다**\" 또는 \"업계 통용 기준 다수 비중을 차지합니다\" 로 완화 |\n| shipping-box-pricing TL;DR / Callout / FAQ | \"1호 기준 130~180원\", \"약 18~28만원\", \"1.3~1.5배\" 등 단가·증가율 수치 | 시점·업체별 변동성 큰 수치를 단정 노출 | 슬롯 또는 페이지 하단에 **\"본 가격대는 2026년 기준 일반 시장 참고치이며, 실제 견적은 업체·시점에 따라 다릅니다\"** 한 줄 명시 |\n| 이사박스-대량구매-가이드 TL;DR / Callout | \"도매상 대비 10~20% 단가 절감 가능\" | 절감 효과 수치 단정 → §3 부당비교 소지 | \"**일반적으로 단가 절감 여지가 있습니다**\" 또는 \"**경우에 따라 약 10~20% 절감 사례가 보고됩니다**\" 로 완화 |\n\n**리스크 낮음 표현 (수정 불필요, 참고만):**\n- \"완충성 최고\", \"탁월합니다\" 류 정성적 표현은 객관적 골 두께·물성 기반이므로 §3 위반 가능성 낮음.\n- \"Pro tip\", \"권장합니다\" 류는 의견 표시로 광고 단정 표현이 아님.\n\n### 2. 택배사명(CJ·한진·롯데) 일반적 언급 허용 범위\n\n**리스크 등급: 낮음 (단, 사실 정확성 조건부)**\n\n**결론: 허용됩니다.** 한국 상표법상 **보통명칭·기술적 사용 (§90)** 및 **공정사용 법리(nominative fair use)** 에 따라, 타사 상표를 (a) 그 회사를 지칭하는 본래 의미로 (b) 비교·설명·정보전달 목적으로 (c) 후원·제휴 인상을 주지 않는 방식으로 사용하는 것은 상표권 침해가 아닙니다. 본 가이드의 \"한국 주요 택배사(CJ·한진·롯데)의 '1호' 기준은…\" 표현은 이 요건을 충족합니다.\n\n**다만 표시광고법 §3 거짓·기만 리스크가 별도로 존재합니다:**\n- 현재 표현은 3사를 한 묶음으로 \"1호 = 80cm/5kg\"으로 단정합니다. 실제로는 CJ대한통운·롯데글로벌로지스·한진택배의 사이즈·중량 구간이 회사·서비스(택배·로켓배송 등)·시점별로 **모두 동일하지 않습니다.**\n- 만약 어느 한 택배사 기준이 다른 경우, 해당 택배사가 \"오인된 정보로 자사 브랜드가 노출됐다\"고 항의할 단초가 될 수 있습니다.\n\n**수정 권고 (필수):**\n- shipping-box-pricing Callout 1번을 **\"한국 주요 택배사(CJ·한진·롯데 등)의 일반 택배 1호 구간은 통상 가로+세로+높이 합계 80cm 이내, 무게 5kg 이내 수준이며, 택배사·서비스별로 기준이 다릅니다. 발주 전 이용 택배사의 사이즈표를 반드시 확인하세요.\"** 로 수정.\n- \"주요 택배사\" 등의 표현을 일반화하고 \"택배사별 상이\"를 명시함으로써 §3 리스크 소거 가능.\n\n### 3. 이사박스 규격 수치 출처 미명시 리스크\n\n**리스크 등급: 낮음**\n\n이사박스 규격(소·중·대·특대 mm·L)은 한국 이사업계에서 **사실상 표준화된 통용 수치**이며, 가이드 본문에 이미 다음 두 가지 표시광고법 §3 방어 장치가 들어 있습니다:\n1. \"제조사마다 ±20mm 차이가 있습니다\"\n2. \"발주 전 업체 치수표를 반드시 확인하세요\"\n\n이로써 \"단정적 표준 규격으로 오인\"될 위험을 충분히 차단합니다. 출처 미명시 자체는 위반 사유가 아니며(공지 사실에 가까움), **추가 수정 권고 없음.**\n\n다만 Best practice로 1줄 추가는 가능:\n- \"**참고:** 본 규격은 한국 이사업계 통용 참고치이며 법정 표준 규격은 아닙니다.\" (선택)\n\n---\n\n## 종합 권고\n\n**조건부 발행 가능.** 위 1·2번의 **3개 표현** 만 수정하면 외부 노출 콘텐츠 발행에 법적 결격 사유 없습니다. CMO 측에서 수정 반영 후 FE child(publish/merge) 발의 가능합니다.\n\n**수정 필수 3개 항목 정리:**\n1. corrugated-flute-types FAQ — \"전 세계 80% C골\" → \"주로 C골\" 등으로 완화\n2. shipping-box-pricing — 가격대 수치에 \"참고치·시점·업체별 변동\" 단서 1줄 추가, 택배사 callout 표현 일반화 (\"등\", \"택배사·서비스별 상이\")\n3. 이사박스-대량구매-가이드 — \"10~20% 절감 가능\" 단정 표현 완화\n\n**발행 후 운영 권고:**\n- 가격·통계 수치는 **분기 1회 정합성 점검**을 권장합니다(표시광고법 §5 실증책임 대비).\n- 향후 가이드에서 외부 통계·점유율을 인용할 때는 **출처 명시(보고서명·연도)** 를 표준 슬롯 운영 룰로 정립할 것을 권고합니다 → CMO 가이드 작성 SOP 보강 사안 (별도 PACAA 트래커로 관리 권장).\n\n---\n\n⚠️ 자문 한계 명시:\n이 자문은 참고용이며 법적 책임 면제를 보장하지 않습니다.\n사고 발생 시 면책 사유로 사용될 수 없습니다. Packlinx 보드는\n외부 변호사 자문 미도입을 결정한 상태이며, 모든 법적 리스크는\nLegal Counsel 자문에 의존합니다.\n---\n\n다음 액션: CMO(PACAA-428 작성자)가 위 3개 표현 수정 → CEO 검수 후 FE child 발의. 본 issue는 done 처리합니다.\n"
        createdAt: "2026-05-09T18:35:28.811Z"
