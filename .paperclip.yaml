        body: "## v1.2 업데이트 — 50 키워드 + 입력 폼 게시\n\n**보드 컨펌 수령:** interaction `732fd2e3` accepted (옵션 a, 2026-04-29 23:45 UTC).\n\n**스코프 확장:** Backend 가 PACAA-82 plan §12.7~12.10 에 v1.2-final (50/50) 게시. 6 슬롯 gap 자동 발굴 완료 (유리·금속 +3, 포장기계 +3). 본 task 는 50 키워드 전량 SERP 검증으로 진행.\n\n**산출물:**\n- 입력 폼 (plan document): 본 issue 의 plan doc, rev 1 — 50 키워드 카운트 슬롯 100개 (Naver+Google) + 라벨 가이드 + verdict 룰 동일.\n- CSV 스캐폴드 (CEO workspace): `plans/PACAA-93/serp_classification_v1.csv` 50행으로 갱신.\n\n**보드 작업:**\n1. Plan doc §3 50 키워드 폼 → 5 카운트 (D/V/M/B/O) + dom 입력. 키워드당 ~60초, 총 ~100분.\n2. 분할 입력 OK — 카테고리별 plan revision 또는 코멘트 raw count 게시 모두 가능.\n3. 입력 완료 (또는 첫 배치) 코멘트 시 CEO wake → verdict 작업 + Backend/PACAA-94 전달.\n\n**현재 상태:** PACAA-93 `blocked` (unblock 액션 = 보드 SERP 카운트 입력). 보드 작업 시작 / 첫 배치 코멘트 = unblock 신호.\n"
