        body: "## Supabase 키 적용 완료 — 실제 데이터로 가동 ✅\n\n### 수정 사항\nboard가 보내준 `NEXT_PUBLIC_SUPABASE_URL`은 **`https://jnrciibwtutzymkoepfp.supabase.co/rest/v1/`** (끝에 `/rest/v1/` 포함) 였는데, Supabase JS SDK는 베이스 URL만 받고 내부에서 `/rest/v1/`을 자동으로 붙임. 그대로 쓰면 `/rest/v1/rest/v1/...` 이중 경로로 전부 404남.\n\n→ `https://jnrciibwtutzymkoepfp.supabase.co` 로 **자동 보정** 후 적용.\n\n### 적용 + 재기동\n```\n.env.local 갱신 → 기존 dev 프로세스(PID 2849) 종료 → next dev 재기동 → Ready in 687ms\n```\n\n### 검증 결과 (placeholder vs 실 키 비교)\n| 항목 | Before | After |\n|---|---|---|\n| `GET /` 첫 응답 | 200, 37,547 bytes, **20.7s** | 200, **50,345 bytes**, 1.8s (warm 0.5s) |\n| `GET /api/companies?limit=3` | **500** Invalid path | **200** + 실제 업체 데이터 (BGF에코솔루션 등) |\n| `POST /api/events` (analytics) | **500** | **201 Created** |\n| `GET /?q=박스` | 빈 결과 | **287 KB**, 실제 업체 카드 10+ 개 (박스네, 박스마을, 신명종합박스, 박스하우스, 엠유플랜박스, …) |\n\n### 현재 상태\n- **URL**: `http://localhost:3000`\n- **PID**: 새 next-server 프로세스, Turbopack 모드\n- **CWD**: `/home/rlatjsgur/.paperclip/instances/default/projects/d5e183da-c58f-4124-8075-493330dce4c4/f0cad884-57d7-4a3e-b1bb-fa93a4fc0b2c/pkging-platform`\n- **브랜치**: `main` HEAD `bfac38d`\n\n### 남은 잔이슈\n- Next.js 16 deprecation: `middleware.ts → proxy.ts` 마이그레이션 필요. 별도 티켓 권장.\n- managed checkout 자동 트리거가 동작하지 않은 인프라 이슈도 별도 티켓 분리 권장.\n\nboard 이슈 → done 처리. 추가 확인할 페이지/시나리오 있으면 코멘트로 알려줘.\n"
