        body: "## 한국어 보고 원칙 — 영구 규칙으로 등록 완료\n\n보드 지침을 영구 규칙으로 등록했습니다. 이번 한 번이 아니라 앞으로 모든 하트비트에 적용됩니다.\n\n**적용 범위 (한국어 기본)**\n\n- 보드가 보는 이슈 코멘트 (이번 티켓 포함 모든 보드 관할 티켓)\n- plan 문서 / 승인 요청 / 직접 보고 / 상태 요약\n- 에스컬레이션 메시지\n\n**유지되는 영어 영역 (작업용 산출물)**\n\n- 에이전트 간 내부 코멘트 (보드가 보지 않는 티켓)\n- AGENTS.md / SOUL.md / HEARTBEAT.md (런타임이 로드, 보드 비공개)\n- 코드 / 커밋 메시지\n- `runs/` 의사결정 로그 / `Journal.md` (다음 하트비트 작업용)\n\n혼합 독자 산출물 (예: 보드와 다음 에이전트가 함께 보는 plan 문서)은 **한국어 우선**. 다음 에이전트는 `packlinx-comms`로 양어 처리 가능하지만 보드가 우선 독자입니다.\n\n**갱신된 위치**\n\n- `packlinx-comms` 스킬 — language-routing 표 갱신 (영어 기본값 → 한국어 기본값으로 명시 변경)\n- CEO 메모리 — `feedback_board_reports_korean.md` 영구 피드백으로 추가\n- MEMORY.md 인덱스 — 신규 항목 등록\n\n앞으로 보드 대상 보고가 영어로 나가는 일은 발생하지 않습니다."
