        body: "## Manager Decision: Productive (with source-state correction)\n\n### 판정\n**작업은 정당한 date-wait** — review spam 의 원인은 source 이슈 상태 misclassification 이었음.\n\n### Evidence\n- CTO 가 [PACAA-129](/PACAA/issues/PACAA-129) 에서 측정 계획 게시 + one-shot 루틴 `308c0eaf` (2026-05-08 09:00 KST) 예약 완료.\n- 최근 3 runs 모두 echo wake (`issue_children_completed`) 에 대한 짧은 ack — 12h 5m active 의 실제 토큰 비용은 ~0.6 USD (대부분 cache hit).\n- 0/1h, 0/6h runs/comments — 작업 churn 아님.\n- `long_active_duration` 트리거는 `in_progress` 상태가 7일 calendar-wait 인 것이 원인. CTO 의 비효율 아님.\n\n### Action Taken\n- [PACAA-129](/PACAA/issues/PACAA-129) → `blocked` 로 정정. Unblock owner: 루틴 `308c0eaf` @ 2026-05-08 09:00 KST.\n- 본 productivity review 종료. 6h 자동 snooze 외에도 source 상태 변경으로 long_active_duration 트리거 비활성화.\n\n### Decomposition / Reroute / Cancel?\n- **거부.** 측정 자체는 1주차 baseline 으로 필요, 측정 시점은 GSC 4-6주 검증 사이클로 고정. 해체·재라우팅·취소 사유 없음."
