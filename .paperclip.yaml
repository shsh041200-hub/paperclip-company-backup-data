        body: "## 김선혁님, 코멘트 받음 — 승인/선택 컨트랙트 혼동 수정 + 두 가지 견본 재발사\n\n### 한 줄 결론\n\n**맞는 지적이에요. PACAA-117 시나리오는 \"승인 / 거절\" 이 아니라 \"A / B 중 선택\" 이라 KIND_CHOICE 로 다시 짜고 발사했습니다. 추가로 진짜 \"승인 / 거절\" 시나리오 견본도 따로 발사해서 두 contract 차이를 보여드려요.**\n\n### 무엇이 잘못됐나\n\n직전 견본은 본문에 \"A) 지금 적용 / B) 묶어서 적용\" 로 적었지만 인라인 버튼은 결재 요청 표준의 [✅ 승인] [❌ 반려] 였어요. 본문 = 선택지인데 버튼 = 승인/거절 → 김선혁님이 어떻게 답해야 할지 정해지지 않은 상태. 제가 KIND_APPROVAL 빌더로 만들면서 본문은 선택지 형태로 채운 게 원인입니다. 한 메시지 안에 두 컨트랙트가 섞이면 안 됩니다.\n\n### 두 컨트랙트 분리 (v2 표준)\n\n| 분류 | 본문 끝 | 인라인 버튼 | 텍스트 답장 |\n|---|---|---|---|\n| **승인 (KIND_APPROVAL)** | \"승인 / 거절\" | [✅ 승인] [❌ 반려] | \"잘 모르겠음\" |\n| **선택 (KIND_CHOICE)** | \"1) ... 2) ... 번호로 답해 주세요\" | [1] [2] (최대 3) | \"잘 모르겠음\" |\n\n2단계 분류:\n1. 선택지가 \"하라 / 하지 마라\" 두 개 = **승인**.\n2. 선택지가 의미상 다른 두 개 (지금 vs 나중·A 호스트 vs B 호스트·플랜 1 vs 플랜 2) = **선택**.\n\nPACAA-117 시나리오 = 후자 (지금 적용 vs 묶어서 적용) → 선택.\n\n### 방금 발사한 두 견본\n\n**견본 1 — 선택 컨트랙트 (msg_id=200~201)**\n\n```\n김선혁님,\n[v2 형식 검증 sample — 실제 선택 요청 아닙니다.]\n\n▶ 무엇이 일어났나\n사이트맵에 vendor 1,031개만 등록되어 있었어요...\n\n▶ 왜 중요한가\nSG-2 직접 영향. 1st Priority 위배.\n\n▶ 결정해야 할 것\n1) 지금 적용 — 30분 내 200개 추가 노출, redirect 테이블은 PACAA-116 종료 후 1회 더 수정\n2) 묶어서 적용 — PACAA-116 끝날 때까지 약 1주 대기, redirect 테이블 1회 수정 ⭐\n\n권장 근거: PACAA-116 redirect 형식 미확정 → 분리 시 테이블 2회 수정 비용...\n\n번호로 답해 주세요. (잘 모르겠으면 \"잘 모르겠음\" — 추가 정보 드려요.)\n```\n\n인라인 버튼 = [1] [2] — 누르면 그대로 결정. \"잘 모르겠음\" 은 텍스트 답장.\n\n**견본 2 — 결재 컨트랙트 (msg_id=202~203)**\n\n진짜로 \"하라 / 하지 마라\" 만 있는 시나리오 (vendor 44건 화면에서 감추기) 로 만들었습니다.\n\n```\n▶ 결정해야 할 것\n승인 / 거절\n(답하기 어려우면 \"잘 모르겠음\" 텍스트로 답해 주세요 — 추가 정보 드려요.)\n```\n\n인라인 버튼 = [✅ 승인] [❌ 반려] — 본문도 \"승인/거절\" 만, 버튼도 \"승인/거절\" 만. 일관성 맞음.\n\n### 코드 패치 내역 (이번 heartbeat)\n\n- `_telegram_format.py`:\n  - 기존 `sample_approval_v2` 를 `sample_choice_v2` 로 분리 (PACAA-117 시나리오는 선택).\n  - 새 `sample_approval_v2` 추가 — 진짜 binary 승인 시나리오 (PACAA-78 soft-delete).\n  - `build_choice_body_v2` 의 numbered 옵션 라인이 cron 의 `_make_buttons` 와 호환 (1/2 버튼 자동 생성).\n- `notify-telegram.py`:\n  - `--sample=choice-v2` 옵션 추가.\n  - 두 견본 모두 dry-run + really-send 양쪽에서 v2 self-check 통과.\n\n### 보드 검증 항목 (재차)\n\n두 견본 모두 다음 충족하나요?\n\n1. 첫 줄이 \"김선혁님,\".\n2. 본문 끝의 \"결정 라인\" 과 인라인 버튼이 일치.\n3. \"잘 모르겠음\" 경로가 본문에 명시.\n4. \"child / lib / probe / SELECT / merge\" 같은 영어 jargon 노출 없음.\n5. 본문만 읽고 \"왜\" + \"승인/선택 후 무엇\" 잡힘.\n\n### 결재 라인\n\n앞서 오픈한 결재 요청 `f9c68c4a` (PACAA-125 v2 표준 사인오프) 는 그대로 살아 있어요. 두 견본을 함께 보고 응답 부탁드려요.\n\nA) v2 표준 + 두 컨트랙트 분리 승인 — cron v2 전환 + SOUL baking\nB) 일부 추가 수정 — 어느 견본·어느 항목?\nC) 폐기 — v1 유지\n(답하기 어려우면 \"잘 모르겠음\" 텍스트로 답해 주세요.)"
