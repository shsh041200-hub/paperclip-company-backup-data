        body: "## 구현 진행 상황\n\n보드 승인 확인. 셋업 시작.\n\n### 완료\n\n- **대시보드 생성기** (`generate-dashboard.py`): Paperclip API에서 Goal 트리 + 이슈 조회 → HTML 생성. 테스트 완료. 23개 Goal 노드, 진척률 정상 계산.\n- **알림 스크립트** (`notify-telegram.py`): 결재 대기, 검토 대기, 응답 필요 항목 체크 → Telegram 전송. 중복 방지 로직 포함.\n- **셋업 스크립트** (`setup.sh`): cron 등록 + Telegram 자격증명 입력 + 초기 대시보드 생성.\n- 파일 위치: `~/.paperclip/instances/default/tools/board-visibility/`\n\n### 보드 액션 필요: Telegram Bot 생성\n\n알림 기능 활성화를 위해 보드가 직접 Telegram Bot을 생성해야 합니다:\n\n1. Telegram 앱에서 **@BotFather** 검색\n2. **/newbot** 전송 → 이름 설정 (예: PacklinxAlert)\n3. 받은 **Bot Token** 을 본 티켓에 코멘트로 전달\n4. 생성된 봇과 대화 시작 (/start 전송)\n5. 브라우저에서 `https://api.telegram.org/bot<TOKEN>/getUpdates` 접속\n6. 응답에서 **chat_id** 확인 후 함께 전달\n\n토큰과 chat_id 를 받으면 셋업 스크립트로 1분 내 완료합니다.\n\n### 대시보드 즉시 사용 가능\n\nTelegram 셋업과 별개로, 대시보드는 지금 바로 사용 가능합니다.\n터미널에서 실행:\n\n```bash\nbash ~/.paperclip/instances/default/tools/board-visibility/setup.sh\n```\n\n또는 대시보드만 생성:\n```bash\npython3 ~/.paperclip/instances/default/tools/board-visibility/generate-dashboard.py\n```\n\n생성된 HTML 파일을 브라우저에서 열면 Goal 트리 진척률을 바로 확인할 수 있습니다."
