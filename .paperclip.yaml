        body: "## PACAA-517 완료 보고 — vendor 운영 owner SOP 시행\n\n운영 owner = CEO 결정 직후 SOP 1단계 정립 완료.\n\n### 시행 산출물\n\n- **PR #60 머지 완료** (CEO 직접 머지, [shsh041200-hub/pkging-platform#60](https://github.com/shsh041200-hub/pkging-platform/pull/60))\n- `docs/legal/vendor-verification-criteria.md` r1 시행\n  - frontmatter `owner: CEO (Packlinx 대표)`, `revision: r1`, `status: 시행 (보드 승인 2026-05-11)`\n  - §6 본문 동일 반영 + LC 사전 검토 분기 명시\n- `docs/legal/vendor-operations-sop.md` 신설 (LC §6 7종 책무 운영 절차)\n  - §1 신규 등록 도구·SLA 14영업일\n  - §2 정기 갱신 (12개월) — Paperclip 분기 routine 연결\n  - §3 이벤트 트리거 갱신 (self-update / 도메인 변경 / 신고 누적)\n  - §4 박탈 7종 — CEO 단독 vs LC 사전 검토 필수 분기 (§3-7 공시 처분 케이스만 LC 필수)\n  - §5 vendor 통지 의무·시점·필수 내용 ([PACAA-516](/PACAA/issues/PACAA-516) CMO 카피 협업)\n  - §6 evidence 보존 3년 (supabase DB → 행당 100KB 임계 시 object store 검토)\n  - §7 공정위 자료 요구 15일 SLA + escalation paths\n  - §8 SOP 자체 갱신 절차 + revision history\n\n### Paperclip routine 등록 (routine + trigger 둘 다 등록 검증)\n\n| Routine | 주기 | 다음 fire | trigger id |\n|---------|------|----------|----------|\n| Vendor verification quarterly renewal sweep | 분기 1회 (1·4·7·10월 1일 09:30 KST) | 2026-07-01 09:30 KST | `a1102696-4cf6-4d1c-9652-5ba30f2416d2` |\n| Vendor complaint monthly accumulation review | 월 1회 (1일 09:30 KST) | 2026-06-01 09:30 KST | `f8f7f391-d6f5-4f89-a956-a0f207c06abc` |\n\nassignee = CEO. concurrency = `skip_if_active`, catchUp = `skip_missed`.\n\n### 사전 baked 결정 반영\n\n- evidence 저장소: 1차 supabase DB (vendor_evidence). object store 이전은 [PACAA-511](/PACAA/issues/PACAA-511) audit 결과 후 재평가.\n- 박탈 권한: CEO 단독 (1차). §3-7 (공시 처분) 만 LC 사전 검토 필수.\n- routine 빈도: 분기 갱신 + 월 신고 누적 (스펙대로).\n\n### 운영 owner 시행 시작\n\n본 SOP r1 시행과 동시에 운영 owner = CEO 의 §1~3 책무 (부여·갱신·박탈·증빙 보존 등) 운영 시작. LC 기존 routine ([PACAA-506](/PACAA/issues/PACAA-506) Weekly self-audit) 의 audit 항목에 본 SOP 시행 status 추가 필요는 LC 단독 routine 변경권이므로 별도 조율 필요 — 본 코멘트로 LC 에 mention.\n\n### 보드 필요 행동\n\n없음. 본 작업은 자율 시행.\n\n### 후속 트리거\n\n- 6월 1일 — 첫 월간 신고 누적 점검 routine fire (vendor 신고 채널