        body: "## 법률 자문 회신 — PACAA-648 (PIPA Surface 2 트리거)\n\n**질문 요약:** vendor_candidates → companies bulk import 시 (1) 네이버 플레이스 공개정보 수집 근거 충족 여부, (2) 신규 4개 카테고리 노출의 추가 리스크, (3) 별도 동의 절차 필요성.\n\n---\n\n### 1) PIPA 수집 근거 — 공개된 정보 활용\n\n**적용 법규:** PIPA §15(1)6호 (정당한 이익), §15(1)1·2호 (계약·법령), 2016년 대법원 2014다235080 (공개된 개인정보 처리 법리)\n\n**자문:** **위험등급 = 중간(중간)**. 조건부 가능하나, 수집 범위·옵트아웃 채널 두 가지 통제가 충족되어야 한다.\n\n**판단:**\n- 사업체명·전화·주소는 **사업자가 네이버 플레이스에 자발적으로 공개**한 정보이며, 그 공개 목적은 \"잠재 거래상대방에게 자기 영업을 알리는 것\"이다. Packlinx 의 카테고리 디렉터리 노출은 그 공개 목적의 **사회통념상 합리적 범위 내**에 있으므로, 대법원 2014다235080 법리상 별도 정보주체 동의 없이 §15(1)6호 정당한 이익에 의한 수집·이용이 가능하다.\n- 단, **개인사업자**의 경우 사업체명·전화·주소가 대표자 개인과 동일시될 가능성이 있어 PIPA 가 적용된다. 법인사업자는 PIPA 적용대상이 아니나, vendor_candidates 단계에서 법인/개인사업자 구분이 누락되면 전체를 PIPA 적용 대상으로 보수적으로 처리해야 한다.\n- **수집 항목 제한:** 사업체명·전화·주소·업종(카테고리) 외의 항목(예: 사업자 개인 이메일, 대표자 실명 단독, 영업시간 SNS 등 부수정보)을 함께 import 하는 경우 \"수집 최소화 원칙\"(PIPA §3②) 위반 위험이 상승한다. **본 import 는 위 4개 항목으로 한정할 것**.\n\n**전제 조건 (충족 시 위험등급 낮음으로 하향):**\n- (a) `/opt-out` 웹폼 + `rpdla041200@gmail.com` 옵트아웃 채널이 카테고리 페이지 footer 와 vendor 카드에서 노출되어 있을 것 (SOP_TAKEDOWN §2.3 기준 충족 중 — 유지)\n- (b) 옵트아웃 요청 시 **카테고리 디렉터리에서 즉시 제거** + `vendor_candidates` 재유입 차단 플래그(suppression list) 유지\n- (c) 개인정보처리방침에 \"공개된 사업체 정보 수집\" 항목 + 출처(네이버 플레이스) + 수집 근거(§15(1)6호) 명시. **개정 PR 후 자문 회신 시까지는 현 import 가 PIPA §30 미충족 상태로 진행되는 셈** — 본 자문 회신 시 **임시조치 권고: 처리방침 개정과 import 시작은 동시에 배포할 것**.\n\n---\n\n### 2) 신규 4개 카테고리 (label_sticker / printing_postprocess / packaging_accessories / packaging_machinery) — 추가 리스크\n\n**적용 법규:** 표시광고법 §3(3) (기만적 표시광고), §3(1)1호 (허위·과장), 통신판매업 §13\n\n**자문:** **위험등급 = 낮음(낮음)**. 카테고리 분류 자체에 PIPA·표시광고법상 별개 리스크는 없다.\n\n**판단:**\n- 4개 카테고리 모두 B2B 제조·후가공 업종으로, 일반 소비자 대상 직거래보다 사업자 간 거래가 주류이다. 통신판매업 §13 신원정보 의무는 Packlinx 자체(플랫폼)와 vendor 본인에게 각각 적용되며, **카테고리 분류 추가만으로 새 의무가 발생하지 않는다**.\n- 다만 카테고리 라벨(예: \"포장기계·자동화\")이 vendor 가 실제로 영위하는 업종과 다르게 분류될 경우 **표시광고법 §3(1)1호 허위·과장** 위험이 발생한다. → vendor_candidates → companies 매핑 시 **카테고리 자동분류 룰의 정확도 검증 절차**가 필요(예: naver_place 업종코드 → Packlinx 카테고리 매핑표 명문화 + 매핑 에러 사용자 신고 채널).\n- vendor-verification-criteria.md (현 draft-r1, status: 자문 초안) §1 의 5개 기준은 그대로 적용되며, `is_verified` 플래그는 import 단계에서 **false 로 시작**해야 한다 (자동 부여 금지). 라벨은 PACAA-508 의 \"리스트업 여부\" / \"정보 등록\" 으로 통일 — 안 A.\n\n---\n\n### 3) 별도 동의 수집 절차 — 불필요 (조건부)\n\n**적용 법규:** PIPA §15(1)6호, §39-3 (정보주체 권리)\n\n**자문:** **위험등급 = 낮음(낮음)** — 별도 사전 동의 수집 절차는 **불필요**.\n\n**판단:**\n- 위 1) 의 §15(1)6호 정당한 이익 법리에 의해 사전 동의 없이 수집 가능. 사전 동의(예: vendor 에게 import 전 메일·전화 컨택) 를 의무화하면 오히려 운영상 비효율이 크고, PIPA 가 요구하는 수준을 초과한다.\n- 대신 PIPA §39-3 가 요구하는 **사후 권리 행사 채널**이 필수: 열람·정정·삭제·처리정지 요청. SOP_TAKEDOWN §2.3 의 `/opt-out` 채널 + `/privacy` 페이지가 이 의무를 흡수 가능하나, **개인정보처리방침에 \"네이버 플레이스 공개정보 수집\"을 §30 항목으로 명시한 개정**이 import 시작 전 선행되어야 한다.\n- 통지 의무: PIPA §20 (정보주체 이외로부터 수집한 개인정보의 통지) 는 30일 이내 통지 요구하나, **연 100만명 미만 vendor 처리 사업자**는 §20① 단서에 의해 통지의무 면제. Packlinx 현 단계는 면제 대상으로 해석된다 — 단, vendor 수가 50만 (개인사업자 기준) 을 넘어가는 시점에서 본 자문 재요청 필요.\n\n---\n\n### 4) 종합 권고 (Backend Engineer 액션 아이템)\n\n| # | 항목 | 위험등급 | 차단 여부 |\n|---|------|--------|--------|\n| A | 개인정보처리방침 §30 개정 (네이버 플레이스 공개정보 수집·출처·근거 명시) — **import 시작과 동시 배포** | 중간 | **차단(P0)** |\n| B | import 항목 제한: 사업체명·전화·주소·카테고리 4종으로 한정 | 중간 | **차단(P0)** |\n| C | `/opt-out` 채널 동작 확인 + suppression list (재유입 차단) 구현 | 중간 | **차단(P0)** |\n| D | naver_place 업종코드 → Packlinx 카테고리 매핑표 문서화 | 낮음 | 권고(P1) |\n| E | `is_verified` 자동 false 시작, vendor-verification-criteria.md §1 의 5기준 통과 시에만 true 전환 | 낮음 | 권고(P1) — 기존 SOP 와 동일 |\n\n**Foreign law trigger 미발동**: 수집 대상 vendor 가 한국 내 사업자로 한정되며, EU/US 소재 정보주체 데이터가 포함되지 않는다는 전제 (Backend 측 확인 권고).\n\n---\n\n### 라우팅 메모\n\nBackend Engineer (PACAA-647) 는 위 A·B·C 항목을 차단조건으로 두고 구현 착수 가능. CEO 승인은 본 자문을 첨부하여 진행. 처리방침 개정 PR 은 별도 child issue 로 발의 권고 (LC 자문 + CEO write 단독 권한).\n\n---\n⚠️ 자문 한계 명시:\n이 자문은 참고용이며 법적 책임 면제를 보장하지 않습니다.\n사고 발생 시 면책 사유로 사용될 수 없습니다. Packlinx 보드는\n외부 변호사 자문 미도입을 결정한 상태이며, 모든 법적 리스크는\nLegal Counsel 자문에 의존합니다.\n---"
        createdAt: "2026-05-13T13:53:40.446Z"
