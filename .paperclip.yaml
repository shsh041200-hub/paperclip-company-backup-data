        authorAgentSlug: "cto"
        authorType: "agent"
        body: "## 권고 — Next.js 16 + Vercel (자유 등급)\n\n**결정 요약 (안):** 50→5,000 키워드 programmatic SEO 페이지의 웹 스택으로 **Next.js 16 App Router + Vercel**을 채택. Supabase는 데이터, Cloudflare는 DNS 전용.\n\n### 비교 결과\n\n| 후보 | 운영부담 | 확장성 | 한국 POP | SEO/SSG | Frontend hire 필요 | 빌드 복잡도 | 결론 |\n|------|---------|--------|---------|---------|-------------------|-----------|------|\n| **Next.js 16 + Vercel** | 낮음 (TS+Supabase 기존 스택) | ISR로 5K 페이지 < 2분 | ICN1, TTFB <100ms | `generateStaticParams` + `app/sitemap.ts` 표준 | **불필요** (Backend가 Server Component 작성 가능) | 낮음 | **권고** |\n| **Astro + Cloudflare Pages** | 중간 (신규 템플릿 모델) | 정적 5K 페이지 매우 빠름 | Cloudflare 한국 POP | `getStaticPaths` 표준 | 불필요 | 낮음 | **차선** (kill-criterion 발동 시 이전 대상) |\n| Hugo + Cloudflare Pages | 높음 (Go 템플릿 + 별도 데이터 export 파이프라인) | 매우 빠름 | 동일 | 표준 | 불필요 | 중간 | 기각 — TS 일관성 위배 |\n| Cloudflare Workers raw | 높음 (라우팅·sitemap 자체 구현) | n/a | 동일 | 직접 구현 | n/a | 높음 | 기각 — 프레임워크 재발명 |\n\n### 벤치마크 (WHAT/WHY/HOW/SIMULATE)\n- **NerdWallet, Wirecutter (Tier 5):** 수만~수십만 programmatic 페이지를 Next.js App Router + ISR로 운영. 데이터→템플릿→ISR 단일 파이프라인.\n- **Vercel.com (Tier 6):** 자사 templates 디렉터리 자체가 programmatic SEO 표면, 같은 스택 도그푸딩.\n- **HOW (Packlinx):** 동일 패턴을 1/1000 규모로 적용. 무료 등급 내에서 50→5K 페이지 흡수.\n- **SIMULATE:** PoC 1개 키워드 라우트 = Backend ~4시간 (데이터 API 준비 후). 5K 페이지 빌드 < 2분. ICN1 TTFB <100ms.\n\n### Kill criteria (충족 시 ADR-002로 Astro/Cloudflare 이전, ~1 dev-day 비용)\n1. ≤1,000 페이지에서 빌드 시간 > 5분\n2. 매출 발생 전 Vercel 월 비용 > $50\n3. 데이터 API 준비 후 Backend가 키워드 페이지 1개를 2시간 내 완성 못 함\n4. 인덱싱된 페이지의 ICN1 TTFB가 상시 > 250ms\n\n### Reversibility\n**Two-way door.** HTML 출력은 이식 가능, `@opennextjs/cloudflare` 어댑터로 Cloudflare Pages 이전 가능. 데이터는 Supabase에 있고 도메인은 Cloudflare DNS. Vercel 종속 표면은 ISR/Image — 모두 OSS 대체재 존재.\n\n### 초기 commitment\n- **$0/월.** Vercel Hobby + Supabase 무료 등급. 도메인 구매는 PoC 그린 이후 별도 의사결정.\n\n### Phase 1 PoC 범위 (사인오프 후 별도 이슈)\n신규 repo `packlinx-web` → Next.js 16 App Router → 라우트 1개 (`app/keywords/[slug]/page.tsx`, `generateStaticParams` stub) → JSON-LD/canonical/OG/sitemap/robots 완비 → Vercel preview 배포 (`*.vercel.app`, 도메인 미구매). CTO 1일 작업.\n\n### Backend hand-off 인터페이스 (PACAA-85)\n```ts\nexport type KeywordPageData = {\n  slug: string;\n  titleKo: string;\n  descriptionKo: string;\n  canonicalPath: string;\n  vendors: Vendor[];   // ≥10 권장, <5면 noindex\n  updatedAt: string;   // ISR revalidate 기준\n};\nexport async function getKeywordPage(slug: string): Promise<KeywordPageData | null>;\nexport async function listKeywordSlugs(): Promise<string[]>;\n```\nBackend는 PACAA-85에서 이 두 함수만 Supabase RPC에 연결하면 됨. 페이지/sitemap/robots는 변동 없음.\n\n### Frontend Engineer 채용 함의\n**Phase 1에서는 불필요.** PoC + 50 키워드까지는 Backend + 위 인터페이스로 충분. 500+ 키워드 도달 또는 트래픽 근거 확보 시 재검토.\n\n### 보드(설립자) 결정 요청 사항\n위 권고 + ADR-001을 기반으로 다음을 승인 요청:\n1. **스택 채택:** Next.js 16 + Vercel 무료 등급 (Cloudflare DNS, Supabase 데이터)\n2. **차선안 인정:** Astro + Cloudflare Pages (kill criteria 발동 시 이전 경로)\n3. **PoC 부트스트랩 별도 이슈로 진행:** 본 이슈 스코프는 \"결정\"까지\n\n전체 ADR (옵션·록인 감사·세부 인터페이스): `life/projects/pacaa-87-stack-review/adr-001-web-stack.md`\n\n다음 단계로 `request_confirmation` interaction을 생성하여 보드 사인오프 절차로 넘어가겠습니다."
