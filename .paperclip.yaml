        body: "## \"왜 하는데\" 답변\n\n### TL;DR\n**지금 당장은 안 해도 됨.** 사이트 동작에는 아무 영향 없음. 단지 `next dev` 띄울 때마다 노란색 경고 한 줄 찍힘 + 미래 Next.js 버전에서 진짜 에러로 승격될 가능성이 있어서 **언젠가는 고쳐야 함**. PACAA-1 \"프로젝트 확인\" 범위가 아니라 별도 티켓 권장한 거임.\n\n### 왜 Next.js 16에서 바꿨는데\nNext.js가 `middleware.ts` 컨벤션을 **`proxy.ts`** 로 이름만 바꿈. 이유 두 가지:\n1. **명칭 정확성** — 이 파일은 사실 모든 요청 앞에서 가로채서 응답을 변형/차단하는 \"엣지 프록시\" 역할인데, \"middleware\"라는 일반 용어는 의미가 너무 광범위해서 혼동을 일으켜 왔음 (Express/Koa 미들웨어, RSC 미들웨어 등). 그래서 명확하게 `proxy`로 정리.\n2. **App Router 정책 정리** — Next.js 16은 App Router 기본 + 다양한 인터셉션 레이어를 도입하면서, 엣지에서 도는 단일 글로벌 가로채기 파일을 다른 레이어와 구분 짓고 싶어함.\n\n### 이 프로젝트의 `middleware.ts` 실태\n`src/middleware.ts` (18줄, KOR-560 — 봇 차단)\n\n```ts\nconst BLOCKED_BOT_RE = /facebookexternalhit|Facebot|Meta-ExternalAgent|Meta-ExternalFetcher|GPTBot|ChatGPT-User|GoogleOther/i\n\nexport async function middleware(request: NextRequest) {\n  const ua = request.headers.get('user-agent') ?? ''\n  if (BLOCKED_BOT_RE.test(ua)) {\n    return new NextResponse('Blocked', { status: 403 })\n  }\n  return NextResponse.next()\n}\n```\n\n법적으로 의미 있는 코드 (Meta/OpenAI/Google 크롤러 차단 — `robots.txt` 우회 봇 대비). **삭제하면 안 됨, 마이그레이션만 하면 됨.**\n\n### 마이그레이션 비용\n- 파일명: `src/middleware.ts` → `src/proxy.ts`\n- 함수명: `middleware()` → `proxy()`\n- `export const config` 동일하게 유지 (matcher 그대로)\n- `next dev` 재기동\n- 끝. 5분 작업.\n\n### 현재 안 하면 생기는 일\n- 매번 `next dev` 시작할 때 deprecation 경고 1줄 (지금처럼)\n- Next.js 17~18쯤에서 **에러로 승격** (deprecation 사이클상)\n- 그 시점에 강제로 마이그레이션해야 하는데, 그때까지 다른 변경이 쌓이면 충돌 위험 약간 ↑\n\n### 결론\n- **시급도**: 낮음 (사이트 동작 영향 0)\n- **중요도**: 중간 (봇 차단 코드라 운영 의미 있음, 그리고 어차피 해야 함)\n- **권장**: PACAA-1 마감 후 별도 티켓 (`KOR-XXX: middleware.ts → proxy.ts 마이그레이션 (Next.js 16)`) 으로 분리. 5분짜리 작업이라 누군가 시간 날 때 처리.\n\n원하면 지금 이 heartbeat에서 바로 마이그레이션도 가능. 별도 티켓으로 분리할지, 지금 처리할지 알려줘.\n"
