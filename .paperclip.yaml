        authorType: "agent"
        body: "## [Legal 자문] PACAA-444 Phase 2 batch 3 — 5개 가이드 v1 슬롯 발행 검토\n\n### 자문 요약\n\n소재+산업별 5개 가이드(유리·금속 / 식품 / 화장품 / 전자제품 / 부자재)의 v1 슬롯(TL;DR·Callout·Checklist·FAQ·Sidebar·end-CTA) 발행 전 검토. 외부 노출 콘텐츠(Surface 1) + 규제 기관/법령 언급(Surface 3) 결합 트리거. 결론: **2건 수정 후 발행 가능 / 3건 즉시 발행 가능**.\n\n---\n\n### 1. `glass-metal-container-guide` — 유리·금속 용기\n\n- **적용 법령**: 표시광고법 §3, 식품위생법 §9(간접 언급)\n- **위험 등급**: **낮음**\n- **권고**: 그대로 발행 가능.\n- **근거**: BPA-free 코팅 표현은 \"제조사에 명시 요청하세요\" 어조로 의무 표현 회피. 일반론 위주이며 단정적 우월 표현(추천/최고/유일) 없음.\n\n---\n\n### 2. `food-packaging-materials` — 식품 패키징 소재\n\n- **적용 법령**: 식품위생법 §9, 「기구 및 용기·포장의 기준 및 규격」(식약처 고시 제2024-XX호 계열), 표시광고법 §3\n- **위험 등급**: **낮음** (경미한 표기 통일 권고)\n- **권고**: **표기 통일 후 발행** — 발행 보류는 불요.\n  1. 고시 명칭이 본문 내 두 가지(\"기구·용기·포장의 기준 및 규격\" vs \"기구 및 용기·포장의 기준 및 규격\")로 혼용됨. 정확한 고시 명칭은 **「기구 및 용기·포장의 기준 및 규격」**. TL;DR·Checklist 표기를 Q1·Callout과 동일하게 통일 권장.\n  2. \"이행성 시험 성적서 수령\" 표현은 Callout/Checklist에서 모두 **\"권장됩니다\" / \"수령 여부 확인\"** 어조 유지 — 법적 의무 혼동 우려 **없음**, 안전.\n  3. \"식품 등급(Food Grade)\" 표기만으로 법적 요건을 충족하지 않을 수 있다는 warn은 **표시광고법 §3(허위·과장 광고)**의 일반적 가이드와 합치 — 안전.\n- **근거**: 이행성 시험 성적서 수령은 「기구 및 용기·포장의 기준 및 규격」 적합 여부 입증의 실무 수단이지 법문상 직접 의무는 아님. 가이드의 \"권장\" 어조가 정확.\n\n---\n\n### 3. `cosmetic-packaging-box` — 화장품 패키징 박스 ⚠️ **수정 필요**\n\n- **적용 법령**: 화장품법 §10, 화장품법 시행규칙 §19, 「자원의 절약과 재활용 촉진에 관한 법률」 시행규칙 별표(제품의 포장재질·포장방법에 관한 기준), 표시광고법 §3\n- **위험 등급**: **중간** (부정확한 법령 인용 1건 / 누락 가능 1건)\n- **권고**: **아래 2건 수정 후 발행**.\n\n  **수정 1 (필수) — TL;DR·Callout·Checklist·Q1의 화장품법 §10 필수 기재 항목 표현 보완**\n\n  현 표현: \"전성분·사용기한·사용방법 필수 기재\" / Q1: \"전성분, 사용기한(또는 제조연월일), 사용방법, 제조업자 및 수입업자 정보, 내용량, 가격 등\"\n\n  - \"**사용방법**\"은 화장품법 §10 1항에 명시된 법정 기재 항목 키워드가 아닙니다. 법문 키워드는 **\"사용할 때의 주의사항\"**이며 \"사용방법\"은 실무상 함께 표시되는 추가 정보입니다.\n  - **50mL/50g 이하 소용량** 화장품은 화장품법 시행규칙에 따라 일부 항목(전성분 등) **표시 면제**(인터넷 게시 등으로 갈음 가능)가 인정됩니다. \"반드시 모두 포함\" 표현은 정확하지 않을 수 있습니다.\n  - **수정 제안**:\n    - TL;DR: \"화장품 패키징은 화장품법 §10에 따른 필수 기재 사항(명칭·영업자 정보·제조번호·사용기한 또는 개봉 후 사용기간·전성분·사용할 때의 주의사항 등)을 외장 박스에 표시해야 합니다. **단, 소용량(50mL/50g 이하) 화장품은 시행규칙에 따라 일부 항목 표시가 면제될 수 있습니다.**\"\n    - Q1: \"사용방법\" → \"사용할 때의 주의사항\"으로 교체, 마지막에 소용량 면제 단서 추가.\n\n  **수정 2 (권장) — Callout warn \"처분이 가능합니다\" 어조**\n\n  현 표현: 그대로 유지 OK. 다만 본문의 \"재활용 표기 시\" 맥락만으로는 어떤 표시 가이드를 따르는지 모호. **「분리배출 표시에 관한 지침」(환경부 고시)** 또는 \"분리배출 표시 가이드\"를 1회 인용하면 표시광고법 §3 리스크가 더 낮아집니다. (선택 적용)\n\n  **참고 — 과대 포장 15% 표현**: 「제품의 포장재질·포장방법에 관한 기준 등에 관한 규칙」 별표상 화장품류의 포장 공간 비율 **15% 이하 + 포장 횟수 2차 이내** 기준은 **정확**. Q3 표현 그대로 발행 가능.\n\n- **근거**: 화장품법 §10(1)는 1차 포장/2차 포장 기재 의무 항목을 열거하나 \"사용방법\"이라는 어휘는 사용하지 않음. 행정처분 사례(식약처 행정처분 공고)에서도 표시 위반은 법문 키워드 기준으로 판단됨.\n\n---\n\n### 4. `electronics-packaging-design` — 전자제품 패키징 디자인 ⚠️ **부분 수정 권고**\n\n- **적용 법령(국내)**: 「전기용품 및 생활용품 안전관리법」(KC), 표시광고법 §3\n- **외국법(자문 범위 외)**: CE(EU 적합성), FCC(미국 연방통신위원회) — **외국법은 본 자문 범위 밖**. 일반적 명칭 언급은 가능하나 적합성/필요성 판단은 외부 변호사 자문 영역.\n- **위험 등급**: **낮음~중간**\n- **권고**: **아래 1건 수정 후 발행**.\n\n  **수정 1 (권장) — Sidebar/end-CTA에 외국법 단정 표현 없음을 재확인 + 본문 어조 검토**\n\n  현 본문 — TL;DR/Callout/Checklist/FAQ 모두 \"보유 여부 확인\", \"확인하는 것이 필요\", \"외박스 표기 여부는 제품별 고시를 확인\" 톤으로 **단정적 의무 표현 회피**됨. **안전**.\n  - Q1의 \"ISTA 또는 ASTM 기준에 따른 낙하·압축·진동 테스트를 통해 패키징 적합성을 검증하는 것이 권장됩니다\" — 권장 어조 안전.\n  - Q4의 \"ISTA 2A 또는 3A를 목표로 설계하면 국내외 유통 모두 대응 가능합니다\" — **\"가능합니다\"가 약한 단정**. ISTA 등급은 사적 표준이며 \"모든 국내외 유통 대응\"은 과장 소지가 있어 **\"…국내외 유통 대응에 도움이 됩니다\" 또는 \"…대응 범위가 넓어집니다\"**로 약화 권고. (표시광고법 §3 예방 차원)\n  - Q4의 \"IATA 위험물 규정도 함께 확인하세요\" — 외국 규정이지만 단순 안내이므로 안전.\n\n- **근거**: KC 인증 부착 의무는 「전기용품 및 생활용품 안전관리법」 §9(안전인증대상)·§15(공급자적합성확인) 별로 차이가 있어, 가이드의 \"제품별 고시 확인\" 어조가 가장 안전한 표현. 본 가이드는 그 톤 유지 중. CE/FCC는 외국법이므로 명칭 언급 외에 \"필요/의무\" 단정은 모두 회피 — 현 가이드는 회피하고 있음.\n\n---\n\n### 5. `packaging-accessories-guide` — 포장 부자재\n\n- **적용 법령**: 표시광고법 §3\n- **위험 등급**: **낮음**\n- **권고**: 그대로 발행 가능.\n- **근거**: 일반론·실무 팁 중심. 단정적 우월/비교 표현 없음.\n\n---\n\n### 추가 횡단 검토 — 5개 공통\n\n#### A. 표시광고법 §3 — end-CTA \"검증된 용기 업체\" / \"식품 규격 적합 소재 공급사\" 표현\n\n- 가이드 1, 2, 3, 4, 5 end-CTA 다수에서 **\"검증된\"·\"식품 규격 적합\"** 등 사실 우월성을 시사하는 표현 사용:\n  - 1번: \"검증된 용기 업체\"\n  - 2번: \"식품 규격 적합 소재 공급사\"\n  - 3번: \"화장품법 기준을 맞춘 박스 업체\"\n  - 4번: \"ESD·완충재 전문 포장 공급사\"\n- **위험 등급**: **중간** (Packlinx 내부 검증 절차의 실재성에 따라 등급 변동)\n- **분기 권고**:\n  - **(a)** Packlinx에 등록 업체에 대한 **객관적 검증·심사 절차**(예: 사업자등록·KC인증 보유·식약처 적합 시험성적서 수령 등)가 실재하면 → 그 기준 명세를 별도 페이지(또는 약관)에 게시한다는 전제로 현 표현 유지 가능. **단, 첫 노출 시점부터 기준 명세 페이지 링크 또는 풋노트 1줄을 함께 노출**할 것.\n  - **(b)** 검증 절차가 없거나 단순 등록 업체이면 → \"검증된\"·\"적합\"·\"전문\" 표현은 **표시광고법 §3 1항 1호(거짓·과장)** 또는 **2호(기만적 표시)** 위반 소지. 즉시 표현 변경:\n    - \"검증된 용기 업체\" → \"유리·금속 용기 공급사\"\n    - \"식품 규격 적합 소재 공급사\" → \"식품 패키징 소재 공급사\"\n    - \"화장품법 기준을 맞춘 박스 업체\" → \"화장품 박스 공급사\"\n    - \"ESD·완충재 전문 포장 공급사\" → \"ESD·완충재 취급 포장 공급사\" 또는 단순 \"전자제품 포장 공급사\"\n- **위 (a)/(b) 분기 결정은 CMO/CEO가 Packlinx 검증 정책 실재 여부 확인 후 1회 일괄 적용 권장.**\n\n#### B. 타사 비교/우월/추천 표현\n\n- 5개 가이드 본문 전체에서 특정 타사 비교, \"1위\", \"최고\", \"추천 1순위\" 표현 **없음** — 안전.\n\n#### C. 개인정보(PIPA)\n\n- 콘텐츠 자체에 사용자 개인정보 수집 폼/쿠키 동의 UI 없음 — PIPA 직접 적용 사항 **없음**.\n\n---\n\n### 핵심 질문 회신 (요청 항목별)\n\n1. **food-packaging-materials \"이행성 시험 성적서 수령 권장\" 표현**: **안전**. 의무 표현 아니며 \"권장됩니다\"·\"수령 여부 확인\" 어조로 일관. 고시 명칭만 통일 권장.\n2. **cosmetic-packaging-box (화장품법 §10 / \"처분이 가능합니다\" / 15%)**:\n   - \"사용방법\" → \"**사용할 때의 주의사항**\" 교체 + **소용량(50mL/50g) 면제 단서** 추가 (필수)\n   - \"처분이 가능합니다\" 어조: **안전** (지침 1회 인용은 선택)\n   - 15% 수치: **정확**\n3. **electronics-packaging-design (KC·CE·FCC)**: \"보유 여부 확인\" 톤 **안전**. CE/FCC는 외국법이라 본 자문 범위 밖 — 명칭 언급 외 단정 표현은 회피되어야 하며 현 본문은 회피 중. Q4 ISTA \"국내외 유통 모두 대응 가능\" 표현만 약한 단정으로 약화 권고.\n4. **표시광고법 §3 / 타사 비교**:\n   - 본문 내 단정/비교 표현 **없음**.\n   - **end-CTA \"검증된\"·\"적합\"·\"전문\"** 표현은 검증 절차 실재 여부에 따라 표현 변경 또는 기준 명세 페이지 링크 동시 노출 필요 (위 §A 분기).\n\n---\n\n### 발행 절차 권고\n\n1. **즉시 발행 가능**: `glass-metal-container-guide`, `packaging-accessories-guide`\n2. **표기 통일 후 발행**(경미): `food-packaging-materials` — 고시 명칭 통일\n3. **본문 수정 후 발행**(필수): `cosmetic-packaging-box` — §10 표현 + 소용량 면제 단서\n4. **본문 약화 권고 후 발행**: `electronics-packaging-design` — Q4 단정 표현 약화\n5. **5개 공통**: end-CTA \"검증된\" 등 표현은 (a) 검증 정책 명세 동반 노출 또는 (b) 표현 변경 — CMO가 (a)/(b) 결정 후 일괄 적용\n\npost-Legal 콘텐츠가 [PACAA-444](/PACAA/issues/PACAA-444) 코멘트에 inline 게시되면, 횡단 §A의 (a)/(b) 분기 결정 여부만 추가 회신 부탁드립니다. 그 외 본 자문으로 발행 가능.\n\n---\n⚠️ 자문 한계 명시:\n이 자문은 참고용이며 법적 책임 면제를 보장하지 않습니다.\n사고 발생 시 면책 사유로 사용될 수 없습니다. Packlinx 보드는\n외부 변호사 자문 미도입을 결정한 상태이며, 모든 법적 리스크는\nLegal Counsel 자문에 의존합니다.\n---\n"
