        body: "## 경로 정리 + 정상 위치에 다시 띄움\n\n### 등록된 경로 (Paperclip 프로젝트 메타)\n- **레포**: `https://github.com/shsh041200-hub/pkging-platform.git`\n- **managedFolder / effectiveLocalFolder**: `/home/rlatjsgur/.paperclip/instances/default/projects/d5e183da-c58f-4124-8075-493330dce4c4/f0cad884-57d7-4a3e-b1bb-fa93a4fc0b2c/pkging-platform`\n- **localFolder (board 입력)**: `null` — 별도 로컬 폴더는 등록되지 않음, managed 자동 체크아웃 경로 그대로 쓰는 설정\n- **workspace.cwd**: `null` (`sourceType=git_repo`)\n\n### 문제: 등록만 됐고 실제 클론은 일어나지 않음\n- 위 managedFolder는 **존재하지 않았음**. 같은 부모 디렉터리에 다른 회사 폴더(`c31c062b-...`) 하나만 있고 이번 회사(`d5e183da-...`) 폴더는 미생성 상태였음.\n- → Paperclip의 managed checkout이 트리거되지 않은 듯. 직전 heartbeat에서는 `/tmp/pacaa/pkging-platform`에 임시로 clone해서 띄웠음(그래서 board UI에서 \"사이트 안 뜸\" 처럼 보였을 수 있음 — 실제로는 다른 위치였을 뿐 응답은 정상이었음).\n\n### 조치 (이번 heartbeat)\n1. managed 경로에 직접 clone:\n   ```\n   git clone https://github.com/shsh041200-hub/pkging-platform.git \\\n     /home/rlatjsgur/.paperclip/instances/default/projects/d5e183da-c58f-4124-8075-493330dce4c4/f0cad884-57d7-4a3e-b1bb-fa93a4fc0b2c/pkging-platform\n   ```\n2. `.env.local` 임시 placeholder 주입 (Supabase 실 자격증명은 board에 요청 중)\n3. `npm install` (503 packages, 34s) → `npm run dev` (Turbopack, Ready 537ms)\n\n### 현재 상태\n- **URL**: `http://localhost:3000`\n- `/` → **HTTP 200**, 37,545 bytes, `<title>전국 패키징 업체 찾기 — B2B 포장재 플랫폼 \\| Packlinx</title>`\n- 첫 요청 ~20초는 여전히 placeholder Supabase 타임아웃 때문. 실제 키 넣으면 즉시 정상화.\n- 이번엔 **dev 서버 그대로 살려둠** — board가 브라우저에서 바로 확인 가능.\n\n### Board에서 확인할 것\n- 호스트 머신의 브라우저에서 `http://localhost:3000` 접속\n- WSL2 환경이면 윈도우 호스트에서도 그대로 `http://localhost:3000` (자동 포워딩됨). 안 될 경우 `http://10.255.255.254:3000` 시도\n\n### 다음 단계 제안\n- Supabase 자격증명 3종 (`NEXT_PUBLIC_SUPABASE_URL`, `_ANON_KEY`, `SERVICE_ROLE_KEY`) 전달 → 첫 페이지 로딩 20초 → 즉시화\n- managed checkout 자동화: 워크스페이스 등록 시 자동 clone 트리거가 누락된 것으로 보임. 별도 인프라 티켓으로 분리 권장\n"
