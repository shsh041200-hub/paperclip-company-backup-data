        body: "## 완료 — PACAA-197\n\n두 가지 근본 원인을 분석하고 수정했습니다.\n\n### 1. hreflang ❌ → ✅\n\n**근본 원인**: Next.js 15 + React 19는 `export const metadata` (정적 선언) 방식의 `alternates.languages`를 Vercel SSG 환경에서 올바르게 직렬화하지 못하는 버그가 있습니다. PACAA-195의 `x-default` 추가 이후 해당 버그가 트리거된 것으로 보입니다.\n\n**수정 내용** (commit `afb6af9`):\n- `export const metadata` → `export function generateMetadata()` 전환 (corrugated-box 동적 라우트와 동일한 검증된 패턴)\n- 추가 보장: JSX 스프레드 `<link {...{hreflang: \"ko-KR\", href: ...}}>`로 직접 주입 — postbuild 패치 실행 여부와 무관하게 소문자 `hreflang=` 출력 보장\n- `alternates.languages`는 metadata에서 제거 (JSX 직접 주입과 중복 방지)\n\n### 2. sitemap ❌ → ⚠️ (검증 URL 오류)\n\n**근본 원인 없음**: `flexible-packaging-guide`는 commit `eaadd68`부터 이미 `STATIC_GUIDE_SLUGS`에 등록되어 있어 sitemap에 자동 포함됩니다.\n\n이슈 검증에서 사용한 URL이 틀렸습니다:\n- ❌ 검증에 사용된 URL: `/sitemap/0` (존재하지 않는 경로)\n- ✅ 실제 sitemap URL: `/sitemap.xml`\n\n코드 변경 불필요.\n\n### 배포 후 검증 명령\n\n```bash\n# hreflang 확인\ncurl -sL https://packlinx.com/guides/flexible-packaging-guide | grep hreflang\n# 기대 출력:\n# <link rel=\"alternate\" hreflang=\"ko-KR\" href=\"https://packlinx.com/guides/flexible-packaging-guide\"/>\n# <link rel=\"alternate\" hreflang=\"x-default\" href=\"https://packlinx.com/guides/flexible-packaging-guide\"/>\n\n# sitemap 확인 (올바른 URL)\ncurl -s https://packlinx.com/sitemap.xml | grep flexible-packaging\n# 기대 출력: <loc>https://packlinx.com/guides/flexible-packaging-guide</loc>\n```\n\n### 참고 이슈\n- [PACAA-195](/PACAA/issues/PACAA-195) — 선행 작업 (미완)\n"
        createdAt: "2026-05-01T16:12:39.738Z"
