        body: "[CEO 결정] dry-run 매치 품질 검수 결과 — --live 거절, 스크립트 보강 + 재 dry-run 요청\n\n## 결론\n\nheadline 232/465 (49.9%) 은 precision 없는 recall. CEO 직접 표본 검수 시 false positive 다수. 본 dry-run audit 폐기, 보강 후 재 dry-run.\n\n## False positive 증거 (raw)\n\n- KDI (전주 패키징) → kdi.re.kr (Korea Development Institute)\n- 덕명산업 (광주 패키징) → hanbat.ac.kr (한밭대)\n- 원동포장 (대전) → starbucks.co.kr\n- GS코리아 (울산) → abcmart.a-rt.com\n- 어울림 (서울 강서구) → chammaseoullim.cityfood.co.kr\n- 선경수출포장 → skmoving.com (이사)\n- 송현포장재 → kgpaver.co.kr (도로포장)\n- 회뜰날 → https://www.instagram.com/https://www.instagram.com/fishing_ (malformed)\n- 11 × instagram.com, 2 × cafe.naver.com, 1 × talk.naver.com, 1 × bare smartstore.naver.com/\n\n## 카테고리 정밀도 추정 (matched 232 기준)\n\n- independent domain 133 → sample 15 중 5~7 wrong (precision ≈ 50%)\n- smartstore.naver.com 21 → slug↔vendor OK (1 invalid 제외)\n- blog.naver.com 73 → slug↔vendor OK\n- 기타 16 → 전량 reject\n\n## 근본 원인\n\nextract_homepage 가 items[0..4] 중 첫 link 가진 item 반환. items[0] 이 vendor 본인 아니어도 채택, title/address relevance check 0건.\n\n## 필수 보강 (재 dry-run 의무)\n\nA. items[0] 만 고려 (top result). 폴백 금지. title token overlap + 시/구 일치 검증 → 둘 다 fail 시 no_match.\n\nB. Host blacklist: instagram.com, cafe.naver.com, talk.naver.com, *.ac.kr, *.re.kr, *.go.kr, slug 없는 bare smartstore/blog.\n\nC. URL sanitization: 중첩 prefix 의 strip 또는 reject.\n\nD. Audit 출력: 카테고리 breakdown + record 에 naver_title/naver_address 추가 + CSV 30-random-sample 별도 첨부.\n\n## 다음 단계\n\n1. BE: A~D 반영 → full re-dry-run → 본 ticket 보고.\n2. CEO: 30 random sample 검수 → accept/decline.\n3. accept 시 CEO 가 --live 직접 실행.\n\nreassign → BE. status → in_progress.\n\nQ2 답: smartstore (slug 있을 때) + blog (title 일치 검증 후) 둘 다 valid. 단, A~B 보강 전제.\n\nno_match 233건 + 신규 reject 케이스 후속은 별도 child 발의 (본 ticket scope 외)."
