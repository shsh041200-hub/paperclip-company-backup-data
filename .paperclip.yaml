        body: "## 이미지 추가 후보 스카우팅 — 보고서\n\nPACAA-626 (1차 이미지 개선) 적용 현황 = `/` 홈 hero 실사 사진, `/match` hero 일러스트, `/guides` featured 3장. 총 8장.\n나머지 라우트는 **브랜드 공급 이미지 0장**. 아래는 추가로 들어갈 만한 곳 + 우선순위입니다. (보고만, 실행 X)\n\n---\n\n### P1 — 트래픽·SEO 가성비 가장 높음 (현재 이미지 0)\n\n1. **`/categories/[slug]` 카테고리 랜딩 6개** (`food-beverage`, `ecommerce-shipping`, `cosmetics-beauty`, `pharma-health`, `electronics-industrial`, etc.)\n   - 카테고리별 hero 1장씩 — 산업 분위기 photo 또는 isometric.\n   - 검색 진입 메인 funnel. 현재 텍스트뿐이라 dwell time / scroll depth 손실 가능성 큼.\n   - 예산: 6장 × \\$0.04 (Flux dev) = ~\\$0.25.\n\n2. **`/blog/*` 2개 포스트** (2026-trends, packaging-rfq-guide)\n   - 블로그 featured image 부재. 카카오톡/링크 공유 시 미리보기 비어 보임.\n   - 본문 inline 보조 이미지 1~2장 추가도 가능 (RFQ 흐름 다이어그램 등).\n\n3. **`/guides` 개별 가이드 4개** (flexible-packaging / label-printing / plastic-container ×2)\n   - OG 이미지는 있는데 본문 hero 없음. `/guides` 카드에서 클릭 후 도착하면 \"글만 와르르\".\n   - 가이드별 conceptual hero 1장 (소재 close-up 또는 공정 illust).\n\n4. **`/keywords/[slug]` programmatic SEO 페이지** (PoC 별도 repo 도 동일)\n   - 키워드 hero 1장 = 카테고리 hero 재사용 가능 (저비용, 새로 안 만들어도 OK).\n\n### P2 — UX·전환 보강\n\n5. **`/match` hero 실사 사진 swap**\n   - 현재 Phase 1 일러스트 (`match-hero.webp`). 홈은 photo 인데 match 만 일러스트 → 톤 불일치.\n   - PACAA-626 에서 보드가 \"실사가 좋다\" directive 내림. match 도 photo 1장 신규 후보 띄워 선택 받는 흐름이 자연스럽습니다.\n\n6. **`/compare/[slug]` vendor-vs-vendor 페이지**\n   - 비교 hero (저울/체크리스트 conceptual) 1장 공통 사용. 슬러그 마다 안 만들어도 됨.\n\n7. **`/products/[slug]` · `/services/[slug]` · `/use-cases/[slug]`**\n   - 각 라우트당 fallback hero 1장 (디테일은 vendor 업로드/카테고리 derive).\n\n8. **`/faq` hero · `/not-found` 404 illust** — small but completes the brand polish.\n\n### P3 — OG 이미지 커버리지 (SNS 공유 + 카톡 미리보기)\n\n현재 `opengraph-image.tsx` 가 있는 라우트 = **4개 가이드만**. 아래는 모두 없음:\n- `/` (layout 의 static og 만), `/categories`, `/categories/[slug]`, `/keywords`, `/keywords/[slug]`, `/match`, `/compare`, `/compare/[slug]`, `/companies/[slug]`, `/faq`, `/blog/*`, `/products/[slug]`, `/services/[slug]`, `/use-cases/[slug]`.\n\n→ Next.js dynamic `opengraph-image.tsx` 로 페이지별 동적 OG 생성 권장. 카드 1장당 새로 그리지 않고 **카테고리 hero + 페이지 타이틀 오버레이** 조합으로 자동 생산 가능 (Replicate 신규 생성 없음).\n\n### P4 — 마이크로 이미지 (브랜드 폴리시)\n\n- **카테고리 픽토그램 세트** — 카테고리 필터 / 네비 메뉴 / 홈 카테고리 그리드용 16~24px 단색 아이콘. 일러스트가 아니라 SVG pictogram (1회 제작, 무한 재사용).\n- **vendor 카드 로고 fallback** — 로고 없는 vendor 카드가 현재 텍스트 이니셜. 카테고리별 기본 박스 일러스트 1장씩.\n- **Empty state** — 포트폴리오 0장 / 리뷰 0건 / 검색 결과 0건. 친근한 일러스트 1~2장.\n- **트러스트 strip** — 홈에 \"사업자등록 검증 · 통신판매업 신고 확인\" pictogram (legal footer 보강).\n- **CTA 이미지 버튼** — PACAA-626 에서 보드가 P2 로 defer 한 \"이미지 들어가는 버튼\". \"무료 견적\" / \"업체 비교\" 같은 핵심 CTA 에 작은 일러스트.\n\n---\n\n### 권장 다음 단계 (보드 선택 후 별도 issue 발의)\n\n가성비 순:\n- **(a) P1 카테고리 6장** — 가장 큰 SEO funnel, ~\\$0.25, 1~2 wake.\n- **(b) P3 동적 OG (Next.js) 전 라우트 커버** — 카톡/링크 공유 즉시 효과, 신규 생성 비용 ≈ 0.\n- **(c) P2 match hero 실사 swap** — 톤 일관성 회복, 1장, 후보 3개 띄워 선택.\n- **(d) P4 카테고리 픽토그램 16개** — UI 폴리시, SVG 1회 제작.\n\n보드 결정 keyword 받으면 child issue 발의해서 FE/CMO 분담합니다. 본 보고는 PACAA-702 완료 처리.\n"
        createdAt: "2026-05-14T12:24:04.579Z"
