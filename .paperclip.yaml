        body: "## CEO 하트비트마다 체크하는 것 (보고만, 실행 x)\n\n**\"하트비트\"** = CEO 가 잠에서 깨서 → 1회 작업 사이클 돌고 → 다시 자는 것. 시스템이 트리거 보낼 때마다 한 번씩 발생.\n\n---\n\n### 1단계 — 왜 깨웠나 확인\n시스템이 \"이번 wake 이유는 ___\" 알려줌:\n- (a) 이슈가 새로 나한테 배정됨\n- (b) 내가 담당인 이슈에 누가 코멘트 달았음\n- (c) 등록한 cron 시간이 됨 (지금은 인간 cycle 금지로 거의 안 씀)\n- (d) 보드가 내 질문 / 승인 요청에 답함\n- (e) 시스템 노이즈 — 내가 curl 로 단 코멘트가 'user=local-board' 로 잘못 attribution 되어 self-wake 됨 (의미 없는 echo, silent exit)\n\n### 2단계 — 이번 하트비트가 다룰 이슈 확정\n시스템이 \"이 wake 는 PACAA-263 건이다\" 라고 못 박음.\n**현재 규칙:** 다른 이슈로 액션 점프 금지. 이번 wake 가 가리키는 이슈에만 액션.\n\n### 3단계 — 최근 코멘트 / interaction 읽기\n- 누가 썼나 (보드 / 다른 agent / 나 자신)\n- 종류 분류: \"질문\" / \"지시\" / \"FYI 정보 공유\" / \"검토 요청\"\n\n### 4단계 — 라이브 상태 cross-check\n코멘트 내용이 실제 상태와 맞는지 GET 으로 확인. 예시:\n- 보드가 \"막혀있어?\" → 진짜 blocked status 인지 GET\n- 내가 발의한 \"승인 요청\" 이 이미 accepted 됐는지 (놓치면 1시간씩 늦어짐 — PACAA-248 사례)\n\n### 5단계 — Stall 점검 (모든 in_progress 이슈)\n전체 in_progress / blocked 이슈 스캔하고 4 카테고리 분류 (정상 진행 / 합법 wait / 외부 대기 / stall).\n→ **다만 이건 일부만 함.** 본 wake 이슈 외에는 라이트 GET 도 자주 생략 — **보드가 방금 지적한 gap.**\n\n### 6단계 — 어떤 액션 할지 결정\n- 보드 질문 → 답변 코멘트\n- 보드 지시 → 작업 (child 이슈 발의 / 코드 / 코멘트)\n- FYI / observation → silent (코멘트 안 함)\n- \"검토만\" 요청 → 액션 없이 검토 의견만\n\n### 7단계 — 액션 수행\n코멘트 POST / child 이슈 발의 / 상태 PATCH / 다른 agent 에게 위임 등.\n\n### 8단계 — 끝나기 직전 verify\n- 변경한 status 가 진짜 persist 됐는지 (PATCH 200 OK 라도 안 박힐 수 있음)\n- 보드가 한눈에 보게 1~2 줄 요약\n\n---\n\n### 보드가 지금 지적한 gap (직전 heartbeat)\n로컬 서버 이슈로 wake → 그 이슈만 체크하고 sleep. 이 PACAA-263 이슈도 라이트 GET 으로 cross-check 했어야 했는데 안 함.\n\n**원인:** \"이번 wake = 이번 이슈만\" 규칙을 너무 엄격히 해석. *액션* 은 1 이슈 한정 맞지만, *읽기 (cross-check)* 까지 막아버림 → 비효율.\n\n### 자가 진단 (지금은 의견만)\n\"하트비트 처음에 (a) 본 wake 이슈 + (b) 내가 owner 인 in_progress 이슈 전체 라이트 GET\" 으로 바꾸면 gap 닫힘. 액션은 여전히 본 wake 이슈에만.\n\n다음 지시 받기 전까지 대기."
