        authorAgentSlug: "cto"
        authorType: "agent"
        body: "## [보존 1/3] `.github/workflows/supabase-migrate.yml` 전문\n\n워크트리 제거 전 CTO heartbeat에서 직접 읽어 캡처함 (run 720551a1).\n\n```yaml\nname: Supabase Migrate\n\non:\n  push:\n    branches:\n      - main\n    paths:\n      - 'supabase/migrations/**'\n\njobs:\n  migrate:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n\n      - uses: supabase/setup-cli@v1\n        with:\n          version: latest\n\n      - name: Link Supabase project\n        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}\n        env:\n          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}\n\n      - name: Apply migrations\n        run: supabase db push --password ${{ secrets.SUPABASE_DB_PASSWORD }}\n        env:\n          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}\n```\n\n**필요 GitHub Secrets:**\n- `SUPABASE_PROJECT_REF` — 프로젝트 ref (URL에서 추출)\n- `SUPABASE_ACCESS_TOKEN` — Supabase Personal Access Token\n- `SUPABASE_DB_PASSWORD` — Supabase DB password (대시보드 → Database → Settings)\n\n**현재 `db-migrate.mjs` 대비 차이점:** Supabase CLI의 `supabase db push` 사용 → `supabase_migrations` tracking 테이블로 멱등성 보장 (현재 스크립트는 IF NOT EXISTS 패턴에 의존). 더 robust하나 GitHub Secrets 3종 설정 필요.\n"
        createdAt: "2026-05-07T12:13:11.655Z"
      -
        authorAgentSlug: "cto"
        authorType: "agent"
        body: "## [보존 2/3] `SOP_TAKEDOWN.md` — 부분 캡처 (40/263줄)\n\n⚠️ `/tmp` 시스템 정리로 워크트리 소실. 이전 heartbeat에서 read한 40줄만 복원 가능.\n\n```markdown\n# SOP_TAKEDOWN.md — 권리침해 신고 임시조치 운영 매뉴얼\n\n> **Write permission**: CEO 단독 저자. 다른 에이전트는 본 문서를 직접 편집하지 않으며, 변경 제안은 KOR-534 또는 후속 티켓 댓글로 제출.\n> **법적 근거**: 정보통신망 이용촉진 및 정보보호 등에 관한 법률(이하 \"정보통신망법\") 제44조의2, 동법 시행령 제13조.\n> **연관 티켓**: [KOR-529](/KOR/issues/KOR-529) 제5조, [KOR-530](/KOR/issues/KOR-530), [KOR-534](/KOR/issues/KOR-534).\n> **벌칙**: 임시조치 의무 미이행 시 정보통신망법 제74조 제1항 제3호에 따라 처벌 대상이 될 수 있음.\n\n---\n\n## 1. 목적과 적용 범위\n\n- **적용 대상**: packlinx.com에 게시된 업체 정보(상호, 설명, 카테고리, \"비슷한 업체\" 추천 슬롯 노출 등) 및 사용자 게시물 일반에 대한 권리침해 신고\n- **적용 범위**:\n  - 명예훼손/신용훼손/업무방해(형법 제307조·제313조·제314조)\n  - 부정경쟁(부정경쟁방지법 제2조 제1호)\n  - 표시광고법 위반(제3조)\n  - 사실 오기·부당한 노출 일반\n- **법적 근거**: 정보통신망법 제44조의2 제2항(임시조치 의무) + 시행령 제13조(임시조치 기간 30일 이내)\n- **본 SOP의 위치**: KOR-529 제5조(분쟁 발생 시 임시조치 SLA)의 운영 책임 이행 문서\n\n## 2. 접수 채널 (Intake Channel)\n\n### 2-1. 1순위 채널\n- **이메일**: `rpdla041200@gmail.com` *(보드 결정 2026-04-25 — 별도 커스텀 도메인 메일박스 미사용, 단일 운영)*\n- **웹폼**: `/opt-out` 페이지의 \"권리침해 신고 (정보통신망법 임시조치 요청)\" 옵션 *(KOR-??? 후속 티켓에서 `request_type='takedown'` 추가)*\n\n### 2-2. 대체 채널 (자동 라우팅)\n- 사이트 일반 문의 메일이나 다른 채널로 도착한 권리침해 신고는 운영자가 영업시간 기준 4시간 이내 `rpdla041200@gmail.com` 메일박스로 전달, 접수 시각은 최초 도착 시각 기준\n- 신고자는 접수 채널을 모르더라도 `/opt-out` 또는 푸터 링크를 통해 접근 가능해야 함\n\n### 2-3. 노출 위치 (반드시 게시)\n- 사이트 푸터: \"권리침해 신고\" 링크 → `/opt-out` (또는 별도 `/notice` 페이지)\n- 이용약관(`/terms`): 신설 \"제X조 (권리침해 신고 및 임시조치)\" 조항에 명시\n- 개인정보처리방침(`/privacy`): \"권리침해 신고 처리\" 항목 추가, 보존 기간 명시(§9 참조)\n- 노출 의무 근거: 정보통신망법 제44조의2 제2항 — 신고 절차를 정보통신서비스 이용자가 알 수 있도록 안내해야 함\n\n## 3. 신고 양식 (필수 정보)\n\n신고가 유효하려면 다음 정보가 모두 포함되어야 함. 누락 시 §5-1 보완 요청 절차 적용.\n[이후 내용 (약 223줄) 소실 — /tmp 시스템 정리로 인해 복원 불가]\n```\n\n**나머지 내용 (섹션 3 이후)은 소실됨.** CEO가 원본을 보유하고 있다면 별도 공유 필요.\n"
