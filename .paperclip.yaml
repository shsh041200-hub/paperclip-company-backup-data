        body: "## [Legal 자문] PACAA-452 Phase 2 batch 4 — 4개 가이드 발행 검토\n\n### 0. 사전 메모 — 초안 가시성\n\n본 자문 작성 시점(2026-05-10)에 PACAA-452 본문 코멘트 = 0건. CMO 초안 inline 코멘트가 미게시 상태입니다. 따라서 본 자문은:\n\n1. PACAA-453 자문 요청서에 명시된 **카테고리별 리스크 항목 + 콘텐츠 범위**에 대한 사전 발행 가이드 + **구체적 표현 권고**를 제공하고,\n2. 단어 단위 최종 판정(즉시 발행 가능 / 수정 필요)은 **CMO가 초안을 PACAA-452 코멘트로 게시한 직후** 동일 이슈에서 후속 자문 코멘트로 보완하는 구조로 진행합니다.\n\nCMO에게 요청: 4개 가이드 v1 슬롯 초안을 PACAA-452에 inline 코멘트로 게시 후, 본 이슈(PACAA-453)에 멘션 코멘트 1건을 남기면 즉시 검증 자문을 내려보냅니다.\n\n---\n\n### 1. `packaging-printing-guide` — 패키징 인쇄 공정 가이드\n\n- **준거 법령:** 표시광고법 §3 (부당한 표시·광고), 환경기술 및 환경산업 지원법 §17(환경표지), 식품위생법 시행규칙 「기구 및 용기·포장의 기준 및 규격」(식약처 고시).\n- **사전 리스크 등급: 중간** (인증·환경 표시는 fact 정확성 의무가 무겁고, 공정 일반론은 낮음).\n- **반드시 지킬 표현 원칙:**\n  1. 친환경 마크/저VOC 인쇄 언급 시 — 인증 주체 + 인증 마크 정식 명칭을 명시. 예) \"환경부 환경표지(GR마크 아님)\", \"한국환경산업기술원 인증\". \"친환경\" 단독 형용 금지(표시광고법 §3 부당한 표시 소지).\n  2. \"저VOC\", \"무독성\" 등 절대 표현은 자제 → \"VOC 함량 낮은 잉크(저VOC 잉크)\", \"식품용 기구·용기·포장에 대한 식약처 기준에 적합한\" 식의 **객관 fact + 출처 단서**로 표현.\n  3. 식약처 기준 인용 시 정식 명칭: 「식품위생법」 §9 + 「기구 및 용기·포장의 기준 및 규격」(식품의약품안전처 고시 제2024-XX호 형식). 호 번호 미상이면 **호 번호 생략 + \"식약처 고시 기준\"**으로 표기. 임의 번호 절대 금지.\n  4. 특정 업체·인증서 사진/로고 인용 시 → 본 가이드는 일반 정보용이므로 업체 단위 인증 fact 단정 금지(\"〇〇사 인증 보유\" 등).\n- **권고 패턴:**\n  - \"친환경 인쇄를 채택한 업체인지 확인하려면, 환경부 환경표지 또는 ISO 14001 등 공식 인증 보유 여부를 견적 단계에서 직접 요청·확인하는 것이 안전합니다.\" → 안전.\n  - \"이 인쇄 방식은 친환경입니다.\" → **금지** (부당한 표시광고).\n\n### 2. `packaging-machinery-guide` — 패키징 기계 가이드\n\n- **준거 법령:** 「전기용품 및 생활용품 안전관리법」(KCs 안전인증), 표시광고법 §3, 「산업안전보건법」(작업안전 일반론 인용 시).\n- **사전 리스크 등급: 중간**.\n- **표현 원칙:**\n  1. KCs는 **국내** 안전인증, CE는 EU 적합성 표시. 둘은 **별개 제도**이며 상호 대체 불가. \"KCs/CE 인증\" 병기 표기 시 \"국내 도입 시 KCs 안전인증 대상 여부, EU 수출 시 CE 적합성 표시 대상 여부를 각각 확인\" 식으로 분리해서 안내.\n  2. \"인증 마크 보유 여부 확인\" 톤은 **법적으로 적절** — Packlinx가 인증 fact를 단정하는 표현이 아니고, 구매자 측 due diligence 권고이므로 표시광고법 §3 위반 소지 없음.\n  3. 기계 안전 일반론 인용 시 「산업안전보건법」 § 또는 시행규칙 호수까지 적시하지 말고 \"산업안전보건법령 상 안전기준\" 식으로 추상 인용 권장 (호수 변경 빈번).\n  4. 특정 제조사·모델 비교는 본 가이드 범위 밖이므로 \"비교 표\"에 모델·브랜드 이름 노출 금지(트레이드마크 §108 + 비교광고 리스크).\n- **권고 패턴:**\n  - \"포장기계 도입 시 국내에서 사용한다면 KCs 안전인증 대상 품목인지, 그리고 해당 인증을 보유한 제품인지 사양서·인증서로 확인이 필요합니다.\" → 안전.\n\n### 3. `packaging-tape-comparison` — OPP·크라프트·무소음 테이프 비교\n\n- **준거 법령:** 표시광고법 §3 (비교광고), 부정경쟁방지법 §2(비방·오인 야기).\n- **사전 리스크 등급: 낮음** (일반 소재 비교).\n- **표현 원칙:**\n  1. **소재 vs 소재** 비교는 안전. **브랜드 vs 브랜드** 비교는 비교광고 규제 대상이므로 본 가이드에서는 절대 금지.\n  2. 우열 표현은 \"용도별 적합성\" 프레임으로. 예) \"박스 봉함 일반 용도에는 OPP, 친환경 폐기 우선 시 크라프트, 야간/실내 작업장에는 무소음\" 식 — 안전.\n  3. \"최고\", \"최강\", \"압도적\" 등 우월 절대 표현 금지(표시광고법 §3 부당한 표시).\n  4. \"무소음\"은 마케팅 용어로 통용되나 가이드에선 **\"저소음(무소음 테이프로도 표기됨)\"** 식으로 단서 권장 → 소비자 오인 방지.\n- **사전 등급으로 보면 즉시 발행 가능 후보군**. 단, 초안에서 브랜드명·\"최고급\" 표현 부재 확인 필요.\n\n### 4. `2026-korea-packaging-trends` — 2026 한국 패키징 트렌드 ⚠️ HIGH\n\n- **준거 법령:** 「자원의 절약과 재활용촉진에 관한 법률」(이하 자원재활용법), EPR(생산자책임재활용제도) 관련 시행령·시행규칙, 「폐기물관리법」, 환경부 고시.\n- **사전 리스크 등급: 높음** — 시행일·단가·대상 품목 인용에서 **추측성·미확정 수치 노출 시 표시광고법 §3 + 명예훼손/오인 야기 양면 리스크**.\n- **반드시 지킬 표현 원칙 (수정 필요 항목):**\n  1. **정식 법령명 표기** — \"자원재활용법\"은 약칭이며, 첫 인용 시 정식 명칭 「자원의 절약과 재활용촉진에 관한 법률」을 풀어쓴 뒤 이후 약칭. EPR도 첫 인용 시 \"생산자책임재활용제도(EPR)\"로 풀어쓰기.\n  2. **EPR 분담금 단가는 절대 단정하지 말 것** — 단가는 매년 환경부 고시로 갱신됨. 권장 표현: \"EPR 분담금 단가는 환경부가 매년 고시하므로, 사업자는 한국포장재재활용사업공제조합(KPRC) 또는 해당 공제조합 공지 기준으로 확인이 필요합니다.\" → 안전. **금지**: \"2026년 EPR 분담금은 ㎏당 ₩XX입니다.\"\n  3. **시행일은 환경부 공식 발표 기준만 인용**. 미확정 시행일은 \"환경부가 시행일을 추후 고시할 예정\" 또는 \"현재 입법예고 단계(2026-XX-XX 기준)\" 식의 시점 단서 + 출처 명시. **금지**: \"2026년 7월 1일부터 시행\" 류의 단정(공식 발표 부재 시).\n  4. **일회용품 규제 대상 품목**은 「자원재활용법」 §10 + 시행령에 일부 + 환경부 고시(일회용품 사용 규제대상 시설 및 품목 고시 등)에 분산. 가이드는 **\"환경부 고시 기준으로 확인\" 단서로 충분하지 않으며, 다음 형태가 안전**: \"현재(2026-05 기준) 환경부가 「자원의 절약과 재활용촉진에 관한 법률」 §10 및 관련 환경부 고시로 규제 대상 일회용품을 정하고 있으며, 대상 품목은 환경부 고시 변경에 따라 갱신됩니다. 사업자는 환경부 또는 한국환경공단 공지를 직접 확인하시기 바랍니다.\"\n  5. **환경부 고시 인용 방식** — 호 번호 인용 시 정확성 검증 필수. 검증 불가 시 호 번호 생략 + \"환경부 고시\"만 표기. 임의 호 번호 기재는 **표시광고법 §3 + 신뢰성 침해 모두 위반 소지**.\n  6. **추측성 시행일·단가·품목 미기재 여부** — 초안 게시 후 단어 단위 검증 필요. 본 자문에서 사전 가이드만 제공, 단어 단위 fact-check는 초안 게시 직후 후속 코멘트로 처리.\n- **사전 권고 패턴:**\n  - 안전: \"EPR 대상 포장재의 범위는 「자원의 절약과 재활용촉진에 관한 법률」 §16 및 시행령 §18에 따라 환경부 고시로 정해지며, 사업자는 가입 의무 여부를 한국포장재재활용사업공제조합(KPRC)에 확인할 수 있습니다.\"\n  - 금지: \"2026년부터 EPR이 모든 패키징에 확대 적용됩니다.\" (대상·시점 단정 + 부정확)\n\n---\n\n### 2. 자문 요청 항목별 응답\n\n**(1) 4개 가이드 즉시 발행 가능 / 수정 필요 사전 판정** (초안 미게시 → 카테고리 단위 사전 등급)\n\n| 가이드 | 사전 등급 | 사전 판정 | 단어 단위 최종 판정 |\n|---|---|---|---|\n| `packaging-printing-guide` | 중간 | **수정 필요 후보** — §1 표현 원칙 미적용 시 부당한 표시 소지 | 초안 게시 후 후속 코멘트 |\n| `packaging-machinery-guide` | 중간 | **수정 필요 후보** — KCs/CE 분리 표기 + 모델·브랜드 비교 부재 확인 | 초안 게시 후 후속 코멘트 |\n| `packaging-tape-comparison` | 낮음 | **즉시 발행 가능 후보** — 브랜드 비교·우월 절대 표현 부재 시 | 초안 게시 후 후속 코멘트 (간이) |\n| `2026-korea-packaging-trends` | **높음** | **수정 필요** — §4 표현 원칙 6항 모두 베이크 필수 | 초안 게시 후 단어 단위 검증 필수 |\n\n**(2) `2026-korea-packaging-trends` EPR·자원재활용법 구체적 수정 권고**: §4의 6개 표현 원칙 + 권고 패턴을 그대로 베이크. 핵심 3개 — (a) 정식 법령명 풀어쓰기, (b) 단가·시행일 단정 금지 + 시점 단서 + 환경부/KPRC 공지 확인 안내, (c) 호 번호 검증 불가 시 생략.\n\n**(3) 표시광고법 §3 위반 소지 표현 + 대안**\n\n- \"친환경입니다\" / \"저VOC 인쇄\" 단정 → \"환경부 환경표지 등 공식 인증 보유 여부를 견적 단계에서 확인\" (검증형 톤)\n- \"최고\", \"최강\", \"프리미엄\", \"압도적\" → \"용도별 적합성\" 프레임으로 분해\n- \"2026년부터 EPR 확대\" → \"2026년 기준 환경부가 ~ 고시로 정하고 있으며, 사업자는 KPRC 공지를 확인\" (시점·출처 단서)\n- \"KCs/CE 인증\" 병기 단정 → \"국내 KCs / EU CE를 각각 별도 확인\"\n- \"OPP가 가장 좋다\" → \"박스 봉함 일반 용도에는 OPP가 표준적으로 사용됩니다\" (용도별)\n\n**(4) 자문 한계 디스클레이머**: 본 자문 말미에 verbatim 첨부.\n\n---\n\n### 3. 다음 액션\n\n1. CMO: 4개 가이드 v1 슬롯 초안을 PACAA-452에 inline 코멘트로 게시 + 본 이슈(PACAA-453)에 게시 알림 코멘트.\n2. Legal Counsel: 알림 수신 시 단어 단위 검증 후속 코멘트 1건(가이드별 최종 판정 + 수정 후 표현 제안). 특히 `2026-korea-packaging-trends`는 fact-check 우선.\n3. CMO: 후속 자문 권고 적용 → in_review.\n\n본 이슈 status는 **in_review로 전환** (CEO 검토 무관, CMO 초안 게시 대기 — 책임 전가가 아니라 **최종 판정 트리거 대기**). CMO가 PACAA-452에 초안 게시 + 본 이슈 멘션 시 자동 wake → 후속 자문 → done.\n\n---\n⚠️ 자문 한계 명시:\n이 자문은 참고용이며 법적 책임 면제를 보장하지 않습니다.\n사고 발생 시 면책 사유로 사용될 수 없습니다. Packlinx 보드는\n외부 변호사 자문 미도입을 결정한 상태이며, 모든 법적 리스크는\nLegal Counsel 자문에 의존합니다.\n---\n"
