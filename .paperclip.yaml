        authorAgentSlug: "ceo"
        authorType: "agent"
        body: "## Supabase Disk IO Budget 경고 — 파악 결과\n\n### 1. 메일 본문 요약\n- 대상: `pkging-platform` (project ref `jnrciibwtutzymkoepfp`) = **메인 production Supabase**.\n- 상태: Disk IO Budget이 **소진 추세** (아직 0 아님). 현재 compute add-on 한도를 초과하는 IO 사용.\n- 임박 영향(소진 시): API 응답 지연 ↑, CPU IO-wait ↑, 인스턴스 응답불능 가능. 즉시 다운은 아니지만 P1.\n\n### 2. 코드 측 의심 정황 (live probe 전 가설)\n3개 파일 모두 `force-dynamic` + `revalidate` 동시 선언 → Next.js에서 force-dynamic이 우선 = **캐시 0**, 매 요청마다 Supabase 직접 조회.\n\n- `src/app/sitemap.xml/route.ts:13` — sitemap index. 매 hit 시 `companies` count(exact) 1회.\n- `src/app/sitemap/[id]/route.ts:21` — sitemap shard. 매 hit 시 `companies` 테이블 50,000행 ordered by `updated_at` 페이지네이션 스캔.\n- `src/app/companies/[slug]/page.tsx:43` — 모든 회사 상세 페이지. 봇/유저/스크래퍼 모든 hit가 DB 직격.\n\nGooglebot이 sitemap을 주기적으로 재크롤하고, /companies/* 가 가장 트래픽 많은 라우트라면 이 3개가 IO 소비의 주범 후보.\n\n### 3. 보드만 확인 가능한 데이터 (CEO 권한 밖)\nSupabase Dashboard → Project Settings → Add-ons / Reports → Database 에서 다음 3가지를 알려주시거나 화면 캡쳐 부탁드립니다:\n- (a) **현재 compute add-on tier** (Nano / Micro / Small / ...)\n- (b) **Disk IO 일별 그래프 최근 7일** — 어느 날부터 가속됐는지\n- (c) **Top queries by IO** (Reports → Query Performance) — 가설 검증\n\n### 4. 옵션\n\n**A. 코드 fix만 (비용 $0/월, ETA: 1-2시간 패치 + 24h 측정)**\n- sitemap 라우트들 `force-dynamic` 제거하고 `revalidate=3600`만 남기기 → 1시간당 1회 DB hit로 압축.\n- /companies/[slug] `force-dynamic` 제거 + ISR (revalidate=600~3600) → 첫 hit만 DB, 이후 캐시.\n- 리스크: ISR 첫 hit 콜드 + Vercel 캐시 무효화 정책 점검 필요.\n\n**B. Supabase compute upgrade만 (비용 ~$10~60/월 incremental, ETA: 5분)**\n- 가장 빠른 stop-the-bleeding. 단, 진짜 원인(매 요청 DB 직격) 미해결 → 트래픽 더 늘면 또 한도 닿음.\n- 정확한 가격은 보드가 Dashboard에서 현재 tier → 다음 tier 차액 확인 필요.\n\n**C. 둘 다 병행 (권장)**\n- 즉시 (1) compute 한단계 upgrade로 안전 마진 확보 → 알람 정지.\n- 동시에 (2) 코드 fix 패치 → 24-48h 후 IO 그래프 확인 → 안정되면 다음 청구주기에 다시 다운그레이드 판단.\n- 총 비용: 1-2개월 $10~60 incremental + 코드 1 PR.\n\n### 5. 다음 액션 제안\n위 (a)(b)(c) 데이터 받는 즉시 옵션 A/B/C 중 하나로 픽스하겠습니다. 그동안 사이트는 운영 가능하나 응답시간 모니터링 필요.\n\n별도 ask_user_questions 인터랙션으로 보드 입력 라우팅합니다."
