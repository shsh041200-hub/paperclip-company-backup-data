        authorAgentSlug: "ceo"
        authorType: "agent"
        body: "## 김선혁님, 두 가지 추가 요청 반영 — 자유 입력 kind + 코멘트백 footer 추가\n\n### 한 줄 결론\n\n**자유 입력 kind 도입 + 모든 알림에 \"답장(Reply)으로 코멘트 추가\" 안내 추가. 견본 3종 (freeform/choice/approval) 발사 완료. 코멘트백 라우팅 구현은 보드 사인오프 후 진행 예정.**\n\n### 직전 거절 사유 받음\n\n> \"지금좋아 근데 추가하고 싶은게 모든 요청에는 내가 코멘트를 해당 이슈로 보낼수있는 기능도 추가되었으면 좋겠어... 또 토큰값을 요구한다거나 서술형이나 주관식으로 물어볼수도 있으니까 가능한지 검토해보고 방금 테스트한거처럼 샘플 보내봐\"\n\n두 가지 모두 가능하고, 둘 다 이번 heartbeat 에 반영했어요.\n\n### 1) 자유 입력 kind (KIND_FREEFORM)\n\n새 분류 추가:\n\n| 분류 | 본문 끝 | 인라인 버튼 | 답하는 법 |\n|---|---|---|---|\n| 승인 (KIND_APPROVAL) | \"승인 / 거절\" | [✅ 승인] [❌ 반려] | 버튼 또는 답장 |\n| 선택 (KIND_CHOICE) | \"1) ... 2) ... 번호로 답해 주세요\" | [1] [2] (~3) | 버튼 또는 답장 |\n| **자유 입력 (KIND_FREEFORM)** | \"이 메시지에 답장(Reply)으로 답을 적어 주세요\" | (없음) | 답장만 |\n\n자유 입력 적용 케이스:\n- 토큰·키 값 (VERCEL_TOKEN, KOSIS_API_KEY 등)\n- 서술형 의견 (\"이 방향에 대한 코멘트 부탁드려요\")\n- 주관식 짧은 답 (\"한 달 예산 얼마까지 가능한가요?\")\n- 자유 입력은 인라인 버튼이 없고, \"답장(Reply)\" = 답 그 자체.\n\n### 2) 모든 알림에 코멘트백 footer 추가\n\n승인·선택 알림 끝에 다음 한 줄 footer 자동 추가:\n\n> 추가하실 말씀이 있으면 이 메시지에 \"답장(Reply)\"으로 적어 주세요. 선택 사항입니다 — 답장은 자동으로 이슈 코멘트로 기록됩니다.\n\n선택 사항이라 강제 아님. 필요할 때만 답장. 자유 입력은 답장이 곧 답이라 footer 별도 추가 안 됨.\n\n### 방금 발사한 견본 3종\n\n- **자유 입력 (msg_id=204~205)** — VERCEL_TOKEN 인젝션 요청 (PACAA-94). 토큰을 답장으로 받음.\n- **선택 (msg_id=206~207)** — PACAA-117 시점 선택 (지금 vs 묶어서). 버튼 [1][2] + 답장 footer.\n- **결재 (msg_id=208~209)** — PACAA-78 vendor 44건 soft-delete. 버튼 [✅승인][❌반려] + 답장 footer.\n\n각 견본 본문 끝의 footer / 답장 안내가 분류별로 일관되게 적용되었는지 확인 부탁드려요.\n\n### 코멘트백 라우팅 — 구현 설계 (사인오프 후 1 heartbeat)\n\n현재는 footer 안내만 있고 실제 라우팅은 미구현. 사인오프 후 진행 단계:\n\n1. **`notify-telegram.py` 발송 시점**: 보낼 때마다 telegram `message_id` → `{issue_id, interaction_id?, kind}` 매핑을 `.notify-state.json` 의 `message_index` 필드에 저장 (최근 200건 유지).\n\n2. **`bot-server.py` 답장 수신 시점**: 보드 메시지가 `reply_to_message` 필드를 포함하면, 매핑에서 issue_id 조회 → `POST /api/issues/{id}/comments` 로 답장 본문을 코멘트로 저장. 답장 자동 ack: \"✅ 코멘트 추가됨 (PACAA-XX)\".\n\n3. **자유 입력 kind 만 특별 처리**: 답장이 곧 답 → 코멘트로 저장 + 해당 `interaction_id` 가 `ask_user_questions` (no options) 면 자동 respond/close 트리거 시도. 권한 부족이면 코멘트만 남기고 에이전트가 wake 에서 처리.\n\n4. **권한**: bot-server 가 `local-board` 사용자 자격 (이미 callback button 처리에 사용 중) 으로 코멘트 POST. CEO 권한 부족 케이스는 발생 안 함.\n\n5. **첨부 인덱싱**: 답장에 보드가 토큰 같은 민감 값 보내면 `notify-telegram.py` 발송 메시지를 `editMessage` 로 가리고 본 답장은 `.secrets/<key>.env` 에 저장 (PACAA-94 케이스 가정).\n\n구현 규모: notify-telegram.py +~30줄, bot-server.py +~50줄. 신규 파일·신규 봇·신규 cron 0건. 사이드 작업 무게 OK.\n\n### 코드 패치 요약 (이번 heartbeat)\n\n- `_telegram_format.py`:\n  - `KIND_FREEFORM` 상수 + `KIND_LABEL_FULL_KO` 추가.\n  - `V2_COMMENT_BACK_FOOTER` 상수 — 모든 v2 빌더 끝에 자동 추가.\n  - `build_freeform_body_v2` 빌더 추가.\n  - `sample_freeform_v2` 픽스처 추가 (PACAA-94 VERCEL_TOKEN).\n  - `assert_telegram_safe_v2` 가 `KIND_FREEFORM` 허용.\n- `notify-telegram.py`: `--sample=freeform-v2` CLI.\n\n### 보드 검증 항목 (rev4)\n\n견본 3종 모두 다음 충족하나요?\n\n1. 첫 줄 \"김선혁님,\".\n2. 본문 끝 결정/답 라인과 인라인 버튼 (또는 부재) 일치.\n3. 코멘트백 footer (선택/결재) 또는 답장 안내 (자유) 명시.\n4. 영어 jargon 노출 없음.\n5. 본문만 읽고 \"왜 + 무엇 + 어떻게 답할지\" 잡힘.\n\n### 결재 라인\n\nA) v2 + 자유 입력 + 코멘트백 footer 승인 — 다음 heartbeat 에 코멘트백 라우팅 구현 + cron v2 전환 + SOUL baking.\nB) 추가 수정 — 어느 견본·어느 항목 수정 필요한지 코멘트 또는 답장.\nC) 폐기 — v1 유지.\n(답하기 어려우면 \"잘 모르겠음\" 답장.)"
