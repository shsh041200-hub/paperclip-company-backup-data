        body: "## 김선혁님, 봇 채널 수정 + v2 코드 패치 완료\n\n### 한 줄 결론\n\n**옳은 봇(Paperclip0412_bot)으로 v2 견본 재발사 완료(msg_id=199). 코드 패치 + 자가검수 통과. 결재 요청 재개합니다.**\n\n### 이전 거절 사유\n\n> \"텔레그램봇이 잘못됐어 현재 daily Borad Digest 봇으로 알림을 보냈는데 paperclip_bot 텔레그램 봇에게 보내야해\"\n\n맞습니다. Daily_Board_Digest_bot 은 일일 routine 디제스트용이고, 결재/액션/선택 알림은 Paperclip0412_bot 으로 가야 합니다. 형식 자체에 대한 거절은 아니라고 판단해 같은 형식으로 채널만 수정 + 코드 패치도 함께 했습니다.\n\n### 이번 heartbeat에 한 일\n\n1. **재발사 (msg_id=197, 198)** — Paperclip0412_bot 으로 v2 본문 직접 발송, 보드가 옳은 채널에서 형식 확인 가능.\n2. **코드 패치 — `_telegram_format.py`**:\n   - `build_approval_body_v2`, `build_action_body_v2`, `build_choice_body_v2` 추가 (5단계 빌더).\n   - `assert_telegram_safe_v2` 추가 — 첫 줄 \"김선혁님,\" 강제, 시스템 jargon 16종 차단 (child/lib/probe/PR/merge/SELECT/JOIN/schema 등), 25자/줄 제약 폐기, body 2,500자 한도, ▶ 섹션 ≥3 강제.\n   - `sample_approval_v2()` 픽스처 추가 — PACAA-117 옛 결재의 v2 재작성.\n3. **CLI 패치 — `notify-telegram.py`**:\n   - `--sample=approval-v2` 옵션 추가.\n   - dry-run / really-send 양쪽 v2 검수 분기.\n4. **실서비스 발사** — `python3 notify-telegram.py --sample=approval-v2 --really-send` 로 본문(msg_id=200ish) + 첨부 문서(msg_id=199) 발사 완료. 보드가 받은 메시지가 v2 cron 가 실제로 산출하는 형식 그대로.\n\n### 옛 PACAA-117 형식 vs v2 비교\n\n| 항목 | 옛 v1 (PACAA-117) | v2 |\n|---|---|---|\n| 첫 줄 | `[승인] PACAA-117 PR #4 머지 승인` | `김선혁님,` |\n| 본문 라인 제약 | 25자/줄 — \"child B lib probe\" 처럼 jargon 압축 | 자유. 일상 한국어 단락 |\n| PACAA-XX 본문 노출 | 최대 1개 | 본문 끝 출처 줄에만 |\n| 왜 (배경) | 첨부에만 | 본문 ▶ 섹션 |\n| 승인 후 단계 | 첨부에만 | 본문 ▶ 섹션 4단계 |\n| 결정 라인 | `승인 시: ... / 거절 시: ...` 한 줄씩 | A/B + 모름 옵션 |\n| 자가검수 | 첫 줄 `[승인]`, 박스/이모지 차단 | 첫 줄 `김선혁님,`, jargon 16종 차단 + 박스/이모지 차단 |\n\n### 보드 검증 항목 (재차)\n\nmsg_id=200ish (Paperclip0412_bot) 의 v2 본문이 다음 5가지 모두 충족하나요?\n\n1. 첫 줄이 \"김선혁님,\" 으로 시작.\n2. 본문만 읽고 \"왜 승인해야 하는지\" 잡힘.\n3. 본문만 읽고 \"승인하면 무엇이 일어나는지\" 잡힘.\n4. \"child\", \"lib\", \"probe\", \"SELECT\", \"merge\" 같은 영어 시스템 용어 노출 없음.\n5. 결정 라인 명확 — A/B + 모름 옵션 포함.\n\n### 사인오프 후 진행\n\n**A) 승인** 시 즉시:\n1. `notify-telegram.py` 의 `_build_for_interaction` 분기를 v2 빌더로 전환 (코드 1곳).\n2. v1 빌더는 deprecated 마크 후 1주 후 삭제.\n3. CEO·CTO·Backend Engineer·Legal Counsel SOUL/AGENTS 에 v2 룰 baking.\n4. 메모리 영구화 (`feedback_board_notification_v2.md`).\n5. PACAA-125 close.\n\n**B) 일부 수정** 시 어느 단계가 부족한지 코멘트 주시면 빌더 조정 후 재발사.\n\n**C) 폐기** 시 v1 유지 + 코드 패치 revert.\n\n### 자료\n\n- v2 표준 전문: `runs/board_report_format_v2.md` (workspace).\n- 빌더 코드: `tools/board-visibility/_telegram_format.py` Lines 666~ (v2 섹션).\n- CLI 옵션: `python3 notify-telegram.py --sample=approval-v2 --dry-run` 으로 언제든 재현 가능.\n\n### 결재 라인\n\n바로 아래 결재 요청 인터랙션에서 응답 부탁드려요.\nA) v2 승인 — cron 즉시 v2 전환 + 메모리 baking\nB) 일부 수정 후 재발사 — 어느 단계 수정 필요?\nC) v2 폐기 — v1 유지\n(답하기 어려우면 \"잘 모르겠음\" — 추가 정보 드려요.)"
