        authorType: "user"
        body: "비용이 안드는 것들은 왜 비용이 안드는거야 초보자 입장에서 설명해봐 Flux 는 유료로 알고있는데"
        createdAt: "2026-05-14T12:29:05.877Z"
      -
        authorType: "user"
        body: "**현재 작업**: 보드 질문 답변 — \"왜 P3/P4는 비용 0인데 Flux 만 유료인가\" 초보자 설명.\n**보드님 필요 행동**: 설명 읽고 트랙 선택 (interaction `04e0e6b4` 응답 또는 코멘트 keyword).\n\n---\n\n### 1. AI 이미지 생성 = 왜 돈이 드는가\n\n**Flux** 같은 AI 모델은 \"프롬프트 한 줄 → 이미지 한 장\" 만들 때 GPU 라는 비싼 그래픽 카드를 몇 초 빌려 씁니다. 우리는 이 GPU 를 직접 안 사고 **Replicate** (남이 GPU 빌려주는 클라우드) 에 회당 요금을 냅니다.\n\n- Flux dev = 1장 약 **$0.04**\n- 6장 = $0.25\n- 100장 = $4\n\n핵심: **AI 가 새로 \"그릴 때\"만 돈** 입니다. AI 호출 자체가 과금 단위.\n\n---\n\n### 2. P3 (동적 OG) 가 비용 0 인 이유\n\nOG 이미지 = 카톡/페북/링크드인에 URL 붙이면 미리보기로 뜨는 1200×630 썸네일.\n\n다른 사이트는 OG 마다 새로 그려야 하지만, Next.js 에는 `opengraph-image.tsx` 라는 파일을 두면 **우리 서버가 직접 합성** 해주는 기능이 있습니다 (Vercel 의 `ImageResponse` API).\n\n**무엇을 합성하나요?**\n- 배경: **이미 만든 카테고리 hero** (P1 에서 한 번 Flux 로 그린 webp 재활용)\n- 글자: \"식음료 패키징 업체 비교\" 같은 페이지 타이틀 텍스트\n- 로고: SVG 파일 1장\n\n**왜 무료인가?**\n- AI 호출 = 0회 (이미지를 \"그리는\" 게 아니라 기존 이미지에 글자 얹기만 함)\n- 합성은 Vercel 서버가 응답 만들 때 1번 → CDN 캐시 → 다음 요청은 캐시\n- Vercel Hobby/Pro 플랜 무료 한도 안에서 충분\n\n비유: **포토샵에서 배경 사진에 글자 레이어 얹기** 를 코드가 자동으로 해주는 것. 새 그림 안 그리니 화가 비용 안 나감.\n\n---\n\n### 3. P4 (카테고리 픽토그램) 가 비용 0 인 이유\n\n픽토그램 = 카테고리 옆에 붙는 작은 단색 아이콘 (예: 식음료 → 컵 그림, 화장품 → 립스틱 그림). 16~24px 크기.\n\n**조달 방법 3가지, 모두 무료:**\n1. **무료 SVG 아이콘 라이브러리** — `lucide-react`, `heroicons`, `tabler-icons` 같은 npm 패키지. 1만 개 이상 SVG 가 MIT 라이선스로 공개. `<Coffee />` 처럼 import 만 하면 끝.\n2. **CEO/CMO 가 직접 SVG 코드 작성** — 단순 도형이라 30분~1시간. AI 호출 X.\n3. **AI 도 가능하지만 굳이?** — 픽토그램은 \"그림\" 보다 \"기호\" 라 라이브러리가 훨씬 깔끔.\n\n**왜 무료인가?**\n- AI 호출 = 0회\n- SVG 는 텍스트 파일 → 코드에 박아 무한 재사용 → 매번 재생성 X\n- 라이선스 = 무료 (MIT)\n\n---\n\n### 4. Flux (P1 카테고리 hero, P2 match swap) 가 유료인 이유\n\n이건 \"분위기 사진\" / \"실사 hero\" 라서 사람 손으로 그리거나 라이브러리에서 가져올 수 없습니다. 새로 \"창작\" 해야 됩니다 → AI = 가장 싼 창작 수단.\n\n- P1 카테고리 6장 = 6 × $0.04 = **~$0.25** (Flux dev)\n- P2 match hero 후보 3장 = 3 × $0.04 = **~$0.12**\n- 합쳐도 $0.50 미만, 한 번 만들면 영구 자산\n\n*(참고: PACAA-237 후 Replicate 만 써왔고, Imagen/Recraft 같은 prepay 모델은 안 씀. Flux dev = PAYG 직과금.)*\n\n---\n\n### 요약 표\n\n| 트랙 | 비용 | 이유 |\n|---|---|---|\n| P1 카테고리 hero 6장 | ~$0.25 | Flux 로 신규 창작 |\n| P2 match 실사 swap | ~$0.12 | Flux 로 신규 창작 |\n| **P3 동적 OG** | **~$0** | 기존 hero 재활용 + Next.js 가 텍스트 합성 |\n| **P4 픽토그램 16개** | **~$0** | 무료 SVG 라이브러리 import |\n\n**가성비 결론**: P3 (동적 OG) 가 가장 ROI 높습니다. P1 으로 카테고리 hero 만들어두면 그게 P3 의 OG 배경으로 재활용되니, **P1 → P3 순차** 가 자연스럽습니다.\n\n트랙 keyword (a/b/c/d/e) 또는 \"a+b\" 같은 조합으로 회신 부탁드립니다."
