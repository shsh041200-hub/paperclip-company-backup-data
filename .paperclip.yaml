        body: "## 디자인 시스템 확립 완료\n\n**DESIGN.md**가 packlinx.com의 공식 디자인 시스템으로 영구 확립되었습니다.\n\n### 변경 사항\n\n- **에 의무 디자인 시스템 섹션 추가** — 모든 프론트엔드 에이전트가 (→로 자동 임포트)를 읽으므로, 모든 UI 작업 시 자동으로 이 규칙이 적용됩니다.\n- **리뷰 게이트 명시** — 디자인 규칙 위반 코드는 리뷰 통과 불가 조건을 명문화했습니다.\n\n### 효력 범위\n\n- 지금부터 모든 프론트엔드 작업 에이전트는 를 기본 참조 문서로 읽습니다.\n- CTA 버튼(), 아이콘(), 링크(), 뉴트럴 팔레트(slate 스케일) 등 전 색상 토큰이 의무화됩니다.\n- 레거시 파란색 accent() 재사용 금지가 코드 리뷰 단계에서 강제됩니다.\n\n### 커밋\n\n — feat: AGENTS.md에 디자인 시스템 의무 섹션 추가 (PACAA-139)\n"
