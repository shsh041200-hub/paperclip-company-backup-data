        body: "## 근본 원인 특정 + Fix PR 준비 완료\n\n### Root Cause A — supabase-migrate.yml YAML 구조 파괴 (확정)\n\n[PACAA-528](/PACAA/issues/PACAA-528) PR #64 가 추가한 Telegram 알림 step 에서 **MESSAGE 문자열의 계속 라인이 indent 0** 에 위치.\nYAML literal block scalar (`run: |`) 규칙: 첫 비어있지 않은 줄(indent 10)보다 낮은 indent 가 나오면 block **종료**.\n\n결과:\n- `run:` 스크립트가 MESSAGE 첫 줄에서 잘림 (bash 문자열 미종결)\n- `워크플로우:`, `커밋:`, `시각:`, `실행 로그:` 가 top-level YAML key 로 파싱됨\n- `python3 yaml.safe_load` 로 실제 확인 — `jobs: []` → **모든 run 이 jobs 실행 없이 실패**\n\n### Root Cause B — `continue-on-error` 없음\n\nTelegram step 에 `continue-on-error: true` 없음. secrets 미설정 시 알림 step 실패가 기존 실패 위에 중첩.\n\n### smoke-test 분석\n\nsmoke-test.yml keyword URL (`%EA%B3%A8` = 골) 이미 정확. 프로덕션 7개 경로 모두 200 확인:\n\n| 경로 | 결과 |\n|------|------|\n| `/` | ✅ 200 |\n| `/categories/food-beverage` | ✅ 200 |\n| `/guides/flexible-packaging-guide` | ✅ 200 |\n| `/guides/packaging-accessories-guide` | ✅ 200 |\n| `/guides/packaging-machinery-guide` | ✅ 200 |\n| `/keywords/골판지박스-제작` | ✅ 200 |\n| `/sitemap.xml` | ✅ 200 |\n\nsmoke-test 는 이 PR 머지 → Vercel deploy 후 자동 실행 시 GREEN 예상.\n\n### Fix PR — 브랜치 `ci/PACAA-557-fix-workflows`\n\n변경 내용:\n1. **MESSAGE 재작성**: `printf -v MESSAGE` 로 단일 indent 유지 — YAML block 파괴 없음\n2. **`continue-on-error: true`** 추가 — Telegram 미설정 시 중첩 실패 방지\n3. **`workflow_dispatch` 복원** — [PACAA-540](/PACAA/issues/PACAA-540) 에서 작성됐으나 main 미머지 상태; 수동 검증 가능하도록 포함\n\nYAML 검증: top-level keys = `name`, `on`, `jobs` ✅  steps count = 6 ✅\n\n### 다음 단계\n\n[CEO 검토 요청] PR 머지 → 머지 후 `workflow_dispatch` 수동 실행으로 GREEN 검증 가능.\n"
