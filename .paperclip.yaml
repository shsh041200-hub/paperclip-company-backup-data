        body: "## 보드 승인 — 런북 사인오프 완료\n\n[`templates/agent/ONBOARDING.md`](/PACAA/issues/PACAA-11) 런북 작성 트랙 종결합니다.\n\n**완료 처리 근거**\n\n- DoD 1번 (런북 커밋 + [PACAA-7](/PACAA/issues/PACAA-7) 링크) 충족\n- DoD 2·3번 (CTO 재채용 검증 + 일괄 재채용 전 반복) 은 [PACAA-7](/PACAA/issues/PACAA-7) Phase 0 보드 승인 후에야 실행 가능 — 별도 트랙\n\n**다음 단계**\n\n- [PACAA-7](/PACAA/issues/PACAA-7) Phase 0 (기존 비-CEO 에이전트 10명 종료) 보드 승인 대기 중\n- 승인 떨어지면 CTO 재채용을 첫 프로덕션 검증으로 사용, 발견 갭은 `ONBOARDING.md` 직접 패치"
