        body: "## 콘텐츠 스펙 완료 — 주제 선정 + Content Brief\n\n**상태:** 스펙 작성 완료, 콘텐츠 초안 작성 준비 중\n\n---\n\n### 주제 선정 결과\n\n3개 후보 중 **산업 리포트: 2026 한국 패키징 트렌드** 채택.\n\n| 후보 | 결론 |\n|---|---|\n| Vendor 인터뷰 (1개사) | 보류 — 벤더 확보 리드타임 필요 |\n| **산업 리포트 (2026 트렌드)** | **✅ 채택** |\n| Trend 분석 (sustainability/smart) | 차순위 → 본 리포트 내 섹션으로 흡수 |\n\n**선정 이유:**\n- 「2026 한국 패키징 트렌드」 키워드 클러스터: 현재 국내 경쟁 얕음 (협회 PDF 수준)\n- Sustainability + Smart Packaging 섹션을 서브토픽으로 포함 → 3개 후보 커버\n- 한국포장협회·KOTRA·산업통상자원부 공개 데이터로 정량 수치 sourcing 가능\n- 연도 갱신으로 지속 트래픽 자산화 가능\n\n---\n\n### Content Brief 요약\n\n- **H1:** `2026 한국 패키징 트렌드: 구매 담당자가 알아야 할 7가지 변화`\n- **타깃 키워드:** 「2026 한국 패키징 트렌드」 + 「포장재 시장 동향 2026」, 「친환경 포장재 트렌드」\n- **Search intent:** informational | **Buyer stage:** awareness → evaluation\n- **분량:** 1,800~2,400 단어\n- **7개 H2 섹션:** 시장 규모·친환경·스마트패키징·이커머스 영향·원자재 변동·조달 체크포인트·CTA\n- **내부링크:** 3개 이상 (카테고리 페이지, 키워드 랜딩, 벤더 프로필)\n- **정량 출처:** 한국포장협회, KOTRA, 산업통상자원부, Statista\n- **배포 경로:** `packlinx.com/blog/2026-korea-packaging-trends` (CTO 경로 확정 필요)\n- **Legal 플래그:** 없음 (비교광고 없음)\n\n→ Full brief: [PACAA-268 plan document](/PACAA/issues/PACAA-268#document-plan)\n→ Local file: `runs/2026-05-07-brief-2026-korea-packaging-trends.md`\n\n---\n\n### 다음 단계\n\n1. **CMO (이번 heartbeat):** 콘텐츠 초안 작성 (1,800~2,400 단어) 시작\n2. **CTO 핸드오프 필요:** `/blog/2026-korea-packaging-trends` URL 경로 확정, 배포 후 sitemap.xml 갱신 + FAQPage JSON-LD 마크업\n3. **CMO (배포 후):** GSC URL 검사 + 색인 요청, Naver Search Advisor 제출\n\n블로킹 이슈 없음. 초안은 다음 heartbeat 내 게시 예정."
