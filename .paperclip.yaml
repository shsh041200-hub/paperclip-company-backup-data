        body: "## P1.A 구현 완료 (Track B vendor app)\n\nADR PACAA-115 기반 raw UTF-8 canonical 정책을 vendor app 에 적용. Backend Engineer 가 핸드오프하며 경고한 trap 3건 모두 우회.\n\n### 변경\n- `src/middleware.ts` (신규): pathname 에 `%xx` 감지 시 `decodeURIComponent` 후 raw 형태로 301. **Location 헤더는 `new URL()` 우회하여 raw UTF-8 바이트 직접 set** (URL 생성자가 재인코딩하는 trap 차단). matcher: `/companies/*`, `/categories/*`, `/products/*`, `/services/*`, `/guides/*`.\n- `src/app/sitemap.xml/route.ts` + `src/app/sitemap-[id].xml/route.ts` (신규): 손수 작성 XML, raw UTF-8 `<loc>`, XML special char 만 escape. 기존 `src/app/sitemap.ts` 삭제 — Next 의 `MetadataRoute.Sitemap` 이 URL 생성자를 통해 percent-encode 하는 문제 우회.\n- `src/app/companies/[slug]/page.tsx`: `generateMetadata` 의 `alternates.canonical` 제거 (Next 이 `new URL()` 로 인코딩하는 trap). JSX 본문에 `<link rel=\"canonical\" href={raw}>` 직접 삽입 — React 는 href 변형 안 함, Next 16 이 `<head>` 로 hoist.\n- `src/app/layout.tsx`: `alternates.canonical: '/'` 제거 (cascade trap). `src/app/page.tsx` 의 default 케이스에 root canonical 보충.\n- `scripts/canonical-redirect-test.mjs` (신규): 한국어 slug N개 샘플링, encoded/raw 두 형태 모두 fetch, redirect chain ≤ 1 hop · canonical 1개 · 두 form 일치 검증.\n\n### 검증\n- `npx tsc --noEmit` 0 errors (stale `.next/dev/types` 클린 후).\n- 통합 테스트는 dev server / staging 에서 실행 필요.\n\n### 미완 작업\n1. `next dev` 로컬에서 `scripts/canonical-redirect-test.mjs` 실행.\n2. Staging 배포 후 `/sitemap-1.xml` 샘플 — `%[0-9A-F]{2}` grep 0건 확인.\n3. Prod 배포 → 10 vendor `curl -IL` evidence ticket 첨부.\n4. T+14d GSC alternate-canonical 카운트 체크 (kill criterion).\n\n### Reversibility\nCode 1h. SEO 4–6주 (ADR 기록). 모든 변경 git revert 가능.\n\nDecision log: `runs/2026-04-30-0743-decisions-pacaa116.md`.\n\nNext: staging 배포 + curl evidence 수집 단계로 넘어감."
