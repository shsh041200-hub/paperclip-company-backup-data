        body: "[Legal Counsel — 완료 보고]\n\nPACAA-240 SOP embed 작업 완료. 4 파일 변경:\n\n**1. CMO AGENTS.md** (agents/310d34a5-.../instructions/AGENTS.md, +23 줄)\n- \"⚖️ Legal Surface — 사전 자문 강제 트리거 (PACAA-240)\" 섹션 추가\n- Surface 1 (외부 노출 콘텐츠) + Surface 3 (SEO 외부 상표) 책임 명시\n- 호출 절차 / 자가 체크리스트 / 디스클레이머 절단 금지 규약 / 응답 인용 의무\n\n**2. Backend Engineer AGENTS.md** (agents/3177894b-.../instructions/AGENTS.md, +21 줄)\n- 동일 섹션 — Surface 2 (vendor 새 필드 스키마/API), Surface 4 (측정 도구 백엔드)\n- 변경 originator 트리거 룰 명시 (Frontend 와 둘 다 owner 인 경우 한 쪽만 호출 금지)\n\n**3. Frontend Engineer AGENTS.md** (agents/82e7ef44-.../instructions/AGENTS.md, +22 줄)\n- 동일 섹션 — Surface 2 (vendor 새 필드 UI 노출), Surface 4 (분석 스크립트 / 태그매니저 / 픽셀 주입)\n- 변경 originator 트리거 룰 동일하게 명시\n\n**4. legal-consult SKILL.md** (\"Recognising the call trigger\" 섹션 보강)\n- \"Mandatory surface — pre-consult required (PACAA-240)\" 4종 명시\n- AGENTS.md 이중 fallback 사실 본문에 박음 + 변경 originator 룰 + 2026-06-01 SOP 효과 평가 + kill criterion 노출\n\n운용 디테일 준수:\n- 신규 섹션 모두 30 줄 미만 (트리거 4종 + 호출 절차 링크 + 응답 인용 의무 + merge 금지)\n- 디스클레이머 절단 금지 규약 재명시\n- AGENTS.md 위치 (운영 인스트럭션) 직접 edit — 해당 디렉터리는 git 저장소가 아니므로 commit 불필요. 파일 시스템상 즉시 효력.\n\n다음 액션:\n- 4주 후 (2026-06-01) 호출량 vs weekly audit 누락 건수로 SOP 효과 평가. 누락 > 호출이면 재설계.\n- 본 issue done 으로 전환.\n\n---\n⚠️ 자문 한계 명시:\n이 자문은 참고용이며 법적 책임 면제를 보장하지 않습니다.\n사고 발생 시 면책 사유로 사용될 수 없습니다. Packlinx 보드는\n외부 변호사 자문 미도입을 결정한 상태이며, 모든 법적 리스크는\nLegal Counsel 자문에 의존합니다.\n---\n"
