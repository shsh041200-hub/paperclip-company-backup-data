        authorAgentSlug: "ceo"
        authorType: "agent"
        body: "답변드립니다.\n\n---\n\n**현재 작업**: 보드님 우려는 정확하지만, 결론부터 말씀드리면 **삭제해도 구글/네이버 제출분에 영향 없습니다**. 코드 확인 결과 `[id]/route.ts` 는 `[__metadata_id__]/route.ts` 와 **글자 한 자도 다르지 않은 복사본** (둘 다 242줄, param 이름만 다름). 즉 같은 sitemap XML 을 두 번 만든 것이고, 하나만 남겨도 sitemap URL 은 그대로 작동합니다.\n\n**보드님 필요 행동**: 아래 설명 읽고 fix 진행 OK 만 주시면 PACAA-319 (CTO) 로 위임. 제출된 sitemap 은 안전합니다.\n\n---\n\n### 검색엔진 제출 sitemap 의 실체\n\n코드 확인 결과 사이트맵은 **3개 구현**이 공존 중:\n\n| 파일 | 출력 URL | 역할 |\n|---|---|---|\n| `app/sitemap.ts` (78줄) | `/sitemap.xml` | Next.js metadata 자동 생성. keywords/guides/categories/compare 인덱스 |\n| `app/sitemap/[__metadata_id__]/route.ts` (242줄) | `/sitemap/0`, `/sitemap/1`, ... | **PACAA-116 sharded sitemap**. companies 50K 단위 분할, 본 운영용 (`www.packlinx.com` 기본값) |\n| `app/sitemap/[id]/route.ts` (242줄) | `/sitemap/0`, `/sitemap/1`, ... | **위와 동일 코드 복사본**. param 이름만 `id` 로 바뀜 |\n\n**구글·네이버에 제출했을 가능성이 높은 URL**: `https://www.packlinx.com/sitemap.xml` 또는 `https://www.packlinx.com/sitemap/0` 같은 sharded URL. 이건 라이브 production 코드(이미 배포된 버전)가 응답 중이고, **로컬 dev 의 파일 삭제는 production 응답을 끊지 않습니다**.\n\n### 검색엔진이 사이트맵을 잃는 조건\n\n검색엔진은 다음 두 가지일 때만 sitemap 을 \"잃습니다\":\n1. **production URL 이 404** 가 되었을 때 (며칠 지속되면 인덱스에서 빠짐)\n2. **robots.txt 의 `Sitemap:` 지시어**가 사라지거나 다른 URL 로 바뀌었을 때\n\n이번 fix 는 이 둘에 영향 없음. 이유:\n- production URL `https://www.packlinx.com/sitemap.xml` 은 `app/sitemap.ts` 가 응답. **유지 대상**.\n- production URL `https://www.packlinx.com/sitemap/0`, `/1`... 은 `[__metadata_id__]/route.ts` 가 응답. **유지 대상**.\n- 삭제 대상은 **`[id]/route.ts` 단 하나**. 이건 `[__metadata_id__]/route.ts` 와 똑같은 출력을 내는 복사본이고, 검색엔진에 등록된 URL 형태가 `/sitemap/[id]` 가 아니라 `/sitemap/[__metadata_id__]` 임 (URL 차원에서는 둘 다 `/sitemap/0` 으로 동일하게 보임 → 결과물 동일).\n\n### 추천 fix (안전성 최대)\n\n**A안 (추천): `app/sitemap/[id]/` 디렉터리만 삭제**\n- production sitemap URL 100% 유지. 구글·네이버 제출분 무영향.\n- `[__metadata_id__]/route.ts` 와 `sitemap.ts` 둘 다 보존.\n- `slug` vs `id` 충돌도 같이 해결되도록 `app/api/companies/[id]/` 도 삭제 (또는 그 안의 `similar-optout` 만 `[slug]/` 로 이동).\n\n**검증 절차** (배포 전):\n1. 로컬에서 `curl http://localhost:3000/sitemap.xml` → 200, XML 응답\n2. 로컬에서 `curl http://localhost:3000/sitemap/0` → 200, sharded XML\n3. 둘 다 OK 면 production 도 동일하게 작동 보장.\n\n위 A안으로 진행해도 괜찮으실까요? OK 주시면 PACAA-319 child 로 발의해서 CTO 가 fix + 배포 검증까지 진행합니다."
