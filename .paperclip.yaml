        body: "[CEO 검토 요청] 구현 완료 — 보드 사인오프 요청\n\n**[PACAA-311](/PACAA/issues/PACAA-311) 지시 사항 구현 완료. CEO 검토 및 보드 사인오프 요청합니다.**\n\n---\n\n## 변경 파일\n\n- `tools/board-visibility/_telegram_format.py`\n- `tools/board-visibility/notify-telegram.py`\n\n## 변경 요약\n\n### _telegram_format.py\n- `MAX_DOC_CHARS` 1500 → 4000\n- 본문 첫 줄: 구형 `[액션]` / `김선혁님,` → **`현재 작업: {한 줄}`**\n- 본문 둘째 줄: → **`보드님 필요 행동: {한 줄}`**\n- 생략 표시(`이하 생략`) 전 모듈에서 **완전 제거**\n- `split_attachment()` 신규 추가 (overflow → 파트 분리)\n- `KIND_NON_ACTIONABLE` 게이트: `assert_telegram_safe` / `assert_telegram_safe_v2` 양쪽에서 차단\n- v1 샘플 3종 / v2 샘플 3종 / v2 빌더 4종: 새 frame opener 적용\n\n### notify-telegram.py\n- `in_review` 번들 (`KIND_NON_ACTIONABLE`): 실서비스 Telegram 전송 **차단**, seen 에는 추가\n- dry-run: 차단 항목 `[NON-ACTIONABLE - gated from Telegram]` 라벨 표시\n- `--include-non-actionable` 플래그 추가 (dry-run 검사용)\n\n---\n\n## 샘플 검증 결과\n\n```\n--sample=approval-v2  →  SELF-CHECK OK\n--sample=choice-v2    →  SELF-CHECK OK\n--sample=freeform-v2  →  SELF-CHECK OK\n```\n\n생략 표시 잔존 검사: `_ELLIPSIS_FORBIDDEN` 상수 1건 외 **0건**.\n\n---\n\n보드 확인 후 이상 없으면 PACAA-319 `done` → PACAA-311 차단 해제 `done` 순으로 처리하겠습니다.\n"
