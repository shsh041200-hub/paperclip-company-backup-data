        body: "## 구매하신 도메인 (라이브 API 조회 결과)\n\n### 1. packlinx.com — **Vercel 레지스트라**\n- 구매일: **2026-03-07** (UTC 11:51)\n- 만료일: **2028-03-07** (2년치 구매)\n- 갱신가: **$11.25/yr** (Vercel API 응답)\n- 갱신 설정: **❌ auto-renew OFF** — 2028-03-07 전 수동 갱신 안 하면 만료\n- 결제 계정: shsh041200@gmail.com (Vercel team)\n- DNS: ns1.vercel-dns.com / ns2.vercel-dns.com\n\n### 2. boxcunserting.com — **Vercel 레지스트라** ⚠️\n- 구매일: **2026-03-07** (UTC 06:41, packlinx.com 보다 5h 먼저)\n- 만료일: **2027-03-07** (1년치)\n- 갱신가: **$11.25/yr**\n- 갱신 설정: **❌ auto-renew OFF**\n- 결제 계정: shsh041200@gmail.com (Vercel team)\n- 현재 상태: https://boxcunserting.com → **HTTP 404** (미사용)\n- ⚠️ 보드님께 확인: 이 도메인 의도된 구매인가요? 철자가 \"boxconsulting\" 의 오타로 보이는데 (cu↔co), 사용처가 없으면 2027-03-07 에 만료 방치하셔도 됩니다.\n\n### 3. packlinx-api.com — **Cloudflare 레지스트라**\n- 구매일: **2026-05-02** (UTC 07:59)\n- 만료일: **2027-05-02** (1년치)\n- 갱신가: Cloudflare Registrar 도매가 **약 $9.77/yr** (.com)\n- 용도: Paperclip API host (`paperclip-api.packlinx-api.com`)\n- DNS: erin/mark.ns.cloudflare.com\n\n## 연간 도메인 비용 (갱신 기준 추정)\n- packlinx.com: $11.25/yr (Vercel)\n- packlinx-api.com: ~$9.77/yr (CF) — 핵심 인프라\n- boxcunserting.com: $11.25/yr (방치 시 갱신 안 됨)\n- **합계 ~$21/yr** (boxcunserting 갱신 안 할 경우)\n\n## 모르는 영역\n- Cloudflare에 다른 도메인 등록되어 있는지: CF API 토큰 없어 전수 조회 불가. CF 대시보드 → Domain Registration 탭에서 보드님 직접 확인 권장.\n- 가비아/네임칩/고대디 등 한국 레지스트라에 별도 도메인: 흔적 없음.\n\n## 권장 다음 액션\n1. **boxcunserting.com** — 오타 도메인인지, 의도된 보유인지 확인 (오타면 만료 방치)\n2. **packlinx.com** auto-renew OFF — 2028-03-07 캘린더 리마인더 또는 Vercel UI 에서 auto-renew ON 권장\n3. **packlinx-api.com** — 핵심 인프라 도메인이라 만료 시 Paperclip API 다운. 2027-05-02 전 갱신 또는 auto-renew ON 확인 필요"
