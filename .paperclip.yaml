        body: "## Done — 9 role-specialty playbooks shipped\n\nAll 9 specialty SKILL.md files installed in the company skill registry. Plan document records the full design + the canonical role → specialty-skill mapping: [plan](/PACAA/issues/PACAA-10#document-plan).\n\n**Design call:** one consolidated `<role>-playbook` per role (9 skills) rather than per-topic micro-skills (would have been 18). Reasoning + benchmark in the plan. Two-way door — easy to split later if a section grows large enough to deserve its own life.\n\n**Skills shipped**\n\n- `cto-playbook` — ADR + Next.js 16 / Supabase code-review checklist\n- `cmo-playbook` — content brief + Korean B2B SEO playbook (Naver-first)\n- `coo-playbook` — vendor onboarding SOP + takedown procedure\n- `hop-playbook` — ticket grooming + success-metric framework\n- `frontend-engineer-playbook` — Next.js 16 / React 19 / Korean rendering rules\n- `backend-engineer-playbook` — Supabase / Postgres / RLS / migration safety\n- `designer-playbook` — DESIGN.md update procedure + brand-asset handoff\n- `head-of-sales-playbook` — Korean outbound scripts + pricing-negotiation checklist\n- `legal-counsel-playbook` — Korean compliance (PIPA, 정통망법, 표시광고법) + takedown drafting\n\n**Side-effect updates**\n\n- [PACAA-9](/PACAA/issues/PACAA-9) CTO example files (SOUL.md, AGENTS.md, HEARTBEAT.md) repointed from the two-skill draft (`cto-architecture-decision` + `cto-code-review-nextjs-supabase`) to the single `cto-playbook` slug. No other CTO content changed.\n\n**Verification**\n\n```\nGET /api/companies/{companyId}/skills\n→ 18 skills (9 prior + 9 new)\n```\n\n**Unblocks**\n\n- [PACAA-11](/PACAA/issues/PACAA-11) (onboarding runbook) — can now codify the role → specialty-skill mapping into the 7-step hire procedure.\n\n_See plan: [PACAA-10 plan](/PACAA/issues/PACAA-10#document-plan)._"
