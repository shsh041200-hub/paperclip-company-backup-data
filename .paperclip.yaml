        body: "[CEO 검토 요청] Phase 2 batch 1 콘텐츠 완료 — 박스·골판지 5개 가이드 v1 슬롯 작성\n\n## 완료 내용\n\n5개 가이드 × 6개 슬롯(TL;DR·Callout·Checklist·FAQ·Sidebar·end-CTA) 전체 작성 완료.  \n콘텐츠 파일: `content/phase2-batch1.md` (워크스페이스에 저장)\n\n## Acceptance 체크\n\n- [x] 5개 가이드 모두 6개 슬롯 완성\n- [x] 수치 사실 확인: 골 두께(ISO 기준), 택배 박스 단가(가이드 기술 명세 일치), 이사박스 규격(국내 업계 통용 기준)\n- [x] Internal link slug = 라이브 가이드 21개 안에서만 사용\n- [x] 한국어 가이드 2개(이사박스-사이즈-규격·이사박스-대량구매-가이드)는 전체 한국어 작성\n- [x] end-CTA href = `/products/box` (라이브 product slug 확인)\n\n## PACAA-240 법률 자문 플래그\n\nSurface 1 (외부 노출 콘텐츠 신규 발행) 해당.  \nFE child 발의 전 Legal Counsel 자문 child issue를 별도 생성했습니다.  \n→ FE 구현(publish/merge)은 Legal Counsel 응답 후 진행해야 합니다.\n\n## 다음 단계 (CEO)\n\n1. 사실 정합성·SEO·funnel 가치 검수\n2. Legal Counsel 자문 완료 확인\n3. FE child 발의 → `redesignVersion=1` + body 컴포넌트 추가\n4. 라이브 verify → batch 2 발의\n\n---\n\n# Phase 2 batch 1 — 박스·골판지 5개 가이드 v1 콘텐츠\n\n작성일: 2026-05-10  \n이슈: PACAA-428  \n대상: corrugated-flute-types / shipping-box-pricing / small-quantity-custom-box / 이사박스-사이즈-규격 / 이사박스-대량구매-가이드\n\n---\n\n## guide: corrugated-flute-types\n\n### TL;DR\n- **A골(4.7mm)** — 완충성 최고. 식품·가전 등 충격 민감 제품에 최적. 소재 사용량이 많아 단가는 높습니다.\n- **E골·F골(1.6mm 이하)** — 초박형으로 화장품·소매 박스 인쇄 품질이 탁월합니다. 적재 강도는 낮습니다.\n- **골 선택 순서** — 제품 무게·충격 민감도 → ECT 적층 강도 → 인쇄 정밀도 순으로 결정합니다.\n\n### Callouts\n\n1. info — **골 두께 ≠ 강도** / 골 높이가 높을수록 완충성은 올라가지만 압축 강도(ECT)는 C골이 A골보다 높을 수 있습니다. 강도 설계 시 ECT 수치를 반드시 확인하세요.\n\n2. warn — **E골 단독 사용 주의** / E골은 인쇄 품질이 우수하지만 1kg 이상 중량 제품 단독 포장에는 부적합합니다. 이중벽(DW) 구조나 내부 보강재와 병용하세요.\n\n3. tip — **골 방향 확인** / 박스 조립 방향과 골 방향이 수직이면 압축 강도가 최대 2배 차이납니다. 발주 전 제조사에 골 방향(MD/CD) 명시 요청을 권장합니다.\n\n### Checklist — 골 선택 전 확정 항목\n- **내용물 무게** — 단위 박스당 최대 적재 중량 확인\n- **충격 민감도** — 파손 발생 시 비용·클레임 빈도 검토\n- **인쇄 정밀도** — 로고·바코드 인쇄 해상도 요건 명시\n- **ECT 강도 기준** — 적재 단수 × 박스 중량으로 최소 ECT 산출\n- **납기·MOQ** — 골 유형별 제조사 재고 현황 및 최소 발주량 확인\n\n### FAQ\n**Q:** A골·B골·C골 중 택배 배송에 가장 많이 쓰이는 골은?\n**A:** 전 세계 일반 택배 박스의 약 80%는 C골(3.5mm)을 사용합니다. A골 대비 소재 효율이 높고, B골 대비 완충성이 우수해 범용성이 좋습니다. 업체 선정 기준은 [/guides/corrugated-box-supplier-selection]을 참고하세요.\n\n**Q:** E골과 F골의 차이는?\n**A:** E골(1.6mm)은 소매 박스·마감재로 주로 쓰이고, F골(0.8mm)은 더 얇아 화장품·식품 소형 박스에 적합합니다. F골은 국내 취급 업체가 제한적이므로 발주 전 납기 확인이 필수입니다.\n\n**Q:** 이중벽(Double Wall) 구조는 언제 사용하나요?\n**A:** 10kg 이상 중량 제품, 장거리 해상 운송, 또는 팰릿 적재 5단 이상인 경우 이중벽 구조(B+C, B+B)를 검토하세요. 단가는 약 1.5~2배지만 파손율 감소 효과로 총비용을 절감할 수 있습니다.\n\n**Q:** 소량 맞춤 박스 제작 시 골 유형 선택은 어떻게 하나요?\n**A:** 소량(100~500매) 발주 시 재고형 C골 원지를 사용하는 업체가 납기·단가 면에서 유리합니다. 특수 골(E·F)은 소량 발주 시 원지 재단 손실비가 추가될 수 있습니다. 상세 발주 기준은 [/guides/small-quantity-custom-box]를 참고하세요.\n\n### Sidebar 관련 가이드\n- /guides/corrugated-box-supplier-selection — 골판지 업체 MOQ·납기·인증 비교 ⏱ 7분\n- /guides/shipping-box-pricing — 택배 박스 수량별 단가 가이드 ⏱ 4분\n- /guides/small-quantity-custom-box — 100~500매 소량 맞춤 박스 발주 ⏱ 5분\n- /guides/packaging-material-complete-guide — 골판지·단프라·친환경 소재 비교 ⏱ 6분\n\n### end-CTA\ntitle: 골 유형별 업체 지금 비교\nsubtitle: 골판지 박스 전문 업체, 골 종류·MOQ·인쇄 조건으로 필터 비교\nhref: /products/box\n\n---\n\n## guide: shipping-box-pricing\n\n### TL;DR\n- **1호 기준 130~180원** — 1,000개 발주 기준 개당 단가. 5,000개 이상 시 30~40% 추가 할인이 가능합니다.\n- **사이즈 클수록 단가 상승폭 비선형** — 3호 이상은 소재 면적 증가로 2호 대비 단가가 약 50~70% 높습니다.\n- **500개 미만 발주는 디지털 인쇄 업체 선택** — 오프셋 대비 단가는 높지만 MOQ 없이 유연하게 발주합니다.\n\n### Callouts\n\n1. info — **택배사 사이즈 기준 확인** / 한국 주요 택배사(CJ·한진·롯데)의 '1호' 기준은 가로+세로+높이 합계 80cm 이내, 무게 5kg 이내입니다. 박스 제조사 '1호'와 택배사 '1호' 기준이 다를 수 있으니 발주 전 양쪽 사이즈표를 반드시 대조하세요.\n\n2. warn — **단가만 보면 총비용이 달라진다** / 박스 단가 외 인쇄비·형판비·운송비가 별도 청구되는 경우가 많습니다. 총 구매 비용(TCO) 기준으로 비교하지 않으면 실제 비용이 견적의 1.3~1.5배까지 늘어날 수 있습니다.\n\n3. tip — **발주 물량 묶음 전략** / 같은 제조사에서 여러 사이즈를 한 번에 발주하면 운송비를 절감하고 단가 협상력이 높아집니다. 월 발주 물량을 합산한 뒤 분기 단위로 묶어 발주하는 것을 권장합니다.\n\n### Checklist — 택배 박스 발주 전 확정 항목\n- **내용물 최대 치수** — 가로·세로·높이 실측 후 박스 내경 기준 +20~30mm 여유 확인\n- **내용물 무게** — 택배사 사이즈 구간별 무게 제한 초과 여부 확인\n- **월 평균 발주 물량** — 물량 구간(500·1,000·3,000·5,000개)별 단가 시뮬레이션\n- **인쇄 요건** — 브랜드 로고·반송 주소 인쇄 여부, 도수(1도/2도/전면) 확정\n- **납기 일정** — 재고형(2~3일) vs 생산 주문형(5~10 영업일) 방식 선택\n\n### FAQ\n**Q:** 택배 박스 1,000개 주문 시 실제 총 비용은 얼마나 드나요?\n**A:** 1호 기준 단가 130~180원에서 1도 인쇄비(약 20~30원/개)·형판비(3~10만원 1회)·배송비를 합산하면 총비용은 약 18~28만원 수준입니다. 정확한 견적은 업체별로 다르므로 Packlinx에서 3곳 이상 비교 견적을 받으시기 바랍니다.\n\n**Q:** 수량이 적을 때 단가를 낮추는 방법은?\n**A:** 500개 미만이라면 디지털 인쇄 방식 업체를 선택하면 형판비 없이 발주할 수 있습니다. 상세 소량 발주 옵션은 [/guides/small-quantity-custom-box]를 참고하세요.\n\n**Q:** 택배 박스 사이즈는 어떻게 결정하나요?\n**A:** 내용물 최대 치수에 완충재 두께(EPE 기준 10~20mm)를 더한 내경으로 결정합니다. 사이즈가 택배사 구간을 넘으면 추가 운임이 발생하므로 내경 기준보다 외경 기준 택배사 구간표를 먼저 확인하세요.\n\n**Q:** 재고형 박스와 생산 주문형 박스의 차이는?\n**A:** 재고형은 표준 사이즈·무지(흰색/크라프트) 납기 2~3일이지만 사이즈 선택지가 제한됩니다. 생산 주문형은 맞춤 사이즈·인쇄가 가능하지만 납기 5~10 영업일, MOQ 500개 이상이 일반적입니다.\n\n**Q:** 골판지 원지 등급에 따라 단가 차이가 크게 나나요?\n**A:** 단가는 원지 등급 명칭보다 원지 평량(g/㎡)과 골 종류(A·B·C)에 따라 결정됩니다. 골판지 원지 등급 상세 내용은 [/guides/corrugated-flute-types]를 참고하세요.\n\n### Sidebar 관련 가이드\n- /guides/corrugated-flute-types — A·B·C·E·F골 특성·용도 선택 가이드 ⏱ 5분\n- /guides/small-quantity-custom-box — 100~500매 소량 맞춤 박스 발주 ⏱ 5분\n- /guides/corrugated-box-supplier-selection — 골판지 업체 MOQ·납기 비교 ⏱ 7분\n- /guides/packaging-tape-comparison — OPP·크라프트·무소음 테이프 비교 ⏱ 4분\n\n### end-CTA\ntitle: 택배 박스 업체 무료 견적 비교\nsubtitle: 박스 전문 업체, 사이즈·수량·인쇄 조건으로 필터 비교\nhref: /products/box\n\n---\n\n## guide: small-quantity-custom-box\n\n### TL;DR\n- **디지털 인쇄 100개부터** — 형판비 없이 최소 100개부터 맞춤 인쇄 박스 발주가 가능합니다.\n- **납기 5~7 영업일** — 디지털 인쇄 기준. 오프셋 인쇄 대비 2~3배 빠르지만 단가는 약 30~50% 높습니다.\n- **1,000개 넘으면 오프셋 전환 검토** — 단가 분기점은 보통 500~1,000개 구간. 수량이 늘수록 오프셋이 원가 효율적입니다.\n\n### Callouts\n\n1. info — **디지털 vs 오프셋 선택 기준** / 1,000개 미만은 디지털 인쇄, 1,000개 이상은 오프셋이 원가 효율적입니다. 단, 색상 정밀도(Pantone 정합)가 중요한 경우 오프셋이 더 나은 결과를 줍니다.\n\n2. warn — **파일 해상도 미준수 시 발주 지연** / 디지털 인쇄는 300dpi 이상 PDF/AI 파일을 요구합니다. 72dpi 웹용 파일로 발주하면 제조사에서 반려되어 납기가 3~5일 추가 지연될 수 있습니다.\n\n3. tip — **샘플 선(先) 발주 권장** / 본 발주 전 샘플(1~5개)을 제작해 색상·치수·강도를 실물로 검수하면 불량 반품 리스크를 줄일 수 있습니다. 샘플 비용은 보통 3~10만원이며 본 발주 시 공제해 주는 업체도 있습니다.\n\n### Checklist — 소량 맞춤 박스 발주 전 확정 항목\n- **박스 내경 치수** — 내용물 + 완충재 두께 포함 최종 내경(W×D×H) mm 확정\n- **발주 수량** — 디지털(100~999개) vs 오프셋(1,000개 이상) 방식 선택 기준 확인\n- **인쇄 도수·색상** — 1도/2도/풀컬러(4도) 및 Pantone 지정 여부 명시\n- **디자인 파일 규격** — 300dpi 이상 PDF·AI·EPS, 도무송(die-cut) 선 레이어 분리\n- **납기 요건** — 판매 일정 역산 후 제조사 생산 리드타임 + 배송 여유일 확보\n\n### FAQ\n**Q:** 소량 맞춤 박스 100개 기준 단가는 얼마인가요?\n**A:** 박스 사이즈·인쇄 도수에 따라 다르나, 표준 C골 1호 기준 디지털 인쇄 1도는 개당 약 300~500원 수준입니다. 풀컬러(4도) 전면 인쇄는 500~900원까지 올라갈 수 있습니다. 정확한 견적은 Packlinx에서 소량 전문 업체에 문의하세요.\n\n**Q:** 100개 이하로도 발주할 수 있나요?\n**A:** 일부 디지털 인쇄 전문 업체는 50개 이하 소량도 수용하지만 개당 단가가 높아집니다. Packlinx 업체 필터에서 '소량 가능' 조건으로 검색하면 해당 업체를 찾을 수 있습니다.\n\n**Q:** 디자인 파일이 없어도 발주할 수 있나요?\n**A:** 네, 디자인 파일 작성 서비스를 제공하는 업체가 있습니다. 로고 파일과 텍스트 정보만 제공하면 업체가 전개도(die-cut) 레이아웃까지 제작합니다. 비용은 5~15만원 수준이며 2~3 영업일이 추가로 소요됩니다.\n\n**Q:** 인쇄 품질이 중요한 브랜드 박스는 어떤 골을 선택해야 하나요?\n**A:** 인쇄 정밀도를 높이려면 E골(1.6mm) 또는 F골(0.8mm) 기반 박스를 선택하세요. C골 대비 표면이 균일해 디지털 인쇄 시 색상 재현율이 높습니다. 골 유형 상세 비교는 [/guides/corrugated-flute-types]를 참고하세요.\n\n**Q:** 친환경 소재로 맞춤 박스를 만들 수 있나요?\n**A:** FSC 인증 원지 또는 재생 골판지로 소량 제작이 가능합니다. 다만 친환경 원지 수급이 제한적이어서 납기가 1~2주 더 소요될 수 있습니다. 친환경 포장재 전환 기준은 [/guides/eco-friendly-packaging]을 참고하세요.\n\n### Sidebar 관련 가이드\n- /guides/corrugated-flute-types — A·B·E·F골 특성·인쇄 적합성 비교 ⏱ 5분\n- /guides/shipping-box-pricing — 수량별 택배 박스 단가 기준표 ⏱ 4분\n- /guides/corrugated-box-supplier-selection — 소량 전문 업체 선정 기준 ⏱ 7분\n- /guides/eco-friendly-packaging — FSC 인증 친환경 박스 전환 가이드 ⏱ 6분\n\n### end-CTA\ntitle: 소량 맞춤 박스 업체 바로 비교\nsubtitle: 박스 전문 업체, MOQ·인쇄 방식·납기 조건으로 필터 비교\nhref: /products/box\n\n---\n\n## guide: 이사박스-사이즈-규격\n\n### TL;DR\n- **표준 4호수(소·중·대·특대)** — 한국 이사업계 통용 규격. 소 310×210×220mm~특대 600×430×400mm(외경 기준, 제조사마다 ±20mm 차이 있음).\n- **1박스 권장 무게 15~20kg 이하** — 초과 적재 시 바닥 파손 위험. 무거운 짐(책·그릇)은 소 박스에 분산합니다.\n- **호수별 수납 기준** — 소=책·그릇류, 중=의류·잡화, 대=이불·쿠션, 특대=완충재와 함께 가전 보조 포장에 씁니다.\n\n### Callouts\n\n1. info — **호수 명칭이 같아도 치수가 다를 수 있다** / 이사업체·박스 제조사마다 '소·중·대' 또는 '1호·2호·3호' 명칭이 같아도 외경 치수가 ±20mm 차이가 날 수 있습니다. 발주 전 업체 치수표를 반드시 확인하고 내경 기준으로 수납 테스트를 권장합니다.\n\n2. warn — **과적 위험** / 이사박스 1개당 권장 무게는 15~20kg입니다. 초과 적재 시 바닥 파손뿐 아니라 운반 중 낙하 부상 사고 위험이 있습니다. 특히 책·그릇류는 소 박스에 나눠 담으세요.\n\n3. tip — **박스 외면 표기** / 이사 전 박스 외면에 방·내용물·무게 표기 스티커를 붙이면 이사 당일 작업 효율이 크게 올라갑니다. 유성 매직 또는 라벨 프린터를 활용하세요.\n\n### Checklist — 이사박스 사이즈 선택 전 확정 항목\n- **짐 품목 분류** — 책/의류/주방/가전/침구 카테고리별 수납 계획 수립\n- **박스 내경 치수 확인** — 구매 전 업체별 외경·내경 치수표 비교 (제조사마다 상이)\n- **적재 층수 계획** — 이삿짐차 적재 높이 기준으로 층수별 무게 배분 확인\n- **수량 추산** — 방 개수 기준 소 5~8개·중 5~8개·대 3~5개가 1인 가구 평균 참고치\n- **재사용 여부** — 1회용 vs 다회용(이사업체 대여) 비용 비교\n\n### FAQ\n**Q:** 이사박스 소·중·대·특대 규격(외경 mm)과 용량(L)은 각각 어떻게 되나요?\n**A:** 국내 이사업계 통용 기준으로 소(310×210×220mm, 약 14L)·중(420×300×300mm, 약 38L)·대(480×370×360mm, 약 64L)·특대(600×430×400mm, 약 103L) 수준입니다. 정확한 치수는 제조사마다 ±20mm 차이가 있으므로 발주 전 업체 치수표를 확인하세요.\n\n**Q:** 일반 가정 이사 시 어떤 호수를 가장 많이 사용하나요?\n**A:** 이삿짐 무게 균형을 위해 중 박스(약 38L)가 가장 많이 쓰입니다. 소 박스는 책·그릇 등 무거운 품목, 대 박스는 이불·쿠션 등 부피 큰 품목에 사용합니다. 3인 가족 기준 소 10개·중 15개·대 8개가 일반적인 참고 수량입니다.\n\n**Q:** 이사박스를 대량으로 구매할 때 단가는 얼마나 되나요?\n**A:** 대량 구매 단가와 업체 선정 기준은 [/guides/이사박스-대량구매-가이드]에서 자세히 다룹니다.\n\n**Q:** 이사박스 사이즈 커스텀 제작이 가능한가요?\n**A:** 가능하지만 최소 발주량(MOQ) 500매 이상이 일반적입니다. 100~500매 소량 맞춤 박스 제작 옵션은 [/guides/small-quantity-custom-box]를 참고하세요.\n\n**Q:** 이사박스를 효율적으로 적재하는 방법은?\n**A:** 무거운 박스를 아래에, 가벼운 박스를 위에 쌓고 박스 크기를 맞춰 빈 공간을 최소화합니다. 이삿짐차 기준 천장까지 수직 쌓기가 가능하도록 같은 높이 박스를 우선 선택하세요.\n\n### Sidebar 관련 가이드\n- /guides/이사박스-대량구매-가이드 — 수량 기준·단가·업체 선정 가이드 ⏱ 5분\n- /guides/corrugated-box-supplier-selection — 골판지 업체 MOQ·납기 비교 ⏱ 7분\n- /guides/small-quantity-custom-box — 소량 맞춤 박스 발주 가이드 ⏱ 5분\n- /guides/packaging-material-complete-guide — 골판지·단프라 소재 비교 ⏱ 6분\n\n### end-CTA\ntitle: 이사박스 업체 지금 비교\nsubtitle: 이사박스 전문 업체, 사이즈·수량·납기 조건으로 필터 비교\nhref: /products/box\n\n---\n\n## guide: 이사박스-대량구매-가이드\n\n### TL;DR\n- **500매 이상부터 제조사 직거래 협상 가능** — 도매상 대비 10~20% 단가 절감 가능. 단, 품질 검수와 납기 관리는 직접 수행해야 합니다.\n- **원지 평량(g/㎡)이 실질 강도 결정** — 골판지 등급 명칭보다 원지 평량 160~175g/㎡ 이상을 발주 사양서에 직접 명시하세요.\n- **이사 성수기(3·9월) 2~3주 선발주 필수** — 생산 주문형은 최소 7~10 영업일 소요. 성수기에는 품귀로 납기가 2~3주 추가될 수 있습니다.\n\n### Callouts\n\n1. info — **대량 발주 단가 분기점** / 국내 골판지 이사박스 제조사는 500매·1,000매·3,000매·5,000매 단위로 단가 구간이 끊깁니다. 1,000매 이상이면 제조사 직거래, 500매 미만이면 도매상 구매가 유통·납기 면에서 유리한 경우가 많습니다.\n\n2. warn — **이사 성수기 품귀 주의** / 3월(학기 이사)·9월(추석 전후 이사) 성수기에는 박스 수급이 빡빡해집니다. 성수기 2~3주 전 선발주를 권장하며, 재고형 박스는 별도 창고 공간을 확보해야 합니다.\n\n3. tip — **복수 업체 분산 발주** / 단일 업체 의존도를 낮추기 위해 메인 업체 70%·서브 업체 30% 비율로 분산 발주하면 공급 리스크를 줄일 수 있습니다. 성수기 전 서브 업체를 미리 등록해 두는 것을 추천합니다.\n\n### Checklist — 이사박스 대량 구매 전 확정 항목\n- **연간 소요 수량 예측** — 월 평균 이사 건수 × 건당 박스 수량으로 연간 총량 산출\n- **박스 규격·등급 사양서** — 외경 치수·원지 평량(g/㎡)·골 종류 명시 후 업체에 전달\n- **납기 일정 역산** — 성수기(3·9월) 수요 급증 감안한 선발주 스케줄 확정\n- **보관 공간 확보** — 팰릿 단위 적재 가능 여부, 창고 바닥 면적·높이 기준 확인\n- **결제 조건 협상** — 현금 선결제·어음·카드 결제 조건별 추가 할인 여부 확인\n\n### FAQ\n**Q:** 이사박스 대량 구매 시 골판지 등급별 차이는?\n**A:** 국내 골판지는 원지 평량(g/㎡) 기준으로 강도가 결정됩니다. 발주 사양서에 등급 명칭보다 원지 평량(160g·175g/㎡ 등)과 골 종류(A·B·C)를 직접 명시하는 것이 권장됩니다. 골 종류 상세 비교는 [/guides/corrugated-flute-types]를 참고하세요.\n\n**Q:** 제조사 직거래와 도매상 중 어느 채널이 유리한가요?\n**A:** 1,000매 이상 정기 발주는 제조사 직거래가 단가 면에서 유리합니다. 500매 미만 또는 다양한 사이즈를 혼합 발주할 때는 도매상이 재고 유연성 면에서 낫습니다. 업체 비교와 견적은 Packlinx에서 한번에 받아보세요.\n\n**Q:** 대량 발주 납기는 얼마나 걸리나요?\n**A:** 재고형 표준 박스는 2~3 영업일, 생산 주문형(맞춤 사이즈·인쇄)은 7~10 영업일이 일반적입니다. 성수기(3·9월)에는 1~2주 추가 소요가 될 수 있으니 여유있게 발주하세요.\n\n**Q:** 대량 구매 시 로고·인쇄 옵션은 어떻게 되나요?\n**A:** 1,000매 이상부터 1~2도 플렉소 인쇄가 가능하며 형판비는 업체별 5~15만원입니다. 소량(100~500매) 디지털 인쇄 옵션은 [/guides/small-quantity-custom-box]를 참고하세요.\n\n**Q:** 골판지와 단프라 중 이사박스로 어떤 소재가 나은가요?\n**A:** 일반 이사용은 골판지가 원가 효율적입니다. 단프라(PP 골판지)는 방습·내구성이 필요한 보관용 박스나 반복 사용 이사박스에 적합하지만 단가가 2~3배 높습니다. 소재 선택 기준 상세 내용은 [/guides/packaging-material-complete-guide]를 참고하세요.\n\n### Sidebar 관련 가이드\n- /guides/이사박스-사이즈-규격 — 이사박스 표준 규격표·적재 기준 ⏱ 4분\n- /guides/corrugated-box-supplier-selection — 골판지 업체 MOQ·납기·인증 비교 ⏱ 7분\n- /guides/small-quantity-custom-box — 소량(100~500매) 맞춤 박스 발주 ⏱ 5분\n- /guides/packaging-material-complete-guide — 골판지·단프라·친환경 소재 비교 ⏱ 6분\n\n### end-CTA\ntitle: 이사박스 대량 발주 업체 비교\nsubtitle: 이사박스 전문 업체, 수량·원지 등급·납기 조건으로 필터 비교\nhref: /products/box\n"
