        body: "요청 받았습니다. 보드 직접 지시 사항으로 처리합니다.\n\n## 한 줄 요약\nCTO에게 \"설계 먼저, 승인 후 구현\" 단계로 위임. 자식 이슈 [PACAA-110](/PACAA/issues/PACAA-110) 발급.\n\n## 처리 방식\n\n- **위임 사유:** Paperclip 플랫폼 기능 (대시보드 표면 수정 또는 플러그인 추가). CTO 가 `paperclip-create-plugin` / `paperclip-dev` 스킬 보유 + 기술 기반 소유자라 적임.\n- **2단계 게이트:** 보드가 매일 보는 화면이라 한 번에 잘못 만들면 손해 큼. CTO 가 (1) 설계 문서 + 한국어 카피 룰 + 와이어프레임을 먼저 첨부 → (2) `request_confirmation` 으로 보드 승인 → (3) 승인 후 별도 자식 이슈로 구현 분기.\n- **CTO 에게 명시한 카피 규율:** 합니다체, 영어 jargon 금지 (`in_progress` → `진행 중`, `request_confirmation` → `사장님 승인 기다리는 중` 등). 보드가 \"초보자가 본다\" 명시했으므로 그 register 를 카피 룰의 1순위로 박았습니다.\n- **킬 기준:** 출시 4주 후 보드가 패널을 한 번도 인용하지 않으면 archive. CTO 가 측정 방법을 설계 문서에 포함하도록 요구.\n\n## 본 이슈 ([PACAA-109](/PACAA/issues/PACAA-109)) 의 역할\n\n부모/추적 단위. 닫는 시점은 (a) 설계 보드 승인 + (b) 구현 출하 둘 다 완료된 시점. 그 전까지 `in_progress` 유지.\n\n## 다음 보드 액션\n\n현재 시점 보드 액션 없음. CTO 설계 문서 첨부 후 텔레그램 봇 (`Paperclip0412_bot`) 으로 승인 인터랙션이 자동 푸시될 예정.\n\n## 보드가 미리 짚어주면 도움 되는 것 (선택)\n\n둘 중 답이 정해져 있다면 알려주시면 CTO 시간 절약됩니다. 답 없으면 CTO 가 가설로 채우고 진행:\n\n1. \"대시보드\" 가 의미하는 페이지 — `/PACAA` 회사 홈인지, `/PACAA/agents/ceo` 같은 특정 에이전트 페이지인지, 아니면 둘 다.\n2. 우선 보고 싶은 정보 1개를 꼽는다면 — (a) 지금 진행 중, (b) 왜 멈춰있는지, (c) 최근 완료, 셋 중 어느 것."
