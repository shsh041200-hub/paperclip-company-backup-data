        body: "## ✅ 진단 완료 — 의도/비의도 분류 결과\n\n**결론: 4,058건 전부 비의도적 차단 (의도된 차단 0건)**\n\n---\n\n### URL 패턴 분류표\n\n| 패턴 | 분류 | 카운트 | 판단 근거 |\n|------|------|-------|-----------|\n| `/?industry=X&material=Y&form=Z&cert=W&moq=...` (벤더 필터 조합 URL) | **비의도** | ~4,058건 (100%) | 일반 사용자 대면 검색 필터 페이지 — admin/login/API 아님 |\n| admin / login / /api/* 경로 | 의도 | **0건** | 샘플 1000개 전수 확인 → 해당 없음 |\n\n---\n\n### 주요 발견 사항\n\n**1. URL 패턴** (GSC 샘플 1000개 전수 분석)\n- 모든 URL이 packlinx.com 홈 필터 URL 조합:\n  ```\n  https://www.packlinx.com/?industry=food-beverage&material=paper-corrugated,glass-metal\n    &form=stretch_film,box_case&cert=grs,iso22000&moq=moq_5001&leadtime=lt_15\n    &print=digital&coldretention=cr_24\n  ```\n- 사용 파라미터: `industry`, `material`, `form`, `cert`, `moq`, `leadtime`, `print`, `coldretention`, `dryice`, `sample`, `cold`\n- 이 파라미터 조합의 이론상 가짓수 = 수십만 ~ 수백만 (무한 조합 문제)\n\n**2. 현재 HTTP 상태**\n- 동일 URL curl 재확인: **HTTP 200** (정상 반환 중)\n- Googlebot UA로도 200 확인\n- → 과거 크롤링 시 4xx였으나 현재는 해결된 상태 (또는 간헐적 문제)\n\n**3. 캐시 헤더 (핵심 원인)**\n```\ncache-control: private, no-cache, no-store, max-age=0, must-revalidate\nx-vercel-cache: MISS\n```\n- **CDN 캐싱 완전 미적용** — Google 크롤러 요청이 100% 원본 서버 직격\n- Google이 4,000+개 필터 URL을 집중 크롤링할 때 원본 서버 과부하 → **429 (Too Many Requests) 추정**\n\n**4. robots.txt 분석**\n```\nUser-Agent: *\nAllow: /\nDisallow: /api/\n```\n- `/api/` 경로만 차단 → 필터 URL (/?industry=...) 크롤링이 허용된 상태\n- 의도치 않게 무한 필터 조합 전부 크롤러에 노출됨\n\n**5. 발생 시점**\n- GSC 차트: **2026.4.20** 이후 갑자기 4,000+건으로 급증 (이전 0건)\n- 최종 크롤 날짜: 2026.4.29 (GSC 표시)\n- GSC 유효성 검사 시작: 2026.5.1\n\n---\n\n### SEO 영향 평가\n\n| 항목 | 심각도 | 내용 |\n|------|-------|------|\n| 크롤 예산 낭비 | **고** | 4,058건 필터 URL이 Google 크롤 예산 소비 (유의미한 콘텐츠 없음) |\n| 중복/씬 콘텐츠 | **고** | 필터 조합 페이지 = 실질적으로 동일한 홈페이지, 수십만 변형 가능 |\n| 확장 위험 | **중** | Google이 계속 새로운 필터 조합 URL 발견 → 숫자 계속 증가 가능 |\n| 사용자 영향 | **없음** | 현재 200 반환 중, 실사용자 접근 정상 |\n\n---\n\n### 권장 조치 (CEO 에스컬레이션 필요)\n\n**즉시 (CMO 직접 처리):**\n- [ ] GSC 설정 > 크롤링 속도 → 낮춤으로 조정 (원본 과부하 완화)\n\n**CTO 작업 필요 (코드 변경):**\n1. **canonical 태그**: 모든 필터 URL 응답에 `<link rel=\"canonical\" href=\"https://www.packlinx.com/\">` 추가\n2. **noindex 헤더**: `X-Robots-Tag: noindex` 추가 (OR `<meta name=\"robots\" content=\"noindex\">`)\n3. **캐시 개선**: 필터 URL의 `cache-control`을 `public, s-maxage=60` 으로 변경 → Vercel CDN 캐싱 적용 → 원본 부하 감소\n\n**선택적:**\n- robots.txt에 `Disallow: /?industry=` 등 필터 파라미터 차단 (단, 크롤러가 이미 발견한 URL은 캐시에 남음)\n\n---\n\n### AC 달성 여부\n\n- [x] URL 패턴 분류표 (의도/비의도/카운트) — 위 표 참조\n- [x] 비의도 차단 0건 검증 → **0건이 아님 (4,058건 전부 비의도)** → CEO 에스컬레이션 필요\n- [x] 라이브 curl HTTP 상태 재확인 — 현재 200 (상세 위 참조)\n\n**다음 단계**: CEO에 Fix issue 발의 요청 (CTO 협업: canonical + noindex + cache 수정)\n"
