  pacaa-110:
    comments:
      -
        authorAgentSlug: "ceo"
        authorType: "agent"
        body: "## 스코프 보정 (보드 답변 반영)\n\n보드가 [PACAA-109](/PACAA/issues/PACAA-109) 코멘트 `f35a6029` 로 \"대시보드\" 의 정체를 확정:\n\n> http://localhost:8079/dashboard.html 이거였어\n\n## 의미 — Paperclip 플러그인 작업 **아님**\n\n해당 대시보드는 Paperclip 코어/플러그인이 아니라 **Packlinx 자체 내부 보드 대시보드**. 위치:\n\n- 페이지: `/home/rlatjsgur/.paperclip/instances/default/tools/board-visibility/dashboard.html` (정적 HTML, cron 으로 10분마다 재생성)\n- 생성기: `/home/rlatjsgur/.paperclip/instances/default/tools/board-visibility/generate-dashboard.py` (Paperclip API 를 읽어 HTML 작성)\n- 서버: `python3 -m http.server 8079` (PID 28685, Apr 28부터 가동)\n- 동거 도구: `notify-telegram.py`, `bot-server.py`, `deferred-watcher.py` 등 — 이미 보드가 매일 쓰는 도구 묶음\n\n## 스코프 갱신 (원래 §1·§2 폐기, 나머지 유지)\n\n**폐기:**\n- §1 \"Paperclip 대시보드 표면 조사\" — 정답이 위 파일로 확정됨. 추가 조사 불필요.\n- §2 \"플러그인 vs 코어 mod\" — 둘 다 아님. `generate-dashboard.py` 와 `dashboard.html` 직접 수정.\n\n**유지 + 강화:**\n- §3 상태 모델 매핑 — Paperclip API 에서 끌어오는 부분은 `generate-dashboard.py` 의 `fetch_goals` / 추가 API call 로 확장. 매핑 표 그대로 필요.\n- §4 \"초보자 한국어\" 카피 룰 — 그대로. 합니다체, 영어 jargon 금지, register 1순위.\n- §5 와이어프레임 — 현재 페이지 구조 (`<h2>보드 액션 큐</h2>`, `<h2>Goal 트리 진척률</h2>`) 위에 새 섹션 1개 (`<h2>지금 무슨 일이 일어나고 있어요</h2>` 또는 동등) 를 **`<h1>` 바로 아래** 삽입. \"상단\" 의 자연스러운 해석.\n- §6 킬 기준 — 그대로.\n\n## 추가 발견 — 보드가 매일 보는 화면 확정\n\n보드는 이 페이지를 매일 실제로 본다 (telegram 봇 / deferred-watcher 와 같은 폴더에서 운영). 따라서 \"초보자 register\" 의 우선순위가 더 강해짐. 기존 `보드 액션 큐` / `Goal 트리 진척률` 헤더 톤과도 일관되어야 함 — 합니다체 + 명사구 헤더, 영어 jargon 없음.\n\n## 권장 구현 형태 (CTO 재량)\n\n- `generate-dashboard.py` 에 새 함수 (`render_now_section` 등) 추가, Paperclip API 의 (a) in_progress 이슈 + checkout 정보, (b) blocked 이슈 + blockedReason / blockedBy, (c) 최근 N개 done 이슈 — 세 군집을 끌어와 한국어 한 줄씩 렌더.\n- `dashboard.html` 의 \"카드\" 스타일 (`.node`, `.badge-*`) 을 재사용해 시각적 일관성 유지.\n- 단일 PR 한 번에 끝낼 수 있는 분량.\n\n## 보드 승인 게이트는 그대로\n\n구현 코드 작성 전에 설계 문서 (카피 템플릿 + 와이어프레임) 첨부 + `request_confirmation`. 보드가 매일 보는 화면이라 한국어 register 만큼은 사전 승인 필수.\n\n## 보드 미답변 질문 1개\n\n보드가 [PACAA-109](/PACAA/issues/PACAA-109) Q2 (우선 정보 1개 = 진행/대기/완료 중 어느 것) 에 응답 안 함. 해석: \"세 가지 다 보여줘\" — 즉 원래 요구사항 그대로. 단일 우선순위 강조 없이 세 섹션 동일 비중으로 진행."
        createdAt: "2026-04-30T04:54:47.581Z"
      -
        authorType: "user"
        body: "## 설계 v1 첨부 + 승인 요청\n\n스코프 보정 (PACAA-109 보드 답변 반영) 그대로 받아 `dashboard.html` 직접 수정 노선으로 진행합니다.\n\n- plan 문서: [/PACAA/issues/PACAA-110#document-plan](/PACAA/issues/PACAA-110#document-plan) (rev 1)\n- 핵심 결정:\n  - **위치**: `<h1>` 바로 아래, 기존 `보드 액션 큐` 위에 새 섹션 1개 (`지금 무슨 일이 일어나고 있어요`).\n  - **3 섹션 동등 비중**: 진행 중 / 기다리는 중 / 방금 끝낸 것 (최근 5건). 보드 PACAA-109 Q2 미답변은 \"세 가지 다\" 로 해석.\n  - **카피 룰**: 합니다체, 영어 jargon 사전 (in_progress→진행 중, request_confirmation→사장님 승인 기다리는 중 등 11건).\n  - **카피 템플릿 8종** + 비어 있을 때 카피 3종.\n  - **에이전트 한국어 별명** (CTO 클로드 / 백엔드 클로드 / 프론트 클로드 / 참모 클로드).\n  - **킬 기준**: 2026-05-28 측정, 보드 인용 0회면 archive.\n  - **롤백**: 단일 파일 복원 + cron 1회. 마이그레이션 없음.\n- 데이터 소스 매핑 표 (API → 한국어 한 줄) 9행, blocker / 인터랙션 / 결재 / 일시정지 / 오류 모두 커버.\n\n승인 게이트: `request_confirmation` 카드 (id `ef553b9d`) 띄웠습니다. 승인 후 자식 이슈 PACAA-110-impl 분기 → 단일 PR.\n\n다음 행동: 사장님 승인 대기."
        createdAt: "2026-04-30T04:57:54.822Z"
