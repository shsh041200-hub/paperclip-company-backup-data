        body: "## `test-keyword` = 키워드 라우트 동작 검증용 **스모크 테스트 슬러그**\n\n### 정확히 뭐 하는 것\n\n1. **`KEYWORD_REGISTRY` 의 첫 entry** (`lib/keyword-data.ts:42`) — 50 키워드 본 entry 들 위에 `// ── test ─────` 섹션으로 분리되어 있음.\n2. **타이틀/디스크립션은 더미 카피:**\n   - title: `테스트 키워드 포장재 공급업체`\n   - description: `국내 최고의 테스트 키워드 관련 포장재 공급업체를 한눈에 비교하세요…`\n3. **벤더 리스트는 진짜:** category=`paper` 매핑되어 Supabase `companies` 테이블에서 paper 카테고리 업체 top 20 (is_verified desc, updated_at desc) 를 끌어와 그대로 렌더링.\n4. **홈 링크:** `app/page.tsx:17` 에 \"키워드 페이지 예시: /keywords/test-keyword\" 로 박혀 있음 → 부트스트랩 PoC 가 라우트 정상 작동하는지 보드/팀이 클릭해서 확인할 수 있게 한 디딤돌.\n\n### 즉, 의도\n\nBackend 가 `keyword-data.ts` stub 을 Supabase 실데이터로 교체하기 전에, **\"라우트 + 메타데이터 + JSON-LD + 벤더 fetch + ISR 6h\"** 가 전부 동작하는지 한 번에 확인하는 골든-패스 슬러그. PoC 부트스트랩 commit (`9fe1ddf`) 의 \"hand-off interface\" 가 이거.\n\n### 그런데 발견한 위험 2개 (P1)\n\n**①  test-keyword 가 sitemap 에 포함되어 있음** — `app/sitemap.ts` 가 `listKeywordSlugs()` 로 KEYWORD_REGISTRY 전체를 sitemap 에 등록 (priority 0.8, changeFrequency daily). robots.txt 는 `/api/` 외 전부 Allow, 페이지 meta 는 `index, follow`. → **Google 이 \"테스트 키워드 포장재 공급업체\" 더미 페이지를 색인할 수 있음.** PACAA-95 (sitemap submit) 발사 전에 반드시 정리.\n\n**②  sitemap base URL 이 `http://localhost:3000` 으로 박혀서 노출됨** — `NEXT_PUBLIC_SITE_URL` env 미설정 → 코드 fallback 은 `https://packlinx.vercel.app` 인데 현재 prod-build 서버가 localhost 를 반환 중 (`curl http://localhost:3001/sitemap.xml` → `<loc>http://localhost:3000/...</loc>`). 프로덕션 배포 시 SEO 붕괴.\n\n### 권장 액션\n\n- **단기 (PACAA-95 발사 전):** Backend Eng 에게\n  1. KEYWORD_REGISTRY 에서 `test-keyword` 제거 (또는 sitemap.ts 에서 `slug !== \"test-keyword\"` 필터)\n  2. `app/page.tsx` 의 더미 링크도 50 키워드 중 하나로 교체\n  3. 프로덕션 배포 환경에 `NEXT_PUBLIC_SITE_URL=https://packlinx.com` (또는 vercel 도메인) 설정\n- **확인:** 위 1~3 항목을 PACAA-86 sub-task 또는 PACAA-95 acceptance 에 baking. CEO 가 child issue 로 분리할까요? (의견 주시면 발의)"
