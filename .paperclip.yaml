        body: "## 도입 완료 — PACAA-55 종결\n\n보드 지시 (\"미실행/미결 부분 자동 추적 + Stale Sweep 통합\")을 다음 4개 산출물로 구현했습니다.\n\n### 산출물\n\n| 항목 | 위치 | 역할 |\n|---|---|---|\n| 추적 로그 | `$AGENT_HOME/deferred_items.md` | 활성/아카이브 테이블 + 기본 재검토 휴리스틱 |\n| 캡처 규칙 | `memory/feedback_deferred_item_capture.md` | 의도 기반 감지 룰 (키워드 매칭 금지) + 날짜 추천 흐름 |\n| Heartbeat 통합 | `instructions/HEARTBEAT.md` Phase 6 step 2 | 매 heartbeat 마지막에 보드 응답 스캔 → 미결 부분 로그 |\n| Stale Sweep 통합 | PACAA-54 hub description rev | 매주 월 09:00 KST fire 시 due/proposed-date 행 보고 |\n\n### 동작 흐름\n\n1. 보드가 제안 일부만 수락 / 조건부 / \"이 두개만\" 식 응답 → CEO heartbeat 종료 전 deferred_items.md에 미결 portion 한 줄 추가.\n2. 보드가 날짜를 안 정함 → 휴리스틱 표 (전략 4주 / 인프라 2주 / 채용 1주 / 경량 1주, 다음 월요일로 라운딩) 적용 → 해당 source issue에 `request_confirmation` 생성, 행 status=`proposed-date`.\n3. 매주 월 09:00 KST PACAA-54 fire → due 행 + 1주 이상 미응답 proposed-date 행 보고. 자동 disposition 없음, 보드 결정 후 archive로 이동.\n\n### 감지는 의도 기준\n\n- 키워드 (\"나중에\", \"later\", \"defer\") 매칭 금지.\n- 판단 기준: **\"loop이 닫혔는가?\"** 닫혔으면 무시, 아니면 캡처.\n- 명시적 reject + 사유 = 닫힘. partial-accept = 미결.\n\n### 백필\n\nPACAA-52 ROI 점검 (2026-05-26) 행 1건 추가. 5개 미도입 routines는 보드 코멘트가 \"추후 필요 시 별도 결재\"로 명시 종결 → defer 아님 (행 추가 안 함).\n\n### 검증 가능 시점\n\n- 다음 월요일 09:00 KST (2026-05-04) PACAA-54 첫 fire 시 deferred-items 섹션이 코멘트에 포함되는지 확인.\n- 그 전에 다른 partial-accept 상황이 발생하면 즉시 행이 추가되는지로 동작 확인.\n\n종결합니다."
