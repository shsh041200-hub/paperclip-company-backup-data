        body: "## 보드 승인 → CTO 위임\n\n기획안 rev1 승인 완료 (interaction `4cd9d77f` accepted 2026-04-29 02:40 KST).\n\nSide-project 패턴(PACAA-37 directive: 단일 이슈·한 게이트·가벼운 보고)에 따라 별도 자식 이슈 없이 본 이슈에서 직접 진행. 본 이슈가 단일 산출물 단위.\n\n### CTO 작업 범위\n\n파일 1개: `tools/board-visibility/notify-telegram.py`\n\n**구현**\n\n1. `_build_reference_doc(item, issue_meta)` 추가 — 메타/요약/원문 prompt/이슈 설명/최근 댓글 5개/권장액션·리스크/결정 옵션을 섹션 헤더와 빈 섹션 생략 규칙에 따라 구성. UTF-8 텍스트 반환.\n2. `send_telegram_document(token, chat_id, file_path, caption)` 추가 — `multipart/form-data`를 stdlib(`urllib.request` + 수동 boundary)로 구성. 외부 의존성 추가 금지.\n3. `check_pending_approvals` / `check_interactions`에서 텍스트뿐 아니라 원본 payload + 이슈 메타를 item에 함께 담아 반환.\n4. `main()`: actionable 항목(approval/interaction)만 대상으로 `sendMessage` 성공 후 `sendDocument` 1회 호출. non-actionable 묶음 알림(in_review 등)에는 첨부 안 함.\n5. 임시 파일은 `/tmp`에 만들고 try/finally로 항상 삭제. 파일명 `PACAA-{ID}_{kind}_{YYYYMMDD-HHMM}.txt`.\n6. sendDocument 실패해도 cron 정상 종료 + seen_ids 등록 유지(재발사 차단 우선).\n\n**테스트 (T1~T4)**\n\n- T1 단위: `_build_reference_doc` 출력 검증 — 샘플 approval + interaction(suggest/ask/confirm 3종) 입력 → 빈 섹션 생략·필수 섹션 존재·UTF-8 정상.\n- T2 통합 live: 본 이슈에 `[DRY-RUN]` request_confirmation 1건 생성 → cron(또는 수동 실행) → 텔레그램에 메시지 카드 + `.txt` 첨부 모두 도착 확인. message_id를 본 이슈 코멘트로 기록.\n- T3 회귀: 임시 in_review 이슈 1건 발생 시 non-actionable 묶음 메시지가 종전대로 1건만 가는지(첨부 없음) 확인.\n- T4 실패 모드: 잘못된 chat_id 강제 주입 분기 → sendMessage 성공 / sendDocument 실패 → 로그에 `document_failed`만 남고 cron 정상 종료, seen_ids 등록 유지 확인.\n\n**참고 메모리**\n\n- 인프라: [project_pacaa64_deferred_alerts.md](/PACAA/issues/PACAA-64) — Paperclip0412_bot, 5분 cron, chat_id 5660750159, .env in `tools/board-visibility/`.\n- 봇 토큰은 절대 commit 금지 (chmod 600 .env).\n\n### 산출물\n\n- 코드 변경 (단일 파일)\n- 본 이슈에 T1~T4 결과 코멘트 (T2 message_id 포함)\n- 완료 시 `in_review`로 전환 + 어시니 CEO 환원\n\n### 게이트\n\n없음 — 보드 승인은 plan에서 받았음. 구현·테스트 완료 후 CEO 검수 한 번이면 done."
