        body: "## 2주차 GSC 스냅샷 — 2026-05-14 측정 완료\n\nGSC 데이터 기준: 2026-05-08 (최종 업데이트 기준)\n\n### 핵심 KPI 테이블\n\n| 항목 | baseline (5/01) | 1주차 (5/07) | 2주차 (5/14) | 변화 |\n|------|----------------|-------------|-------------|------|\n| 다른 4xx 문제로 차단됨 | 5,667 | 4,086 | **4,058** | -28 (-0.7%) |\n| 색인 생성됨 | 6,567 | 152,077 | **118,000** | -34,077 (-22.4%) ⚠️ |\n| alternate-canonical | 12,785 | 575,846 | **651,189** | +75,343 (+13.1%) |\n| 사용자 표준 없는 중복 | 107,930 | 126,696 | **127,955** | +1,259 (+1.0%) |\n| 크롤링됨 미생성 | 18,215 | 9,963 | **1,131** | -8,832 (-88.6%) ✅ |\n| 발견됨 미생성 | — | — | **110** | 신규 |\n\n### Kill Criterion 판정\n\n- 4xx 차단: **계속 감소** → kill criterion 미발동 ✅\n- 감소율 둔화: 1주차 -27.9% → 2주차 -0.7%. 점진적 안정화 중.\n\n### 주요 신호 분석\n\n**1. 색인 생성됨 -22.4% (152,077 → 118,000) ⚠️**\n- 1주차 스파이크(+2,215%)가 일시적 급등 후 안정화된 것으로 추정\n- alternate-canonical 651,189 증가와 맞물림 — Google이 vendor 페이지를 canonical-deferred로 재분류 중\n- 현재 색인 118,000은 여전히 baseline(6,567) 대비 +1,698% 수준\n- 4주차(5/29) 추이 주시 필요 — 단발성 조정이면 정상, 지속 하락이면 escalation\n\n**2. alternate-canonical 651,189 (+13.1%) — 정상**\n- Google이 vendor 페이지를 올바르게 canonical-deferred로 처리 중\n- PACAA-115/116 canonical 정책 효과 유지\n\n**3. 크롤링됨 미생성 1,131 (-88.6%) ✅**\n- 1주차 9,963 → 2주차 1,131. sitemap 수정(PR #103) 효과 반영\n- 사이트맵 정상화 이후 crawl queue 거의 소화됨\n\n**4. 사용자 표준 없는 중복 127,955 (+1.0%)**\n- 소폭 증가 지속. 2주 연속 상승 트렌드.\n- 4주차에서도 계속 증가 시 canonical 정책 보완 이슈 신규 생성 예정\n\n**5. 다른 4xx 차단 4,058 — 감소 지속 (느림)**\n- baseline 5,667 → 4,058 (-28.4% total)\n- 나머지 4xx는 크롤러가 천천히 처리 중. 4주차 목표 <3,000.\n\n### 다음 액션\n\n- [PACAA-131](/PACAA/issues/PACAA-131) — 4주차 60%+ 목표 점검 (2026-05-29)\n- 색인 118,000 트렌드: 4주차에서 회복 또는 지속 하락 여부 판단\n- 사용자 표준 없는 중복 127,955: 4주차 계속 상승 시 별도 이슈 생성"
