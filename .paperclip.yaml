        body: "## PACAA-585 진행 상황\n\n### 발견된 루트 코드 버그 (추가 수정)\n\n`app/companies/[slug]/page.tsx` 에서 `generateMetadata` 및 `CompanyPage` 양쪽 모두 `is_hidden` 필터가 **없었음** → DB에 `is_hidden=true` 설정해도 Next.js가 PII name 필드를 `<title>` / meta에 그대로 출력하는 구조적 결함. 코드 수정 없이는 Step 1 DB 변경만으로 색인 차단 불가.\n\n---\n\n### 완료 작업\n\n**코드 수정 (PR #86 — `fix/PACAA-585-pipa-hide-dongyangmogjae`)**\n\n- `generateMetadata` 쿼리: `.eq('is_hidden', false)` 추가 → `is_hidden` 업체 title/meta 미생성\n- `CompanyPage` 쿼리: `.eq('is_hidden', false)` 추가 → 해당 slug 404 응답\n\n**마이그레이션 파일 작성 (Step 1)**\n\n`supabase/migrations/20260511005_pipa_hide_dongyangmogjae.sql`\n```sql\nUPDATE companies SET is_hidden = true\nWHERE slug = 'dongyangmogjae' AND is_hidden = false;\n```\n(멱등, NOTICE 로그 포함)\n\n---\n\n### 차단 상태 — SUPABASE_ACCESS_TOKEN 필요\n\n`.env.local` 미존재 → `node scripts/db-migrate.mjs` 실행 불가. Migration 005를 DB에 적용하려면 토큰 주입 필요.\n\n**요청**: `.env.local` 에 아래 값 주입:\n```\nSUPABASE_ACCESS_TOKEN=<token>\nNEXT_PUBLIC_SUPABASE_URL=<project-url>\nNEXT_PUBLIC_SUPABASE_ANON_KEY=<anon-key>\n```\n주입 즉시 `node scripts/db-migrate.mjs` 로 Migration 005 적용 + PR #86 merge 후 배포로 완전 차단.\n\n---\n\n### Step 2 — 전체 name PII audit (CEO 검토용 쿼리)\n\n토큰 확보 시 아래 쿼리로 전체 audit 실행 예정:\n\n```sql\nSELECT id, slug, name,\n  length(name) as name_len,\n  name ~ '\\d{2,4}-\\d{3,4}-\\d{4}' AS has_phone,\n  name LIKE '%@%'                  AS has_email,\n  name ~ '[\\가-\\힣]{2,4}\\s+\\d'    AS has_name_num\nFROM companies\nWHERE (\n    name ~ '\\d{2,4}-\\d{3,4}-\\d{4}'\n OR name LIKE '%@%'\n OR name ~ '[\\가-\\힣]{2,4}\\s+\\d'\n OR length(name) > 50\n)\nORDER BY name_len DESC;\n```\n\n결과를 코멘트로 보고 → CEO 확인 → Step 2 redaction migration 별도 작성.\n\n---\n\n### 다음 행동\n\n1. **[CEO/보드]** `.env.local` Supabase 자격증명 주입\n2. **[BE]** `node scripts/db-migrate.mjs` → Migration 005 적용 (dongyangmogjae `is_hidden=true`)\n3. **[CEO/CTO]** PR #86 리뷰 + merge → Vercel 배포\n4. **[BE]** Step 2 audit 쿼리 실행 → 결과 보고\n5. **[CEO]** audit 결과 검토 → name redaction 승인\n"
