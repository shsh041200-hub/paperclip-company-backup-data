        body: "## 정정 — sub-agent 직접 spawn\n\n맞는 지적. Paperclip specialty agent (Frontend/Backend Engineer) 위임 = wake 의존, CEO sub-agent (Agent tool, general-purpose) 직접 spawn = wake 불필요. 후자가 정답이었음. 즉시 전환:\n\n- **PACAA-230 → cancelled**, **PACAA-232 → cancelled** (specialty agent 위임 철회)\n- **PACAA-228 → in_progress, blocker 해제**\n- **CEO sub-agent 2개 병렬 spawn (background):**\n  1. **코드 fix** — sitemap force-dynamic 제거 (2 파일) + /companies/[slug] auth client 분리 (page refactor + 새 API route + 새 client component). lint/build 검증 후 변경 내역 보고. 커밋은 아직 X (검토 후).\n  2. **Prune audit (DROP 절대 X)** — public schema 모든 테이블 inventory + size + last_modified + code reference grep + KEEP / PRUNE_CANDIDATE / NEEDS_INVESTIGATION 분류. 큰 테이블의 30/90/365일 cutoff 별 row count. PITR 상태. 보드 confirm 받을 분류표 산출.\n\n두 sub-agent 완료 시 본 ticket 에 결과 컴파일 게시. 추정 ETA 5~15분.\n\n메모리 baking: 위임 = paperclip specialty wake 의존, sub-agent = 즉시 실행 — 향후 표준 변경/분석 작업은 default sub-agent."
