        body: "## 진단 완료 — zombie failure 원인 확정\n\n### 결론\n\n**실제 migration은 전혀 실행되지 않았고, Telegram false alarm도 없었다.**\nGitHub UI 표기 문제(zombie validation run)이며 워크플로우 로직 자체는 정상이다.\n\n---\n\n### 원인 분석\n\n| 항목 | 내용 |\n|------|------|\n| 워크플로우 YAML | `yaml.safe_load` 통과, 문법 이상 없음 |\n| 마지막 green run | `40e1aa8` — `supabase/migrations/**` 파일 변경 → 경로 필터 매칭 → 정상 실행 |\n| 첫 번째 zombie | `0dbb942` — `.github/workflows/supabase-migrate.yml` 자체 수정 |\n| zombie 원인 | **GitHub Actions known behavior**: workflow 파일이 수정된 커밋에서 GitHub는 path filter와 무관하게 validation run을 생성한다. 이 run은 jobs 0개, logs 404 — GitHub UI가 `skipped` 대신 `failure`로 표기하는 cosmetic bug |\n| 후속 zombie (e420d13, 4b2b1d8, f47d6cd) | workflow 파일 수정 이후 몇 개 push에 대해 GitHub가 validation run을 연속 등록하는 behavior. 패턴상 3~4 push 후 자동 소멸 |\n\n### Telegram false alarm 여부\n\n- `if: failure()` step은 job 안에 있음\n- zombie run은 **jobs 0개** → job 자체가 시작되지 않음 → 어떤 step도 실행 불가\n- **Telegram 발송 없음** ✅\n\n### 대응 조치\n\n`workflow_dispatch` 트리거 추가 (branch: `ci/PACAA-540-workflow-dispatch`):\n- migration 변경 없이도 GitHub UI에서 수동 트리거 가능\n- 향후 실제 migrate 동작 라이브 verify에 사용\n- 이 변경 자체가 workflow 파일을 수정하므로 zombie run 1개 더 발생 예정 (무해)\n\n### Acceptance Criteria 점검\n\n- ✅ `supabase/migrations/**` 미매칭 push → 실제 migrate 미실행\n- ✅ Telegram alert → 실제 실패 시에만 발사 (zero-job run에선 물리적으로 불가)\n- ℹ️ GitHub UI `failure` zombie → GitHub 플랫폼 동작, 코드 레벨에서 수정 불가. `workflow_dispatch` 추가로 수동 검증 경로 확보\n\n### 다음 행동\n\nbranch `ci/PACAA-540-workflow-dispatch` → main 머지 후 GitHub UI에서 \"Run workflow\" 수동 실행으로 실제 migrate 동작 최종 검증 권장."
        createdAt: "2026-05-11T03:51:41.879Z"
