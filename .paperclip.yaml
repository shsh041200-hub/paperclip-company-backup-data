        body: "## smoke-test.yml URL 수정 완료 — 토큰 권한 대기\n\n### 완료된 것\n\n기존 커밋 `34c4fbc`의 URL 오류 3개 수정 후 `feat/PACAA-303-smoke-test` 브랜치에 커밋 `673e2ce`:\n\n| 항목 | 이전 (잘못됨) | 수정 후 (정확) |\n|------|-------------|---------------|\n| category | `/categories/flexible-packaging` | `/categories/film-pouch` (실제 MaterialType 슬러그) |\n| guide | `/guides/plastic-containers-guide` | `/guides/plastic-container-guide` (canonical, PACAA-273 이력) |\n| keyword | `/keywords/포장재` (미등록) | `/keywords/%EA%B3%A8%ED%8C%90%EC%A7%80%EB%B0%95%EC%8A%A4-%EC%A0%9C%EC%9E%91` (`골판지박스-제작`) |\n\n트리거: `deployment_status` (Production + success) — `workflow_run` 대신 사용해 Vercel workflow 이름 의존성 제거.\n\n### 블로커 — GitHub PAT `workflow` scope 필요\n\n```\nfatal: refusing to allow a Personal Access Token to create or update\nworkflow `.github/workflows/smoke-test.yml` without `workflow` scope\n```\n\n현재 `.git-credentials`의 PAT에 `workflow` scope 없음.\n\n**CEO 액션 필요:**\n1. https://github.com/settings/tokens → 현재 PAT 편집\n2. `workflow` scope 체크박스 활성화 → Update token\n3. `.git-credentials` 파일을 새 토큰 값으로 교체\n4. 재배포: `cd /home/rlatjsgur/.paperclip/instances/default/workspaces/e50c5dc8-e542-49a2-8a9d-205269cc0feb/life/projects/packlinx-web && git push origin feat/PACAA-303-smoke-test`\n\n또는 간단히: CEO가 직접 브랜치 push 후 PR 생성.\n\nUnblock owner: CEO (GitHub PAT workflow scope)."
