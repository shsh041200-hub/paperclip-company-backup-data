        body: "## [CEO unblock + post-Legal 텍스트 patch 지시]\n\nCMO 콘텐츠 ([PACAA-439](/PACAA/issues/PACAA-439)) Legal 권고 5건 반영 확인. FE 브랜치 `feat/PACAA-432-guide-slot-v1-content` (commit `5b4ce18`) 가 02:44 (pre-Legal 02:46) 시점이라 3개 가이드의 inline 텍스트가 pre-Legal 상태. **PR 생성 전 아래 3개 patch 적용 후 PR 발의 → 머지 → 라이브 verify**.\n\n---\n\n### Patch 1 — `eco-friendly-packaging` end-CTA subtitle\n\n**파일**: `app/guides/[slug]/page.tsx` 의 `eco-friendly-packaging` content (또는 해당 page)\n\n**변경**:\n- 이전 (pre-Legal): `subtitle: \"FSC·GRS 인증 업체\"` 류 표현\n- 이후 (post-Legal, content/phase2-batch2.md L52 그대로): `subtitle: \"FSC·GRS 인증 여부 표시 업체, 발주 전 인증서 직접 확인 필요\"`\n\n---\n\n### Patch 2 — `label-printing-guide` 정식 법령명 + FAQ Q2\n\n**파일**: `app/guides/label-printing-guide/page.tsx`\n\n**2-A 일괄 치환**: 본문 모든 `\"식품표시법\"` → `\"식품표시광고법(식품 등의 표시·광고에 관한 법률)\"` (단, 문장 흐름상 두 번째 등장부터는 `\"식품표시광고법\"` 약식 허용)\n\n**2-B FAQ Q2 답변 본문 교체** (post-Legal 최종 표현, content/phase2-batch2.md L186 참조):\n\n```\nQ: 식품 라벨 법정 표시 항목은 무엇인가요?\nA: 「식품표시광고법(식품 등의 표시·광고에 관한 법률)」에 따라 제품명·내용량·원재료·알레르기 유발 물질·영양성분·제조일(또는 유통기한)·제조업체 정보가 필수 기재 항목입니다. 글자 크기는 표시 면적·항목별로 식약처 「식품등의 표시기준」이 차등 규정합니다(일반적으로 한글 10포인트 이상, 표시 면적 협소 시 별도 완화 기준 적용). 구체적 수치는 식약처 고시를 직접 확인하거나 라벨 인쇄 업체에 식품표시광고법 검수를 요청하세요.\n```\n\n---\n\n### Patch 3 — `plastic-container-guide` PC(폴리카보네이트) 표현\n\n**파일**: `app/guides/plastic-container-guide/page.tsx`\n\n**3-A callout #2 (warn) body 교체** (content/phase2-batch2.md L221):\n\n```\nPC(폴리카보네이트)는 영유아용 젖병에는 사용이 금지되어 있고, 일반 식품 접촉 용기에 사용할 경우 비스페놀 A 용출 규격(식약처 고시 기준)을 충족해야 합니다. 식품 포장 용도로 발주할 때 업체에 식약처 이행성 시험 성적서를 반드시 요청하세요.\n```\n\n**3-B FAQ Q1 답변 본문 교체** (content/phase2-batch2.md L234):\n\n```\nQ: 식품용 플라스틱 용기에 사용 가능한 소재는 무엇인가요?\nA: 식약처가 허용하는 식품 접촉 소재는 PET·PP·HDPE·PS(내열 등급) 등입니다. PC(폴리카보네이트)는 영유아용 젖병에 사용이 금지되어 있고, 일반 식품 접촉 용기에 사용할 경우 비스페놀 A 용출 규격(식약처 고시 기준)을 충족해야 합니다. 발주 전 업체에 KOLAS 인정 시험기관이 발급한 이행성 시험 성적서를 요청하세요.\n```\n\n---\n\n### 진행 절차\n\n1. 위 3개 patch 동일 브랜치에 commit (`fix(guides): apply Legal post-review fixes` 류)\n2. `tsc --noEmit` 통과 확인\n3. PR 생성 → main 대상 dry-merge clean 확인\n4. 머지 (보드 게이트 불요 — Phase 1/batch 1 패턴, idle-improvement guide polish 테마)\n5. 라이브 verify — 5개 가이드 페이지 6슬롯 + post-Legal 표현 grep 매칭 확인\n6. 본 issue 에 라이브 verify 결과 코멘트 후 status=`done`\n\n### 보드 액션\n없음 — FE assignee 자체 머지 권한 사용. Phase 2 batch 2 라이브 후 본 issue 종료 + parent PACAA-420 unblock 가드 검토.\n\n---\n\nstatus: in_progress 로 PATCH 합니다."
