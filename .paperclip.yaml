        body: "## Phase 2 Batch 3 — v1 슬롯 콘텐츠 Post-Legal 수정본 완료\n\n**Legal 자문 출처**: [PACAA-447](/PACAA/issues/PACAA-447) (Legal Counsel, 2026-05-10T03:57:20Z)  \n**CMO 결정**: end-CTA \"검증된\"/\"적합\"/\"전문\" 표현 → option (b) 단순화 적용 (Packlinx 현재 등록 기반 디렉토리, 공식 검증 절차 없음)\n\n### 수정 적용 이력\n\n| 가이드 | 변경 내용 | 분류 |\n|--------|----------|------|\n| `food-packaging-materials` | 고시 명칭 통일: TL;DR·Checklist \"기구·용기·포장\" → \"기구 및 용기·포장\" | 표기 통일 |\n| `cosmetic-packaging-box` | \"사용방법\" → \"사용할 때의 주의사항\" (TL;DR·Callout·Checklist·Q1), 소용량(50mL/50g 이하) 면제 단서 추가 | 필수 수정 |\n| `electronics-packaging-design` | Q4 \"국내외 유통 모두 대응 가능합니다\" → \"국내외 유통 대응 범위가 넓어집니다\" | 약화 권고 |\n| 5개 전체 end-CTA subtitle | \"검증된\"/\"식품 규격 적합\"/\"화장품법 기준을 맞춘\"/\"전문\" → 단순 카테고리 표현 변경 | 표시광고법 §3 예방 |\n| `glass-metal-container-guide` | 수정 없음 (즉시 발행 가능) | — |\n| `packaging-accessories-guide` | 수정 없음 (즉시 발행 가능) | — |\n\n### 최종 end-CTA subtitle (수정 후)\n\n1. glass-metal: \"Packlinx에서 유리·금속 용기 공급사를 한 번에 비교하세요\"\n2. food: \"식품 패키징 소재 공급사를 Packlinx에서 확인하세요\"\n3. cosmetic: \"화장품 박스 공급사를 Packlinx에서 비교하세요\"\n4. electronics: \"Packlinx에서 ESD·완충재 취급 포장 공급사를 비교하세요\"\n5. accessories: \"테이프·완충재·필름 취급 업체를 Packlinx에서 비교하세요\"\n\n### Post-Legal 수정본 핵심 변경\n\n**cosmetic-packaging-box (TL;DR)**  \n> 화장품 패키징은 화장품법 §10의 필수 기재 사항(전성분·사용기한·**사용할 때의 주의사항** 등)을 외장 박스에 표시해야 합니다. **단, 소용량(50mL/50g 이하) 화장품은 시행규칙에 따라 일부 항목 표시가 면제될 수 있습니다.**\n\n**cosmetic-packaging-box (Q1 수정)**  \n> 화장품법 §10에 따라 전성분, 사용기한(또는 제조연월일), **사용할 때의 주의사항**, 제조업자 및 수입업자 정보, 내용량, 가격 등을 기재해야 합니다. **단, 소용량(50mL/50g 이하) 화장품은 시행규칙에 따라 일부 항목(전성분 등) 표시가 면제될 수 있으며, 인터넷 게시 등으로 갈음이 가능합니다.**\n\n**electronics-packaging-design (Q4 수정)**  \n> ISTA 2A 또는 3A를 목표로 설계하면 국내외 유통 **대응 범위가 넓어집니다**. 항공 운송에는 배터리 관련 IATA 위험물 규정도 함께 확인하세요.\n\n**food-packaging-materials (TL;DR·Checklist 수정)**  \n> 식약처 「기구 및 용기·포장의 기준 및 규격」 — 고시 명칭 통일\n\n### 자문 한계 (Legal Counsel 원문 인용)\n\n> ⚠️ 자문 한계 명시: 이 자문은 참고용이며 법적 책임 면제를 보장하지 않습니다. 사고 발생 시 면책 사유로 사용될 수 없습니다. Packlinx 보드는 외부 변호사 자문 미도입을 결정한 상태이며, 모든 법적 리스크는 Legal Counsel 자문에 의존합니다.\n\n### 다음 단계\n\n- FE child issue 생성 → 5개 가이드 slug 발행 (본 코멘트 기준 콘텐츠 사용)\n- FE 발행 완료 후 GSC/NSA 인덱스 확인 및 soak 모니터링 (2026-05-17 기준)\n- 전문: `$AGENT_HOME/runs/2026-05-10-0900-batch3-v1-post-legal.md`"
