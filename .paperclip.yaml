        body: "## 보드 피드백 반영 — 첨부 텍스트 v2 재설계\n\n### 보드 요청 핵심\n\n1. **첨부만 보고 승인 가능** — 본문/링크 추가 확인 없이.\n2. **분량 줄이기** — 너무 길음.\n3. **영어/전문용어 지양** — 시스템 enum, payload 필드명 노출 금지.\n4. **가독성** — 정보 밀도 ≠ 잡다함.\n\n### v2 포맷 명세\n\n**전체 한도: 1,500자.** 초과 시 후미부터 잘라내고 `…(이하 생략)` 표기.\n\n**고정 본문 구조** (라벨 박스/구분선 제거, 자연어 헤더):\n\n```\n[PACAA-66] 텔레그램 봇 기능 추가  (확인 요청)\n2026-04-29 11:57\n\n■ 무엇을 결정해야 하나\n(한두 줄. payload.prompt 또는 approval.title+summary를 보드 언어로 압축. 200자.)\n\n■ 배경 (왜 지금)\n(이슈 설명을 200자로 발췌·요약. 빈 경우 섹션 자체 생략.)\n\n■ 권장/제안 (있을 때만)\n(approval.recommendedAction 또는 interaction options 1~3개를 한국어 bullet로. 각 80자.)\n\n■ 위험 (있을 때만)\n- (각 60자, 최대 3개)\n\n■ 직전 대화 (필요한 한두 개만)\n- 작성자: 한 줄 요약 (작성자 이름은 한국어 표시명 — CEO/CTO/Backend/보드)\n```\n\n### 한국어 매핑 (필수)\n\n| 시스템 값 | 첨부 표시 |\n|---|---|\n| `approval` | 결재 요청 |\n| `interaction.kind=suggest_tasks` | 작업 제안 |\n| `interaction.kind=ask_user_questions` | 질문 |\n| `interaction.kind=request_confirmation` | 확인 요청 |\n| status `in_review` | (헤더에서 노출 안 함) |\n| status `in_progress` | (헤더에서 노출 안 함) |\n| priority `medium` 등 | (노출 안 함) |\n| agent uuid / name `CEO`/`CTO`/`Backend Engineer` | `대표`/`CTO`/`백엔드` |\n| user `local-board`, `authorUserId` | `보드` |\n\n**ID/UUID는 첨부에 노출하지 않음.** 이슈 식별자(PACAA-66)와 사람 이름만.\n\n### 분량 규칙\n\n- 무엇을 결정해야 하나: ≤200자\n- 배경: ≤200자 (이슈 설명에서 발췌)\n- 권장/제안 bullets: 각 ≤80자, 최대 3개\n- 위험 bullets: 각 ≤60자, 최대 3개\n- 직전 대화: 최대 2개, 각 ≤120자 (가장 최근 + 가장 핵심 1개)\n- 빈 섹션은 헤더째 생략 (현재 이미 구현됨, 유지)\n\n### 시각 스타일\n\n- `=` 구분선, 대괄호 라벨 박스 제거.\n- 섹션 헤더는 `■ 제목` 한 줄.\n- 줄바꿈 1번씩만 (이중 줄바꿈 금지 — 텔레그램 모바일에서 공백 낭비).\n- ASCII 박스/표 금지 (모바일 렌더링 깨짐).\n\n### 한국어 정규화 — 원문에 영어가 끼어 있을 때\n\n- approval/interaction payload의 prompt/summary 본문에 영어 문장이 섞여 있으면 **그대로 두기**(원문 의미 손상 방지). 단, 시스템 라벨/enum 값은 위 매핑대로 치환.\n- payload 본문 자체가 영어로만 구성된 케이스는 매우 드물기 때문에 별도 처리 없음. 발견 시 후속 코멘트로 보고.\n\n### 테스트 (4건만)\n\n| # | 테스트 | 합격 기준 |\n|---|--------|----------|\n| T1 | `_build_reference_doc` v2 단위 — approval / 3종 interaction | 1500자 이내, 시스템 enum 미노출, 한국어 라벨, 빈 섹션 생략 |\n| T2 | 길이 절단 — 이슈 설명 1만자 강제 | 200자 + `…` 처리, 전체 1500자 이내 |\n| T3 | 라이브 — DRY-RUN interaction 1건 → 텔레그램 도착 | 첨부만 보고 승인/반려 판단 가능한지 보드 시점에서 자가 검수 (CTO 텔레그램에서도 같은 봇 사용 — chat_id 분리 안 되면 자체 가독성 평가) |\n| T4 | 회귀 — review 항목 non-actionable | 첨부 없음 유지 |\n\n**T3 보드 검증 방식**: CTO가 자체 평가 후 PACAA-66에 첨부 결과 raw text를 코멘트로 붙여 올림. CEO가 보드 시점으로 가독성 판정 → 통과면 done.\n\n### 위임\n\n- 담당: CTO (e50c5dc8)\n- 산출물: `notify-telegram.py` `_build_reference_doc` 재작성 + 한국어 매핑 헬퍼 + 절단 로직.\n- 자식 이슈 만들지 말 것. 본 이슈에서 진행.\n- 완료 시 PACAA-66에 (a) 변경 요약 (b) v2 첨부 raw text 1건 (실제 데이터 기반) (c) T1~T4 결과 코멘트 → in_review 전환.\n\n### 되돌리기\n\nv1 함수를 `_build_reference_doc_v1`로 보존하지 말 것. git history가 원복 경로. 깔끔히 교체."
