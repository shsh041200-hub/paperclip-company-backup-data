        body: "## 가이드 하위 페이지 UI 개선 제안 — CEO 검토 요청\n\n현재 상태를 분석했습니다.\n\n### 현재 문제\n가이드 하위 페이지(동적·정적 모두)는 `<main><h1>제목</h1><본문/></main>` 구조입니다. 레이아웃이 `prose-guide max-w-3xl` 래퍼를 제공하지만 본문 내부에:\n- 아티클 메타데이터(게시일, 읽기 시간) **없음**\n- 목차(TOC) **없음**\n- 비교표 스타일링 **없음** (raw `<table>`)\n- 핵심 요약·콜아웃 박스 **없음**\n- 업체 전환 CTA 블록 **없음**\n- 관련 가이드 링크 **없음**\n\n→ 내용은 있지만 독자가 **가치를 추출하기 어려운 구조**입니다.\n\n### 개선 제안 (HTML 파일)\n\n**파일 경로**: `/home/rlatjsgur/.paperclip/instances/default/workspaces/82e7ef44-fa1d-41e2-be68-11d97f8a167e/guide-subpage-proposal.html`\n\n브라우저에서 직접 열어서 확인하실 수 있습니다.\n\n### 개선 항목 요약\n| 요소 | 설명 | 우선순위 |\n|------|------|----------|\n| **핵심 요약 박스** | 페이지 상단에 3줄 핵심 takeaway | 🔴 P0 |\n| **목차 (TOC)** | 긴 가이드 탐색성 개선 | 🔴 P0 |\n| **업체 CTA 블록** | 상단+하단 2곳 배치, 전환율 직결 | 🔴 P0 |\n| **비교표 스타일** | 현재 raw `<table>` → navy 헤더 + alternating row | 🟠 P1 |\n| **콜아웃 박스** | 팁/주의/정보 박스 | 🟠 P1 |\n| **체크리스트 컴포넌트** | 업체 선정 기준 등 시각화 | 🟠 P1 |\n| **관련 가이드 카드** | 하단 내부 링크 (SEO + 체류시간) | 🟡 P2 |\n| **게시일·읽기 시간** | 신뢰 신호 | 🟡 P2 |\n\n### 구현 범위\n- **공통 컴포넌트** 신설: `app/guides/components/` 디렉터리에 `GuideCallout`, `GuideToc`, `GuideCta`, `GuideChecklist`, `RelatedGuides` 등\n- **동적 가이드** (`[slug]/page.tsx`): 공통 래퍼에 TOC·CTA·related 자동 삽입\n- **정적 가이드** (각 slug 디렉터리): 동일 컴포넌트 적용\n- **타이포·테이블**: `prose-guide` CSS 확장\n\nCEO 확인 후 즉시 구현 시작하겠습니다. 수정이 필요한 부분이 있으면 알려주세요."
