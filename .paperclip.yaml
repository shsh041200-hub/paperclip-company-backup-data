        body: "## 답변: 차단 8개 vs /pending 0개 불일치 이유\n\n### 결론 (1줄)\n`/pending` 봇이 `status=in_review` 만 보고 `status=blocked` 는 무시하기 때문. **PACAA-91 에 보드 응답을 기다리는 `ask_user_questions` interaction 이 살아있는데 봇이 못 잡고 있음.** 봇 필터 버그 + 보드 입력 1건 미응답 = 두 가지 동시에 발생.\n\n### 차단 8개 정체\n\n전부 P2.5 (50 키워드 SEO 랜딩) 또는 P2.1 (WUV 정의) 트리. CEO 가 직접 풀어야 하는 1개를 빼면 모두 **선행 sub-issue 대기**.\n\n| Issue | 차단 사유 |\n|---|---|\n| PACAA-86 | 7개 sub-issue 미해결 (parent) |\n| PACAA-94 §6.4 빌드 | §6.1·§6.2·§6.3 대기 |\n| **PACAA-91 §6.1 볼륨 검증** | **보드 응답 대기 — Naver/Google API 자격증명 OR 수동 CSV** |\n| PACAA-92 §6.2 vendor density | §6.1 v1.1 키워드 셋 확정 후 재검증 |\n| PACAA-95 §6.5 sitemap | §6.4 대기 |\n| PACAA-93 §6.3 SERP 수동 (CEO) | §6.1 통과 키워드 셋 확정 후 |\n| PACAA-83 P2.1 WUV 정의 | PACAA-89 대기 |\n| PACAA-96 §6.6 SERP 트래킹 | §6.5 대기 |\n\n루트 블로커는 사실상 **PACAA-91 하나** (P2.5 트리 7개를 다 막고 있음).\n\n### /pending 봇이 놓친 이유\n\n파일: `tools/board-visibility/bot-server.py` (line 245)\n\n```python\nreview_issues = api_get(f\"/api/companies/{COMPANY_ID}/issues?status=in_review&limit=50\")\n```\n\n봇은 `status=in_review` 인 이슈만 가져와서 그 안의 pending interaction 을 노출함. PACAA-91 은 `status=blocked` 라 필터에서 제외됨. 그러나 PACAA-91 에는 Backend 가 등록한 `ask_user_questions` (idempotencyKey `pacaa91:unblock:v1`) 가 **status=pending** 으로 살아있음 — 보드가 `naver_api / google_api / manual_csv` 중 하나 선택해야 함.\n\n### 보드 결정 필요\n\n**옵션 A**: 봇 필터를 고쳐 `status IN (in_review, blocked)` 또는 별도 쿼리 추가. (정공법, 한 번 고치면 영구 해결.)\n\n**옵션 B**: 봇은 그대로 두고 PACAA-91 status 를 `in_review` 로 바꾸거나 보드 응답이 필요한 차단 이슈는 별도 룰로 in_review 로 운용. (워크어라운드.)\n\n**CEO 권고**: 옵션 A. blocked + pending interaction 조합이 미래에 또 생길 거고 매번 status 바꾸는 건 fragile. 봇 코드 1줄 수정으로 끝남.\n\n### 즉시 처리\n\n동시에 **PACAA-91 unblock 선택**도 필요함 (P2.5 트리 7개를 막고 있는 진짜 병목). Naver/Google API 자격증명 둘 다 사업자 인증/계정 셋업 비용 있음 → 가장 빠른 건 수동 CSV (CEO 가 두 도구 UI 에서 60 키워드 일괄 조회 → 첨부). 보드가 선호 옵션 알려주면 처리.\n\nP2.5 트리는 이 1건이 풀려야 §6.1 → §6.2 재검증 → §6.3 (CEO 수동 SERP) → §6.4 빌드 → §6.5 인덱싱 → §6.6 트래킹 순서로 직렬 unlock."
