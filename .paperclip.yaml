  pacaa-14:
    comments:
      -
        authorAgentSlug: "cto"
        authorType: "agent"
        body: "## PACAA-14 CTO Review — ONBOARDING.md patches from PACAA-12\n\nDecision log written to `runs/2026-04-28-0436-decisions.md`.\n\n---\n\n### 1. Phase 2 patch — does the endpoint correction match actual API behavior?\n\n**Yes, the endpoint correction is accurate.** `/api/companies/{companyId}/agents` is board-only and returns `403 {\"error\":\"Board access required\"}` for agent callers. `/api/companies/{companyId}/agent-hires` is the correct path, auto-creates a `hire_agent` approval, and returns `{ agent, approval }`.\n\nThe `hire_agent` vs `request_board_approval` distinction is also correct: `/agent-hires` creates its own bundled `hire_agent` approval; if a separate `request_board_approval` was already submitted in Phase 1, the system will not credit it — a second, distinct approval is required.\n\n**However, the patch is incomplete.** Phase 2 accurately warns about double-sign, but **Phase 1 Step 3 still instructs the CEO to \"Submit hire request as `request_board_approval`.\"** A CEO following the runbook sequentially will do exactly what Phase 2 says not to do. The two sections are internally contradictory. For the bulk re-hire of 8 roles in PACAA-7 Phase 3, this creates a risk of 8 double-sign events burdening the board.\n\n**Edge cases not covered by the current patch:**\n\n- **Retry semantics**: if `POST /agent-hires` fails midway (validation error, network), retry posture is not documented. Does a retry create a duplicate pending agent? Unknown — worth one sentence of guidance.\n- **Pre-approved `request_board_approval`**: if the board already signed the Phase 1 approval before Phase 2 runs, `/agent-hires` still creates a fresh `hire_agent` approval. The prior sign is not credited. Not documented.\n- **Orphaned `request_board_approval`**: after a successful hire via `/agent-hires`, the old `request_board_approval` from Phase 1 sits open. No guidance on whether to cancel or leave it.\n\n**Recommended fix before PACAA-7 Phase 3:**\nRemove or reframe Phase 1 Step 3. The simplest edit: replace \"Submit hire request as `request_board_approval`\" with a note that hire governance is bundled in `/agent-hires` at Phase 2 — no separate `request_board_approval` needed. The CEO decides the exact wording; I'm flagging the inconsistency.\n\n---\n\n### 2. Phase 4 patch — is promoting `paperclip-create-agent` to common-8 correct?\n\n**Yes. Option A (document reality) is the right call.** Applying WHAT/WHY/HOW/SIMULATE:\n\n| | Option A — document as common-8 | Option B — remove server auto-injection (upstream bug) |\n|---|---|---|\n| **WHAT** | Accept server behavior; keep docs truthful | Treat auto-injection as implementation error; file Paperclip bug |\n| **WHY** | Auto-injection is server-enforced regardless of request spec | Principle of least privilege — not every IC needs this skill |\n| **HOW** | Add to common-8 list; remove from COO/HoP specialty (already injected) | File bug, hold bulk re-hire on external fix |\n| **SIMULATE** | 8 re-hires each get skill once, no divergence at `GET /api/agents/{id}` verify step | PACAA-7 Phase 3 blocked on external dependency; agents still get the skill anyway |\n\nBenchmark precedent: Stripe/Linear runbook discipline — document what the platform actually does. Fighting platform defaults at solo-operator scale while mid-hire is pure overhead with no current-stage benefit.\n\n**The COO and HoP specialty list updates are also correct.** Removing `paperclip-create-agent` from their specialty columns avoids a spec-vs-injected duplication that would show as a confusing discrepancy during Phase 4 verification.\n\n**One note for the record:** the auto-injection decision in Paperclip's server is a minor API design issue (all agents get a manager-hiring skill regardless of role). Worth filing as a low-priority upstream improvement — not a blocker, and not something Packlinx should wait on.\n\n---\n\n### 3. Net assessment — ship into PACAA-7 Phase 3 as-is?\n\n| Patch | Status | Ship? |\n|---|---|---|\n| Phase 4 — common-8 promotion | Accurate and complete | ✅ Ship as-is |\n| Phase 2 — endpoint correction | Accurate but Phase 1 Step 3 contradicts it | ⚠️ One fix needed first |\n\n**Recommendation:** CEO patches Phase 1 Step 3 (one sentence, two-way door, trivially revertable), then bulk re-hire proceeds. This review is otherwise done — no blocking architectural concerns, no one-way-door risks, no schema or vendor implications.\n\nI'll update my knowledge graph and journal after this comment."
        createdAt: "2026-04-27T19:38:05.514Z"
      -
        authorAgentSlug: "cto"
        authorType: "agent"
        body: "Review complete. Decision log at `runs/2026-04-28-0436-decisions.md`. Journal updated.\n\n**Summary:**\n- Phase 4 patch (common-8): accurate and complete — ship as-is\n- Phase 2 patch (endpoint): accurate but incomplete — Phase 1 Step 3 contradiction needs one fix before PACAA-7 Phase 3\n- No blocking architecture concerns, no one-way-door risks\n\nAwaiting CEO decision on the Phase 1 Step 3 recommended edit."
        createdAt: "2026-04-27T19:38:34.640Z"
      -
        authorType: "user"
        body: "내가 봐야하는 보고들은 전부 한국어로 번역해서 보여줘야해"
        createdAt: "2026-04-27T19:43:09.834Z"
      -
        authorAgentSlug: "cto"
        authorType: "agent"
        body: "알겠습니다. 앞으로 이사회에 보고드리는 모든 내용은 한국어로 작성하겠습니다.\n\n아래는 [PACAA-14](/PACAA/issues/PACAA-14) 검토 보고서의 한국어 번역입니다.\n\n---\n\n## PACAA-14 CTO 검토 보고서 — PACAA-12에서 반영된 ONBOARDING.md 패치\n\n의사결정 로그: `runs/2026-04-28-0436-decisions.md`\n\n---\n\n### 1. Phase 2 패치 — 신규 엔드포인트 설명이 실제 API 동작과 일치하는가?\n\n**일치합니다.** `/api/companies/{companyId}/agents`는 이사회 전용 엔드포인트로, 에이전트가 호출하면 `403 {\"error\":\"Board access required\"}`를 반환합니다. `/api/companies/{companyId}/agent-hires`가 올바른 경로이며, 호출 시 `hire_agent` 승인을 자동으로 생성하고 `{ agent, approval }`을 반환합니다.\n\n`hire_agent` 승인과 `request_board_approval`의 구분도 정확합니다. `/agent-hires`는 자체적으로 `hire_agent` 승인을 생성하며, Phase 1에서 별도로 제출한 `request_board_approval`은 시스템에서 인정되지 않아 두 번째 승인이 별도로 요구됩니다.\n\n**단, 패치가 불완전합니다.** Phase 2는 이중 서명 문제를 정확히 경고하고 있으나, **Phase 1의 3단계는 여전히 \"hire request를 `request_board_approval`로 제출하라\"고 안내합니다.** 런북을 순서대로 따르는 CEO라면 Phase 2가 금지하는 행동을 그대로 하게 됩니다. 두 섹션이 서로 모순됩니다. [PACAA-7](/PACAA/issues/PACAA-7) Phase 3에서 8개 역할을 일괄 채용할 경우, 이사회에 이중 승인 요청이 8건 발생할 위험이 있습니다.\n\n**현재 패치가 다루지 않는 엣지 케이스:**\n\n- **재시도 처리**: `POST /agent-hires`가 중간에 실패(유효성 오류, 네트워크 문제)할 경우 재시도 방법이 문서화되어 있지 않습니다. 재시도 시 중복 pending 에이전트가 생성될 수 있습니다.\n- **사전 승인된 `request_board_approval`**: Phase 1에서 제출한 승인을 이사회가 이미 서명한 경우에도, `/agent-hires`는 새로운 `hire_agent` 승인을 별도로 생성합니다. 기존 서명은 인정되지 않습니다.\n- **미처리 `request_board_approval`**: `/agent-hires`로 채용이 완료된 후, Phase 1에서 제출한 `request_board_approval`이 미결 상태로 남습니다. 취소 여부에 대한 안내가 없습니다.\n\n**[PACAA-7](/PACAA/issues/PACAA-7) Phase 3 진행 전 권고 수정사항:**\nPhase 1의 3단계를 삭제하거나 재작성해야 합니다. 가장 간단한 수정: \"별도 `request_board_approval` 제출 불필요 — 채용 승인은 Phase 2의 `/agent-hires` 호출에 포함됨\"으로 교체. 구체적인 표현은 CEO가 결정하시면 됩니다.\n\n---\n\n### 2. Phase 4 패치 — `paperclip-create-agent`를 common-8로 승격하는 것이 올바른가?\n\n**맞습니다. 현재 패치(문서를 현실에 맞게 업데이트)가 올바른 선택입니다.** WHAT/WHY/HOW/SIMULATE 분석 결과:\n\n| 구분 | 옵션 A — common-8 문서화 (현재 패치) | 옵션 B — 서버 자동 주입 제거 (upstream 버그 제보) |\n|---|---|---|\n| **WHAT** | 플랫폼 동작을 있는 그대로 문서화 | 자동 주입을 구현 오류로 보고 Paperclip에 버그 제보 |\n| **WHY** | 요청 스펙과 무관하게 서버가 항상 주입함 | 최소 권한 원칙 — IC 역할에 매니저 채용 스킬이 불필요할 수 있음 |\n| **HOW** | common-8 목록에 추가, COO/HoP 스페셜티에서 제거 | 버그 제보 후 upstream 수정 대기 |\n| **SIMULATE** | 8개 일괄 채용 시 에이전트마다 스킬 1회 부여, 검증 단계에서 불일치 없음 | 외부 의존성으로 PACAA-7 Phase 3 차단, 그러나 에이전트는 어차피 자동 주입으로 스킬을 받음 |\n\n벤치마크 근거: Stripe/Linear 런북 원칙 — 플랫폼이 실제로 하는 동작을 문서화하라. 단독 운영 체제에서 일괄 채용 중에 플랫폼 기본 동작과 싸우는 것은 비용만 발생시킵니다.\n\n**COO, HoP 스페셜티 목록에서 `paperclip-create-agent` 제거도 정확합니다.** 이미 서버에서 자동 주입되므로 스페셜티에 중복 명시하면 Phase 4 검증 단계에서 불일치가 발생할 수 있습니다.\n\n참고로, 서버 자동 주입 자체는 Paperclip API 설계상 소규모 개선 여지가 있습니다. 낮은 우선순위로 upstream 개선 제안을 남기는 것은 권고하나, 일괄 채용의 블로커가 되어서는 안 됩니다.\n\n---\n\n### 3. 최종 판단 — PACAA-7 Phase 3 일괄 채용에 현재 상태로 적용 가능한가?\n\n| 패치 | 상태 | 적용 가능 여부 |\n|---|---|---|\n| Phase 4 — common-8 승격 | 정확하고 완전함 | ✅ 현재 상태로 적용 |\n| Phase 2 — 엔드포인트 수정 | 정확하나 불완전 (Phase 1 Step 3 모순) | ⚠️ Phase 1 수정 후 적용 |\n\n**권고사항:** CEO가 Phase 1의 3단계를 수정(한 문장, 즉시 되돌릴 수 있는 변경)한 뒤 일괄 채용을 진행하시기 바랍니다. 아키텍처 차원의 우려 사항이나 되돌릴 수 없는 의사결정은 없습니다."
        createdAt: "2026-04-27T19:44:13.255Z"
