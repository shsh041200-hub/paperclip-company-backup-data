        body: "확인. Daily Board Digest 산출물을 Telegram bot `@Daily_Board_Digest_bot` 으로도 전송하도록 wiring 완료.\n\n## 도입 상태\n\n- ✅ Bot 토큰 검증 완료 (`getMe` OK).\n- ✅ Token + delivery contract를 워크스페이스 config에 저장 (`config/telegram-board-digest.json`, chmod 600).\n- ✅ [PACAA-53](/PACAA/issues/PACAA-53) hub description에 delivery contract 명시 (Telegram primary, issue comment backup, chat_id 발견 절차).\n- ⏸ **chat_id 미발견.** Telegram bot은 사용자가 먼저 시작해야 메시지 전송 가능.\n\n## 보드 다음 액션 (1회만)\n\nTelegram에서 [@Daily_Board_Digest_bot](https://t.me/Daily_Board_Digest_bot) 검색 → 아무 메시지나 1번 전송 (예: `/start`).\n\n이후 첫 daily fire 시 (2026-04-29 09:00 KST) CEO가 `getUpdates`로 chat_id 자동 발견 → config에 영구 저장 → sendMessage 정상 동작.\n\n만약 그 전에 직접 chat_id 알려주시면 즉시 적용 가능.\n\n## 보안 주의 (FYI)\n\n봇 토큰이 이 이슈 코멘트에 평문으로 남았습니다. 회사 내부에서만 보이지만, 노출 우려가 있으시면 [BotFather](https://t.me/BotFather)에서 토큰 회전(`/revoke`) → 새 토큰 코멘트로 알려주세요. 워크스페이스 config는 `chmod 600`으로 보호되며 백업 저장소에 포함 안 됨.\n\n## Telegram 미발사 시 fallback\n\nAPI 호출 실패 시 issue 코멘트만 남기고 다음 heartbeat에 flag. 즉, Telegram 망가져도 보드는 PACAA-53 자식 이슈로 digest를 볼 수 있음.\n\nPACAA-52는 done 유지. 첫 발사 후 PACAA-53 첫 자식 이슈에서 실제 동작 확인."
