        body: "## 🚨 보드님 행동 필요\n\n없음 — 본 wake 는 보고 전용 (실행 x). 후속 조치 필요 시 별도 child 발의 가능.\n\n## 📊 현재 GSC 상태 (sc-domain:packlinx.com, 2026-03-08 ~ 05-12)\n\n### 트래픽 (지난 90일)\n| 메트릭 | 값 |\n|---|---|\n| 총 클릭 | **38회** |\n| 총 노출 | 1,030회 |\n| 평균 CTR | 3.7% |\n| 평균 순위 | 7.4 |\n\n→ 절대량 매우 낮음. SEO PoC 단계.\n\n### 인기 검색어 (노출 vs 클릭)\n- `ab골` (10 노출 / 0 클릭)\n- `a골 b골` (9/0), `a골` (8/0), `e골` (6/0), `박스 골 종류` (6/0)\n- `연포장재` (4/0), `b골` (4/0), `esg 규제 동향 2026` (2/0), `포장재 종류` (2/0)\n\n→ **골 키워드 노출은 있는데 클릭이 0** — `guides/corrugated-flute-types` 페이지 CTR 0.8% (238 노출 / 2 클릭, 평균 순위 7.2). 제목·메타 description 개선 후보.\n\n### 인기 페이지 (클릭 기준)\n1. `packlinx.com/` — 15 클릭 (CTR 36.6%, 순위 2.6) — 브랜드 검색\n2. `www.packlinx.com/` — 11 클릭 (CTR 21.6%, 순위 4.0) — 브랜드 검색\n3. `www.packlinx.com/companies/포장닥터-2642` — 3 클릭 (30%)\n4. `guides/corrugated-flute-types` — 2 클릭 / 238 노출 ← 노출 1위\n5. `guides/shipping-box-pricing` — 2/82\n6. `guides/plastic-container-guide` — 1/130\n7. `guides/flexible-packaging-guide` — 1/59\n8. `?industry=ecommerce-shipping&material=paper-corrugated&form=tape_sealing,tube,box_case` — 1/11\n9. `?industry=eco-special&material=paper-corrugated&form=tube&cert=kfda,grs&leadtime=lt_14` — 1/1\n\n총 133행. **filter URL 도 색인되어 클릭 들어옴** = ID intent traffic 일부 존재.\n\n### 색인 상태 (심각)\n| 구분 | 페이지 수 |\n|---|---|\n| 색인 생성됨 | **117,531** |\n| 색인 안됨 | **787,810** |\n\n미색인 사유 (top):\n- 적절한 canonical 대체 페이지: **654,747** (정상 — canonical 올바르게 작동)\n- 사용자 선택 canonical 없는 중복: **127,955** ⚠️\n- 다른 4xx로 차단: 4,058 ⚠️\n- 크롤링됨/색인 안됨: 931\n- 발견됨/색인 안됨: 110\n- 리디렉션/404/5xx: <10건\n\n→ 사이트맵에 제출한 페이지는 **2,581개** (sitemap.xml index + /sitemap/0 + /sitemap/1) 인데 Google은 **905,341 URL** 을 발견. 약 **350배 폭발**. 원인 추정: filter parameter 조합 (industry × material × form × cert × leadtime 등) 이 무한 URL 생성 → 대부분 canonical 로 정리되지만 127K 는 canonical 미설정 상태.\n\n### Sitemaps\n- `https://www.packlinx.com/sitemap.xml` (index) — 2,581 발견, 2026-05-14 OK\n- `https://www.packlinx.com/sitemap/0` — 136\n- `https://www.packlinx.com/sitemap/1` — 2,445\n- `https://keywords.packlinx.com/sitemap.xml` — 52 (PoC)\n\n전부 \"성공\" 상태.\n\n### 기타\n- **Core Web Vitals**: 모바일·데스크톱 모두 \"데이터 없음\" — 트래픽 부족으로 CrUX 표본 미달\n- **HTTPS**: 24 유효, 0 잘못됨 ✅\n- **탐색경로(breadcrumb)**: 16 유효, 0 잘못됨 ✅\n- **잦은 문의 사항(FAQ)**: 8 유효, 0 잘못됨 ✅\n- **권장사항 알림**: `guides/corrugated-flute-types` 노출 +763% (단순 자연 증가)\n\n### 도메인 분리 (packlinx.com vs www)\n홈 페이지가 `packlinx.com/` (15 클릭) 와 `www.packlinx.com/` (11 클릭) 둘 다 색인됨 → 둘 중 하나로 canonical 통합 안 됐을 가능성. 확인 필요.\n\n## 🎯 후속 액션 후보 (참고용, 발의 안 함)\n\n1. **127K canonical-less 중복 진단** — filter URL 패턴 audit, `<link rel=\"canonical\">` 누락 페이지 식별\n2. **`corrugated-flute-types` 메타 개선** — 238 노출 / CTR 0.8% → 제목·description 재작성으로 CTR 5% 목표 (월 ~10 클릭)\n3. **4,058 페이지 4xx 차단** — 어떤 URL 인지 export 후 origin 확인\n4. **www vs apex 통합** — 한 쪽으로 301 또는 canonical\n5. **filter URL `noindex` or `robots.txt` 차단** — 905K URL 크롤 예산 낭비\n\n보드님 추가 지시 주시면 child issue 로 발의.\n"
