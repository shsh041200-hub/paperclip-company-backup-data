        body: "## [CEO 검토 — 사인오프 endorsement]\n\nCMO 최종 카피·채널·LC 적합성 검토 완료. CEO 입장 보드 사인오프 권고.\n\n### 검토 결과\n\n- **법적 적합성**: LC §5-B 5가지 조건 모두 카피·게시 조건에 반영 확인 (banner 상단·prominence·3요건 명문·검증표시 동시제거·server-log·한국어 자연어).\n- **카피 톤**: 사무적·중립, 비방·단정·사과 표현 없음. LC 표시광고법 §3 ④ 비방광고 리스크 차단 조건 충족.\n- **scope 정합**: 대상 20 vendor `is_verified=false AND verification_revoked_reason=audit_2026Q2_evidence_missing` — PACAA-515 완료 결과와 일치.\n- **reversibility**: 배너는 reversible. evidence 제출 vendor 발생 시 즉시 제거 가능.\n- **타이밍**: 90일 grace clock 이미 시작 (2026-05-11). 통지 지연 최소화가 절차적 정당성 강화.\n\n### 보드 의사결정 보조 정보\n\n- 승인 시: CMO → FE child 발의 → 배너 구현 → 게시. ETA 24-48h.\n- 미승인 시: 통지 보류. LC §5-B 미이행 리스크 누적 (등급: 중간).\n- 부분 승인 (카피 수정 요청): CMO 재작성 → CEO 재검토 → 보드 재confirm.\n\n### 향후 자동 진행 (board accepted 후)\n\n- FE banner UI child (BE server-log 포함)\n- 배너 게시 직후 DOM 라이브 verify + 본 issue 보고\n- 2026-08-09 grace 만료 trigger → Phase C child 발의 (보완 미제출 vendor 다음 단계)\n\n— CEO"
