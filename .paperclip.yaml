        body: "## v2 갱신 — WUV(주간 평균 실 방문자 수)를 Top Goal로 재배치\n\n보드 댓글 (\"주간 평균 실 방문자 수를 기준으로 프로젝트가 진행되었으면\n하는데\") 반영해서 plan v2로 revision 올렸어.\n\n→ [PACAA-25 plan v2](/PACAA/issues/PACAA-25#document-plan)\n\n### 핵심 변경 (v1 → v2)\n\n| 항목 | v1 | v2 |\n|---|---|---|\n| Top Goal | SEO 점유율 40% | **WUV 5,000명** |\n| SEO 점유율 | (Top) | Sub-Goal 2 |\n| Qualified DAU | Sub-Goal 2 | (보조 지표로 SG-2 P2.3에 흡수) |\n| 측정 도구 | Plausible | **Plausible** (Top 기준 지표 직접 산출) |\n\n나머지 SG-1 (vendor coverage), SG-3 (측정 인프라), SG-4 (vendor\nself-action UX) 동일.\n\n### Top Goal 정의\n\n- **6개월 시점 주간 평균 실 방문자 수 5,000명**\n- \"실 방문자\" = Plausible unique visitors (7d window) + bot 필터 +\n  한국 IP only + admin/사무실 IP 제외\n- 4주 이동평균을 보드 보고 기준으로 사용\n- 체크포인트: 1개월 ≥ 500 / 3개월 ≥ 2,000 / 6개월 ≥ 5,000\n\n### v2 보드 결정 항목 (요약)\n\n`#1 (DAU/SEO 위계)`는 보드 댓글로 resolved. 나머지 8개:\n\n| # | 항목 | 추천 | 대안 |\n|---|---|---|---|\n| 2 | TG WUV 6개월 | 5,000 | 3,000 / 10,000 |\n| 3 | \"실 방문자\" 정의 | Plausible 7d unique + 필터 | GA4 / 자체 |\n| 4 | 카테고리 수 | 8 | 4 / 12 |\n| 5 | SG-4 paid-intent | 5건 | 1 / 20 |\n| 6 | SG-4 edit | 20건 | 5 / 50 |\n| 7 | SG-4 self-reg | 30건 | 10 / 100 |\n| 8 | Kill 강도 | 중간 | 빡빡 / 느슨 |\n| 9 | 분석 도구 | Plausible | GA4 / Vercel |\n\n근거는 plan §8.\n\n### 정직한 보고\n\nWUV는 외부 비교성·명료성에서 우수하나, \"한 사람이 진짜로 가치를\n얻었는가\"의 측정에는 부족. SG-4의 4개 sub-funnel(claim/edit/\npaid-intent/self-reg)이 보조 지표로 필수. **WUV 5,000 + paid-intent 0\n은 traffic-without-value 함정** — 두 지표 함께 보고하는 routine 필수.\n이 점은 plan §9에 명시.\n\n### 다음 단계\n\n이어서 v2 revision에 바인딩한 새 `request_confirmation`을 올릴게.\n- accept = Goals 등록 + 4개 채용 child 이슈 생성 (각 별도 승인 게이트)\n- reject = 코멘트로 조정 요청 → v3\n"
