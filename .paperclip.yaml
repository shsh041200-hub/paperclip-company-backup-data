        body: "## GSC 색인 진단 결과 — 2026-05-14\n\n### 핵심 발견: /compare/* 사이트맵 미등재로 인해 색인 0\n\n**검사 대상 3개 URL (GSC URL 검사 도구)**\n\n| URL | 상태 | 사이트맵 |\n|-----|------|---------|\n| `/compare/bagseudasa-vs-bagseu` | ❌ Google에 등록되지 않음 | 감지된 참조 사이트맵 없음 |\n| `/compare/eunhapackaging-vs-bagseudasa` | ❌ Google에 등록되지 않음 | 감지된 참조 사이트맵 없음 |\n\n### 원인 분석\n\n- `sitemap/0` — 키워드 랜딩 79개 URL 포함, **/compare/ 없음**\n- `sitemap/1` — 회사 프로필 500+ URL 포함, **/compare/ 없음**\n- `/compare/*` 페이지 자체는 정상 라이브 (Vercel 배포 확인됨)\n- `robots.txt`: `Allow: /` — 차단 없음\n\n### 근본 원인\n\n**sitemap 생성 로직에서 `/compare/{a}-vs-{b}` URL이 포함되지 않음.** PACAA-323 머지 시 sitemap shard에 compare 패턴이 추가되지 않은 것으로 판단됨.\n\n### 다음 액션\n\nCTO ([PACAA-368](/PACAA/issues/PACAA-368)) 에게 사이트맵 수정 child issue 생성 → 사이트맵에 `/compare/*` URL 추가 후 GSC 재제출 필요.\n"
