        body: "## 보드 지적이 맞습니다 — 제가 \"위험\" 이라고 한 건 잘못된 알람\n\n프로덕션을 안 보고 로컬 verify-build 만 보고 P1 으로 분류했습니다. 본인 메모리 (`feedback_seo_live_probe_first.md`) 에 \"라이브 probe 먼저\" 박혀 있는데도 어겼고요. 사과드립니다.\n\n## 실제 상태 (live probe 결과)\n\n- **`https://keywords.packlinx.com/sitemap.xml`** → HTTP 200, base URL `https://keywords.packlinx.com` 으로 정상 박힘. 50 키워드 (`DTF-인쇄`, `OPP봉투-제작`, `골판지박스-제작` 등) 정상 등재.\n- **`https://keywords.packlinx.com/keywords/test-keyword`** → **HTTP 404**. 프로덕션 sitemap 에도 없음. **이미 필터링되어 있음.**\n- 즉, 보드 말씀대로 \"그렇게 한 이유\" 가 있던 것: test-keyword 는 로컬 PoC 부트스트랩(2026-05-01 01:11 KST commit `9fe1ddf` by CTO) 시점에 **라우트 + 메타데이터 + JSON-LD + ISR 검증용** 으로 박아둔 dev-only 슬러그. 프로덕션 빌드/배포 단계에서 이미 제외됨. \n\n## 제가 무엇을 잘못 봤나\n\n1. **로컬 verify-build (port 3001) 의 sitemap** 이 `localhost:3000` 을 base 로 박아 반환하는 걸 보고 → \"NEXT_PUBLIC_SITE_URL 미설정, 프로덕션 SEO 붕괴\" 로 점프. 실제로는 로컬 prod-build 가 단지 `.env.local` 의 SITE_URL 을 사용한 것. **Vercel 배포는 별개 환경변수로 운영되어 정상.**\n2. **로컬 KEYWORD_REGISTRY 에 test-keyword 가 있음** → \"sitemap 노출, Google 색인 위험\" 으로 점프. 실제로는 프로덕션이 이미 제외함. \n3. **PACAA-86 댓글 트레일을 안 읽었음** — Backend 가 어제 \"50/50 on-page OK, keywords.packlinx.com 배포\" 보고함. 그리고 PACAA-87 보드 사인오프로 별도 subdomain + 별도 코드베이스 아키텍처가 정식 승인됨. 이걸 확인했으면 \"위험 발견\" 이 아니라 \"의도된 설계\" 로 봤을 텐데 안 했음.\n\n## 진짜 답 (test-keyword 정확히 뭐냐)\n\n**개발 환경 전용 스모크 테스트 슬러그.** PoC 부트스트랩 시 라우트 정상 동작 확인용. 프로덕션에는 안 나감 (이미 검증 완료). 끝.\n\n## 학습\n\n- 로컬 환경 관찰을 바로 \"프로덕션 위험\" 으로 점프하지 말 것 → live probe 먼저.\n- PACAA-86 같은 진행 중 큰 이슈는 댓글 트레일 (특히 직전 1~2 코멘트) 읽고 답할 것 → 본인 의도/현재 상태 파악 후에 의견 형성.\n- 메모리에 baking 합니다 (이번 사고 사례)."
