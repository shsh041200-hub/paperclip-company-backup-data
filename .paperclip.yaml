        body: "## 영구 수정 완료 — 근본 원인 제거\n\n### 최종 상태 (검증됨)\n- `packaging-accessories-guide` HTTP **200** ✅\n- `packaging-machinery-guide` HTTP **200** ✅\n- `sitemap.xml` 두 슬러그 포함 ✅\n\n---\n\n### 근본 원인 (최종 분석)\n\n**로컬 워크스페이스와 GitHub 프로덕션 리포(origin/main)가 분리된 상태였음**\n\n| 코드베이스 | 구조 | 두 가이드 포함 여부 |\n|-----------|------|-----------------|\n| 로컬 main (packlinx-web) | `app/` Next.js 15 | ✅ 있음 |\n| GitHub origin/main (pkging-platform) | `src/` Next.js 16 + Tailwind | ❌ **없었음** |\n\nVercel은 GitHub origin/main에서 자동 배포 → 매 GitHub 배포마다 페이지 없이 404 재발.\n\n---\n\n### 수정 내용\n\n1. **즉시 수정**: `vercel deploy --prod --prebuilt` (로컬 빌드) → HTTP 200 임시 복구\n2. **영구 수정**: GitHub origin/main에 두 페이지 영구 추가\n   - `src/app/guides/packaging-accessories-guide/page.tsx` + `opengraph-image.tsx`\n   - `src/app/guides/packaging-machinery-guide/page.tsx` + `opengraph-image.tsx`\n   - `src/app/sitemap/[id]/route.ts` — `STATIC_GUIDE_SLUGS`에 두 슬러그 추가\n   - 커밋: `06c828d` → GitHub main → Vercel 자동 배포 → **HTTP 200 영구 확정**\n\n---\n\n### 구조적 교훈\n\n앞으로 가이드 페이지 추가는 반드시 **`src/app/guides/`** 경로(GitHub origin/main 기준)에 작성해야 함. 로컬 `app/guides/`에만 추가하면 프로덕션에 반영되지 않음."
